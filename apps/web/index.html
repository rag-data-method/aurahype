<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="description" content="Tríade 56 — sites que respiram. A triangulação da inteligência. Seu site assinado pelo GPT 5.6, a partir de R$ 15,60/mês." />

    <!-- Preconnect + preload de fontes (Instrument Serif italic + Inter) — remove flash of unstyled text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Instrument+Serif:ital@0;1&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Instrument+Serif:ital@0;1&display=swap" />

    <!-- PWA: instalável no Android e iOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tríade 56" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph — imagem 1200x630 pra WhatsApp/Insta/Twitter/LinkedIn ficarem lindos -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tríade 56" />
    <meta property="og:title" content="Tríade 56 — Sites que respiram" />
    <meta property="og:description" content="Cole seu @ do Instagram. Luna, Terra e Sol triangulam. Seu site nasce assinado pelo GPT 5.6. A partir de R$ 15,60/mês." />
    <meta property="og:url" content="https://triade56.com" />
    <meta property="og:image" content="https://triade56.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Tríade 56 · Sites que respiram · assinado pelo GPT 5.6 · a partir de R$ 15,60/mês" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tríade 56 — Sites que respiram" />
    <meta name="twitter:description" content="Cole seu @ do Instagram. Luna, Terra e Sol triangulam. Seu site nasce assinado pelo GPT 5.6." />
    <meta name="twitter:image" content="https://triade56.com/og-image.png" />

    <title>Tríade 56 — Sites que respiram</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="/runtime-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
