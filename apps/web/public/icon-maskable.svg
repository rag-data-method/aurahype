<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Triade 56">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505" />
      <stop offset="1" stop-color="#1a1024" />
    </linearGradient>
  </defs>
  <!-- Área maskable (Android recorta bordas): conteúdo dentro dos 80% centrais -->
  <rect width="512" height="512" fill="url(#bg)" />
  <g transform="translate(0 0)">
    <!-- Triângulo mais fechado, dentro da safe zone -->
    <polygon points="256,140 380,352 132,352" fill="none" stroke="rgba(255,248,240,0.22)" stroke-width="2.4" stroke-linejoin="round" />
    <circle cx="256" cy="140" r="7" fill="#a78bfa" />
    <circle cx="380" cy="352" r="7" fill="#fbbf24" />
    <circle cx="132" cy="352" r="7" fill="#34d399" />
    <!-- 56 protagonista -->
    <text x="256" y="298" text-anchor="middle" font-family="Georgia, 'Instrument Serif', serif" font-style="italic" font-weight="400" font-size="180" fill="#fff8f0" letter-spacing="-7">56</text>
  </g>
</svg>
