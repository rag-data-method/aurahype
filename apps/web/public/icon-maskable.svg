<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="2Minutes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17141a" />
      <stop offset="1" stop-color="#2b1e35" />
    </linearGradient>
  </defs>
  <!-- Área segura maskable: mantemos o conteúdo dentro dos 80% centrais -->
  <rect width="512" height="512" fill="url(#bg)" />
  <g transform="translate(51 51)">
    <g fill="#fff8f0" font-family="Georgia, 'Playfair Display', serif" font-weight="700">
      <text x="30" y="285" font-size="285" letter-spacing="-14">2</text>
      <text x="205" y="285" font-size="105" letter-spacing="-4" fill="#ffbb46">M</text>
      <text x="205" y="360" font-size="38" letter-spacing="4" fill="#f9eae4" font-family="'DM Mono', monospace" font-weight="500">MIN</text>
    </g>
  </g>
</svg>
