<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Triade 56">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505" />
      <stop offset="1" stop-color="#1a1024" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.55" r="0.6">
      <stop offset="0" stop-color="#ffbb46" stop-opacity="0.28" />
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.22" />
      <stop offset="1" stop-color="#050505" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- fundo escuro premium -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect width="512" height="512" rx="112" fill="url(#glow)" />
  <!-- triângulo da tríade (linha fina, elegante) -->
  <polygon points="256,110 400,378 112,378" fill="none" stroke="rgba(255,248,240,0.22)" stroke-width="2" stroke-linejoin="round" />
  <!-- 3 pontos: Luna violeta, Sol âmbar, Terra verde -->
  <circle cx="256" cy="110" r="7" fill="#a78bfa" />
  <circle cx="400" cy="378" r="7" fill="#fbbf24" />
  <circle cx="112" cy="378" r="7" fill="#34d399" />
  <!-- 56 no centro, serifa itálica, protagonista -->
  <text x="256" y="316" text-anchor="middle" font-family="Georgia, 'Instrument Serif', serif" font-style="italic" font-weight="400" font-size="200" fill="#fff8f0" letter-spacing="-8">56</text>
</svg>
