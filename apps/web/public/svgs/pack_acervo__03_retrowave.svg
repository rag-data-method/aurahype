</path>
<path d="M0,520 H1600 M0,560 H1600 M0,590 H1600 M0,630 H1600 M0,690 H1600 M0,770 H1600" opacity="0.5"/>
</g>
<path d="M0,900 L0,720 L200,600 L400,750 L600,620 L900,780 L1200,640 L1400,720 L1600,680 L1600,900 Z" fill="#0d0418"/>
