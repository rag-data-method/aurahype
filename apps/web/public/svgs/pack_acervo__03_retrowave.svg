<circle cx="1150" cy="50" r="1" opacity="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
<circle cx="1300" cy="140" r="1.5" opacity="0.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
<circle cx="1450" cy="90" r="1" opacity="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></circle>
