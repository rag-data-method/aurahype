<circle cx="1380" cy="230" r="1" opacity="0.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
<circle cx="1540" cy="180" r="1.5" opacity="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
</g>
<circle cx="800" cy="360" r="180" fill="url(#sunGrad)" mask="url(#sunMask)" filter="url(#glow)"/>
<g stroke="url(#gridGrad)" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.65" stroke-linecap="butt">
<path stroke-dasharray="40 40" d="M800,520 L-200,900 M800,520 L0,900 M800,520 L200,900 M800,520 L400,900 M800,520 L600,900 M800,520 L800,900 M800,520 L1000,900 M800,520 L1200,900 M800,520 L1400,900 M800,520 L1600,900 M800,520 L1800,900">
