<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#050510"/>
<stop offset="0.6" stop-color="#1a0b2e"/>
<stop offset="1" stop-color="#2d0f3d">
<animate attributeName="stop-color" values="#2d0f3d;#3d154d;#2d0f3d" dur="10s" repeatCount="indefinite"/>
</stop>
</linearGradient>
<linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#ffcc00"/>
<stop offset="0.5" stop-color="#ff0066"/>
<stop offset="1" stop-color="#9900ff"/>
</linearGradient>
<linearGradient id="gridGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#00ffff" stop-opacity="0.9"/>
<stop offset="1" stop-color="#ff00ff" stop-opacity="0.7"/>
</linearGradient>
<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="5" result="b">
<animate attributeName="stdDeviation" values="5;8;5" dur="4s" repeatCount="indefinite"/>
</feGaussianBlur>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<mask id="sunMask" maskUnits="userSpaceOnUse">
<circle cx="800" cy="360" r="180" fill="#fff"/>
<g fill="#000">
<rect x="620" y="220" width="360" height="18"/>
<rect x="620" y="260" width="360" height="18"/>
<rect x="620" y="300" width="360" height="18"/>
<rect x="620" y="340" width="360" height="18"/>
<rect x="620" y="380" width="360" height="18"/>
<rect x="620" y="420" width="360" height="18"/>
<rect x="620" y="460" width="360" height="18"/>
<rect x="620" y="500" width="360" height="18"/>
<animateTransform attributeName="transform" type="translate" values="0,0;0,40;0,0" dur="3s" repeatCount="indefinite"/>
</g>
</mask>
</defs>
<rect width="1600" height="900" fill="url(#sky)"/>
<g fill="#fff">
<circle cx="150" cy="120" r="1.5" opacity="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
<circle cx="320" cy="80" r="1" opacity="0.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
