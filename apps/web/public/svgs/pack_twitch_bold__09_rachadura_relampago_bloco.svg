</rect>
<rect x="420" y="330" width="24" height="24" fill="#000000">
<animateTransform attributeName="transform" type="translate" from="0,0" to="-80,100" begin="1s" dur="0.35s" fill="freeze"/>
</rect>
<rect x="370" y="410" width="18" height="18" fill="#FF0000">
