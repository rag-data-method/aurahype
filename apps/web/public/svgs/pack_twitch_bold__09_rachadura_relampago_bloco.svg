<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<rect width="800" height="600" fill="#FFFFFF"/>
<g>
<polygon points="200,150 360,150 430,200 340,260 460,320 350,380 420,450 200,450" fill="#000000" stroke="#FF0000" stroke-width="10" stroke-linejoin="miter"/>
<animateTransform attributeName="transform" type="translate" from="0,0" to="-45,-30" begin="0.8s" dur="0.25s" fill="freeze"/>
</g>
<g>
<polygon points="600,150 360,150 430,200 340,260 460,320 350,380 420,450 600,450" fill="#000000" stroke="#FF0000" stroke-width="10" stroke-linejoin="miter"/>
<animateTransform attributeName="transform" type="translate" from="0,0" to="45,30" begin="0.8s" dur="0.25s" fill="freeze"/>
</g>
<path d="M360,150 L430,200 L340,260 L460,320 L350,380 L420,450" fill="none" stroke="#FF0000" stroke-width="32" stroke-linecap="square" stroke-linejoin="miter" stroke-dasharray="600" stroke-dashoffset="600">
<animate attributeName="stroke-dashoffset" from="600" to="0" begin="0s" dur="0.8s" fill="freeze"/>
</path>
<rect x="400" y="170" width="20" height="20" fill="#000000">
<animateTransform attributeName="transform" type="translate" from="0,0" to="-100,-110" begin="1s" dur="0.35s" fill="freeze"/>
</rect>
<rect x="385" y="250" width="16" height="16" fill="#FF0000">
