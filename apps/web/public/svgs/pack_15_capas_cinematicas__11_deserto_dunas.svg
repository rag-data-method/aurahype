<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky Gradients -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1025">
        <animate attributeName="stop-color" values="#1A1025;#2D1B3E;#1A1025" dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="40%" stop-color="#3D1A4F">
        <animate attributeName="stop-color" values="#3D1A4F;#5A2D6B;#3D1A4F" dur="25s" repeatCount="indefinite" />
      </stop>
      <stop offset="70%" stop-color="#C97864">
        <animate attributeName="stop-color" values="#C97864;#E89A7C;#C97864" dur="22s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#E8C9A0">
        <animate attributeName="stop-color" values="#E8C9A0;#F5DEB3;#E8C9A0" dur="18s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <radialGradient id="planet-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C9A0" stop-opacity="0.5">
        <animate attributeName="stop-opacity" values="0.5;0.8;0.5" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#C97864" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C9A0" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#C97864" stop-opacity="0" />
    </radialGradient>

    <!-- Light Bloom Gradient -->
    <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C9A0" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#C97864" stop-opacity="0" />
    </radialGradient>

    <!-- Filters -->
    <filter id="blur120">
      <feGaussianBlur stdDeviation="120" />
    </filter>
    <filter id="blur90">
      <feGaussianBlur stdDeviation="90" />
    </filter>
    <filter id="blur60">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="blur20">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Dune Paths -->
    <path id="dune-far" d="M0,700 C300,600 700,750 1100,650 C1300,600 1500,680 1600,630 L1600,900 L0,900 Z" />
    <path id="dune-mid" d="M0,750 C250,700 500,800 850,730 C1050,690 1300,780 1600,710 L1600,900 L0,900 Z" />
    <path id="dune-close" d="M0,850 C400,780 600,880 900,810 C1200,740 1400,820 1600,790 L1600,900 L0,900 Z" />
    <path id="dune-foreground" d="M0,900 L0,830 C350,850 650,780 950,840 C1250,900 1450,850 1600,860 L1600,900 Z" />

    <!-- Particle Path for Animation -->
    <path id="p-path" d="M-100,450 C200,420 500,480 800,450 C1100,420 1400,480 1700,450" fill="none" />
  </defs>

  <!-- Base Sky -->
  <rect width="100%" height="100%" fill="url(#sky)" />

  <!-- Distant Atmospheric Glow (Planet / Massive Moon) -->
  <circle cx="1100" cy="220" r="140" fill="url(#planet-glow)" filter="url(#blur90)">
    <animate attributeName="r" values="140;150;140" dur="20s" repeatCount="indefinite" />
  </circle>
  <circle cx="1100" cy="220" r="80" fill="#E8C9A0" opacity="0.15" filter="url(#blur60)" />

  <!-- Star Layers -->
  <g fill="#FFFFFF">
    <!-- Star Cluster 1 -->
    <g opacity="0.6">
      <circle cx="200" cy="150" r="1.5">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" />
      </circle>
      <circle cx="350" cy="80" r="1">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" repeatCount="indefinite" />
      </circle>
      <circle cx="450" cy="180" r="2">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite" />
      </circle>
      <circle cx="120" cy="250" r="1">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="7s" repeatCount="indefinite" />
      </circle>
      <circle cx="500" cy="120" r="1.5">
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="5.5s" repeatCount="indefinite" />
      </circle>
    </g>
    <!-- Star Cluster 2 -->
    <g opacity="0.4">
      <circle cx="850" cy="60" r="1.5">
        <animate attributeName="opacity" values="0.1;0.6;0.1" dur="8s" repeatCount="indefinite" />
      </circle>
      <circle cx="950" cy="140" r="1">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="6s" repeatCount="indefinite" />
      </circle>
      <circle cx="1050" cy="40" r="1.5">
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="7s" repeatCount="indefinite" />
      </circle>
      <circle cx="1150" cy="100" r="1">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite" />
      </circle>
      <circle cx="1300" cy="30" r="2">
        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="9s" repeatCount="indefinite" />
      </circle>
      <circle cx="1450" cy="90" r="1">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="1550" cy="160" r="1.5">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="7.5s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Distant Dune Layer -->
  <use href="#dune-far" fill="#2A1838" opacity="0.5" filter="url(#blur60)" />
  <use href="#dune-far" fill="#3D1A4F" opacity="0.3" transform="translate(0, 20)" filter="url(#blur120)" />

  <!-- Mid Dune Layer -->
  <use href="#dune-mid" fill="#351545" opacity="0.7" filter="url(#blur20)" />
  <use href="#dune-mid" fill="#6B4FBB" opacity="0.1" transform="translate(0, 30)" filter="url(#blur90)" />

  <!-- Horizon Glow Layer -->
  <ellipse cx="800" cy="720" rx="900" ry="150" fill="#C97864" opacity="0.15" filter="url(#blur120)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="15s" repeatCount="indefinite" />
  </ellipse>

  <!-- Close Dune Layer -->
  <use href="#dune-close" fill="#1E0D2B" />
  <use href="#dune-close" fill="#3D1A4F" opacity="0.4" transform="translate(-30, 10)" filter="url(#blur60)" />

  <!-- Foreground Dune Layer -->
  <use href="#dune-foreground" fill="#12051A" />
  <use href="#dune-foreground" fill="#C97864" opacity="0.1" transform="translate(50, 5)" filter="url(#blur20)" />

  <!-- Sand Particles / Dust System -->
  <g fill="#E8C9A0" opacity="0.6">
    <!-- Row 1 -->
    <circle r="2" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="18s" repeatCount="indefinite" begin="0s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="18s" repeatCount="indefinite" />
    </circle>
    <circle r="1.5" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="22s" repeatCount="indefinite" begin="-5s" />
      <animate attributeName="opacity" values="0;0.5;0" dur="22s" repeatCount="indefinite" />
    </circle>
    <circle r="2.5" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="20s" repeatCount="indefinite" begin="-10s" />
      <animate attributeName="opacity" values="0;0.6;0" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle r="1.5" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="25s" repeatCount="indefinite" begin="-2s" />
      <animate attributeName="opacity" values="0;0.8;0" dur="25s" repeatCount="indefinite" />
    </circle>
    <circle r="2" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="19s" repeatCount="indefinite" begin="-12s" />
      <animate attributeName="opacity" values="0;0.4;0" dur="19s" repeatCount="indefinite" />
    </circle>
    <!-- Row 2 -->
    <circle r="2" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="21s" repeatCount="indefinite" begin="-7s" />
      <animate attributeName="opacity" values="0;0.6;0" dur="21s" repeatCount="indefinite" />
    </circle>
    <circle r="1.5" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="17s" repeatCount="indefinite" begin="-14s" />
      <animate attributeName="opacity" values="0;0.5;0" dur="17s" repeatCount="indefinite" />
    </circle>
    <circle r="2.5" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="24s" repeatCount="indefinite" begin="-3s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="24s" repeatCount="indefinite" />
    </circle>
    <circle r="1" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="16s" repeatCount="indefinite" begin="-9s" />
      <animate attributeName="opacity" values="0;0.9;0" dur="16s" repeatCount="indefinite" />
    </circle>
    <circle r="2" filter="url(#blur20)">
      <animateMotion href="#p-path" dur="23s" repeatCount="indefinite" begin="-15s" />
      <animate attributeName="opacity" values="0;0.4;0" dur="23s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- The Lone Figure: Positioned slightly left of center on the mid-dune ridge -->
  <g transform="translate(650, 722) scale(0.6)">
    <!-- Rim Light / Glow behind figure -->
    <ellipse cx="0" cy="15" rx="25" ry="50" fill="url(#halo)" opacity="0.6" filter="url(#blur20)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="10s" repeatCount="indefinite" />
    </ellipse>

    <!-- Figure Silhouette -->
    <path d="M -4,-35 C -4,-40 4,-40 4,-35 C 4,-30 -4,-30 -4,-35 Z M -6,-25 L 6,-25 L 8,5 L 12,35 L 8,35 L 4,15 L -4,15 L -8,35 L -12,35 L -8,5 Z" fill="#0A030D">
      <!-- Gentle breathing / swaying sway -->
      <animateTransform attributeName="transform" type="rotate" values="-1 0 35; 1 0 35; -1 0 35" dur="8s" repeatCount="indefinite" additive="sum" />
      <!-- Slow walk bob -->
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="3s" repeatCount="indefinite" additive="sum" />
    </path>

    <!-- Distant torch / lantern glow carried by figure -->
    <circle cx="8" cy="30" r="4" fill="#C97864" opacity="0.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="8" cy="30" r="15" fill="url(#bloom)" opacity="0.3" filter="url(#blur20)">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Atmospheric Haze / Fog Overlay -->
  <rect x="0" y="500" width="1600" height="400" fill="url(#planet-glow)" opacity="0.15" filter="url(#blur120)" style="mix-blend-mode: screen;" />
  <rect x="0" y="600" width="1600" height="300" fill="#3D1A4F" opacity="0.2" filter="url(#blur90)" />

  <!-- Foreground Particles (Dust in wind) -->
  <g fill="#E8C9A0" opacity="0.4" filter="url(#blur20)">
    <circle cx="200" cy="820" r="2">
      <animate attributeName="cx" values="200;1600" dur="14s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.6;0" dur="14s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="860" r="3">
      <animate attributeName="cx" values="500;1700" dur="18s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.5;0" dur="18s" repeatCount="indefinite" />
    </circle>
    <circle cx="900" cy="800" r="2.5">
      <animate attributeName="cx" values="900;1800" dur="16s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.7;0" dur="16s" repeatCount="indefinite" />
    </circle>
    <circle cx="1200" cy="840" r="2">
      <animate attributeName="cx" values="1200;1900" dur="20s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.4;0" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="880" r="1.5">
      <animate attributeName="cx" values="300;1500" dur="12s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Vignette for Cinematic Framing -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="70%" stop-color="#000000" stop-opacity="0" />
    <stop offset="100%" stop-color="#000000" stop-opacity="0.6" />
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#vignette)" style="pointer-events: none;" />

  <!-- Top Gradient for Title Readability -->
  <linearGradient id="title-fade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0A030D" stop-opacity="0.8" />
    <stop offset="50%" stop-color="#0A030D" stop-opacity="0.3" />
    <stop offset="100%" stop-color="#0A030D" stop-opacity="0" />
  </linearGradient>
  <rect x="0" y="0" width="1600" height="400" fill="url(#title-fade)" style="pointer-events: none;" />

</svg>