<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background-color:#050014" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="2" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="heavyGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="sunburst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00d4" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050014" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frameClip">
      <rect x="160" y="120" width="480" height="360" rx="12" />
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="#050014" />

  <g id="bg-particles">
    <circle cx="150" cy="100" r="3" fill="#00e5ff" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="4s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="cy" values="100;70" dur="4s" begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="650" cy="500" r="4" fill="#ff00d4" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="5s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="cy" values="500;470" dur="5s" begin="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="50" r="2" fill="#39ff14" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="6s" begin="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="50;20" dur="6s" begin="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="250" cy="550" r="3" fill="#ffea00" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="cy" values="550;520" dur="3.5s" begin="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="200" r="2.5" fill="#00a8ff" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="4.5s" begin="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;170" dur="4.5s" begin="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <g id="film-strip-base">
    <rect x="0" y="120" width="800" height="360" fill="none" rx="12" />
    <path d="M 160 0 L 160 600 M 640 0 L 640 600" stroke="#2a0044" stroke-width="80" fill="none" />
    
    <rect x="140" y="120" width="20" height="40" rx="4" fill="#ff00d4" />
    <rect x="140" y="200" width="20" height="40" rx="4" fill="#00e5ff" />
    <rect x="140" y="280" width="20" height="40" rx="4" fill="#39ff14" />
    <rect x="140" y="360" width="20" height="40" rx="4" fill="#ffea00" />
    <rect x="140" y="440" width="20" height="40" rx="4" fill="#00a8ff" />
    
    <rect x="640" y="120" width="20" height="40" rx="4" fill="#ff00d4" />
    <rect x="640" y="200" width="20" height="40" rx="4" fill="#00e5ff" />
    <rect x="640" y="280" width="20" height="40" rx="4" fill="#39ff14" />
    <rect x="640" y="360" width="20" height="40" rx="4" fill="#ffea00" />
    <rect x="640" y="440" width="20" height="40" rx="4" fill="#00a8ff" />

    <rect x="140" y="120" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="0s" repeatCount="indefinite" />
    </rect>
    <rect x="140" y="200" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="0.5s" repeatCount="indefinite" />
    </rect>
    <rect x="140" y="280" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="1s" repeatCount="indefinite" />
    </rect>
    <rect x="140" y="360" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="1.5s" repeatCount="indefinite" />
    </rect>
    <rect x="140" y="440" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="2s" repeatCount="indefinite" />
    </rect>

    <rect x="640" y="120" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="0.2s" repeatCount="indefinite" />
    </rect>
    <rect x="640" y="200" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="0.7s" repeatCount="indefinite" />
    </rect>
    <rect x="640" y="280" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="1.2s" repeatCount="indefinite" />
    </rect>
    <rect x="640" y="360" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="1.7s" repeatCount="indefinite" />
    </rect>
    <rect x="640" y="440" width="20" height="40" rx="4" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.2;1" dur="4s" begin="2.2s" repeatCount="indefinite" />
    </rect>
  </g>

  <rect x="160" y="120" width="480" height="360" fill="#120024" rx="12" />
  <rect x="160" y="120" width="480" height="360" fill="none" stroke="#00e5ff" stroke-width="6" rx="12" filter="url(#glow)" />

  <g clip-path="url(#frameClip)">
    <rect x="160" y="120" width="480" height="360" fill="#2a0044" opacity="0.5" />
    <circle cx="400" cy="300" r="180" fill="url(#sunburst)" filter="url(#heavyGlow)">
      <animate attributeName="r" values="150;220;150" dur="4s" repeatCount="indefinite" />
    </circle>

    <g id="frame-1">
      <rect x="200" y="160" width="400" height="280" rx="10" fill="#ff00d4" opacity="0" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="0s" repeatCount="indefinite" />
      </rect>
      
      <path d="M 240 320 L 400 220 L 560 320 L 400 420 Z M 400 250 L 340 300 L 340 360 L 460 360 L 460 300 Z" fill="#050014" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="0s" repeatCount="indefinite" />
      </path>
      
      <circle cx="400" cy="300" r="40" fill="#39ff14" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="0s" repeatCount="indefinite" />
      </circle>
      <polygon points="385,280 385,320 420,300" fill="#050014" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="0s" repeatCount="indefinite" />
      </polygon>
      <text x="400" y="380" font-family="monospace" font-weight="bold" font-size="28" fill="#ffffff" text-anchor="middle" opacity="0" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="0s" repeatCount="indefinite" />
        LIVE NOW
      </text>
    </g>

    <g id="frame-2">
      <rect x="200" y="160" width="400" height="280" rx="10" fill="#00e5ff" opacity="0" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="2.65s" repeatCount="indefinite" />
      </rect>
      
      <circle cx="400" cy="280" r="70" fill="#ffea00" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="2.65s" repeatCount="indefinite" />
      </circle>
      <circle cx="400" cy="280" r="50" fill="#ff00d4" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="2.65s" repeatCount="indefinite" />
      </circle>
      <text x="400" y="290" font-family="monospace" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle" opacity="0" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="2.65s" repeatCount="indefinite" />
        99,999
      </text>

      <g opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="2.65s" repeatCount="indefinite" />
        <path d="M 250 350 L 250 370 L 270 360 Z M 280 350 L 280 370 L 300 360 Z" fill="#ffffff" />
        <rect x="310" y="350" width="180" height="20" rx="10" fill="#ffffff" />
        <circle cx="520" cy="360" r="12" fill="#39ff14" />
        <circle cx="554" cy="360" r="12" fill="#00a8ff" />
      </g>
    </g>

    <g id="frame-3">
      <rect x="200" y="160" width="400" height="280" rx="10" fill="#39ff14" opacity="0" filter="url(#glow)">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="5.3s" repeatCount="indefinite" />
      </rect>

      <g opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="5.3s" repeatCount="indefinite" />
        <rect x="250" y="210" width="120" height="90" rx="8" fill="#ff00d4" />
        <rect x="430" y="210" width="120" height="90" rx="8" fill="#00e5ff" />
        <rect x="250" y="320" width="120" height="90" rx="8" fill="#ffea00" />
        <rect x="430" y="320" width="120" height="90" rx="8" fill="#00a8ff" />

        <rect x="280" y="240" width="60" height="10" rx="5" fill="#ffffff" />
        <rect x="280" y="260" width="40" height="10" rx="5" fill="#ffffff" />
        <rect x="280" y="280" width="80" height="10" rx="5" fill="#ffffff" />

        <circle cx="490" cy="255" r="25" fill="#ffffff" />
        <polygon points="480,240 480,270 505,255" fill="#050014" />

        <circle cx="490" cy="365" r="25" fill="#ffffff" />
        <rect x="475" y="355" width="30" height="20" rx="5" fill="#050014" />
      </g>
    </g>

    <g id="confetti">
      <polygon points="310,270 315,280 325,280 317,287 320,297 310,290 300,297 303,287 295,280 305,280" fill="#ffea00" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="3s" begin="3s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-40" dur="3s" begin="3s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="0 310 270; 180 310 270" dur="3s" begin="3s" repeatCount="indefinite" additive="sum" />
      </polygon>
      <polygon points="490,270 495,280 505,280 497,287 500,297 490,290 480,297 483,287 475,280 485,280" fill="#00a8ff" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="2.5s" begin="4s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-50" dur="2.5s" begin="4s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="0 490 270; -180 490 270" dur="2.5s" begin="4s" repeatCount="indefinite" additive="sum" />
      </polygon>
      <polygon points="400,380 405,390 415,390 407,397 410,407 400,400 390,407 393,397 385,390 395,390" fill="#39ff14" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="3.5s" begin="5s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30" dur="3.5s" begin="5s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="0 400 380; 360 400 380" dur="3.5s" begin="5s" repeatCount="indefinite" additive="sum" />
      </polygon>
    </g>
  </g>

  <g id="ui-overlays" filter="url(#glow)">
    <g id="ticker-base">
      <rect x="260" y="20" width="280" height="40" rx="8" fill="#ff00d4" opacity="0.9" />
      <rect x="260" y="20" width="280" height="40" rx="8" fill="#00e5ff" opacity="0">
        <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite" />
      </rect>
    </g>
    <g id="ticker-text">
      <rect x="275" y="32" width="80" height="16" rx="4" fill="#050014" />
      <rect x="365" y="32" width="60" height="16" rx="4" fill="#050014" />
      <rect x="435" y="32" width="90" height="16" rx="4" fill="#050014" />
    </g>

    <g id="live-badge">
      <rect x="30" y="20" width="90" height="40" rx="20" fill="#ff0000" />
      <circle cx="55" cy="40" r="8" fill="#ffffff" />
      <rect x="70" y="30" width="35" height="8" rx="4" fill="#ffffff" />
      <rect x="70" y="42" width="20" height="8" rx="4" fill="#ffffff" />
    </g>

    <g id="viewer-count">
      <rect x="650" y="20" width="120" height="40" rx="8" fill="#ffea00" />
      <circle cx="675" cy="40" r="10" fill="#050014" />
      <rect x="695" y="30" width="55" height="8" rx="4" fill="#050014" />
      <rect x="695" y="42" width="40" height="8" rx="4" fill="#050014" />
    </g>

    <g id="chat-bubbles">
      <g id="bubble-1">
        <rect x="660" y="80" width="110" height="50" rx="10" fill="#00e5ff" />
        <polygon points="660,120 650,140 680,125" fill="#00e5ff" />
        <rect x="675" y="95" width="80" height="8" rx="4" fill="#050014" />
        <rect x="675" y="110" width="50" height="8" rx="4" fill="#050014" />
      </g>
      <g id="bubble-2">
        <rect x="680" y="150" width="90" height="40" rx="10" fill="#ff00d4" />
        <polygon points="680,180 670,200 700,185" fill="#ff00d4" />
        <rect x="695" y="162" width="60" height="6" rx="3" fill="#050014" />
        <rect x="695" y="174" width="40" height="6" rx="3" fill="#050014" />
      </g>
      <g id="bubble-3">
        <rect x="640" y="230" width="120" height="55" rx="10" fill="#39ff14" />
        <polygon points="640,275 630,295 660,280" fill="#39ff14" />
        <rect x="655" y="245" width="90" height="8" rx="4" fill="#050014" />
        <rect x="655" y="260" width="60" height="8" rx="4" fill="#050014" />
      </g>
    </g>
  </g>

  <g id="glitch-overlay" clip-path="url(#frameClip)">
    <rect x="200" y="160" width="400" height="10" fill="#00e5ff" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" keyTimes="0;0.3;1" dur="0.3s" begin="1.5s" repeatCount="indefinite" />
      <animate attributeName="y" values="160;440;160" dur="2.5s" begin="1.5s" repeatCount="indefinite" />
    </rect>
    <rect x="200" y="300" width="400" height="5" fill="#ff00d4" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.3;1" dur="0.4s" begin="3.2s" repeatCount="indefinite" />
      <animate attributeName="y" values="300;160;300" dur="3s" begin="3.2s" repeatCount="indefinite" />
    </rect>
    <rect x="200" y="420" width="400" height="8" fill="#ffea00" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.3;1" dur="0.35s" begin="5.8s" repeatCount="indefinite" />
      <animate attributeName="y" values="420;200;420" dur="2.8s" begin="5.8s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>