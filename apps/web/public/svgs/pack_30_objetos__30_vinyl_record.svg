<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    
    <radialGradient id="vinylBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="85%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
    
    <radialGradient id="labelRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F04F5C"/>
      <stop offset="80%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#CC2F3B"/>
    </radialGradient>
    
    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A85C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A85C" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C9A85C" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="armMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="50%" stop-color="#5A5A5A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF7EE"/>
  
  <ellipse cx="800" cy="680" rx="260" ry="50" fill="#1A1A1A" opacity="0.12" filter="url(#shadowBlur)">
    <animate attributeName="opacity" values="0.12;0.22;0.12" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="260;275;260" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="50;42;50" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <g transform="translate(800, 460)">
    <animateTransform attributeName="transform" type="translate" values="800,460; 800,445; 800,460" dur="5s" repeatCount="indefinite" additive="replace"/>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      
      <circle r="240" fill="url(#vinylBody)"/>
      
      <g fill="none" stroke="#C9A85C" stroke-width="1.5" opacity="0.4">
        <circle r="220" stroke-dasharray="8,16" opacity="0.6">
          <animate attributeName="stroke-dashoffset" values="0;24" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle r="200" stroke-dasharray="12,20" opacity="0.3">
          <animate attributeName="stroke-dashoffset" values="32;0" dur="2.5s" repeatCount="indefinite"/>
        </circle>
        <circle r="180" stroke-dasharray="6,12" opacity="0.5">
          <animate attributeName="stroke-dashoffset" values="0;18" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle r="160" stroke-dasharray="20,30" opacity="0.25">
          <animate attributeName="stroke-dashoffset" values="50;0" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle r="140" stroke-dasharray="10,15" opacity="0.4">
          <animate attributeName="stroke-dashoffset" values="0;25" dur="2.8s" repeatCount="indefinite"/>
        </circle>
        <circle r="120" stroke-dasharray="15,25" opacity="0.35">
          <animate attributeName="stroke-dashoffset" values="40;0" dur="3.2s" repeatCount="indefinite"/>
        </circle>
        <circle r="100" stroke-dasharray="4,10" opacity="0.5">
          <animate attributeName="stroke-dashoffset" values="0;14" dur="1.8s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <circle r="240" fill="url(#goldSheen)" opacity="0.5">
        <animateTransform attributeName="gradientTransform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
      
      <circle r="75" fill="url(#labelRed)"/>
      <circle r="75" fill="#E63946" opacity="0.3" filter="url(#glowBlur)">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      
      <circle r="65" fill="none" stroke="#FBF7EE" stroke-width="1" opacity="0.4"/>
      <circle r="55" fill="none" stroke="#FBF7EE" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,4">
        <animate attributeName="stroke-dashoffset" values="0;6" dur="4s" repeatCount="indefinite"/>
      </circle>
      
      <circle r="6" fill="#1A1A1A"/>
      <circle r="6" fill="none" stroke="#C9A85C" stroke-width="1" opacity="0.6">
        <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g transform="translate(300, -220) rotate(30)">
      <animateTransform attributeName="transform" type="translate" values="300,-220; 300,-218; 300,-220" dur="5s" repeatCount="indefinite" additive="sum"/>
      
      <circle r="40" fill="#2A2A2A"/>
      <circle r="40" fill="url(#armMetal)"/>
      <circle r="35" fill="#1A1A1A"/>
      <circle r="30" fill="#0F0F0F"/>
      
      <rect x="-10" y="-10" width="20" height="240" rx="10" fill="url(#armMetal)"/>
      <rect x="-8" y="-8" width="16" height="236" rx="8" fill="#1A1A1A"/>
      
      <rect x="-18" y="-50" width="36" height="45" rx="6" fill="#2A2A2A"/>
      <rect x="-15" y="-47" width="30" height="39" rx="4" fill="#1A1A1A"/>
      
      <g transform="translate(0, 230)">
        <rect x="-14" y="0" width="28" height="45" rx="5" fill="#2A2A2A"/>
        <rect x="-12" y="5" width="24" height="35" rx="3" fill="#1A1A1A"/>
        <rect x="-10" y="8" width="20" height="20" rx="2" fill="#C9A85C" opacity="0.9">
          <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
        </rect>
        <line x1="0" y1="45" x2="0" y2="60" stroke="#C9A85C" stroke-width="2" opacity="0.8"/>
        <circle cx="0" cy="62" r="3" fill="#C9A85C" opacity="0.9">
          <animate attributeName="r" values="3;4.5;3" dur="1s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    
    <g fill="#C9A85C" filter="url(#softBlur)">
      <circle cx="-280" cy="-180" r="3" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="-180;-190;-180" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="320" cy="80" r="2" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite" begin="0.8s"/>
        <animate attributeName="cx" values="320;330;320" dur="2.4s" repeatCount="indefinite" begin="0.8s"/>
      </circle>
      <circle cx="-300" cy="150" r="4" opacity="0">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.6s" repeatCount="indefinite" begin="1.2s"/>
      </circle>
      <circle cx="250" cy="-200" r="2.5" opacity="0">
        <animate attributeName="opacity" values="0;0.7;0" dur="2.8s" repeatCount="indefinite" begin="2s"/>
        <animate attributeName="cy" values="-200;-210;-200" dur="2.8s" repeatCount="indefinite" begin="2s"/>
      </circle>
    </g>
    
    <path d="M 0,-240 A 240,240 0 0,1 169,-169" fill="none" stroke="#C9A85C" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#softBlur)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>