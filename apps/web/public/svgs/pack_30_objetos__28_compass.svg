<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="25" result="blur"/>
      <feOffset dx="0" dy="40" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glassSurface" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    
    <radialGradient id="brassFace" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#E6D5A3"/>
      <stop offset="40%" stop-color="#C9A85C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    
    <linearGradient id="brassEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A85C"/>
      <stop offset="50%" stop-color="#A08040"/>
      <stop offset="100%" stop-color="#5C4010"/>
    </linearGradient>
    
    <radialGradient id="dialPaper" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#F0E6D0"/>
    </radialGradient>
    
    <linearGradient id="needleNorth" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
    
    <linearGradient id="needleSouth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F0"/>
      <stop offset="100%" stop-color="#B0B0A8"/>
    </linearGradient>
    
    <linearGradient id="reflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF7EE"/>
  
  <g transform="translate(800,450)">
    <ellipse cx="0" cy="200" rx="220" ry="70" fill="#2B2620" opacity="0.15" filter="url(#dropShadow)">
      <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="0.15;0.1;0.15" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-20;0,0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
      
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-2;2;-2" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.5 0 0.5 1;0.5 0 0.5 1"/>
        
        <circle cx="0" cy="8" r="200" fill="url(#brassEdge)"/>
        <circle cx="0" cy="0" r="200" fill="url(#brassFace)" stroke="#A08040" stroke-width="3"/>
        <circle cx="0" cy="0" r="185" fill="#2B2620" opacity="0.9"/>
        <circle cx="0" cy="0" r="170" fill="url(#dialPaper)"/>
        
        <g opacity="0.8">
          <animateTransform attributeName="transform" type="rotate" values="0;360" dur="120s" repeatCount="indefinite"/>
          <g id="ticks">
            <path d="M 0,-160 L 0,-170" stroke="#2B2620" stroke-width="2"/>
            <path d="M 0,160 L 0,170" stroke="#2B2620" stroke-width="2"/>
            <path d="M 160,0 L 170,0" stroke="#2B2620" stroke-width="2"/>
            <path d="M -160,0 L -170,0" stroke="#2B2620" stroke-width="2"/>
          </g>
          <g transform="rotate(30)"><path d="M 0,-160 L 0,-165" stroke="#2B2620" stroke-width="1"/></g>
          <g transform="rotate(60)"><path d="M 0,-160 L 0,-165" stroke="#2B2620" stroke-width="1"/></g>
          <g transform="rotate(120)"><path d="M 0,-160 L 0,-165" stroke="#2B2620" stroke-width="1"/></g>
          <g transform="rotate(150)"><path d="M 0,-160 L 0,-165" stroke="#2B2620" stroke-width="1"/></g>
          <g transform="rotate(210)"><path d="M 0,-160 L 0,-165" stroke="#2B2620" stroke-width="1"/></g>
          <g transform="rotate(240)"><path d="M 0,-160 L 0,-165" stroke="#2B2620" stroke-width="1"/></g>
          <g transform="rotate(300)"><path d="M 0,-160 L 0,-165" stroke="#2B2620" stroke-width="1"/></g>
          <g transform="rotate(330)"><path d="M 0,-160 L 0,-165" stroke="#2B2620" stroke-width="1"/></g>
        </g>
        
        <g font-family="serif" font-weight="bold" text-anchor="middle" fill="#2B2620">
          <text x="0" y="-135" font-size="28" fill="#E63946" filter="url(#softGlow)">
            N
            <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
          </text>
          <text x="0" y="150" font-size="24">S</text>
          <text x="145" y="8" font-size="24">E</text>
          <text x="-145" y="8" font-size="24">W</text>
        </g>
        
        <circle cx="0" cy="0" r="155" fill="none" stroke="#C9A85C" stroke-width="1" opacity="0.4"/>
        <circle cx="0" cy="0" r="150" fill="none" stroke="#C9A85C" stroke-width="0.5" opacity="0.3"/>
        
        <g>
          <animateTransform attributeName="transform" type="rotate" 
            values="0;1440;1430;1450;1440;720;360;350;370;355;365;360;360;360;355;365;360;0;5;-5;2;-2;0" 
            keyTimes="0;0.15;0.18;0.21;0.25;0.35;0.45;0.48;0.51;0.54;0.57;0.6;0.7;0.75;0.8;0.85;0.9;0.92;0.94;0.96;0.98;0.99;1"
            dur="8s" 
            repeatCount="indefinite"
            calcMode="spline"
            keySplines="0.2 0 0.2 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1;0.5 0 0.5 1"/>
          
          <path d="M -10,0 L 0,-140 L 10,0 Z" fill="url(#needleNorth)" stroke="#8B0000" stroke-width="0.5">
            <animate attributeName="fill-opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
          </path>
          <path d="M -10,0 L 0,140 L 10,0 Z" fill="url(#needleSouth)" stroke="#888" stroke-width="0.5"/>
          <circle cx="0" cy="0" r="14" fill="url(#brassFace)" stroke="#6B4D0F" stroke-width="2"/>
          <circle cx="0" cy="0" r="7" fill="#2B2620"/>
        </g>
        
        <path d="M -120,-100 Q 0,-180 120,-100 Q 80,-40 0,-60 Q -80,-40 -120,-100" fill="url(#reflection)" opacity="0.4" filter="url(#glassSurface)">
          <animateTransform attributeName="transform" type="translate" values="0,0;20,10;0,0" dur="6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
        </path>
        
        <circle cx="-130" cy="-110" r="4" fill="white" opacity="0">
          <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0s" repeatCount="indefinite"/>
          <animate attributeName="r" values="2;6;2" dur="3s" begin="0s" repeatCount="indefinite"/>
        </circle>
        
        <circle cx="150" cy="-80" r="3" fill="#C9A85C" opacity="0">
          <animate attributeName="opacity" values="0;0.9;0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
        </circle>
        
        <circle cx="-80" cy="150" r="5" fill="white" opacity="0">
          <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" begin="3s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="3.5s" begin="3s" repeatCount="indefinite"/>
        </circle>
        
        <circle cx="100" cy="130" r="2" fill="#E63946" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>
</svg>