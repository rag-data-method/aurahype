<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="isoCube">
      <path d="M0,-40 L60,-10 L60,30 L0,60 L-60,30 L-60,-10 Z" fill="url(#cubeTop)"/>
      <path d="M-60,-10 L0,-40 L0,60 L-60,30 Z" fill="url(#cubeLeft)"/>
      <path d="M0,-40 L60,-10 L60,30 L0,60 Z" fill="url(#cubeRight)"/>
    </g>
    <g id="serverUnit">
      <use href="#isoCube"/>
      <rect x="-45" y="-5" width="90" height="6" rx="2" fill="#8b5cf6" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="-45" y="12" width="90" height="6" rx="2" fill="#3b82f6" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect x="-45" y="29" width="90" height="6" rx="2" fill="#06b6d4" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      </rect>
      <circle cx="-50" cy="0" r="3" fill="#22d3ee" filter="url(#glow)">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-50" cy="17" r="3" fill="#a78bfa" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-50" cy="34" r="3" fill="#60a5fa" filter="url(#glow)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g id="desk">
      <path d="M-120,20 L0,80 L120,20 L0,-40 Z" fill="url(#floor)" opacity="0.5"/>
      <path d="M-120,20 L0,80 L0,100 L-120,40 Z" fill="#c4b5fd" opacity="0.4"/>
      <path d="M0,80 L120,20 L120,40 L0,100 Z" fill="#93c5fd" opacity="0.4"/>
    </g>
    <g id="floatingNode">
      <circle r="18" fill="url(#cubeTop)" opacity="0.9"/>
      <circle r="8" fill="url(#screen)" filter="url(#glow)"/>
    </g>
  </defs>
  
  <rect width="1600" height="900" fill="url(#bg)"/>
  
  <g opacity="0.3">
    <ellipse cx="800" cy="720" rx="500" ry="120" fill="#c084fc">
      <animate attributeName="rx" values="500;520;500" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="6s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g transform="translate(800, 720)">
    <use href="#desk"/>
  </g>
  
  <g transform="translate(800, 620)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="6s" repeatCount="indefinite"/>
      <use href="#serverUnit" transform="translate(-90, -50)"/>
      <use href="#serverUnit" transform="translate(0, -90)"/>
      <use href="#serverUnit" transform="translate(90, -50)"/>
      <use href="#serverUnit" transform="translate(-45, 0)"/>
      <use href="#serverUnit" transform="translate(45, 0)"/>
    </g>
  </g>
  
  <g transform="translate(800, 720)">
    <g opacity="0.6">
      <path d="M-200,-100 L-120,-60 L-120,0" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,4">
        <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M200,-100 L120,-60 L120,0" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,4">
        <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.8s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-180 L0,-120" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,4">
        <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <g transform="translate(520, 320)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,20; 0,0" dur="7s" repeatCount="indefinite"/>
      <use href="#floatingNode"/>
    </g>
  </g>
  
  <g transform="translate(1080, 280)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-18; 0,0" dur="5s" repeatCount="indefinite"/>
      <use href="#floatingNode"/>
    </g>
  </g>
  
  <g transform="translate(1300, 450)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,15; 0,0" dur="6.5s" repeatCount="indefinite"/>
      <use href="#floatingNode"/>
    </g>
  </g>
  
  <g transform="translate(300, 480)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="4.5s" repeatCount="indefinite"/>
      <use href="#floatingNode"/>
    </g>
  </g>
  
  <g transform="translate(800, 180)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="30s" repeatCount="indefinite"/>
      <circle r="80" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
      <circle r="60" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
      <circle r="40" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
      <circle cx="80" r="6" fill="#a78bfa" filter="url(#glow)"/>
      <circle cy="60" r="5" fill="#60a5fa" filter="url(#glow)"/>
      <circle cx="-40" r="4" fill="#22d3ee" filter="url(#glow)"/>
    </g>
  </g>
  
  <g opacity="0.15">
    <rect width="1600" height="900" fill="url(#bg)"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="10s" repeatCount="indefinite"/>
  </g>
</svg>