  <g filter="url(#shadow)">
    <g transform="translate(240,170)">
      <rect width="720" height="520" rx="44" fill="url(#shine)" fill-opacity="0.42" stroke="#fff" stroke-opacity="0.55" stroke-width="1.5"/>
      <rect x="44" y="44" width="632" height="84" rx="20" fill="#fff" fill-opacity="0.24">
        <animate attributeName="fill-opacity" values="0.24;0.34;0.24" dur="7s" repeatCount="indefinite"/>
      </rect>
      <rect x="44" y="160" width="370" height="240" rx="26" fill="#fff" fill-opacity="0.2"/>
      <rect x="440" y="160" width="236" height="150" rx="26" fill="#fff" fill-opacity="0.2"/>
      <rect x="440" y="334" width="236" height="150" rx="26" fill="#fff" fill-opacity="0.2"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0,0;0,-16;0,0" dur="11s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </g>
    <g transform="translate(1040,140)">
      <rect width="400" height="280" rx="32" fill="url(#shine)" fill-opacity="0.38" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
      <rect x="32" y="32" width="336" height="64" rx="16" fill="#fff" fill-opacity="0.22"/>
      <rect x="32" y="116" width="336" height="132" rx="22" fill="#fff" fill-opacity="0.18">
        <animate attributeName="fill-opacity" values="0.18;0.28;0.18" dur="8s" repeatCount="indefinite"/>
      </rect>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0,0;0,-12;0,0" dur="13s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </g>
    <g transform="translate(1100,500)">
      <rect width="340" height="340" rx="32" fill="url(#shine)" fill-opacity="0.38" stroke="#fff" stroke-opacity="0.5" stroke-width="1.5"/>
      <circle cx="170" cy="140" r="72" fill="url(#o2)" fill-opacity="0.45" filter="url(#blur)"/>
      <rect x="50" y="250" width="240" height="26" rx="13" fill="#fff" fill-opacity="0.25"/>
      <rect x="50" y="290" width="180" height="16" rx="8" fill="#fff" fill-opacity="0.18"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0,0;0,-14;0,0" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
