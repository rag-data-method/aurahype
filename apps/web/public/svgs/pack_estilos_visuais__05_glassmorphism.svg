<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="50%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <radialGradient id="o1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff9a9e">
        <animate attributeName="stop-color" values="#ff9a9e;#ff7eb3;#ff9a9e" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#fecfef" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a18cd1">
        <animate attributeName="stop-color" values="#a18cd1;#c2a6ff;#a18cd1" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#fbc2eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o3" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#84fab0">
        <animate attributeName="stop-color" values="#84fab0;#a8edea;#84fab0" dur="16s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8fd3f4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o4" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffecd2">
        <animate attributeName="stop-color" values="#ffecd2;#ffd1a9;#ffecd2" dur="13s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#fcb69f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o5" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e0c3fc">
        <animate attributeName="stop-color" values="#e0c3fc;#b8b3ff;#e0c3fc" dur="15s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8ec5fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#2d1b4e" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g filter="url(#blur)">
    <circle cx="320" cy="340" r="240" fill="url(#o1)">
      <animate attributeName="cx" values="320;360;320" dur="16s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <animate attributeName="cy" values="340;290;340" dur="18s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </circle>
    <circle cx="1220" cy="240" r="300" fill="url(#o2)">
      <animate attributeName="cx" values="1220;1170;1220" dur="19s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <animate attributeName="cy" values="240;290;240" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </circle>
    <circle cx="880" cy="720" r="280" fill="url(#o3)">
      <animate attributeName="cx" values="880;930;880" dur="17s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
