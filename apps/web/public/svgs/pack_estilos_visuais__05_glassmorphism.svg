    </circle>
    <circle cx="420" cy="780" r="210" fill="url(#o4)">
      <animate attributeName="cx" values="420;460;420" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <animate attributeName="cy" values="780;730;780" dur="16s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </circle>
    <circle cx="1360" cy="660" r="200" fill="url(#o5)">
      <animate attributeName="cx" values="1360;1310;1360" dur="18s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <animate attributeName="cy" values="660;710;660" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
