<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="40%" stop-color="#1a0508"/>
      <stop offset="100%" stop-color="#4a0f1a"/>
    </linearGradient>
    <linearGradient id="pillar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#120406"/>
      <stop offset="30%" stop-color="#3d0c15"/>
      <stop offset="50%" stop-color="#5a1322"/>
      <stop offset="70%" stop-color="#3d0c15"/>
      <stop offset="100%" stop-color="#120406"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6a1b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#8a6a1b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- vertical background lines -->
  <g stroke="#2a080e" stroke-width="2">
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- ceiling stepped geometry -->
  <g fill="#0a0204">
    <path d="M700 0h200v80h-200z"/>
    <path d="M620 0h80v140h-80z"/>
    <path d="M900 0h80v140h-80z"/>
    <path d="M540 0h80v200h-80z"/>
    <path d="M980 0h80v200h-80z"/>
    <path d="M460 0h80v260h-80z"/>
    <path d="M1060 0h80v260h-80z"/>
    <path d="M380 0h80v320h-80z"/>
    <path d="M1140 0h80v320h-80z"/>
  </g>

  <!-- gold ceiling trim -->
  <g fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#glow)">
    <path d="M700 80h200"/>
    <path d="M620 140h80"/>
    <path d="M900 140h80"/>
    <path d="M540 200h80"/>
    <path d="M980 200h80"/>
    <path d="M460 260h80"/>
    <path d="M1060 260h80"/>
    <path d="M380 320h80"/>
    <path d="M1140 320h80"/>
  </g>

  <!-- side columns -->
  <g fill="url(#pillar)">
    <rect x="100" y="0" width="120" height="900"/>
    <rect x="1380" y="0" width="120" height="900"/>
  </g>

  <!-- column gold capitals/bases -->
  <g fill="url(#gold)">
    <rect x="90" y="100" width="140" height="20"/>
    <rect x="90" y="780" width="140" height="20"/>
    <rect x="1370" y="100" width="140" height="20"/>
    <rect x="1370" y="780" width="140" height="20"/>
  </g>

  <!-- column fluting -->
  <g stroke="#1f060a" stroke-width="3">
    <line x1="130" y1="120" x2="130" y2="780"/>
    <line x1="160" y1="120" x2="160" y2="780"/>
    <line x1="190" y1="120" x2="190" y2="780"/>
    <line x1="1410" y1="120" x2="1410" y2="780"/>
    <line x1="1440" y1="120" x2="1440" y2="780"/>
    <line x1="1470" y1="120" x2="1470" y2="780"/>
  </g>

  <!-- central marquee -->
  <g transform="translate(800,420)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="8s" repeatCount="indefinite" additive="sum"/>

      <!-- outer arch -->
      <path d="M-280 280v-200a280 280 0 0 1 560 0v200z" fill="#2a080e" stroke="url(#gold)" stroke-width="6" filter="url(#glow)"/>

      <!-- inner arch -->
      <path d="M-240 280v-160a240 240 0 0 1 480 0v160z" fill="#3d0c15" stroke="#8a6a1b" stroke-width="2"/>

      <!-- neon border -->
      <path d="M-260 280v-180a260 260 0 0 1 520 0v180" fill="none" stroke="#ffd700" stroke-width="3" filter="url(#neon)">
        <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="stroke-width" values="3;5;3" dur="3s" repeatCount="indefinite"/>
      </path>

      <!-- marquee band -->
      <rect x="-220" y="180" width="440" height="80" rx="4" fill="#1a0508" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>

      <!-- neon bulbs -->
      <g fill="#ffd700" filter="url(#neon)">
        <circle cx="-260" cy="0" r="5">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-180" cy="-180" r="5">
          <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="-260" r="5">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="180" cy="-180" r="5">
          <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="260" cy="0" r="5">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- neon lines -->
      <line x1="-180" y1="220" x2="180" y2="220" stroke="#ffd700" stroke-width="2" filter="url(#neon)">
        <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
      </line>
      <line x1="-140" y1="235" x2="140" y2="235" stroke="#ffd700" stroke-width="2" filter="url(#neon)">
        <animate attributeName="stroke-opacity" values="1;0.6;1" dur="4s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- floor -->
  <path d="M0 800l1600 100v-100z" fill="#080203"/>
  <g stroke="url(#gold)" stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="0" y1="820" x2="1600" y2="820"/>
    <line x1="0" y1="860" x2="1600" y2="860"/>
  </g>
</svg>