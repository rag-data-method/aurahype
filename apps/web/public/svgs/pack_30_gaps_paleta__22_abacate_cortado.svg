      <animate attributeName="opacity" values="0.4;0.5;0.35;0.4" dur="11s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-25 800 450;-23 800 450;-27 800 450;-25 800 450" dur="20s" repeatCount="indefinite"/>
    </rect>
