      <stop offset="50%" stop-color="#E8DCC0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A574" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8DCC0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8FA98F" stop-opacity="0"/>
      <animate attributeName="x1" values="0%;-5%;2%;0%" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A574" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C9A574" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur40" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur80" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="blur120" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="blur160" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="160"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="15" dy="25" stdDeviation="20" flood-color="#2D5A3F" flood-opacity="0.45"/>
    </filter>
    <filter id="grainy" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" result="grayNoise"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feComposite in="grayNoise" in2="SourceGraphic" operator="atop"/>
    </filter>
    <clipPath id="canvasClip">
      <rect width="1600" height="900"/>
    </clipPath>
    <path id="skinRim" d="M930,480 C880,580 880,720 950,780 C1020,840 1150,820 1240,740 C1320,660 1360,540 1330,420 C1300,280 1200,200 1100,190 C1020,180 950,230 930,310 C920,360 920,420 930,480 Z"/>
    <path id="seed" d="M1060,380 C1010,380 970,430 970,490 C970,550 1010,600 1060,600 C1110,600 1150,550 1150,490 C1150,430 1110,380 1060,380 Z"/>
    <path id="hazeOrb1" d="M0,0 L1600,0 L1600,900 L0,900 Z"/>
