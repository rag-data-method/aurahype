    <circle cx="200" cy="700" r="400" fill="#C9A574" filter="url(#blur120)" opacity="0.2">
      <animate attributeName="cy" values="700;680;720;700" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="150" r="100" fill="#E8DCC0" filter="url(#blur40)" opacity="0.3">
      <animate attributeName="r" values="100;120;90;100" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="200" r="200" fill="#2D5A3F" filter="url(#blur80)" opacity="0.2">
      <animate attributeName="cx" values="1400;1380;1420;1400" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="800" r="250" fill="#6B8E5C" filter="url(#blur120)" opacity="0.25">
      <animate attributeName="cy" values="800;780;820;800" dur="18s" repeatCount="indefinite"/>
    </circle>
