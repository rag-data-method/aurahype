<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="1600" height="900">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#E8DCC0"/>
      <stop offset="40%" stop-color="#C9A574"/>
      <stop offset="100%" stop-color="#2D5A3F"/>
      <animate attributeName="cx" values="30%;32%;28%;30%" dur="21s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.4;0.7;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="cy" values="40%;38%;42%;40%" dur="17s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;0.8;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </radialGradient>
    <radialGradient id="hazeGrad" cx="70%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#8FA98F" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#6B8E5C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2D5A3F" stop-opacity="0"/>
      <animate attributeName="cx" values="70%;68%;72%;70%" dur="14s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.3;0.7;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </radialGradient>
    <linearGradient id="fleshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A574"/>
      <stop offset="35%" stop-color="#8FA98F"/>
      <stop offset="70%" stop-color="#6B8E5C"/>
      <stop offset="100%" stop-color="#2D5A3F"/>
      <animate attributeName="x1" values="0%;-2%;1%;0%" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="100%;102%;98%;100%" dur="16s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="seedGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#E8DCC0"/>
      <stop offset="40%" stop-color="#C9A574"/>
      <stop offset="80%" stop-color="#8FA98F"/>
      <stop offset="100%" stop-color="#6B8E5C"/>
      <animate attributeName="cx" values="40%;42%;38%;40%" dur="18s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;0.8;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="cy" values="35%;33%;37%;35%" dur="15s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.4;0.7;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </radialGradient>
    <radialGradient id="highlightGrad" cx="30%" cy="25%" r="50%">
