    <animateTransform attributeName="transform" type="translate" values="0,0; 20,0; 0,0" keyTimes="0;0.5;1" dur="11s" begin="4.5s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="190" y="500" width="720" height="6" fill="#1F4E5C" opacity="0">
