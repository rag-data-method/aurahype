<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="5" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#F5EDDC"/>
  
  <rect width="1600" height="900" fill="#1A1614" opacity="0.05" filter="url(#grain)" style="pointer-events:none;mix-blend-mode:multiply"/>
  
  <rect x="120" y="100" width="720" height="6" fill="#722F37" opacity="0">
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.15;0.85;1" dur="10s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 25,0; 0,0" keyTimes="0;0.5;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="180" y="140" width="580" height="5" fill="#B8893A" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="11s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="140" y="180" width="840" height="7" fill="#1F4E5C" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="9s" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -20,0; 0,0" keyTimes="0;0.6;1" dur="14s" begin="1s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="200" y="220" width="620" height="6" fill="#1A1614" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.2;0.8;1" dur="10.5s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="100" y="260" width="900" height="6" fill="#722F37" filter="url(#halo)" opacity="0">
    <animate attributeName="opacity" values="0;0.92;0.92;0" keyTimes="0;0.18;0.82;1" dur="12s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 15,0; 0,0" keyTimes="0;0.5;1" dur="10s" begin="2s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="250" y="300" width="480" height="5" fill="#B8893A" opacity="0">
