  <rect x="160" y="340" width="760" height="6" fill="#1F4E5C" opacity="0">
    <animate attributeName="opacity" values="0;0.82;0.82;0" keyTimes="0;0.1;0.9;1" dur="11.5s" begin="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 30,0; 0,0" keyTimes="0;0.4;1" dur="13s" begin="3s" repeatCount="indefinite"/>
