  </rect>
  
  <rect x="110" y="660" width="740" height="6" fill="#1F4E5C" filter="url(#softGlow)" opacity="0">
    <animate attributeName="opacity" values="0;0.88;0.88;0" keyTimes="0;0.15;0.85;1" dur="11s" begin="7s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 22,0; 0,0" keyTimes="0;0.5;1" dur="12s" begin="7s" repeatCount="indefinite"/>
