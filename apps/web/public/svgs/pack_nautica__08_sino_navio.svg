<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
<defs>
  <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="28"/>
  </filter>
  <filter id="rimBlur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4"/>
  </filter>
  <radialGradient id="bgGlow" cx="50%" cy="40%" r="75%">
    <stop offset="0%" stop-color="#0b2238" stop-opacity="1"/>
    <stop offset="100%" stop-color="#061421" stop-opacity="1"/>
  </radialGradient>
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="50%" stop-color="#061421" stop-opacity="0"/>
    <stop offset="100%" stop-color="#061421" stop-opacity="0.7"/>
  </radialGradient>
  <linearGradient id="rayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#EAE0C8" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#EAE0C8" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#8B4513" stop-opacity="0.85"/>
    <stop offset="55%" stop-color="#8B4513" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#8B4513" stop-opacity="0.95"/>
  </linearGradient>
  <radialGradient id="brass" cx="35%" cy="30%" r="85%">
    <stop offset="0%" stop-color="#EAE0C8" stop-opacity="0.9">
      <animate attributeName="offset" values="0%;28%;0%" dur="4s" repeatCount="indefinite"/>
    </stop>
    <stop offset="45%" stop-color="#C5A059" stop-opacity="1"/>
    <stop offset="100%" stop-color="#8B4513" stop-opacity="0.9"/>
  </radialGradient>
  <linearGradient id="brassLinear" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8B4513" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#C5A059" stop-opacity="1"/>
    <stop offset="100%" stop-color="#EAE0C8" stop-opacity="0.85"/>
  </linearGradient>
  <pattern id="rope" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
    <rect width="12" height="12" fill="#8B4513" fill-opacity="0.9"/>
    <path d="M0,0 L6,6 M6,0 L12,6 M-6,6 L0,12" stroke="#EAE0C8" stroke-opacity="0.85" stroke-width="2"/>
    <animateTransform attributeName="patternTransform" type="rotate" from="0 6 6" to="360 6 6" dur="3s" repeatCount="indefinite"/>
  </pattern>
</defs>

<rect width="1600" height="900" fill="#061421"/>
<rect width="1600" height="900" fill="url(#bgGlow)"/>

<g opacity="0.6">
  <path d="M800,0 L1100,900 L500,900 Z" fill="url(#rayGrad)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="-6 800 0; 8 800 0; -6 800 0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.75;0.5" dur="5s" repeatCount="indefinite"/>
  </path>
</g>

<circle cx="200" cy="150" r="2" fill="#EAE0C8" fill-opacity="0.7">
  <animateMotion path="M0,0 C60,-40 120,40 180,0 S300,-80 360,0" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.7;0;0.7" dur="8s" repeatCount="indefinite"/>
</circle>
<circle cx="1300" cy="200" r="1.5" fill="#EAE0C8" fill-opacity="0.8">
  <animateMotion path="M0,0 C-80,60 -40,140 40,120 S160,60 200,0" dur="6.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0;0.8" dur="6.5s" repeatCount="indefinite"/>
</circle>
<circle cx="900" cy="100" r="1" fill="#EAE0C8" fill-opacity="0.75">
  <animateMotion path="M0,0 C40,80 -40,120 0,200" dur="9s" repeatCount="indefinite"/>
</circle>

<rect width="1600" height="900" fill="url(#vignette)">
  <animate attributeName="opacity" values="0.6;0.8;0.6" dur="8s" repeatCount="indefinite"/>
</rect>

<ellipse cx="850" cy="730" rx="340" ry="35" fill="#000" fill-opacity="0.35" filter="url(#softShadow)">
  <animate attributeName="rx" values="340;320;340" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.35;0.25;0.35" dur="5s" repeatCount="indefinite"/>
</ellipse>

<g id="plaqueGroup">
  <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <path d="M500,240 L1100,240 L1080,260 L520,260 Z" fill="#8B4513" fill-opacity="0.8"/>
  <path d="M1100,240 L1100,660 Q1100,680 1080,680 L1080,260 Z" fill="#8B4513" fill-opacity="0.95"/>
  <path d="M520,260 L1080,260 L1080,660 Q1080,680 1060,680 L540,680 Q520,680 520,660 Z" fill="url(#wood)"/>
  <g stroke="#8B4513" stroke-opacity="0.4" stroke-width="2" fill="none">
    <path d="M560,300 Q700,320 840,290 T1060,310"/>
    <path d="M550,380 Q720,420 900,370 T1050,390"/>
    <path d="M560,460 Q740,500 920,450 T1040,470"/>
    <path d="M570,540 Q750,580 930,530 T1030,550"/>
  </g>
  <path d="M520,260 L1080,260 L1060,680 L540,680 Z" fill="#EAE0C8" fill-opacity="0">
    <animate attributeName="fill-opacity" values="0;0.08;0" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <rect x="770" y="585" width="160" height="40" rx="4" fill="url(#brassLinear)" stroke="#EAE0C8" stroke-opacity="0.7" stroke-width="2"/>
  <text x="850" y="612" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#061421" fill-opacity="0.9">SINO DE NAVIO</text>
</g>

<g transform="translate(850,380)">
  <ellipse cx="0" cy="220" rx="150" ry="25" fill="#000" fill-opacity="0.3" filter="url(#softShadow)">
    <animate attributeName="rx" values="150;140;150" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <g id="bracket">
    <path d="M-80,-120 L80,-120 L80,-100 L-80,-100 Z" fill="url(#brass)"/>
    <path d="M-80,-120 L-60,-120 L-60,0 L-80,0 Z" fill="url(#brass)"/>
    <path d="M60,-120 L80,-120 L80,0 L60,0 Z" fill="url(#brass)"/>
    <circle cx="-70" cy="-110" r="6" fill="#EAE0C8" fill-opacity="0.85"/>
    <circle cx="70" cy="-110" r="6" fill="#EAE0C8" fill-opacity="0.85"/>
  </g>

  <g id="bellBody">
    <animateTransform attributeName="transform" type="rotate" values="-1 0 0; 1.2 0 0; -1 0 0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <path d="M-70,0 C-70,-55 70,-55 70,0 C90,65 120,145 130,205 L142,225 Q0,258 -142,225 L-130,205 C-120,145 -90,65 -70,0 Z" fill="url(#brass)"/>
    <ellipse cx="0" cy="225" rx="142" ry="18" fill="#C5A059" fill-opacity="0.9"/>
    <ellipse cx="0" cy="225" rx="130" ry="12" fill="#8B4513" fill-opacity="0.6"/>
    <path d="M-90,205 Q0,245 90,205" fill="none" stroke="#EAE0C8" stroke-width="4" stroke-opacity="0.6" filter="url(#rimBlur)">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <g id="clapper">
    <animateTransform attributeName="transform" type="rotate" values="-6 0 0; 5 0 0; -6 0 0" dur="4.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <line x1="0" y1="0" x2="0" y2="160" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
    <g transform="translate(0,160)">
      <circle r="22" fill="url(#brass)"/>
      <circle r="22" fill="none" stroke="#EAE0C8" stroke-width="2" stroke-opacity="0.7"/>
      <circle r="8" fill="#EAE0C8" fill-opacity="0.5"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

  <g transform="translate(70,-20)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="5 0 0; -4 0 0; 5 0 0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <path d="M0,0 C15,90 55,210 75,340" fill="none" stroke="url(#rope)" stroke-width="16" stroke-linecap="round"/>
      <g transform="translate(75,340)">
        <circle r="14" fill="url(#rope)"/>
        <circle r="14" fill="none" stroke="#EAE0C8" stroke-width="2" stroke-opacity="0.8"/>
        <g stroke="#EAE0C8" stroke-width="2" stroke-opacity="0.85" stroke-linecap="round">
          <line x1="0" y1="14" x2="-8" y2="34"/>
          <line x1="0" y1="14" x2="0" y2="36"/>
          <line x1="0" y1="14" x2="8" y2="34"/>
        </g>
        <g>
          <animateTransform attributeName="transform" type="rotate" values="-12 0 0; 10 0 0; -12 0 0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        </g>
      </g>
    </g>
  </g>
</g>
</svg>