<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <filter id="atmoBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="45"/>
    </filter>
    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <linearGradient id="poleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E2F0CB" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#E2F0CB" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C7CEEA" stop-opacity="0.75"/>
      <animate attributeName="x1" values="0;0.8;0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;0.2;1" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C7CEEA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="bodyGrad" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#FFB7B2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFB7B2" stop-opacity="0.85"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF"/>

  <g opacity="0.55" filter="url(#atmoBlur)">
    <ellipse cx="400" cy="250" rx="280" ry="180" fill="#FFB7B2"/>
    <ellipse cx="1250" cy="200" rx="240" ry="160" fill="#C7CEEA"/>
    <ellipse cx="900" cy="750" rx="320" ry="200" fill="#E2F0CB"/>
  </g>

  <g opacity="0.35" filter="url(#glowBlur)">
    <circle cx="200" cy="150" r="8" fill="#C7CEEA">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="300" r="10" fill="#FFB7B2">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="1100" cy="120" r="7" fill="#E2F0CB">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </g>

  <ellipse cx="800" cy="720" rx="220" ry="35" fill="#C7CEEA" fill-opacity="0.25" filter="url(#shadowBlur)">
    <animate attributeName="rx" values="220;200;220" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.15;0.25" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-18; 0,0" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-2 800 450; 2 800 450; -2 800 450" dur="6s" repeatCount="indefinite" additive="sum"/>

    <g id="pole">
      <rect x="852" y="180" width="28" height="560" rx="14" fill="url(#poleGrad)"/>
      <ellipse cx="866" cy="180" rx="28" ry="14" fill="#E2F0CB" fill-opacity="0.9"/>
      <circle cx="866" cy="170" r="18" fill="#E2F0CB" fill-opacity="0.85"/>
      <path d="M838,740 Q866,760 894,740 Q866,720 838,740" fill="#C7CEEA" fill-opacity="0.8"/>
      <ellipse cx="866" cy="740" rx="34" ry="16" fill="#E2F0CB" fill-opacity="0.8"/>
      <g transform="translate(866,170)">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0; 360 0 0" dur="10s" repeatCount="indefinite"/>
        <path d="M-4,-22 L0,-32 L4,-22 Z" fill="#C7CEEA" fill-opacity="0.8"/>
        <path d="M-4,22 L0,32 L4,22 Z" fill="#C7CEEA" fill-opacity="0.8" transform="rotate(90)"/>
      </g>
    </g>

    <g id="horse">
      <g transform="translate(935,405)">
        <animateTransform attributeName="transform" type="rotate" values="-7 0 0; 7 0 0; -7 0 0" dur="3s" repeatCount="indefinite"/>
        <path d="M0,0 Q35,-25 60,5 Q75,45 50,80 Q15,95 -15,60 Q-30,25 0,0" fill="#E2F0CB" fill-opacity="0.9"/>
        <path d="M10,15 Q45,0 65,30 Q70,55 50,75" fill="none" stroke="#C7CEEA" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6"/>
      </g>

      <ellipse cx="805" cy="435" rx="120" ry="80" fill="url(#bodyGrad)"/>
      <path d="M735,400 Q710,340 725,305 L785,365 Q805,415 765,435 Z" fill="url(#bodyGrad)"/>
      <ellipse cx="705" cy="335" rx="60" ry="50" fill="url(#bodyGrad)" transform="rotate(-10 705 335)"/>
      <ellipse cx="650" cy="350" rx="38" ry="30" fill="url(#bodyGrad)"/>

      <path d="M685,292 L672,252 L702,278 Z" fill="#E2F0CB" fill-opacity="0.9"/>
      <path d="M715,285 L720,248 L740,278 Z" fill="#E2F0CB" fill-opacity="0.9"/>

      <ellipse cx="688" cy="328" rx="5" ry="5" fill="#C7CEEA" fill-opacity="0.9">
        <animate attributeName="ry" values="5;0.5;5" dur="5s" repeatCount="indefinite"/>
      </ellipse>

      <path d="M720,305 Q755,285 790,315 Q820,340 805,380 Q760,370 730,340 Q695,320 720,305" fill="#E2F0CB" fill-opacity="0.85">
        <animate attributeName="d" values="M720,305 Q755,285 790,315 Q820,340 805,380 Q760,370 730,340 Q695,320 720,305;M725,300 Q760,290 795,320 Q825,350 810,385 Q765,375 735,345 Q700,325 725,300;M720,305 Q755,285 790,315 Q820,340 805,380 Q760,370 730,340 Q695,320 720,305" dur="3.5s" repeatCount="indefinite"/>
      </path>

      <path d="M765,395 Q825,375 865,415 Q845,455 785,445 Z" fill="#C7CEEA" fill-opacity="0.85"/>
      <path d="M780,405 Q820,395 845,420" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

      <path d="M760,495 Q748,565 760,625" stroke="#FFB7B2" stroke-width="24" stroke-linecap="round" fill="none" stroke-opacity="0.9"/>
      <path d="M792,498 Q802,565 792,625" stroke="#FFB7B2" stroke-width="22" stroke-linecap="round" fill="none" stroke-opacity="0.9"/>
      <path d="M845,492 Q855,555 845,615" stroke="#FFB7B2" stroke-width="24" stroke-linecap="round" fill="none" stroke-opacity="0.9"/>
      <path d="M875,488 Q885,555 875,615" stroke="#FFB7B2" stroke-width="22" stroke-linecap="round" fill="none" stroke-opacity="0.9"/>

      <ellipse cx="760" cy="630" rx="15" ry="11" fill="#C7CEEA" fill-opacity="0.9"/>
      <ellipse cx="792" cy="630" rx="14" ry="11" fill="#C7CEEA" fill-opacity="0.9"/>
      <ellipse cx="845" cy="620" rx="15" ry="11" fill="#C7CEEA" fill-opacity="0.9"/>
      <ellipse cx="875" cy="620" rx="14" ry="11" fill="#C7CEEA" fill-opacity="0.9"/>

      <path d="M750,430 Q770,450 790,430" fill="none" stroke="#C7CEEA" stroke-width="5" stroke-linecap="round" stroke-opacity="0.6"/>
    </g>

    <path id="ribbon" fill="url(#ribbonGrad)" fill-opacity="0.9">
      <animate attributeName="d" values="M860,185 C810,210 770,250 730,275 C690,300 720,360 780,365 C840,370 880,430 820,470 C760,510 680,530 600,560 C580,568 590,590 610,585 C700,560 790,540 855,490 C920,440 890,360 820,345 C760,332 740,290 775,265 C810,240 850,215 880,195 C890,188 875,175 860,185 Z;M860,185 C815,205 775,245 735,270 C695,295 725,355 785,360 C845,365 885,425 825,465 C765,505 685,525 605,555 C585,563 595,585 615,580 C705,555 795,535 860,485 C925,435 895,355 825,340 C765,327 745,285 780,260 C815,235 855,210 885,190 C895,183 880,170 860,185 Z;M860,185 C810,210 770,250 730,275 C690,300 720,360 780,365 C840,370 880,430 820,470 C760,510 680,530 600,560 C580,568 590,590 610,585 C700,560 790,540 855,490 C920,440 890,360 820,345 C760,332 740,290 775,265 C810,240 850,215 880,195 C890,188 875,175 860,185 Z" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -8,6; 0,0" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>

  <g opacity="0.6" filter="url(#atmoBlur)">
    <ellipse cx="250" cy="780" rx="180" ry="70" fill="#E2F0CB">
      <animateTransform attributeName="transform" type="translate" values="0,0; 40,-10; 0,0" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1300" cy="760" rx="200" ry="80" fill="#FFB7B2">
      <animateTransform attributeName="transform" type="translate" values="0,0; -30,10; 0,0" dur="12s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="800" cy="820" rx="260" ry="90" fill="#C7CEEA">
      <animateTransform attributeName="transform" type="translate" values="0,0; 20,5; 0,0" dur="9s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g opacity="0.7">
    <g transform="translate(480,650)">
      <animateTransform attributeName="transform" type="rotate" values="-5 0 0; 5 0 0; -5 0 0" dur="8s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="35" fill="#FFB7B2" fill-opacity="0.85"/>
      <circle cx="45" cy="-10" r="40" fill="#E2F0CB" fill-opacity="0.85"/>
      <circle cx="85" cy="5" r="32" fill="#C7CEEA" fill-opacity="0.85"/>
    </g>
    <g transform="translate(1080,680)">
      <animateTransform attributeName="transform" type="rotate" values="5 0 0; -5 0 0; 5 0 0" dur="8s" repeatCount="indefinite" begin="2s"/>
      <circle cx="0" cy="0" r="30" fill="#C7CEEA" fill-opacity="0.85"/>
      <circle cx="40" cy="-8" r="36" fill="#FFB7B2" fill-opacity="0.85"/>
      <circle cx="78" cy="6" r="28" fill="#E2F0CB" fill-opacity="0.85"/>
    </g>
  </g>
</svg>