      <circle cx="-50" cy="50" r="65" fill="#FFB7B2" opacity="0.85">
        <animate attributeName="r" values="65;70;65" dur="4.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="55" cy="55" r="60" fill="#FFB7B2" opacity="0.85">
        <animate attributeName="r" values="60;65;60" dur="4.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-30" cy="-60" r="55" fill="#FFB7B2" opacity="0.9">
        <animate attributeName="r" values="55;60;55" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="35" cy="-70" r="50" fill="#FFB7B2" opacity="0.85">
        <animate attributeName="r" values="50;55;50" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-90" cy="10" r="25" fill="#FFB7B2" opacity="0.8">
        <animate attributeName="cx" values="-90;-100;-90" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="95" cy="-10" r="22" fill="#FFB7B2" opacity="0.8">
        <animate attributeName="cx" values="95;105;95" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="70" cy="80" r="14" fill="#FFB7B2" opacity="0.9">
        <animate attributeName="cy" values="80;140;80" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.2;0.9" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-35" cy="-80" r="28" fill="#FFDAC1" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.95;0.85" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="-40" r="22" fill="#FFDAC1" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.95;0.8" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-20" cy="30" r="20" fill="#FFDAC1" opacity="0.75">
        <animate attributeName="opacity" values="0.75;0.9;0.75" dur="4s" repeatCount="indefinite"/>
      </circle>
