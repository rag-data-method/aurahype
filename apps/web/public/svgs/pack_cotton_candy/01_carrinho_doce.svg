      <circle r="32" fill="#FFB7B2" opacity="0.9" filter="url(#fluff)"/>
      <rect x="-4" y="28" width="8" height="45" rx="4" fill="#FFDAC1" opacity="0.9"/>
      <animateTransform attributeName="transform" type="rotate" values="-12;12;-12" dur="6s" repeatCount="indefinite" additive="sum"/>
    </g>
    <g transform="translate(1120,280)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-50;0,0" dur="8s" repeatCount="indefinite" additive="sum"/>
      <circle r="28" fill="#C7CEEA" opacity="0.9" filter="url(#fluff)"/>
      <rect x="-4" y="24" width="8" height="40" rx="4" fill="#FFDAC1" opacity="0.9"/>
      <animateTransform attributeName="transform" type="rotate" values="10;-10;10" dur="7s" repeatCount="indefinite" additive="sum"/>
    </g>
    <g transform="translate(600,180)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-35;0,0" dur="6s" repeatCount="indefinite" additive="sum"/>
      <circle r="20" fill="#FFDAC1" opacity="0.9" filter="url(#fluff)"/>
      <rect x="-3" y="18" width="6" height="30" rx="3" fill="#FFB7B2" opacity="0.9"/>
      <animateTransform attributeName="transform" type="rotate" values="-8;8;-8" dur="5s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

  <g fill="#FFB7B2" opacity="0.85">
    <path d="M350,380 C350,365 330,365 330,380 C330,365 310,365 310,380 C310,400 330,415 330,415 C330,415 350,400 350,380Z">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-20;0,0" dur="6s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.85;0.5;0.85" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M1250,360 C1250,345 1230,345 1230,360 C1230,345 1210,345 1210,360 C1210,380 1230,395 1230,395 C1230,395 1250,380 1250,360Z">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-25;0,0" dur="7s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>

  <g fill="#FFDAC1" opacity="0.9">
    <path d="M280,250 L284,264 L298,268 L284,272 L280,286 L276,272 L262,268 L276,264 Z">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M1320,230 L1324,244 L1338,248 L1324,252 L1320,266 L1316,252 L1302,248 L1316,244 Z">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M1220,520 L1223,532 L1235,535 L1223,538 L1220,550 L1217,538 L1205,535 L1217,532 Z">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M380,560 L383,572 L395,575 L383,578 L380,590 L377,578 L365,575 L377,572 Z">
      <animate attributeName="opacity" values="0.5;0.95;0.5" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M900,120 L903,132 L915,135 L903,138 L900,150 L897,138 L885,135 L897,132 Z">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <g>
    <circle cx="700" cy="200" r="8" fill="#C7CEEA" opacity="0.85">
      <animate attributeName="cy" values="200;180;200" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.4;0.85" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="250" r="6" fill="#FFDAC1" opacity="0.9">
      <animate attributeName="cy" values="250;230;250" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="180" r="7" fill="#FFB7B2" opacity="0.9">
      <animate attributeName="cy" values="180;160;180" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="240" r="5" fill="#FFDAC1" opacity="0.85">
      <animate attributeName="cy" values="240;220;240" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>