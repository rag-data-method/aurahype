<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2A2A45" />
      <stop offset="60%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#101020" />
    </radialGradient>

    <!-- Cream/Light Gradient -->
    <linearGradient id="creamGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF5E6" />
      <stop offset="100%" stop-color="#E8D5C4" />
    </linearGradient>

    <!-- Highlight Glow Gradient -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFDAC1" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFDAC1" stop-opacity="0" />
    </radialGradient>

    <!-- Filters -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>

    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="feather-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" />
    </filter>

    <filter id="bottle-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Mint Green Solid Color for Shoe -->
    <linearGradient id="shoeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C2F0DE" />
      <stop offset="100%" stop-color="#9BD4C1" />
    </linearGradient>

    <linearGradient id="shoeGradDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A0DCC5" />
      <stop offset="100%" stop-color="#6BA690" />
    </linearGradient>

    <clipPath id="bottle-clip">
      <path d="M 450 400 C 450 400, 430 450, 440 480 L 440 620 C 440 650, 460 670, 480 670 C 500 670, 520 650, 520 620 L 520 500 C 530 470, 520 420, 500 400 C 480 380, 460 390, 450 400 Z" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Subtle Floor Glow -->
  <ellipse cx="850" cy="800" rx="500" ry="80" fill="#1A1A2E" opacity="0.8" filter="url(#soft-shadow)" />

  <!-- Large Soft Background Blobs -->
  <g id="bg-blobs">
    <path d="M 200 200 C 350 100, 500 150, 550 300 C 600 450, 450 600, 300 550 C 150 500, 50 350, 200 200 Z" fill="#B5EAD7" opacity="0.05">
      <animate attributeName="d" dur="12s" repeatCount="indefinite" values="
        M 200 200 C 350 100, 500 150, 550 300 C 600 450, 450 600, 300 550 C 150 500, 50 350, 200 200 Z;
        M 220 220 C 370 120, 520 170, 570 320 C 620 470, 470 620, 320 570 C 170 520, 70 370, 220 220 Z;
        M 180 180 C 330 80, 480 130, 530 280 C 580 430, 430 580, 280 530 C 130 480, 30 330, 180 180 Z;
        M 200 200 C 350 100, 500 150, 550 300 C 600 450, 450 600, 300 550 C 150 500, 50 350, 200 200 Z
      " />
    </path>
    <path d="M 1000 500 C 1150 400, 1300 450, 1350 600 C 1400 750, 1250 900, 1100 850 C 950 800, 850 650, 1000 500 Z" fill="#FFDAC1" opacity="0.05">
      <animate attributeName="d" dur="15s" repeatCount="indefinite" values="
        M 1000 500 C 1150 400, 1300 450, 1350 600 C 1400 750, 1250 900, 1100 850 C 950 800, 850 650, 1000 500 Z;
        M 980 520 C 1130 420, 1280 470, 1330 620 C 1380 770, 1230 920, 1080 870 C 930 820, 830 670, 980 520 Z;
        M 1020 480 C 1170 380, 1320 430, 1370 580 C 1420 730, 1270 880, 1120 830 C 970 780, 870 630, 1020 480 Z;
        M 1000 500 C 1150 400, 1300 450, 1350 600 C 1400 750, 1250 900, 1100 850 C 950 800, 850 650, 1000 500 Z
      " />
    </path>
  </g>

  <!-- Background Neon Elements -->
  <g id="neon-lights">
    <!-- Horizontal Neon Bar -->
    <path d="M 100 150 L 400 150" stroke="#FFDAC1" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#neon-glow)" opacity="0.8" />
    <path d="M 100 150 L 400 150" stroke="#FFF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6" />
    
    <!-- Vertical Neon Bar -->
    <path d="M 1300 200 L 1300 500" stroke="#B5EAD7" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#neon-glow)" opacity="0.7" />
    <path d="M 1300 200 L 1300 500" stroke="#FFF" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5" />

    <!-- Neon Flicker Animation -->
    <animate attributeName="opacity" values="0.8;0.4;0.9;0.3;0.8" dur="4s" repeatCount="indefinite" calcMode="linear" />
  </g>

  <!-- Draped Ribbon (Behind Shoe) -->
  <g id="ribbon-back">
    <path d="M 1050 750 C 950 500, 850 400, 750 450 C 650 500, 700 650, 850 750" stroke="#FFDAC1" stroke-width="0" fill="none" />
    <!-- Visual representation using thick stroke with gradient -->
    <path d="M 1050 750 Q 900 500 800 650 T 600 400" stroke="#FFDAC1" stroke-width="25" fill="none" stroke-linecap="round" filter="url(#neon-glow)" opacity="0.3">
      <animate attributeName="d" dur="6s" repeatCount="indefinite" values="
        M 1050 750 Q 900 500 800 650 T 600 400;
        M 1050 750 Q 920 520 820 670 T 600 400;
        M 1050 750 Q 880 480 780 630 T 600 400;
        M 1050 750 Q 900 500 800 650 T 600 400
      " />
    </path>
  </g>

  <!-- Floor Shadows -->
  <g id="floor-shadows">
    <!-- Shoe Shadow -->
    <ellipse cx="1050" cy="780" rx="120" ry="30" fill="#000" opacity="0.4" filter="url(#soft-shadow)">
      <animate attributeName="rx" values="120;130;120" dur="4s" repeatCount="indefinite" />
      <animate attributeName="ry" values="30;35;30" dur="4s" repeatCount="indefinite" />
    </ellipse>
    <!-- Perfume Shadow -->
    <ellipse cx="480" cy="760" rx="80" ry="20" fill="#000" opacity="0.5" filter="url(#soft-shadow)" />
    <!-- Boas Shadow -->
    <path d="M 750 720 Q 950 750 1150 720" stroke="#000" stroke-width="40" fill="none" opacity="0.2" filter="url(#soft-shadow)" />
  </g>

  <!-- ========================= MAIN OBJECTS ========================= -->

  <!-- Stiletto High Heel Shoe (Pastel Mint Green) -->
  <g id="shoe-group">
    <!-- Heel -->
    <path d="M 1150 580 L 1130 730 C 1130 740, 1140 750, 1150 750 C 1160 750, 1170 740, 1170 730 L 1170 620 Z" fill="url(#shoeGradDark)" />
    <path d="M 1150 580 L 1145 730 L 1170 730 L 1170 620 Z" fill="#6BA690" opacity="0.6" />
    
    <!-- Sole/Arch -->
    <path d="M 870 700 L 1130 730 C 1140 740, 1150 740, 1150 730 L 1160 620 C 1100 650, 1000 550, 900 650 Z" fill="#6BA690" />
    
    <!-- Main Body -->
    <path d="M 900 620 C 880 630, 860 650, 860 680 C 860 720, 880 730, 900 730 L 1100 730 C 1120 730, 1140 720, 1140 700 L 1140 600 C 1100 620, 950 580, 900 620 Z" fill="url(#shoeGrad)" />
    
    <!-- 3D Edge/Highlight -->
    <path d="M 900 620 C 880 630, 860 650, 860 680 C 860 720, 880 730, 900 730" stroke="#FDF5E6" stroke-width="4" fill="none" opacity="0.6" />
    
    <!-- Toe Box -->
    <ellipse cx="890" cy="710" rx="50" ry="25" fill="#C2F0DE" transform="rotate(-10 890 710)" />
    <ellipse cx="890" cy="710" rx="35" ry="15" fill="#FDF5E6" opacity="0.5" transform="rotate(-10 890 710)" />

    <!-- Inner Lining -->
    <path d="M 880 660 L 1050 630 L 1100 600 C 1050 580, 920 600, 880 660 Z" fill="#FDF5E6" opacity="0.9" />
    
    <!-- Back Stiletto Curve -->
    <path d="M 1100 600 C 1120 580, 1140 590, 1140 620 L 1150 580 L 1120 590 Z" fill="url(#shoeGradDark)" />
    
    <!-- Shoe Breathing Animation (Subtle Scale) -->
    <animateTransform attributeName="transform" type="scale" values="1;1.01;1" dur="5s" repeatCount="indefinite" additive="sum" />
    <!-- Shoe Breathing Animation (Subtle Rotate) -->
    <animateTransform attributeName="transform" type="rotate" values="0 1000 700;-1 1000 700;0 1000 700" dur="5s" repeatCount="indefinite" additive="sum" />
    
    <!-- Glossy Reflection -->
    <path d="M 920 640 Q 980 620 1040 630 L 1020 650 Q 960 640 900 660 Z" fill="#FFF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Perfume Bottle (Elegant, interacting with ribbons) -->
  <g id="perfume-group">
    <!-- Bottle Liquid -->
    <path d="M 470 420 C 460 430, 450 460, 450 480 L 450 630 C 450 660, 470 680, 490 680 C 510 680, 530 660, 530 630 L 530 480 C 530 460, 520 430, 510 420 C 500 410, 480 410, 470 420 Z" fill="url(#creamGrad)" opacity="0.95" />
    
    <!-- Bottle Glass Thickness/Outline -->
    <path d="M 470 420 C 460 430, 450 460, 450 480 L 450 630 C 450 660, 470 680, 490 680 C 510 680, 530 660, 530 630 L 530 480 C 530 460, 520 430, 510 420 C 500 410, 480 410, 470 420 Z" stroke="#FFDAC1" stroke-width="4" fill="none" filter="url(#bottle-glow)" />
    
    <!-- Bottle Neck -->
    <rect x="480" y="390" width="20" height="40" fill="#FDF5E6" />
    <rect x="475" y="380" width="30" height="15" rx="3" fill="#FFDAC1" filter="url(#neon-glow)" />
    
    <!-- Refraction / Shine on Bottle -->
    <path d="M 465 440 Q 480 500 465 600" stroke="#FFF" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round" />
    <path d="M 515 440 Q 510 500 515 600" stroke="#FFF" stroke-width="4" fill="none" opacity="0.3" stroke-linecap="round" />
    
    <!-- Floating Bubbles inside bottle -->
    <circle cx="480" cy="500" r="5" fill="#FDF5E6" opacity="0.5">
      <animate attributeName="cy" values="500;450;500" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="495" cy="550" r="8" fill="#FDF5E6" opacity="0.4">
      <animate attributeName="cy" values="550;480;550" dur="10s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0;0.4" dur="10s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ========================= FEATHER BOAS ========================= -->
  <g id="feather-boas" filter="url(#feather-blur)">
    <!-- Main Boa Draped Over Shoe -->
    <path d="M 800 600 C 850 500, 950 450, 1050 500 C 1150 550, 1200 650, 1150 720 C 1100 800, 950 800, 850 750 C 750 700, 700 650, 800 600 Z" fill="#FFDAC1" opacity="0.9">
      <!-- Feather Tremble/Flutter -->
      <animate attributeName="d" dur="3s" repeatCount="indefinite" values="
        M 800 600 C 850 500, 950 450, 1050 500 C 1150 550, 1200 650, 1150 720 C 1100 800, 950 800, 850 750 C 750 700, 700 650, 800 600 Z;
        M 801 602 C 852 502, 952 452, 1052 502 C 1152 552, 1202 652, 1152 722 C 1102 802, 952 802, 852 752 C 752 702, 702 652, 801 602 Z;
        M 799 598 C 848 498, 948 448, 1048 498 C 1148 548, 1198 648, 1148 718 C 1098 798, 948 798, 848 748 C 748 698, 698 648, 799 598 Z;
        M 800 600 C 850 500, 950 450, 1050 500 C 1150 550, 1200 650, 1150 720 C 1100 800, 950 800, 850 750 C 750 700, 700 650, 800 600 Z
      " />
    </path>

    <!-- Secondary Boa Swirl (Underneath, darker) -->
    <path d="M 850 680 C 900 620, 1000 600, 1080 650 C 1160 700, 1180 780, 1100 800 C 1020 820, 920 780, 850 680 Z" fill="#E8C0A8" opacity="0.8">
      <animate attributeName="d" dur="4.5s" repeatCount="indefinite" values="
        M 850 680 C 900 620, 1000 600, 1080 650 C 1160 700, 1180 780, 1100 800 C 1020 820, 920 780, 850 680 Z;
        M 852 682 C 902 622, 1002 602, 1082 652 C 1162 702, 1182 782, 1102 802 C 1022 822, 922 782, 852 682 Z;
        M 848 678 C 898 618, 998 598, 1078 648 C 1158 698, 1178 778, 1098 798 C 1018 818, 918 778, 848 678 Z;
        M 850 680 C 900 620, 1000 600, 1080 650 C 1160 700, 1180 780, 1100 800 C 1020 820, 920 780, 850 680 Z
      " />
    </path>
  </g>

  <!-- Feather Details (Soft strokes to simulate fluffy texture) -->
  <g id="feather-details" opacity="0.7">
    <path d="M 900 550 Q 950 500 1050 550" stroke="#FFDAC1" stroke-width="15" fill="none" stroke-linecap="round" filter="url(#feather-blur)">
      <animate attributeName="d" dur="2s" repeatCount="indefinite" values="
        M 900 550 Q 950 500 1050 550;
        M 905 555 Q 955 505 1055 555;
        M 895 545 Q 945 495 1045 545;
        M 900 550 Q 950 500 1050 550
      " />
    </path>
    <path d="M 950 650 Q 1050 700 1100 750" stroke="#FFDAC1" stroke-width="20" fill="none" stroke-linecap="round" filter="url(#feather-blur)">
      <animate attributeName="d" dur="3.5s" repeatCount="indefinite" values="
        M 950 650 Q 1050 700 1100 750;
        M 955 655 Q 1055 705 1105 755;
        M 945 645 Q 1045 695 1095 745;
        M 950 650 Q 1050 700 1100 750
      " />
    </path>
    <path d="M 850 700 Q 900 750 950 780" stroke="#FDF5E6" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#feather-blur)" opacity="0.5">
      <animate attributeName="d" dur="2.5s" repeatCount="indefinite" values="
        M 850 700 Q 900 750 950 780;
        M 855 705 Q 905 755 955 785;
        M 845 695 Q 895 745 945 775;
        M 850 700 Q 900 750 950 780
      " />
    </path>
  </g>

  <!-- ========================= RIBBONS & DRAPES ========================= -->
  <g id="ribbons">
    <!-- Mint Ribbon (Flowing across scene) -->
    <path d="M 200 600 C 350 500, 500 700, 700 550 C 900 400, 1000 500, 1200 400" fill="none" stroke="#B5EAD7" stroke-width="18" stroke-linecap="round" opacity="0.8" filter="url(#neon-glow)">
      <animate attributeName="d" dur="8s" repeatCount="indefinite" values="
        M 200 600 C 350 500, 500 700, 700 550 C 900 400, 1000 500, 1200 400;
        M 200 605 C 355 505, 505 705, 705 555 C 905 405, 1005 505, 1200 405;
        M 195 595 C 345 495, 495 695, 695 545 C 895 395, 995 495, 1195 395;
        M 200 600 C 350 500, 500 700, 700 550 C 900 400, 1000 500, 1200 400
      " />
    </path>

    <!-- Peach Ribbon (Tied/Flowing) -->
    <path d="M 500 300 C 600 350, 550 600, 750 700 C 950 800, 1100 750, 1300 650" fill="none" stroke="#FFDAC1" stroke-width="22" stroke-linecap="round" opacity="0.8" filter="url(#neon-glow)">
      <animate attributeName="d" dur="10s" repeatCount="indefinite" values="
        M 500 300 C 600 350, 550 600, 750 700 C 950 800, 1100 750, 1300 650;
        M 505 305 C 605 355, 555 605, 755 705 C 955 805, 1105 755, 1305 655;
        M 495 295 C 595 345, 545 595, 745 695 C 945 795, 1095 745, 1295 645;
        M 500 300 C 600 350, 550 600, 750 700 C 950 800, 1100 750, 1300 650
      " />
    </path>
    
    <!-- Ribbon Spills / Tails near Perfume -->
    <path d="M 480 680 Q 450 750 420 720 T 380 780" fill="none" stroke="#FDF5E6" stroke-width="8" stroke-linecap="round" opacity="0.6">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" values="
        M 480 680 Q 450 750 420 720 T 380 780;
        M 482 682 Q 452 752 422 722 T 382 782;
        M 478 678 Q 448 748 418 718 T 378 778;
        M 480 680 Q 450 750 420 720 T 380 780
      " />
    </path>
  </g>

  <!-- ========================= CHAMPAGNE / DRIPPING CREAM ========================= -->
  <g id="dripping-cream">
    <!-- Drip 1 -->
    <path d="M 480 505 L 480 545 A 5 5 0 0 0 490 545 L 490 505 Z" fill="#FDF5E6" opacity="0.9">
      <animate attributeName="d" dur="3s" repeatCount="indefinite" values="
        M 480 505 L 480 545 A 5 5 0 0 0 490 545 L 490 505 Z;
        M 480 505 L 480 580 A 5 5 0 0 0 490 580 L 490 505 Z;
        M 480 505 L 480 545 A 5 5 0 0 0 490 545 L 490 505 Z
      " />
      <animate attributeName="opacity" values="0.9;0;0.9" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- Drip 2 -->
    <path d="M 500 505 L 500 520 A 5 5 0 0 0 510 520 L 510 505 Z" fill="#FDF5E6" opacity="0.9">
      <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
        M 500 505 L 500 520 A 5 5 0 0 0 510 520 L 510 505 Z;
        M 500 505 L 500 560 A 5 5 0 0 0 510 560 L 510 505 Z;
        M 500 505 L 500 520 A 5 5 0 0 0 510 520 L 510 505 Z
      " />
      <animate attributeName="opacity" values="0.9;0;0.9" dur="5s" repeatCount="indefinite" />
    </path>
    <!-- Drip 3 -->
    <path d="M 470 505 L 470 530 A 4 4 0 0 0 478 530 L 478 505 Z" fill="#FDF5E6" opacity="0.9">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" values="
        M 470 505 L 470 530 A 4 4 0 0 0 478 530 L 478 505 Z;
        M 470 505 L 470 570 A 4 4 0 0 0 478 570 L 478 505 Z;
        M 470 505 L 470 530 A 4 4 0 0 0 478 530 L 478 505 Z
      " />
      <animate attributeName="opacity" values="0.9;0;0.9" dur="4s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Bubbles / Sparkles -->
  <g id="sparkles">
    <circle cx="600" cy="300" r="3" fill="#FDF5E6" opacity="0">
      <animate attributeName="cy" values="300;200" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="750" cy="400" r="5" fill="#B5EAD7" opacity="0">
      <animate attributeName="cy" values="400;250" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="1200" cy="350" r="4" fill="#FFDAC1" opacity="0">
      <animate attributeName="cy" values="350;200" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="900" cy="200" r="2" fill="#FDF5E6" opacity="0">
      <animate attributeName="cy" values="200;100" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Floor Reflection (Subtle, inverted) -->
  <g id="reflections" opacity="0.15" filter="url(#soft-shadow)">
    <ellipse cx="1050" cy="820" rx="100" ry="15" fill="#B5EAD7" />
    <ellipse cx="480" cy="800" rx="60" ry="10" fill="#FFDAC1" />
  </g>

</svg>