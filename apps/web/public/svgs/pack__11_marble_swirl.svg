    </path>
    <path fill="#FFB088" opacity="0.85" filter="url(#bm)" d="M-280,40 C-180,-60 -60,-60 60,40 C160,140 60,260 -60,260 C-180,260 -280,160 -280,40Z">
      <animateTransform attributeName="transform" type="translate" values="-50,0;50,0;-50,0" dur="5s" repeatCount="indefinite"/>
    </path>
