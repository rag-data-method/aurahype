      <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-30;30;-30" dur="9s" repeatCount="indefinite" additive="sum"/>
