      <animateTransform attributeName="transform" type="rotate" values="0;25;0" dur="6s" repeatCount="indefinite"/>
    </path>
    <path fill="#FF7F00" opacity="1" d="M60,-180 Q140,-260 220,-180 Q260,-120 180,-80 Q100,-40 60,-100 Q20,-140 60,-180Z">
      <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path fill="#FA8072" opacity="0.9" filter="url(#bm)" d="M-380,120 Q-200,220 0,120 Q200,20 380,120 L380,200 Q200,100 0,200 Q-200,300 -380,200Z">
      <animateTransform attributeName="transform" type="translate" values="0,-40;0,40;0,-40" dur="7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-10;10;-10" dur="6s" repeatCount="indefinite" additive="sum"/>
    </path>
    <path fill="#FFB088" opacity="0.75" filter="url(#bm)" d="M-120,-280 C-20,-380 80,-380 180,-280 C240,-180 180,-80 80,-80 C-20,-80 -80,-180 -120,-280Z">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="11s" repeatCount="indefinite"/>
