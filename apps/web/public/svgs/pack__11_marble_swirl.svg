      <animateTransform attributeName="transform" type="scale" values="0.95;1.05;0.95" dur="5s" repeatCount="indefinite" additive="sum"/>
    </path>
    <path fill="#FA8072" opacity="1" d="M-200,-120 C-100,-220 100,-220 200,-120 C240,0 200,140 80,200 C-40,240 -140,200 -200,100 C-240,0 -220,-80 -200,-120Z">
