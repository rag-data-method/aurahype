<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradients -->
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D2A1F"/>
      <stop offset="40%" stop-color="#8B5A2B" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#C9A574" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5C97A" stop-opacity="0.3"/>
      <animate attributeName="x1" values="0;0.02;0" dur="25s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;-0.02;0" dur="25s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="sun-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5C97A"/>
      <stop offset="60%" stop-color="#D4A055"/>
      <stop offset="100%" stop-color="#C9A574" stop-opacity="0"/>
      <animate attributeName="y2" values="1;0.8;1" dur="18s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="ground-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5A2B"/>
      <stop offset="50%" stop-color="#3D2A1F"/>
      <stop offset="100%" stop-color="#3D2A1F"/>
    </linearGradient>

    <linearGradient id="halo-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5C97A" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#D4A055" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A574" stop-opacity="0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="blur-40" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <filter id="blur-80" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>

    <filter id="blur-120" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>

    <filter id="blur-160" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="160"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#3D2A1F" flood-opacity="0.6"/>
    </filter>

    <filter id="turbulence" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Beetle Silhouette Path -->
    <path id="fusca" d="
      M 990 690 C 960 690, 930 660, 930 600 C 930 540, 960 490, 1010 480
      C 1070 470, 1140 470, 1200 480 C 1250 490, 1280 540, 1280 600
      C 1280 660, 1250 690, 1220 690 L 1200 690
      C 1200 690, 1190 620, 1150 620 C 1110 620, 1100 690, 1100 690 L 1090 690
      C 1090 690, 1080 620, 1040 620 C 1000 620, 990 690, 990 690 Z
      M 1015 550 C 1025 510, 1080 500, 1100 500 L 1100 550 Z
      M 1115 550 L 1115 500 C 1150 500, 1200 510, 1210 550 Z
      M 950 680 C 980 680, 990 620, 1040 620 C 1090 620, 1100 680, 1120 680
      C 1140 680, 1150 620, 1200 620 C 1250 620, 1260 680, 1290 680
      C 1260 730, 1220 730, 1200 730 C 1180 730, 1160 700, 1120 700
      C 1080 700, 1060 730, 1040 730 C 1020 730, 980 730, 950 680 Z
    "/>

    <!-- Car Glow Path -->
    <path id="fusca-glow" d="
      M 940 690 C 910 690, 880 660, 880 600 C 880 540, 910 490, 960 480
      C 1020 470, 1090 470, 1150 480 C 1200 490, 1230 540, 1230 600
      C 1230 660, 1200 690, 1170 690 L 1150 690
      C 1150 690, 1140 620, 1100 620 C 1060 620, 1050 690, 1050 690 L 1040 690
      C 1040 690, 1030 620, 990 620 C 950 620, 940 690, 940 690 Z
    " fill="none" stroke="#F5C97A" stroke-width="6"/>
  </defs>

  <!-- Layer 1: Deep Sky Base -->
  <rect width="1600" height="900" fill="url(#sky-grad)"/>

  <!-- Layer 2: Cinematic Vignette (Atmospheric Haze) -->
  <rect width="1600" height="900" fill="#3D2A1F" opacity="0.4" filter="url(#blur-160)">
    <animate attributeName="opacity" values="0.4;0.5;0.4" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 3: Distant Mountains (Cool Haze) -->
  <path d="M0 600 Q 400 520 800 580 T 1600 550 L 1600 900 L 0 900 Z" fill="#3D2A1F" opacity="0.3" filter="url(#blur-120)">
    <animate attributeName="d" values="M0 600 Q 400 520 800 580 T 1600 550 L 1600 900 L 0 900 Z;M0 605 Q 400 525 800 585 T 1600 555 L 1600 900 L 0 900 Z;M0 600 Q 400 520 800 580 T 1600 550 L 1600 900 L 0 900 Z" dur="22s" repeatCount="indefinite"/>
  </path>

  <!-- Layer 4: Mid-ground Hills -->
  <path d="M0 650 Q 500 580 1000 640 T 1600 620 L 1600 900 L 0 900 Z" fill="#8B5A2B" opacity="0.5" filter="url(#blur-80)">
    <animate attributeName="d" values="M0 650 Q 500 580 1000 640 T 1600 620 L 1600 900 L 0 900 Z;M0 655 Q 500 585 1000 645 T 1600 625 L 1600 900 L 0 900 Z;M0 650 Q 500 580 1000 640 T 1600 620 L 1600 900 L 0 900 Z" dur="18s" repeatCount="indefinite"/>
  </path>

  <!-- Layer 5: Foreground Ground -->
  <rect x="0" y="680" width="1600" height="220" fill="url(#ground-grad)"/>
  <rect x="0" y="670" width="1600" height="30" fill="#8B5A2B" opacity="0.6" filter="url(#blur-40)"/>

  <!-- Layer 6: Sun / Golden Hour Light Source -->
  <circle cx="250" cy="350" r="180" fill="url(#sun-grad)" filter="url(#blur-80)" opacity="0.8">
    <animate attributeName="r" values="180;200;180" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.9;0.8" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Layer 7: Warm Light Rays -->
  <g opacity="0.15" filter="url(#blur-80)">
    <polygon points="250,350 1600,900 1600,600" fill="#F5C97A">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="20s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="250,350 1600,450 1600,300" fill="#D4A055">
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="18s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Layer 8: The Fusca Silhouette (Base) -->
  <g id="fusca-group" filter="url(#shadow)">
    <use href="#fusca" fill="#3D2A1F"/>
  </g>

  <!-- Layer 9: Fusca Rim Light (Warm Glow) -->
  <use href="#fusca-glow" filter="url(#glow)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="8s" repeatCount="indefinite"/>
  </use>

  <!-- Layer 10: Fusca Body Highlight -->
  <use href="#fusca" fill="#8B5A2B" opacity="0.3" filter="url(#blur-40)">
    <animateTransform attributeName="transform" type="translate" values="-10,-5;10,5;-10,-5" dur="16s" repeatCount="indefinite"/>
  </use>

  <!-- Layer 11: Road Surface -->
  <rect x="0" y="680" width="1600" height="220" fill="#3D2A1F" opacity="0.4"/>
  <rect x="0" y="680" width="1600" height="10" fill="#F5C97A" opacity="0.3" filter="url(#blur-40)"/>

  <!-- Layer 12: Road Reflections -->
  <ellipse cx="1105" cy="720" rx="180" ry="20" fill="#D4A055" opacity="0.2" filter="url(#blur-40)">
    <animate attributeName="rx" values="180;200;180" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.3;0.2" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1105" cy="750" rx="120" ry="10" fill="#C9A574" opacity="0.15" filter="url(#blur-40)">
    <animate attributeName="rx" values="120;140;120" dur="14s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Layer 13: Foreground Vegetation / Silhouettes -->
  <g opacity="0.8">
    <path d="M0 900 L0 750 Q 50 700 100 760 T 200 720 L 200 900 Z" fill="#3D2A1F" filter="url(#blur-40)">
      <animate attributeName="d" values="M0 900 L0 750 Q 50 700 100 760 T 200 720 L 200 900 Z;M0 900 L0 755 Q 50 705 100 765 T 200 725 L 200 900 Z;M0 900 L0 750 Q 50 700 100 760 T 200 720 L 200 900 Z" dur="15s" repeatCount="indefinite"/>
    </path>
    <path d="M1600 900 L1600 780 Q 1550 730 1500 790 T 1400 750 L 1400 900 Z" fill="#3D2A1F" filter="url(#blur-40)">
      <animate attributeName="d" values="M1600 900 L1600 780 Q 1550 730 1500 790 T 1400 750 L 1400 900 Z;M1600 900 L1600 785 Q 1550 735 1500 795 T 1400 755 L 1400 900 Z;M1600 900 L1600 780 Q 1550 730 1500 790 T 1400 750 L 1400 900 Z" dur="17s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Layer 14: Atmospheric Dust Particles -->
  <g opacity="0.4" filter="url(#blur-40)">
    <circle cx="300" cy="400" r="4" fill="#F5C97A">
      <animate attributeName="cy" values="400;380;400" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="500" r="6" fill="#C9A574">
      <animate attributeName="cy" values="500;470;500" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="450;460;450" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="350" r="3" fill="#D4A055">
      <animate attributeName="cy" values="350;330;350" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="450" r="5" fill="#F5C97A">
      <animate attributeName="cy" values="450;420;450" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="550" r="4" fill="#C9A574">
      <animate attributeName="cy" values="550;530;550" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="600" r="7" fill="#D4A055">
      <animate attributeName="cy" values="600;570;600" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="200" r="3" fill="#F5C97A">
      <animate attributeName="cy" values="200;180;200" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="300" r="5" fill="#C9A574">
      <animate attributeName="cy" values="300;280;300" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="500" r="4" fill="#D4A055">
      <animate attributeName="cy" values="500;480;500" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="650" r="6" fill="#F5C97A">
      <animate attributeName="cy" values="650;620;650" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer 15: Fusca Idling Animation (Bobbing) -->
  <g>
    <use href="#fusca" fill="#3D2A1F" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,2; 0,0" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </use>
    <use href="#fusca-glow" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,2; 0,0" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </use>
  </g>

  <!-- Layer 16: Top Atmospheric Haze Overlay -->
  <rect width="1600" height="900" fill="url(#halo-grad)" opacity="0.15" filter="url(#blur-120)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="25s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 17: Bottom Warm Fog -->
  <rect x="0" y="700" width="1600" height="200" fill="#D4A055" opacity="0.2" filter="url(#blur-80)">
    <animate attributeName="opacity" values="0.2;0.3;0.2" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 18: Grain / Texture Overlay -->
  <rect width="1600" height="900" fill="#3D2A1F" opacity="0.05" filter="url(#turbulence)">
    <animate attributeName="opacity" values="0.05;0.08;0.05" dur="15s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 19: Final Soft Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#3D2A1F" stop-opacity="0"/>
    <stop offset="100%" stop-color="#3D2A1F" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>

  <!-- Layer 20: Subtle Light Flicker on Ground -->
  <rect x="0" y="680" width="1600" height="5" fill="#F5C97A" opacity="0.1" filter="url(#blur-40)">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 21: Distant Birds (Silhouettes) -->
  <g opacity="0.3" filter="url(#blur-40)">
    <path d="M 600 300 Q 610 290 620 300 Q 610 295 600 300 Z" fill="#3D2A1F">
      <animateTransform attributeName="transform" type="translate" values="0,0; 20,-10; 0,0" dur="20s" repeatCount="indefinite"/>
    </path>
    <path d="M 650 280 Q 660 270 670 280 Q 660 275 650 280 Z" fill="#3D2A1F">
      <animateTransform attributeName="transform" type="translate" values="0,0; 15,-5; 0,0" dur="18s" repeatCount="indefinite"/>
    </path>
    <path d="M 580 320 Q 590 310 600 320 Q 590 315 580 320 Z" fill="#3D2A1F">
      <animateTransform attributeName="transform" type="translate" values="0,0; 25,-15; 0,0" dur="22s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>