<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
<defs>
  <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="b"/>
    <feOffset in="b" dx="0" dy="18" result="o"/>
    <feFlood flood-color="#FFB7B2" flood-opacity="0.25"/>
    <feComposite in2="o" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fl" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
  </filter>
  <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="mg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FFFFFF"/>
    <stop offset="1" stop-color="#C7CEEA"/>
  </linearGradient>
  <radialGradient id="hg" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#FFDAC1" stop-opacity="0.35"/>
    <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
  </radialGradient>
  <g id="cp">
    <circle cx="0" cy="0" r="70" fill="#FFB7B2" opacity="0.9"/>
    <circle cx="60" cy="-20" r="55" fill="#FFB7B2" opacity="0.88"/>
    <circle cx="-55" cy="-15" r="50" fill="#FFB7B2" opacity="0.85"/>
    <circle cx="30" cy="35" r="45" fill="#FFB7B2" opacity="0.82"/>
    <circle cx="-30" cy="30" r="40" fill="#FFB7B2" opacity="0.8"/>
  </g>
  <g id="cl">
    <circle cx="0" cy="0" r="65" fill="#C7CEEA" opacity="0.95"/>
    <circle cx="55" cy="-15" r="50" fill="#C7CEEA" opacity="0.9"/>
    <circle cx="-50" cy="-10" r="45" fill="#C7CEEA" opacity="0.88"/>
    <circle cx="25" cy="30" r="40" fill="#C7CEEA" opacity="0.85"/>
    <circle cx="-25" cy="25" r="35" fill="#C7CEEA" opacity="0.85"/>
  </g>
  <path id="st" d="M0,-14 C3,-3 3,-3 14,0 C3,3 3,3 0,14 C-3,3 -3,3 -14,0 C-3,-3 -3,-3 0,-14 Z" fill="#FFDAC1"/>
</defs>

<rect width="1600" height="900" fill="#FFFFFF"/>

<ellipse cx="800" cy="480" rx="320" ry="280" fill="url(#hg)" opacity="0.8" filter="url(#fl)">
  <animate attributeName="rx" values="320;345;320" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="ry" values="280;305;280" dur="8s" repeatCount="indefinite"/>
</ellipse>

<g opacity="0.55" filter="url(#fl)">
  <ellipse cx="250" cy="250" rx="260" ry="180" fill="#C7CEEA" opacity="0.9">
    <animate attributeName="cx" values="250;300;250" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="250;230;250" dur="16s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1350" cy="220" rx="240" ry="170" fill="#FFB7B2" opacity="0.9">
    <animate attributeName="cx" values="1350;1300;1350" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="220;240;220" dur="17s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="900" cy="780" rx="300" ry="190" fill="#FFDAC1" opacity="0.85">
    <animate attributeName="cx" values="900;950;900" dur="18s" repeatCount="indefinite"/>
  </ellipse>
</g>

<g filter="url(#gl)">
  <g transform="translate(250,180)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.7;1.1;0.7" dur="4s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/></g>
  <g transform="translate(1350,160)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.8;1.2;0.8" dur="5s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.5;0.95;0.5" dur="5s" repeatCount="indefinite"/></g>
  <g transform="translate(450,480)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.75;1.15;0.75" dur="6s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.55;1;0.55" dur="6s" repeatCount="indefinite"/></g>
  <g transform="translate(1300,430)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.85;1.25;0.85" dur="4.5s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.6;0.9;0.6" dur="4.5s" repeatCount="indefinite"/></g>
  <g transform="translate(180,680)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.8;1.1;0.8" dur="7s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.5;0.95;0.5" dur="7s" repeatCount="indefinite"/></g>
  <g transform="translate(1480,680)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.7;1.2;0.7" dur="5.5s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.55;1;0.55" dur="5.5s" repeatCount="indefinite"/></g>
  <g transform="translate(900,130)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.9;1.3;0.9" dur="3.5s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/></g>
  <g transform="translate(1100,300)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.75;1.15;0.75" dur="6.5s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.5;0.95;0.5" dur="6.5s" repeatCount="indefinite"/></g>
  <g transform="translate(600,280)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.85;1.25;0.85" dur="5s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.55;1;0.55" dur="5s" repeatCount="indefinite"/></g>
  <g transform="translate(350,600)"><g><use href="#st"/><animateTransform attributeName="transform" type="scale" values="0.8;1.2;0.8" dur="4s" repeatCount="indefinite" additive="sum"/></g><animate attributeName="opacity" values="0.6;0.95;0.6" dur="4s" repeatCount="indefinite"/></g>
</g>

<ellipse cx="800" cy="660" rx="140" ry="28" fill="#FFB7B2" opacity="0.22" filter="url(#fl)">
  <animate attributeName="rx" values="140;155;140" dur="6s" repeatCount="indefinite"/>
</ellipse>

<g transform="translate(800,480)">
  <g filter="url(#sh)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-18;0,0" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-3;3;-3" dur="10s" repeatCount="indefinite" additive="sum"/>
    <path d="M0,-150 A150,150 0 1,1 0,150 A150,150 0 1,1 0,-150 Z M32,-118 A118,118 0 1,0 32,118 A118,118 0 1,0 32,-118 Z" fill="url(#mg)" fill-rule="evenodd"/>
    <path d="M-125,-30 Q-115,-20 -105,-30" stroke="#FFDAC1" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M-100,-30 Q-90,-20 -80,-30" stroke="#FFDAC1" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M-120,5 Q-110,13 -100,5" stroke="#FFDAC1" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="-130" cy="0" r="10" fill="#FFB7B2" opacity="0.85">
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-90" cy="0" r="10" fill="#FFB7B2" opacity="0.85">
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</g>

<g filter="url(#sh)">
  <g transform="translate(480,670)"><use href="#cl" transform="scale(1.4)"/><animateTransform attributeName="transform" type="translate" values="0,0;22,0;0,0" dur="8s" repeatCount="indefinite" additive="sum"/></g>
  <g transform="translate(1120,680)"><use href="#cl" transform="scale(1.2)"/><animateTransform attributeName="transform" type="translate" values="0,0;-18,0;0,0" dur="9s" repeatCount="indefinite" additive="sum"/></g>
  <g transform="translate(680,710)"><use href="#cp" transform="scale(1.5)"/><animateTransform attributeName="transform" type="translate" values="0,0;-16,0;0,0" dur="7s" repeatCount="indefinite" additive="sum"/></g>
  <g transform="translate(930,720)"><use href="#cp" transform="scale(1.3)"/><animateTransform attributeName="transform" type="translate" values="0,0;18,0;0,0" dur="8.5s" repeatCount="indefinite" additive="sum"/></g>
  <g transform="translate(330,740)"><use href="#cp" transform="scale(1.1)"/><animateTransform attributeName="transform" type="translate" values="0,0;20,0;0,0" dur="9.5s" repeatCount="indefinite" additive="sum"/></g>
  <g transform="translate(1320,730)"><use href="#cp" transform="scale(1.2)"/><animateTransform attributeName="transform" type="translate" values="0,0;-15,0;0,0" dur="10s" repeatCount="indefinite" additive="sum"/></g>
  <g transform="translate(800,760)"><use href="#cl" transform="scale(1)"/><animateTransform attributeName="transform" type="translate" values="0,0;12,0;0,0" dur="11s" repeatCount="indefinite" additive="sum"/></g>
  <g transform="translate(1050,770)"><use href="#cp" transform="scale(1)"/><animateTransform attributeName="transform" type="translate" values="0,0;-14,0;0,0" dur="9s" repeatCount="indefinite" additive="sum"/></g>
</g>

<g filter="url(#gl)">
  <g transform="translate(720,420)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-45;0,0" dur="6s" repeatCount="indefinite" additive="sum"/>
    <g><use href="#st" transform="scale(0.5)"/><animateTransform attributeName="transform" type="scale" values="0.8;1.4;0.8" dur="3s" repeatCount="indefinite" additive="sum"/></g>
    <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(860,440)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-55;0,0" dur="7s" begin="1.5s" repeatCount="indefinite" additive="sum"/>
    <g><use href="#st" transform="scale(0.4)"/><animateTransform attributeName="transform" type="scale" values="0.8;1.5;0.8" dur="3.5s" repeatCount="indefinite" additive="sum"/></g>
    <animate attributeName="opacity" values="0;1;0" dur="7s" begin="1.5s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(790,380)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-40;0,0" dur="5s" begin="0.8s" repeatCount="indefinite" additive="sum"/>
    <g><use href="#st" transform="scale(0.35)"/><animateTransform attributeName="transform" type="scale" values="0.9;1.6;0.9" dur="2.5s" repeatCount="indefinite" additive="sum"/></g>
    <animate attributeName="opacity" values="0;1;0" dur="5s" begin="0.8s" repeatCount="indefinite"/>
  </g>
</g>

<g filter="url(#gl)">
  <g transform="translate(720,460)" opacity="0">
    <path d="M-6,-6 L6,-6 L-6,6 L6,6" stroke="#FFDAC1" stroke-width="3" stroke-linecap="round" fill="none"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;15,-50" dur="5s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="5s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(750,470)" opacity="0">
    <path d="M-5,-5 L5,-5 L-5,5 L5,5" stroke="#FFDAC1" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;12,-40" dur="5s" begin="2s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;0.85;0" dur="5s" begin="2s" repeatCount="indefinite"/>
  </g>
</g>
</svg>