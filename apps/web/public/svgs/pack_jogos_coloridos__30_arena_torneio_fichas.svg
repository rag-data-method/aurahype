<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sunburst" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#FF5DA2">
        <animate attributeName="stop-color" values="#FF5DA2;#FFD23F;#00C2A8;#FF5DA2" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00C2A8">
        <animate attributeName="stop-color" values="#00C2A8;#FF5DA2;#FFD23F;#00C2A8" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFD23F">
        <animate attributeName="stop-color" values="#FFD23F;#00C2A8;#FF5DA2;#FFD23F" dur="6s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>
    
    <linearGradient id="beam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFD0" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%" stop-color="#FFD23F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00C2A8" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="power" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5DA2"/>
      <stop offset="50%" stop-color="#FFD23F"/>
      <stop offset="100%" stop-color="#00C2A8"/>
    </linearGradient>
    
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF5DA2" stop-opacity="0"/>
    </radialGradient>
    
    <filter id="b1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    
    <filter id="b2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    
    <g id="ray">
      <polygon points="800,450 600,-200 1000,-200" fill="url(#sunburst)" opacity="0.15">
        <animate attributeName="opacity" values="0.15;0.3;0.15" dur="2.5s" repeatCount="indefinite"/>
      </polygon>
    </g>
    
    <g id="chip-red">
      <circle cx="0" cy="0" r="70" fill="#FF5DA2" stroke="#282A3A" stroke-width="6"/>
      <circle cx="0" cy="0" r="45" fill="none" stroke="#282A3A" stroke-width="4" stroke-dasharray="8 8"/>
      <polygon points="-15,-10 0,-25 15,-10 10,10 -10,10" fill="#282A3A"/>
      <circle cx="0" cy="0" r="55" fill="none" stroke="#FFD23F" stroke-width="3" opacity="0.7"/>
    </g>
    
    <g id="chip-blue">
      <circle cx="0" cy="0" r="70" fill="#00C2A8" stroke="#282A3A" stroke-width="6"/>
      <circle cx="0" cy="0" r="45" fill="none" stroke="#282A3A" stroke-width="4" stroke-dasharray="8 8"/>
      <circle cx="0" cy="0" r="15" fill="#282A3A"/>
      <rect x="-8" y="-8" width="16" height="16" fill="#FFD23F" transform="rotate(45)"/>
      <circle cx="0" cy="0" r="55" fill="none" stroke="#FF5DA2" stroke-width="3" opacity="0.7"/>
    </g>
    
    <g id="confetti">
      <rect x="0" y="0" width="18" height="8" fill="#FF5DA2" rx="2">
        <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <g id="spark">
      <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="#FFF">
        <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </defs>
  
  <rect width="1600" height="900" fill="#282A3A"/>
  
  <circle cx="800" cy="450" r="700" fill="url(#sunburst)" opacity="0.5">
    <animate attributeName="r" values="700;720;700" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <g>
    <use href="#ray" transform="rotate(0 800 450)"/>
    <use href="#ray" transform="rotate(15 800 450)"/>
    <use href="#ray" transform="rotate(30 800 450)"/>
    <use href="#ray" transform="rotate(45 800 450)"/>
    <use href="#ray" transform="rotate(60 800 450)"/>
    <use href="#ray" transform="rotate(75 800 450)"/>
    <use href="#ray" transform="rotate(90 800 450)"/>
    <use href="#ray" transform="rotate(105 800 450)"/>
    <use href="#ray" transform="rotate(120 800 450)"/>
    <use href="#ray" transform="rotate(135 800 450)"/>
    <use href="#ray" transform="rotate(150 800 450)"/>
    <use href="#ray" transform="rotate(165 800 450)"/>
    <use href="#ray" transform="rotate(180 800 450)"/>
    <use href="#ray" transform="rotate(195 800 450)"/>
    <use href="#ray" transform="rotate(210 800 450)"/>
    <use href="#ray" transform="rotate(225 800 450)"/>
    <use href="#ray" transform="rotate(240 800 450)"/>
    <use href="#ray" transform="rotate(255 800 450)"/>
    <use href="#ray" transform="rotate(270 800 450)"/>
    <use href="#ray" transform="rotate(285 800 450)"/>
    <use href="#ray" transform="rotate(300 800 450)"/>
    <use href="#ray" transform="rotate(315 800 450)"/>
    <use href="#ray" transform="rotate(330 800 450)"/>
    <use href="#ray" transform="rotate(345 800 450)"/>
    <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="60s" repeatCount="indefinite"/>
  </g>
  
  <g opacity="0.4">
    <circle cx="200" cy="150" r="8" fill="#FF5DA2"/>
    <circle cx="400" cy="300" r="12" fill="#00C2A8"/>
    <circle cx="600" cy="100" r="6" fill="#FFD23F"/>
    <circle cx="100" cy="500" r="10" fill="#FF5DA2"/>
    <circle cx="300" cy="700" r="14" fill="#00C2A8"/>
    <circle cx="150" cy="800" r="7" fill="#FFD23F"/>
    <circle cx="500" cy="850" r="9" fill="#FF5DA2"/>
    <rect x="250" y="200" width="20" height="20" fill="#FFD23F" transform="rotate(15 260 210)"/>
    <rect x="350" y="600" width="16" height="16" fill="#00C2A8" transform="rotate(45 358 608)"/>
    <rect x="450" y="400" width="24" height="24" fill="#FF5DA2" transform="rotate(30 462 412)"/>
  </g>
  
  <polygon points="800,900 400,900 600,200 1000,200 1200,900" fill="url(#beam)" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" values="-5 800 900;5 800 900;-5 800 900" dur="4s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="800,900 350,900 550,150 1050,150 1250,900" fill="url(#beam)" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" values="5 800 900;-5 800 900;5 800 900" dur="5s" repeatCount="indefinite"/>
  </polygon>
  
  <ellipse cx="800" cy="900" rx="600" ry="80" fill="#282A3A" opacity="0.7"/>
  
  <g transform="translate(800, 850)">
    <ellipse cx="0" cy="0" rx="300" ry="40" fill="url(#glow)" opacity="0.5">
      <animate attributeName="rx" values="300;320;300" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g>
    <polygon points="300,700 500,650 450,550 350,580" fill="#00C2A8" stroke="#282A3A" stroke-width="4">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30; 0,0" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0 400 600" to="360 400 600" dur="20s" repeatCount="indefinite" additive="sum"/>
    </polygon>
    <polygon points="1100,650 1300,700 1250,580 1150,550" fill="#FF5DA2" stroke="#282A3A" stroke-width="4">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-40; 0,0" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0 1200 600" to="-360 1200 600" dur="18s" repeatCount="indefinite" additive="sum"/>
    </polygon>
    <polygon points="500,300 600,280 580,180 520,200" fill="#FFD23F" stroke="#282A3A" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="0,0; 20,-20; 0,0" dur="5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1000,320 1100,300 1080,200 1020,220" fill="#00C2A8" stroke="#282A3A" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,-20; 0,0" dur="4.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="700,200 750,180 740,130 710,140" fill="#FF5DA2" stroke="#282A3A" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="850,220 900,200 890,150 860,160" fill="#FFD23F" stroke="#282A3A" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="3.2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="200,400 280,380 260,300 220,320" fill="#FFD23F" stroke="#282A3A" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="0,0; 10,10; 0,0" dur="5.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1320,400 1400,420 1380,340 1340,360" fill="#FF5DA2" stroke="#282A3A" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="0,0; -10,10; 0,0" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <g stroke="#282A3A" stroke-width="3">
    <line x1="700" y1="100" x2="900" y2="100" stroke="#FF5DA2" stroke-dasharray="10 5">
      <animate attributeName="x1" values="700;690;700" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="900;910;900" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="680" y1="140" x2="920" y2="140" stroke="#00C2A8" stroke-dasharray="8 4">
      <animate attributeName="x1" values="680;670;680" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="920;930;920" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="660" y1="180" x2="940" y2="180" stroke="#FFD23F" stroke-dasharray="12 6">
      <animate attributeName="x1" values="660;650;660" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="940;950;940" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <polygon points="780,450 820,450 800,380" fill="url(#power)" opacity="0.8" filter="url(#b1)">
    <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="1s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="780,450 820,450 800,520" fill="url(#power)" opacity="0.8" filter="url(#b1)">
    <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </polygon>
  
  <use href="#chip-red" x="0" y="0" transform="translate(550, 520)">
    <animateTransform attributeName="transform" type="translate" values="550,520; 550,500; 550,520" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="-5 550 520" to="5 550 520" dur="2s" repeatCount="indefinite" additive="sum"/>
  </use>
  
  <use href="#chip-blue" x="0" y="0" transform="translate(1050, 520)">
    <animateTransform attributeName="transform" type="translate" values="1050,520; 1050,500; 1050,520" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="5 1050 520" to="-5 1050 520" dur="2s" begin="0.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  
  <g fill="#282A3A">
    <ellipse cx="550" cy="630" rx="60" ry="12" opacity="0.3">
      <animate attributeName="rx" values="60;50;60" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1050" cy="630" rx="60" ry="12" opacity="0.3">
      <animate attributeName="rx" values="60;50;60" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g stroke="#FFD23F" stroke-width="4" stroke-dasharray="6 4" opacity="0.8">
    <line x1="550" y1="450" x2="800" y2="400">
      <animate attributeName="stroke-dashoffset" values="0;20;0" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="1050" y1="450" x2="800" y2="400">
      <animate attributeName="stroke-dashoffset" values="20;0;20" dur="1s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <circle cx="800" cy="400" r="25" fill="#FFF" filter="url(#b1)">
    <animate attributeName="r" values="25;35;25" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <use href="#spark" x="500" y="400" transform="scale(1.5)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-20; 0,0" dur="2s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#spark" x="1100" y="400" transform="scale(1.2)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="1.8s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#spark" x="800" y="300" transform="scale(2)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30; 0,0" dur="2.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#spark" x="700" y="480" transform="scale(1)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -10,0; 0,0" dur="1.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#spark" x="900" y="480" transform="scale(1)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 10,0; 0,0" dur="1.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#spark" x="550" y="380" transform="scale(0.8)"/>
  <use href="#spark" x="1050" y="380" transform="scale(0.8)"/>
  
  <use href="#confetti" x="100" y="100" fill="#FF5DA2">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="200,800" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 109 104" to="360 109 104" dur="3s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="300" y="-50" fill="#00C2A8">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="150,900" dur="5s" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 309 50" to="-360 309 50" dur="4s" begin="1s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="500" y="50" fill="#FFD23F">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-100,850" dur="6s" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 509 54" to="360 509 54" dur="2s" begin="0.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="700" y="-20" fill="#FF5DA2">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="50,900" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 709 16" to="-360 709 16" dur="3.5s" begin="2s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="900" y="80" fill="#00C2A8">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-150,800" dur="5.5s" begin="1.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 909 84" to="360 909 84" dur="2.5s" begin="1.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="1100" y="20" fill="#FFD23F">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="100,850" dur="4s" begin="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 1109 24" to="-360 1109 24" dur="3s" begin="3s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="1300" y="120" fill="#FF5DA2">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-50,800" dur="5s" begin="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 1309 124" to="360 1309 124" dur="4s" begin="2.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="1500" y="60" fill="#00C2A8">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-200,900" dur="6s" begin="0.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 1509 64" to="-360 1509 64" dur="5s" begin="0.8s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="200" y="200" fill="#FFD23F">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="300,700" dur="7s" begin="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 209 204" to="360 209 204" dur="6s" begin="4s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="1400" y="250" fill="#FF5DA2">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-300,650" dur="8s" begin="3.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 1409 254" to="-360 1409 254" dur="7s" begin="3.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  
  <circle cx="150" cy="150" r="5" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="150;160;150" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="400" r="4" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="400;410;400" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="200" r="6" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="200;210;200" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1150" cy="150" r="5" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="150;160;150" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1350" cy="350" r="4" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="350;360;350" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1450" cy="500" r="6" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="500;510;500" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <rect x="0" y="0" width="300" height="900" fill="none" stroke="#FFD23F" stroke-width="2" opacity="0.3">
    <animate attributeName="stroke-dasharray" values="0,20;20,0;0,20" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="1300" y="0" width="300" height="900" fill="none" stroke="#00C2A8" stroke-width="2" opacity="0.3">
    <animate attributeName="stroke-dasharray" values="20,0;0,20;20,0" dur="5s" repeatCount="indefinite"/>
  </rect>
  
  <polygon points="0,0 200,0 0,200" fill="#FF5DA2" opacity="0.2">
    <animateTransform attributeName="transform" type="translate" values="0,0; -20,-20; 0,0" dur="6s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="1600,0 1400,0 1600,200" fill="#00C2A8" opacity="0.2">
    <animateTransform attributeName="transform" type="translate" values="0,0; 20,-20; 0,0" dur="6.5s" repeatCount="indefinite"/>
  </polygon>
</svg>