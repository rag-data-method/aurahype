<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pg" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#D4A017" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8B6F2A" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6F2A" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#D4A017" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B6F2A" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <filter id="ag" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="sg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <clipPath id="cp">
      <circle r="150"/>
    </clipPath>
  </defs>
  <rect width="1600" height="900" fill="#0F0E18"/>
  
  <g fill="#FAFAFA">
    <circle cx="200" cy="150" r="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="200" r="1.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="700" r="2" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="600" r="1" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="100" r="1.5" opacity="0.75">
      <animate attributeName="opacity" values="0.75;0.25;0.75" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="400" r="1" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="300" r="2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1350" cy="800" r="1.5" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.35;0.85" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <ellipse cx="800" cy="515" rx="180" ry="30" fill="#000" opacity="0.3" filter="url(#sh)">
    <animate attributeName="rx" values="180;200;180" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.2;0.3" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  
  <g transform="translate(800,450)">
    <animateTransform attributeName="transform" type="translate" values="0,-15;0,15;0,-15" dur="6s" repeatCount="indefinite" additive="sum"/>
    
    <g transform="rotate(15)">
      <animateTransform attributeName="transform" type="rotate" values="15;20;15" dur="8s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="0" cy="0" rx="300" ry="75" fill="none" stroke="url(#rg)" stroke-width="15" opacity="0.5" filter="url(#sg)"/>
    </g>
    
    <circle r="150" fill="url(#pg)"/>
    
    <g clip-path="url(#cp)">
      <rect x="-300" y="-30" width="600" height="60" fill="#8B6F2A" opacity="0.4">
        <animateTransform attributeName="transform" type="translate" values="-300,0;300,0" dur="20s" repeatCount="indefinite"/>
      </rect>
      <rect x="-300" y="50" width="600" height="40" fill="#8B6F2A" opacity="0.3">
        <animateTransform attributeName="transform" type="translate" values="300,0;-300,0" dur="25s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <circle r="155" fill="none" stroke="#D4A017" stroke-width="5" opacity="0.35" filter="url(#ag)">
      <animate attributeName="stroke-width" values="5;8;5" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.55;0.35" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <g transform="rotate(15)">
      <animateTransform attributeName="transform" type="rotate" values="15;10;15" dur="8s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="0" cy="0" rx="300" ry="75" fill="none" stroke="url(#rg)" stroke-width="25" opacity="0.7"/>
      <ellipse cx="0" cy="0" rx="300" ry="75" fill="none" stroke="#FAFAFA" stroke-width="2" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      
      <g opacity="0.9">
        <circle r="2.5" fill="#FAFAFA">
          <animateMotion path="M -300,0 A 300,75 0 0,1 0,75" dur="7s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle r="2" fill="#FAFAFA">
          <animateMotion path="M 200,-40 A 300,75 0 0,1 -100,70" dur="9s" repeatCount="indefinite"/>
        </circle>
        <circle r="1.5" fill="#FAFAFA">
          <animateMotion path="M -200,-50 A 300,75 0 0,0 150,-60" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle r="2" fill="#FAFAFA">
          <animateMotion path="M 0,-75 A 300,75 0 0,0 -300,0" dur="8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    
    <ellipse cx="-60" cy="-60" rx="50" ry="40" fill="#FAFAFA" opacity="0.25" filter="url(#sg)">
      <animate attributeName="opacity" values="0.25;0.4;0.25" dur="6s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>