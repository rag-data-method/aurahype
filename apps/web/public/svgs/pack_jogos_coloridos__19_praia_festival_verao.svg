<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
<defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FF3864">
            <animate attributeName="stop-color" values="#FF3864;#FFD23F;#FF3864" dur="5s" repeatCount="indefinite"/>
        </stop>
        <stop offset="50%" stop-color="#FF8C42">
            <animate attributeName="stop-color" values="#FF8C42;#FF3864;#FF8C42" dur="5s" repeatCount="indefinite"/>
        </stop>
        <stop offset="100%" stop-color="#06AED5">
            <animate attributeName="stop-color" values="#06AED5;#FF8C42;#06AED5" dur="5s" repeatCount="indefinite"/>
        </stop>
    </linearGradient>

    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#06AED5"/>
        <stop offset="50%" stop-color="#0FD1F2"/>
        <stop offset="100%" stop-color="#0A95B5"/>
    </linearGradient>

    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFD23F"/>
        <stop offset="30%" stop-color="#FF8C42"/>
        <stop offset="100%" stop-color="#FFE080"/>
    </linearGradient>

    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFFFFF"/>
        <stop offset="40%" stop-color="#FFD23F"/>
        <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="blur1"/>
        <feGaussianBlur stdDeviation="4" result="blur2"/>
        <feMerge>
            <feMergeNode in="blur1"/>
            <feMergeNode in="blur2"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>

    <filter id="blurSmall" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3"/>
    </filter>

    <pattern id="halftone" width="30" height="30" patternUnits="userSpaceOnUse">
        <circle r="4" fill="#FF3864" opacity="0.4"/>
        <circle cx="15" cy="15" r="2" fill="#FF8C42" opacity="0.3"/>
    </pattern>

    <path id="confetti" d="M-5,-3 Q0,-5 5,-3 Q8,0 5,3 Q0,5 -5,3 Q-8,0 -5,-3Z" />

    <radialGradient id="rayGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#FFD23F" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#FFD23F" stop-opacity="0"/>
    </radialGradient>
</defs>

<!-- Background Base -->
<rect width="1600" height="900" fill="url(#skyGrad)"/>

<!-- Sunburst Center -->
<g transform="translate(1200, 250)">
    <circle r="180" fill="url(#sunGrad)" filter="url(#glow)">
        <animate attributeName="r" values="180;200;180" dur="3s" repeatCount="indefinite"/>
    </circle>
    <g id="sunburstRays">
        <g>
            <circle r="300" fill="url(#rayGrad)"/>
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
        </g>
        <g transform="scale(1.5)">
            <circle r="300" fill="url(#rayGrad)"/>
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite"/>
        </g>
    </g>
    
    <!-- Geometric Sunburst Rays -->
    <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
        <polygon points="0,0 -15,-350 15,-350" fill="#FFD23F" opacity="0.6"/>
        <polygon points="0,0 15,-350 35,-350" fill="#FF8C42" opacity="0.5" transform="rotate(30)"/>
        <polygon points="0,0 -35,-350 -15,-350" fill="#FF3864" opacity="0.5" transform="rotate(-30)"/>
        <polygon points="0,0 -35,-350 -15,-350" fill="#FFD23F" opacity="0.6" transform="rotate(60)"/>
        <polygon points="0,0 15,-350 35,-350" fill="#06AED5" opacity="0.5" transform="rotate(-60)"/>
        <polygon points="0,0 -15,-350 15,-350" fill="#FF8C42" opacity="0.4" transform="rotate(90)"/>
    </g>
</g>

<!-- Clouds -->
<g opacity="0.7">
    <path d="M100,200 Q150,150 200,200 T300,200 T400,200 T500,200 Q550,150 600,200" fill="none" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" filter="url(#blurSmall)">
        <animateTransform attributeName="transform" type="translate" values="0,0; -200,0; 0,0" dur="30s" repeatCount="indefinite"/>
    </path>
    <path d="M800,150 Q850,100 900,150 T1000,150 T1100,150" fill="none" stroke="#FFFFFF" stroke-width="50" stroke-linecap="round" filter="url(#blurSmall)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 200,0; 0,0" dur="25s" repeatCount="indefinite"/>
    </path>
</g>

<!-- Tropical Birds -->
<g transform="translate(1000, 120) scale(0.6)">
    <path d="M0,0 Q20,-20 40,0 Q20,-15 0,0 M40,0 Q60,-20 80,0 Q60,-15 40,0" fill="none" stroke="#FF3864" stroke-width="3" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="1000,120; 900,100; 1000,120" dur="8s" repeatCount="indefinite"/>
</g>

<!-- Ocean Layer -->
<rect x="0" y="500" width="1600" height="400" fill="url(#oceanGrad)"/>

<!-- Ocean Waves -->
<g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M100,550 Q150,530 200,550 T300,550 T400,550">
        <animateTransform attributeName="transform" type="translate" values="0,0; -100,0; 0,0" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M600,600 Q650,580 700,600 T800,600 T900,600">
        <animateTransform attributeName="transform" type="translate" values="0,0; 100,0; 0,0" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M1100,530 Q1150,510 1200,530 T1300,530 T1400,530">
        <animateTransform attributeName="transform" type="translate" values="0,0; -50,0; 0,0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M200,650 Q250,630 300,650 T400,650 T500,650" opacity="0.3">
        <animateTransform attributeName="transform" type="translate" values="0,0; 80,0; 0,0" dur="6s" repeatCount="indefinite"/>
    </path>
</g>

<!-- Beach Sand -->
<path d="M0,650 Q400,600 800,680 T1600,650 L1600,900 L0,900 Z" fill="url(#sandGrad)"/>

<!-- Sand Texture -->
<circle cx="200" cy="750" r="3" fill="#FF8C42" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="600" cy="780" r="4" fill="#FF3864" opacity="0.6"/>
<circle cx="1200" cy="720" r="2" fill="#06AED5" opacity="0.7">
    <animate attributeName="cy" values="720;730;720" dur="3s" repeatCount="indefinite"/>
</circle>

<!-- Water Foam Splash -->
<path d="M250,650 Q280,630 310,650 Q340,630 370,650 Q400,630 430,650" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.8">
    <animate attributeName="d" values="M250,650 Q280,630 310,650 Q340,630 370,650 Q400,630 430,650; M250,660 Q280,640 310,660 Q340,640 370,660 Q400,640 430,660; M250,650 Q280,630 310,650 Q340,630 370,650 Q400,630 430,650" dur="2s" repeatCount="indefinite"/>
</path>

<!-- Hero Subject: Volleyball Spiker Silhouette -->
<g id="heroSubject" transform="translate(350, 450)">
    <animateTransform attributeName="transform" type="translate" values="350,450; 350,430; 350,450" dur="2.5s" repeatCount="indefinite"/>
    
    <!-- Shadow on Sand -->
    <ellipse cx="10" cy="220" rx="80" ry="15" fill="#000000" opacity="0.2">
        <animate attributeName="rx" values="80;70;80" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Action Lines -->
    <g stroke="#FFD23F" stroke-width="4" stroke-linecap="round">
        <line x1="-100" y1="-100" x2="-150" y2="-150">
            <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite"/>
        </line>
        <line x1="-80" y1="-120" x2="-110" y2="-180">
            <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="0.2s" repeatCount="indefinite"/>
        </line>
        <line x1="100" y1="-80" x2="150" y2="-130">
            <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
        </line>
    </g>

    <!-- Body Silhouette -->
    <path d="
        M -20,0
        C -30,-10 -40,-30 -20,-50
        C -10,-60 10,-60 20,-50
        C 40,-30 30,-10 20,0
        C 25,20 30,40 35,70
        C 40,100 35,130 30,160
        L 50,220
        L 10,220
        L 0,180
        L -10,220
        L -50,220
        L -30,160
        C -35,130 -40,100 -35,70
        C -30,40 -25,20 -20,0
        Z
    " fill="#FF3864" stroke="#FFFFFF" stroke-width="4"/>
    
    <!-- Arms in Spiking Pose -->
    <path d="M 20,-40 L 80,-120 L 60,-130" fill="none" stroke="#FF3864" stroke-width="14" stroke-linecap="round"/>
    <!-- Right Arm (Spiking high) -->
    <path d="M 20,-40 Q 60,-100 100,-150" fill="none" stroke="#FF3864" stroke-width="14" stroke-linecap="round"/>
    
    <!-- Left Arm (Balancing) -->
    <path d="M -20,-40 Q -70,-20 -110,20" fill="none" stroke="#FF3864" stroke-width="14" stroke-linecap="round"/>

    <!-- Head / Hair Blowing -->
    <circle cx="0" cy="-65" r="18" fill="#FF3864"/>
    <path d="M 0,-65 Q -20,-85 -40,-70 Q -20,-55 0,-65" fill="#FF3864"/>
    
    <!-- Volleyball -->
    <g transform="translate(110, -160)">
        <circle r="25" fill="#FFD23F" stroke="#FFFFFF" stroke-width="3"/>
        <path d="M -15,-10 Q 0,0 15,-10 M -15,10 Q 0,0 15,10 M 0,-20 L 0,20" fill="none" stroke="#FF8C42" stroke-width="3"/>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="1.5s" repeatCount="indefinite" additive="sum"/>
        <animateTransform attributeName="transform" type="translate" values="110,-160; 130,-180; 110,-160" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </g>
</g>

<!-- Beach Umbrellas -->
<g transform="translate(900, 630)">
    <!-- Shadow -->
    <ellipse cx="10" cy="20" rx="80" ry="15" fill="#000000" opacity="0.2"/>
    <!-- Pole -->
    <line x1="0" y1="0" x2="0" y2="120" stroke="#FFFFFF" stroke-width="6"/>
    <!-- Canopy segments -->
    <path d="M-70,20 A 70,70 0 0,1 0,-50 A 70,70 0 0,1 70,20 Z" fill="#06AED5"/>
    <path d="M-70,20 A 70,70 0 0,1 -23,-40 L 0,-50 L 23,-40 A 70,70 0 0,1 70,20 Z" fill="#FF3864"/>
    <path d="M-23,-40 A 70,70 0 0,1 23,-40 Z" fill="#FFD23F"/>
    <line x1="0" y1="-50" x2="0" y2="20" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M-70,20 Q0,35 70,20" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    
    <!-- Umbrella Motion -->
    <animateTransform attributeName="transform" type="rotate" values="-2 0 120; 2 0 120; -2 0 120" dur="4s" repeatCount="indefinite"/>
</g>

<g transform="translate(1100, 610) scale(0.8)">
    <ellipse cx="10" cy="20" rx="80" ry="15" fill="#000000" opacity="0.2"/>
    <line x1="0" y1="0" x2="0" y2="120" stroke="#FFFFFF" stroke-width="6"/>
    <path d="M-70,20 A 70,70 0 0,1 0,-50 A 70,70 0 0,1 70,20 Z" fill="#FF8C42"/>
    <path d="M-70,20 A 70,70 0 0,1 -23,-40 L 0,-50 L 23,-40 A 70,70 0 0,1 70,20 Z" fill="#06AED5"/>
    <path d="M-23,-40 A 70,70 0 0,1 23,-40 Z" fill="#FF3864"/>
    <line x1="0" y1="-50" x2="0" y2="20" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M-70,20 Q0,35 70,20" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <animateTransform attributeName="transform" type="rotate" values="2 0 120; -2 0 120; 2 0 120" dur="5s" repeatCount="indefinite" additive="sum"/>
</g>

<!-- Palm Trees -->
<g transform="translate(1300, 480)">
    <!-- Trunk -->
    <path d="M0,250 Q20,150 0,0 Q-20,150 0,250" fill="#4A2C2A" stroke="#2D1A1A" stroke-width="2"/>
    <!-- Leaves -->
    <g>
        <path d="M0,0 Q-80,-30 -120,20 Q-60,10 0,0" fill="#08D646" stroke="#06AED5" stroke-width="2"/>
        <path d="M0,0 Q80,-30 120,20 Q60,10 0,0" fill="#08D646" stroke="#06AED5" stroke-width="2"/>
        <path d="M0,0 Q-50,-80 -80,-100 Q-40,-50 0,0" fill="#06D142" stroke="#06AED5" stroke-width="2"/>
        <path d="M0,0 Q50,-80 80,-100 Q40,-50 0,0" fill="#06D142" stroke="#06AED5" stroke-width="2"/>
        <path d="M0,0 Q0,-90 10,-130 Q20,-80 0,0" fill="#05B83A" stroke="#06AED5" stroke-width="2"/>
        <animateTransform attributeName="transform" type="rotate" values="-3 0 250; 3 0 250; -3 0 250" dur="6s" repeatCount="indefinite"/>
    </g>
</g>

<g transform="translate(1450, 520) scale(0.7)">
    <path d="M0,250 Q-20,150 0,0 Q20,150 0,250" fill="#4A2C2A"/>
    <g>
        <path d="M0,0 Q-80,-30 -120,20 Q-60,10 0,0" fill="#08D646"/>
        <path d="M0,0 Q80,-30 120,20 Q60,10 0,0" fill="#08D646"/>
        <path d="M0,0 Q-50,-80 -80,-100 Q-40,-50 0,0" fill="#06D142"/>
        <path d="M0,0 Q50,-80 80,-100 Q40,-50 0,0" fill="#06D142"/>
        <path d="M0,0 Q0,-90 10,-130 Q20,-80 0,0" fill="#05B83A"/>
        <animateTransform attributeName="transform" type="rotate" values="3 0 250; -3 0 250; 3 0 250" dur="7s" repeatCount="indefinite"/>
    </g>
</g>

<!-- Beach Ball on Sand -->
<g transform="translate(650, 720)">
    <circle r="20" fill="#FFD23F" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M -12,-12 Q 0,0 12,-12" fill="none" stroke="#FF3864" stroke-width="3"/>
    <path d="M -12,12 Q 0,0 12,12" fill="none" stroke="#06AED5" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
    <animateTransform attributeName="transform" type="translate" values="650,720; 650,710; 650,720" dur="1.5s" repeatCount="indefinite"/>
</g>

<!-- Geometric Halftone Overlay (Right side negative space) -->
<rect x="700" y="0" width="900" height="900" fill="url(#halftone)" opacity="0.3"/>

<!-- Chevron Background Element -->
<g transform="translate(1000, 450)" opacity="0.4">
    <polygon points="0,-200 100,-100 0,0 -100,-100" fill="#FFD23F">
        <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,0 100,100 0,200 -100,100" fill="#06AED5">
        <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </polygon>
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="60s" repeatCount="indefinite" additive="sum"/>
</g>

<!-- Foreground Confetti / Particles -->
<g>
    <use href="#confetti" fill="#FFD23F">
        <animateTransform attributeName="transform" type="translate" values="200,-50; 150,950" dur="4s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="2s" repeatCount="indefinite" additive="sum"/>
    </use>
    <use href="#confetti" fill="#FF3864">
        <animateTransform attributeName="transform" type="translate" values="400,-50; 450,950" dur="5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="3s" repeatCount="indefinite" additive="sum"/>
    </use>
    <use href="#confetti" fill="#06AED5">
        <animateTransform attributeName="transform" type="translate" values="600,-50; 550,950" dur="3.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="1.5s" repeatCount="indefinite" additive="sum"/>
    </use>
    <use href="#confetti" fill="#FF8C42">
        <animateTransform attributeName="transform" type="translate" values="800,-50; 850,950" dur="4.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </use>
    <use href="#confetti" fill="#FFD23F">
        <animateTransform attributeName="transform" type="translate" values="1000,-50; 1050,950" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="2s" repeatCount="indefinite" additive="sum"/>
    </use>
    <use href="#confetti" fill="#FF3864">
        <animateTransform attributeName="transform" type="translate" values="1200,-50; 1150,950" dur="5.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="3s" repeatCount="indefinite" additive="sum"/>
    </use>
    <use href="#confetti" fill="#06AED5">
        <animateTransform attributeName="transform" type="translate" values="1400,-50; 1450,950" dur="4s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </use>
    
    <!-- Additional Floating Particles -->
    <circle r="5" fill="#FFFFFF">
        <animateTransform attributeName="transform" type="translate" values="300,900; 250,-50" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="8" fill="#FFD23F">
        <animateTransform attributeName="transform" type="translate" values="700,900; 750,-50" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" fill="#FF3864">
        <animateTransform attributeName="transform" type="translate" values="1100,900; 1050,-50" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#06AED5">
        <animateTransform attributeName="transform" type="translate" values="1500,900; 1550,-50" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Star Bursts -->
    <g transform="translate(750, 300)">
        <path d="M0,-20 L5,-5 L20,0 L5,5 L0,20 L-5,5 L-20,0 L-5,-5Z" fill="#FFD23F" filter="url(#glow)">
            <animateTransform attributeName="transform" type="scale" values="0;1.5;0" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
        </path>
    </g>
    <g transform="translate(500, 500)">
        <path d="M0,-15 L4,-4 L15,0 L4,4 L0,15 L-4,4 L-15,0 L-4,-4Z" fill="#FF3864">
            <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="3s" begin="1s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1s" repeatCount="indefinite"/>
        </path>
    </g>
    <g transform="translate(1300, 400)">
        <path d="M0,-25 L6,-6 L25,0 L6,6 L0,25 L-6,6 L-25,0 L-6,-6Z" fill="#06AED5" filter="url(#glow)">
            <animateTransform attributeName="transform" type="scale" values="0;1.2;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
        </path>
    </g>
</g>

<!-- Foreground Motion Lines / Speed Lines -->
<g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="0" y1="100" x2="200" y2="100">
        <animateTransform attributeName="transform" type="translate" values="-200,0; 1600,0" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="300" x2="150" y2="300">
        <animateTransform attributeName="transform" type="translate" values="-200,0; 1600,0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="800" x2="300" y2="800">
        <animateTransform attributeName="transform" type="translate" values="-300,0; 1600,0" dur="1s" begin="0.2s" repeatCount="indefinite"/>
    </line>
</g>

</svg>