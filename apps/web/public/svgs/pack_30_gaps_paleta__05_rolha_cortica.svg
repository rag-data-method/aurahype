<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="1600" height="900">
  <defs>
    <!-- Gradients -->
    <linearGradient id="g-cork" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#8B0F23"/>
      <stop offset="35%" stop-color="#5C2D2A"/>
      <stop offset="60%" stop-color="#C9A66B"/>
      <stop offset="100%" stop-color="#E8D5B8"/>
      <animate attributeName="x1" values="0%;2%;0%;-1%;0%" dur="18s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.3;0.6;0.85;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </linearGradient>

    <linearGradient id="g-cork-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C2D2A"/>
      <stop offset="50%" stop-color="#C9A66B"/>
      <stop offset="100%" stop-color="#E8D5B8"/>
    </linearGradient>

    <linearGradient id="g-wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C1810"/>
      <stop offset="50%" stop-color="#3a1f15"/>
      <stop offset="100%" stop-color="#1a0d08"/>
    </linearGradient>

    <radialGradient id="g-warm-glow" cx="0%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#C9A66B" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#5C2D2A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2C1810" stop-opacity="0"/>
    </radialGradient>

    <!-- Core Filters -->
    <filter id="f-40" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <filter id="f-80" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>

    <filter id="f-120" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>

    <filter id="f-160" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="160"/>
    </filter>

    <!-- Wood Grain Texture -->
    <filter id="f-wood" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.004 0.015" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix type="matrix" values="0.4 0 0 0 0.1  0.25 0 0 0 0.05  0.15 0 0 0 0.02  0 0 0 1 0" result="colored"/>
      <feComposite operator="in" in="colored" in2="SourceGraphic" result="composite"/>
      <feBlend mode="multiply" in="composite" in2="SourceGraphic"/>
    </filter>

    <!-- Cork Texture Grain -->
    <filter id="f-cork" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.15" numOctaves="3" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>

    <!-- Subject Drop Shadow -->
    <filter id="f-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="15" dy="35" stdDeviation="18" flood-color="#2C1810" flood-opacity="0.85"/>
    </filter>

    <!-- Glow Halo -->
    <filter id="f-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Masks -->
    <mask id="m-edge">
      <rect width="1600" height="900" fill="white"/>
      <rect x="0" y="0" width="500" height="900" fill="url(#g-warm-glow)"/>
    </mask>

    <!-- Dust Mote Particle -->
    <g id="dust">
      <circle r="2" fill="#E8D5B8" opacity="0.6">
        <animate attributeName="opacity" values="0;0.8;0.4;0.9;0.2;0.7;0" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
      </circle>
    </g>
  </defs>

  <!-- Base Layer: Dark Background -->
  <rect width="1600" height="900" fill="#1a0d08"/>

  <!-- Wood Surface Layers -->
  <g>
    <rect width="1600" height="900" fill="url(#g-wood)"/>
    <rect width="1600" height="900" fill="#2C1810" opacity="0.4" filter="url(#f-wood)"/>
    <!-- Wood Vignette -->
    <radialGradient id="g-vignette" cx="50%" cy="50%" r="75%">
      <stop offset="40%" stop-color="#2C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0503" stop-opacity="0.85"/>
    </radialGradient>
    <rect width="1600" height="900" fill="url(#g-vignette)"/>
  </g>

  <!-- Atmospheric Blur Layer 160 -->
  <rect x="-200" y="-200" width="2000" height="1300" fill="#5C2D2A" opacity="0.08" filter="url(#f-160)">
    <animate attributeName="opacity" values="0.06;0.10;0.07;0.09;0.06" dur="25s" repeatCount="indefinite"/>
  </rect>

  <!-- Atmospheric Blur Layer 120 -->
  <rect x="-100" y="-100" width="1800" height="1100" fill="#8B0F23" opacity="0.06" filter="url(#f-120)">
    <animate attributeName="opacity" values="0.05;0.08;0.06;0.07;0.05" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- Warm Light Source (Negative Space) -->
  <g>
    <circle cx="180" cy="280" r="350" fill="#C9A66B" opacity="0.12" filter="url(#f-80)">
      <animate attributeName="r" values="340;360;345;355;340" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.10;0.14;0.11;0.13;0.10" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="280" r="250" fill="#E8D5B8" opacity="0.08" filter="url(#f-40)">
      <animate attributeName="r" values="240;260;250;255;240" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ambient Haze Overlay -->
  <rect width="1600" height="900" fill="#2C1810" opacity="0.15" filter="url(#f-120)">
    <animate attributeName="opacity" values="0.12;0.18;0.14;0.16;0.12" dur="22s" repeatCount="indefinite"/>
  </rect>

  <!-- Light Shafts / Atmosphere -->
  <g opacity="0.08" filter="url(#f-80)">
    <path d="M 0,0 L 800,900 L 1100,900 L 0,300 Z" fill="#C9A66B">
      <animate attributeName="opacity" values="0.06;0.10;0.07;0.09;0.06" dur="18s" repeatCount="indefinite"/>
    </path>
    <path d="M 0,150 L 600,900 L 750,900 L 0,450 Z" fill="#E8D5B8">
      <animate attributeName="opacity" values="0.04;0.08;0.05;0.07;0.04" dur="15s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Deep Shadow Cast by Cork -->
  <g opacity="0.6" filter="url(#f-40)">
    <ellipse cx="1150" cy="680" rx="280" ry="60" fill="#0a0503">
      <animate attributeName="rx" values="270;290;275;285;270" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.65;0.60;0.62;0.55" dur="12s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Secondary Shadow -->
  <g opacity="0.4" filter="url(#f-80)">
    <ellipse cx="1180" cy="720" rx="350" ry="80" fill="#1a0d08">
      <animate attributeName="rx" values="340;360;350;355;340" dur="16s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Cork Subject Group (OFF-CENTER: Right Two-Thirds) -->
  <g transform="translate(0, 20)">
    <!-- Float Animation -->
    <animateTransform attributeName="transform" type="translate" values="0,20; 0,15; 0,22; 0,18; 0,20" dur="20s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Cork Body Cylinder -->
    <g filter="url(#f-shadow)">
      <!-- Main Body -->
      <path d="M 780 400 
               C 800 390, 1300 490, 1320 500 
               L 1280 620 
               C 1260 630, 760 530, 740 520 
               Z" 
            fill="url(#g-cork)"/>
      
      <!-- Body Gradient Overlay for 3D Cylinder Feel -->
      <path d="M 780 400 
               C 800 390, 1300 490, 1320 500 
               L 1280 620 
               C 1260 630, 760 530, 740 520 
               Z" 
            fill="url(#g-cork-side)" opacity="0.5"/>
    </g>

    <!-- Cork Top Face (Burgundy Stained End) -->
    <ellipse cx="1050" cy="450" rx="290" ry="55" fill="#8B0F23" transform="rotate(-12 1050 450)">
      <animate attributeName="fill" values="#8B0F23;#7a0d1e;#8B0F23;#940f25;#8B0F23" dur="15s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Top Face Highlight -->
    <ellipse cx="1020" cy="440" rx="220" ry="35" fill="#C9A66B" opacity="0.15" transform="rotate(-12 1050 450)" filter="url(#f-40)">
      <animate attributeName="opacity" values="0.12;0.18;0.14;0.16;0.12" dur="10s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Cork Bottom Face (Natural Beige End) -->
    <ellipse cx="1010" cy="575" rx="270" ry="50" fill="#E8D5B8" transform="rotate(-12 1010 575)"/>
    <!-- Bottom Face Shadow -->
    <ellipse cx="1030" cy="585" rx="240" ry="40" fill="#C9A66B" opacity="0.2" transform="rotate(-12 1010 575)"/>

    <!-- Cork Rim Light / Silhouette Edge -->
    <g filter="url(#f-glow)" opacity="0.7">
      <path d="M 740 520 C 760 530, 1260 630, 1280 620" stroke="#E8D5B8" stroke-width="4" fill="none" stroke-linecap="round">
        <animate attributeName="stroke-width" values="3;5;3.5;4.5;3" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.8;0.6;0.75;0.5" dur="12s" repeatCount="indefinite"/>
      </path>
      <path d="M 780 400 C 800 390, 1300 490, 1320 500" stroke="#C9A66B" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    </g>

    <!-- Cork Texture / Pores Detail -->
    <g filter="url(#f-cork)" opacity="0.6">
      <circle cx="950" cy="480" r="3" fill="#2C1810" opacity="0.4">
        <animate attributeName="r" values="2.5;3.5;2.8;3.2;2.5" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1020" cy="460" r="2" fill="#2C1810" opacity="0.5">
        <animate attributeName="r" values="1.5;2.5;2;2.3;1.5" dur="11s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1100" cy="490" r="4" fill="#2C1810" opacity="0.3">
        <animate attributeName="r" values="3.5;4.5;3.8;4.2;3.5" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1150" cy="470" r="2.5" fill="#2C1810" opacity="0.45">
        <animate attributeName="r" values="2;3;2.5;2.8;2" dur="13s" repeatCount="indefinite"/>
      </circle>
      <circle cx="880" cy="450" r="3.5" fill="#2C1810" opacity="0.35">
        <animate attributeName="r" values="3;4;3.3;3.8;3" dur="14s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1200" cy="510" r="2" fill="#2C1810" opacity="0.5">
        <animate attributeName="r" values="1.5;2.5;2;2.3;1.5" dur="10s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1050" cy="520" r="3" fill="#2C1810" opacity="0.4">
        <animate attributeName="r" values="2.5;3.5;2.8;3.2;2.5" dur="12s" repeatCount="indefinite"/>
      </circle>
      <circle cx="980" cy="540" r="2.5" fill="#2C1810" opacity="0.45">
        <animate attributeName="r" values="2;3;2.5;2.8;2" dur="15s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1120" cy="550" r="4" fill="#2C1810" opacity="0.3">
        <animate attributeName="r" values="3.5;4.5;3.8;4.2;3.5" dur="11s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Wine Stain Bleed (Organic Edge) -->
    <g filter="url(#f-40)" opacity="0.4">
      <path d="M 780 400 C 800 390, 1300 490, 1320 500 L 1300 495 C 1280 485, 790 395, 770 405 Z" fill="#8B0F23">
        <animate attributeName="opacity" values="0.3;0.45;0.35;0.4;0.3" dur="16s" repeatCount="indefinite"/>
      </path>
      <path d="M 740 520 C 760 530, 1260 630, 1280 620 L 1260 625 C 1240 635, 750 535, 730 525 Z" fill="#5C2D2A" opacity="0.3">
        <animate attributeName="opacity" values="0.25;0.35;0.28;0.32;0.25" dur="18s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Highlight Reflection on Cork Body -->
    <path d="M 850 415 C 950 430, 1150 465, 1250 485 L 1230 495 C 1130 475, 930 440, 830 425 Z" fill="#E8D5B8" opacity="0.15" filter="url(#f-40)">
      <animate attributeName="opacity" values="0.1;0.2;0.12;0.18;0.1" dur="14s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Foreground Atmosphere / Haze -->
  <rect x="0" y="0" width="1600" height="900" fill="#5C2D2A" opacity="0.04" filter="url(#f-80)">
    <animate attributeName="opacity" values="0.03;0.06;0.04;0.05;0.03" dur="20s" repeatCount="indefinite"/>
  </rect>

  <rect x="0" y="0" width="1600" height="900" fill="#C9A66B" opacity="0.03" filter="url(#f-120)">
    <animate attributeName="opacity" values="0.02;0.05;0.03;0.04;0.02" dur="25s" repeatCount="indefinite"/>
  </rect>

  <!-- Dust Motes Layer -->
  <g>
    <use href="#dust" x="400" y="300" transform="scale(1.2)">
      <animateMotion path="M 0,0 C 50,-30 100,20 150,-10 S 250,40 300,0" dur="18s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="350" y="400" transform="scale(0.8)">
      <animateMotion path="M 0,0 C 30,40 80,-20 120,30 S 200,-40 250,10" dur="22s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="500" y="250" transform="scale(1.5)">
      <animateMotion path="M 0,0 C -20,50 40,80 10,120 S -30,180 20,220" dur="15s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="450" y="350" transform="scale(1)">
      <animateMotion path="M 0,0 C 60,-20 100,30 160,0 S 220,50 280,20" dur="20s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="300" y="500" transform="scale(0.6)">
      <animateMotion path="M 0,0 C 40,30 90,-10 140,20 S 190,-30 240,0" dur="24s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="600" y="200" transform="scale(1.8)">
      <animateMotion path="M 0,0 C -40,20 -10,70 -50,100 S -90,150 -40,180" dur="17s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="380" y="450" transform="scale(1.1)">
      <animateMotion path="M 0,0 C 20,-40 70,-10 90,-50 S 140,-80 180,-40" dur="19s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="550" y="320" transform="scale(0.9)">
      <animateMotion path="M 0,0 C -30,30 -80,0 -110,40 S -160,70 -130,110" dur="21s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="420" y="280" transform="scale(1.3)">
      <animateMotion path="M 0,0 C 50,10 90,-30 140,-20 S 190,20 240,10" dur="16s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="480" y="380" transform="scale(0.7)">
      <animateMotion path="M 0,0 C 10,50 60,70 40,120 S 90,160 50,200" dur="23s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="320" y="280" transform="scale(1.4)">
      <animateMotion path="M 0,0 C -20,-40 -70,-20 -90,-60 S -140,-80 -110,-120" dur="14s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="520" y="420" transform="scale(1)">
      <animateMotion path="M 0,0 C 30,20 70,-10 110,10 S 150,-20 190,0" dur="18s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="280" y="360" transform="scale(0.5)">
      <animateMotion path="M 0,0 C -10,30 -50,50 -30,90 S -70,130 -30,160" dur="26s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="580" y="300" transform="scale(1.6)">
      <animateMotion path="M 0,0 C 40,-20 80,20 120,-10 S 160,30 200,0" dur="13s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="460" y="500" transform="scale(0.8)">
      <animateMotion path="M 0,0 C -20,40 -60,20 -80,60 S -120,80 -100,120" dur="20s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="340" y="200" transform="scale(1.2)">
      <animateMotion path="M 0,0 C 60,0 100,-40 160,-30 S 220,10 280,0" dur="15s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="410" y="480" transform="scale(0.9)">
      <animateMotion path="M 0,0 C 20,30 60,50 40,90 S 80,130 40,160" dur="22s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="560" y="260" transform="scale(1.1)">
      <animateMotion path="M 0,0 C -30,-20 -70,10 -100,-20 S -140,10 -170,-20" dur="17s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="290" y="420" transform="scale(0.7)">
      <animateMotion path="M 0,0 C 40,-10 80,30 120,10 S 160,50 200,30" dur="19s" repeatCount="indefinite" rotate="auto"/>
    </use>
    <use href="#dust" x="530" y="460" transform="scale(1.3)">
      <animateMotion path="M 0,0 C -10,40 -50,60 -30,100 S -70,140 -30,170" dur="21s" repeatCount="indefinite" rotate="auto"/>
    </use>
  </g>

  <!-- Final Soft Atmospheric Overlay -->
  <rect width="1600" height="900" fill="url(#g-warm-glow)" pointer-events="none"/>
  <rect width="1600" height="900" fill="#2C1810" opacity="0.05" filter="url(#f-40)" pointer-events="none">
    <animate attributeName="opacity" values="0.03;0.07;0.04;0.06;0.03" dur="30s" repeatCount="indefinite"/>
  </rect>
</svg>