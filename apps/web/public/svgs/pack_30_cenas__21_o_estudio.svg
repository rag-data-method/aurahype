<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6C9A0"/>
      <stop offset="50%" stop-color="#D4A57C"/>
      <stop offset="100%" stop-color="#B8936F"/>
    </linearGradient>
    <linearGradient id="ceramic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5F5F0"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E0"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF7EE"/>
  
  <ellipse cx="600" cy="620" rx="150" ry="35" fill="#000" opacity="0.15" filter="url(#shadowBlur)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values="1;0.95;1" dur="6s" repeatCount="indefinite" additive="sum"/>
  </ellipse>
  
  <g transform="translate(600,480)">
    <animateTransform attributeName="transform" type="translate" values="600,480; 600,470; 600,480" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-1 0 0; 1 0 0; -1 0 0" dur="8s" repeatCount="indefinite" additive="sum"/>
    
    <path d="M-140,-20 C-140,-80 -80,-110 0,-110 C80,-110 140,-80 140,-20 C140,30 130,60 110,80 C90,100 60,110 0,110 C-60,110 -90,100 -110,80 C-130,60 -140,30 -140,-20 Z" fill="url(#wood)"/>
    <ellipse cx="-20" cy="-30" rx="22" ry="18" fill="#FBF7EE" opacity="0.95"/>
    
    <path d="M-80,-60 Q-60,-80 -40,-60 T-20,-50 Q-30,-30 -60,-40 Z" fill="#E63946" opacity="0.9">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="4s" repeatCount="indefinite" additive="sum"/>
    </path>
    
    <path d="M20,-70 Q40,-90 70,-70 T90,-50 Q70,-40 40,-50 Z" fill="#2563EB" opacity="0.87">
      <animate attributeName="opacity" values="0.8;0.95;0.8" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="5s" repeatCount="indefinite" additive="sum"/>
    </path>
    
    <path d="M-30,20 Q0,0 30,20 T50,40 Q30,60 0,50 T-30,40 Z" fill="#D4A017" opacity="0.82">
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="3.8s" repeatCount="indefinite" begin="1s"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.04;1" dur="4.2s" repeatCount="indefinite" additive="sum"/>
    </path>
    
    <path d="M-100,-20 Q0,-40 100,-20" stroke="#FFF" stroke-width="2" opacity="0.3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <ellipse cx="980" cy="560" rx="70" ry="20" fill="#000" opacity="0.12" filter="url(#shadowBlur)">
    <animate attributeName="opacity" values="0.12;0.2;0.12" dur="5s" repeatCount="indefinite" begin="1s"/>
    <animateTransform attributeName="transform" type="scale" values="1;0.92;1" dur="5s" repeatCount="indefinite" additive="sum"/>
  </ellipse>
  
  <g transform="translate(980,480)">
    <animateTransform attributeName="transform" type="translate" values="980,480; 980,472; 980,480" dur="5s" repeatCount="indefinite" begin="1s"/>
    <animateTransform attributeName="transform" type="rotate" values="0.5 0 50; -0.5 0 50; 0.5 0 50" dur="7s" repeatCount="indefinite" additive="sum"/>
    
    <path d="M60,-20 C85,-20 85,40 60,40" stroke="#E8E8E0" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M-50,-40 L-50,40 C-50,65 50,65 50,40 L50,-40" fill="url(#ceramic)"/>
    <ellipse cx="0" cy="-40" rx="50" ry="15" fill="#F0F0EA" stroke="#E0E0D8" stroke-width="1"/>
    <ellipse cx="0" cy="-40" rx="42" ry="12" fill="#4A4A4A"/>
    <ellipse cx="0" cy="-40" rx="42" ry="12" fill="none" stroke="#000" stroke-width="2" opacity="0.2" filter="url(#softBlur)"/>
    
    <g transform="translate(-15,-40) rotate(-12)">
      <animateTransform attributeName="transform" type="rotate" values="-12 -15 -40; -14 -15 -40; -12 -15 -40" dur="2.5s" repeatCount="indefinite" additive="sum"/>
      <rect x="-4" y="-90" width="8" height="90" fill="#A06B4A" rx="2"/>
      <rect x="-5" y="-100" width="10" height="15" fill="#C0C0C0"/>
      <path d="M-5,-100 L-5,-115 Q0,-120 5,-115 L5,-100 Z" fill="#8B4513"/>
      <path d="M-5,-110 L-5,-115 Q0,-120 5,-115 L5,-110 Z" fill="#E63946" opacity="0.8"/>
    </g>
    
    <g transform="translate(-5,-40) rotate(-4)">
      <animateTransform attributeName="transform" type="rotate" values="-4 -5 -40; -6 -5 -40; -4 -5 -40" dur="3s" repeatCount="indefinite" begin="0.2s" additive="sum"/>
      <rect x="-3.5" y="-95" width="7" height="95" fill="#8B5A3C" rx="2"/>
      <rect x="-4.5" y="-108" width="9" height="18" fill="#B8B8B8"/>
      <path d="M-4.5,-108 L-4.5,-125 Q0,-130 4.5,-125 L4.5,-108 Z" fill="#D2B48C"/>
      <path d="M-4.5,-118 L-4.5,-125 Q0,-130 4.5,-125 L4.5,-118 Z" fill="#2563EB" opacity="0.85">
        <animate attributeName="opacity" values="0.8;0.95;0.8" dur="4s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <g transform="translate(5,-40) rotate(3)">
      <animateTransform attributeName="transform" type="rotate" values="3 5 -40; 1 5 -40; 3 5 -40" dur="2.8s" repeatCount="indefinite" begin="0.4s" additive="sum"/>
      <rect x="-4" y="-88" width="8" height="88" fill="#9C6B4D" rx="2"/>
      <rect x="-5" y="-102" width="10" height="16" fill="#A8A8A8"/>
      <path d="M-5,-102 L-5,-118 Q0,-123 5,-118 L5,-102 Z" fill="#F5DEB3"/>
      <path d="M-5,-112 L-5,-118 Q0,-123 5,-118 L5,-112 Z" fill="#D4A017" opacity="0.85"/>
    </g>
    
    <g transform="translate(15,-40) rotate(10)">
      <animateTransform attributeName="transform" type="rotate" values="10 15 -40; 12 15 -40; 10 15 -40" dur="3.2s" repeatCount="indefinite" begin="0.6s" additive="sum"/>
      <rect x="-3" y="-92" width="6" height="92" fill="#A67B5B" rx="2"/>
      <rect x="-4" y="-105" width="8" height="16" fill="#BEBEBE"/>
      <path d="M-4,-105 L-4,-122 Q0,-127 4,-122 L4,-105 Z" fill="#E6D2B5"/>
      <path d="M-4,-115 L-4,-122 Q0,-127 4,-122 L4,-115 Z" fill="#E63946" opacity="0.9">
        <animate attributeName="opacity" values="0.85;1;0.85" dur="3.5s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <path d="M-35,-20 Q-35,20 -35,40" stroke="#FFF" stroke-width="3" opacity="0.4" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <circle cx="700" cy="300" r="3" fill="#E63946" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 20,-40; 40,-80" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1000" cy="350" r="2" fill="#2563EB" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite" begin="1s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -10,-30; -20,-60" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="850" cy="400" r="4" fill="#D4A017" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="6s" repeatCount="indefinite" begin="2s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 15,-50; 30,-100" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <path d="M750,480 Q850,480 930,480" stroke="#D4A017" stroke-width="1" opacity="0.1" fill="none" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" values="0;10;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>