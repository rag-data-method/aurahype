<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <clipPath id="slash-cut">
      <polygon points="0,0 800,0 0,600" />
    </clipPath>
  </defs>

  <rect width="800" height="600" fill="#D72638" />
  
  <rect width="800" height="600" fill="#000000" clip-path="url(#slash-cut)" />

  <g stroke="#FFFFFF" stroke-width="24" stroke-linecap="square">
    <line x1="60" y1="60" x2="60" y2="240" />
    <circle cx="60" cy="300" r="30" fill="none" />
    <polygon points="120,60 120,240 240,150" fill="none" />
    
    <rect x="280" y="60" width="120" height="180" fill="none" />
    <polygon points="460,60 580,60 460,240" fill="none" />
    <rect x="620" y="60" width="120" height="180" fill="none" />
  </g>

  <g stroke="#000000" stroke-width="12">
    <polygon points="800,600 800,350 620,600" fill="#D72638" />
    <polygon points="620,600 460,600 620,400" fill="#D72638" />
    <polygon points="460,600 300,600 460,450" fill="#D72638" />
    
    <polygon points="0,0 0,250 180,0" fill="#D72638" />
    <polygon points="180,0 340,0 180,200" fill="#D72638" />
    <polygon points="340,0 500,0 340,250" fill="#D72638" />
  </g>

  <circle cx="400" cy="280" r="70" fill="#D72638" stroke="#000000" stroke-width="16">
    <animate attributeName="fill" values="#D72638;#000000;#D72638" dur="1s" repeatCount="indefinite" calcMode="discrete" />
  </circle>

  <rect x="336" y="436" width="128" height="128" fill="#FFFFFF" stroke="#000000" stroke-width="18">
    <animateTransform attributeName="transform" type="translate" values="0,0; 20,-20; 0,0" dur="1.5s" repeatCount="indefinite" calcMode="discrete" />
  </rect>

  <polygon points="180,540 180,420 300,480" fill="#D72638" stroke="#FFFFFF" stroke-width="16" stroke-linejoin="miter">
    <animateTransform attributeName="transform" type="rotate" values="-15 240 480; 15 240 480; -15 240 480" dur="2s" repeatCount="indefinite" calcMode="discrete" />
  </polygon>
</svg>