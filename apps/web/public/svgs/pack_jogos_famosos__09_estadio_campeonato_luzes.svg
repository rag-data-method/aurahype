<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="1600" height="900">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A14">
        <animate attributeName="stop-color" values="#0A0A14;#1a1030;#0A0A14" dur="20s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#3D2A5F">
        <animate attributeName="stop-color" values="#3D2A5F;#5D4A8F;#3D2A5F" dur="20s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1A0E2E"/>
    </linearGradient>

    <linearGradient id="beamGrad1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFD23D" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FFD23D" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD23D" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="beamGrad2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#00D9FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="heroRim" cx="80%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#FFD23D" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00D9FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A0A14" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="spotlightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD23D" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#00D9FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A0A14" stop-opacity="0"/>
    </radialGradient>

    <filter id="b40" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="b80" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="b120" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="b160" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="160"/>
    </filter>
    <filter id="turb" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="desat"/>
      <feComponentTransfer in="desat" result="contrast">
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="contrast" mode="overlay"/>
    </filter>

    <path id="pUp" d="M0,0 L2,0 L1,-3 Z"/>
  </defs>

  <!-- Layer 1: Base Sky -->
  <rect width="1600" height="900" fill="url(#skyGrad)"/>

  <!-- Layer 2: Distant Arena Roof Glow -->
  <ellipse cx="800" cy="450" rx="600" ry="300" fill="#3D2A5F" opacity="0.4" filter="url(#b160)">
    <animate attributeName="opacity" values="0.4;0.55;0.4" dur="15s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Layer 3: Far Structure Silhouette -->
  <path d="M0,0 H1600 V900 H0 Z" fill="#0A0A14" opacity="0" mask="url(#none)"/>
  <rect x="-200" y="0" width="2000" height="400" fill="#120A24" opacity="0.6" filter="url(#b120)"/>

  <!-- Layer 4: Massive Golden Beam (Background) -->
  <g opacity="0.5" filter="url(#b160)">
    <polygon points="-200,900 800,900 200,0" fill="url(#beamGrad1)">
      <animateTransform attributeName="transform" type="rotate" values="-10 800 900; 10 800 900; -10 800 900" dur="18s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Layer 5: Massive Cyan Beam (Background) -->
  <g opacity="0.4" filter="url(#b160)">
    <polygon points="1800,900 800,900 1400,0" fill="url(#beamGrad2)">
      <animateTransform attributeName="transform" type="rotate" values="15 800 900; -15 800 900; 15 800 900" dur="22s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Layer 6: Mid-Depth Crowd Mass (Blurred) -->
  <path d="M0,750 Q400,720 800,740 Q1200,760 1600,730 V900 H0 Z" fill="#080814" filter="url(#b80)"/>
  <path d="M0,780 Q300,760 600,770 Q1000,785 1600,760 V900 H0 Z" fill="#05050C" filter="url(#b40)"/>

  <!-- Layer 7: Crowd Texture / Stadium Seats -->
  <g opacity="0.3" fill="#1A1030">
    <circle cx="200" cy="820" r="150" filter="url(#b120)"/>
    <circle cx="600" cy="800" r="180" filter="url(#b120)"/>
    <circle cx="1000" cy="810" r="160" filter="url(#b120)"/>
    <circle cx="1400" cy="790" r="200" filter="url(#b120)"/>
  </g>

  <!-- Layer 8: Stage Platform -->
  <path d="M450,850 L1150,850 L1200,900 L400,900 Z" fill="#0A0A14"/>
  <path d="M470,855 L1130,855 L1170,895 L430,895 Z" fill="#1A0E2E"/>
  <rect x="400" y="895" width="800" height="5" fill="#00D9FF" opacity="0.6" filter="url(#b40)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 9: Hero Champion Subject (OFF-CENTER Right) -->
  <g transform="translate(900, 480)">
    <!-- Breath Animation -->
    <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="6s" repeatCount="indefinite" additive="sum"/>
    
    <!-- Main Silhouette -->
    <path d="M-35,350 L35,350 L30,200 L45,150 L60,130 L65,110 L60,90 L50,80 L40,50 L45,20 L25,30 L15,60 L10,80 L-20,100 L-35,120 L-30,150 L-20,200 Z" fill="#0A0A14"/>
    
    <!-- Cape / Cloth Flowing -->
    <path d="M-20,100 Q-80,150 -100,280 L-60,300 Q-40,200 -20,150 Z" fill="#0A0A14">
      <animateTransform attributeName="transform" type="skewX" values="0;-5;0" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M30,200 Q90,220 110,320 L70,330 Q60,250 30,220 Z" fill="#0A0A14" opacity="0.8">
      <animateTransform attributeName="transform" type="skewX" values="0;5;0" dur="7s" repeatCount="indefinite"/>
    </path>

    <!-- Raised Weapon (Trophy/Staff) -->
    <path d="M65,110 L75,-120" stroke="#0A0A14" stroke-width="8" stroke-linecap="round"/>
    <circle cx="75" cy="-120" r="15" fill="#0A0A14"/>
    <path d="M75,-135 L90,-110 L75,-105 L60,-110 Z" fill="#FFD23D" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="75" cy="-120" r="25" fill="none" stroke="#FFD23D" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="25;35;25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Rim Light (Warm Gold) -->
    <path d="M-35,350 L35,350 L30,200 L45,150 L60,130 L65,110 L60,90 L50,80 L40,50 L45,20 L25,30 L15,60 L10,80 L-20,100 L-35,120 L-30,150 L-20,200 Z" fill="none" stroke="#FFD23D" stroke-width="3" opacity="0.7" filter="url(#b40)"/>
    <path d="M65,110 L75,-120" stroke="#FFD23D" stroke-width="4" opacity="0.8" filter="url(#b40)"/>
    
    <!-- Rim Light (Cyan Cool Fill) -->
    <path d="M-35,350 L35,350 L30,200 L45,150 L60,130 L65,110 L60,90 L50,80 L40,50 L45,20 L25,30 L15,60 L10,80 L-20,100 L-35,120 L-30,150 L-20,200 Z" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.4" filter="url(#b40)"/>
  </g>

  <!-- Layer 10: Hero Backlight Glow Pool -->
  <ellipse cx="975" cy="850" rx="300" ry="60" fill="url(#spotlightGlow)" opacity="0.6" filter="url(#b80)">
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Layer 11: Sweeping Volumetric Spotlights (Foreground Beams) -->
  <g opacity="0.6" filter="url(#b120)">
    <polygon points="200,900 975,850 400,0" fill="url(#beamGrad1)">
      <animateTransform attributeName="transform" type="rotate" values="-20 975 850; 10 975 850; -20 975 850" dur="12s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g opacity="0.5" filter="url(#b120)">
    <polygon points="1400,900 975,850 1200,0" fill="url(#beamGrad2)">
      <animateTransform attributeName="transform" type="rotate" values="15 975 850; -25 975 850; 15 975 850" dur="16s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g opacity="0.4" filter="url(#b160)">
    <polygon points="600,900 975,850 800,100" fill="url(#beamGrad1)">
      <animateTransform attributeName="transform" type="rotate" values="-5 975 850; 5 975 850; -5 975 850" dur="10s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Layer 12: Vertical Light Shafts (Stadium Structure Rays) -->
  <g opacity="0.2" filter="url(#b80)">
    <rect x="0" y="0" width="100" height="900" fill="#00D9FF">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="300" y="0" width="80" height="900" fill="#FFD23D">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="10s" repeatCount="indefinite"/>
    </rect>
    <rect x="700" y="0" width="120" height="900" fill="#00D9FF">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <rect x="1100" y="0" width="90" height="900" fill="#FFD23D">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect x="1450" y="0" width="150" height="900" fill="#00D9FF">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="11s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Layer 13: Crowd Phone Lights / Pyro Sparkles (Bottom Edge) -->
  <g fill="#FFD23D">
    <circle cx="150" cy="820" r="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="840" r="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="810" r="2.5" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="830" r="1" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="815" r="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="825" r="2" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1300" cy="845" r="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="820" r="2.5" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="835" r="1" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#00D9FF">
    <circle cx="180" cy="835" r="1.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="815" r="2" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="840" r="1" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="825" r="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1250" cy="840" r="1.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1350" cy="815" r="2" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="830" r="1" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer 14: Floating Atmospheric Particles / Confetti / Dust (Drifting Up) -->
  <g fill="#FFD23D" opacity="0.6">
    <circle cx="400" cy="700" r="3">
      <animateMotion path="M0,0 Q20,-100 -10,-300" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="750" r="2">
      <animateMotion path="M0,0 Q-30,-150 20,-400" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="720" r="2.5">
      <animateMotion path="M0,0 Q10,-200 -20,-500" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="680" r="3">
      <animateMotion path="M0,0 Q-20,-100 10,-350" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="760" r="2">
      <animateMotion path="M0,0 Q30,-180 -15,-450" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="780" r="2.5">
      <animateMotion path="M0,0 Q-10,-120 25,-380" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#00D9FF" opacity="0.5">
    <circle cx="350" cy="740" r="2">
      <animateMotion path="M0,0 Q15,-180 -25,-420" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="780" r="3">
      <animateMotion path="M0,0 Q-25,-100 15,-320" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="760" r="1.5">
      <animateMotion path="M0,0 Q20,-220 -10,-480" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="720" r="2.5">
      <animateMotion path="M0,0 Q-15,-140 20,-360" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1250" cy="740" r="2">
      <animateMotion path="M0,0 Q10,-160 -20,-400" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="800" r="1.5">
      <animateMotion path="M0,0 Q-20,-100 30,-340" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer 15: Foreground Atmosphere / Haze -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#skyGrad)" opacity="0.1" filter="url(#turb)">
    <animate attributeName="opacity" values="0.1;0.15;0.1" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 16: Top Vignette for Title Readability -->
  <rect x="0" y="0" width="1600" height="450" fill="url(#skyGrad)" opacity="0.3" filter="url(#b40)"/>
  <rect x="0" y="0" width="1600" height="200" fill="#0A0A14" opacity="0.4" filter="url(#b80)"/>

  <!-- Layer 17: Foreground Stage Edge Glow -->
  <path d="M400,900 L1200,900" stroke="#FFD23D" stroke-width="4" opacity="0.8" filter="url(#b40)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M430,895 L1170,895" stroke="#00D9FF" stroke-width="2" opacity="0.6" filter="url(#b40)">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- Layer 18: Lens Flare / Light Artifact near Hero -->
  <circle cx="850" cy="400" r="80" fill="#FFD23D" opacity="0.1" filter="url(#b120)">
    <animate attributeName="r" values="80;100;80" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="350" r="60" fill="#00D9FF" opacity="0.1" filter="url(#b120)">
    <animate attributeName="r" values="60;80;60" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Layer 19: Subtle Horizontal Light Sweep across stage -->
  <rect x="400" y="880" width="800" height="20" fill="#00D9FF" opacity="0" filter="url(#b40)">
    <animate attributeName="opacity" values="0;0.4;0" dur="7s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="-50,0;50,0;-50,0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 20: Final Top Gradient Shift for Sky Life -->
  <rect x="0" y="0" width="1600" height="100" fill="#FFD23D" opacity="0" filter="url(#b160)">
    <animate attributeName="opacity" values="0;0.1;0" dur="25s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="1600" height="100" fill="#00D9FF" opacity="0" filter="url(#b160)">
    <animate attributeName="opacity" values="0;0.08;0" dur="30s" repeatCount="indefinite"/>
  </rect>
</svg>