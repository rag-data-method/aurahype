<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0536" />
      <stop offset="60%" stop-color="#0d0221" />
      <stop offset="100%" stop-color="#05010d" />
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff0055" stroke-width="1" opacity="0.15" />
    </pattern>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#00ccff" />
    </linearGradient>

    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffff00" />
      <stop offset="100%" stop-color="#ffaa00" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="35" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="thinGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <g id="plus" filter="url(#thinGlow)">
      <path d="M 0 0 L 15 0 M 7.5 -7.5 L 7.5 7.5" stroke="#00ffff" stroke-width="4" stroke-linecap="round" />
      <animateTransform attributeName="transform" type="scale" values="0; 1.5; 0" dur="2.5s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="2.5s" begin="0s" repeatCount="indefinite" />
    </g>

    <g id="star">
      <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3" fill="#ffff00" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.2; 1" dur="1.5s" repeatCount="indefinite" />
    </g>

    <g id="bubble">
      <circle cx="0" cy="0" r="8" fill="#ff00ff" opacity="0.8" />
      <circle cx="-2" cy="-2" r="3" fill="#ffffff" opacity="0.9" />
    </g>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="40 40" dur="1.5s" repeatCount="indefinite" />
  </rect>

  <g opacity="0.4">
    <polygon points="0,0 100,-200 200,0" fill="#ff0055" />
    <polygon points="800,0 700,-200 600,0" fill="#aa00ff" />
    <polygon points="0,600 100,800 200,600" fill="#00ffff" />
    <polygon points="800,600 700,800 600,600" fill="#ff00ff" />
  </g>

  <g>
    <circle cx="400" cy="300" r="0" stroke="#ff0055" stroke-width="120" fill="none" opacity="0">
      <animate attributeName="r" values="0; 350" dur="8s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6; 0" dur="8s" begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="0" stroke="#aa00ff" stroke-width="100" fill="none" opacity="0">
      <animate attributeName="r" values="0; 350" dur="8s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5; 0" dur="8s" begin="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="0" stroke="#ff0055" stroke-width="80" fill="none" opacity="0">
      <animate attributeName="r" values="0; 350" dur="8s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4; 0" dur="8s" begin="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="0" stroke="#aa00ff" stroke-width="60" fill="none" opacity="0">
      <animate attributeName="r" values="0; 350" dur="8s" begin="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3; 0" dur="8s" begin="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="0" stroke="#ff0055" stroke-width="40" fill="none" opacity="0">
      <animate attributeName="r" values="0; 350" dur="8s" begin="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2; 0" dur="8s" begin="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="0" stroke="#aa00ff" stroke-width="20" fill="none" opacity="0">
      <animate attributeName="r" values="0; 350" dur="8s" begin="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.15; 0" dur="8s" begin="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="0" stroke="#ff0055" stroke-width="10" fill="none" opacity="0">
      <animate attributeName="r" values="0; 350" dur="8s" begin="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1; 0" dur="8s" begin="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="0" stroke="#aa00ff" stroke-width="5" fill="none" opacity="0">
      <animate attributeName="r" values="0; 350" dur="8s" begin="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1; 0" dur="8s" begin="7s" repeatCount="indefinite" />
    </circle>
  </g>

  <g id="rotating-rings" filter="url(#glow)">
    <circle cx="400" cy="300" r="0" stroke="#ff0055" stroke-width="8" stroke-dasharray="20 40" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="r" values="0; 280" dur="6s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="stroke-dashoffset" values="0; -120" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0" dur="6s" begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="0" stroke="#aa00ff" stroke-width="12" stroke-dasharray="50 70" stroke-linecap="round" fill="none" opacity="0">
      <animate attributeName="r" values="0; 220" dur="7s" begin="1.5s" repeatCount="indefinite" />
      <animate attributeName="stroke-dashoffset" values="0; 120" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0" dur="7s" begin="1.5s" repeatCount="indefinite" />
    </circle>
    
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="20s" repeatCount="indefinite" />
  </g>

  <g id="small-nucleus" filter="url(#glow)">
    <circle cx="400" cy="300" r="40" fill="#ff0055">
      <animate attributeName="r" values="30; 50; 30" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#ff0055; #ff3300; #ff0055" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="25" fill="#ffffff" opacity="0.9">
      <animate attributeName="r" values="15; 30; 15" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <g id="outer-ring-system" filter="url(#glow)">
    <circle cx="400" cy="300" r="60" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.8">
      <animate attributeName="r" values="40; 80; 40" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 0.2; 0.8" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="90" stroke="#ff00ff" stroke-width="6" stroke-dasharray="10 20" fill="none" opacity="0.6">
      <animate attributeName="r" values="70; 110; 70" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="stroke-dashoffset" values="0; 30" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="10s" repeatCount="indefinite" />
    </circle>
  </g>

  <path d="M 0 300 L 800 300 M 400 0 L 400 600" stroke="#00ffff" stroke-width="2" opacity="0.3">
    <animate attributeName="opacity" values="0.3; 0.1; 0.3" dur="2s" repeatCount="indefinite" />
  </path>

  <g filter="url(#heavyGlow)">
    <polygon points="400,0 450,250 700,300 450,350 400,600 350,350 100,300 350,250" fill="#ff0055" opacity="0.6">
      <animateTransform attributeName="transform" type="scale" values="0; 1.5; 0" dur="4s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6; 0" dur="4s" begin="0s" repeatCount="indefinite" />
    </polygon>
    <polygon points="400,0 430,240 700,300 430,360 400,600 370,360 100,300 370,240" fill="#aa00ff" opacity="0.5">
      <animateTransform attributeName="transform" type="scale" values="0; 1.5; 0" dur="4s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5; 0" dur="4s" begin="2s" repeatCount="indefinite" />
    </polygon>
  </g>

  <use href="#plus" x="200" y="150">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3s" repeatCount="indefinite" />
  </use>
  <use href="#plus" x="600" y="150">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 20; 0 0" dur="3.5s" repeatCount="indefinite" />
  </use>
  <use href="#plus" x="150" y="450">
    <animateTransform attributeName="transform" type="translate" values="0 0; 20 0; 0 0" dur="4s" repeatCount="indefinite" />
  </use>
  <use href="#plus" x="650" y="450">
    <animateTransform attributeName="transform" type="translate" values="0 0; -20 0; 0 0" dur="2.5s" repeatCount="indefinite" />
  </use>
  <use href="#plus" x="100" y="300">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 30; 0 0" dur="3s" repeatCount="indefinite" />
  </use>
  <use href="#plus" x="700" y="300">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -30; 0 0" dur="3.2s" repeatCount="indefinite" />
  </use>

  <g filter="url(#glow)">
    <rect x="250" y="440" width="300" height="60" rx="15" fill="#0d0221" stroke="#ff0055" stroke-width="4" />
    <rect x="260" y="450" width="280" height="40" rx="10" fill="#ff0055">
      <animate attributeName="width" values="0; 280; 0" dur="3s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="x" values="400; 260; 400" dur="3s" begin="0s" repeatCount="indefinite" />
    </rect>
    <text x="400" y="475" font-family="Arial Black, Impact, sans-serif" font-size="32" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="4">
      AO VIVO
      <animate attributeName="opacity" values="1; 0.5; 1" dur="0.8s" repeatCount="indefinite" />
    </text>
    <circle cx="270" cy="470" r="8" fill="#00ffff" filter="url(#thinGlow)">
       <animate attributeName="cx" values="260; 540; 260" dur="3s" begin="0s" repeatCount="indefinite" />
    </circle>
  </g>

  <g>
    <circle cx="280" cy="160" r="6" fill="#00ffff" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" dur="2s" begin="0.2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -30; 0 0" dur="2s" begin="0.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="180" r="4" fill="#ffff00" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" dur="1.5s" begin="0.5s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; 20 0; 0 0" dur="1.5s" begin="0.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="480" cy="140" r="5" fill="#ff00ff" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" dur="2.2s" begin="0s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; -20 0; 0 0" dur="2.2s" begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="520" cy="170" r="7" fill="#00ffff" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" dur="1.8s" begin="0.8s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 20; 0 0" dur="1.8s" begin="0.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="250" r="5" fill="#ff0055" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" dur="2.5s" begin="1.2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -10; 0 0" dur="2.5s" begin="1.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="250" r="6" fill="#ffff00" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" dur="2s" begin="0.4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 10; 0 0" dur="2s" begin="0.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="250" cy="400" r="4" fill="#00ffff" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" dur="1.6s" begin="0s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; 15 15; 0 0" dur="1.6s" begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="550" cy="400" r="5" fill="#ff00ff" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" dur="1.9s" begin="0.6s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0 0; -15 -15; 0 0" dur="1.9s" begin="0.6s" repeatCount="indefinite" />
    </circle>
  </g>

  <g>
    <path d="M 50 100 L 70 100 L 70 120 L 50 120 Z M 60 90 L 60 130 M 40 110 L 80 110" stroke="#00ffff" stroke-width="3" fill="none" filter="url(#thinGlow)">
      <animateTransform attributeName="transform" type="translate" values="0 2; 0 -2; 0 2" dur="2s" repeatCount="indefinite" />
    </path>

    <path d="M 700 120 L 720 100 L 740 120 L 720 140 Z" fill="#ff00ff" opacity="0.6" filter="url(#thinGlow)">
      <animateTransform attributeName="transform" type="rotate" values="0 720 120; 360 720 120" dur="4s" repeatCount="indefinite" />
    </path>

    <path d="M 100 480 L 120 500 L 100 520 L 80 500 Z" fill="#ffff00" opacity="0.6" filter="url(#thinGlow)">
      <animateTransform attributeName="transform" type="rotate" values="0 100 500; -360 100 500" dur="5s" repeatCount="indefinite" />
    </path>

    <path d="M 680 480 Q 700 460 720 480 T 760 480" stroke="#ff0055" stroke-width="4" fill="none" filter="url(#thinGlow)">
      <animate attributeName="d" values="M 680 480 Q 700 460 720 480 T 760 480; M 680 480 Q 700 500 720 480 T 760 480; M 680 480 Q 700 460 720 480 T 760 480" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <use href="#star" x="150" y="100" />
  <use href="#star" x="650" y="120" />
  <use href="#star" x="120" y="500" />
  <use href="#star" x="680" y="480" />
  <use href="#star" x="300" y="80" />
  <use href="#star" x="500" y="520" />

  <use href="#bubble" x="220" y="320">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -50; 0 0" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0; 1; 0" dur="3s" repeatCount="indefinite" />
  </use>
  <use href="#bubble" x="580" y="280">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 50; 0 0" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0; 1; 0" dur="4s" repeatCount="indefinite" />
  </use>

  <circle cx="400" cy="300" r="300" fill="none" stroke="url(#cyanGrad)" stroke-width="2" stroke-dasharray="5 15" opacity="0.3" filter="url(#thinGlow)">
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="15s" repeatCount="indefinite" />
  </circle>

  <circle cx="400" cy="300" r="180" fill="none" stroke="url(#yellowGrad)" stroke-width="3" stroke-dasharray="20 30" opacity="0.4" filter="url(#thinGlow)">
    <animateTransform attributeName="transform" type="rotate" from="360 400 300" to="0 400 300" dur="10s" repeatCount="indefinite" />
  </circle>

  <ellipse cx="400" cy="300" rx="350" ry="150" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.2" filter="url(#thinGlow)">
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="20s" repeatCount="indefinite" />
  </ellipse>
</svg>