<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="blurShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5EDDC"/>
      <stop offset="100%" stop-color="#C9A85C" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="glassBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#A8D8EA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#F5EDDC"/>
  
  <path d="M 200 750 Q 600 700 1000 730 T 1600 720 L 1600 900 L 200 900 Z" fill="url(#sandGrad)" opacity="0.9"/>
  
  <ellipse cx="1050" cy="780" rx="100" ry="30" fill="#C9A85C" opacity="0.8" filter="url(#blurShadow)">
    <animate attributeName="rx" values="100;94;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.75;0.8" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="640" cy="790" rx="80" ry="25" fill="#C9A85C" opacity="0.8" filter="url(#blurShadow)">
    <animate attributeName="rx" values="80;74;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.75;0.8" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  
  <path fill="url(#waterGrad)" opacity="0.85">
    <animate attributeName="d" 
      values="M 0 820 Q 400 800 800 820 T 1600 820 L 1600 900 L 0 900 Z;
              M 0 830 Q 400 810 800 830 T 1600 830 L 1600 900 L 0 900 Z;
              M 0 820 Q 400 800 800 820 T 1600 820 L 1600 900 L 0 900 Z" 
      dur="6s" repeatCount="indefinite"/>
  </path>
  
  <g>
    <animateTransform attributeName="transform" type="translate" values="1020,620; 1020,610; 1020,620" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-2 50 140; 2 50 140; -2 50 140" dur="7s" repeatCount="indefinite" additive="sum"/>
    
    <path d="M 0 100 L 100 100 L 100 200 Q 100 220 80 220 L 20 220 Q 0 220 0 200 Z" fill="url(#glassBody)" stroke="#A8D8EA" stroke-width="3" stroke-opacity="0.9"/>
    <path d="M 20 100 L 20 40 Q 20 20 50 20 Q 80 20 80 40 L 80 100" fill="url(#glassBody)" stroke="#A8D8EA" stroke-width="3" stroke-opacity="0.9"/>
    
    <path d="M 5 105 L 5 200 Q 5 215 20 215" fill="none" stroke="#A8D8EA" stroke-width="2" opacity="0.9"/>
    <path d="M 95 105 L 95 200 Q 95 215 80 215" fill="none" stroke="#A8D8EA" stroke-width="2" opacity="0.9"/>
    
    <g>
      <animateTransform attributeName="transform" type="translate" values="38,125; 40,127; 38,125" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 12 40; 3 12 40; 0 12 40" dur="8s" repeatCount="indefinite" additive="sum"/>
      <rect x="0" y="0" width="24" height="90" rx="2" fill="#FFFBEB" opacity="0.9"/>
      <line x1="6" y1="18" x2="18" y2="18" stroke="#C9A85C" stroke-width="1.5" opacity="0.9"/>
      <line x1="6" y1="30" x2="18" y2="30" stroke="#C9A85C" stroke-width="1.5" opacity="0.9"/>
      <line x1="6" y1="42" x2="18" y2="42" stroke="#C9A85C" stroke-width="1.5" opacity="0.9"/>
      <line x1="6" y1="54" x2="18" y2="54" stroke="#C9A85C" stroke-width="1.5" opacity="0.9"/>
      <line x1="6" y1="66" x2="15" y2="66" stroke="#C9A85C" stroke-width="1.5" opacity="0.9"/>
    </g>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 35 22.5; 2 35 22.5; 0 35 22.5" dur="3s" repeatCount="indefinite"/>
      <rect x="30" y="15" width="10" height="15" rx="2" fill="#C9A85C"/>
    </g>
    
    <path d="M 15 130 L 15 200" stroke="#FFFBEB" stroke-width="4" stroke-linecap="round" opacity="0.9" filter="url(#glassBlur)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M 85 130 L 85 180" stroke="#A8D8EA" stroke-width="3" stroke-linecap="round" opacity="0.9">
      <animate attributeName="opacity" values="0.8;0.95;0.8" dur="5s" repeatCount="indefinite"/>
    </path>
    <ellipse cx="50" cy="60" rx="15" ry="8" fill="#FFFBEB" opacity="0.8" filter="url(#softBlur)"/>
  </g>
  
  <g>
    <animateTransform attributeName="transform" type="translate" values="600,700; 600,695; 600,700" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 50 50; -3 50 50; 0 50 50" dur="6s" repeatCount="indefinite" additive="sum"/>
    
    <path d="M 50 85 Q 20 85 10 55 Q 5 25 30 15 Q 60 5 80 25 Q 95 45 85 65 Q 75 85 50 85" fill="#FFFBEB" stroke="#C9A85C" stroke-width="3" opacity="0.9"/>
    <path d="M 50 85 Q 35 75 30 55" fill="none" stroke="#C9A85C" stroke-width="2" opacity="0.9"/>
    <path d="M 50 85 Q 60 70 70 50" fill="none" stroke="#C9A85C" stroke-width="2" opacity="0.9"/>
    <path d="M 30 55 Q 40 40 60 35" fill="none" stroke="#C9A85C" stroke-width="2" opacity="0.9"/>
    <path d="M 60 35 Q 75 40 80 25" fill="none" stroke="#C9A85C" stroke-width="2" opacity="0.9"/>
    
    <ellipse cx="50" cy="80" rx="15" ry="8" fill="#C9A85C" opacity="0.8"/>
    
    <ellipse cx="35" cy="30" rx="8" ry="5" fill="#FFFBEB" opacity="0.9" transform="rotate(-20 35 30)">
      <animate attributeName="opacity" values="0.9;0.7;0.9" dur="4s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <path fill="#A8D8EA" opacity="0.9">
    <animate attributeName="d" 
      values="M 0 860 Q 300 840 600 860 T 1200 850 L 1600 860 L 1600 900 L 0 900 Z;
              M 0 870 Q 300 850 600 870 T 1200 860 L 1600 870 L 1600 900 L 0 900 Z;
              M 0 860 Q 300 840 600 860 T 1200 850 L 1600 860 L 1600 900 L 0 900 Z" 
      dur="5s" repeatCount="indefinite"/>
  </path>
  
  <circle cx="400" cy="870" r="3" fill="#FFFBEB" opacity="0.9">
    <animate attributeName="cy" values="870;865;870" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="880" r="2" fill="#FFFBEB" opacity="0.9">
    <animate attributeName="cy" values="880;875;880" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="875" r="4" fill="#FFFBEB" opacity="0.9">
    <animate attributeName="cy" values="875;870;875" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="890" r="3" fill="#FFFBEB" opacity="0.9">
    <animate attributeName="cy" values="890;885;890" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="885" r="2" fill="#FFFBEB" opacity="0.9">
    <animate attributeName="cy" values="885;880;885" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  
  <g transform="translate(1040, 650)">
    <path d="M 0 -10 L 2 0 L 0 10 L -2 0 Z" fill="#FFFBEB" opacity="0">
      <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.95;0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M -10 0 L 0 2 L 10 0 L 0 -2 Z" fill="#FFFBEB" opacity="0">
      <animateTransform attributeName="transform" type="scale" values="0;0.8;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <path d="M 200 -100 L 500 -100 L 700 1000 L 400 1000 Z" fill="#A8D8EA" opacity="0.1" style="mix-blend-mode: overlay">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="8s" repeatCount="indefinite"/>
  </path>
  <path d="M 1100 -100 L 1400 -100 L 1200 1000 L 900 1000 Z" fill="#A8D8EA" opacity="0.1" style="mix-blend-mode: overlay">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="10s" repeatCount="indefinite"/>
  </path>
</svg>