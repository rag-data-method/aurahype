<rect width="100%" height="100%" fill="url(#skyGrad)" opacity="0.05" style="mix-blend-mode: overlay; pointer-events: none;">
<animate attributeName="opacity" values="0.05;0.1;0.05" dur="15s" repeatCount="indefinite"/>
