</path>

<path d="M 0,700 Q 150,680 300,720 T 700,690 T 1600,750 L 1600,900 L 0,900 Z" fill="url(#hillGrad)" filter="url(#b20)">
<animate attributeName="d" values="M 0,700 Q 150,680 300,720 T 700,690 T 1600,750 L 1600,900 L 0,900 Z;M 0,710 Q 150,670 300,710 T 700,700 T 1600,740 L 1600,900 L 0,900 Z;M 0,700 Q 150,680 300,720 T 700,690 T 1600,750 L 1600,900 L 0,900 Z" dur="32s" repeatCount="indefinite"/>
</path>

<path d="M 0,750 Q 100,730 250,770 T 600,740 T 1600,800 L 1600,900 L 0,900 Z" fill="#1A1A2E" opacity="0.9"/>

<g transform="translate(1050, 420)">
<animateTransform attributeName="transform" type="translate" values="1050,420; 1048,422; 1050,420" dur="10s" repeatCount="indefinite" additive="replace"/>

<use href="#cloakPath" fill="#1A1A2E" transform="translate(0,10)">
<animateTransform attributeName="transform" type="rotate" values="0; 1.5; 0; -1; 0" dur="8s" repeatCount="indefinite" additive="sum"/>
</use>

<use href="#cloakPath" fill="#E54B9C" opacity="0.6" transform="translate(5,8)" filter="url(#b20)">
<animate attributeName="opacity" values="0.6;0.8;0.6" dur="6s" repeatCount="indefinite"/>
<animateTransform attributeName="transform" type="rotate" values="0; 2; 0; -1.5; 0" dur="7s" repeatCount="indefinite" additive="sum"/>
</use>

<path d="M 0,0 C -20,-15 -35,-30 -40,-55 C -42,-75 -35,-90 -20,-100 C -5,-108 15,-108 30,-100 C 45,-92 52,-75 50,-55 C 48,-35 35,-15 15,0 C 10,2 -5,2 0,0 Z" fill="#1A1A2E"/>
<path d="M 0,0 C -20,-15 -35,-30 -40,-55 C -42,-75 -35,-90 -20,-100 C -5,-108 15,-108 30,-100 C 45,-92 52,-75 50,-55 C 48,-35 35,-15 15,0 C 10,2 -5,2 0,0 Z" fill="#FF9F73" opacity="0.7" filter="url(#b20)">
<animate attributeName="opacity" values="0.7;0.9;0.7" dur="5s" repeatCount="indefinite"/>
</path>
</g>

