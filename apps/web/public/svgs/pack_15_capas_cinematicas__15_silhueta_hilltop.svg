</g>

<g opacity="0.4">
<path d="M 1200,200 Q 1250,180 1300,220 T 1400,200" stroke="#FF9F73" stroke-width="2" fill="none" filter="url(#b20)">
<animate attributeName="d" values="M 1200,200 Q 1250,180 1300,220 T 1400,200;M 1200,210 Q 1250,190 1300,230 T 1400,210;M 1200,200 Q 1250,180 1300,220 T 1400,200" dur="20s" repeatCount="indefinite"/>
</path>
<path d="M 1250,250 Q 1300,230 1350,270 T 1450,250" stroke="#E54B9C" stroke-width="1.5" fill="none" filter="url(#b20)">
<animate attributeName="d" values="M 1250,250 Q 1300,230 1350,270 T 1450,250;M 1250,260 Q 1300,240 1350,280 T 1450,260;M 1250,250 Q 1300,230 1350,270 T 1450,250" dur="24s" repeatCount="indefinite"/>
</path>
