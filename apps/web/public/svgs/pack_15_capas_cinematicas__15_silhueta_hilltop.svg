<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
<defs>
<radialGradient id="sunGrad" cx="0.8" cy="0.55" r="0.5" fx="0.75" fy="0.5">
<stop offset="0%" stop-color="#FF9F73" stop-opacity="1">
<animate attributeName="stop-color" values="#FF9F73;#FFC8A5;#FF9F73" dur="18s" repeatCount="indefinite"/>
</stop>
<stop offset="30%" stop-color="#E54B9C" stop-opacity="0.8">
<animate attributeName="stop-color" values="#E54B9C;#FF6FAA;#E54B9C" dur="18s" repeatCount="indefinite"/>
</stop>
<stop offset="70%" stop-color="#6B4FBB" stop-opacity="0.4"/>
<stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
</radialGradient>

<linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1A1A2E">
<animate attributeName="stop-color" values="#1A1A2E;#2A1A40;#1A1A2E" dur="25s" repeatCount="indefinite"/>
</stop>
<stop offset="35%" stop-color="#6B4FBB">
<animate attributeName="stop-color" values="#6B4FBB;#8050C0;#6B4FBB" dur="25s" repeatCount="indefinite"/>
</stop>
<stop offset="65%" stop-color="#E54B9C">
<animate attributeName="stop-color" values="#E54B9C;#FF5A9C;#E54B9C" dur="25s" repeatCount="indefinite"/>
</stop>
<stop offset="100%" stop-color="#FF9F73">
<animate attributeName="stop-color" values="#FF9F73;#FFBF90;#FF9F73" dur="25s" repeatCount="indefinite"/>
</stop>
</linearGradient>

<linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1A1A2E" stop-opacity="0.9"/>
<stop offset="100%" stop-color="#1A1A2E" stop-opacity="1"/>
</linearGradient>

<filter id="b20"><feGaussianBlur stdDeviation="20"/></filter>
<filter id="b60"><feGaussianBlur stdDeviation="60"/></filter>
<filter id="b90"><feGaussianBlur stdDeviation="90"/></filter>
<filter id="b120"><feGaussianBlur stdDeviation="120"/></filter>

<g id="particle">
<circle cx="0" cy="0" r="1.5" fill="#FF9F73" opacity="0.6"/>
</g>

<path id="cloakPath" d="M 0,0 C -15,-5 -35,10 -45,35 C -55,65 -50,100 -55,140 C -60,180 -65,230 -70,300 C -65,340 -50,375 -30,400 C -10,420 10,425 25,420 C 45,415 60,400 70,380 C 75,360 75,340 80,310 C 85,250 90,200 85,150 C 80,100 65,60 50,30 C 40,10 20,-5 0,0 Z"/>
</defs>

<rect width="100%" height="100%" fill="url(#skyGrad)"/>

<circle cx="1150" cy="450" r="350" fill="url(#sunGrad)" filter="url(#b120)">
<animate attributeName="r" values="350;370;350" dur="20s" repeatCount="indefinite"/>
</circle>

<circle cx="1150" cy="450" r="180" fill="#FF9F73" opacity="0.15" filter="url(#b90)">
<animate attributeName="opacity" values="0.15;0.25;0.15" dur="14s" repeatCount="indefinite"/>
</circle>

<path d="M 0,500 Q 200,450 400,520 T 900,480 T 1600,550 L 1600,900 L 0,900 Z" fill="#6B4FBB" opacity="0.15" filter="url(#b120)">
<animate attributeName="d" values="M 0,500 Q 200,450 400,520 T 900,480 T 1600,550 L 1600,900 L 0,900 Z;M 0,510 Q 200,460 400,510 T 900,490 T 1600,540 L 1600,900 L 0,900 Z;M 0,500 Q 200,450 400,520 T 900,480 T 1600,550 L 1600,900 L 0,900 Z" dur="22s" repeatCount="indefinite"/>
</path>

<path d="M 0,550 Q 300,480 600,560 T 1200,520 T 1600,600 L 1600,900 L 0,900 Z" fill="#E54B9C" opacity="0.1" filter="url(#b90)">
<animate attributeName="d" values="M 0,550 Q 300,480 600,560 T 1200,520 T 1600,600 L 1600,900 L 0,900 Z;M 0,560 Q 300,470 600,550 T 1200,530 T 1600,590 L 1600,900 L 0,900 Z;M 0,550 Q 300,480 600,560 T 1200,520 T 1600,600 L 1600,900 L 0,900 Z" dur="25s" repeatCount="indefinite"/>
</path>

<path d="M 0,600 Q 250,550 500,620 T 1000,580 T 1600,650 L 1600,900 L 0,900 Z" fill="#1A1A2E" opacity="0.25" filter="url(#b60)">
