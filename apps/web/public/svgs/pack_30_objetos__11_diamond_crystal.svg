<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#A8D8EA;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D8EA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5BA3D0;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="g3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#5BA3D0;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="f1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="f2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="f3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#0F1828"/>
  
  <ellipse cx="800" cy="580" rx="100" ry="25" fill="#000" opacity="0.35" filter="url(#f1)">
    <animate attributeName="rx" values="100;90;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.25;0.35" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <g transform="translate(800, 480)">
    <animateTransform attributeName="transform" type="translate" values="800,470;800,490;800,470" dur="4s" repeatCount="indefinite" additive="replace"/>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
      
      <!-- Pavilion -->
      <polygon points="0,70 -50,0 0,-20 50,0" fill="url(#g2)"/>
      <polygon points="-50,0 -90,-40 -50,-20" fill="#5BA3D0" opacity="0.85"/>
      <polygon points="50,0 90,-40 50,-20" fill="#5BA3D0" opacity="0.8"/>
      <polygon points="-50,-20 0,-20 50,-20 0,-60" fill="url(#g3)" opacity="0.9"/>
      
      <!-- Upper -->
      <polygon points="-90,-40 -50,0 -50,-20" fill="#A8D8EA" opacity="0.9"/>
      <polygon points="90,-40 50,0 50,-20" fill="#A8D8EA" opacity="0.85"/>
      <polygon points="-90,-40 -50,-80 0,-60 -50,-20" fill="url(#g1)"/>
      <polygon points="90,-40 50,-80 0,-60 50,-20" fill="#A8D8EA" opacity="0.95"/>
      <polygon points="-50,-80 0,-100 0,-60" fill="#FFFFFF" opacity="0.9"/>
      <polygon points="50,-80 0,-100 0,-60" fill="url(#g1)" opacity="0.85"/>
      
      <!-- Table -->
      <polygon points="-25,-70 0,-75 25,-70 0,-65" fill="#FFFFFF" opacity="0.95"/>
    </g>
    
    <!-- Facet Sparkles Sequence -->
    <g>
      <path d="M-60,-30 L-55,-20 L-60,-10 L-65,-20 Z" fill="#FFFFFF" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2s" begin="0s" repeatCount="indefinite"/>
      </path>
      <path d="M-5,-80 L0,-70 L5,-80 L0,-90 Z" fill="#FFFFFF" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.4s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0;1.2;0" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      </path>
      <path d="M60,-30 L65,-20 L60,-10 L55,-20 Z" fill="#FFFFFF" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      </path>
      <path d="M-5,30 L0,40 L5,30 L0,20 Z" fill="#A8D8EA" opacity="0">
        <animate attributeName="opacity" values="0;0.9;0" dur="2s" begin="1.2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0;1.5;0" dur="2s" begin="1.2s" repeatCount="indefinite"/>
      </path>
      <path d="M-10,-40 L0,-25 L10,-40 L0,-55 Z" fill="#FFFFFF" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.6s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0;0.8;0" dur="2s" begin="1.6s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Rainbow Refractions -->
    <circle cx="-70" cy="-40" r="6" fill="#FFFFFF" opacity="0" filter="url(#f2)">
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0;10;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="-30" r="5" fill="#A8D8EA" opacity="0" filter="url(#f2)">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0;8;0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="40" r="8" fill="#5BA3D0" opacity="0" filter="url(#f2)">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="1.9s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0;12;0" dur="3s" begin="1.9s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <circle cx="800" cy="480" r="180" fill="#A8D8EA" opacity="0.1" filter="url(#f3)">
    <animate attributeName="opacity" values="0.1;0.15;0.1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="180;200;180" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>