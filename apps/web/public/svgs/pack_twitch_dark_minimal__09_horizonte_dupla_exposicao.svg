<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020205"/>
      <stop offset="40%" stop-color="#0c0818"/>
      <stop offset="100%" stop-color="#141024"/>
    </linearGradient>
    
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>

    <mask id="m1">
      <rect width="800" height="600" fill="#fff"/>
      <path d="M0 280 L60 245 110 265 160 225 220 250 280 215 340 240 400 205 460 230 530 195 600 220 660 250 720 215 800 235 L800 600 L0 600 Z" fill="#000"/>
    </mask>

    <g id="stars">
      <circle cx="150" cy="220" r="0.7" fill="#3e2883" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.2;0.9" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="230" cy="160" r="0.5" fill="#2d1f61" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="11s" repeatCount="indefinite"/>
      </circle>
      <circle cx="310" cy="240" r="0.8" fill="#4c3ab8" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="420" cy="140" r="0.6" fill="#3d2a82" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.15;0.7" dur="13s" repeatCount="indefinite"/>
      </circle>
      <circle cx="500" cy="260" r="0.5" fill="#261a54" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.05;0.5" dur="15s" repeatCount="indefinite"/>
      </circle>
      <circle cx="580" cy="180" r="0.9" fill="#5849b8" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.25;0.85" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="680" cy="230" r="0.6" fill="#332366" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="10s" repeatCount="indefinite"/>
      </circle>
      <circle cx="735" cy="120" r="0.5" fill="#1e1540" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="14s" repeatCount="indefinite"/>
      </circle>
      <circle cx="90" cy="260" r="0.5" fill="#5a49a3" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0;0.4" dur="12s" repeatCount="indefinite"/>
      </circle>
      <circle cx="280" cy="100" r="0.7" fill="#422d85" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="9.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="610" cy="130" r="0.7" fill="#493999" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="11.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="750" cy="250" r="0.5" fill="#2a1d59" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="16s" repeatCount="indefinite"/>
      </circle>
    </g>
  </defs>

  <rect width="800" height="600" fill="#050508"/>

  <g id="skyGroup" mask="url(#m1)">
    <rect width="800" height="600" fill="url(#skyGrad)"/>
    
    <g id="starsScene" transform="translate(0, 0)">
      <use href="#stars"/>
      <use href="#stars" transform="translate(100, -80)" opacity="0.5"/>
      <use href="#stars" transform="translate(-120, 50)" opacity="0.3"/>
    </g>

    <path d="M-10 250 Q150 210 280 260 T600 240 T810 270 V280 H-10 Z" fill="#0a0615" opacity="0.85"/>

    <path d="M0 260 Q200 230 350 270 T650 250 T800 275 L800 280 L0 280 Z" fill="#0d0a1a" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.85;0.95" dur="12s" repeatCount="indefinite"/>
    </path>

    <path d="M0 268 Q300 255 500 265 T800 260" stroke="#241b3d" stroke-width="0.6" fill="none" opacity="0.6"/>
    <path d="M0 272 Q250 262 450 270 T800 265" stroke="#1a1330" stroke-width="0.5" fill="none" opacity="0.4"/>
  </g>

  <g id="waterGroup">
    <rect y="280" width="800" height="320" fill="#06050a"/>

    <path d="M0 330 Q200 320 400 335 T800 325" stroke="#1a1033" stroke-width="0.4" fill="none" opacity="0.2" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M0 380 Q300 365 600 385 T800 375" stroke="#1a1033" stroke-width="0.4" fill="none" opacity="0.15" stroke-dasharray="3 5">
      <animate attributeName="stroke-dashoffset" from="0" to="8" dur="10s" repeatCount="indefinite"/>
    </path>
    <path d="M0 450 Q400 430 800 460" stroke="#150d29" stroke-width="0.5" fill="none" opacity="0.1" stroke-dasharray="2 4">
      <animate attributeName="stroke-dashoffset" from="0" to="6" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M0 520 Q250 510 500 525 T800 515" stroke="#0d0920" stroke-width="0.4" fill="none" opacity="0.08" stroke-dasharray="8 12">
      <animate attributeName="stroke-dashoffset" from="0" to="20" dur="15s" repeatCount="indefinite"/>
    </path>

    <path d="M0 280 Q200 265 350 285 T650 270 T800 290 L800 600 L0 600 Z" fill="#0b0815" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.7;0.8" dur="10s" repeatCount="indefinite"/>
    </path>
  </g>

  <g id="horizonLine">
    <path d="M0 280 L60 245 110 265 160 225 220 250 280 215 340 240 400 205 460 230 530 195 600 220 660 250 720 215 800 235" stroke="#d4c8f5" stroke-width="0.8" fill="none" opacity="0.7"/>
  </g>

  <g id="ghostHorizon">
    <path d="M0 280 L60 240 110 262 160 220 220 248 280 210 340 238 400 200 460 227 530 190 600 217 660 248 720 212 800 232" stroke="#7c3aed" stroke-width="0.5" fill="none" opacity="0.15" transform="translate(0, -2)">
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 -2; 0 -6; 0 -2" dur="10s" repeatCount="indefinite"/>
    </path>
    <path d="M0 280 L60 252 110 272 160 232 220 256 280 222 340 246 400 212 460 236 530 202 600 226 660 254 720 220 800 238" stroke="#4c3ab8" stroke-width="0.4" fill="none" opacity="0.1" transform="translate(0, 3)">
      <animate attributeName="opacity" values="0.1;0;0.1" dur="9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 3; 0 8; 0 3" dur="14s" repeatCount="indefinite"/>
    </path>
  </g>

  <g id="corePulse">
    <path d="M0 280 L60 245 110 265 160 225 220 250 280 215 340 240 400 205 460 230 530 195 600 220 660 250 720 215 800 235" stroke="#fff" stroke-width="0.5" fill="none" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.6;0.9" dur="12s" repeatCount="indefinite"/>
    </path>
    <circle cx="400" cy="205" r="1.2" fill="#fff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g id="coreRift">
    <path d="M280 215 L340 240 L400 205 L460 230 L530 195 L600 220" stroke="#7c3aed" stroke-width="0.3" fill="none" opacity="0.35" stroke-dasharray="1 15">
      <animate attributeName="opacity" values="0.35;0.1;0.35" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>

  <g id="reflections" opacity="0.5">
    <path d="M0 280 L60 305 110 290 160 325 220 305 280 340 340 315 400 350 460 325 530 360 600 335 660 305 720 340 800 320" stroke="#7c3aed" stroke-width="0.5" fill="none" opacity="0.3" transform="translate(0, 25)">
      <animate attributeName="opacity" values="0.3;0.05;0.3" dur="15s" repeatCount="indefinite"/>
    </path>
    <path d="M0 280 L60 312 110 295 160 332 220 310 280 348 340 322 400 358 460 332 530 368 600 342 660 310 720 348 800 326" stroke="#4c3ab8" stroke-width="0.3" fill="none" opacity="0.2" transform="translate(0, 30)">
      <animate attributeName="opacity" values="0.2;0;0.2" dur="11s" repeatCount="indefinite"/>
    </path>

    <g stroke="#7c3aed" stroke-width="0.4" fill="none" opacity="0.2">
      <path d="M100 320 l5 30 M120 325 l-3 25 M250 340 l8 20 M270 335 l-6 30 M380 360 l4 15 M420 355 l-5 25 M550 365 l6 20 M580 360 l-4 30"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>

  <rect width="800" height="600" fill="url(#mist)" pointer-events="none" opacity="0.4"/>
</svg>