<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="fog-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5E1" />
      <stop offset="100%" stop-color="#FFE4E1" />
    </linearGradient>
    <linearGradient id="mugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8B4A0" />
      <stop offset="100%" stop-color="#F2C2B9" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)" />

  <g opacity="0.6">
    <circle cx="100" cy="120" r="180" fill="#FDE0D2" filter="url(#fog-soft)" />
    <circle cx="680" cy="450" r="200" fill="#E0D9F3" filter="url(#fog-soft)" />
    <circle cx="400" cy="550" r="150" fill="#E8D5C4" filter="url(#fog-soft)" />
  </g>

  <g stroke="#B89B8A" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="mix-blend-mode: multiply;">
    <path d="M 160 380 A 100 100 0 0 1 350 350" opacity="0.2">
      <animate attributeName="d" values="M 160 380 A 100 100 0 0 1 350 350; M 155 375 A 105 105 0 0 1 355 345; M 160 380 A 100 100 0 0 1 350 350" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" />
    </path>
    <path d="M 650 200 A 120 120 0 0 0 480 320" opacity="0.2">
      <animate attributeName="d" values="M 650 200 A 120 120 0 0 0 480 320; M 645 195 A 125 125 0 0 0 475 315; M 650 200 A 120 120 0 0 0 480 320" dur="8s" begin="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" />
    </path>
  </g>

  <g id="sleepy-cat" stroke="#A19BBC" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <g id="breathing-group" origin="400 330">
      <animateTransform attributeName="transform" type="scale" values="1 1; 1.015 1.015; 1 1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" />

      <path d="M 495 305 A 95 95 0 1 0 290 395 A 55 55 0 1 1 395 295 z" />
      <path d="M 290 395 A 55 55 0 1 1 395 295" />
      <path d="M 395 295 A 95 95 0 1 0 490 305" />

      <path d="M 280 355 Q 275 340 260 345" />
      <path d="M 285 365 Q 270 370 265 360" />
      <path d="M 275 375 Q 260 380 255 370" />

      <path d="M 370 270 Q 385 265 390 280" />
      <path d="M 380 265 Q 395 260 400 275" />
      <path d="M 392 268 Q 405 265 408 280" />

      <path d="M 320 390 Q 325 400 330 395" />
      <path d="M 335 385 Q 340 395 345 390" />
      <path d="M 350 380 Q 355 390 358 385" />

      <path d="M 390 360 Q 395 370 400 365" />
      <path d="M 405 355 Q 410 365 415 360" />

      <path d="M 315 370 Q 305 375 310 380" />
      <path d="M 320 360 Q 310 365 315 370" />

      <path d="M 450 300 Q 460 305 455 315" />
      <path d="M 435 285 Q 445 290 440 300" />

      <path d="M 410 270 Q 425 275 420 290" />
      <path d="M 425 280 Q 440 285 435 300" />

      <ellipse cx="310" cy="435" rx="15" ry="4" opacity="0.3" />
    </g>

    <g stroke="#C8A9A1" stroke-width="1.5" opacity="0.6">
      <path d="M 395 345 Q 390 355 385 360" />
      <path d="M 395 345 Q 400 355 405 360" />
      <path d="M 395 345 Q 395 360 395 365" />

      <path d="M 390 340 L 385 350 M 385 345 L 395 350" transform="rotate(-10 390 345)" />
      <path d="M 400 340 L 395 350 M 395 345 L 405 350" transform="rotate(10 400 345)" />

      <path d="M 385 330 Q 370 325 365 335" />
      <path d="M 385 335 Q 375 330 375 340" />
      <path d="M 385 340 Q 375 335 380 345" />

      <path d="M 405 330 Q 420 325 425 335" />
      <path d="M 405 335 Q 415 330 415 340" />
      <path d="M 405 340 Q 415 335 410 345" />
    </g>
  </g>

  <g id="coffee-cup" transform="translate(0, 0)">
    <g filter="url(#glow)">
      <path d="M 590 450 L 595 490 C 595 500, 585 500, 580 500 L 520 500 C 515 500, 505 500, 505 490 L 510 450 Z" fill="none" stroke="#D8B4A0" stroke-width="1.5" stroke-linejoin="round" />
      <path d="M 595 470 C 615 460, 625 470, 620 490 C 615 500, 595 500, 595 500" fill="none" stroke="#D8B4A0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      <ellipse cx="550" cy="450" rx="40" ry="8" fill="none" stroke="#D8B4A0" stroke-width="1.5" />
    </g>
    
    <g stroke="#E8D5C4" fill="none" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
      <path d="M 525 440 Q 520 420 530 410">
        <animate attributeName="d" values="M 525 440 Q 520 420 530 410; M 525 440 Q 515 415 525 405; M 525 440 Q 520 420 530 410" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
        <animate attributeName="opacity" values="0.6; 0; 0.6" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      </path>
      <path d="M 540 445 Q 535 425 545 415">
        <animate attributeName="d" values="M 540 445 Q 535 425 545 415; M 540 445 Q 530 420 540 410; M 540 445 Q 535 425 545 415" dur="5s" begin="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
        <animate attributeName="opacity" values="0.6; 0; 0.6" dur="5s" begin="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      </path>
      <path d="M 555 440 Q 550 420 560 410">
        <animate attributeName="d" values="M 555 440 Q 550 420 560 410; M 555 440 Q 545 415 555 405; M 555 440 Q 550 420 560 410" dur="5s" begin="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
        <animate attributeName="opacity" values="0.6; 0; 0.6" dur="5s" begin="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      </path>
      <path d="M 570 445 Q 565 425 575 415">
