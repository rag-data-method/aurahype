        <animate attributeName="opacity" values="0.6; 0; 0.6" dur="5s" begin="4.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      </path>
    </g>
  </g>

  <g fill="#F2C2B9" opacity="0.5">
    <circle cx="150" cy="200" r="1.5">
      <animate attributeName="cy" values="200; 180; 200" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      <animate attributeName="opacity" values="0.5; 0; 0.5" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </circle>
    <circle cx="700" cy="250" r="2">
      <animate attributeName="cy" values="250; 230; 250" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      <animate attributeName="opacity" values="0.5; 0; 0.5" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </circle>
    <circle cx="200" cy="500" r="1.5">
      <animate attributeName="cx" values="200; 220; 200" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </circle>
    <circle cx="650" cy="100" r="2">
      <animate attributeName="cy" values="100; 120; 100" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      <animate attributeName="opacity" values="0.5; 0; 0.5" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </circle>
  </g>

  <g stroke="#E8D5C4" fill="none" stroke-width="1" opacity="0.4">
    <path d="M 100 550 Q 200 530 300 550">
      <animate attributeName="d" values="M 100 550 Q 200 530 300 550; M 100 550 Q 200 570 300 550; M 100 550 Q 200 530 300 550" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>
    <path d="M 550 540 Q 650 520 750 540">
      <animate attributeName="d" values="M 550 540 Q 650 520 750 540; M 550 540 Q 650 560 750 540; M 550 540 Q 650 520 750 540" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>
  </g>
</svg>