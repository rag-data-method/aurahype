<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF006E" />
      <stop offset="50%" stop-color="#3A0CA3" />
      <stop offset="100%" stop-color="#00F5D4" />
    </linearGradient>
    <radialGradient id="coin-shine" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-intense">
      <feGaussianBlur stdDeviation="8" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <g id="confetti-rect">
      <rect x="-6" y="-10" width="12" height="20" rx="3" />
    </g>
    <g id="confetti-circle">
      <circle r="10" />
    </g>
    <g id="confetti-triangle">
      <polygon points="0,-12 10,10 -10,10" />
    </g>
    <g id="coin">
      <ellipse cx="0" cy="0" rx="22" ry="26" fill="url(#coin-shine)" stroke="#FFD700" stroke-width="2" />
      <ellipse cx="0" cy="0" rx="16" ry="20" fill="none" stroke="#B8860B" stroke-width="2" />
      <text x="0" y="6" font-size="24" font-weight="bold" text-anchor="middle" fill="#B8860B" font-family="sans-serif">$</text>
    </g>
    <g id="star">
      <polygon points="0,-15 4,-5 15,-5 6,2 9,13 0,6 -9,13 -6,2 -15,-5 -4,-5" fill="#FFFFFF" filter="url(#glow-intense)"/>
    </g>
    <path id="chat-bubble" d="M0,0 Q20,0 20,-20 L20,-40 Q20,-60 0,-60 L-40,-60 Q-60,-60 -60,-40 L-60,-20 Q-60,0 -40,0 L-20,0 L-30,15 Z" />
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <g opacity="0.3">
    <use href="#chat-bubble" fill="#00F5D4" x="100" y="200" transform="scale(1.5)">
      <animateTransform attributeName="transform" type="translate" from="100 200" to="100 240" dur="3s" repeatCount="indefinite" additive="sum" />
      <animateTransform attributeName="transform" type="scale" values="1.5;1.6;1.5" dur="3s" repeatCount="indefinite" additive="sum" />
    </use>
    <use href="#chat-bubble" fill="#FEE440" x="700" y="150" transform="scale(1.2) rotate(15)">
      <animateTransform attributeName="transform" type="translate" from="700 150" to="700 190" dur="4s" repeatCount="indefinite" additive="sum" />
      <animateTransform attributeName="transform" type="rotate" values="15;25;15" dur="4s" repeatCount="indefinite" additive="sum" />
    </use>
  </g>

  <circle cx="400" cy="300" r="300" fill="#FF006E" opacity="0.2" filter="url(#glow)">
    <animate attributeName="r" values="300;320;300" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="400" cy="300" r="200" fill="#00F5D4" opacity="0.2" filter="url(#glow)">
    <animate attributeName="r" values="200;220;200" dur="5s" repeatCount="indefinite" />
  </circle>

  <g opacity="0.4">
    <use href="#confetti-rect" fill="#00F5D4" x="120" y="-20" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="120,-20; 100,620; 90,700" dur="4.2s" repeatCount="indefinite" begin="0s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360; 720" dur="4.2s" repeatCount="indefinite" begin="0s" additive="sum" />
    </use>
    <use href="#confetti-circle" fill="#FFC0CB" x="250" y="-40" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="250,-40; 270,620; 260,700" dur="5.5s" repeatCount="indefinite" begin="1s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 180; 360" dur="5.5s" repeatCount="indefinite" begin="1s" additive="sum" />
    </use>
    <use href="#confetti-triangle" fill="#FEE440" x="380" y="-60" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="380,-60; 360,620; 370,700" dur="3.8s" repeatCount="indefinite" begin="0.5s" />
      <animateTransform attributeName="transform" type="rotate" values="0; -270; -540" dur="3.8s" repeatCount="indefinite" begin="0.5s" additive="sum" />
    </use>
    <use href="#confetti-rect" fill="#FF006E" x="520" y="-30" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="520,-30; 550,620; 540,700" dur="4.7s" repeatCount="indefinite" begin="2s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 450; 900" dur="4.7s" repeatCount="indefinite" begin="2s" additive="sum" />
    </use>
    <use href="#confetti-circle" fill="#00F5D4" x="680" y="-50" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="680,-50; 660,620; 670,700" dur="6.1s" repeatCount="indefinite" begin="1.5s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360; 720" dur="6.1s" repeatCount="indefinite" begin="1.5s" additive="sum" />
    </use>
    <use href="#confetti-triangle" fill="#FFFFFF" x="50" y="-80" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="50,-80; 70,620; 60,700" dur="5.2s" repeatCount="indefinite" begin="0.2s" />
      <animateTransform attributeName="transform" type="rotate" values="0; -360; -720" dur="5.2s" repeatCount="indefinite" begin="0.2s" additive="sum" />
    </use>
    <use href="#confetti-rect" fill="#FEE440" x="750" y="-10" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="750,-10; 730,620; 740,700" dur="4.5s" repeatCount="indefinite" begin="2.5s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 270; 540" dur="4.5s" repeatCount="indefinite" begin="2.5s" additive="sum" />
    </use>
    <use href="#confetti-circle" fill="#FF006E" x="200" y="-100" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="200,-100; 220,620; 210,700" dur="5.8s" repeatCount="indefinite" begin="3s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 180; 360" dur="5.8s" repeatCount="indefinite" begin="3s" additive="sum" />
    </use>
    <use href="#confetti-triangle" fill="#FFC0CB" x="450" y="-120" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="450,-120; 430,620; 440,700" dur="4.1s" repeatCount="indefinite" begin="1.2s" />
      <animateTransform attributeName="transform" type="rotate" values="0; -450; -900" dur="4.1s" repeatCount="indefinite" begin="1.2s" additive="sum" />
    </use>
  </g>

  <g>
    <use href="#coin" x="150" y="-50" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="150,-50; 140,620; 130,700" dur="3.5s" repeatCount="indefinite" begin="0.4s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 180; 360" dur="3.5s" repeatCount="indefinite" begin="0.4s" additive="sum" />
    </use>
    <use href="#coin" x="320" y="-80" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="320,-80; 330,620; 320,700" dur="4.2s" repeatCount="indefinite" begin="1.1s" />
      <animateTransform attributeName="transform" type="rotate" values="0; -180; -360" dur="4.2s" repeatCount="indefinite" begin="1.1s" additive="sum" />
    </use>
    <use href="#coin" x="480" y="-30" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="480,-30; 470,620; 460,700" dur="3.8s" repeatCount="indefinite" begin="0.8s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360; 720" dur="3.8s" repeatCount="indefinite" begin="0.8s" additive="sum" />
    </use>
    <use href="#coin" x="650" y="-90" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="650,-90; 660,620; 650,700" dur="4.5s" repeatCount="indefinite" begin="1.8s" />
      <animateTransform attributeName="transform" type="rotate" values="0; -360; -720" dur="4.5s" repeatCount="indefinite" begin="1.8s" additive="sum" />
    </use>
    <use href="#coin" x="80" y="-120" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="80,-120; 90,620; 80,700" dur="5.1s" repeatCount="indefinite" begin="2.2s" />
      <animateTransform attributeName="transform" type="rotate" values="0; 180; 360" dur="5.1s" repeatCount="indefinite" begin="2.2s" additive="sum" />
    </use>
    <use href="#coin" x="580" y="-110" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="580,-110; 570,620; 580,700" dur="3.2s" repeatCount="indefinite" begin="0.1s" />
      <animateTransform attributeName="transform" type="rotate" values="0; -180; -360" dur="3.2s" repeatCount="indefinite" begin="0.1s" additive="sum" />
    </use>
  </g>

  <g>
    <use href="#star" x="400" y="100" transform="scale(1.5)">
      <animateTransform attributeName="transform" type="scale" values="1.5;2;1.5" dur="1.5s" repeatCount="indefinite" begin="0s" />
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite" begin="0s" />
    </use>
    <use href="#star" x="200" y="250">
      <animateTransform attributeName="transform" type="scale" values="1;1.5;1" dur="2s" repeatCount="indefinite" begin="0.5s" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.5s" />
    </use>
    <use href="#star" x="600" y="200" transform="scale(0.8)">
      <animateTransform attributeName="transform" type="scale" values="0.8;1.2;0.8" dur="1.8s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite" begin="1s" />
    </use>
    <use href="#star" x="100" y="450">
      <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="2.2s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite" begin="1.5s" />
    </use>
    <use href="#star" x="700" y="400" transform="scale(1.2)">
      <animateTransform attributeName="transform" type="scale" values="1.2;1.6;1.2" dur="1.6s" repeatCount="indefinite" begin="2s" />
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.6s" repeatCount="indefinite" begin="2s" />
    </use>
  </g>

  <g fill="#FFFFFF" opacity="0.8" font-family="sans-serif" font-weight="bold">
    <text x="400" y="300" font-size="60" text-anchor="middle" filter="url(#glow-intense)">CELEBRATION!</text>
  </g>

  <g>
    <rect x="0" y="0" width="800" height="600" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="0.5s" repeatCount="indefinite" />
    </rect>
    <circle cx="400" cy="300" r="350" fill="none" stroke="#00F5D4" stroke-width="2" stroke-dasharray="20 10">
      <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="10s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>