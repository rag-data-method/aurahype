<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b1a2b"/>
      <stop offset="100%" stop-color="#02060c"/>
    </radialGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="sapphire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#881337"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g transform="translate(800,450)" opacity="0.15">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="120s" repeatCount="indefinite"/>
      <circle r="520" fill="none" stroke="url(#gold)" stroke-width="1"/>
      <circle r="420" fill="none" stroke="url(#gold)" stroke-width="0.5"/>
      <line x1="0" y1="-600" x2="0" y2="600" stroke="url(#gold)" stroke-width="0.5"/>
      <line x1="-600" y1="0" x2="600" y2="0" stroke="url(#gold)" stroke-width="0.5"/>
      <line x1="-424" y1="-424" x2="424" y2="424" stroke="url(#gold)" stroke-width="0.5"/>
      <line x1="424" y1="-424" x2="-424" y2="424" stroke="url(#gold)" stroke-width="0.5"/>
    </g>
  </g>

  <g transform="translate(800,450)">
    <path d="M-700 300 L-500 300 L-420 180 L-300 180 L-220 300 L220 300 L300 180 L420 180 L500 300 L700 300 L700 450 L-700 450 Z" fill="url(#emerald)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M-700 300 L-500 300 L-420 180 L-300 180 L-220 300 L220 300 L300 180 L420 180 L500 300 L700 300" fill="none" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <g transform="translate(800,450)">
    <path d="M-400 450 L-400 -100 Q-400 -350 -150 -350 L150 -350 Q400 -350 400 -100 L400 450 Z" fill="url(#sapphire)" opacity="0.75"/>
    <path d="M-360 450 L-360 -80 Q-360 -300 -150 -300 L150 -300 Q360 -300 360 -80 L360 450" fill="none" stroke="url(#gold)" stroke-width="3"/>
  </g>

  <g transform="translate(800,450)">
    <line x1="0" y1="-420" x2="0" y2="450" stroke="url(#gold)" stroke-width="2" opacity="0.8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
    </line>
    <circle r="80" fill="url(#ruby)" filter="url(#glow)">
      <animate attributeName="r" values="80;86;80" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="60" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <circle r="45" fill="#0f172a" stroke="url(#gold)" stroke-width="1"/>
  </g>

  <g transform="translate(800,450)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
      <path d="M0 -220 L20 -80 L0 -60 L-20 -80 Z" fill="url(#gold)" opacity="0.9"/>
      <path d="M0 -220 L20 -80 L0 -60 L-20 -80 Z" fill="url(#gold)" opacity="0.9" transform="rotate(45)"/>
      <path d="M0 -220 L20 -80 L0 -60 L-20 -80 Z" fill="url(#gold)" opacity="0.9" transform="rotate(90)"/>
      <path d="M0 -220 L20 -80 L0 -60 L-20 -80 Z" fill="url(#gold)" opacity="0.9" transform="rotate(135)"/>
      <path d="M0 -220 L20 -80 L0 -60 L-20 -80 Z" fill="url(#gold)" opacity="0.9" transform="rotate(180)"/>
      <path d="M0 -220 L20 -80 L0 -60 L-20 -80 Z" fill="url(#gold)" opacity="0.9" transform="rotate(225)"/>
      <path d="M0 -220 L20 -80 L0 -60 L-20 -80 Z" fill="url(#gold)" opacity="0.9" transform="rotate(270)"/>
      <path d="M0 -220 L20 -80 L0 -60 L-20 -80 Z" fill="url(#gold)" opacity="0.9" transform="rotate(315)"/>
    </g>
  </g>

  <g transform="translate(800,450)">
    <rect x="-180" y="-180" width="360" height="360" fill="none" stroke="url(#gold)" stroke-width="2" transform="rotate(45)"/>
    <rect x="-140" y="-140" width="280" height="280" fill="none" stroke="url(#gold)" stroke-width="1" transform="rotate(45)"/>
  </g>

  <g transform="translate(420,450)">
    <circle r="40" fill="url(#emerald)" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-25;0,0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle r="25" fill="none" stroke="url(#gold)" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-25;0,0" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(1180,450)">
    <circle r="40" fill="url(#emerald)" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-25;0,0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle r="25" fill="none" stroke="url(#gold)" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-25;0,0" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(800,720)">
    <path d="M-120 0 L0 -80 L120 0 L0 80 Z" fill="url(#ruby)" filter="url(#glow)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M-120 0 L0 -80 L120 0 L0 80 Z" fill="none" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <line x1="0" y1="120" x2="1600" y2="120" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="780" x2="1600" y2="780" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
</svg>