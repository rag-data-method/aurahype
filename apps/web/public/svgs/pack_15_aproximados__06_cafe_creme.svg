<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filters -->
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="medium" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="atmo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="micro" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="fabric" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Gradients -->
    <radialGradient id="bgGrad" cx="48%" cy="46%" r="72%">
      <stop offset="0%" stop-color="#3D2518"/>
      <stop offset="55%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#1a0e08"/>
      <animate attributeName="cx" values="48%;52%;48%" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="46%;50%;46%" dur="16s" repeatCount="indefinite"/>
    </radialGradient>

    <radialGradient id="cupEdge" cx="50%" cy="50%" r="50%">
      <stop offset="62%" stop-color="transparent"/>
      <stop offset="80%" stop-color="#4A2E1E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2C1810" stop-opacity="1"/>
    </radialGradient>

    <radialGradient id="milkGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBF8F4" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#D4A574" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#8B5A2B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2C1810" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FBF8F4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FBF8F4" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#FBF8F4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FBF8F4" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="specGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Reusable Swirl Path -->
    <path id="swirlBase" fill="none" stroke-linecap="round" stroke-linejoin="round" 
      d="M 650,450 C 680,380 740,340 800,330 C 880,320 950,350 980,420 C 1010,500 980,580 910,620 C 830,670 720,660 660,590 C 600,520 610,410 680,350 C 760,280 880,270 960,330 C 1050,400 1070,530 1000,620 C 920,720 760,740 650,670 C 540,600 520,450 600,340 C 690,230 860,200 970,280 C 1090,370 1120,550 1030,680 C 930,820 730,850 590,750 C 450,650 430,400 560,260 C 700,120 950,100 1100,220"/>

    <!-- Reusable Steam Path -->
    <path id="steamBase" fill="none" stroke="url(#steamGrad)" stroke-linecap="round"
      d="M 700,200 C 680,100 720,50 700,0 M 800,220 C 820,120 780,70 810,-20 M 900,200 C 880,100 920,50 900,0 M 750,210 C 730,110 770,60 750,10 M 850,210 C 830,110 870,60 850,10"/>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#1a0e08"/>
  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- Cup Rim (Atmospheric) -->
  <ellipse cx="800" cy="450" rx="620" ry="340" fill="none" stroke="#3D2518" stroke-width="18" opacity="0.4" filter="url(#atmo)"/>
  <ellipse cx="800" cy="450" rx="610" ry="330" fill="none" stroke="#4A2E1E" stroke-width="12" opacity="0.6" filter="url(#medium)"/>
  <ellipse cx="800" cy="450" rx="605" ry="325" fill="none" stroke="#5C3A28" stroke-width="6" opacity="0.5" filter="url(#soft)"/>

  <!-- Cup Interior Edge Shadow -->
  <ellipse cx="800" cy="450" rx="600" ry="320" fill="url(#cupEdge)"/>

  <!-- Deep Espresso Base -->
  <ellipse cx="800" cy="450" rx="580" ry="310" fill="#2C1810" opacity="0.9"/>
  <ellipse cx="800" cy="450" rx="570" ry="300" fill="#301910" opacity="0.85" filter="url(#soft)"/>

  <!-- Crema Base Layer (Amber) -->
  <ellipse cx="800" cy="450" rx="560" ry="290" fill="#8B5A2B" opacity="0.4" filter="url(#medium)">
    <animate attributeName="rx" values="560;565;560" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="290;295;290" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.45;0.4" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Crema Mid Layer -->
  <ellipse cx="800" cy="450" rx="540" ry="280" fill="#A06B36" opacity="0.3" filter="url(#soft)">
    <animate attributeName="rx" values="540;550;538;540" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="280;285;278;280" dur="17s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Milk Swirl Layer 1 (Deep, Broad, Blurred) -->
  <g opacity="0.6" filter="url(#atmo)">
    <use href="#swirlBase" stroke="#8B5A2B" stroke-width="28">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="240s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="28;32;28" dur="18s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Milk Swirl Layer 2 (Warm Amber, Medium) -->
  <g opacity="0.5" filter="url(#medium)">
    <use href="#swirlBase" stroke="#D4A574" stroke-width="18" transform="rotate(45 800 450)">
      <animateTransform attributeName="transform" type="rotate" from="45 800 450" to="405 800 450" dur="180s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="18;22;18" dur="14s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Milk Swirl Layer 3 (Golden, Soft) -->
  <g opacity="0.7" filter="url(#soft)">
    <use href="#swirlBase" stroke="#D4A574" stroke-width="10" transform="rotate(90 800 450)">
      <animateTransform attributeName="transform" type="rotate" from="90 800 450" to="450 800 450" dur="150s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="10;14;10" dur="12s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Milk Swirl Layer 4 (Bright Core) -->
  <g opacity="0.8" filter="url(#micro)">
    <use href="#swirlBase" stroke="#E4BD94" stroke-width="5" transform="rotate(135 800 450)">
      <animateTransform attributeName="transform" type="rotate" from="135 800 450" to="495 800 450" dur="120s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="5;7;5" dur="10s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Milk Swirl Layer 5 (Fine Detail, Turbulence) -->
  <g opacity="0.9" filter="url(#fabric)">
    <use href="#swirlBase" stroke="#FBF8F4" stroke-width="2.5" transform="rotate(180 800 450)">
      <animateTransform attributeName="transform" type="rotate" from="180 800 450" to="540 800 450" dur="90s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2.5;3.5;2.5" dur="8s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Central Milk Bloom Core -->
  <ellipse cx="800" cy="450" rx="80" ry="45" fill="url(#milkGrad)" opacity="0.7" filter="url(#soft)">
    <animate attributeName="rx" values="80;95;75;80" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="45;55;40;45" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.5;0.8;0.7" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="800" cy="450" rx="40" ry="22" fill="#FBF8F4" opacity="0.6" filter="url(#micro)">
    <animate attributeName="rx" values="40;50;35;40" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="22;28;18;22" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.4;0.7;0.6" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Dissolving Foam Blobs -->
  <circle cx="720" cy="380" r="12" fill="#FBF8F4" opacity="0.5" filter="url(#micro)">
    <animate attributeName="r" values="12;18;10;12" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.6;0.5" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="380;375;385;380" dur="14s" repeatCount="indefinite"/>
  </circle>

  <circle cx="880" cy="520" r="18" fill="#D4A574" opacity="0.6" filter="url(#soft)">
    <animate attributeName="r" values="18;25;15;18" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.3;0.7;0.6" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="880;885;875;880" dur="16s" repeatCount="indefinite"/>
  </circle>

  <circle cx="900" cy="400" r="9" fill="#FBF8F4" opacity="0.4" filter="url(#micro)">
    <animate attributeName="r" values="9;14;7;9" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.5;0.4" dur="9s" repeatCount="indefinite"/>
  </circle>

  <circle cx="660" cy="480" r="15" fill="#E4BD94" opacity="0.5" filter="url(#soft)">
    <animate attributeName="r" values="15;22;12;15" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.6;0.5" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="660;655;665;660" dur="15s" repeatCount="indefinite"/>
  </circle>

  <circle cx="780" cy="580" r="11" fill="#FBF8F4" opacity="0.4" filter="url(#micro)">
    <animate attributeName="r" values="11;16;8;11" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.15;0.5;0.4" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="580;575;585;580" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Light Reflections / Specular Highlights -->
  <ellipse cx="650" cy="350" rx="120" ry="25" fill="url(#specGrad)" opacity="0.12" transform="rotate(-25 650 350)" filter="url(#soft)">
    <animate attributeName="opacity" values="0.12;0.18;0.1;0.12" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="120;130;115;120" dur="14s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="950" cy="550" rx="80" ry="15" fill="url(#specGrad)" opacity="0.08" transform="rotate(-25 950 550)" filter="url(#micro)">
    <animate attributeName="opacity" values="0.08;0.14;0.06;0.08" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Steam Layer 1 (Atmospheric, Blur 120) -->
  <g opacity="0.3" filter="url(#atmo)">
    <use href="#steamBase" stroke-width="60" transform="translate(0, -40)">
      <animateTransform attributeName="transform" type="translate" values="0,-40; 15,-70; -10,-40; 0,-40" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0.35;0.3" dur="12s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Steam Layer 2 (Medium, Blur 60) -->
  <g opacity="0.25" filter="url(#medium)">
    <use href="#steamBase" stroke-width="30" transform="translate(20, -20)">
      <animateTransform attributeName="transform" type="translate" values="20,-20; 5,-60; 25,-30; 20,-20" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.1;0.3;0.25" dur="10s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Steam Layer 3 (Soft, Blur 20) -->
  <g opacity="0.2" filter="url(#soft)">
    <use href="#steamBase" stroke-width="12" transform="translate(-15, -10)">
      <animateTransform attributeName="transform" type="translate" values="-15,-10; -25,-50; -5,-20; -15,-10" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.08;0.25;0.2" dur="11s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Steam Layer 4 (Micro Detail) -->
  <g opacity="0.15" filter="url(#micro)">
    <use href="#steamBase" stroke-width="4" transform="translate(10, 0)">
      <animateTransform attributeName="transform" type="translate" values="10,0; 0,-40; 20,-10; 10,0" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.2;0.15" dur="9s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Top Edge Rim Highlight (Catches the morning light) -->
  <ellipse cx="800" cy="450" rx="600" ry="320" fill="none" stroke="#FBF8F4" stroke-width="2" opacity="0.15" filter="url(#soft)" transform="translate(0, -8)">
    <animate attributeName="opacity" values="0.15;0.25;0.1;0.15" dur="10s" repeatCount="indefinite"/>
  </ellipse>

</svg>