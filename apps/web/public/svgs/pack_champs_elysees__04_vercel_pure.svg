    <animate attributeName="opacity" values="0.8;0.45;0.8" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
  </rect>

  <g transform="translate(800,450)">
