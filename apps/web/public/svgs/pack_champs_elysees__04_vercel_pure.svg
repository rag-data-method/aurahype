      <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="8s" repeatCount="indefinite" additive="sum" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
