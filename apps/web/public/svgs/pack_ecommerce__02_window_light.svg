<animate attributeName="opacity" values="0.75;0.65;0.75" dur="7s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="900" cy="820" rx="380" ry="90" fill="#E6CCAB" opacity="0.85" filter="url(#b1)">
