<rect x="0" y="0" width="1600" height="100" fill="#4A2C1F" opacity="0.85"/>
<path d="M160,100 L700,100 L1300,900 L500,900 Z" fill="url(#g1)" opacity="0.95" filter="url(#b1)">
<animate attributeName="opacity" values="0.95;0.85;0.95" dur="6s" repeatCount="indefinite"/>
</path>
<path d="M160,120 L600,120 L1100,900 L450,900 Z" fill="url(#g2)" opacity="0.85" filter="url(#b1)">
<animate attributeName="opacity" values="0.85;0.75;0.85" dur="8s" repeatCount="indefinite"/>
</path>
<ellipse cx="850" cy="450" rx="350" ry="280" fill="#E6CCAB" opacity="0.75" filter="url(#b2)">
