</circle>
<path d="M180,850 L450,850 L350,900 L200,900 Z" fill="#8A9A5B" opacity="0.8" filter="url(#b1)">
<animateTransform attributeName="transform" type="skewX" values="0;15;0" dur="10s" repeatCount="indefinite"/>
</path>
