<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9F1C"/>
      <stop offset="50%" stop-color="#E71D8C"/>
      <stop offset="100%" stop-color="#9B5DE5"/>
    </linearGradient>
    <radialGradient id="tg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9F1C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9F1C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B5DE5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9B5DE5" stop-opacity="0"/>
    </radialGradient>
    <filter id="f1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="f2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="f3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
