<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <pattern id="a" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="30" fill="#ffffff"/>
      <animate attributeName="patternTransform" attributeType="XML" type="translate" from="0 0" to="80 0" dur="8s" repeatCount="indefinite"/>
    </pattern>
    <pattern id="b" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="60" cy="60" r="20" fill="#ffffff" opacity="0.4"/>
      <animate attributeName="patternTransform" attributeType="XML" type="translate" from="0 0" to="120 120" dur="16s" repeatCount="indefinite"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#a)" opacity="0.85"/>
  <rect width="1600" height="900" fill="url(#b)"/>
</svg>