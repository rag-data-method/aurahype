    <path d="M 1160 360 Q 1060 300 960 330" fill="none" stroke="#00ffff" stroke-width="5" stroke-linecap="round"/>
    <path d="M 740 720 Q 850 780 960 750" fill="none" stroke="#ccff00" stroke-width="5" stroke-linecap="round"/>
    <path d="M 1180 720 Q 1070 780 960 750" fill="none" stroke="#ff3366" stroke-width="5" stroke-linecap="round"/>
    <line x1="720" y1="320" x2="620" y2="240" stroke="#00ff99" stroke-width="5" stroke-linecap="round"/>
    <line x1="1200" y1="320" x2="1300" y2="240" stroke="#ffcc00" stroke-width="5" stroke-linecap="round"/>
