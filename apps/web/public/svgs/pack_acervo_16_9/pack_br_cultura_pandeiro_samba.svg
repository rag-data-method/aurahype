<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f3c"/>
      <stop offset="55%" stop-color="#0b0b1f"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9d423"/>
      <stop offset="50%" stop-color="#f2994a"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <radialGradient id="headGrad" cx="42%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f3e5d0"/>
      <stop offset="100%" stop-color="#d8b98a"/>
    </radialGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#90a4ae"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="jingle">
      <circle r="12" fill="url(#silverGrad)"/>
      <circle r="5" fill="#1a1a2e"/>
      <circle cx="-4" cy="-4" r="2.5" fill="#ffffff" opacity="0.8"/>
    </g>
    <g id="note-eighth">
      <ellipse cx="0" cy="0" rx="11" ry="9" fill="currentColor"/>
      <line x1="9" y1="-2" x2="9" y2="-55" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <path d="M9,-55 C28,-48 34,-32 30,-18 C26,-28 18,-35 9,-32 Z" fill="currentColor"/>
    </g>
    <g id="note-pair">
      <ellipse cx="0" cy="0" rx="11" ry="9" fill="currentColor"/>
      <ellipse cx="32" cy="8" rx="11" ry="9" fill="currentColor"/>
      <line x1="9" y1="-2" x2="9" y2="-55" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <line x1="41" y1="6" x2="41" y2="-47" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <path d="M9,-55 L41,-47 L41,-35 L9,-43 Z" fill="currentColor"/>
    </g>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <g fill="#ffffff" opacity="0.25">
    <circle cx="180" cy="160" r="2"/>
    <circle cx="420" cy="120" r="1.5"/>
