<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a120b"/>
      <stop offset="100%" stop-color="#070504"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8a6a2a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#070504" stop-opacity="0"/>
      <animate attributeName="cy" values="35%;45%;35%" dur="12s" repeatCount="indefinite"/>
    </radialGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c3d0a"/>
      <stop offset="20%" stop-color="#b8860b"/>
      <stop offset="40%" stop-color="#ffe99e"/>
      <stop offset="55%" stop-color="#ffd700"/>
      <stop offset="80%" stop-color="#9a6b0c"/>
      <stop offset="100%" stop-color="#4a2e06"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="pearl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="50%" stop-color="#efe4cf"/>
      <stop offset="100%" stop-color="#fffdf7"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="16s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="12" result="o"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="o"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <symbol id="ticket" viewBox="0 0 240 120" width="240" height="120">
      <rect x="20" y="20" width="200" height="80" rx="10" fill="url(#pearl)" stroke="url(#gold)" stroke-width="12" stroke-dasharray="0 24" stroke-linecap="round"/>
      <rect x="34" y="34" width="172" height="52" rx="6" fill="none" stroke="url(#gold)" stroke-width="2"/>
      <circle cx="120" cy="60" r="13" fill="url(#gold)"/>
    </symbol>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <g opacity="0.75">
    <circle cx="150" cy="120" r="2" fill="#ffd86e">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="180" r="3" fill="#fff4c7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="100" r="2" fill="#ffd86e">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="150" r="2.5" fill="#fff4c7">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.5s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1300" cy="120" r="2" fill="#ffd86e">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1460" cy="220" r="3" fill="#fff4c7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="400" r="2" fill="#ffd86e">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1550" cy="450" r="2.5" fill="#fff4c7">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="700" r="3" fill="#ffd86e">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.8s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="820" r="2" fill="#fff4c7">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="820" r="2.5" fill="#ffd86e">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.4s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="750" r="2" fill="#fff4c7">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="5.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(800,450)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-2;2;-2" dur="8s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-16;0,0" dur="6s" repeatCount="indefinite"/>
        <use href="#ticket" x="-120" y="-60" width="240" height="120" transform="scale(1.7)" filter="url(#sh)"/>
      </g>
    </g>
  </g>

  <g transform="translate(320,260)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="10;14;10" dur="9s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="5.5s" repeatCount="indefinite"/>
        <use href="#ticket" x="-120" y="-60" width="240" height="120" transform="scale(0.85)" filter="url(#sh)" opacity="0.95"/>
      </g>
    </g>
  </g>

  <g transform="translate(1280,240)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-8;-5;-8" dur="10s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-14;0,0" dur="6.5s" repeatCount="indefinite"/>
        <use href="#ticket" x="-120" y="-60" width="240" height="120" transform="scale(0.75)" filter="url(#sh)" opacity="0.9"/>
      </g>
    </g>
  </g>

  <g transform="translate(1220,660)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="4;8;4" dur="8.5s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-13;0,0" dur="5s" repeatCount="indefinite"/>
        <use href="#ticket" x="-120" y="-60" width="240" height="120" transform="scale(1)" filter="url(#sh)" opacity="0.95"/>
      </g>
    </g>
  </g>

  <g transform="translate(360,680)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-6;-3;-6" dur="9.5s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="6s" repeatCount="indefinite"/>
        <use href="#ticket" x="-120" y="-60" width="240" height="120" transform="scale(0.7)" filter="url(#sh)" opacity="0.85"/>
      </g>
    </g>
  </g>
</svg>