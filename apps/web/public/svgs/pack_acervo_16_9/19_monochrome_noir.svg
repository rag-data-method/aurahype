<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset=".5" stop-color="#a8a8a8"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d0d0d0" stop-opacity=".18"/>
      <stop offset="1" stop-color="#d0d0d0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <polygon points="0,0 720,0 1020,900 0,900" fill="#111">
    <animate attributeName="opacity" values="1;.86;1" dur="10s" repeatCount="indefinite"/>
  </polygon>

  <polygon points="1600,0 1600,900 780,900 1080,0" fill="#050505">
    <animateTransform attributeName="transform" type="translate" values="0,0;-24,0;0,0" dur="16s" repeatCount="indefinite"/>
  </polygon>

  <rect x="700" y="0" width="6" height="900" fill="url(#silver)">
    <animate attributeName="opacity" values=".35;.95;.35" dur="7s" repeatCount="indefinite"/>
  </rect>

  <polygon points="1180,850 1450,700 1450,440 1180,290" fill="#000" opacity=".7">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-18;0,0" dur="12s" repeatCount="indefinite"/>
  </polygon>

  <polygon points="1150,830 1420,680 1420,400 1150,250" fill="#181818" stroke="#2a2a2a" stroke-width="2">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-18;0,0" dur="12s" repeatCount="indefinite"/>
  </polygon>

  <polygon points="0,0 520,0 760,900 0,900" fill="url(#glow)" opacity=".35">
    <animate attributeName="opacity" values=".2;.48;.2" dur="9s" repeatCount="indefinite"/>
  </polygon>

  <rect x="1290" y="130" width="48" height="48" fill="#666" opacity=".5">
    <animate attributeName="opacity" values=".2;.75;.2" dur="5s" repeatCount="indefinite"/>
  </rect>

  <rect x="1348" y="198" width="24" height="24" fill="#888" opacity=".4">
    <animate attributeName="opacity" values=".1;.55;.1" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>