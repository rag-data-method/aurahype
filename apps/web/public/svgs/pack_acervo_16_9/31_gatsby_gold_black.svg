<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A5E1F"/>
      <stop offset="30%" stop-color="#E3C368"/>
      <stop offset="50%" stop-color="#FFF9D1"/>
      <stop offset="70%" stop-color="#C6A13C"/>
      <stop offset="100%" stop-color="#5E4716"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9D1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E3C368" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <line id="ray" x1="0" y1="0" x2="0" y2="-520" stroke="url(#gold)" stroke-width="2" opacity="0.85"/>
  </defs>
  <rect width="1600" height="900" fill="#000"/>
  <circle cx="800" cy="450" r="360" fill="url(#glow)" opacity="0.35">
    <animate attributeName="opacity" values="0.25;0.55;0.25" dur="10s" repeatCount="indefinite"/>
  </circle>
  <g fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.85">
    <path d="M0 900 Q800 120 1600 900"/>
    <path d="M100 900 Q800 220 1500 900" stroke-width="1.5" opacity="0.7"/>
    <path d="M300 900 Q800 380 1300 900" stroke-width="1" opacity="0.5"/>
    <circle cx="800" cy="450" r="70"/>
    <path d="M800 370 L880 450 L800 530 L720 450 Z"/>
  </g>
  <g fill="url(#gold)" opacity="0.12">
    <path d="M0 900 L120 780 L240 900 Z"/>
    <path d="M1600 900 L1480 780 L1360 900 Z"/>
  </g>
  <g transform="translate(800,450)" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="240s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="8s" repeatCount="indefinite"/>
    <use href="#ray" transform="rotate(0)"/>
    <use href="#ray" transform="rotate(15)"/>
    <use href="#ray" transform="rotate(30)"/>
    <use href="#ray" transform="rotate(45)"/>
    <use href="#ray" transform="rotate(60)"/>
    <use href="#ray" transform="rotate(75)"/>
    <use href="#ray" transform="rotate(90)"/>
    <use href="#ray" transform="rotate(105)"/>
    <use href="#ray" transform="rotate(120)"/>
    <use href="#ray" transform="rotate(135)"/>
    <use href="#ray" transform="rotate(150)"/>
    <use href="#ray" transform="rotate(165)"/>
    <use href="#ray" transform="rotate(180)"/>
    <use href="#ray" transform="rotate(195)"/>
    <use href="#ray" transform="rotate(210)"/>
    <use href="#ray" transform="rotate(225)"/>
    <use href="#ray" transform="rotate(240)"/>
    <use href="#ray" transform="rotate(255)"/>
    <use href="#ray" transform="rotate(270)"/>
    <use href="#ray" transform="rotate(285)"/>
    <use href="#ray" transform="rotate(300)"/>
    <use href="#ray" transform="rotate(315)"/>
    <use href="#ray" transform="rotate(330)"/>
    <use href="#ray" transform="rotate(345)"/>
  </g>
  <g fill="#FFF9D1" filter="url(#blur)">
    <circle cx="800" cy="300" r="3" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="380" r="2" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="380" r="2" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="600" r="2" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="6s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>