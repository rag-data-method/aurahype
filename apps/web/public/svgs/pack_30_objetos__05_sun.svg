<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    
    <radialGradient id="sunBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="35%" stop-color="#F4A261"/>
      <stop offset="90%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#E63946"/>
    </radialGradient>
    
    <linearGradient id="rayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4A261" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0.9"/>
    </linearGradient>
    
    <path id="rayShape" d="M0,0 C8,-30 12,-70 0,-130 C-12,-70 -8,-30 0,0" fill="url(#rayGrad)"/>
  </defs>
  
  <rect width="1600" height="900" fill="#FDF6EC"/>
  
  <g transform="translate(800,450)">
    <ellipse cx="0" cy="140" rx="90" ry="25" fill="#E63946" opacity="0.9" filter="url(#shadow)">
      <animateTransform attributeName="transform" type="scale" values="1;0.85;1" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <circle r="260" fill="#F4A261" opacity="0.85" filter="url(#glow)">
      <animate attributeName="r" values="240;280;240" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.95;0.85" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <g>
      <g transform="rotate(0)">
        <use href="#rayShape" transform="translate(0,-145) scale(1)">
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" additive="sum" dur="3s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(45) translate(0,-145)">
          <animateTransform attributeName="transform" type="scale" values="1;1.2;1" additive="sum" dur="3s" begin="0.4s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(90) translate(0,-145)">
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" additive="sum" dur="3s" begin="0.8s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(135) translate(0,-145)">
          <animateTransform attributeName="transform" type="scale" values="1;1.2;1" additive="sum" dur="3s" begin="1.2s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(180) translate(0,-145)">
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" additive="sum" dur="3s" begin="1.6s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(225) translate(0,-145)">
          <animateTransform attributeName="transform" type="scale" values="1;1.2;1" additive="sum" dur="3s" begin="2.0s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(270) translate(0,-145)">
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" additive="sum" dur="3s" begin="2.4s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(315) translate(0,-145)">
          <animateTransform attributeName="transform" type="scale" values="1;1.2;1" additive="sum" dur="3s" begin="2.8s" repeatCount="indefinite"/>
        </use>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/>
      </g>
      
      <g opacity="0.9" transform="scale(0.7)">
        <use href="#rayShape" transform="rotate(22.5) translate(0,-165)">
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" additive="sum" dur="4s" begin="0.2s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(67.5) translate(0,-165)">
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" additive="sum" dur="4s" begin="0.7s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(112.5) translate(0,-165)">
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" additive="sum" dur="4s" begin="1.2s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(157.5) translate(0,-165)">
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" additive="sum" dur="4s" begin="1.7s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(202.5) translate(0,-165)">
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" additive="sum" dur="4s" begin="2.2s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(247.5) translate(0,-165)">
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" additive="sum" dur="4s" begin="2.7s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(292.5) translate(0,-165)">
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" additive="sum" dur="4s" begin="3.2s" repeatCount="indefinite"/>
        </use>
        <use href="#rayShape" transform="rotate(337.5) translate(0,-165)">
          <animateTransform attributeName="transform" type="scale" values="1;1.25;1" additive="sum" dur="4s" begin="3.7s" repeatCount="indefinite"/>
        </use>
        <animateTransform attributeName="transform" type="rotate" values="360;0" dur="14s" repeatCount="indefinite"/>
      </g>
    </g>
    
    <g>
      <circle r="105" fill="url(#sunBody)">
        <animateTransform attributeName="transform" type="scale" values="1;1.04;1" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      
      <ellipse cx="-35" cy="-35" rx="35" ry="20" fill="#FFFBEB" opacity="0.8" filter="url(#soft)" transform="rotate(-45)">
        <animate attributeName="opacity" values="0.8;0.95;0.8" dur="2.5s" repeatCount="indefinite"/>
      </ellipse>
      
      <g transform="translate(0,5)">
        <g transform="translate(-32,-5)">
          <ellipse rx="7" ry="9" fill="#8B3A3A">
            <animateTransform attributeName="transform" type="scale" values="1,1;1,0.1;1,1" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
          </ellipse>
          <circle cx="-2" cy="-2" r="2" fill="#FFFBEB"/>
        </g>
        <g transform="translate(32,-5)">
          <ellipse rx="7" ry="9" fill="#8B3A3A">
            <animateTransform attributeName="transform" type="scale" values="1,1;1,0.1;1,1" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
          </ellipse>
          <circle cx="-2" cy="-2" r="2" fill="#FFFBEB"/>
        </g>
        
        <path d="M-18,12 Q0,28 18,12" fill="none" stroke="#8B3A3A" stroke-width="3.5" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" values="-3,0,0;3,0,0;-3,0,0" dur="2s" repeatCount="indefinite"/>
        </path>
        
        <circle cx="-42" cy="8" r="9" fill="#E63946" opacity="0.9" filter="url(#soft)"/>
        <circle cx="42" cy="8" r="9" fill="#E63946" opacity="0.9" filter="url(#soft)"/>
      </g>
      
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-15;0,0" dur="4s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <g transform="translate(800,450)">
    <path d="M-180,-60 L-170,-60 L-175,-70 Z" fill="#FFFBEB" opacity="0.9">
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M160,-100 L170,-100 L165,-110 Z" fill="#FFFBEB" opacity="0.9">
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
    </path>
    <circle cx="-140" cy="120" r="5" fill="#F4A261" opacity="0.9">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="90" r="4" fill="#FFFBEB" opacity="0.9">
      <animate attributeName="cy" values="90;80;90" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>