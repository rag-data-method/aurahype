<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1A1815"/>
      <stop offset="100%" stop-color="#0A0908"/>
    </radialGradient>

    <!-- Skin Gradients -->
    <radialGradient id="skinGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#E8C9A0"/>
      <stop offset="40%" stop-color="#D4A574"/>
      <stop offset="75%" stop-color="#8B5A2B"/>
      <stop offset="100%" stop-color="#1A1815"/>
    </radialGradient>

    <radialGradient id="skinGlow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#E8C9A0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E8C9A0" stop-opacity="0"/>
    </radialGradient>

    <!-- Sclera Gradients -->
    <radialGradient id="scleraGrad" cx="50%" cy="50%" r="50%">
      <stop offset="50%" stop-color="#FBF8F4"/>
      <stop offset="85%" stop-color="#D4A574"/>
      <stop offset="95%" stop-color="#8B5A2B"/>
      <stop offset="100%" stop-color="#1A1815"/>
    </radialGradient>

    <!-- Iris Gradients -->
    <radialGradient id="irisBaseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D230F">
        <animate attributeName="stop-color" values="#3D230F;#2E1A0B;#3D230F" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="30%" stop-color="#8B5A2B">
        <animate attributeName="stop-color" values="#8B5A2B;#6B4222;#8B5A2B" dur="16s" repeatCount="indefinite"/>
      </stop>
      <stop offset="65%" stop-color="#D4A574">
        <animate attributeName="stop-color" values="#D4A574;#C49663;#D4A574" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#E8C9A0">
        <animate attributeName="stop-color" values="#E8C9A0;#D4B48A;#E8C9A0" dur="12s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>

    <radialGradient id="irisRimGrad" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#8B5A2B" stop-opacity="0"/>
      <stop offset="85%" stop-color="#5C3A1E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2A1608" stop-opacity="0.9"/>
    </radialGradient>

    <linearGradient id="tintGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5A2B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8C9A0" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="shadowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>

    <filter id="scleraEdgeBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <filter id="irisBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <filter id="highlightBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <filter id="deepBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <!-- Clip Paths -->
    <clipPath id="eyeClip">
      <path d="M 250,450 C 450,250 1150,250 1350,450 C 1150,650 450,650 250,450 Z"/>
    </clipPath>

    <!-- Eyelid Sweep Mask -->
    <mask id="lidMask">
      <rect x="0" y="0" width="1600" height="900" fill="white"/>
      <path d="M 200,450 C 400,50 1200,50 1400,450 C 1200,380 400,380 200,450 Z" fill="black">
        <animateTransform attributeName="transform" type="translate" values="0,-500; 0,-500; 0,50; 0,50; 0,-500" keyTimes="0; 0.65; 0.7; 0.75; 1" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
      </path>
    </mask>
  </defs>

  <!-- Layer 1: Deep Background -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- Layer 2: Global Skin Base (Background Texture) -->
  <circle cx="800" cy="450" r="800" fill="url(#skinGrad)"/>

  <!-- Layer 3: Deep Skin Shadowing (Cast by orbital bone and brow) -->
  <path d="M 0,-100 Q 800,250 1600,-100 L 1600,900 L 0,900 Z" fill="#0F0C09" filter="url(#deepBlur)" opacity="0.6"/>
  <path d="M 0,1000 Q 800,650 1600,1000 L 1600,900 L 0,900 Z" fill="#0F0C09" filter="url(#deepBlur)" opacity="0.5"/>

  <!-- Layer 4: Upper Eyelid Drop Shadow -->
  <path d="M 250,450 C 450,200 1150,200 1350,450 C 1150,500 450,500 250,450 Z" fill="#0A0908" filter="url(#shadowBlur)" opacity="0.85">
    <animate attributeName="d" values="M 250,450 C 450,200 1150,200 1350,450 C 1150,500 450,500 250,450 Z; M 250,450 C 450,225 1150,225 1350,450 C 1150,500 450,500 250,450 Z; M 250,450 C 450,200 1150,200 1350,450 C 1150,500 450,500 250,450 Z" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </path>

  <!-- Layer 5: Sclera (White of the eye) -->
  <g mask="url(#lidMask)">
    <path d="M 250,450 C 450,250 1150,250 1350,450 C 1150,650 450,650 250,450 Z" fill="url(#scleraGrad)"/>
    <!-- Sclera Veins -->
    <path d="M 400,420 Q 450,430 480,400" stroke="#8B5A2B" stroke-width="2.5" fill="none" opacity="0.25" filter="url(#highlightBlur)"/>
    <path d="M 420,450 Q 470,460 500,440" stroke="#8B5A2B" stroke-width="1.5" fill="none" opacity="0.2" filter="url(#highlightBlur)"/>
    <path d="M 1100,480 Q 1150,470 1180,440" stroke="#8B5A2B" stroke-width="2" fill="none" opacity="0.2" filter="url(#highlightBlur)"/>
    <path d="M 1250,420 Q 1200,410 1180,380" stroke="#8B5A2B" stroke-width="1.5" fill="none" opacity="0.15" filter="url(#highlightBlur)"/>
  </g>

  <!-- Layer 6: Sclera Edge Shadow -->
  <path d="M 250,450 C 450,250 1150,250 1350,450 C 1150,650 450,650 250,450 Z" fill="#0A0908" filter="url(#scleraEdgeBlur)" opacity="0.4" mask="url(#lidMask)"/>

  <!-- Layer 7-12: Iris Base and Strokes -->
  <g id="irisGroup" transform="translate(800, 450)" mask="url(#lidMask)">
    
    <!-- Base Iris Disc -->
    <circle cx="0" cy="0" r="270" fill="url(#irisBaseGrad)"/>

    <!-- Animated Iris Rings -->
    <!-- Ring 1 (Center) -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#E8C9A0" stroke-width="12" opacity="0.15" filter="url(#irisBlur)">
      <animate attributeName="r" values="70;72;70" dur="9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
    </circle>

    <!-- Ring 2 (Inner Amber) -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#D4A574" stroke-width="20" opacity="0.25" filter="url(#irisBlur)">
      <animate attributeName="r" values="120;122;120" dur="11s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="55s" repeatCount="indefinite"/>
    </circle>

    <!-- Ring 3 (Mid Honey) -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#8B5A2B" stroke-width="30" opacity="0.3" filter="url(#irisBlur)">
      <animate attributeName="r" values="180;182;180" dur="13s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="70s" repeatCount="indefinite"/>
    </circle>

    <!-- Ring 4 (Outer Edge) -->
    <circle cx="0" cy="0" r="240" fill="none" stroke="#3D230F" stroke-width="25" opacity="0.4" filter="url(#irisBlur)">
      <animate attributeName="r" values="240;242;240" dur="15s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="85s" repeatCount="indefinite"/>
    </circle>

    <!-- Iris Dark Rim -->
    <circle cx="0" cy="0" r="270" fill="none" stroke="#1A0F06" stroke-width="15" opacity="0.8"/>
    <circle cx="0" cy="0" r="270" fill="url(#irisRimGrad)"/>

    <!-- Central Pupil -->
    <circle cx="0" cy="0" r="95" fill="#0A0A0A">
      <animate attributeName="r" values="95;85;95;82;95;105;95" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>

    <!-- Pupil Inner Depth -->
    <circle cx="0" cy="0" r="75" fill="#050505">
      <animate attributeName="r" values="75;65;75;62;75;85;75" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>

    <!-- Pupil Outer Glow (Soft edge of pupil) -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#1A1815" stroke-width="8" filter="url(#glowBlur)" opacity="0.6">
      <animate attributeName="r" values="85;75;85;72;85;95;85" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>

    <!-- Pupil Core Void -->
    <circle cx="0" cy="0" r="50" fill="#000000">
      <animate attributeName="r" values="50;40;50;37;50;60;50" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>

    <!-- Specular Highlights (Gleam) -->
    <!-- Primary Highlight -->
    <circle cx="-55" cy="-55" r="22" fill="#FFFFFF" filter="url(#highlightBlur)" opacity="0.95">
      <animate attributeName="cx" values="-55;-50;-55;-48;-55;-60;-55" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" values="-55;-50;-55;-48;-55;-60;-55" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="r" values="22;20;22;19;22;24;22" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>

    <!-- Secondary Highlight (Smaller, sharper) -->
    <circle cx="-35" cy="-75" r="5" fill="#FFFFFF" opacity="0.85">
      <animate attributeName="cx" values="-35;-30;-35;-28;-35;-40;-35" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="cy" values="-75;-70;-75;-68;-75;-80;-75" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <animate attributeName="r" values="5;4;5;3.5;5;6;5" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>

    <!-- Tertiary Highlight (Very subtle sweep) -->
    <circle cx="-70" cy="-30" r="2" fill="#FFFFFF" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6;0.1;0.6;0.8;0.6" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.8; 1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </circle>
  </g>

  <!-- Layer 13: Upper Eyelid Skin Fold -->
  <path d="M 250,450 C 450,200 1150,200 1350,450 C 1150,320 450,320 250,450 Z" fill="url(#skinGrad)"/>
  
  <!-- Layer 14: Eyelid Crease Shadow -->
  <path d="M 270,450 C 460,260 1140,260 1330,450 C 1140,360 460,360 270,450 Z" fill="#5C3A1E" filter="url(#shadowBlur)" opacity="0.5"/>

  <!-- Layer 15: Eyelid Crease Line -->
  <path d="M 280,450 C 470,270 1130,270 1320,450" stroke="#3D230F" stroke-width="5" fill="none" opacity="0.6" filter="url(#highlightBlur)"/>
  <path d="M 290,450 C 480,280 1120,280 1310,450" stroke="#D4A574" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Layer 16: Lower Eyelid Skin -->
  <path d="M 250,450 C 450,650 1150,650 1350,450 C 1150,580 450,580 250,450 Z" fill="url(#skinGrad)"/>

  <!-- Layer 17: Lower Eyelid Shadow (Cast by iris/sclera) -->
  <path d="M 250,450 C 450,650 1150,650 1350,450 C 1150,530 450,530 250,450 Z" fill="#2A1608" filter="url(#shadowBlur)" opacity="0.6"/>

  <!-- Layer 18: Tear Duct (Inner Corner) -->
  <path d="M 250,450 C 200,430 180,400 220,380 C 240,410 260,430 250,450 Z" fill="#D4A574"/>
  <path d="M 250,450 C 200,430 180,400 220,380 C 240,410 260,430 250,450 Z" fill="#FBF8F4" opacity="0.3" filter="url(#highlightBlur)"/>

  <!-- Layer 19: Outer Corner Crease -->
  <path d="M 1350,450 C 1380,430 1400,400 1380,380 C 1360,410 1340,430 1350,450 Z" fill="#8B5A2B" opacity="0.5"/>

  <!-- Layer 20: Fine Eyelashes (Top) -->
  <g stroke="#0A0908" stroke-width="2" fill="none" opacity="0.8">
    <path d="M 300,350 Q 200,200 100,150">
      <animate attributeName="d" values="M 300,350 Q 200,200 100,150; M 300,350 Q 210,210 110,160; M 300,350 Q 200,200 100,150" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 350,320 Q 280,150 220,80">
      <animate attributeName="d" values="M 350,320 Q 280,150 220,80; M 350,320 Q 290,160 230,90; M 350,320 Q 280,150 220,80" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 400,290 Q 350,120 320,50">
      <animate attributeName="d" values="M 400,290 Q 350,120 320,50; M 400,290 Q 360,130 330,60; M 400,290 Q 350,120 320,50" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 450,270 Q 420,100 410,30">
      <animate attributeName="d" values="M 450,270 Q 420,100 410,30; M 450,270 Q 430,110 420,40; M 450,270 Q 420,100 410,30" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 500,250 Q 500,80 500,-10">
      <animate attributeName="d" values="M 500,250 Q 500,80 500,-10; M 500,250 Q 510,90 510,0; M 500,250 Q 500,80 500,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 550,240 Q 580,70 600,-10">
      <animate attributeName="d" values="M 550,240 Q 580,70 600,-10; M 550,240 Q 590,80 610,0; M 550,240 Q 580,70 600,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 600,235 Q 660,60 690,-10">
      <animate attributeName="d" values="M 600,235 Q 660,60 690,-10; M 600,235 Q 670,70 700,0; M 600,235 Q 660,60 690,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 650,235 Q 740,50 780,-10">
      <animate attributeName="d" values="M 650,235 Q 740,50 780,-10; M 650,235 Q 750,60 790,0; M 650,235 Q 740,50 780,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 700,240 Q 820,50 870,-10">
      <animate attributeName="d" values="M 700,240 Q 820,50 870,-10; M 700,240 Q 830,60 880,0; M 700,240 Q 820,50 870,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 750,250 Q 900,60 960,-10">
      <animate attributeName="d" values="M 750,250 Q 900,60 960,-10; M 750,250 Q 910,70 970,0; M 750,250 Q 900,60 960,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 800,260 Q 980,70 1050,-10">
      <animate attributeName="d" values="M 800,260 Q 980,70 1050,-10; M 800,260 Q 990,80 1060,0; M 800,260 Q 980,70 1050,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 850,280 Q 1060,90 1140,-10">
      <animate attributeName="d" values="M 850,280 Q 1060,90 1140,-10; M 850,280 Q 1070,100 1150,0; M 850,280 Q 1060,90 1140,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 900,300 Q 1140,120 1230,-10">
      <animate attributeName="d" values="M 900,300 Q 1140,120 1230,-10; M 900,300 Q 1150,130 1240,0; M 900,300 Q 1140,120 1230,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 950,330 Q 1220,160 1310,-10">
      <animate attributeName="d" values="M 950,330 Q 1220,160 1310,-10; M 950,330 Q 1230,170 1320,0; M 950,330 Q 1220,160 1310,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
    <path d="M 1000,360 Q 1300,200 1380,-10">
      <animate attributeName="d" values="M 1000,360 Q 1300,200 1380,-10; M 1000,360 Q 1310,210 1390,0; M 1000,360 Q 1300,200 1380,-10" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    </path>
  </g>

  <!-- Layer 21: Fine Eyelashes (Bottom) -->
  <g stroke="#0A0908" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M 300,550 Q 250,700 200,800"/>
    <path d="M 350,570 Q 320,720 280,820"/>
    <path d="M 400,580 Q 390,730 370,830"/>
    <path d="M 450,590 Q 460,740 460,840"/>
    <path d="M 500,595 Q 530,740 550,840"/>
    <path d="M 550,595 Q 600,740 640,830"/>
    <path d="M 600,590 Q 670,730 720,810"/>
    <path d="M 650,580 Q 740,710 800,780"/>
    <path d="M 700,570 Q 810,690 880,750"/>
    <path d="M 750,560 Q 880,660 960,700"/>
    <path d="M 800,550 Q 940,630 1030,660"/>
    <path d="M 850,540 Q 1000,600 1100,620"/>
    <path d="M 900,530 Q 1060,570 1160,580"/>
    <path d="M 950,520 Q 1120,540 1220,540"/>
    <path d="M 1000,510 Q 1180,510 1280,500"/>
  </g>

  <!-- Layer 22: Skin Texture (Subtle Noise/Grain Overlay) -->
  <rect width="1600" height="900" fill="url(#skinGlow)" opacity="0.3" style="mix-blend-mode: soft-light;"/>
  
  <!-- Layer 23: Foreground Vignette (Top) -->
  <path d="M 0,-100 Q 800,150 1600,-100 L 1600,0 L 0,0 Z" fill="#0F0C09" opacity="0.4" filter="url(#deepBlur)"/>
  
  <!-- Layer 24: Foreground Vignette (Bottom) -->
  <path d="M 0,1000 Q 800,750 1600,1000 L 1600,900 L 0,900 Z" fill="#0F0C09" opacity="0.4" filter="url(#deepBlur)"/>

  <!-- Layer 25: Occasional Eyelid Sweep Soft Curve -->
  <path d="M 250,450 C 450,200 1150,200 1350,450" stroke="#1A1815" stroke-width="60" fill="none" filter="url(#deepBlur)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0; 0.65; 0.68; 0.72; 0.75" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="d" values="M 250,450 C 450,200 1150,200 1350,450; M 250,450 C 450,250 1150,250 1350,450; M 250,450 C 450,200 1150,200 1350,450" keyTimes="0; 0.7; 0.75" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </path>
</svg>