<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient: warm-to-cool dusk -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E">
        <animate attributeName="stop-color" values="#1A1A2E;#1f1f38;#1A1A2E" dur="25s" repeatCount="indefinite" />
      </stop>
      <stop offset="35%" stop-color="#6B4FBB">
        <animate attributeName="stop-color" values="#6B4FBB;#5a3ea8;#6B4FBB" dur="18s" repeatCount="indefinite" />
      </stop>
      <stop offset="70%" stop-color="#FF6B00">
        <animate attributeName="stop-color" values="#FF6B00;#ff8533;#FF6B00" dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#FF9F73">
        <animate attributeName="stop-color" values="#FF9F73;#ffb89a;#FF9F73" dur="22s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Horizon glow blur -->
    <radialGradient id="horizonGlow" cx="75%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.7">
        <animate attributeName="stop-opacity" values="0.7;0.9;0.7" dur="15s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#6B4FBB" stop-opacity="0" />
    </radialGradient>

    <!-- Road surface gradient for heat shimmer base -->
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#0d0d18" stop-opacity="1" />
    </linearGradient>

    <!-- Filters -->
    <filter id="blur20" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <filter id="blur60" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="blur90" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="90" />
    </filter>
    <filter id="blur120" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="120" />
    </filter>

    <!-- Heat shimmer filter -->
    <filter id="shimmer" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.005" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" values="0.015 0.005;0.02 0.008;0.015 0.005" dur="3s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- 1. Base Sky -->
  <rect width="1600" height="900" fill="#1A1A2E" />

  <!-- 2. Sky Gradient -->
  <rect width="1600" height="650" fill="url(#skyGrad)" />

  <!-- 3. Distant Deep Atmosphere (blur120) -->
  <ellipse cx="1200" cy="500" rx="900" ry="350" fill="#6B4FBB" opacity="0.4" filter="url(#blur120)">
    <animate attributeName="opacity" values="0.4;0.5;0.4" dur="20s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 20,0; 0,0" dur="30s" repeatCount="indefinite" />
  </ellipse>

  <!-- 4. Horizon Glow -->
  <rect x="0" y="350" width="1600" height="300" fill="url(#horizonGlow)" />

  <!-- 5. Cloud Layer 1 (blur90, slow drift) -->
  <g filter="url(#blur90)" opacity="0.5">
    <path d="M-200,400 Q200,350 600,420 T1400,380 T1800,450 V600 H-200 Z" fill="#FF9F73">
      <animate attributeName="d" values="M-200,400 Q200,350 600,420 T1400,380 T1800,450 V600 H-200 Z;M-100,410 Q300,360 700,430 T1500,390 T1900,460 V600 H-100 Z;M-200,400 Q200,350 600,420 T1400,380 T1800,450 V600 H-200 Z" dur="45s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- 6. Cloud Layer 2 (blur60, drift) -->
  <g filter="url(#blur60)" opacity="0.35">
    <path d="M-100,450 Q400,400 900,480 T1700,440 V650 H-100 Z" fill="#FF6B00">
      <animate attributeName="d" values="M-100,450 Q400,400 900,480 T1700,440 V650 H-100 Z;M0,460 Q500,410 1000,490 T1800,450 V650 H0 Z;M-100,450 Q400,400 900,480 T1700,440 V650 H-100 Z" dur="35s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- 7. Vast Warm Haze (blur120, breathing) -->
  <ellipse cx="900" cy="550" rx="700" ry="200" fill="#FF6B00" opacity="0.15" filter="url(#blur120)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="18s" repeatCount="indefinite" />
  </ellipse>

  <!-- 8. Ground / Base Terrain silhouette -->
  <rect x="0" y="580" width="1600" height="320" fill="#0a0a12" />

  <!-- 9. Road Surface -->
  <polygon points="0,900 650,580 1050,580 1600,900" fill="url(#roadGrad)" />
  
  <!-- 10. Road Center Line -->
  <polygon points="820,580 800,580 760,900 860,900" fill="#FF9F73" opacity="0.25" />

  <!-- 11. Heat Shimmer Overlay on Road -->
  <polygon points="0,900 650,580 1050,580 1600,900" fill="#FF9F73" opacity="0.08" filter="url(#shimmer)" />

  <!-- 12. Distant Vanishing Point Car (Tiny) -->
  <!-- Positioned slightly right of center at the vanishing point -->
  <g transform="translate(855, 575) scale(0.25)">
    <path d="M-40,0 L40,0 L35,-10 L-35,-10 Z" fill="#1A1A2E" />
    <path d="M-20,-10 L-15,-22 L15,-22 L20,-10 Z" fill="#1A1A2E" />
    <!-- Tiny tail lights -->
    <circle cx="-25" cy="-2" r="2" fill="#FF6B00" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="25" cy="-2" r="2" fill="#FF6B00" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 13. Distant Power Lines (Left side, fading into horizon) -->
  <g opacity="0.3">
    <!-- Pole 1 -->
    <rect x="680" y="570" width="3" height="25" fill="#1A1A2E" />
    <!-- Pole 2 -->
    <rect x="550" y="575" width="4" height="40" fill="#1A1A2E" />
    <!-- Pole 3 -->
    <rect x="350" y="585" width="6" height="70" fill="#1A1A2E" />
    <!-- Pole 4 -->
    <rect x="100" y="600" width="10" height="120" fill="#1A1A2E" />
    
    <!-- Wires -->
    <path d="M100,620 Q225,600 350,595 T550,585 T680,575" fill="none" stroke="#1A1A2E" stroke-width="1.5" opacity="0.5" />
    <path d="M100,630 Q225,610 350,605 T550,595 T680,585" fill="none" stroke="#1A1A2E" stroke-width="1" opacity="0.4" />
  </g>

  <!-- 14. Focal Subject: Lone Car Silhouette (OFF-CENTER RIGHT) -->
  <g id="focalCar" transform="translate(1180, 750)">
    <!-- Subtle sway animation for the whole car group -->
    <animateTransform attributeName="transform" type="translate" values="1180,750; 1182,749; 1180,750" dur="12s" repeatCount="indefinite" additive="sum" />
    
    <!-- Car Body Silhouette -->
    <path d="M-220,0 L220,0 L215,-35 L160,-50 L130,-85 L-130,-85 L-160,-50 L-215,-35 Z" fill="#0d0d18" />
    
    <!-- Windows -->
    <path d="M-120,-85 L-100,-55 L100,-55 L120,-85 Z" fill="#050510" />
    
    <!-- Wheels -->
    <circle cx="-140" cy="0" r="28" fill="#050510" />
    <circle cx="140" cy="0" r="28" fill="#050510" />
    
    <!-- RIM LIGHT (Golden Sunset from behind/right) -->
    <!-- Top edge light -->
    <path d="M-130,-85 L130,-85 L120,-87 L-120,-87 Z" fill="#FF9F73" opacity="0.9" />
    <!-- Right edge light -->
    <path d="M220,0 L215,-35 L218,-35 L223,0 Z" fill="#FF6B00" opacity="0.8" />
    <!-- Front bumper light -->
    <path d="M220,0 L223,0 L222,5 L217,5 Z" fill="#FF9F73" opacity="0.7" />
    <!-- Roof highlight -->
    <path d="M-130,-85 L130,-85 L125,-90 L-125,-90 Z" fill="#FF6B00" opacity="0.6" filter="url(#blur20)" />
    
    <!-- Tail lights (warm glow pulsing) -->
    <circle cx="-215" cy="-10" r="4" fill="#FF6B00" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="-215" cy="-10" r="12" fill="#FF6B00" opacity="0.2" filter="url(#blur20)">
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Headlights (subtle, looking forward into darkness) -->
    <path d="M220,-15 L280,-30 L280,10 L220,5 Z" fill="#FF9F73" opacity="0.08" filter="url(#blur60)" />
  </g>

  <!-- 15. Car Reflection on Road (Inverted, faded) -->
  <g transform="translate(1180, 780) scale(1, -0.4)" opacity="0.15">
    <path d="M-220,0 L220,0 L215,-35 L160,-50 L130,-85 L-130,-85 L-160,-50 L-215,-35 Z" fill="#FF9F73" filter="url(#blur20)" />
  </g>

  <!-- 16. Foreground Haze / Light Bloom (blur60) -->
  <ellipse cx="1300" cy="800" rx="400" ry="150" fill="#FF6B00" opacity="0.2" filter="url(#blur60)">
    <animate attributeName="opacity" values="0.2;0.3;0.2" dur="14s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="1300" cy="750" rx="250" ry="80" fill="#FF9F73" opacity="0.15" filter="url(#blur60)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="16s" repeatCount="indefinite" />
  </ellipse>

  <!-- 17. Atmospheric Dust / Particles Layer -->
  <g fill="#FF9F73" opacity="0.6">
    <!-- Large slow particles -->
    <circle cx="200" cy="300" r="2">
      <animate attributeName="cx" values="200;1600;200" dur="40s" repeatCount="indefinite" />
      <animate attributeName="cy" values="300;250;300" dur="40s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="40s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="500" r="3">
      <animate attributeName="cx" values="800;1500;800" dur="55s" repeatCount="indefinite" />
      <animate attributeName="cy" values="500;450;500" dur="55s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.6;0" dur="55s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="200" r="1.5">
      <animate attributeName="cx" values="400;1200;400" dur="35s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;150;200" dur="35s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.7;0" dur="35s" repeatCount="indefinite" />
    </circle>

    <!-- Medium particles -->
    <circle cx="100" cy="600" r="1.5">
      <animate attributeName="cx" values="100;900;100" dur="25s" repeatCount="indefinite" />
      <animate attributeName="cy" values="600;580;600" dur="25s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.5;0" dur="25s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="700" r="2">
      <animate attributeName="cx" values="300;1100;300" dur="30s" repeatCount="indefinite" />
      <animate attributeName="cy" values="700;720;700" dur="30s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.4;0" dur="30s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="400" r="1">
      <animate attributeName="cx" values="600;1300;600" dur="28s" repeatCount="indefinite" />
      <animate attributeName="cy" values="400;380;400" dur="28s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.6;0" dur="28s" repeatCount="indefinite" />
    </circle>
    <circle cx="1000" cy="300" r="2.5">
      <animate attributeName="cx" values="1000;1600;1000" dur="22s" repeatCount="indefinite" />
      <animate attributeName="cy" values="300;320;300" dur="22s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.5;0" dur="22s" repeatCount="indefinite" />
    </circle>

    <!-- Small fast particles near the road / heat -->
    <circle cx="500" cy="800" r="1">
      <animate attributeName="cx" values="500;1200;500" dur="15s" repeatCount="indefinite" />
      <animate attributeName="cy" values="800;780;800" dur="15s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="15s" repeatCount="indefinite" />
    </circle>
    <circle cx="900" cy="750" r="1.5">
      <animate attributeName="cx" values="900;1400;900" dur="18s" repeatCount="indefinite" />
      <animate attributeName="cy" values="750;770;750" dur="18s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.7;0" dur="18s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="850" r="1">
      <animate attributeName="cx" values="200;800;200" dur="12s" repeatCount="indefinite" />
      <animate attributeName="cy" values="850;830;850" dur="12s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.6;0" dur="12s" repeatCount="indefinite" />
    </circle>

    <!-- Floating motes in the light beam -->
    <circle cx="1200" cy="650" r="2">
      <animate attributeName="cy" values="650;550;650" dur="20s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1200;1250;1200" dur="20s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.6;0" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle cx="1250" cy="700" r="1.5">
      <animate attributeName="cy" values="700;600;700" dur="24s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1250;1200;1250" dur="24s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.5;0" dur="24s" repeatCount="indefinite" />
    </circle>
    <circle cx="1150" cy="680" r="1">
      <animate attributeName="cy" values="680;580;680" dur="18s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1150;1180;1150" dur="18s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.7;0" dur="18s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 18. Foreground Blur Overlay for Depth (blur90) -->
  <rect x="0" y="750" width="1600" height="150" fill="#1A1A2E" opacity="0.3" filter="url(#blur90)" />

  <!-- 19. Vignette (Dark corners) -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#1A1A2E" stop-opacity="0" />
    <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0.6" />
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)" pointer-events="none" />

  <!-- 20. Top light leak (warm) -->
  <rect x="0" y="0" width="1600" height="200" fill="#FF6B00" opacity="0.05" filter="url(#blur120)" />

  <!-- 21. Bottom light leak (cool) -->
  <rect x="0" y="750" width="1600" height="150" fill="#6B4FBB" opacity="0.08" filter="url(#blur120)" />

  <!-- 22. Additional subtle warm dust mote crossing the negative space -->
  <circle cx="400" cy="150" r="1" fill="#FF9F73" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="10s" repeatCount="indefinite" begin="0s" />
    <animate attributeName="cx" values="400;600;400" dur="10s" repeatCount="indefinite" begin="0s" />
    <animate attributeName="cy" values="150;180;150" dur="10s" repeatCount="indefinite" begin="0s" />
  </circle>
  <circle cx="200" cy="250" r="1.5" fill="#FF6B00" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="14s" repeatCount="indefinite" begin="2s" />
    <animate attributeName="cx" values="200;500;200" dur="14s" repeatCount="indefinite" begin="2s" />
    <animate attributeName="cy" values="250;220;250" dur="14s" repeatCount="indefinite" begin="2s" />
  </circle>

  <!-- 23. Distant wind turbine suggestion (Left side, tiny) -->
  <g transform="translate(450, 570) scale(0.4)" opacity="0.2">
    <rect x="-2" y="0" width="4" height="60" fill="#1A1A2E" />
    <path d="M0,0 L-30,-40 L30,-40 Z" fill="#1A1A2E">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- 24. Heat shimmer secondary layer (closer to camera, stronger) -->
  <polygon points="800,700 750,580 850,580 900,700" fill="#FF9F73" opacity="0.05" filter="url(#shimmer)" />

  <!-- 25. Final atmospheric glow behind car to pop the silhouette -->
  <ellipse cx="1180" cy="730" rx="120" ry="60" fill="#FF6B00" opacity="0.15" filter="url(#blur90)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="12s" repeatCount="indefinite" />
  </ellipse>

</svg>