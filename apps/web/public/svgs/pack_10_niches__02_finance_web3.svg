<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60" result="b1"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40" result="b2"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.06  0 0 0 0 0.06  0 0 0 0 0.07  0 0 0 0.2 0" in="noise"/>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#D4A017" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C0C0C0" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#0F0E12"/>
  <rect width="1600" height="900" fill="#0F0E12" filter="url(#noise)" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="8s" repeatCount="indefinite"/>
  </rect>
  
  <ellipse cx="400" cy="450" rx="600" ry="400" fill="#D4A017" opacity="0.8" filter="url(#blur1)">
    <animate attributeName="cx" values="400;500;400" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="450;400;450" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="600;700;600" dur="15s" repeatCount="indefinite"/>
  </ellipse>
  
  <ellipse cx="1200" cy="500" rx="500" ry="350" fill="#C0C0C0" opacity="0.75" filter="url(#blur1)">
    <animate attributeName="cx" values="1200;1100;1200" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="500;550;500" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;0.95;0.75" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  
  <circle cx="800" cy="450" r="300" fill="#00C896" opacity="0.7" filter="url(#blur2)">
    <animate attributeName="r" values="300;350;300" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="7s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,50; 0,0" dur="10s" repeatCount="indefinite"/>
  </circle>
  
  <path d="M -100 300 Q 400 200 800 300 T 1700 300" stroke="#D4A017" stroke-width="120" fill="none" opacity="0.85" filter="url(#blur2)">
    <animate attributeName="d" values="M -100 300 Q 400 200 800 300 T 1700 300; M -100 350 Q 400 250 800 350 T 1700 350; M -100 300 Q 400 200 800 300 T 1700 300" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.85;0.95;0.85" dur="4s" repeatCount="indefinite"/>
  </path>
  
  <path d="M -100 600 Q 400 700 800 600 T 1700 600" stroke="#C0C0C0" stroke-width="80" fill="none" opacity="0.8" filter="url(#blur2)">
    <animate attributeName="d" values="M -100 600 Q 400 700 800 600 T 1700 600; M -100 550 Q 400 650 800 550 T 1700 550; M -100 600 Q 400 700 800 600 T 1700 600" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 0,0" dur="12s" repeatCount="indefinite"/>
  </path>
  
  <g transform="translate(300, 450)">
    <ellipse cx="0" cy="-100" rx="80" ry="20" fill="#00C896" opacity="0.9">
      <animate attributeName="fill-opacity" values="0.9;0.7;0.9" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M -80,-100 L -80,100 A 80,20 0 0,0 80,100 L 80,-100 A 80,20 0 0,0 -80,-100" fill="url(#goldGrad)" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" values="0; 5; 0" dur="8s" repeatCount="indefinite"/>
    </path>
    <ellipse cx="0" cy="100" rx="80" ry="20" fill="#D4A017" opacity="0.6"/>
    <animateMotion path="M -50,0 Q 0,-20 50,0" dur="9s" repeatCount="indefinite"/>
  </g>
  
  <g transform="translate(1300, 400)">
    <ellipse cx="0" cy="-120" rx="100" ry="25" fill="#C0C0C0" opacity="0.95"/>
    <path d="M -100,-120 L -100,120 A 100,25 0 0,0 100,120 L 100,-120 A 100,25 0 0,0 -100,-120" fill="url(#silverGrad)" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.95;0.85" dur="6s" repeatCount="indefinite"/>
    </path>
    <ellipse cx="0" cy="120" rx="100" ry="25" fill="#C0C0C0" opacity="0.7"/>
    <animateMotion path="M 0,0 Q 30,30 0,60 Q -30,30 0,0" dur="11s" repeatCount="indefinite"/>
  </g>
  
  <g transform="translate(800, 450)">
    <path d="M -60,-150 L -60,150 A 60,15 0 0,0 60,150 L 60,-150 A 60,15 0 0,0 -60,-150" fill="#D4A017" opacity="0.8"/>
    <ellipse cx="0" cy="-150" rx="60" ry="15" fill="#00C896" opacity="0.8">
      <animate attributeName="fill-opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M -60,-50 L -60,0 A 60,15 0 0,0 60,0 L 60,-50 A 60,15 0 0,0 -60,-50" fill="#C0C0C0" opacity="0.7"/>
    <animateTransform attributeName="transform" type="rotate" values="0 800 450; 360 800 450" dur="20s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30; 0,0" dur="7s" repeatCount="indefinite" additive="sum"/>
  </g>
  
  <circle cx="500" cy="200" r="8" fill="#D4A017" opacity="0.9">
    <animate attributeName="cy" values="200;250;200" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1100" cy="700" r="6" fill="#D4A017" opacity="0.8">
    <animate attributeName="cy" values="700;650;700" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="700" cy="750" r="10" fill="#00C896" opacity="0.8">
    <animate attributeName="cx" values="700;750;700" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="10;15;10" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <line x1="0" y1="450" x2="1600" y2="450" stroke="#C0C0C0" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="5s" repeatCount="indefinite"/>
  </line>
  
  <line x1="800" y1="0" x2="800" y2="900" stroke="#D4A017" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="7s" repeatCount="indefinite"/>
  </line>
  
  <path d="M 400 600 Q 600 500 800 600 T 1200 600" stroke="#00C896" stroke-width="4" fill="none" opacity="0.8">
    <animate attributeName="stroke-dasharray" values="0,1000; 1000,0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>