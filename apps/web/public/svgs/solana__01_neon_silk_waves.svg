      <stop offset=".35" stop-color="#14F195"/>
      <stop offset=".7" stop-color="#FF36F9"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="cm" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14F195"/>
      <stop offset=".4" stop-color="#9945FF"/>
      <stop offset=".8" stop-color="#FF36F9"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
