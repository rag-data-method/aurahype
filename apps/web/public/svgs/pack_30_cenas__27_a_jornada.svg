<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4A24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3D4147;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="compassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4A24;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3D4147;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="thermosGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3D4147;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#5D4A24;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3D4147;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feOffset in="blur" dx="0" dy="8" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vaporBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
    </filter>
    <filter id="rockTexture">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#EFE9E1"/>
  <g transform="translate(800, 680)">
    <ellipse cx="0" cy="0" rx="400" ry="120" fill="#3D4147" opacity="0.9" filter="url(#rockTexture)">
      <animate attributeName="opacity" values="0.9;0.95;0.9" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="-10" rx="380" ry="100" fill="none" stroke="#5D4A24" stroke-width="3" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="6s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <ellipse cx="650" cy="650" rx="140" ry="40" fill="#3D4147" opacity="0.4" filter="url(#softShadow)">
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="140;145;140" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <g transform="translate(650, 580)">
    <g transform="translate(-60, 20) rotate(-10)">
      <path d="M-70,0 Q-80,-60 -40,-90 L20,-85 Q60,-80 70,-30 L75,20 Q75,50 40,60 L-30,55 Q-60,50 -70,0Z" fill="url(#bootGrad)" stroke="#3D4147" stroke-width="2"/>
      <path d="M-70,0 Q-60,50 -30,55 L40,60 Q75,50 75,20 L70,30 Q70,60 40,70 L-30,65 Q-60,60 -65,10Z" fill="#3D4147"/>
      <path d="M-40,-70 L-20,-60 M-35,-50 L-15,-40 M-30,-30 L-10,-20" stroke="#E63946" stroke-width="4" stroke-linecap="round" opacity="0.8">
        <animate attributeName="stroke-width" values="4;5;4" dur="3s" repeatCount="indefinite"/>
      </path>
      <circle cx="50" cy="40" r="8" fill="#3D4147" opacity="0.5"/>
    </g>
    <g transform="translate(40, 0) rotate(5)">
      <path d="M-75,10 Q-85,-50 -45,-80 L15,-75 Q65,-70 75,-20 L80,30 Q80,60 45,70 L-25,65 Q-65,60 -75,10Z" fill="url(#bootGrad)" stroke="#3D4147" stroke-width="2"/>
      <path d="M-75,10 Q-65,60 -25,65 L45,70 Q80,60 80,30 L75,40 Q75,70 45,80 L-25,75 Q-65,70 -70,20Z" fill="#3D4147"/>
      <path d="M-45,-60 L-25,-50 M-40,-40 L-20,-30 M-35,-20 L-15,-10" stroke="#E63946" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
      <path d="M-15,-10 L-10,0" stroke="#E63946" stroke-width="3" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="-2 0 0; 2 0 0; -2 0 0" dur="2s" repeatCount="indefinite"/>
      </path>
      <circle cx="55" cy="50" r="10" fill="#3D4147" opacity="0.6"/>
      <circle cx="-50" cy="30" r="6" fill="#3D4147" opacity="0.4"/>
    </g>
    <animateTransform attributeName="transform" type="translate" values="650,580; 650,578; 650,580" dur="6s" repeatCount="indefinite" additive="replace"/>
  </g>
  <g transform="translate(900, 620)">
    <ellipse cx="0" cy="35" rx="60" ry="20" fill="#3D4147" opacity="0.3" filter="url(#softShadow)">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="0" cy="0" r="50" fill="url(#compassGrad)" stroke="#5D4A24" stroke-width="3"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#E63946" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="40" fill="#EFE9E1" opacity="0.1"/>
    <path d="M-25,-20 Q-10,-30 10,-25 Q25,-15 20,5" fill="none" stroke="#EFE9E1" stroke-width="3" opacity="0.4">
      <animate attributeName="d" values="M-25,-20 Q-10,-30 10,-25 Q25,-15 20,5; M-20,-25 Q-5,-35 15,-30 Q30,-20 25,0; M-25,-20 Q-10,-30 10,-25 Q25,-15 20,5" dur="8s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="0" r="35" fill="#EFE9E1" opacity="0.9"/>
    <g stroke="#3D4147" stroke-width="2">
      <line x1="0" y1="-30" x2="0" y2="-25"/><line x1="22" y1="-22" x2="18" y2="-18"/><line x1="30" y1="0" x2="25" y2="0"/>
      <line x1="22" y1="22" x2="18" y2="18"/><line x1="0" y1="30" x2="0" y2="25"/><line x1="-22" y1="22" x2="-18" y2="18"/>
      <line x1="-30" y1="0" x2="-25" y2="0"/><line x1="-22" y1="-22" x2="-18" y2="-18"/>
    </g>
    <g>
      <path d="M0,-25 L4,-4 L0,0 L-4,-4 Z" fill="#E63946"/>
      <path d="M0,25 L4,4 L0,0 L-4,4 Z" fill="#3D4147"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#5D4A24"/>
    <animateTransform attributeName="transform" type="translate" values="900,620; 900,615; 900,620" dur="4s" repeatCount="indefinite" additive="replace"/>
  </g>
  <g transform="translate(1100, 520)">
    <ellipse cx="0" cy="85" rx="40" ry="15" fill="#3D4147" opacity="0.3" filter="url(#softShadow)">
      <animate attributeName="rx" values="40;42;40" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="-30" y="-60" width="60" height="140" rx="15" fill="url(#thermosGrad)" stroke="#3D4147" stroke-width="2"/>
    <rect x="-30" y="0" width="60" height="10" fill="#5D4A24" opacity="0.6"/>
    <rect x="-25" y="-80" width="50" height="25" rx="5" fill="#E63946" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="-75" width="40" height="5" fill="#EFE9E1" opacity="0.3"/>
    <ellipse cx="0" cy="-80" rx="25" ry="8" fill="#E63946" opacity="0.8"/>
    <path d="M30,-40 Q45,-40 45,-20 Q45,0 30,0" fill="none" stroke="#3D4147" stroke-width="6" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="rotate" values="-1 0 80; 1 0 80; -1 0 80" dur="8s" repeatCount="indefinite" additive="sum"/>
    <g filter="url(#vaporBlur)" opacity="0.6">
      <circle cx="-5" cy="-90" r="8" fill="#EFE9E1" opacity="0">
        <animate attributeName="cy" values="-90;-140" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="r" values="8;12;8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="8" cy="-90" r="6" fill="#EFE9E1" opacity="0">
        <animate attributeName="cy" values="-90;-150" dur="5s" begin="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="1s" repeatCount="indefinite"/>
        <animate attributeName="r" values="6;10;6" dur="5s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="-90" r="10" fill="#EFE9E1" opacity="0">
        <animate attributeName="cy" values="-90;-120" dur="3.5s" begin="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.4;0" dur="3.5s" begin="2s" repeatCount="indefinite"/>
        <animate attributeName="r" values="10;15;10" dur="3.5s" begin="2s" repeatCount="indefinite"/>
      </circle>
      <ellipse cx="5" cy="-95" rx="12" ry="6" fill="#EFE9E1" opacity="0">
        <animate attributeName="cy" values="-95;-145" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.3;0" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; -10,-20; 5,-40" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>
  <g fill="#5D4A24" opacity="0.3">
    <circle cx="500" cy="400" r="2"><animate attributeName="cy" values="400;380;400" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.3;0" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="1200" cy="300" r="3"><animate attributeName="cy" values="300;280;300" dur="9s" repeatCount="indefinite"/><animate attributeName="cx" values="1200;1210;1200" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="600" r="2"><animate attributeName="cy" values="600;590;600" dur="6s" repeatCount="indefinite"/></circle>
  </g>
</svg>