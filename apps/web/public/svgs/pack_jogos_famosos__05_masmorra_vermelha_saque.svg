<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Atmospheric Filters for Layered Depth -->
    <filter id="blur40" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur80" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="blur120" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="blur160" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="160"/></filter>

    <!-- Organic Atmospheric Grain -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="mappedNoise">
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feComposite operator="in" in="mappedNoise" in2="SourceGraphic" result="comp"/>
      <feBlend mode="overlay" in="comp" in2="SourceGraphic"/>
    </filter>

    <!-- Gradients -->
    <radialGradient id="treasureGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#C9A574" stop-opacity="1"/>
      <stop offset="40%" stop-color="#E8622C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8622C" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0808" stop-opacity="1">
        <animate attributeName="stop-color" values="#1A0808;#2A1212;#1A0808" dur="22s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#3D0F0F" stop-opacity="1">
        <animate attributeName="stop-color" values="#3D0F0F;#4A1515;#3D0F0F" dur="22s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#060101" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="rimGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8622C" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#C9A574" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3D0F0F" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="fogGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8622C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A574" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8622C" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Particle Drift Paths -->
    <path id="drift1" d="M -200,900 C 200,700 400,500 800,400 C 1200,300 1400,100 1800,0" />
    <path id="drift2" d="M -100,950 C 300,750 600,550 1000,450 C 1300,350 1500,150 1900,-50" />
    <path id="drift3" d="M -300,920 C 100,720 500,520 900,420 C 1300,320 1600,120 2000,20" />
  </defs>

  <!-- Layer 1: Base Atmosphere -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#skyGrad)" />

  <!-- Layer 2: Deep Atmospheric Blur -->
  <rect x="0" y="200" width="1600" height="700" fill="#1A0808" filter="url(#blur160)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.9;0.8" dur="15s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 3: Distant Dungeon Ceiling (Stalactites) -->
  <g filter="url(#blur120)" opacity="0.5">
    <path d="M 0,0 L 200,0 L 180,180 L 140,120 L 100,250 L 60,150 L 0,200 Z" fill="#1A0808"/>
    <path d="M 300,0 L 500,0 L 480,220 L 440,160 L 400,300 L 350,180 L 300,200 Z" fill="#1A0808"/>
    <path d="M 1200,0 L 1600,0 L 1600,300 L 1500,250 L 1400,400 L 1300,180 L 1200,200 Z" fill="#1A0808"/>
    <path d="M 700,0 L 900,0 L 880,250 L 820,150 L 780,300 L 750,180 L 700,200 Z" fill="#1A0808"/>
    <path d="M 900,0 L 1100,0 L 1080,180 L 1020,250 L 980,150 L 950,200 L 900,100 Z" fill="#1A0808"/>
  </g>

  <!-- Layer 4: Mid-Distant Blur (Chains & Columns) -->
  <g filter="url(#blur80)" opacity="0.6">
    <path d="M 200,0 L 210,0 L 215,600 L 205,600 Z" fill="#3D0F0F"/>
    <path d="M 400,0 L 415,0 L 410,500 L 395,500 Z" fill="#3D0F0F"/>
    <path d="M 1050,0 L 1060,0 L 1065,700 L 1055,700 Z" fill="#3D0F0F"/>
    <path d="M 1250,0 L 1265,0 L 1260,650 L 1245,650 Z" fill="#3D0F0F"/>
    <path d="M 600,0 L 610,0 L 615,450 L 605,450 Z" fill="#3D0F0F"/>
  </g>

  <!-- Layer 5: Deep Red Fog Bank -->
  <rect x="0" y="550" width="1600" height="350" fill="url(#fogGrad)" filter="url(#blur120)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.5;0.7" dur="18s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 6: Mid-Ground Structural Chains -->
  <g filter="url(#blur40)" opacity="0.8">
    <path d="M 250,0 L 255,0 L 260,900 L 255,900 Z" fill="#2A0A0A"/>
    <path d="M 380,0 L 385,0 L 382,900 L 377,900 Z" fill="#2A0A0A"/>
    <path d="M 1080,0 L 1085,0 L 1082,900 L 1077,900 Z" fill="#2A0A0A"/>
    <path d="M 1220,0 L 1225,0 L 1223,900 L 1218,900 Z" fill="#2A0A0A"/>
  </g>

  <!-- Layer 7: Mid-Ground Stalactites (Sharper) -->
  <g opacity="0.9">
    <path d="M 150,0 L 250,0 L 230,120 L 200,60 L 180,150 L 150,80 Z" fill="#1A0808"/>
    <path d="M 1300,0 L 1450,0 L 1430,180 L 1380,100 L 1340,220 L 1300,120 Z" fill="#1A0808"/>
    <path d="M 950,0 L 1050,0 L 1040,100 L 1000,50 L 980,120 L 950,70 Z" fill="#1A0808"/>
    <path d="M 450,0 L 550,0 L 530,140 L 500,90 L 470,160 L 450,100 Z" fill="#1A0808"/>
  </g>

  <!-- Layer 8: Floor & Treasure Platform -->
  <ellipse cx="1150" cy="780" rx="350" ry="90" fill="#1A0808" />
  <ellipse cx="1150" cy="775" rx="280" ry="70" fill="#2A0A0A" />
  
  <!-- Layer 9: Treasure Rune Circle Base -->
  <ellipse cx="1150" cy="780" rx="220" ry="55" fill="url(#treasureGlow)" opacity="0.3">
    <animate attributeName="rx" values="220;230;220" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="55;60;55" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1150" cy="780" rx="150" ry="35" fill="#C9A574" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.35;0.2" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Layer 10: Hero Subject Silhouette (Right Third) -->
  <g transform="translate(1100, 480)">
    <!-- Breathing animation -->
    <animateTransform attributeName="transform" type="translate" values="1100,480; 1100,476; 1100,480" dur="8s" repeatCount="indefinite" additive="replace"/>
    
    <!-- Main Body Silhouette -->
    <path d="M 60,0 
             C 80,-10 100,-5 110,10 
             C 115,18 112,25 108,30 
             C 115,35 125,45 130,60 
             C 138,80 135,100 140,120 
             C 145,140 148,160 145,180 
             C 142,200 135,220 130,240 
             C 125,260 120,280 115,300 
             L 140,300 
             C 142,280 145,260 148,240 
             C 152,220 155,200 158,180 
             C 160,160 162,140 160,120 
             C 158,100 155,80 150,60 
             C 145,45 135,35 125,25 
             C 125,20 128,15 125,10 
             C 120,0 105,-5 90,-2 
             C 75,2 60,5 60,0 Z" 
          fill="#0D0202"/>
    
    <!-- Flowing Cloak/Hood Details -->
    <path d="M 60,0 C 20,20 -20,50 -40,80 C -30,90 0,80 20,60 Z" fill="#0D0202"/>
    <path d="M 115,300 L 100,310 L 80,305 L 95,290 Z" fill="#0D0202"/>
    <path d="M 140,300 L 160,310 L 180,305 L 160,290 Z" fill="#0D0202"/>

    <!-- Weapon/Hammer Handle (held loosely) -->
    <path d="M 145,180 L 180,120 L 185,122 L 150,182 Z" fill="#0D0202"/>
    <!-- Hammer Head -->
    <path d="M 175,115 L 195,100 L 200,105 L 185,125 Z" fill="#0D0202"/>

    <!-- Rim Light (Warm left edge) -->
    <path d="M 60,0 C 80,-10 100,-5 110,10 C 115,18 112,25 108,30 C 115,35 125,45 130,60 C 135,45 125,35 118,30 C 122,25 125,18 120,10 C 110,-2 90,-6 70,-2 Z" fill="url(#rimGrad)" opacity="0.6"/>
    <path d="M 60,0 C 20,20 -20,50 -40,80 C -30,90 0,80 20,60 C 0,70 -25,75 -35,70 C -15,45 20,15 55,-2 Z" fill="url(#rimGrad)" opacity="0.5"/>
  </g>

  <!-- Layer 11: Treasure Chest / Loot Pile Glow -->
  <ellipse cx="1080" cy="790" rx="60" ry="20" fill="#E8622C" opacity="0.4" filter="url(#blur40)">
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <path d="M 1050,790 L 1110,790 L 1105,780 L 1045,780 Z" fill="#C9A574" opacity="0.5"/>
  <path d="M 1060,780 L 1075,765 L 1085,775 L 1095,760 L 1100,780 Z" fill="#C9A574" opacity="0.6"/>

  <!-- Layer 12: Ground Rune Markings -->
  <g opacity="0.5">
    <circle cx="1150" cy="780" r="180" fill="none" stroke="#E8622C" stroke-width="2" filter="url(#blur40)">
      <animate attributeName="r" values="180;190;180" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1150" cy="780" r="120" fill="none" stroke="#C9A574" stroke-width="1" filter="url(#blur40)" opacity="0.6"/>
    <!-- Runes -->
    <path d="M 1070,780 L 1090,760 L 1090,800 Z" fill="#E8622C" opacity="0.3"/>
    <path d="M 1230,780 L 1210,760 L 1210,800 Z" fill="#E8622C" opacity="0.3"/>
    <path d="M 1150,700 L 1170,720 L 1130,720 Z" fill="#E8622C" opacity="0.3"/>
    <path d="M 1150,860 L 1170,840 L 1130,840 Z" fill="#E8622C" opacity="0.3"/>
  </g>

  <!-- Layer 13: Foreground Atmospheric Particles (Embers) -->
  <g opacity="0.8">
    <!-- Particle 1 -->
    <circle r="3" fill="#E8622C">
      <animateMotion dur="14s" repeatCount="indefinite" path="M -200,900 C 200,700 400,500 800,400 C 1200,300 1400,100 1800,0"/>
      <animate attributeName="opacity" values="0;1;0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;4;1" dur="14s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 2 -->
    <circle r="2" fill="#C9A574">
      <animateMotion dur="18s" repeatCount="indefinite" begin="2s" path="M -100,950 C 300,750 600,550 1000,450 C 1300,350 1500,150 1900,-50"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 3 -->
    <circle r="4" fill="#E8622C">
      <animateMotion dur="12s" repeatCount="indefinite" begin="5s" path="M -300,920 C 100,720 500,520 900,420 C 1300,320 1600,120 2000,20"/>
      <animate attributeName="opacity" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 4 -->
    <circle r="2.5" fill="#C9A574">
      <animateMotion dur="16s" repeatCount="indefinite" begin="1s" path="M -200,900 C 200,700 400,500 800,400 C 1200,300 1400,100 1800,0"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="16s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 5 -->
    <circle r="3.5" fill="#E8622C">
      <animateMotion dur="20s" repeatCount="indefinite" begin="7s" path="M -100,950 C 300,750 600,550 1000,450 C 1300,350 1500,150 1900,-50"/>
      <animate attributeName="opacity" values="0;1;0" dur="20s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 6 -->
    <circle r="1.5" fill="#C9A574">
      <animateMotion dur="11s" repeatCount="indefinite" begin="3s" path="M -300,920 C 100,720 500,520 900,420 C 1300,320 1600,120 2000,20"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 7 -->
    <circle r="2" fill="#E8622C">
      <animateMotion dur="15s" repeatCount="indefinite" begin="9s" path="M -200,900 C 200,700 400,500 800,400 C 1200,300 1400,100 1800,0"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 8 -->
    <circle r="3" fill="#C9A574">
      <animateMotion dur="13s" repeatCount="indefinite" begin="4s" path="M -100,950 C 300,750 600,550 1000,450 C 1300,350 1500,150 1900,-50"/>
      <animate attributeName="opacity" values="0;1;0" dur="13s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 9 -->
    <circle r="2.5" fill="#E8622C">
      <animateMotion dur="17s" repeatCount="indefinite" begin="6s" path="M -300,920 C 100,720 500,520 900,420 C 1300,320 1600,120 2000,20"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="17s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 10 -->
    <circle r="1.5" fill="#C9A574">
      <animateMotion dur="19s" repeatCount="indefinite" begin="8s" path="M -200,900 C 200,700 400,500 800,400 C 1200,300 1400,100 1800,0"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="19s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 11 -->
    <circle r="2" fill="#E8622C">
      <animateMotion dur="14s" repeatCount="indefinite" begin="10s" path="M -100,950 C 300,750 600,550 1000,450 C 1300,350 1500,150 1900,-50"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 12 -->
    <circle r="3" fill="#C9A574">
      <animateMotion dur="16s" repeatCount="indefinite" begin="11s" path="M -300,920 C 100,720 500,520 900,420 C 1300,320 1600,120 2000,20"/>
      <animate attributeName="opacity" values="0;1;0" dur="16s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 13 -->
    <circle r="2" fill="#E8622C">
      <animateMotion dur="12s" repeatCount="indefinite" begin="12s" path="M -200,900 C 200,700 400,500 800,400 C 1200,300 1400,100 1800,0"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 14 -->
    <circle r="1.5" fill="#C9A574">
      <animateMotion dur="18s" repeatCount="indefinite" begin="13s" path="M -100,950 C 300,750 600,550 1000,450 C 1300,350 1500,150 1900,-50"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 15 -->
    <circle r="2.5" fill="#E8622C">
      <animateMotion dur="15s" repeatCount="indefinite" begin="14s" path="M -300,920 C 100,720 500,520 900,420 C 1300,320 1600,120 2000,20"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 16 -->
    <circle r="3" fill="#C9A574">
      <animateMotion dur="13s" repeatCount="indefinite" begin="15s" path="M -200,900 C 200,700 400,500 800,400 C 1200,300 1400,100 1800,0"/>
      <animate attributeName="opacity" values="0;1;0" dur="13s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer 14: Foreground Stalactites / Rocks (Dark, framing bottom) -->
  <path d="M 0,900 L 0,700 L 80,750 L 150,680 L 220,800 L 300,720 L 0,900 Z" fill="#0D0202" opacity="0.95"/>
  <path d="M 1600,900 L 1600,650 L 1500,720 L 1420,620 L 1350,750 L 1280,680 L 1600,900 Z" fill="#0D0202" opacity="0.95"/>

  <!-- Layer 15: Distant Brazier Glow (Off-frame left implication) -->
  <ellipse cx="0" cy="850" rx="400" ry="300" fill="#E8622C" opacity="0.15" filter="url(#blur160)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Layer 16: Foreground Fog Bank -->
  <rect x="0" y="750" width="1600" height="150" fill="url(#fogGrad)" filter="url(#blur80)" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.4;0.6" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 17: Vignette -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#skyGrad)" opacity="0.3" style="mix-blend-mode: multiply;" filter="url(#blur160)"/>

  <!-- Layer 18: Subtle Grain Overlay -->
  <rect x="0" y="0" width="1600" height="900" fill="#000" opacity="0.1" filter="url(#grain)" style="pointer-events: none;"/>

</svg>