<svg xmlns="http://www.w3.org/2000/svg" viewBox="-400 -400 1600 1200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg" cx="400" cy="300" r="500">
      <stop offset="0%" stop-color="#1a0510" />
      <stop offset="60%" stop-color="#050210" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Neon Glow Filters -->
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Gradients -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#00ddee" />
    </linearGradient>
    <linearGradient id="magenta-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff" />
      <stop offset="100%" stop-color="#dd00dd" />
    </linearGradient>
    <linearGradient id="lime-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#2dcc10" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bb00ff" />
      <stop offset="100%" stop-color="#9900dd" />
    </linearGradient>

    <!-- Shape Definitions -->
    <!-- D-Pad -->
    <g id="dpad">
      <circle cx="0" cy="0" r="30" fill="#000" stroke="url(#cyan-grad)" stroke-width="3" filter="url(#glow1)" />
      <rect x="-8" y="-25" width="16" height="50" rx="2" fill="url(#cyan-grad)" filter="url(#glow1)" />
      <rect x="-25" y="-8" width="50" height="16" rx="2" fill="url(#cyan-grad)" filter="url(#glow1)" />
      <circle cx="0" cy="0" r="12" fill="#000" stroke="url(#cyan-grad)" stroke-width="1.5" />
      <!-- Details -->
      <path d="M -4,-22 L 4,-22 M -4,-12 L 4,-12" stroke="#00ffff" stroke-width="1.5" opacity="0.6" />
      <path d="M -4,22 L 4,22 M -4,12 L 4,12" stroke="#00ffff" stroke-width="1.5" opacity="0.6" />
      <path d="M -22,-4 L -22,4 M -12,-4 L -12,4" stroke="#00ffff" stroke-width="1.5" opacity="0.6" />
      <path d="M 22,-4 L 22,4 M 12,-4 L 12,4" stroke="#00ffff" stroke-width="1.5" opacity="0.6" />
    </g>

    <!-- A/B Buttons -->
    <g id="ab-btn">
      <circle cx="0" cy="0" r="30" fill="#000" stroke="url(#magenta-grad)" stroke-width="3" filter="url(#glow1)" />
      <path d="M -12,-18 Q -12,-28 0,-28 Q 12,-28 12,-18 L 12,-5 Q 12,5 0,5 Q -12,5 -12,-5 Z" fill="url(#magenta-grad)" filter="url(#glow1)" opacity="0.9" />
      <path d="M -12,8 Q -12,28 12,8 L 12,18 Q 12,28 0,28 Q -12,28 -12,18 Z" fill="url(#magenta-grad)" filter="url(#glow1)" opacity="0.9" />
      <circle cx="0" cy="0" r="5" fill="#000" stroke="url(#magenta-grad)" stroke-width="1" />
    </g>

    <!-- 4-Directional Vector -->
    <g id="diag-arrows">
      <circle cx="0" cy="0" r="30" fill="#000" stroke="url(#lime-grad)" stroke-width="3" filter="url(#glow1)" />
      <path d="M -15,-15 L -25,-5 L -25,-25 L -5,-25 Z" fill="url(#lime-grad)" filter="url(#glow1)" />
      <path d="M 15,-15 L 25,-5 L 25,-25 L 5,-25 Z" fill="url(#lime-grad)" filter="url(#glow1)" />
      <path d="M -15,15 L -25,5 L -25,25 L -5,25 Z" fill="url(#lime-grad)" filter="url(#glow1)" />
      <path d="M 15,15 L 25,5 L 25,25 L 5,25 Z" fill="url(#lime-grad)" filter="url(#glow1)" />
      <circle cx="0" cy="0" r="10" fill="#000" stroke="url(#lime-grad)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="url(#lime-grad)" />
    </g>

    <!-- Triggers -->
    <g id="triggers">
      <circle cx="0" cy="0" r="30" fill="#000" stroke="url(#purple-grad)" stroke-width="3" filter="url(#glow1)" />
      <path d="M -28,0 C -28,15 -15,25 0,25 C 15,25 28,15 28,0" fill="none" stroke="url(#purple-grad)" stroke-width="4" filter="url(#glow1)" />
      <path d="M -20,-12 C -10,-5 10,-5 20,-12" fill="none" stroke="url(#purple-grad)" stroke-width="3" filter="url(#glow1)" />
      <circle cx="0" cy="0" r="8" fill="url(#purple-grad)" filter="url(#glow1)" />
      <circle cx="0" cy="0" r="3" fill="#000" />
    </g>

    <!-- Orbit Path Template -->
    <g id="orbit-path">
      <circle cx="0" cy="0" r="180" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5" stroke-dasharray="10, 20" />
      <!-- Perspective Distortion -->
      <circle cx="0" cy="0" r="180" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5" transform="scale(1, 0.35)" />
    </g>

  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="url(#bg)" />
  
  <!-- Starfield / Grid Background -->
  <g opacity="0.15">
    <path d="M 0 0 L 800 0 L 800 600 L 0 600 Z" fill="none" stroke="#00ffff" stroke-width="1" />
    <line x1="0" y1="150" x2="800" y2="150" stroke="#00ffff" stroke-width="1" />
    <line x1="0" y1="300" x2="800" y2="300" stroke="#00ffff" stroke-width="1" />
    <line x1="0" y1="450" x2="800" y2="450" stroke="#00ffff" stroke-width="1" />
    <line x1="200" y1="0" x2="200" y2="600" stroke="#00ffff" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="600" stroke="#00ffff" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="600" stroke="#00ffff" stroke-width="1" />
  </g>

  <!-- Central Hub / Reticle -->
  <g transform="translate(400, 300)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glow1)" opacity="0.3" />
    <circle cx="0" cy="0" r="160" fill="none" stroke="#ff00ff" stroke-width="1" stroke-dasharray="4, 8" filter="url(#glow1)" opacity="0.4" />
    
    <!-- Rotating Crosshair -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
      <line x1="-120" x2="120" y1="0" y2="0" stroke="#39ff14" stroke-width="2" opacity="0.6" />
      <line x1="0" x2="0" y1="-120" y2="120" stroke="#39ff14" stroke-width="2" opacity="0.6" />
      <circle cx="0" cy="0" r="50" fill="none" stroke="#39ff14" stroke-width="1" stroke-dasharray="8, 16" />
    </g>

    <!-- Pulsing Core -->
    <circle cx="0" cy="0" r="10" fill="#ffffff" filter="url(#glow2)">
      <animate attributeName="r" values="8;14;8" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glow1)">
      <animate attributeName="r" values="30;50;30" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Layer 1: Orbiting Shapes (Outer Ring) -->
  <g transform="translate(400, 300)">
    
    <!-- Path 1: Clockwise, D-Pads -->
    <g>
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto">
        <mpath href="#path1" />
      </animateMotion>
      <use href="#dpad" transform="scale(1.2)">
        <animateTransform attributeName="transform" type="scale" values="1.2;1.5;1.2" dur="4s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;90;0" dur="12s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto" begin="3s" />
      <mpath href="#path1" />
      <use href="#dpad" transform="scale(1.2)">
        <animateTransform attributeName="transform" type="scale" values="1.2;1.5;1.2" dur="4s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;90;0" dur="12s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto" begin="6s" />
      <mpath href="#path1" />
      <use href="#dpad" transform="scale(1.2)">
        <animateTransform attributeName="transform" type="scale" values="1.2;1.5;1.2" dur="4s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;90;0" dur="12s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto" begin="9s" />
      <mpath href="#path1" />
      <use href="#dpad" transform="scale(1.2)">
        <animateTransform attributeName="transform" type="scale" values="1.2;1.5;1.2" dur="4s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;90;0" dur="12s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>

    <!-- Path 2: Counter-Clockwise, A/B Buttons -->
    <g>
      <animateMotion dur="10s" repeatCount="indefinite" rotate="auto-reverse">
        <mpath href="#path2" />
      </animateMotion>
      <use href="#ab-btn" transform="scale(1.1)">
        <animateTransform attributeName="transform" type="scale" values="1.1;1.4;1.1" dur="5s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;-180;0" dur="10s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="10s" repeatCount="indefinite" rotate="auto-reverse" begin="2.5s" />
      <mpath href="#path2" />
      <use href="#ab-btn" transform="scale(1.1)">
        <animateTransform attributeName="transform" type="scale" values="1.1;1.4;1.1" dur="5s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;-180;0" dur="10s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="10s" repeatCount="indefinite" rotate="auto-reverse" begin="5s" />
      <mpath href="#path2" />
      <use href="#ab-btn" transform="scale(1.1)">
        <animateTransform attributeName="transform" type="scale" values="1.1;1.4;1.1" dur="5s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;-180;0" dur="10s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="10s" repeatCount="indefinite" rotate="auto-reverse" begin="7.5s" />
      <mpath href="#path2" />
      <use href="#ab-btn" transform="scale(1.1)">
        <animateTransform attributeName="transform" type="scale" values="1.1;1.4;1.1" dur="5s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;-180;0" dur="10s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>

    <!-- Path 3: Clockwise, Diagonal Arrows -->
    <g>
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
        <mpath href="#path3" />
      </animateMotion>
      <use href="#diag-arrows" transform="scale(0.9)">
        <animateTransform attributeName="transform" type="scale" values="0.9;1.2;0.9" dur="4s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;360;0" dur="8s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto" begin="2s" />
      <mpath href="#path3" />
      <use href="#diag-arrows" transform="scale(0.9)">
        <animateTransform attributeName="transform" type="scale" values="0.9;1.2;0.9" dur="4s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;360;0" dur="8s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto" begin="4s" />
      <mpath href="#path3" />
      <use href="#diag-arrows" transform="scale(0.9)">
        <animateTransform attributeName="transform" type="scale" values="0.9;1.2;0.9" dur="4s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;360;0" dur="8s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>

    <!-- Path 4: Counter-Clockwise, Triggers -->
    <g>
      <animateMotion dur="6s" repeatCount="indefinite" rotate="auto-reverse">
        <mpath href="#path4" />
      </animateMotion>
      <use href="#triggers">
        <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="3s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;360;0" dur="6s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
    <g>
      <animateMotion dur="6s" repeatCount="indefinite" rotate="auto-reverse" begin="3s" />
      <mpath href="#path4" />
      <use href="#triggers">
        <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="3s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="rotate" values="0;360;0" dur="6s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>

  </g>

  <!-- Motion Paths Definitions -->
  <path id="path1" d="M 0 -260 A 260 260 0 1 1 -0.1 -260 A 260 260 0 1 0 0.1 -260" />
  <path id="path2" d="M 0 -200 A 200 200 0 1 0 -0.1 -200 A 200 200 0 1 1 0.1 -200" />
  <path id="path3" d="M 0 -140 A 140 140 0 1 1 -0.1 -140 A 140 140 0 1 0 0.1 -140" />
  <path id="path4" d="M 0 -80 A 80 80 0 1 0 -0.1 -80 A 80 80 0 1 1 0.1 -80" />

  <!-- Scanlines / Overlay Texture -->
  <defs>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000" stroke-width="1" opacity="0.3" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none" />
  
  <!-- Vignette -->
  <radialGradient id="vignette" cx="400" cy="300" r="500">
    <stop offset="60%" stop-color="transparent" />
    <stop offset="100%" stop-color="#000" stop-opacity="0.8" />
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#vignette)" pointer-events="none" />

</svg>