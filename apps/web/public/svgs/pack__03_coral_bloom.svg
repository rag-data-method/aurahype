    <animateTransform attributeName="transform" type="rotate" values="-5 820 250; 5 820 250; -5 820 250" dur="7s" repeatCount="indefinite"/>
  </path>
  
  <path fill="#FFB088" opacity="0.9" d="M1280,380 C1460,280 1640,380 1640,560 C1640,740 1420,800 1240,680 C1060,560 1120,480 1280,380 Z">
    <animateTransform attributeName="transform" type="scale" values="0.9;1.08;0.9" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  
  <path fill="#B85440" opacity="0.85" filter="url(#blur-strong)" d="M580,760 C800,660 1040,720 1100,920 C1160,1120 920,1240 700,1180 C480,1120 400,960 580,760 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; -15,20; 0,0" dur="8s" repeatCount="indefinite"/>
  </path>
  
  <rect width="1600" height="900" fill="transparent" filter="url(#noise)" opacity="0.1" style="pointer-events:none"/>
</svg>