  </path>
  
  <path fill="#FF7F00" opacity="0.92" d="M680,380 C800,220 1040,220 1160,380 C1280,540 1100,780 860,720 C620,660 560,540 680,380 Z">
    <animateTransform attributeName="transform" type="scale" values="0.95;1.1;0.95" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.7 1;0.3 0 0.7 1"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-40; 0,0" dur="7s" repeatCount="indefinite" additive="sum"/>
