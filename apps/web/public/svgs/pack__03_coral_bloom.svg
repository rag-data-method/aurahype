  </path>
  
  <path fill="#B85440" opacity="0.7" filter="url(#blur-mid)" d="M1080,80 C1240,30 1420,140 1360,300 C1300,460 1080,420 1020,300 C960,180 960,130 1080,80 Z">
    <animateTransform attributeName="transform" type="scale" values="1;1.25;1" dur="8s" repeatCount="indefinite"/>
  </path>
  
  <path fill="#FFB088" opacity="0.88" d="M80,80 C240,-20 480,30 420,200 C360,370 120,420 0,320 C-120,220 -80,180 80,80 Z">
