    <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite"/>
  </path>
  
  <path fill="#FA8072" opacity="0.95" d="M280,480 C340,320 560,280 680,440 C800,600 620,820 400,760 C180,700 220,640 280,480 Z">
    <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -25,15; 0,0" dur="8s" repeatCount="indefinite" additive="sum"/>
  </path>
  
  <path fill="#FFB088" opacity="0.85" d="M480,180 C640,80 880,130 940,290 C1000,450 820,580 640,520 C460,460 360,340 480,180 Z">
