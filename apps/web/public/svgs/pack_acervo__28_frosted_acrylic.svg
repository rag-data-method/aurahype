<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<defs>
<linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#FF9AA2" stop-opacity=".5"/>
<stop offset="100%" stop-color="#B5EAD7" stop-opacity=".4"/>
</linearGradient>
<linearGradient id="b" x1="1" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#C7CEEA" stop-opacity=".5"/>
<stop offset="100%" stop-color="#FFDAC1" stop-opacity=".4"/>
</linearGradient>
<linearGradient id="c" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#E2F0CB" stop-opacity=".5"/>
<stop offset="100%" stop-color="#FFB7B2" stop-opacity=".35"/>
</linearGradient>
<linearGradient id="r" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#FF9AA2" stop-opacity=".45"/>
<stop offset="20%" stop-color="#FFB7B2" stop-opacity=".4"/>
<stop offset="40%" stop-color="#FFDAC1" stop-opacity=".4"/>
<stop offset="60%" stop-color="#E2F0CB" stop-opacity=".4"/>
<stop offset="80%" stop-color="#B5EAD7" stop-opacity=".45"/>
<stop offset="100%" stop-color="#C7CEEA" stop-opacity=".4"/>
</linearGradient>
<linearGradient id="d" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#fff" stop-opacity=".7"/>
<stop offset="100%" stop-color="#fff" stop-opacity=".05"/>
</linearGradient>
<filter id="f" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="24"/>
</filter>
<filter id="s" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="2.5"/>
</filter>
<filter id="n" x="0" y="0" width="100%" height="100%">
<feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="t"/>
<feColorMatrix in="t" type="saturate" values="0" result="g"/>
<feComponentTransfer in="g">
<feFuncA type="linear" slope="0.15"/>
</feComponentTransfer>
</filter>
</defs>
<rect width="1600" height="900" fill="#fff"/>
<g filter="url(#f)" opacity=".78">
<ellipse cx="260" cy="260" rx="420" ry="280" fill="url(#a)">
<animateTransform attributeName="transform" type="translate" values="0,0;70,-50;0,0" dur="16s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
<animate attributeName="opacity" values=".78;.5;.78" dur="11s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="1380" cy="640" rx="460" ry="320" fill="url(#b)">
<animateTransform attributeName="transform" type="translate" values="0,0;-60,40;0,0" dur="18s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
</ellipse>
<ellipse cx="880" cy="160" rx="360" ry="230" fill="url(#c)">
<animateTransform attributeName="transform" type="translate" values="0,0;40,60;0,0" dur="20s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
</ellipse>
</g>
<g opacity=".7">
