<animateTransform attributeName="transform" type="translate" values="0,0;25,-35;0,0" dur="23s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
<animate attributeName="opacity" values=".7;.45;.7" dur="13s" repeatCount="indefinite"/>
</polygon>
<polygon points="1120,120 1520,120 1320,520" fill="url(#a)" stroke="#fff" stroke-width="2" stroke-opacity=".55" filter="url(#s)">
<animateTransform attributeName="transform" type="translate" values="0,0;-30,20;0,0" dur="25s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
</polygon>
<polygon points="1220,760 1620,760 1420,440" fill="url(#b)" stroke="#fff" stroke-width="2" stroke-opacity=".55" filter="url(#s)">
<animateTransform attributeName="transform" type="translate" values="0,0;20,-25;0,0" dur="27s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
</polygon>
<circle cx="460" cy="360" r="190" fill="url(#d)" stroke="#fff" stroke-width="2" stroke-opacity=".45">
<animateTransform attributeName="transform" type="translate" values="0,0;-25,30;0,0" dur="15s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
<animate attributeName="r" values="190;215;190" dur="12s" repeatCount="indefinite"/>
</circle>
<circle cx="1160" cy="300" r="150" fill="url(#d)" stroke="#fff" stroke-width="2" stroke-opacity=".45">
