<g opacity=".55">
<rect x="120" y="100" width="420" height="280" rx="48" fill="url(#r)" fill-opacity=".25" stroke="#fff" stroke-width="2" stroke-opacity=".7">
<animateTransform attributeName="transform" type="translate" values="0,0;12,18;0,0" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
</rect>
<rect x="1030" y="480" width="440" height="300" rx="48" fill="#fff" fill-opacity=".18" stroke="#fff" stroke-width="2" stroke-opacity=".7">
<animateTransform attributeName="transform" type="translate" values="0,0;-15,-12;0,0" dur="21s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1"/>
</rect>
</g>
<rect width="1600" height="900" fill="#fff" opacity=".07" filter="url(#n)" pointer-events="none"/>
</svg>