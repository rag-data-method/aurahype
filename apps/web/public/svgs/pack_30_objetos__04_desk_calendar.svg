    <g transform="translate(750,620)">
      <path d="M 0,-8 L 2,-2 L 8,0 L 2,2 L 0,8 L -2,2 L -8,0 L -2,-2 Z" fill="#E63946" opacity="0">
        <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite" begin="1s"/>
        <animateTransform attributeName="transform" type="rotate" values="0;180;360" dur="4s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0.5;1;0.5" dur="4s" repeatCount="indefinite" additive="sum"/>
      </path>
    </g>
    
    <g transform="translate(850,480)">
      <path d="M 0,-6 L 1.5,-1.5 L 6,0 L 1.5,1.5 L 0,6 L -1.5,1.5 L -6,0 L -1.5,-1.5 Z" fill="#FAFAFA" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
