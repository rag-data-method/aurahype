<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#120B29"/>
      <stop offset="100%" stop-color="#05020A"/>
    </radialGradient>

    <!-- Neon Glow Filters -->
    <filter id="neon-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-lime" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Symbol Definitions for Geometry -->
    <g id="geo-cross">
      <path d="M 0,-20 L 8,-8 L 20,0 L 8,8 L 0,20 L -8,8 L -20,0 L -8,-8 Z" fill="none" stroke="#39FF14" stroke-width="3.5" filter="url(#neon-lime)"/>
      <rect x="-20" y="-3" width="40" height="6" fill="#05020A"/>
      <rect x="-3" y="-20" width="6" height="40" fill="#05020A"/>
    </g>

    <g id="geo-dpad">
      <path d="M 0,-11 L 11,0 L 0,11 L -11,0 Z" fill="none" stroke="#00FFFF" stroke-width="3" filter="url(#neon-cyan)"/>
      <circle cx="0" cy="0" r="4" fill="#05020A"/>
      <path d="M 0,-11 L 0,11 M -11,0 L 11,0" stroke="#00FFFF" stroke-width="1.5" opacity="0.5"/>
    </g>

    <g id="geo-bumper">
      <rect x="-22" y="-8" width="44" height="16" rx="4" fill="none" stroke="#FF00FF" stroke-width="3" filter="url(#neon-magenta)"/>
      <line x1="-16" y1="-2" x2="16" y2="-2" stroke="#FF00FF" stroke-width="1" opacity="0.6"/>
      <line x1="-16" y1="2" x2="16" y2="2" stroke="#FF00FF" stroke-width="1" opacity="0.6"/>
    </g>

    <g id="geo-joy-base">
      <circle cx="0" cy="0" r="14" fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#neon-cyan)"/>
      <circle cx="0" cy="0" r="10" fill="#05020A"/>
      <circle cx="0" cy="0" r="4" fill="#00FFFF" opacity="0.8"/>
    </g>

    <g id="geo-frag-tri">
      <path d="M 0,-15 L 13,12 L -13,12 Z" fill="#05020A" stroke="#FF00FF" stroke-width="2" stroke-linejoin="round" filter="url(#neon-magenta)"/>
      <circle cx="0" cy="3" r="2" fill="#FF00FF"/>
    </g>

    <g id="geo-frag-sq">
      <rect x="-12" y="-12" width="24" height="24" fill="none" stroke="#39FF14" stroke-width="2.5" filter="url(#neon-lime)"/>
      <rect x="-6" y="-6" width="12" height="12" fill="#39FF14" opacity="0.15"/>
    </g>

    <g id="geo-frag-line">
      <path d="M -20,-1 L 0,-1 L 20,1 L 0,1 Z" fill="#00FFFF" filter="url(#neon-cyan)"/>
    </g>

    <!-- Central Core Fragment -->
    <g id="core-fragment">
      <polygon points="0,-18 16,-8 12,10 -12,10 -16,-8" fill="#05020A" stroke="#00FFFF" stroke-width="3" stroke-linejoin="round" filter="url(#neon-cyan)"/>
      <circle cx="0" cy="0" r="5" fill="#00FFFF" opacity="0.6"/>
      <path d="M -7,-5 L 7,-5 L 0,6 Z" fill="#39FF14" opacity="0.8"/>
    </g>

    <!-- HUD Grid Pattern -->
    <pattern id="hud-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 L 0 40" fill="none" stroke="#00FFFF" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Backgrounds -->
  <rect width="800" height="600" fill="url(#bg-grad)"/>
  <rect width="800" height="600" fill="url(#hud-grid)"/>

  <!-- Reticule Background Rings -->
  <g transform="translate(400, 300)" opacity="0.25">
    <circle cx="0" cy="0" r="140" fill="none" stroke="#00FFFF" stroke-width="1" stroke-dasharray="10, 15"/>
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="10s" repeatCount="indefinite" additive="sum"/>
    
    <circle cx="0" cy="0" r="220" fill="none" stroke="#FF00FF" stroke-width="0.5" stroke-dasharray="4, 6"/>
    <animateTransform attributeName="transform" type="rotate" from="360 400 300" to="0 400 300" dur="25s" repeatCount="indefinite" additive="sum"/>
  </g>
  <!-- Closing the Reticule Ring -->
  <circle cx="400" cy="300" r="140" fill="none" stroke="#00FFFF" stroke-width="1" stroke-dasharray="10, 15" opacity="0.25">
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- HUD Corner Brackets -->
  <g stroke="#39FF14" stroke-width="2" fill="none" filter="url(#neon-lime)" opacity="0.8">
    <!-- Top Left -->
    <path d="M 320 260 L 320 270 L 330 270">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Top Right -->
    <path d="M 470 260 L 470 270 L 480 270">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom Right -->
    <path d="M 480 330 L 470 330 L 470 320">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom Left -->
    <path d="M 330 330 L 320 330 L 320 320">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- CORE CENTER PIECE -->
  <g transform="translate(400, 300)" opacity="0.9">
    <use href="#core-fragment" />
    <animateTransform attributeName="transform" type="scale" values="0.8; 1.1; 0.8" dur="4s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="0; 10; 0" dur="6s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- EXPLODING GEOMETRY -->

  <!-- Left Handle Top Arc -->
  <g transform="translate(360, 250) rotate(-45)">
    <use href="#geo-frag-tri" />
    <animateTransform attributeName="transform" type="translate" values="0,0; -30,-10" dur="4s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="0; -15" dur="4s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="1;0" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Left Handle Body -->
  <g transform="translate(340, 290) rotate(15)">
    <use href="#geo-frag-sq" />
    <animateTransform attributeName="transform" type="translate" values="0,0; -50,20" dur="5s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="0; 45" dur="5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Left Handle Bottom Curvature -->
  <g transform="translate(330, 330) rotate(30)">
    <use href="#geo-frag-line" />
    <animateTransform attributeName="transform" type="translate" values="0,0; -40,60" dur="4.5s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="0; 25" dur="4.5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Right Handle Top Arc -->
  <g transform="translate(440, 250) rotate(45)">
    <use href="#geo-frag-tri" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 35,-15" dur="3.5s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="0; 20" dur="3.5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Right Handle Body -->
  <g transform="translate(460, 290) rotate(-15)">
    <use href="#geo-frag-sq" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 60,10" dur="5.5s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="0; -30" dur="5.5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Right Handle Bottom Curvature -->
  <g transform="translate(470, 330) rotate(-30)">
    <use href="#geo-frag-line" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 50,50" dur="3.8s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Cross Button Core -->
  <g transform="translate(370, 290) rotate(15)">
    <use href="#geo-cross" />
    <animateTransform attributeName="transform" type="translate" values="0,0; -40,-30" dur="3s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="scale" values="1; 1.3" dur="3s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Cross Arrow North -->
  <g transform="translate(370, 275)">
    <use href="#geo-dpad" />
    <animateTransform attributeName="transform" type="translate" values="0,0; -15,-50" dur="4s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Cross Arrow South -->
  <g transform="translate(370, 305) rotate(180)">
    <use href="#geo-dpad" />
    <animateTransform attributeName="transform" type="translate" values="0,0; -15,50" dur="3.2s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Cross Arrow East -->
  <g transform="translate(385, 290) rotate(90)">
    <use href="#geo-dpad" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 30,-20" dur="3.6s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Cross Arrow West -->
  <g transform="translate(355, 290) rotate(-90)">
    <use href="#geo-dpad" />
    <animateTransform attributeName="transform" type="translate" values="0,0; -30,20" dur="4.1s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Left Analog Base -->
  <g transform="translate(390, 260) rotate(-10)">
    <use href="#geo-joy-base" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 10,-40" dur="4s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="scale" values="1; 1.2" dur="4s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Right Analog Base -->
  <g transform="translate(430, 320) rotate(25)">
    <use href="#geo-joy-base" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 40,40" dur="5s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="scale" values="1; 1.15" dur="5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Action Button Symbol (Triangle) -->
  <g transform="translate(450, 280) rotate(10)">
    <use href="#geo-frag-tri" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 60,-30" dur="3s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="0; 120" dur="3s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Action Button Symbol (Square) -->
  <g transform="translate(430, 270) rotate(-5)">
    <use href="#geo-frag-sq" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 30,-50" dur="3.5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Left Bumper -->
  <g transform="translate(370, 240) rotate(-20)">
    <use href="#geo-bumper" />
    <animateTransform attributeName="transform" type="translate" values="0,0; -25,-40" dur="3.8s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Right Bumper -->
  <g transform="translate(430, 240) rotate(20)">
    <use href="#geo-bumper" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 35,-35" dur="4.2s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Center Button Fragment -->
  <g transform="translate(400, 280)">
    <rect x="-8" y="-3" width="16" height="6" fill="none" stroke="#FF00FF" stroke-width="2" filter="url(#neon-magenta)"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30" dur="2.8s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Floating Particles -->
  <g fill="#00FFFF" opacity="0.5">
    <circle cx="400" cy="300" r="1.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; -100,-80" dur="3s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="2">
      <animateTransform attributeName="transform" type="translate" values="0,0; 120,90" dur="4s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="1">
      <animateTransform attributeName="transform" type="translate" values="0,0; -80,100" dur="2.5s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="1.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 90,-60" dur="3.5s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>