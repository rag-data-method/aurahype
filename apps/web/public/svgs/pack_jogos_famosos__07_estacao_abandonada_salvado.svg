<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
<defs>
<filter id="b40"><feGaussianBlur stdDeviation="40"/></filter>
<filter id="b80"><feGaussianBlur stdDeviation="80"/></filter>
<filter id="b120"><feGaussianBlur stdDeviation="120"/></filter>
<filter id="b160"><feGaussianBlur stdDeviation="160"/></filter>
<filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#05050F"><animate attributeName="stop-color" values="#05050F;#080818;#05050F" dur="22s" repeatCount="indefinite"/></stop>
<stop offset="1" stop-color="#1A1A2E"><animate attributeName="stop-color" values="#1A1A2E;#121226;#1A1A2E" dur="22s" repeatCount="indefinite"/></stop>
</linearGradient>
<radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#5EE5C9" stop-opacity="1"/>
<stop offset="0.4" stop-color="#5EE5C9" stop-opacity="0.3"/>
<stop offset="1" stop-color="#5EE5C9" stop-opacity="0"/>
</radialGradient>
<linearGradient id="cone" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#5EE5C9" stop-opacity="0.25"/>
<stop offset="1" stop-color="#5EE5C9" stop-opacity="0"/>
</linearGradient>
<radialGradient id="vig" cx="0.5" cy="0.5" r="0.75">
<stop offset="0" stop-color="#05050F" stop-opacity="0"/>
<stop offset="1" stop-color="#05050F" stop-opacity="0.95"/>
</radialGradient>
</defs>

<!-- 1. deep space -->
<rect width="1600" height="900" fill="url(#sky)"/>

<!-- 2. stars -->
<g fill="#FFF">
<circle cx="220" cy="140" r="1.2"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3s" repeatCount="indefinite"/></circle>
<circle cx="380" cy="90" r="1.5"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="5s" repeatCount="indefinite"/></circle>
<circle cx="480" cy="220" r="1"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="160" cy="320" r="1.4"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="6s" repeatCount="indefinite"/></circle>
<circle cx="310" cy="380" r="1"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="3.5s" repeatCount="indefinite"/></circle>
<circle cx="450" cy="280" r="1.3"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="7s" repeatCount="indefinite"/></circle>
<circle cx="130" cy="210" r="1.1"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.5s" repeatCount="indefinite"/></circle>
<circle cx="360" cy="150" r="0.9"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="5.5s" repeatCount="indefinite"/></circle>
</g>

<!-- 3. ruined ship hull -->
<path d="M20,180 L450,120 L520,300 L460,480 L120,500 L10,360 Z" fill="#070714" filter="url(#b160)">
<animateTransform attributeName="transform" type="translate" values="0,0;-8,4;0,0" dur="25s" repeatCount="indefinite"/>
</path>
<path d="M300,120 L360,20 L400,140 Z" fill="#060612" filter="url(#b160)"/>

<!-- 4. cracked viewport frame -->
<circle cx="420" cy="320" r="260" fill="none" stroke="#0b0b18" stroke-width="14"/>
<circle cx="420" cy="320" r="260" fill="none" stroke="#1A1A2E" stroke-width="3" opacity="0.4"/>
<path d="M420,60 L430,190 L410,230 M420,60 L390,210 M200,320 L340,310 M640,320 L500,330 M420,580 L410,460 L430,420" stroke="#1A1A2E" stroke-width="2" opacity="0.45" fill="none"/>

<!-- 5. corridor structure -->
<path d="M0,0 L520,260 L520,640 L0,900 Z" fill="#04040c" filter="url(#b120)"/>
<path d="M1600,0 L1080,260 L1080,640 L1600,900 Z" fill="#04040c" filter="url(#b120)"/>
<path d="M0,0 L520,260 L1080,260 L1600,0 Z" fill="#050510" filter="url(#b120)"/>
<path d="M0,900 L520,640 L1080,640 L1600,900 Z" fill="#050510" filter="url(#b120)"/>

<!-- 6. flickering emergency lights -->
<g filter="url(#b80)">
<ellipse cx="140" cy="110" rx="18" ry="7" fill="#FF3D3D" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.8;0.2;0.7" dur="2.4s" repeatCount="indefinite"/></ellipse>
<ellipse cx="270" cy="170" rx="14" ry="6" fill="#FF3D3D" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.5;0.1;0.6" dur="3.2s" repeatCount="indefinite"/></ellipse>
<ellipse cx="390" cy="220" rx="10" ry="4" fill="#FF3D3D" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.6;0.2;0.5" dur="2.8s" repeatCount="indefinite"/></ellipse>
<ellipse cx="1460" cy="110" rx="18" ry="7" fill="#FF3D3D" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.6;0.1;0.7" dur="3.5s" repeatCount="indefinite"/></ellipse>
<ellipse cx="1330" cy="170" rx="14" ry="6" fill="#FF3D3D" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.7;0.3;0.6" dur="2.1s" repeatCount="indefinite"/></ellipse>
</g>

<!-- 7. atmospheric fog -->
<rect x="0" y="450" width="1600" height="450" fill="url(#sky)" opacity="0.25" filter="url(#b80)">
<animate attributeName="opacity" values="0.25;0.4;0.25" dur="14s" repeatCount="indefinite"/>
</rect>

<!-- 8. mid-ground debris silhouettes -->
<path d="M750,550 L820,530 L840,590 L770,610 Z" fill="#101022" filter="url(#b40)"/>
<path d="M250,480 L310,470 L320,520 L260,530 Z" fill="#101022" filter="url(#b40)"/>

<!-- 9. hero silhouette group -->
<g transform="translate(980,340)">
<animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="6s" repeatCount="indefinite" additive="sum"/>
<!-- light cone -->
<path d="M195,140 L620,520 L340,780 Z" fill="url(#cone)" opacity="0.1">
<animate attributeName="opacity" values="0.1;0.06;0.12;0.08;0.1" dur="5s" repeatCount="indefinite"/>
</path>
<!-- suit body -->
<path d="M25,50 L75,40 L80,150 L30,160 Z" fill="#080815"/>
<path d="M60,50 L125,60 L135,170 L70,180 Z" fill="#0a0a18"/>
<path d="M70,170 L50,270 L85,280 L95,180 Z" fill="#0a0a18"/>
<path d="M105,175 L125,260 L160,250 L135,170 Z" fill="#0a0a18"/>
<ellipse cx="100" cy="35" rx="26" ry="32" fill="#0a0a18"/>
<path d="M115,80 L195,110 L190,155 L110,125 Z" fill="#0a0a18"/>
<!-- cyan rim from handheld light -->
<path d="M25,50 L30,160 M60,50 L70,180 M80,5 A26,32 0 0,1 125,20" stroke="#5EE5C9" stroke-width="2.5" fill="none" opacity="0.5" filter="url(#b40)"/>
<path d="M115,80 L195,110" stroke="#5EE5C9" stroke-width="2" fill="none" opacity="0.4" filter="url(#b40)"/>
<!-- light source -->
<circle cx="195" cy="135" r="22" fill="url(#glow)">
<animate attributeName="r" values="22;26;22" dur="4s" repeatCount="indefinite"/>
</circle>
<circle cx="195" cy="135" r="5" fill="#FFF"/>
</g>

<!-- 10. floating debris foreground -->
<g>
<animateMotion path="M920,520 Q1020,420 1120,480" dur="16s" repeatCount="indefinite"/>
<path d="M0,0 L12,3 L10,16 Z" fill="#1A1A2E">
<animateTransform attributeName="transform" type="rotate" from="0 7 8" to="360 7 8" dur="8s" repeatCount="indefinite"/>
</path>
</g>
<g>
<animateMotion path="M1250,320 Q1150,380 1050,320" dur="18s" repeatCount="indefinite"/>
<path d="M0,0 L10,9 L3,18 Z" fill="#1A1A2E">
<animateTransform attributeName="transform" type="rotate" from="0 5 9" to="-360 5 9" dur="10s" repeatCount="indefinite"/>
</path>
</g>
<g>
<animateMotion path="M1050,720 Q1200,650 1300,720" dur="20s" repeatCount="indefinite"/>
<path d="M0,0 L15,6 L13,22 L-2,16 Z" fill="#1A1A2E">
<animateTransform attributeName="transform" type="rotate" from="0 7 11" to="360 7 11" dur="12s" repeatCount="indefinite"/>
</path>
</g>
<g>
<animateMotion path="M850,420 Q950,360 1000,420" dur="14s" repeatCount="indefinite"/>
<path d="M0,0 L9,13 L-3,17 Z" fill="#1A1A2E">
<animateTransform attributeName="transform" type="rotate" from="0 3 9" to="-360 3 9" dur="9s" repeatCount="indefinite"/>
</path>
</g>

<!-- 11. atmospheric particles -->
<circle r="1.2" fill="#5EE5C9" opacity="0.5">
<animateMotion path="M1100,650 L1000,520 L900,380" dur="17s" repeatCount="indefinite"/>
</circle>
<circle r="1.5" fill="#5EE5C9" opacity="0.4">
<animateMotion path="M1200,500 L1050,400 L950,250" dur="20s" repeatCount="indefinite"/>
</circle>
<circle r="1" fill="#5EE5C9" opacity="0.6">
<animateMotion path="M1000,600 L1150,480 L1250,350" dur="15s" repeatCount="indefinite"/>
</circle>
<circle r="1.3" fill="#5EE5C9" opacity="0.45">
<animateMotion path="M950,550 L850,450 L750,300" dur="19s" repeatCount="indefinite"/>
</circle>
<circle r="0.9" fill="#5EE5C9" opacity="0.5">
<animateMotion path="M1050,700 L950,600 L800,450" dur="22s" repeatCount="indefinite"/>
</circle>
<circle r="1.1" fill="#5EE5C9" opacity="0.4">
<animateMotion path="M1150,450 L1000,350 L900,200" dur="18s" repeatCount="indefinite"/>
</circle>
<circle r="1.4" fill="#5EE5C9" opacity="0.35">
<animateMotion path="M900,480 L800,380 L700,280" dur="16s" repeatCount="indefinite"/>
</circle>
<circle r="1" fill="#FF3D3D" opacity="0.3">
<animateMotion path="M200,400 L250,350 L300,300" dur="25s" repeatCount="indefinite"/>
</circle>
<circle r="1.2" fill="#FF3D3D" opacity="0.25">
<animateMotion path="M1400,500 L1350,400 L1300,300" dur="28s" repeatCount="indefinite"/>
</circle>
<circle r="0.8" fill="#5EE5C9" opacity="0.5">
<animateMotion path="M1250,600 L1100,500 L1000,400" dur="21s" repeatCount="indefinite"/>
</circle>

<!-- 12. vignette & grain -->
<rect width="1600" height="900" fill="url(#vig)" style="pointer-events:none"/>
<rect width="1600" height="900" fill="#FFF" opacity="0.04" filter="url(#grain)" style="pointer-events:none"/>
</svg>