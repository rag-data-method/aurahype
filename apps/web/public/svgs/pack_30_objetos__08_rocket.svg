<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyShade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="35%" stop-color="#FAFAFA"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#D6D6D6"/>
    </linearGradient>
    
    <linearGradient id="redShade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5A66"/>
      <stop offset="40%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#A62832"/>
    </linearGradient>
    
    <radialGradient id="flameCore" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#FFF5E6"/>
      <stop offset="30%" stop-color="#F4A261"/>
      <stop offset="70%" stop-color="#E63946" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
    </filter>
    
    <filter id="engineGlow" x="-100%" y="-50%" width="300%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#0F1828"/>
  
  <g id="starfield">
    <circle cx="200" cy="150" r="2" fill="#FAFAFA" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1400" cy="200" r="3" fill="#FAFAFA" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="700" r="2" fill="#FAFAFA" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1300" cy="750" r="2.5" fill="#FAFAFA" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="400" r="2" fill="#FAFAFA" opacity="0.5"><animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1450" cy="450" r="3" fill="#FAFAFA" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="100" r="2" fill="#FAFAFA" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="800" r="2" fill="#FAFAFA" opacity="0.5"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>
  
  <ellipse cx="800" cy="820" rx="100" ry="25" fill="#000" opacity="0.2" filter="url(#softShadow)">
    <animate attributeName="rx" values="100;110;100" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.1;0.2" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  
  <g id="smokeLayer">
    <path d="M 750,780 Q 800,750 850,780 T 950,800" fill="none" stroke="#FAFAFA" stroke-width="18" stroke-linecap="round" opacity="0" filter="url(#softShadow)">
      <animate attributeName="d" values="M 750,780 Q 800,750 850,780 T 950,800; M 720,760 Q 800,700 880,760 T 1000,780" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.3;0" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-40" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M 780,800 Q 800,780 820,800 T 860,820" fill="none" stroke="#FAFAFA" stroke-width="12" stroke-linecap="round" opacity="0" filter="url(#softShadow)">
      <animate attributeName="opacity" values="0;0.25;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30" dur="3s" begin="1s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g id="rocketAssembly" transform="translate(800,450)">
    <animateTransform attributeName="transform" type="translate" values="800,450; 800,445; 800,450" dur="0.12s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-0.5 800 450; 0.5 800 450; -0.5 800 450" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    
    <g id="leftFin" transform="translate(-60,80)">
      <path d="M 0,0 L -40,80 L 0,60 Z" fill="url(#redShade)">
        <animateTransform attributeName="transform" type="skewY" values="0;3;0" dur="0.2s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <g id="rightFin" transform="translate(60,80)">
      <path d="M 0,0 L 40,80 L 0,60 Z" fill="url(#redShade)">
        <animateTransform attributeName="transform" type="skewY" values="0;-3;0" dur="0.25s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <g id="centerFin" transform="translate(0,90)">
      <path d="M -30,0 L 0,70 L 30,0 Z" fill="#B7252F" opacity="0.9"/>
    </g>
    
    <rect x="-50" y="-80" width="100" height="200" rx="8" fill="url(#bodyShade)"/>
    
    <path d="M -50,-80 Q 0,-180 50,-80 Z" fill="url(#redShade)"/>
    
    <rect x="-50" y="60" width="100" height="8" fill="#E63946" opacity="0.9"/>
    
    <g id="portWindow" transform="translate(0,-20)">
      <circle r="22" fill="#0F1828"/>
      <circle r="18" fill="#1a2a40"/>
      <circle cx="-6" cy="-6" r="6" fill="#FAFAFA" opacity="0.7">
        <animate attributeName="cx" values="-6;-2;-6" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="-6;-3;-6" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g id="exhaustSystem" transform="translate(0,120)" filter="url(#engineGlow)">
      <path d="M -35,0 Q 0,100 35,0 Z" fill="url(#flameCore)">
        <animateTransform attributeName="transform" type="scale" values="1,1; 1,1.4; 1,1" dur="0.18s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;1;0.9" dur="0.1s" repeatCount="indefinite"/>
      </path>
      
      <path d="M -25,0 Q -35,70 -15,0 Z" fill="#F4A261" opacity="0.8">
        <animateTransform attributeName="transform" type="scale" values="1,1; 1,0.7; 1,1.2; 1,1" dur="0.22s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.4;0.9;0.8" dur="0.22s" repeatCount="indefinite"/>
      </path>
      
      <path d="M 25,0 Q 35,70 15,0 Z" fill="#F4A261" opacity="0.8">
        <animateTransform attributeName="transform" type="scale" values="1,1; 1,1.3; 1,0.6; 1,1" dur="0.28s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.95;0.3;0.8" dur="0.28s" repeatCount="indefinite"/>
      </path>
      
      <ellipse cx="0" cy="10" rx="20" ry="8" fill="#FFF" opacity="0.6">
        <animate attributeName="ry" values="8;12;8" dur="0.15s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.15s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>
  
  <g id="particleTrails">
    <circle cx="780" cy="580" r="4" fill="#F4A261" opacity="0">
      <animate attributeName="cy" values="580;750" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="780;760" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="820" cy="570" r="3" fill="#F4A261" opacity="0">
      <animate attributeName="cy" values="570;740" dur="1s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="820;840" dur="1s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="1s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="800" cy="600" r="5" fill="#E63946" opacity="0">
      <animate attributeName="cy" values="600;800" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;2;5" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="765" cy="560" r="3" fill="#FAFAFA" opacity="0">
      <animate attributeName="cy" values="560;700" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="765;750" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="835" cy="565" r="3" fill="#FAFAFA" opacity="0">
      <animate attributeName="cy" values="565;710" dur="0.9s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="835;850" dur="0.9s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="0.9s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g id="speedLines" opacity="0.3">
    <line x1="750" y1="600" x2="740" y2="650" stroke="#F4A261" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y1" values="600;680" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="650;730" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="850" y1="620" x2="860" y2="670" stroke="#F4A261" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y1" values="620;700" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="670;750" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>