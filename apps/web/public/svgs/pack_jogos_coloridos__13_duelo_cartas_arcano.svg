<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Animated Radial Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2A0040">
        <animate attributeName="stop-color" values="#2A0040;#4A0080;#2A0040" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#1A0026">
        <animate attributeName="stop-color" values="#1A0026;#2A0060;#1A0026" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10002B"/>
    </radialGradient>

    <!-- Sunburst Gradient -->
    <radialGradient id="burstGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#7B2CBF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#10002B" stop-opacity="0"/>
    </radialGradient>

    <!-- Card Glow Filters -->
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1"/>
      <feGaussianBlur stdDeviation="30" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1"/>
      <feGaussianBlur stdDeviation="30" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sparkle Shape -->
    <path id="sparkle" d="M0,-10 C0,-10 2,-4 8,-4 C2,-4 0,2 0,2 C0,2 -2,-4 -8,-4 C-2,-4 0,-10 0,-10 Z" fill="#FFFFFF"/>
    
    <!-- Rune Shape -->
    <path id="rune" d="M0,-15 L10,0 L0,15 L-10,0 Z" fill="#00F5D4" opacity="0.8"/>
  </defs>

  <!-- 1. Base Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- 2. Sunburst Layer -->
  <g transform="translate(1000, 450)">
    <circle r="600" fill="url(#burstGrad)"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      <!-- Sunburst Rays -->
      <polygon points="0,0 100,-600 -100,-600" fill="#FFB800" opacity="0.1"/>
      <polygon points="0,0 100,600 -100,600" fill="#7B2CBF" opacity="0.1"/>
      <polygon points="0,0 600,-100 600,100" fill="#00F5D4" opacity="0.05"/>
      <polygon points="0,0 -600,-100 -600,100" fill="#FF0099" opacity="0.05"/>
      <polygon points="0,0 500,-300 600,-100" fill="#FFB800" opacity="0.08"/>
      <polygon points="0,0 500,300 600,100" fill="#7B2CBF" opacity="0.08"/>
      <polygon points="0,0 -500,-300 -600,-100" fill="#00F5D4" opacity="0.08"/>
      <polygon points="0,0 -500,300 -600,100" fill="#FF0099" opacity="0.08"/>
    </g>
  </g>

  <!-- 3. Halftone Dot Pattern -->
  <g fill="#FFB800" opacity="0.15">
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="4s" repeatCount="indefinite"/>
    <circle cx="100" cy="100" r="40"/>
    <circle cx="250" cy="250" r="60"/>
    <circle cx="400" cy="100" r="50"/>
    <circle cx="100" cy="400" r="70"/>
    <circle cx="300" cy="500" r="40"/>
    <circle cx="500" cy="300" r="80"/>
    <circle cx="150" cy="650" r="50"/>
    <circle cx="350" cy="750" r="60"/>
    <circle cx="50" cy="800" r="40"/>
  </g>

  <!-- 4. Rotating Rings -->
  <g transform="translate(1000, 450)">
    <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
    <circle r="300" fill="none" stroke="#00F5D4" stroke-width="5" stroke-dasharray="20 40" opacity="0.6"/>
    <circle r="350" fill="none" stroke="#FFB800" stroke-width="3" stroke-dasharray="50 20" opacity="0.5"/>
    <circle r="400" fill="none" stroke="#7B2CBF" stroke-width="8" stroke-dasharray="10 30" opacity="0.7"/>
  </g>

  <!-- 5. Floating Geometric Hexagons (Background Energy) -->
  <g opacity="0.4">
    <polygon points="900,200 920,235 900,270 860,270 840,235 860,200" fill="none" stroke="#00F5D4" stroke-width="4">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-50; 0,0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1200,600 1230,650 1200,700 1140,700 1110,650 1140,600" fill="none" stroke="#FFB800" stroke-width="6">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,50; 0,0" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="800,700 820,735 800,770 760,770 740,735 760,700" fill="none" stroke="#FF0099" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="0,0; -30,0; 0,0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- 6. Title Negative Space / Background Elements -->
  <g stroke="#FFFFFF" stroke-width="2" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    <line x1="50" y1="50" x2="600" y2="50"/>
    <line x1="50" y1="850" x2="500" y2="850"/>
    <line x1="50" y1="50" x2="50" y2="850"/>
  </g>

  <!-- 7. Clash Energy Burst (Between Cards) -->
  <g transform="translate(1000, 450)">
    <circle r="50" fill="#FFFFFF" opacity="0.8">
      <animate attributeName="r" values="40;70;40" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="30" fill="#00F5D4" opacity="0.9">
      <animate attributeName="r" values="20;50;20" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Energy Flares -->
    <path d="M0,0 L-80,-80 L-40,0 L-80,80 L0,0 L80,80 L40,0 L80,-80 Z" fill="#FFB800" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 8. Hero Card 1 (Gold - Left Tilted) -->
  <g transform="translate(850, 450) rotate(-15)" filter="url(#glowGold)">
    <!-- Bounce Animation -->
    <animateTransform attributeName="transform" type="translate" values="850,450; 850,430; 850,450" dur="3s" repeatCount="indefinite" additive="sum"/>
    
    <!-- Card Body -->
    <rect x="-80" y="-120" width="160" height="240" rx="12" fill="#10002B" stroke="#FFB800" stroke-width="8"/>
    
    <!-- Inner Frame -->
    <rect x="-65" y="-105" width="130" height="210" rx="8" fill="none" stroke="#FFB800" stroke-width="4" opacity="0.6"/>
    
    <!-- Center Symbol (Abstract Flame/Sun) -->
    <path d="M0,-60 C20,-40 40,-20 0,40 C-40,-20 -20,-40 0,-60 Z" fill="#FFB800"/>
    <circle cx="0" cy="-10" r="15" fill="#10002B"/>
    
    <!-- Corner Pips -->
    <path d="M-60,-100 Q-50,-110 -40,-100 Q-50,-90 -60,-100 Z" fill="#FFB800"/>
    <path d="M60,100 Q50,110 40,100 Q50,90 60,100 Z" fill="#FFB800"/>
  </g>

  <!-- 9. Hero Card 2 (Violet - Right Tilted) -->
  <g transform="translate(1150, 450) rotate(15)" filter="url(#glowPurple)">
    <!-- Bounce Animation offset -->
    <animateTransform attributeName="transform" type="translate" values="1150,450; 1150,470; 1150,450" dur="3.2s" repeatCount="indefinite" additive="sum"/>
    
    <!-- Card Body -->
    <rect x="-80" y="-120" width="160" height="240" rx="12" fill="#10002B" stroke="#7B2CBF" stroke-width="8"/>
    
    <!-- Inner Frame -->
    <rect x="-65" y="-105" width="130" height="210" rx="8" fill="none" stroke="#7B2CBF" stroke-width="4" opacity="0.6"/>
    
    <!-- Center Symbol (Abstract Moon/Crescent) -->
    <path d="M0,-60 A 50 50 0 1 1 0 60 A 40 40 0 1 0 0 -60 Z" fill="#7B2CBF"/>
    <circle cx="15" cy="0" r="10" fill="#10002B"/>
    
    <!-- Corner Pips -->
    <path d="M-60,-100 A 10 10 0 1 1 -40,-100 A 10 10 0 1 1 -60,-100 Z" fill="#7B2CBF"/>
    <path d="M60,100 A 10 10 0 1 1 40,100 A 10 10 0 1 1 60,100 Z" fill="#7B2CBF"/>
  </g>

  <!-- 10. Connecting Energy Arcs -->
  <path d="M850,450 Q1000,250 1150,450" fill="none" stroke="#00F5D4" stroke-width="6" filter="url(#glowCyan)" opacity="0.8">
    <animate attributeName="stroke-dasharray" values="0,300; 150,150; 300,0" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M850,450 Q1000,250 1150,450; M850,450 Q1000,650 1150,450; M850,450 Q1000,250 1150,450" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M850,450 Q1000,650 1150,450" fill="none" stroke="#FF0099" stroke-width="6" filter="url(#glowCyan)" opacity="0.8">
    <animate attributeName="stroke-dasharray" values="0,300; 150,150; 300,0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M850,450 Q1000,650 1150,450; M850,450 Q1000,250 1150,450; M850,450 Q1000,650 1150,450" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </path>

  <!-- 11. Motion Lines & Speed Streaks -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="600" y1="400" x2="750" y2="420">
      <animate attributeName="x1" values="600;680;600" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="650" y1="500" x2="780" y2="480">
      <animate attributeName="x1" values="650;730;650" dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="1400" y1="380" x2="1250" y2="400">
      <animate attributeName="x1" values="1400;1320;1400" dur="0.35s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="0.35s" repeatCount="indefinite"/>
    </line>
    <line x1="1350" y1="520" x2="1220" y2="500">
      <animate attributeName="x1" values="1350;1270;1350" dur="0.45s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="0.45s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- 12. Floating Rune Symbols -->
  <use href="#rune" transform="translate(900, 300) scale(1.5)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </use>
  <use href="#rune" transform="translate(1100, 600) scale(1.2)">
    <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;1;0" dur="5s" begin="1s" repeatCount="indefinite"/>
  </use>
  <use href="#rune" transform="translate(800, 600) scale(0.8)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2s" repeatCount="indefinite"/>
  </use>
  <use href="#rune" transform="translate(1200, 300) scale(1)">
    <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="0.5s" repeatCount="indefinite"/>
  </use>

  <!-- 13. Sparkle Bursts -->
  <g>
    <use href="#sparkle" transform="translate(950, 350) scale(2)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </use>
    <use href="#sparkle" transform="translate(1050, 550) scale(1.5)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="3s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </use>
    <use href="#sparkle" transform="translate(850, 500) scale(2.5)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    </use>
    <use href="#sparkle" transform="translate(1150, 400) scale(1.8)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="2.5s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- 14. Confetti & Particles (Flying across frame) -->
  <g>
    <!-- Cyan Triangle -->
    <path d="M0,0 L15,30 L-15,30 Z" fill="#00F5D4">
      <animateMotion path="M 0,0 L 1600,900" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <!-- Gold Circle -->
    <circle r="10" fill="#FFB800">
      <animateMotion path="M 1600,0 L 0,900" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;2;1" dur="2s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- Purple Square -->
    <rect x="-10" y="-10" width="20" height="20" fill="#7B2CBF">
      <animateMotion path="M 800,-50 L 800,950" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Pink Star -->
    <use href="#sparkle" transform="scale(1.5)" fill="#FF0099">
      <animateMotion path="M 1600,450 L 0,450" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
    </use>

    <!-- Small Cyan Dots -->
    <circle r="5" fill="#00F5D4">
      <animateMotion path="M 100,900 L 1500,0" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#FFB800">
      <animateMotion path="M 1500,900 L 100,0" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 15. Foreground Floating Card Shards / Debris -->
  <g>
    <polygon points="0,0 20,10 10,30" fill="#FFB800" opacity="0.8">
      <animateMotion path="M 1000,450 L 700,200" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="720" dur="2s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,0 -15,20 -5,40" fill="#7B2CBF" opacity="0.8">
      <animateMotion path="M 1000,450 L 1300,700" dur="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-720" dur="2.5s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,0 10,25 30,15" fill="#00F5D4" opacity="0.8">
      <animateMotion path="M 1000,450 L 1200,300" dur="1.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="1080" dur="1.8s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.8s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- 16. Vignette / Frame Accent -->
  <rect width="100%" height="100%" fill="none" stroke="#10002B" stroke-width="40" opacity="0.3"/>
  
  <!-- 17. Foreground Lightning/Slash Arcs -->
  <path d="M 750,300 Q 850,450 950,350" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round">
    <animate attributeName="d" values="M 750,300 Q 850,450 950,350; M 760,320 Q 860,470 960,330; M 750,300 Q 850,450 950,350" dur="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.1s" repeatCount="indefinite"/>
  </path>
  <path d="M 1250,600 Q 1150,450 1050,550" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round">
    <animate attributeName="d" values="M 1250,600 Q 1150,450 1050,550; M 1260,580 Q 1160,430 1060,570; M 1250,600 Q 1150,450 1050,550" dur="0.2s" begin="0.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.1s" begin="0.1s" repeatCount="indefinite"/>
  </path>

  <!-- 18. Bottom Accent Geometric Chevrons -->
  <g transform="translate(0, 850)" fill="#FFB800" opacity="0.6">
    <polygon points="0,0 50,-50 100,0 150,-50 200,0 250,-50 300,0" stroke="#FFB800" stroke-width="5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 20,0; 0,0" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1300,0 1350,-50 1400,0 1450,-50 1500,0 1550,-50 1600,0" stroke="#7B2CBF" stroke-width="5">
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,0; 0,0" dur="3.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

</svg>