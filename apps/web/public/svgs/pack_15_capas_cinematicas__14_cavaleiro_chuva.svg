<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <!-- Sky & Atmosphere Gradients -->
    <radialGradient id="skyGrad" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3D2A4F">
        <animate attributeName="stop-color" values="#3D2A4F;#4a335f;#3D2A4F" dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="60%" stop-color="#1A1A2E">
        <animate attributeName="stop-color" values="#1A1A2E;#221a3d;#1A1A2E" dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0a0a14" />
    </radialGradient>

    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0D8E8" stop-opacity="0" />
      <stop offset="100%" stop-color="#E0D8E8" stop-opacity="0.3" />
    </linearGradient>

    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0D8E8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#E0D8E8" stop-opacity="0" />
    </linearGradient>

    <!-- Blur Filters for Depth -->
    <filter id="blur120" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="120" />
    </filter>
    <filter id="blur90" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="90" />
    </filter>
    <filter id="blur60" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="blur20" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <filter id="blur5">
      <feGaussianBlur stdDeviation="5" />
    </filter>
    <filter id="reflectionBlur" x="-10%" y="0%" width="120%" height="100%">
      <feGaussianBlur stdDeviation="15 2" />
    </filter>
    <filter id="waterBlur">
      <feGaussianBlur stdDeviation="2 6" />
    </filter>

    <clipPath id="groundClip">
      <rect x="0" y="760" width="1600" height="140" />
    </clipPath>

    <!-- Reusable Rain Lines -->
    <g id="rain-line">
      <line x1="0" y1="0" x2="-20" y2="75" stroke="#E0D8E8" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />
    </g>
    <g id="rain-line-fg">
      <line x1="0" y1="0" x2="-25" y2="90" stroke="#E0D8E8" stroke-width="2.5" opacity="0.7" stroke-linecap="round" />
    </g>

    <!-- Reusable Haze/Mist Particles -->
    <circle id="mist-p" r="3" fill="#5E6AD2" opacity="0.3" />
  </defs>

  <!-- 1. Deep Background Sky -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#skyGrad)" />

  <!-- 2. Lightning Flash Layer -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#lightningGrad)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0;0;0;0;0.4;0;0;0.8;0;0;0;0" keyTimes="0;0.45;0.46;0.47;0.5;0.6;0.7;0.71;0.72;0.75;0.76;0.77;0.8;0.9;1" dur="14s" repeatCount="indefinite" />
  </rect>

  <!-- 3. Distant Haze / Fog Layer 1 (Heaviest Blur) -->
  <rect x="0" y="200" width="1600" height="700" fill="#3D2A4F" opacity="0.15" filter="url(#blur120)" />

  <!-- 4. Jagged Clouds in Distance -->
  <path d="M0,0 L1600,0 L1600,450 L1350,380 L1200,480 L1050,400 L900,460 L750,390 L600,470 L450,410 L300,460 L150,390 L0,450 Z" fill="#1A1A2E" opacity="0.8" filter="url(#blur90)">
    <animate attributeName="d" dur="25s" repeatCount="indefinite" values="
      M0,0 L1600,0 L1600,450 L1350,380 L1200,480 L1050,400 L900,460 L750,390 L600,470 L450,410 L300,460 L150,390 L0,450 Z;
      M0,0 L1600,0 L1600,460 L1380,390 L1220,470 L1080,410 L920,450 L780,400 L620,450 L480,420 L320,450 L180,400 L0,440 Z;
      M0,0 L1600,0 L1600,450 L1350,380 L1200,480 L1050,400 L900,460 L750,390 L600,470 L450,410 L300,460 L150,390 L0,450 Z"
    />
  </path>

  <!-- 5. Mid-Ground Fog Layer 2 -->
  <rect x="0" y="100" width="1600" height="800" fill="#5E6AD2" opacity="0.08" filter="url(#blur90)" />

  <!-- 6. Distant Treeline / Hills Silhouette -->
  <path d="M0,900 L0,780 L80,770 L160,775 L250,760 L320,770 L400,755 L480,765 L600,750 L750,740 L900,745 L1100,725 L1300,735 L1450,720 L1600,730 L1600,900 Z" fill="#1A1A2E" opacity="0.9" filter="url(#blur60)">
    <animate attributeName="d" dur="45s" repeatCount="indefinite" values="
      M0,900 L0,780 L80,770 L160,775 L250,760 L320,770 L400,755 L480,765 L600,750 L750,740 L900,745 L1100,725 L1300,735 L1450,720 L1600,730 L1600,900 Z;
      M0,900 L0,785 L75,765 L165,780 L240,755 L330,765 L390,760 L485,755 L610,745 L740,735 L910,740 L1090,730 L1310,725 L1440,735 L1600,725 L1600,900 Z;
      M0,900 L0,780 L80,770 L160,775 L250,760 L320,770 L400,755 L480,765 L600,750 L750,740 L900,745 L1100,725 L1300,735 L1450,720 L1600,730 L1600,900 Z"
    />
  </path>

  <!-- 7. Ground Plane Base -->
  <rect x="0" y="760" width="1600" height="140" fill="#1A1A2E" />
  <rect x="0" y="760" width="1600" height="140" fill="#3D2A4F" opacity="0.3" />

  <!-- 8. Wet Ground Reflection (Clipped & Blurred) -->
  <g clip-path="url(#groundClip)" opacity="0.25" filter="url(#reflectionBlur)">
    <g transform="translate(0, 1520) scale(1, -1)">
      <!-- Reflection of Knight Silhouette -->
      <path d="M 650,890 L 645,830 L 660,850 L 670,890 Z" fill="#1A1A2E" /> <!-- Sword -->
      <path d="M 600,760 L 600,500 L 630,480 L 660,480 L 680,500 L 680,580 L 720,620 L 720,760 Z" fill="#1A1A2E" /> <!-- Legs/Cape -->
      <path d="M 600,500 L 650,420 L 730,420 L 750,500 L 720,580 L 680,600 L 650,580 Z" fill="#1A1A2E" /> <!-- Upper Body -->
      <path d="M 670,420 L 650,350 L 680,320 L 710,350 L 690,420 Z" fill="#1A1A2E" /> <!-- Helmet -->
      <path d="M 730,420 L 750,350 L 680,350 L 680,420 Z" fill="#1A1A2E" /> <!-- Cape -->
      <path d="M 630,480 L 580,520 L 600,500 Z" fill="#1A1A2E" /> <!-- Left Arm -->
      <path d="M 670,480 L 710,520 L 680,500 Z" fill="#1A1A2E" /> <!-- Right Arm -->
      <!-- Rim light in reflection -->
      <path d="M 680,320 L 710,350 L 690,420 L 680,420 Z" fill="#E0D8E8" opacity="0.5" />
    </g>
    <!-- Ripple lines on reflection -->
    <line x1="400" y1="770" x2="900" y2="770" stroke="#5E6AD2" stroke-width="2" opacity="0.3" filter="url(#waterBlur)">
      <animate attributeName="y1" values="770;780;770" dur="8s" repeatCount="indefinite" />
      <animate attributeName="y2" values="770;780;770" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0;0.3" dur="8s" repeatCount="indefinite" />
    </line>
    <line x1="450" y1="790" x2="850" y2="790" stroke="#E0D8E8" stroke-width="1.5" opacity="0.2" filter="url(#waterBlur)">
      <animate attributeName="y1" values="790;800;790" dur="10s" repeatCount="indefinite" />
      <animate attributeName="y2" values="790;800;790" dur="10s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0;0.2" dur="10s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- 9. Background Rain Layer (Behind Subject) -->
  <g opacity="0.3">
    <use href="#rain-line" x="100" y="-100">
      <animate attributeName="y" values="-100;900" dur="0.6s" repeatCount="indefinite" />
      <animate attributeName="x" values="100;-30" dur="0.6s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line" x="300" y="-200">
      <animate attributeName="y" values="-200;900" dur="0.7s" repeatCount="indefinite" />
      <animate attributeName="x" values="300;120" dur="0.7s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line" x="500" y="-50">
      <animate attributeName="y" values="-50;900" dur="0.55s" repeatCount="indefinite" />
      <animate attributeName="x" values="500;350" dur="0.55s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line" x="800" y="-150">
      <animate attributeName="y" values="-150;900" dur="0.65s" repeatCount="indefinite" />
      <animate attributeName="x" values="800;620" dur="0.65s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line" x="1100" y="-80">
      <animate attributeName="y" values="-80;900" dur="0.5s" repeatCount="indefinite" />
      <animate attributeName="x" values="1100;950" dur="0.5s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line" x="1400" y="-300">
      <animate attributeName="y" values="-300;900" dur="0.8s" repeatCount="indefinite" />
      <animate attributeName="x" values="1400;1180" dur="0.8s" repeatCount="indefinite" />
    </use>
  </g>

  <!-- 10. Atmospheric Mist Swirls (Mid-ground) -->
  <g filter="url(#blur20)">
    <use href="#mist-p" x="200" y="400">
      <animate attributeName="x" values="200;400" dur="18s" repeatCount="indefinite" />
      <animate attributeName="y" values="400;350" dur="18s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.4;0" dur="18s" repeatCount="indefinite" />
    </use>
    <use href="#mist-p" x="1200" y="300" r="5">
      <animate attributeName="x" values="1200;1000" dur="22s" repeatCount="indefinite" />
      <animate attributeName="y" values="300;450" dur="22s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.3;0" dur="22s" repeatCount="indefinite" />
    </use>
    <use href="#mist-p" x="500" y="600" r="8">
      <animate attributeName="x" values="500;700" dur="25s" repeatCount="indefinite" />
      <animate attributeName="y" values="600;500" dur="25s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.2;0" dur="25s" repeatCount="indefinite" />
    </use>
  </g>

  <!-- 11. THE KNIGHT - Focal Subject (Off-center Right) -->
  <g id="knight-group" transform="translate(0, 5)">
    <animateTransform attributeName="transform" type="translate" values="0,5; 0,-5; 0,5" dur="6s" repeatCount="indefinite" additive="sum" />

    <!-- Sword (Upright) -->
    <path d="M 650,890 L 645,830 L 660,850 L 670,890 Z" fill="#0a0a14" />
    <path d="M 646,830 L 645,810 L 647,830 Z" fill="#E0D8E8" opacity="0.9" /> <!-- Sword tip glint -->

    <!-- Cape (Dynamic, blowing in wind) -->
    <path d="M 730,420 L 850,380 L 900,450 L 820,500 L 750,480 Z" fill="#0a0a14">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" values="
        M 730,420 L 850,380 L 900,450 L 820,500 L 750,480 Z;
        M 730,420 L 860,370 L 920,440 L 830,510 L 750,480 Z;
        M 730,420 L 850,380 L 900,450 L 820,500 L 750,480 Z"
      />
    </path>

    <!-- Legs & Skirt -->
    <path d="M 600,760 L 600,500 L 630,480 L 660,480 L 680,500 L 680,580 L 720,620 L 720,760 Z" fill="#1A1A2E" />

    <!-- Torso / Breastplate -->
    <path d="M 600,500 L 650,420 L 730,420 L 750,500 L 720,580 L 680,600 L 650,580 Z" fill="#1A1A2E" />

    <!-- Helmet -->
    <path d="M 670,420 L 650,350 L 680,320 L 710,350 L 690,420 Z" fill="#1A1A2E" />

    <!-- Arms -->
    <path d="M 630,480 L 580,520 L 600,500 Z" fill="#1A1A2E" /> <!-- Left Arm holding sword -->
    <path d="M 670,480 L 710,520 L 680,500 Z" fill="#1A1A2E" /> <!-- Right Arm -->

    <!-- RIM LIGHT (Left side facing sky) -->
    <path d="M 670,420 L 650,350 L 680,320 L 685,325 L 660,350 L 675,420 Z" fill="url(#rimGrad)" />
    <path d="M 600,500 L 650,420 L 660,425 L 610,500 Z" fill="url(#rimGrad)" />
    <path d="M 580,520 L 600,500 L 610,505 L 585,525 Z" fill="#E0D8E8" opacity="0.6" />
    <path d="M 650,350 L 680,320 L 685,325 L 660,350 Z" fill="#E0D8E8" opacity="0.8" />

    <!-- Helmet Visor / Eye Slit Glow -->
    <path d="M 665,365 L 695,365 L 690,375 L 670,375 Z" fill="#1A1A2E" />
    <path d="M 670,368 L 690,368" stroke="#E0D8E8" stroke-width="2" opacity="0.8" />

    <!-- Armor Crest / Plume -->
    <path d="M 690,320 L 710,300 L 720,310 L 700,330 Z" fill="#1A1A2E" />
  </g>

  <!-- 12. Foreground Rain Layer (Heavier, faster) -->
  <g opacity="0.6">
    <use href="#rain-line-fg" x="150" y="-50">
      <animate attributeName="y" values="-50;950" dur="0.4s" repeatCount="indefinite" />
      <animate attributeName="x" values="150;-10" dur="0.4s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line-fg" x="450" y="-150">
      <animate attributeName="y" values="-150;950" dur="0.45s" repeatCount="indefinite" />
      <animate attributeName="x" values="450;200" dur="0.45s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line-fg" x="750" y="-80">
      <animate attributeName="y" values="-80;950" dur="0.35s" repeatCount="indefinite" />
      <animate attributeName="x" values="750;550" dur="0.35s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line-fg" x="1050" y="-200">
      <animate attributeName="y" values="-200;950" dur="0.5s" repeatCount="indefinite" />
      <animate attributeName="x" values="1050;800" dur="0.5s" repeatCount="indefinite" />
    </use>
    <use href="#rain-line-fg" x="1350" y="-100">
      <animate attributeName="y" values="-100;950" dur="0.38s" repeatCount="indefinite" />
      <animate attributeName="x" values="1350;1100" dur="0.38s" repeatCount="indefinite" />
    </use>
  </g>

  <!-- 13. Extreme Foreground Mist / Floating Dust -->
  <g filter="url(#blur20)">
    <circle cx="100" cy="800" r="40" fill="#5E6AD2" opacity="0.1">
      <animate attributeName="cx" values="100;300" dur="15s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0;0.1" dur="15s" repeatCount="indefinite" />
    </circle>
    <circle cx="1500" cy="850" r="60" fill="#E0D8E8" opacity="0.05">
      <animate attributeName="cx" values="1500;1200" dur="20s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.05;0;0.05" dur="20s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 14. Ground Mist / Rolling Fog -->
  <rect x="0" y="750" width="1600" height="150" fill="#3D2A4F" opacity="0.2" filter="url(#blur60)">
    <animate attributeName="opacity" values="0.2;0.3;0.2" dur="12s" repeatCount="indefinite" />
  </rect>

  <!-- 15. Foreground Light Pulse / Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#000" stop-opacity="0" />
    <stop offset="100%" stop-color="#000" stop-opacity="0.7" />
  </radialGradient>
  <rect x="0" y="0" width="1600" height="900" fill="url(#vignette)" pointer-events="none">
    <animate attributeName="opacity" values="1;0.8;1" dur="10s" repeatCount="indefinite" />
  </rect>

</svg>