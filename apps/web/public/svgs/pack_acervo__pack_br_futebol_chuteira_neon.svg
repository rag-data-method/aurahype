<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#090b10"/>
      <stop offset="100%" stop-color="#151a25"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="28%" stop-color="#7a7a7a"/>
      <stop offset="48%" stop-color="#e8e8e8"/>
      <stop offset="68%" stop-color="#7a7a7a"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3d00"/>
      <stop offset="50%" stop-color="#ff9d00"/>
      <stop offset="100%" stop-color="#ff3d00"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f2ff"/>
      <stop offset="100%" stop-color="#00a8ff"/>
    </linearGradient>
    <pattern id="grid" width="140" height="140" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0,0 L140,0 M0,0 L0,140" stroke="#fff" stroke-width="1" opacity="0.04"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <g fill="#ff4d00" opacity="0.35">
    <circle cx="300" cy="300" r="3"><animate attributeName="opacity" values="0.35;0.05;0.35" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1600" cy="250" r="4"><animate attributeName="opacity" values="0.25;0.6;0.25" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1450" cy="800" r="3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="750" r="2"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <g filter="url(#glow)" opacity="0.75">
    <path d="M80 880 L920 520" stroke="url(#orange)" stroke-width="12" stroke-linecap="round" stroke-dasharray="90 130" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="220" to="0" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M160 940 L820 580" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round" stroke-dasharray="70 110" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="180" to="0" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M20 780 L720 500" stroke="url(#orange)" stroke-width="6" stroke-linecap="round" stroke-dasharray="50 100" opacity="0.45">
      <animate attributeName="stroke-dashoffset" from="150" to="0" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.1;0.45" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M220 820 L780 540" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round" stroke-dasharray="40 90" opacity="0.4">
      <animate attributeName="stroke-dashoffset" from="130" to="0" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.08;0.4" dur="2.3s" repeatCount="indefinite"/>
    </path>
    <path d="M0 720 L620 460" stroke="url(#orange)" stroke-width="4" stroke-linecap="round" stroke-dasharray="30 80" opacity="0.35">
      <animate attributeName="stroke-dashoffset" from="110" to="0" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.05;0.35" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <ellipse cx="980" cy="715" rx="440" ry="38" fill="#000" opacity="0.45" filter="url(#shadow)"/>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -16;0 0" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>

    <path d="M540,640 C505,590 515,510 575,470 C645,425 790,410 990,420 C1185,430 1340,470 1410,520 C1440,550 1390,595 1290,625 C1125,670 845,670 625,655 C575,650 545,645 540,640 Z" fill="url(#metal)"/>
    <path d="M620,480 C800,455 1100,465 1330,520 C1150,490 850,485 650,500 Z" fill="#fff" opacity="0.12"/>
    <path d="M540,640 C555,580 610,540 690,540 C670,600 630,640 610,655 C575,650 550,645 540,640 Z" fill="#111" opacity="0.5"/>

    <path d="M600,505 C635,465 725,450 820,465 C855,470 870,490 860,510 C790,510 700,525 620,525 C600,525 590,515 600,505 Z" fill="#0b0d12"/>
    <path d="M600,505 C635,465 725,450 820,465" fill="none" stroke="url(#orange)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

    <g stroke="#e6e6e6" stroke-width="7" stroke-linecap="round">
      <line x1="850" y1="490" x2="890" y2="480"/>
      <line x1="920" y1="492" x2="960" y2="482"/>
      <line x1="990" y1="494" x2="1030" y2="484"/>
      <line x1="1060" y1="496" x2="1100" y2="486"/>
    </g>

    <path d="M880,560 C950,590 1080,560 1180,500 C1100,580 960,620 860,590 Z" fill="url(#orange)" filter="url(#glow)"/>
    <path d="M560,655 C800,670 1100,670 1310,635 L1325,660 C1100,700 800,700 560,675 Z" fill="url(#orange)" filter="url(#glow)"/>

    <g fill="#ff5e00">
      <path d="M650,672 l12,24 h-24 z"/>
      <path d="M810,672 l12,24 h-24 z"/>
      <path d="M980,672 l12,24 h-24 z"/>
      <path d="M1140,670 l12,24 h-24 z"/>
      <path d="M1300,660 l10,22 h-20 z"/>
    </g>

    <ellipse cx="1320" cy="520" rx="70" ry="28" fill="#fff" opacity="0.18" transform="rotate(-12 1320 520)"/>
  </g>
</svg>