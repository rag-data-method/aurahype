<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="pix" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M 96 0 L 0 0 0 96" fill="none" stroke="#1e293b" stroke-width="1.2"/>
    </pattern>
    <path id="pixArm" d="M -42,-190 L 42,-190 L 42,-85 L 95,-85 L 0,35 L -95,-85 L -42,-85 Z" fill="url(#pix)" stroke-linejoin="round"/>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.25"/>
  <circle cx="960" cy="540" r="520" fill="url(#bgGlow)" filter="url(#soft)" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="8s" repeatCount="indefinite"/>
  </circle>

  <rect x="320" y="180" width="1280" height="720" rx="48" fill="url(#card)" stroke="#1e293b" stroke-width="2"/>
  <rect x="380" y="230" width="1160" height="64" rx="16" fill="#0b1220" stroke="#1e293b"/>
  <circle cx="430" cy="262" r="10" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="475" cy="262" r="10" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.4;1" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="262" r="10" fill="#a855f7">
    <animate attributeName="opacity" values="1;0.4;1" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <rect x="380" y="330" width="360" height="300" rx="24" fill="#0f172a" stroke="#1e293b"/>
  <g fill="url(#bar)">
    <rect x="415" y="510" width="34" height="90" rx="6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="470" y="460" width="34" height="140" rx="6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="525" y="430" width="34" height="170" rx="6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="580" y="480" width="34" height="120" rx="6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="635" y="520" width="34" height="80" rx="6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="1180" y="330" width="360" height="300" rx="24" fill="#0f172a" stroke="#1e293b"/>
  <circle cx="1360" cy="480" r="85" fill="none" stroke="url(#pix)" stroke-width="26" stroke-linecap="round" stroke-dasharray="320 530" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 1360 480" to="360 1360 480" dur="18s" repeatCount="indefinite"/>
  </circle>
  <g fill="#22d3ee">
    <circle cx="1360" cy="380" r="6"/>
    <circle cx="1460" cy="480" r="6"/>
    <circle cx="1360" cy="580" r="6"/>
    <circle cx="1260" cy="480" r="6"/>
  </g>

  <rect x="380" y="660" width="1160" height="180" rx="24" fill="#0f172a" stroke="#1e293b"/>
  <polyline points="420,780 520,745 640,795 760,725 880,770 1000,705 1120,750 1240,685 1360,720 1480,660" fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <g fill="#22c55e">
    <circle cx="420" cy="780" r="5"/>
    <circle cx="640" cy="795" r="5"/>
    <circle cx="880" cy="770" r="5"/>
    <circle cx="1120" cy="750" r="5"/>
    <circle cx="1360" cy="720" r="5"/>
    <circle cx="1480" cy="660" r="5"/>
  </g>

  <g transform="translate(1660,540)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-28;0,0" dur="4.5s" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1" repeatCount="indefinite"/>
    <path d="M -55,130 L 55,130 L 55,25 L 110,25 L 0,-130 L -110,25 L -55,25 Z" fill="url(#arrow)" filter="url(#glow)"/>
  </g>

  <g transform="translate(960,540)">
    <g filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-20;0,0" dur="5s" calcMode="spline" keySplines=".4 0 .2 1;.4 0 .2 1" repeatCount="indefinite"/>
      <g transform="scale(1.25)">
        <use href="#pixArm"/>
        <use href="#pixArm" transform="rotate(90)"/>
        <use href="#pixArm" transform="rotate(180)"/>
        <use href="#pixArm" transform="rotate(270)"/>
      </g>
    </g>
  </g>

  <circle cx="260" cy="200" r="4" fill="#22d3ee" opacity="0.6">
    <animate attributeName="cy" values="200;160;200" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1700" cy="860" r="4" fill="#22c55e" opacity="0.6">
    <animate attributeName="cy" values="860;820;860" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="750" r="3" fill="#a855f7" opacity="0.5">
    <animate attributeName="cy" values="750;710;750" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>