    <g><animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/><use href="#balloonA" x="-30" y="-45" width="60" height="90"/></g>
    <ellipse cx="0" cy="80" rx="24" ry="7" fill="#FFFFFF" fill-opacity="0.3" filter="url(#shadowBlur)"><animate attributeName="rx" values="24;18;24" dur="7.5s" repeatCount="indefinite"/></ellipse>
