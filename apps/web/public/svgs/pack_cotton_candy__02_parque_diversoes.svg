      <stop offset="45%" stop-color="#FFB7B2" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFB7B2" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="gradA" cx="0.35" cy="0.35" r="0.8">
