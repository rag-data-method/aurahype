    <g><animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/><use href="#balloonS" x="-30" y="-45" width="60" height="90"/></g>
