      <polygon points="0,20 -5,28 5,28" fill="#B5EAD7" fill-opacity="0.9"/>
      <path d="M0,28 Q2,48 0,66" stroke="#B5EAD7" stroke-width="2" stroke-opacity="0.7" fill="none"/>
    </symbol>
    <symbol id="balloonS" viewBox="-30 -45 60 90">
      <ellipse cx="0" cy="-12" rx="26" ry="32" fill="url(#gradS)"/>
      <polygon points="0,20 -5,28 5,28" fill="#FFB7B2" fill-opacity="0.9"/>
      <path d="M0,28 Q2,48 0,66" stroke="#FFB7B2" stroke-width="2" stroke-opacity="0.7" fill="none"/>
    </symbol>
