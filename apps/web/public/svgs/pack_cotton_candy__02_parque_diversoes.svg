    <g><animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/><use href="#balloonS" x="-30" y="-45" width="60" height="90"/></g>
    <ellipse cx="0" cy="80" rx="24" ry="7" fill="#FFB7B2" fill-opacity="0.25" filter="url(#shadowBlur)"><animate attributeName="rx" values="24;18;24" dur="6.5s" repeatCount="indefinite"/></ellipse>
  </g>
