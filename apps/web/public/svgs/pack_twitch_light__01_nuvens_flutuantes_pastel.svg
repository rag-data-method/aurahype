<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="60%" stop-color="#FFF5F5" />
      <stop offset="100%" stop-color="#F0E8FF" />
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <g id="cloud-puff" filter="url(#softGlow)">
      <circle cx="0" cy="0" r="24" stroke-width="1" />
      <circle cx="22" cy="-8" r="28" stroke-width="1" />
      <circle cx="46" cy="0" r="22" stroke-width="1" />
      <circle cx="24" cy="10" r="22" stroke-width="1" />
    </g>

    <g id="cloud-tall" filter="url(#softGlow)">
      <circle cx="0" cy="0" r="22" stroke-width="1" />
      <circle cx="20" cy="-10" r="26" stroke-width="1" />
      <circle cx="42" cy="0" r="20" stroke-width="1" />
      <circle cx="10" cy="14" r="20" stroke-width="1" />
      <circle cx="32" cy="12" r="22" stroke-width="1" />
    </g>

    <g id="cloud-wide" filter="url(#softGlow)">
      <ellipse cx="0" cy="0" rx="26" ry="18" stroke-width="1" />
      <ellipse cx="24" cy="-14" rx="32" ry="24" stroke-width="1" />
      <ellipse cx="50" cy="-4" rx="28" ry="20" stroke-width="1" />
      <ellipse cx="78" cy="0" rx="24" ry="18" stroke-width="1" />
      <ellipse cx="60" cy="14" rx="24" ry="18" stroke-width="1" />
      <ellipse cx="34" cy="12" rx="28" ry="20" stroke-width="1" />
    </g>

    <g id="cloud-bi" filter="url(#softGlow)">
      <circle cx="0" cy="0" r="20" stroke-width="1" />
      <circle cx="18" cy="-10" r="24" stroke-width="1" />
      <circle cx="36" cy="0" r="18" stroke-width="1" />
      <circle cx="70" cy="-6" r="22" stroke-width="1" />
      <circle cx="90" cy="2" r="20" stroke-width="1" />
      <circle cx="80" cy="16" r="16" stroke-width="1" />
      <circle cx="20" cy="14" r="18" stroke-width="1" />
    </g>

    <mask id="cloudMask1">
      <g fill="white" stroke="none">
        <use href="#cloud-wide" transform="translate(120, 250) scale(1.6)" />
        <use href="#cloud-puff" transform="translate(80, 205) scale(1)" />
        <use href="#cloud-puff" transform="translate(380, 245) scale(0.7)" />
      </g>
    </mask>

    <mask id="cloudMask2">
      <g fill="white" stroke="none">
        <use href="#cloud-bi" transform="translate(200, 100) scale(1.8)" />
        <circle cx="180" cy="85" r="14" fill="white" />
        <circle cx="205" cy="75" r="16" fill="white" />
      </g>
    </mask>

    <mask id="cloudMask3">
      <g fill="white" stroke="none">
        <use href="#cloud-wide" transform="translate(250, 400) scale(1.2)" />
        <use href="#cloud-puff" transform="translate(150, 385) scale(0.6)" />
        <use href="#cloud-puff" transform="translate(320, 395) scale(0.8)" />
      </g>
    </mask>

    <mask id="cloudMask4">
      <g fill="white" stroke="none">
        <use href="#cloud-tall" transform="translate(100, 500) scale(1.6)" />
        <use href="#cloud-puff" transform="translate(140, 530) scale(0.8)" />
        <use href="#cloud-puff" transform="translate(20, 510) scale(0.6)" />
      </g>
    </mask>
  </defs>

  <rect width="100%" height="100%" fill="url(#skyGradient)" />

  <rect x="0" y="0" width="800" height="600" fill="#FFF0F5" opacity="0.4" mask="url(#cloudMask1)">
    <animateTransform attributeName="transform" type="translate" from="-100 0" to="900 0" dur="34000s" repeatCount="indefinite" />
  </rect>

  <g opacity="0.5">
    <g mask="url(#cloudMask1)" stroke="#FFB7B2" fill="#FFE5E5">
      <use href="#cloud-wide" transform="translate(120, 250) scale(1.6)" />
      <use href="#cloud-puff" transform="translate(80, 205) scale(1)" />
      <use href="#cloud-puff" transform="translate(380, 245) scale(0.7)" />
      <animateTransform attributeName="transform" type="translate" from="-100 0" to="900 0" dur="140s" repeatCount="indefinite" />
    </g>
  </g>

  <g opacity="0.5" stroke="#CDB4DB" fill="#E8D5F2">
    <g mask="url(#cloudMask2)">
      <use href="#cloud-bi" transform="translate(200, 100) scale(1.8)" />
      <circle cx="180" cy="85" r="14" />
      <circle cx="205" cy="75" r="16" />
    </g>
    <animateTransform attributeName="transform" type="translate" from="900 0" to="-200 0" dur="210s" repeatCount="indefinite" />
  </g>

  <g opacity="0.45" stroke="#FFDAB9" fill="#FFF2E5">
    <g mask="url(#cloudMask3)">
      <use href="#cloud-wide" transform="translate(250, 400) scale(1.2)" />
      <use href="#cloud-puff" transform="translate(150, 385) scale(0.6)" />
      <use href="#cloud-puff" transform="translate(320, 395) scale(0.8)" />
    </g>
    <animateTransform attributeName="transform" type="translate" from="-100 0" to="900 0" dur="180s" repeatCount="indefinite" />
  </g>

  <g opacity="0.42" stroke="#E2BCC4" fill="#FFE0E6">
    <g mask="url(#cloudMask4)">
      <use href="#cloud-tall" transform="translate(100, 500) scale(1.6)" />
      <use href="#cloud-puff" transform="translate(140, 530) scale(0.8)" />
      <use href="#cloud-puff" transform="translate(20, 510) scale(0.6)" />
    </g>
    <animateTransform attributeName="transform" type="translate" from="900 0" to="-200 0" dur="260s" repeatCount="indefinite" />
  </g>
</svg>