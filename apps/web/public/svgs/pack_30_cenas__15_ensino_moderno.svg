<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feOffset in="blur" dx="0" dy="20" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="tabletGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadowBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>

    <linearGradient id="tabletScreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    
    <linearGradient id="capTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#F5F0E6"/>

  <g transform="translate(800, 450)">
    
    <ellipse cx="0" cy="180" rx="300" ry="80" fill="#1A1A1A" opacity="0.1" filter="url(#shadowBlur)">
      <animate attributeName="rx" values="300;320;300" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.15;0.1" dur="6s" repeatCount="indefinite"/>
    </ellipse>

    <g id="tablet">
      <rect x="-220" y="-20" width="440" height="320" rx="30" fill="#1A1A1A" opacity="0.2" filter="url(#shadowBlur)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,5; 0,0" dur="4s" repeatCount="indefinite"/>
      </rect>

      <rect x="-200" y="-140" width="400" height="280" rx="20" fill="url(#tabletScreen)" stroke="#1A1A1A" stroke-width="4"/>
      
      <rect x="-180" y="-120" width="360" height="240" rx="10" fill="#0a0a0a"/>
      
      <rect x="-180" y="-120" width="360" height="240" rx="10" fill="#4CC9FE" opacity="0.05" filter="url(#tabletGlow)">
        <animate attributeName="opacity" values="0.05;0.1;0.05" dur="4s" repeatCount="indefinite"/>
      </rect>

      <g opacity="0.9">
        <rect x="-160" y="-100" width="100" height="8" rx="4" fill="#4CC9FE" opacity="0.8">
          <animate attributeName="width" values="100;120;100" dur="5s" repeatCount="indefinite"/>
        </rect>
        
        <g transform="translate(-140, -60)">
          <rect x="0" y="0" width="8" height="40" rx="2" fill="#4CC9FE" opacity="0.7">
            <animate attributeName="height" values="40;60;40" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="y" values="0;-20;0" dur="3s" repeatCount="indefinite"/>
          </rect>
          <rect x="20" y="0" width="8" height="60" rx="2" fill="#4CC9FE" opacity="0.8">
            <animate attributeName="height" values="60;40;60" dur="3.5s" repeatCount="indefinite"/>
            <animate attributeName="y" values="0;20;0" dur="3.5s" repeatCount="indefinite"/>
          </rect>
          <rect x="40" y="0" width="8" height="30" rx="2" fill="#4CC9FE" opacity="0.6">
            <animate attributeName="height" values="30;50;30" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="y" values="0;-20;0" dur="4s" repeatCount="indefinite"/>
          </rect>
        </g>

        <circle cx="120" cy="-80" r="6" fill="#4CC9FE" opacity="0">
          <animate attributeName="opacity" values="0;0.9;0" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="120" cy="-40" r="6" fill="#4CC9FE" opacity="0">
          <animate attributeName="opacity" values="0;0.9;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
          <animate attributeName="r" values="6;10;6" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
        </circle>

        <rect x="-160" y="20" width="200" height="4" rx="2" fill="#1A1A1A" opacity="0.5"/>
        <rect x="-160" y="20" width="0" height="4" rx="2" fill="#4CC9FE" opacity="0.9">
          <animate attributeName="width" values="0;200;0" dur="8s" repeatCount="indefinite"/>
        </rect>

        <path d="M 80 60 l 10 10 l 20 -20" stroke="#4CC9FE" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0">
          <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
          <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="4s" begin="1s" repeatCount="indefinite"/>
        </path>
      </g>

      <path d="M -180,-120 L -100,-120 L -140,120 L -180,120 Z" fill="white" opacity="0.03">
        <animateTransform attributeName="transform" type="translate" values="-200,0; 400,0" dur="10s" repeatCount="indefinite"/>
      </path>
    </g>

    <g id="gradcap" transform="translate(0, -160)">
      <ellipse cx="0" cy="20" rx="120" ry="40" fill="#1A1A1A" opacity="0.3" filter="url(#shadowBlur)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="4s" repeatCount="indefinite"/>
      </ellipse>

      <path d="M -100,0 C -100,-30 -60,-50 0,-50 C 60,-50 100,-30 100,0 C 100,20 60,30 0,30 C -60,30 -100,20 -100,0" fill="#1A1A1A"/>
      <path d="M -100,0 C -100,20 -60,40 0,40 C 60,40 100,20 100,0 L 100,-10 L -100,-10 Z" fill="#0f0f0f" opacity="0.5"/>

      <g transform="translate(0, -45)">
        <path d="M -130,0 L 0,-40 L 130,0 L 0,40 Z" fill="url(#capTop)" stroke="#1A1A1A" stroke-width="2"/>
        <path d="M -130,0 L 0,40 L 130,0 L 130,8 L 0,48 L -130,8 Z" fill="#0a0a0a"/>
        <path d="M -130,0 L -130,8 L 0,48 L 0,40 Z" fill="#151515"/>
        <path d="M -100,-10 L 0,-35 L 100,-10" stroke="white" stroke-width="2" opacity="0.1" fill="none"/>
      </g>

      <circle cx="0" cy="-85" r="8" fill="#C9A85C"/>

      <g transform="translate(40, -85)">
        <path d="M 0,0 Q 20,20 40,80" stroke="#C9A85C" stroke-width="3" fill="none"/>
        
        <g transform="translate(40, 80)">
          <animateTransform attributeName="transform" type="rotate" values="-5 0 0; 5 0 0; -5 0 0" dur="6s" repeatCount="indefinite" additive="sum"/>
          
          <g fill="#C9A85C">
            <ellipse cx="0" cy="10" rx="3" ry="15"/>
            <ellipse cx="-4" cy="12" rx="3" ry="14" transform="rotate(-10)"/>
            <ellipse cx="4" cy="12" rx="3" ry="14" transform="rotate(10)"/>
            <ellipse cx="-7" cy="15" rx="3" ry="13" transform="rotate(-20)"/>
            <ellipse cx="7" cy="15" rx="3" ry="13" transform="rotate(20)"/>
            <ellipse cx="-2" cy="18" rx="3" ry="12"/>
            <ellipse cx="2" cy="18" rx="3" ry="12"/>
          </g>
          <rect x="-5" y="0" width="10" height="8" rx="2" fill="#a08040"/>
        </g>
      </g>

      <animateTransform attributeName="transform" type="translate" values="0,-160; 0,-165; 0,-160" dur="4s" repeatCount="indefinite" additive="sum"/>
    </g>

    <g opacity="0.6">
      <circle cx="-250" cy="-100" r="2" fill="#4CC9FE">
        <animate attributeName="cy" values="-100;-150;-100" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="280" cy="50" r="3" fill="#C9A85C">
        <animate attributeName="cy" values="50;0;50" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="200" cy="-200" r="2" fill="#4CC9FE">
        <animate attributeName="cy" values="-200;-250;-200" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>