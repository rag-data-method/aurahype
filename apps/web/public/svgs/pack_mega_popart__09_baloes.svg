<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
    <defs>
        <pattern id="bg-dots" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="4" fill="#000"/>
        </pattern>
        
        <pattern id="sm-dots" width="8" height="8" patternUnits="userSpaceOnUse">
            <circle cx="4" cy="4" r="2" fill="#000"/>
        </pattern>
        
        <pattern id="md-dots" width="6" height="6" patternUnits="userSpaceOnUse">
            <circle cx="3" cy="3" r="1.5" fill="#000"/>
        </pattern>
        
        <pattern id="lg-dots" width="12" height="12" patternUnits="userSpaceOnUse">
            <circle cx="6" cy="6" r="3" fill="#000"/>
        </pattern>

        <clipPath id="c1">
            <path d="M 1200 350 L 900 350 L 900 200 C 900 140 950 100 1050 100 C 1150 100 1200 140 1200 200 Z"/>
        </clipPath>
        
        <clipPath id="c2">
            <ellipse cx="400" cy="550" rx="250" ry="200"/>
        </clipPath>
        
        <clipPath id="c3">
            <path d="M 600 800 L 500 800 L 500 650 C 500 600 550 580 650 580 C 750 580 800 600 800 650 Z"/>
        </clipPath>
        
        <clipPath id="c4">
            <ellipse cx="1050" cy="650" rx="160" ry="70"/>
        </clipPath>
    </defs>

    <rect width="1600" height="900" fill="#00E5FF"/>
    <rect width="1600" height="900" fill="url(#bg-dots)" opacity="0.15"/>

    <g fill="none" stroke="#000" stroke-width="4" stroke-dasharray="15 10">
        <path d="M 0 50 L 1600 50"/>
        <path d="M 0 150 L 1600 150"/>
        <path d="M 0 250 L 1600 250"/>
        <path d="M 0 350 L 1600 350"/>
        <path d="M 0 450 L 1600 450"/>
        <path d="M 0 550 L 1600 550"/>
        <path d="M 0 650 L 1600 650"/>
        <path d="M 0 750 L 1600 750"/>
        <path d="M 0 850 L 1600 850"/>
    </g>
    
    <rect x="-50" y="-50" width="1700" height="1000" fill="url(#bg-dots)" opacity="0.3">
        <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="6s" repeatCount="indefinite" additive="sum"/>
    </rect>

    <g id="speech-bubble-1">
        <path d="M 1200 350 L 900 350 L 900 200 C 900 140 950 100 1050 100 C 1150 100 1200 140 1200 200 Z" fill="#FFFF00" stroke="#000" stroke-width="12"/>
        <path d="M 1200 350 L 900 350 L 900 200 C 900 140 950 100 1050 100 C 1150 100 1200 140 1200 200 Z" fill="url(#sm-dots)" clip-path="url(#c1)" opacity="0.4"/>
        <path d="M 1200 350 L 900 350 L 900 200 C 900 140 950 100 1050 100 C 1150 100 1200 140 1200 200 Z" fill="none" stroke="#000" stroke-width="6"/>
        <path d="M 950 330 L 1050 330 L 1000 430 Z" fill="#FFFF00" stroke="#000" stroke-width="8" stroke-linejoin="round"/>
        <path d="M 950 330 L 1050 330 L 1000 430 Z" fill="url(#sm-dots)" clip-path="url(#c1)" opacity="0.4"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </g>

    <g id="thought-bubble-1">
        <ellipse cx="400" cy="550" rx="250" ry="200" fill="#FF0055" stroke="#000" stroke-width="12"/>
        <ellipse cx="400" cy="550" rx="250" ry="200" fill="url(#md-dots)" clip-path="url(#c2)" opacity="0.4"/>
        <ellipse cx="400" cy="550" rx="250" ry="200" fill="none" stroke="#000" stroke-width="6"/>
        
        <g id="thought-chain">
            <circle cx="150" cy="780" r="40" fill="#FF0055" stroke="#000" stroke-width="10"/>
            <circle cx="150" cy="780" r="40" fill="url(#sm-dots)" clip-path="url(#c2)" opacity="0.4"/>
            <circle cx="150" cy="780" r="40" fill="none" stroke="#000" stroke-width="4"/>
            
            <circle cx="280" cy="760" r="25" fill="#FF0055" stroke="#000" stroke-width="8"/>
            <circle cx="280" cy="760" r="25" fill="url(#sm-dots)" clip-path="url(#c2)" opacity="0.4"/>
            <circle cx="280" cy="760" r="25" fill="none" stroke="#000" stroke-width="3"/>
            
            <circle cx="110" cy="720" r="15" fill="#FF0055" stroke="#000" stroke-width="6"/>
            <circle cx="110" cy="720" r="15" fill="none" stroke="#000" stroke-width="2"/>
            
            <circle cx="250" cy="700" r="10" fill="#FF0055" stroke="#000" stroke-width="5"/>
            <circle cx="250" cy="700" r="10" fill="none" stroke="#000" stroke-width="2"/>
        </g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 10,0; 0,0" dur="5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="-1 400 550; 1 400 550; -1 400 550" dur="8s" repeatCount="indefinite" additive="sum"/>
    </g>

    <g id="shout-bubble">
        <path d="M 600 800 L 500 800 L 500 650 C 500 600 550 580 650 580 C 750 580 800 600 800 650 Z" fill="#00E5FF" stroke="#000" stroke-width="12"/>
        <path d="M 600 800 L 500 800 L 500 650 C 500 600 550 580 650 580 C 750 580 800 600 800 650 Z" fill="url(#lg-dots)" clip-path="url(#c3)" opacity="0.5"/>
        <path d="M 600 800 L 500 800 L 500 650 C 500 600 550 580 650 580 C 750 580 800 600 800 650 Z" fill="none" stroke="#000" stroke-width="6"/>
        
        <path d="M 800 650 L 860 680 L 810 700 L 850 750 L 780 720 L 750 770 L 730 720 L 680 750 L 700 700 L 640 680 Z" fill="#00E5FF" stroke="#000" stroke-width="8" stroke-linejoin="round"/>
        <path d="M 800 650 L 860 680 L 810 700 L 850 750 L 780 720 L 750 770 L 730 720 L 680 750 L 700 700 L 640 680 Z" fill="url(#lg-dots)" clip-path="url(#c3)" opacity="0.5"/>
        <path d="M 800 650 L 860 680 L 810 700 L 850 750 L 780 720 L 750 770 L 730 720 L 680 750 L 700 700 L 640 680 Z" fill="none" stroke="#000" stroke-width="4"/>
        
        <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="3s" repeatCount="indefinite" additive="sum"/>
        <animateTransform attributeName="transform" type="rotate" values="-2 650 650; 2 650 650; -2 650 650" dur="6s" repeatCount="indefinite" additive="sum"/>
    </g>

    <g id="small-bubble">
        <ellipse cx="1050" cy="650" rx="160" ry="70" fill="#FFFF00" stroke="#000" stroke-width="10"/>
        <ellipse cx="1050" cy="650" rx="160" ry="70" fill="url(#md-dots)" clip-path="url(#c4)" opacity="0.4"/>
        <ellipse cx="1050" cy="650" rx="160" ry="70" fill="none" stroke="#000" stroke-width="5"/>
        <path d="M 900 650 L 850 700 L 920 680 Z" fill="#FFFF00" stroke="#000" stroke-width="8" stroke-linejoin="round"/>
        <path d="M 900 650 L 850 700 L 920 680 Z" fill="url(#md-dots)" clip-path="url(#c4)" opacity="0.4"/>
        <path d="M 900 650 L 850 700 L 920 680 Z" fill="none" stroke="#000" stroke-width="4"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" dur="2.5s" repeatCount="indefinite"/>
    </g>

    <g id="tiny-thought">
        <circle cx="250" cy="250" r="80" fill="#00E5FF" stroke="#000" stroke-width="10"/>
        <circle cx="250" cy="250" r="80" fill="url(#sm-dots)" opacity="0.4"/>
        <circle cx="250" cy="250" r="80" fill="none" stroke="#000" stroke-width="4"/>
        <circle cx="180" cy="340" r="25" fill="#00E5FF" stroke="#000" stroke-width="8"/>
        <circle cx="180" cy="340" r="25" fill="none" stroke="#000" stroke-width="3"/>
        <circle cx="130" cy="380" r="15" fill="#00E5FF" stroke="#000" stroke-width="6"/>
        <circle cx="130" cy="380" r="15" fill="none" stroke="#000" stroke-width="2"/>
        <animateTransform attributeName="transform" type="rotate" values="0 250 250; 5 250 250; 0 250 250" dur="7s" repeatCount="indefinite"/>
    </g>

    <g id="action-lines">
        <path d="M 50 450 L 300 550" stroke="#000" stroke-width="12" stroke-linecap="round">
            <animate attributeName="stroke-dasharray" values="0 500; 500 0" dur="1.5s" repeatCount="indefinite"/>
        </path>
        <path d="M 80 380 L 350 480" stroke="#000" stroke-width="8" stroke-linecap="round">
            <animate attributeName="stroke-dasharray" values="0 500; 500 0" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
        </path>
        <path d="M 20 520 L 250 620" stroke="#000" stroke-width="6" stroke-linecap="round">
            <animate attributeName="stroke-dasharray" values="0 500; 500 0" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
        </path>
        
        <path d="M 1550 150 L 1300 250" stroke="#000" stroke-width="12" stroke-linecap="round">
            <animate attributeName="stroke-dasharray" values="500 0; 0 500" dur="1.5s" repeatCount="indefinite"/>
        </path>
        <path d="M 1520 80 L 1250 180" stroke="#000" stroke-width="8" stroke-linecap="round">
            <animate attributeName="stroke-dasharray" values="500 0; 0 500" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
        </path>
    </g>

    <g id="comic-pow" transform="translate(1300, 450)">
        <polygon points="0,-70 20,-20 70,-40 40,0 80,40 30,30 0,80 -20,30 -70,50 -40,0 -80,-40 -30,-20" fill="#FF0055" stroke="#000" stroke-width="8" stroke-linejoin="round">
            <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="2s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="0,-70 20,-20 70,-40 40,0 80,40 30,30 0,80 -20,30 -70,50 -40,0 -80,-40 -30,-20" fill="url(#md-dots)" opacity="0.5">
            <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="2s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="0,-70 20,-20 70,-40 40,0 80,40 30,30 0,80 -20,30 -70,50 -40,0 -80,-40 -30,-20" fill="none" stroke="#000" stroke-width="4" stroke-linejoin="round">
            <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="2s" repeatCount="indefinite"/>
        </polygon>
        
        <path d="M -20,-10 L -10,-10 L -5,5 L 0,-10 L 10,-10 L 5,10 L 20,10 L 20,20 L 5,20 L 0,35 L -5,20 L -20,20 L -20,10 L -5,10 Z" fill="#FFFF00" stroke="#000" stroke-width="4" stroke-linejoin="round">
            <animate attributeName="fill" values="#FFFF00;#00E5FF;#FFFF00" dur="1s" repeatCount="indefinite"/>
        </path>
    </g>

    <g id="stars">
        <polygon points="200,100 210,130 240,130 215,150 225,180 200,160 175,180 185,150 160,130 190,130" fill="#FFFF00" stroke="#000" stroke-width="6" stroke-linejoin="round">
            <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="1.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
        </polygon>
        
        <polygon points="1400,750 1408,770 1428,770 1412,782 1418,802 1400,790 1382,802 1388,782 1372,770 1392,770" fill="#00E5FF" stroke="#000" stroke-width="5" stroke-linejoin="round">
            <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0.5;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        </polygon>
        
        <polygon points="100,700 105,715 120,715 108,725 113,740 100,730 87,740 92,725 80,715 95,715" fill="#FF0055" stroke="#000" stroke-width="4" stroke-linejoin="round">
            <animateTransform attributeName="transform" type="scale" values="1;1.4;1" dur="1s" begin="0.2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0.5;1" dur="1s" begin="0.2s" repeatCount="indefinite"/>
        </polygon>
    </g>

    <g id="speed-lines">
        <path d="M 500 100 L 700 150" stroke="#000" stroke-width="6" stroke-linecap="round" opacity="0.6">
            <animate attributeName="stroke-dashoffset" values="0;200" dur="1s" repeatCount="indefinite"/>
            <animate attributeName="stroke-dasharray" values="20 80" dur="1s" repeatCount="indefinite"/>
        </path>
        <path d="M 520 130 L 720 180" stroke="#000" stroke-width="4" stroke-linecap="round" opacity="0.6">
            <animate attributeName="stroke-dashoffset" values="0;200" dur="1s" begin="0.3s" repeatCount="indefinite"/>
            <animate attributeName="stroke-dasharray" values="15 85" dur="1s" begin="0.3s" repeatCount="indefinite"/>
        </path>
        <path d="M 1100 800 L 1300 850" stroke="#000" stroke-width="6" stroke-linecap="round" opacity="0.6">
            <animate attributeName="stroke-dashoffset" values="0;200" dur="1s" begin="0.5s" repeatCount="indefinite"/>
            <animate attributeName="stroke-dasharray" values="25 75" dur="1s" begin="0.5s" repeatCount="indefinite"/>
        </path>
    </g>

    <g id="dots-pop">
        <circle cx="850" cy="150" r="15" fill="#FF0055" stroke="#000" stroke-width="4">
            <animate attributeName="r" values="15;20;15" dur="1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="820" cy="180" r="10" fill="#FFFF00" stroke="#000" stroke-width="3">
            <animate attributeName="r" values="10;14;10" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="880" cy="170" r="8" fill="#00E5FF" stroke="#000" stroke-width="2">
            <animate attributeName="r" values="8;12;8" dur="0.8s" repeatCount="indefinite"/>
        </circle>
        
        <circle cx="300" cy="450" r="12" fill="#FFFF00" stroke="#000" stroke-width="3">
            <animate attributeName="r" values="12;16;12" dur="1.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="280" cy="480" r="8" fill="#FF0055" stroke="#000" stroke-width="2">
            <animate attributeName="r" values="8;11;8" dur="1.1s" repeatCount="indefinite"/>
        </circle>
    </g>

    <g id="burst-lines">
        <line x1="1050" y1="100" x2="1050" y2="50" stroke="#000" stroke-width="8" stroke-linecap="round"/>
        <line x1="1050" y1="100" x2="1100" y2="70" stroke="#000" stroke-width="6" stroke-linecap="round"/>
        <line x1="1050" y1="100" x2="1000" y2="70" stroke="#000" stroke-width="6" stroke-linecap="round"/>
        <line x1="1050" y1="100" x2="1120" y2="100" stroke="#000" stroke-width="8" stroke-linecap="round"/>
        <line x1="1050" y1="100" x2="980" y2="100" stroke="#000" stroke-width="8" stroke-linecap="round"/>
        <line x1="1050" y1="100" x2="1100" y2="130" stroke="#000" stroke-width="6" stroke-linecap="round"/>
        <line x1="1050" y1="100" x2="1000" y2="130" stroke="#000" stroke-width="6" stroke-linecap="round"/>
        <line x1="1050" y1="100" x2="1050" y2="150" stroke="#000" stroke-width="8" stroke-linecap="round"/>
        
        <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1.5s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
    </g>

    <g id="curved-arrows">
        <path d="M 1300 250 Q 1350 200 1400 250" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
        <polygon points="1400,250 1380,230 1380,270" fill="#000"/>
        
        <path d="M 300 350 Q 250 400 300 450" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
        <polygon points="300,450 280,430 280,470" fill="#000"/>
    </g>

    <animate attributeName="opacity" values="1;0.95;1" dur="0.5s" repeatCount="indefinite"/>
</svg>