<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A002E" />
      <stop offset="40%" stop-color="#120022" />
      <stop offset="100%" stop-color="#070011" />
    </radialGradient>

    <radialGradient id="floorGrad" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#2D004D" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#2D004D" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#2D004D" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glowBg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>

    <filter id="glowFloor" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" />
    </filter>

    <filter id="glowPulse" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <symbol id="s-chat" viewBox="0 0 100 100">
      <path d="M10,15 C10,10 15,5 25,5 H75 C85,5 90,10 90,15 V55 C90,60 85,65 75,65 H65 L50,85 L40,65 H25 C15,65 10,60 10,55 Z" />
      <rect x="25" y="20" width="50" height="8" rx="4" />
      <rect x="25" y="33" width="35" height="8" rx="4" />
      <rect x="25" y="46" width="25" height="8" rx="4" />
    </symbol>

    <symbol id="s-orb" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="10" />
      <circle cx="20" cy="20" r="5" />
    </symbol>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Global Atmospheric Glows -->
  <circle cx="250" cy="250" r="200" fill="#FF00FF" opacity="0.15" filter="url(#glowBg)" />
  <circle cx="550" cy="150" r="180" fill="#00FFFF" opacity="0.12" filter="url(#glowBg)" />

  <!-- Diagonal Light Beams -->
  <g opacity="0.6">
    <polygon points="-100,0 0,0 400,600 300,600" fill="url(#beamGrad)" />
    <polygon points="100,0 200,0 600,600 500,600" fill="url(#beamGrad)" />
    <polygon points="300,0 400,0 800,600 700,600" fill="url(#beamGrad)" />
    <polygon points="500,0 600,0 1000,600 900,600" fill="url(#beamGrad)" />
  </g>

  <!-- Background Field (Deep, Slower, Darker) -->
  <g transform="scale(0.6) translate(0, -100)" opacity="0.6" filter="url(#glow)">
    <g>
      <use href="#s-chat" width="70" height="70" x="70" y="-80" fill="#FF00FF" opacity="0.5" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1000" dur="8s" repeatCount="indefinite" />
    </g>
    <g>
      <use href="#s-chat" width="70" height="70" x="420" y="-150" fill="#00FFFF" opacity="0.5" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1000" dur="10s" repeatCount="indefinite" />
    </g>
    <g>
      <use href="#s-chat" width="70" height="70" x="750" y="-280" fill="#00FF77" opacity="0.5" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1000" dur="12s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- Midground Particle Clouds -->
  <g transform="scale(0.8) translate(0, -50)" opacity="0.8" filter="url(#glow)">
    <g>
      <use href="#s-chat" width="70" height="70" x="180" y="-80" fill="#FFFF00" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1000" dur="7s" repeatCount="indefinite" />
    </g>
    <g>
      <use href="#s-chat" width="70" height="70" x="550" y="-220" fill="#FF00FF" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1000" dur="11s" repeatCount="indefinite" />
    </g>
    <g>
      <use href="#s-chat" width="70" height="70" x="850" y="-350" fill="#00FFFF" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1000" dur="9s" repeatCount="indefinite" />
    </g>
    <g>
      <use href="#s-chat" width="70" height="70" x="-20" y="-450" fill="#FFFF00" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1000" dur="11s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- Foreground Main Rain Bubbles -->
  <g filter="url(#glowPulse)">
    <g transform="rotate(5, 100, 100)">
      <use href="#s-chat" width="100" height="100" x="100" y="-100" fill="#FF00FF">
        <animate attributeName="fill" values="#FF00FF;#00FFFF;#FF00FF" dur="1.5s" repeatCount="indefinite" />
      </use>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 800" dur="3.5s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(-8, 300, 100)">
      <use href="#s-chat" width="100" height="100" x="300" y="-300" fill="#FFFF00">
        <animate attributeName="fill" values="#FFFF00;#FF00FF;#FFFF00" dur="2s" repeatCount="indefinite" />
      </use>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 800" dur="4.5s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(12, 500, 100)">
      <use href="#s-chat" width="100" height="100" x="500" y="-200" fill="#00FFFF">
        <animate attributeName="fill" values="#00FFFF;#00FF77;#00FFFF" dur="1.2s" repeatCount="indefinite" />
      </use>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 800" dur="3s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(-6, 700, 100)">
      <use href="#s-chat" width="100" height="100" x="700" y="-500" fill="#00FF77">
        <animate attributeName="fill" values="#00FF77;#FFFF00;#00FF77" dur="2.5s" repeatCount="indefinite" />
      </use>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 800" dur="5s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(15, 200, 100)">
      <use href="#s-chat" width="100" height="100" x="200" y="-600" fill="#FF00FF">
        <animate attributeName="fill" values="#FF00FF;#00FFFF;#FF00FF" dur="1.7s" repeatCount="indefinite" />
      </use>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 800" dur="4s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(-10, 600, 100)">
      <use href="#s-chat" width="100" height="100" x="600" y="-700" fill="#FFFF00">
        <animate attributeName="fill" values="#FFFF00;#FF00FF;#FFFF00" dur="1.8s" repeatCount="indefinite" />
      </use>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 800" dur="3.8s" repeatCount="indefinite" />
    </g>

    <g transform="rotate(4, 400, 100)">
      <use href="#s-chat" width="100" height="100" x="400" y="-400" fill="#00FFFF">
        <animate attributeName="fill" values="#00FFFF;#00FF77;#00FFFF" dur="1.4s" repeatCount="indefinite" />
      </use>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 800" dur="4.2s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- Scattered Mid-Orbit Floating Orbs -->
  <g filter="url(#glow)">
    <use href="#s-orb" x="100" y="100" fill="#FF00FF" opacity="0.6">
      <animate attributeName="x" values="100;110;100" dur="2s" repeatCount="indefinite" />
      <animate attributeName="y" values="100;110;100" dur="2.3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
    </use>
    <use href="#s-orb" x="650" y="450" fill="#00FFFF" opacity="0.6">
      <animate attributeName="x" values="650;640;650" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="y" values="450;435;450" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite" />
    </use>
    <use href="#s-orb" x="300" y="520" fill="#FFFF00" opacity="0.6">
      <animate attributeName="x" values="300;310;300" dur="2s" repeatCount="indefinite" />
      <animate attributeName="y" values="520;510;520" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite" />
    </use>
    <use href="#s-orb" x="750" y="50" fill="#00FF77" opacity="0.6">
      <animate attributeName="x" values="750;740;750" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="y" values="50;60;50" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
    </use>
  </g>

  <!-- Foreground Floor Glow -->
  <rect x="0" y="400" width="800" height="200" fill="url(#floorGrad)" filter="url(#glowFloor)" />
  <ellipse cx="400" cy="580" rx="350" ry="40" fill="#FF00FF" opacity="0.25" filter="url(#glowFloor)" />
  <ellipse cx="200" cy="560" rx="150" ry="25" fill="#00FFFF" opacity="0.2" filter="url(#glowFloor)" />
  <ellipse cx="600" cy="540" rx="180" ry="30" fill="#FFFF00" opacity="0.15" filter="url(#glowFloor)" />

  <!-- Foreground Scanner Rings -->
  <g stroke="#00FFFF" stroke-width="4" opacity="0.6">
    <ellipse cx="400" cy="300" rx="100" ry="20" fill="none" stroke-dasharray="10 20">
      <animateTransform attributeName="transform" type="scale" values="1 1; 1.5 1.5; 1 1" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="400" cy="300" rx="100" ry="20" fill="none" stroke-dasharray="15 25">
      <animateTransform attributeName="transform" type="scale" values="1 1; 2 2; 1 1" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3.5s" repeatCount="indefinite" />
    </ellipse>
    
    <ellipse cx="150" cy="420" rx="60" ry="10" fill="none" stroke="#FF00FF" stroke-width="3" stroke-dasharray="8 15">
      <animateTransform attributeName="transform" type="scale" values="1 1; 1.8 1.8; 1 1" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.2s" repeatCount="indefinite" />
    </ellipse>

    <ellipse cx="650" cy="480" rx="80" ry="15" fill="none" stroke="#FFFF00" stroke-width="3" stroke-dasharray="12 20">
      <animateTransform attributeName="transform" type="scale" values="1 1; 1.6 1.6; 1 1" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <!-- Floating Neon Text (Streamer Vibe) -->
  <g transform="translate(400, 80)" text-anchor="middle">
    <path d="M -180 0 L 180 0" stroke="#FF00FF" stroke-width="6" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="stroke" values="#FF00FF;#00FFFF;#FFFF00;#FF00FF" dur="1s" repeatCount="indefinite" />
    </path>
    <text x="0" y="-20" font-family="Impact, sans-serif" font-weight="900" font-size="48" fill="none" stroke="#00FFFF" stroke-width="2" letter-spacing="6" filter="url(#glow)">
      STREAM ONLINE
      <animate attributeName="stroke" values="#00FFFF;#FFFF00;#FF00FF;#00FFFF" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite" />
    </text>
    <text x="0" y="-20" font-family="Impact, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" letter-spacing="6" opacity="0.9" style="mix-blend-mode: screen;">
      STREAM ONLINE
    </text>
    <circle cx="-200" cy="-10" r="5" fill="#FF00FF" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="0.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="-10" r="5" fill="#00FFFF" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="0.8s" repeatCount="indefinite" />
    </circle>
  </g>

</svg>