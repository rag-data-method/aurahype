<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#81C784"/>

  <g transform="translate(1300,160)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="4s" repeatCount="indefinite"/>
      <circle r="70" fill="#E0E0E0" fill-opacity="0.9" filter="url(#glowBlur)"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
        <polygon points="0,-110 14,-80 -14,-80" fill="#2196F3" fill-opacity="0.8" transform="rotate(0)"/>
        <polygon points="0,-110 14,-80 -14,-80" fill="#2196F3" fill-opacity="0.8" transform="rotate(45)"/>
        <polygon points="0,-110 14,-80 -14,-80" fill="#2196F3" fill-opacity="0.8" transform="rotate(90)"/>
        <polygon points="0,-110 14,-80 -14,-80" fill="#2196F3" fill-opacity="0.8" transform="rotate(135)"/>
        <polygon points="0,-110 14,-80 -14,-80" fill="#2196F3" fill-opacity="0.8" transform="rotate(180)"/>
        <polygon points="0,-110 14,-80 -14,-80" fill="#2196F3" fill-opacity="0.8" transform="rotate(225)"/>
        <polygon points="0,-110 14,-80 -14,-80" fill="#2196F3" fill-opacity="0.8" transform="rotate(270)"/>
        <polygon points="0,-110 14,-80 -14,-80" fill="#2196F3" fill-opacity="0.8" transform="rotate(315)"/>
      </g>
    </g>
  </g>

  <g transform="translate(250,140)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;80,0;0,0" dur="9s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="90" ry="45" fill="#E0E0E0" fill-opacity="0.85" filter="url(#softBlur)"/>
      <ellipse cx="50" cy="10" rx="60" ry="35" fill="#E0E0E0" fill-opacity="0.85"/>
      <ellipse cx="-50" cy="15" rx="55" ry="30" fill="#E0E0E0" fill-opacity="0.85"/>
    </g>
  </g>

  <g transform="translate(1200,220)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;-60,0;0,0" dur="11s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="80" ry="40" fill="#E0E0E0" fill-opacity="0.85" filter="url(#softBlur)"/>
      <ellipse cx="45" cy="8" rx="55" ry="30" fill="#E0E0E0" fill-opacity="0.85"/>
      <ellipse cx="-40" cy="12" rx="50" ry="28" fill="#E0E0E0" fill-opacity="0.85"/>
    </g>
  </g>

  <g transform="translate(800,720)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="7s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="20" rx="860" ry="220" fill="#4CAF50" fill-opacity="0.35" filter="url(#shadowBlur)"/>
      <path d="M-900,200 C-600,0,-200,-50,0,-50 C200,-50,600,0,900,200 L900,400 L-900,400 Z" fill="#4CAF50" fill-opacity="0.95"/>
    </g>
  </g>

  <g transform="translate(800,670)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1.015;1" dur="5s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="10" rx="260" ry="40" fill="#E0E0E0" fill-opacity="0.4" filter="url(#shadowBlur)"/>
      <path d="M-250,0 C-250,-200,-150,-290,0,-290 C150,-290,250,-200,250,0 Z" fill="#E0E0E0" fill-opacity="0.95"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-2;2;-2" dur="6s" repeatCount="indefinite"/>
        <path d="M-130,-260 C-100,-340,-40,-360,0,-360 C40,-360,100,-340,130,-260 C80,-240,-80,-240,-130,-260 Z" fill="#4CAF50" fill-opacity="0.95"/>
      </g>

      <g transform="translate(-130,-80)">
        <circle r="45" fill="#2196F3" fill-opacity="0.85">
          <animateTransform attributeName="transform" type="scale" values="1;1.12;1" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <ellipse cx="-16" cy="-16" rx="12" ry="8" fill="#E0E0E0" fill-opacity="0.8" transform="rotate(-45)"/>
      </g>
      <g transform="translate(0,-130)">
        <circle r="55" fill="#2196F3" fill-opacity="0.85">
          <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="4s" repeatCount="indefinite"/>
        </circle>
        <ellipse cx="-20" cy="-20" rx="14" ry="9" fill="#E0E0E0" fill-opacity="0.8" transform="rotate(-45)"/>
      </g>
      <g transform="translate(130,-80)">
        <circle r="45" fill="#2196F3" fill-opacity="0.85">
          <animateTransform attributeName="transform" type="scale" values="1;1.12;1" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
        </circle>
        <ellipse cx="-16" cy="-16" rx="12" ry="8" fill="#E0E0E0" fill-opacity="0.8" transform="rotate(-45)"/>
      </g>

      <g transform="translate(0,0)">
        <rect x="-55" y="-140" width="110" height="140" rx="55" fill="#2196F3" fill-opacity="0.3"/>
        <rect x="-60" y="-145" width="120" height="150" rx="60" fill="none" stroke="#E0E0E0" stroke-width="10" stroke-opacity="0.9"/>
        <g>
          <animateTransform attributeName="transform" type="translate" values="0,0;-45,0;0,0" dur="5s" repeatCount="indefinite"/>
          <rect x="-55" y="-140" width="110" height="140" rx="55" fill="#2196F3" fill-opacity="0.9"/>
          <rect x="-35" y="-110" width="20" height="20" rx="10" fill="#E0E0E0" fill-opacity="0.9"/>
        </g>
      </g>

      <g transform="translate(90,-250)">
        <animateTransform attributeName="transform" type="rotate" values="0;25;0" dur="4s" repeatCount="indefinite"/>
        <path d="M0,0 L30,-10 L30,10 Z" fill="#E0E0E0" fill-opacity="0.9"/>
        <ellipse cx="35" cy="0" rx="25" ry="12" fill="#E0E0E0" fill-opacity="0.9"/>
        <rect x="-5" y="-5" width="10" height="20" fill="#2196F3" fill-opacity="0.9"/>
      </g>
    </g>
  </g>

  <path d="M800,670 C780,720,700,760,600,800 C500,840,480,880,500,900 L700,900 C680,860,750,820,820,780 C860,760,880,720,860,670 Z" fill="#E0E0E0" fill-opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.65;0.85" dur="4s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(420,780)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-5;5;-5" dur="3s" repeatCount="indefinite"/>
      <path d="M0,0 Q5,-40,0,-80" stroke="#4CAF50" stroke-width="6" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-80" r="18" fill="#2196F3" fill-opacity="0.9"/>
      <circle cx="-6" cy="-86" r="5" fill="#E0E0E0" fill-opacity="0.8"/>
    </g>
  </g>

  <g transform="translate(1180,790)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="5;-5;5" dur="3.5s" repeatCount="indefinite"/>
      <path d="M0,0 Q-5,-45,0,-90" stroke="#4CAF50" stroke-width="6" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-90" r="20" fill="#2196F3" fill-opacity="0.9"/>
      <circle cx="-7" cy="-97" r="6" fill="#E0E0E0" fill-opacity="0.8"/>
    </g>
  </g>

  <g transform="translate(600,820)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-4;4;-4" dur="2.8s" repeatCount="indefinite"/>
      <path d="M0,0 Q4,-35,0,-70" stroke="#4CAF50" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-70" r="15" fill="#2196F3" fill-opacity="0.9"/>
    </g>
  </g>

  <g transform="translate(980,830)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="4;-4;4" dur="3.2s" repeatCount="indefinite"/>
      <path d="M0,0 Q-4,-35,0,-70" stroke="#4CAF50" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-70" r="15" fill="#2196F3" fill-opacity="0.9"/>
    </g>
  </g>

  <g transform="translate(700,600)">
    <circle r="18" fill="#2196F3" fill-opacity="0.8" filter="url(#softBlur)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-120" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(900,620)">
    <circle r="14" fill="#2196F3" fill-opacity="0.8" filter="url(#softBlur)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-140" dur="7s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="7s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(800,580)">
    <circle r="22" fill="#2196F3" fill-opacity="0.8" filter="url(#softBlur)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-160" dur="8s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="8s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(520,250)">
    <path d="M0,-12 L0,12 M-12,0 L12,0" stroke="#E0E0E0" stroke-width="5" stroke-linecap="round">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(1100,320)">
    <path d="M0,-10 L0,10 M-10,0 L10,0" stroke="#2196F3" stroke-width="4" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(150,400)">
    <path d="M0,-14 L0,14 M-14,0 L14,0" stroke="#E0E0E0" stroke-width="5" stroke-linecap="round">
      <animate attributeName="opacity" values="0;1;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(1380,450)">
    <path d="M0,-10 L0,10 M-10,0 L10,0" stroke="#2196F3" stroke-width="4" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0;1" dur="3.5s" begin="2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>