<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6F47"/>
      <stop offset="50%" stop-color="#9B7F57"/>
      <stop offset="100%" stop-color="#7B5F3F"/>
    </linearGradient>
    <radialGradient id="herbGrad" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#7B8E6B"/>
      <stop offset="100%" stop-color="#5B6E4B"/>
    </radialGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#A8D8EA" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="shadowBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF7EE"/>
  
  <g opacity="0.25">
    <ellipse cx="700" cy="780" rx="140" ry="35" fill="#5A4A3A" filter="url(#shadowBlur)">
      <animate attributeName="rx" values="140;135;140" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.3;0.25" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1000" cy="790" rx="70" ry="20" fill="#5A4A3A" filter="url(#shadowBlur)">
      <animate attributeName="rx" values="70;68;70" dur="5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g transform="translate(580, 480)">
    <path d="M20,170 Q10,250 150,270 Q290,250 280,170 Q150,130 20,170" fill="url(#woodGrad)" stroke="#5A4A3A" stroke-width="3"/>
    <ellipse cx="150" cy="170" rx="130" ry="35" fill="#9B7F57" stroke="#5A4A3A" stroke-width="3"/>
    <ellipse cx="150" cy="170" rx="120" ry="28" fill="#3D3226"/>
    
    <g transform="translate(150, 175)">
      <path fill="#6B7E5B" d="M-50,0 Q-60,-25 -30,-35 Q-10,-25 -20,0 Z">
        <animateTransform attributeName="transform" type="rotate" values="0;-8;0" dur="2.8s" repeatCount="indefinite"/>
      </path>
      <path fill="#7B8E6B" d="M10,-15 Q25,-40 50,-25 Q35,-5 10,5 Z">
        <animateTransform attributeName="transform" type="rotate" values="0;6;0" dur="3.2s" repeatCount="indefinite"/>
      </path>
      <path fill="#5B6E4B" d="M30,10 Q55,-5 60,20 Q35,25 30,10 Z">
        <animateTransform attributeName="transform" type="scale" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
      </path>
      <path fill="#6B7E5B" d="M-30,15 Q-45,-5 -60,15 Q-40,30 -30,15 Z">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3.5s" repeatCount="indefinite"/>
      </path>
      <animateTransform attributeName="transform" type="scale" values="1;0.95;1" dur="4s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>
  
  <g transform="translate(730, 400)">
    <animateTransform attributeName="transform" type="rotate" values="-25 730 650; 25 730 650; -25 730 650" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,25; 0,0" dur="4s" repeatCount="indefinite" additive="sum"/>
    <rect x="-18" y="-140" width="36" height="220" rx="18" fill="url(#woodGrad)" stroke="#5A4A3A" stroke-width="2"/>
    <circle cx="0" cy="80" r="32" fill="#7B5F3F" stroke="#5A4A3A" stroke-width="2"/>
  </g>
  
  <g opacity="0.7">
    <circle cx="700" cy="650" r="4" fill="#A8D8EA" filter="url(#softBlur)">
      <animate attributeName="cy" values="650;550;650" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="700;720;700" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="660" r="3" fill="#6B7E5B" filter="url(#softBlur)">
      <animate attributeName="cy" values="660;560;660" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="720" cy="655" r="2.5" fill="#A8D8EA" filter="url(#softBlur)">
      <animate attributeName="cy" values="655;580;655" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
  
  <g transform="translate(1000, 650)">
    <path d="M-35,10 L-35,130 Q-35,150 0,150 Q35,150 35,130 L35,10 Q35,-10 0,-10 Q-35,-10 -35,10" fill="url(#glassGrad)" stroke="#A8D8EA" stroke-width="2" stroke-opacity="0.6"/>
    
    <path d="M-30,50 Q-30,45 0,45 Q30,45 30,50 L30,130 Q30,145 0,145 Q-30,145 -30,130 Z" fill="#6B7E5B" opacity="0.85">
      <animate attributeName="d" values="M-30,50 Q-30,45 0,45 Q30,45 30,50 L30,130 Q30,145 0,145 Q-30,145 -30,130 Z;M-30,52 Q-30,47 0,47 Q30,47 30,52 L30,130 Q30,145 0,145 Q-30,145 -30,130 Z;M-30,50 Q-30,45 0,45 Q30,45 30,50 L30,130 Q30,145 0,145 Q-30,145 -30,130 Z" dur="3s" repeatCount="indefinite"/>
    </path>
    
    <rect x="-18" y="-50" width="36" height="50" fill="url(#glassGrad)" stroke="#A8D8EA" stroke-width="2" stroke-opacity="0.6"/>
    
    <rect x="-14" y="-58" width="28" height="16" rx="3" fill="#8B6F47" stroke="#5A4A3A" stroke-width="1.5">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="6s" repeatCount="indefinite"/>
    </rect>
    
    <path d="M-25,30 Q-25,80 -25,120" stroke="#A8D8EA" stroke-width="3" stroke-linecap="round" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <ellipse cx="20" cy="100" rx="4" ry="8" fill="#FBF7EE" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <circle cx="900" cy="400" r="2.5" fill="#A8D8EA" opacity="0.35">
    <animate attributeName="cy" values="400;370;400" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="900;920;900" dur="8s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="550" cy="750" r="2" fill="#6B7E5B" opacity="0.4">
    <animate attributeName="cy" values="750;730;750" dur="7s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cx" values="550;560;550" dur="7s" repeatCount="indefinite" begin="2s"/>
  </circle>
</svg>