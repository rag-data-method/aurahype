<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="g1" gradientTransform="rotate(45)" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF0055" />
      <stop offset="100%" stop-color="#FF8800" />
    </linearGradient>
    <linearGradient id="g2" gradientTransform="rotate(135)" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#2979FF" />
    </linearGradient>
    <linearGradient id="g3" gradientTransform="rotate(90)" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#76FF03" />
      <stop offset="100%" stop-color="#00E676" />
    </linearGradient>
    <linearGradient id="g4" gradientTransform="rotate(-45)" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AA00FF" />
      <stop offset="100%" stop-color="#D500F9" />
    </linearGradient>
    <linearGradient id="g5" gradientTransform="rotate(15)" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE600" />
      <stop offset="100%" stop-color="#FF9100" />
    </linearGradient>
    <linearGradient id="g6" gradientTransform="rotate(70)" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF4081" />
      <stop offset="100%" stop-color="#F50057" />
    </linearGradient>
    <linearGradient id="g7" gradientTransform="rotate(-20)" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00BFA5" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>
    <linearGradient id="g8" gradientTransform="rotate(110)" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFF00" />
      <stop offset="100%" stop-color="#FFEA00" />
    </linearGradient>

    <clipPath id="clip1">
      <rect x="-90" y="-60" width="180" height="120" rx="8" />
    </clipPath>
    <clipPath id="clip2">
      <rect x="-70" y="-110" width="140" height="220" rx="8" />
    </clipPath>
    <clipPath id="clip3">
      <rect x="-115" y="-65" width="230" height="130" rx="8" />
    </clipPath>

    <!-- Screen Assets -->
    <g id="screen1">
      <rect x="-90" y="-60" width="180" height="120" rx="8" fill="#111" stroke="#FFF" stroke-width="4" filter="url(#glow1)" />
      <rect x="-90" y="-60" width="180" height="120" rx="8" fill="url(#g1)" opacity="0.9" />
      <rect x="-50" y="-20" width="30" height="40" fill="#FFF" opacity="0.3" />
      <rect x="-10" y="-40" width="60" height="20" fill="#FFF" opacity="0.8" />
      <circle cx="40" cy="20" r="15" fill="#FFF" />
      <g clip-path="url(#clip1)">
        <rect x="-90" y="40" width="180" height="30" fill="#FFF" opacity="0.9">
          <animate attributeName="x" values="-180;90" dur="1.2s" repeatCount="indefinite" />
        </rect>
        <rect x="50" y="-20" width="20" height="140" fill="#FFF" opacity="0.6">
          <animate attributeName="y" values="-140;60" dur="0.8s" repeatCount="indefinite" begin="0.4s" />
        </rect>
      </g>
    </g>

    <g id="screen2">
      <rect x="-70" y="-110" width="140" height="220" rx="8" fill="#111" stroke="#FFF" stroke-width="4" filter="url(#glow1)" />
      <rect x="-70" y="-110" width="140" height="220" rx="8" fill="url(#g2)" opacity="0.9" />
      <polygon points="-20,-50 20,-80 20,-20" fill="#FFF" opacity="0.9" />
      <rect x="-40" y="40" width="80" height="10" fill="#FFF" rx="5" />
      <rect x="-40" y="60" width="50" height="10" fill="#FFF" rx="5" />
      <g clip-path="url(#clip2)">
        <rect x="-70" y="-110" width="140" height="40" fill="#FFF" opacity="0.8">
          <animate attributeName="y" values="-110;220" dur="2s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>

    <g id="screen3">
      <rect x="-115" y="-65" width="230" height="130" rx="8" fill="#111" stroke="#FFF" stroke-width="4" filter="url(#glow1)" />
      <rect x="-115" y="-65" width="230" height="130" rx="8" fill="url(#g3)" opacity="0.9" />
      <circle cx="-50" cy="0" r="30" fill="none" stroke="#FFF" stroke-width="6" />
      <circle cx="-50" cy="0" r="15" fill="#FFF" />
      <rect x="30" y="-20" width="60" height="10" fill="#FFF" opacity="0.6" />
      <rect x="30" y="0" width="40" height="10" fill="#FFF" opacity="0.6" />
      <g clip-path="url(#clip3)">
        <circle cx="0" cy="0" r="50" fill="none" stroke="#FFF" stroke-width="8">
          <animate attributeName="r" values="0;150" dur="1.5s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="1;0" dur="1.5s" repeatCount="indefinite" />
        </circle>
      </g>
    </g>

    <g id="screen4">
      <rect x="-85" y="-50" width="170" height="100" rx="8" fill="#111" stroke="#FFF" stroke-width="4" filter="url(#glow1)" />
      <rect x="-85" y="-50" width="170" height="100" rx="8" fill="url(#g4)" opacity="0.9" />
      <path d="M-50,-10 L-30,-30 L-10,-10 L30,30" fill="none" stroke="#FFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M10,-30 L30,-10 L50,-30" fill="none" stroke="#FFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="60" cy="-20" r="4" fill="#FFF">
        <animate attributeName="opacity" values="0;1;0" dur="0.6s" repeatCount="indefinite" />
      </circle>
    </g>

    <g id="screen5">
      <rect x="-60" y="-85" width="120" height="170" rx="8" fill="#111" stroke="#FFF" stroke-width="4" filter="url(#glow1)" />
      <rect x="-60" y="-85" width="120" height="170" rx="8" fill="url(#g5)" opacity="0.9" />
      <rect x="-20" y="-40" width="40" height="40" rx="20" fill="#FFF" />
      <path d="M-20,20 L-20,60 L20,60 L20,20 Z" fill="#FFF" />
      <path d="M-40,60 L40,60" stroke="#FFF" stroke-width="8" stroke-linecap="round" />
    </g>

    <g id="screen6">
      <rect x="-100" y="-60" width="200" height="120" rx="8" fill="#111" stroke="#FFF" stroke-width="4" filter="url(#glow1)" />
      <rect x="-100" y="-60" width="200" height="120" rx="8" fill="url(#g6)" opacity="0.9" />
      <g stroke="#FFF" stroke-width="4" opacity="0.8">
        <line x1="-80" y1="-30" x2="-40" y2="-30" />
        <line x1="-80" y1="-10" x2="-20" y2="-10" />
        <line x1="-80" y1="10" x2="-50" y2="10" />
        <line x1="-80" y1="30" x2="-30" y2="30" />
      </g>
      <rect x="20" y="-40" width="60" height="80" fill="#FFF" opacity="0.9" />
    </g>

    <g id="screen7">
      <rect x="-75" y="-55" width="150" height="110" rx="8" fill="#111" stroke="#FFF" stroke-width="4" filter="url(#glow1)" />
      <rect x="-75" y="-55" width="150" height="110" rx="8" fill="url(#g7)" opacity="0.9" />
      <path d="M-40,-15 L-10,-35 L20,-15 L50,-45" fill="none" stroke="#FFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M-40,15 L-10,35 L20,15 L50,45" fill="none" stroke="#FFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <g id="screen8">
      <rect x="-65" y="-90" width="130" height="180" rx="8" fill="#111" stroke="#FFF" stroke-width="4" filter="url(#glow1)" />
      <rect x="-65" y="-90" width="130" height="180" rx="8" fill="url(#g8)" opacity="0.9" />
      <rect x="-45" y="-70" width="90" height="50" rx="5" fill="#FFF" opacity="0.9" />
      <rect x="-45" y="-10" width="90" height="10" fill="#FFF" opacity="0.6" />
      <rect x="-45" y="10" width="50" height="10" fill="#FFF" opacity="0.6" />
    </g>

    <!-- Abstract shapes for mosaic hint -->
    <g id="chat1">
      <rect x="-40" y="-15" width="80" height="30" rx="15" fill="#FFF" opacity="0.8" />
      <circle cx="-30" cy="20" r="5" fill="#FFF" />
      <circle cx="-15" cy="25" r="8" fill="#FFF" />
    </g>
    <g id="chat2">
      <rect x="-30" y="-20" width="60" height="40" rx="20" fill="#FFF" opacity="0.8" />
      <circle cx="10" cy="30" r="6" fill="#FFF" />
      <circle cx="25" cy="20" r="4" fill="#FFF" />
    </g>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#050505" />

  <!-- Dynamic floating halo blobs -->
  <circle cx="200" cy="150" r="100" fill="#FF0055" opacity="0.2" filter="url(#glow2)">
    <animate attributeName="r" values="100;140;100" dur="4s" repeatCount="indefinite" />
    <animate attributeName="cx" values="200;220;200" dur="6s" repeatCount="indefinite" />
  </circle>
  <circle cx="600" cy="450" r="120" fill="#00E5FF" opacity="0.2" filter="url(#glow2)">
    <animate attributeName="r" values="120;160;120" dur="5s" repeatCount="indefinite" />
    <animate attributeName="cy" values="450;420;450" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="400" cy="300" r="80" fill="#76FF03" opacity="0.15" filter="url(#glow2)">
    <animate attributeName="r" values="80;120;80" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Mosaic of Screens -->
  <g id="mosaicGroup" transform="translate(400, 300)">
    <!-- Screen 1 -->
    <g transform="translate(-220, -140) rotate(-15)">
      <use href="#screen1" />
      <animateTransform attributeName="transform" type="rotate" values="-15 -220 -140; 15 -220 -140; -15 -220 -140" dur="6s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- Screen 2 -->
    <g transform="translate(0, -170) rotate(5)">
      <use href="#screen2" />
      <animateTransform attributeName="transform" type="rotate" values="5 0 -170; -5 0 -170; 5 0 -170" dur="7s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- Screen 3 -->
    <g transform="translate(230, -130) rotate(20)">
      <use href="#screen3" />
      <animateTransform attributeName="transform" type="rotate" values="20 230 -130; -10 230 -130; 20 230 -130" dur="5s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- Screen 4 -->
    <g transform="translate(-180, 20) rotate(35)">
      <use href="#screen4" />
      <animateTransform attributeName="transform" type="rotate" values="35 -180 20; 15 -180 20; 35 -180 20" dur="8s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- Screen 5 -->
    <g transform="translate(180, 40) rotate(-25)">
      <use href="#screen5" />
      <animateTransform attributeName="transform" type="rotate" values="-25 180 40; 5 180 40; -25 180 40" dur="6s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- Screen 6 -->
    <g transform="translate(-250, 160) rotate(-8)">
      <use href="#screen6" />
      <animateTransform attributeName="transform" type="rotate" values="-8 -250 160; 12 -250 160; -8 -250 160" dur="9s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- Screen 7 -->
    <g transform="translate(0, 180) rotate(12)">
      <use href="#screen7" />
      <animateTransform attributeName="transform" type="rotate" values="12 0 180; -8 0 180; 12 0 180" dur="7s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- Screen 8 -->
    <g transform="translate(240, 150) rotate(-35)">
      <use href="#screen8" />
      <animateTransform attributeName="transform" type="rotate" values="-35 240 150; 5 240 150; -35 240 150" dur="5s" repeatCount="indefinite" additive="sum" />
    </g>
  </g>

  <!-- Floating Chat Bubbles (Streaming Vibe) -->
  <use href="#chat1" transform="translate(150, 100) scale(0.8)">
    <animateTransform attributeName="transform" type="translate" values="150 100; 160 80; 150 100" dur="3s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" values="0.8;1.2;0.8" dur="3s" repeatCount="indefinite" additive="sum" />
  </use>
  <use href="#chat2" transform="translate(650, 120) scale(1)">
    <animateTransform attributeName="transform" type="translate" values="650 120; 640 100; 650 120" dur="4s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite" begin="1s" />
    <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="4s" repeatCount="indefinite" additive="sum" />
  </use>
  <use href="#chat1" transform="translate(700, 450) scale(1.2) rotate(20)">
    <animateTransform attributeName="transform" type="translate" values="700 450; 720 430; 700 450" dur="5s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite" begin="2s" />
  </use>
  <use href="#chat2" transform="translate(120, 480) scale(0.9) rotate(-15)">
    <animateTransform attributeName="transform" type="translate" values="120 480; 100 460; 120 480" dur="3.5s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity" values="0;0.8;0" dur="3.5s" repeatCount="indefinite" begin="0.5s" />
  </use>

  <!-- Confetti / Energy Particles -->
  <g fill="#FFF" opacity="0.8">
    <!-- Particle 1 -->
    <rect x="50" y="50" width="12" height="12" fill="#FF0055">
      <animateTransform attributeName="transform" type="translate" values="0 0; -20 -100; 0 0" dur="3s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0 50 50; 360 50 50" dur="3s" repeatCount="indefinite" additive="sum" />
      <animateTransform attributeName="transform" type="scale" values="1;0;1" dur="3s" repeatCount="indefinite" additive="sum" />
    </rect>
    <!-- Particle 2 -->
    <circle cx="750" cy="80" r="8" fill="#00E5FF">
      <animateTransform attributeName="transform" type="translate" values="0 0; 30 -120; 0 0" dur="4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1;0;1" dur="4s" repeatCount="indefinite" additive="sum" />
    </circle>
    <!-- Particle 3 -->
    <rect x="400" y="50" width="10" height="20" fill="#76FF03" transform="rotate(45 400 50)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -80; 0 0" dur="2.5s" repeatCount="indefinite" additive="sum" />
      <animateTransform attributeName="transform" type="rotate" values="45 400 50; 405 400 50" dur="2.5s" repeatCount="indefinite" additive="sum" />
    </rect>
    <!-- Particle 4 -->
    <polygon points="80,550 90,530 100,550" fill="#FFFF00">
      <animateTransform attributeName="transform" type="translate" values="0 0; -40 50; 0 0" dur="3.5s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1;0;1" dur="3.5s" repeatCount="indefinite" additive="sum" />
    </polygon>
    <!-- Particle 5 -->
    <circle cx="700" cy="500" r="10" fill="#D500F9">
      <animateTransform attributeName="transform" type="translate" values="0 0; 50 30; 0 0" dur="5s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1;0;1" dur="5s" repeatCount="indefinite" additive="sum" />
    </circle>
    <!-- Particle 6 -->
    <rect x="300" y="550" width="15" height="15" fill="#FF4081">
      <animateTransform attributeName="transform" type="translate" values="0 0; -60 20; 0 0" dur="4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0 300 550; 360 300 550" dur="4s" repeatCount="indefinite" additive="sum" />
    </rect>
  </g>

  <!-- Fast moving horizontal bars for "Live" Energy -->
  <g stroke="#FFF" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="-100" y1="50" x2="0" y2="50" stroke="#FF0055">
      <animate attributeName="x1" values="-100;900" dur="2s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0;1000" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="800" y1="550" x2="900" y2="550" stroke="#00E5FF">
      <animate attributeName="x1" values="800;-200" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="900;-100" dur="2.5s" repeatCount="indefinite" />
    </line>
    <line x1="-100" y1="200" x2="50" y2="200" stroke="#76FF03">
      <animate attributeName="x1" values="-100;900" dur="3s" repeatCount="indefinite" begin="0.5s" />
      <animate attributeName="x2" values="50;1050" dur="3s" repeatCount="indefinite" begin="0.5s" />
    </line>
    <line x1="800" y1="400" x2="950" y2="400" stroke="#FFFF00">
      <animate attributeName="x1" values="800;-200" dur="1.8s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="x2" values="950;-50" dur="1.8s" repeatCount="indefinite" begin="1s" />
    </line>
  </g>

  <!-- Flashing geometric overlays -->
  <polygon points="400,50 450,100 400,150 350,100" fill="none" stroke="#FFF" stroke-width="3" opacity="0.4">
    <animateTransform attributeName="transform" type="scale" values="1;1.5;1" dur="2s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite" />
  </polygon>
  <rect x="100" y="450" width="50" height="50" fill="none" stroke="#FFF" stroke-width="3" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" values="0 125 475; 90 125 475; 0 125 475" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite" />
  </rect>
  <circle cx="650" cy="250" r="20" fill="none" stroke="#FFF" stroke-width="3" opacity="0.4">
    <animate attributeName="r" values="20;60;20" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite" />
  </circle>

  <!-- Final strong glow pulse at center -->
  <circle cx="400" cy="300" r="150" fill="#FF0055" opacity="0.1" filter="url(#glow2)">
    <animate attributeName="r" values="150;180;150" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>