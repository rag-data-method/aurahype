<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="b20"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="b60"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="b90"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="b120"><feGaussianBlur stdDeviation="120"/></filter>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D1A4F" stop-opacity="0.5">
        <animate attributeName="stop-color" values="#3D1A4F;#2a1040;#3D1A4F" dur="20s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1A0A1F" stop-opacity="1">
        <animate attributeName="stop-color" values="#1A0A1F;#0f0415;#1A0A1F" dur="20s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0A1F" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3D1A4F" stop-opacity="0.25">
        <animate attributeName="stop-color" values="#3D1A4F;#2a1240;#3D1A4F" dur="18s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="1"/>
      <stop offset="12%" stop-color="#F5C97A" stop-opacity="0.7"/>
      <stop offset="35%" stop-color="#1A0A1F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1A0A1F" stop-opacity="1"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="40%" r="75%">
      <stop offset="40%" stop-color="#1A0A1F" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1A0A1F" stop-opacity="0.75"/>
    </radialGradient>

    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F5C97A" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.3;0" dur="14s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- base atmosphere -->
  <rect width="1600" height="900" fill="#1A0A1F"/>
  <rect width="1600" height="900" fill="url(#sky)" opacity="0.8"/>

  <!-- distant cathedral arches / columns -->
  <path d="M200,0 Q800,280 1400,0" fill="none" stroke="#3D1A4F" stroke-width="120" opacity="0.1" filter="url(#b120)"/>
  <rect x="250" y="0" width="70" height="900" fill="#3D1A4F" opacity="0.12" filter="url(#b120)"/>
  <rect x="950" y="0" width="90" height="900" fill="#3D1A4F" opacity="0.08" filter="url(#b90)"/>

  <!-- floor plane -->
  <rect x="0" y="650" width="1600" height="250" fill="url(#floor)"/>

  <!-- volumetric light beams -->
  <path d="M80,0 L300,0 L2000,900 L1200,900 Z" fill="#FFE082" opacity="0.06" filter="url(#b120)">
    <animate attributeName="opacity" values="0.06;0.1;0.06" dur="16s" repeatCount="indefinite"/>
  </path>
  <path d="M120,0 L240,0 L1800,900 L1400,900 Z" fill="#FFE082" opacity="0.09" filter="url(#b90)">
    <animate attributeName="opacity" values="0.09;0.13;0.09" dur="13s" repeatCount="indefinite"/>
  </path>
  <path d="M150,0 L210,0 L1750,900 L1600,900 Z" fill="url(#ray)" opacity="0.14" filter="url(#b60)">
    <animate attributeName="opacity" values="0.14;0.2;0.14" dur="11s" repeatCount="indefinite"/>
  </path>

  <!-- shadow mask deepening right/corners -->
  <path d="M900,0 L1600,0 L1600,900 L1400,900 Z" fill="#1A0A1F" opacity="0.45" filter="url(#b90)"/>

  <!-- throne silhouette with subtle levitation -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,0" dur="12s" repeatCount="indefinite"/>
    <path fill="url(#rim)" d="M1175,700 L1175,680 L1185,670 L1185,590 L1155,570 L1155,545 L1185,525 L1185,410 C1185,370 1195,340 1200,340 C1205,340 1215,370 1215,410 L1215,525 L1245,545 L1245,570 L1215,590 L1215,670 L1225,680 L1225,700 L1210,700 L1210,680 L1190,680 L1190,700 Z"/>
  </g>

  <!-- throne base haze -->
  <ellipse cx="1200" cy="730" rx="220" ry="70" fill="#1A0A1F" opacity="0.55" filter="url(#b60)">
    <animate attributeName="opacity" values="0.55;0.7;0.55" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- dust particles drifting through light -->
  <circle r="1.5" fill="#FFE082" opacity="0">
    <animateMotion path="M120,0 q400,300 1300,750" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.5;0" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;2.5;1.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#FFE082" opacity="0">
    <animateMotion path="M160,0 q200,500 1200,800" dur="19s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.3;0" dur="19s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#FFE082" opacity="0">
    <animateMotion path="M200,0 q500,200 1400,700" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.9;0" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;2;1.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#FFE082" opacity="0">
    <animateMotion path="M140,0 q300,400 1250,850" dur="21s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.9;0" dur="21s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#FFE082" opacity="0">
    <animateMotion path="M180,0 q600,300 1350,780" dur="17s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0.4;0" dur="17s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;2.5;1.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#FFE082" opacity="0">
    <animateMotion path="M100,0 q350,450 1100,820" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.6;0" dur="15s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#FFE082" opacity="0">
    <animateMotion path="M220,0 q450,350 1450,720" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.75;0.3;0" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;2;1.5" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#FFE082" opacity="0">
    <animateMotion path="M80,0 q250,550 1050,880" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.5;0" dur="13s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#FFE082" opacity="0">
    <animateMotion path="M240,0 q550,250 1500,680" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.7;0" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;2.5;1.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#FFE082" opacity="0">
    <animateMotion path="M130,0 q380,480 1280,810" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0.5;0" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- near-field haze -->
  <rect x="0" y="750" width="1600" height="150" fill="#1A0A1F" opacity="0.35" filter="url(#b90)"/>

  <!-- vignette / final atmosphere -->
  <rect width="1600" height="900" fill="url(#vignette)" opacity="0.65"/>
</svg>