<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEEC2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E89BB0" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkleBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="petalShadow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF5F0"/>
  
  <g transform="translate(800, 480)">
    <path d="M0,130 Q8,280 0,420" stroke="#9CAF88" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.9">
      <animate attributeName="d" values="M0,130 Q8,280 0,420;M0,130 Q-10,280 0,420;M0,130 Q8,280 0,420" keyTimes="0;0.5;1" dur="6s" repeatCount="indefinite"/>
    </path>
    
    <g opacity="0.9">
      <path d="M2,280 Q-50,250 -80,290 Q-40,320 2,280" fill="#9CAF88" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" values="0 0 280; -6 0 280; 0 0 280" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M-2,320 Q50,290 80,330 Q40,360 -2,320" fill="#9CAF88" opacity="0.85">
        <animateTransform attributeName="transform" type="rotate" values="0 0 320; 5 0 320; 0 0 320" dur="5s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;0;3;-3;0;0" keyTimes="0;0.5;0.66;0.83;0.95;1" dur="12s" repeatCount="indefinite"/>
      
      <g transform="rotate(0)">
        <path d="M0,0 C-28,-60 -40,-105 0,-145 C40,-105 28,-60 0,0" fill="#E89BB0" opacity="0.9" filter="url(#petalShadow)">
          <animateTransform attributeName="transform" type="scale" values="0.15;1;1;1;0.15" keyTimes="0;0.25;0.5;0.83;1" dur="12s" repeatCount="indefinite"/>
        </path>
      </g>
      
      <g transform="rotate(72)">
        <path d="M0,0 C-28,-60 -40,-105 0,-145 C40,-105 28,-60 0,0" fill="#E89BB0" opacity="0.85">
          <animateTransform attributeName="transform" type="scale" values="0.15;0.15;1;1;1;0.15" keyTimes="0;0.04;0.29;0.5;0.83;1" dur="12s" repeatCount="indefinite"/>
        </path>
      </g>
      
      <g transform="rotate(144)">
        <path d="M0,0 C-28,-60 -40,-105 0,-145 C40,-105 28,-60 0,0" fill="#E89BB0" opacity="0.9">
          <animateTransform attributeName="transform" type="scale" values="0.15;0.15;1;1;1;0.15" keyTimes="0;0.08;0.33;0.5;0.83;1" dur="12s" repeatCount="indefinite"/>
        </path>
      </g>
      
      <g transform="rotate(216)">
        <path d="M0,0 C-28,-60 -40,-105 0,-145 C40,-105 28,-60 0,0" fill="#E89BB0" opacity="0.85">
          <animateTransform attributeName="transform" type="scale" values="0.15;0.15;1;1;1;0.15" keyTimes="0;0.12;0.37;0.5;0.83;1" dur="12s" repeatCount="indefinite"/>
        </path>
      </g>
      
      <g transform="rotate(288)">
        <path d="M0,0 C-28,-60 -40,-105 0,-145 C40,-105 28,-60 0,0" fill="#E89BB0" opacity="0.9">
          <animateTransform attributeName="transform" type="scale" values="0.15;0.15;1;1;1;0.15" keyTimes="0;0.16;0.41;0.5;0.83;1" dur="12s" repeatCount="indefinite"/>
        </path>
      </g>
      
      <circle r="28" fill="url(#centerGrad)" filter="url(#softGlow)">
        <animateTransform attributeName="transform" type="scale" values="0.3;0.3;1.15;1;1;0.3" keyTimes="0;0.25;0.45;0.5;0.83;1" dur="12s" repeatCount="indefinite"/>
      </circle>
      
      <g>
        <circle cx="-50" cy="-90" r="5" fill="#FFEEC2" opacity="0" filter="url(#sparkleBlur)">
          <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.15;0.35;0.5;1" dur="12s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="0;0;1;0;0" keyTimes="0;0.15;0.35;0.5;1" dur="12s" repeatCount="indefinite"/>
        </circle>
        <circle cx="60" cy="-70" r="4" fill="#FFEEC2" opacity="0">
          <animate attributeName="opacity" values="0;0;0.8;0;0" keyTimes="0;0.2;0.4;0.55;1" dur="12s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="0;0;1.2;0;0" keyTimes="0;0.2;0.4;0.55;1" dur="12s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-30" cy="-150" r="6" fill="#FFEEC2" opacity="0" filter="url(#sparkleBlur)">
          <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.25;0.4;0.55;1" dur="12s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="-120" r="3" fill="#FFEEC2" opacity="0">
          <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.3;0.45;0.6;1" dur="12s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>
</svg>