<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF0055"/>
      <stop offset="100%" stop-color="#00AAFF"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FF99"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <linearGradient id="g3" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AA00FF"/>
      <stop offset="100%" stop-color="#FF0055"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strong-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur1"/>
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <clipPath id="clip">
      <rect x="280" y="160" width="240" height="240" />
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="#0a0e17"/>
  
  <circle cx="400" cy="300" r="250" fill="none" stroke="#130b20" stroke-width="2" stroke-dasharray="10 15" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="60s" repeatCount="indefinite"/>
  </circle>

  <circle cx="400" cy="300" r="180" fill="none" stroke="#1a0f2e" stroke-width="1">
    <animate attributeName="r" values="180;200;180" dur="4s" repeatCount="indefinite"/>
  </circle>

  <g stroke-width="2" stroke-linecap="round">
    <line x1="400" y1="300" x2="400" y2="120" stroke="#FF0055" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="300;60" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="400" y2="120" stroke="#00FF99" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="-0.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="300;60" dur="1.5s" begin="-0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="400" y2="120" stroke="#AA00FF" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="-1.0s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="300;60" dur="1.5s" begin="-1.0s" repeatCount="indefinite"/>
    </line>

    <line x1="400" y1="300" x2="680" y2="300" stroke="#00AAFF" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="-0.2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="400;740" dur="1.5s" begin="-0.2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="680" y2="300" stroke="#FFCC00" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="-0.7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="400;740" dur="1.5s" begin="-0.7s" repeatCount="indefinite"/>
    </line>

    <line x1="400" y1="300" x2="120" y2="300" stroke="#FF0055" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="-0.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="400;60" dur="1.5s" begin="-0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="120" y2="300" stroke="#00FF99" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="-0.9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="400;60" dur="1.5s" begin="-0.9s" repeatCount="indefinite"/>
    </line>

    <line x1="400" y1="300" x2="400" y2="480" stroke="#AA00FF" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="-0.3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="300;540" dur="1.5s" begin="-0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="400" y2="480" stroke="#FFCC00" opacity="0.4">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="-0.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="300;540" dur="1.5s" begin="-0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <g id="pulse-circles">
    <circle cx="400" cy="300" r="50" fill="none" stroke="#00FF99" stroke-width="3" filter="url(#glow)">
      <animate attributeName="r" values="50;180" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="50" fill="none" stroke="#FF0055" stroke-width="3" filter="url(#glow)">
      <animate attributeName="r" values="50;180" dur="2s" begin="-0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" begin="-0.6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="3;1" dur="2s" begin="-0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="50" fill="none" stroke="#00AAFF" stroke-width="3" filter="url(#glow)">
      <animate attributeName="r" values="50;180" dur="2s" begin="-1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" begin="-1.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="3;1" dur="2s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <polygon points="400,150 410,170 430,170 415,185 420,205 400,195 380,205 385,185 370,170 390,170" fill="#FFCC00" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 400 185;360 400 185" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </polygon>
  
  <polygon points="400,420 410,440 430,440 415,455 420,475 400,465 380,475 385,455 370,440 390,440" fill="#FF0055" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 400 457.5;-360 400 457.5" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2.5s" repeatCount="indefinite"/>
  </polygon>

  <polygon points="260,300 270,320 290,320 275,335 280,355 260,345 240,355 245,335 230,320 250,320" fill="#00FF99" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 260 337.5;360 260 337.5" dur="3s" repeatCount="indefinite"/>
  </polygon>
  
  <polygon points="540,300 550,320 570,320 555,335 560,355 540,345 520,355 525,335 510,320 530,320" fill="#00AAFF" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 540 337.5;-360 540 337.5" dur="3.5s" repeatCount="indefinite"/>
  </polygon>

  <g filter="url(#glow)">
    <circle cx="200" cy="150" r="4" fill="#00FF99">
      <animate attributeName="cy" values="150;130;150" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="450" r="3" fill="#FF0055">
      <animate attributeName="cy" values="450;470;450" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="200" r="5" fill="#FFCC00">
      <animate attributeName="cx" values="700;720;700" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="400" r="6" fill="#00AAFF">
      <animate attributeName="cx" values="100;80;100" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="100" r="3" fill="#AA00FF">
      <animate attributeName="r" values="3;8;3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="500" r="4" fill="#FF0055">
      <animate attributeName="r" values="4;10;4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g stroke-width="4" stroke-linecap="round">
    <path d="M 120 120 L 160 160" stroke="#FF0055" fill="none">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 680 120 L 640 160" stroke="#00FF99" fill="none">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 120 480 L 160 440" stroke="#00AAFF" fill="none">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 680 480 L 640 440" stroke="#FFCC00" fill="none">
      <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <g id="headphones">
    <path d="M 280 300 Q 280 140 400 140 Q 520 140 520 300" fill="none" stroke="url(#g1)" stroke-width="24" stroke-linecap="round" filter="url(#glow)"/>
    
    <path d="M 280 300 Q 280 140 400 140 Q 520 140 520 300" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

    <rect x="240" y="260" width="80" height="140" rx="20" fill="url(#g2)" stroke="#ffffff" stroke-width="4" filter="url(#glow)"/>
    <rect x="480" y="260" width="80" height="140" rx="20" fill="url(#g2)" stroke="#ffffff" stroke-width="4" filter="url(#glow)"/>

    <line x1="260" y1="290" x2="300" y2="290" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="260" y1="305" x2="300" y2="305" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="260" y1="320" x2="300" y2="320" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

    <line x1="500" y1="290" x2="540" y2="290" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="500" y1="305" x2="540" y2="305" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="500" y1="320" x2="540" y2="320" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

    <polygon points="240,400 220,430 260,430" fill="url(#g3)" stroke="#ffffff" stroke-width="3" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="560,400 580,430 540,430" fill="url(#g3)" stroke="#ffffff" stroke-width="3" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" dur="0.5s" begin="-0.25s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g id="soundwaves" filter="url(#strong-glow)">
    <rect x="310" y="240" width="12" height="120" rx="6" fill="#FF0055">
      <animate attributeName="height" values="20;120;20" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="290;240;290" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="330" y="200" width="12" height="200" rx="6" fill="#00FF99">
      <animate attributeName="height" values="80;200;80" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="260;200;260" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="350" y="160" width="12" height="280" rx="6" fill="#00AAFF">
      <animate attributeName="height" values="160;280;160" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="220;160;220" dur="1.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="370" y="240" width="12" height="120" rx="6" fill="#FFCC00">
      <animate attributeName="height" values="40;120;40" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="280;240;280" dur="0.7s" repeatCount="indefinite"/>
    </rect>

    <rect x="418" y="240" width="12" height="120" rx="6" fill="#FFCC00">
      <animate attributeName="height" values="40;120;40" dur="0.7s" begin="-0.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="280;240;280" dur="0.7s" begin="-0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="438" y="160" width="12" height="280" rx="6" fill="#00AAFF">
      <animate attributeName="height" values="160;280;160" dur="1.0s" begin="-0.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="220;160;220" dur="1.0s" begin="-0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="458" y="200" width="12" height="200" rx="6" fill="#00FF99">
      <animate attributeName="height" values="80;200;80" dur="0.9s" begin="-0.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="260;200;260" dur="0.9s" begin="-0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="478" y="240" width="12" height="120" rx="6" fill="#FF0055">
      <animate attributeName="height" values="20;120;20" dur="0.8s" begin="-0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="290;240;290" dur="0.8s" begin="-0.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g>
    <path d="M 295 300 L 305 300" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d" values="M 295 300 L 305 300; M 290 250 L 310 350; M 295 300 L 305 300" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 315 300 L 325 300" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d" values="M 315 300 L 325 300; M 310 200 L 330 400; M 315 300 L 325 300" dur="0.9s" repeatCount="indefinite"/>
    </path>
    <path d="M 335 300 L 345 300" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d" values="M 335 300 L 345 300; M 330 150 L 350 450; M 335 300 L 345 300" dur="1.0s" repeatCount="indefinite"/>
    </path>
    <path d="M 355 300 L 365 300" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d" values="M 355 300 L 365 300; M 350 250 L 370 350; M 355 300 L 365 300" dur="0.7s" repeatCount="indefinite"/>
    </path>

    <path d="M 415 300 L 425 300" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d" values="M 415 300 L 425 300; M 410 250 L 430 350; M 415 300 L 425 300" dur="0.7s" begin="-0.3s" repeatCount="indefinite"/>
    </path>
    <path d="M 435 300 L 445 300" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d" values="M 435 300 L 445 300; M 430 150 L 450 450; M 435 300 L 445 300" dur="1.0s" begin="-0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 455 300 L 465 300" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d" values="M 455 300 L 465 300; M 450 200 L 470 400; M 455 300 L 465 300" dur="0.9s" begin="-0.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 475 300 L 485 300" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d" values="M 475 300 L 485 300; M 470 250 L 490 350; M 475 300 L 485 300" dur="0.8s" begin="-0.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <g clip-path="url(#clip)">
    <text x="400" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="120" letter-spacing="10" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15">ON AIR</text>
  </g>

  <circle cx="400" cy="300" r="45" fill="#0a0e17" opacity="0.8"/>
  <circle cx="400" cy="300" r="40" stroke="#FFCC00" stroke-width="3" fill="none" filter="url(#glow)">
    <animate attributeName="r" values="40;42;40" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="35" stroke="#FF0055" stroke-width="2" fill="none" filter="url(#glow)">
    <animate attributeName="r" values="35;37;35" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="30" stroke="#00FF99" stroke-width="2" fill="none" filter="url(#glow)">
    <animate attributeName="r" values="30;32;30" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="25" stroke="#00AAFF" stroke-width="2" fill="none" filter="url(#glow)">
    <animate attributeName="r" values="25;27;25" dur="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="20" stroke="#AA00FF" stroke-width="2" fill="none" filter="url(#glow)">
    <animate attributeName="r" values="20;22;20" dur="0.9s" repeatCount="indefinite"/>
  </circle>

  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="24" fill="#ffffff" filter="url(#glow)">LIVE</text>
</svg>