<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- FILTERS -->
    <filter id="b40" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="b80" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="b120" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="b160" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="160"/></filter>

    <!-- DEPTH GLOW FILTER for subject -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- GRADIENTS -->
    <!-- Sky: dual temp, warm horizon vs cool zenith -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8FA8">
        <animate attributeName="stop-color" values="#5A8FA8;#6B8E5C;#5A8FA8" dur="25s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#8FBCD4">
        <animate attributeName="stop-color" values="#8FBCD4;#F5C97A;#8FBCD4" dur="25s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFF8E0">
        <animate attributeName="stop-color" values="#FFF8E0;#FFEAA7;#FFF8E0" dur="25s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E0"/>
      <stop offset="60%" stop-color="#F5C97A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5C97A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FB678"/>
      <stop offset="100%" stop-color="#3A5E2B"/>
    </linearGradient>

    <!-- CLOUD SYMBOLS -->
    <symbol id="cloud1" viewBox="0 0 400 150">
      <path d="M 30 100 Q 10 80 40 60 Q 60 20 110 40 Q 150 10 200 40 Q 260 20 290 60 Q 340 40 360 80 Q 390 90 370 110 Q 350 130 300 120 Q 250 140 200 120 Q 140 130 90 110 Q 40 120 30 100 Z" fill="#FFF8E0" opacity="0.85"/>
    </symbol>
    <symbol id="cloud2" viewBox="0 0 300 100">
      <path d="M 20 70 Q 5 50 30 35 Q 50 10 90 25 Q 130 5 170 25 Q 220 10 250 40 Q 280 50 260 70 Q 240 85 200 75 Q 150 90 100 75 Q 50 85 20 70 Z" fill="#FFF8E0" opacity="0.75"/>
    </symbol>
    <symbol id="cloud3" viewBox="0 0 500 180">
      <path d="M 40 120 Q 15 95 50 75 Q 75 30 140 50 Q 190 15 250 45 Q 320 20 360 65 Q 420 45 450 90 Q 485 105 460 130 Q 435 150 370 140 Q 310 160 250 135 Q 180 155 110 130 Q 50 145 40 120 Z" fill="#FFFFFF" opacity="0.9"/>
    </symbol>

    <!-- GLIDER SUBJECT -->
    <g id="glider">
      <!-- Lines -->
      <line x1="0" y1="0" x2="-15" y2="35" stroke="#2F2F2F" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="15" y2="35" stroke="#2F2F2F" stroke-width="1.5"/>
      <!-- Pilot body silhouette -->
      <path d="M -5 35 Q 0 45 5 35 Q 8 25 2 28 Q -2 28 -5 35 Z" fill="#2F2F2F"/>
      <!-- Canopy arch -->
      <path d="M -40 -10 Q 0 -35 40 -10" stroke="#2F2F2F" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Inner canopy structure -->
      <path d="M -25 -20 Q 0 -38 25 -20" stroke="#2F2F2F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- TREE SILHOUETTE -->
    <symbol id="tree" viewBox="0 0 200 300">
      <!-- Canopy -->
      <path d="M 100 20 C 140 20, 170 60, 160 100 C 190 110, 200 150, 180 180 C 190 210, 160 240, 120 250 C 140 280, 100 300, 100 300 C 100 300, 60 280, 80 250 C 40 240, 10 210, 20 180 C 0 150, 10 110, 40 100 C 30 60, 60 20, 100 20 Z" fill="#2C4620"/>
      <!-- Trunk -->
      <path d="M 95 250 Q 90 320 85 400 L 115 400 Q 110 320 105 250 Z" fill="#1E3315"/>
    </symbol>
  </defs>

  <!-- 1. BACKGROUND SKY -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#skyGrad)"/>

  <!-- 2. DISTANT SUN / LIGHT SOURCE -->
  <g id="sunGroup">
    <circle cx="250" cy="200" r="180" fill="url(#sunGrad)">
      <animate attributeName="r" values="180;200;180" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="200" r="90" fill="#FFF8E0" opacity="0.4">
      <animate attributeName="r" values="90;100;90" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="200" r="40" fill="#FFF8E0" opacity="0.8">
      <animate attributeName="r" values="40;45;40" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 3. ATMOSPHERIC FOG LAYER (Background depth) -->
  <rect x="0" y="400" width="1600" height="500" fill="#FFF8E0" opacity="0.3" filter="url(#b160)">
    <animate attributeName="opacity" values="0.3;0.4;0.3" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- 4. BACKGROUND CLOUDS (Blurred, far away) -->
  <g filter="url(#b80)" opacity="0.6">
    <use href="#cloud1" x="100" y="50" width="400" height="150">
      <animateTransform attributeName="transform" type="translate" from="-100 0" to="100 0" dur="120s" repeatCount="indefinite"/>
    </use>
    <use href="#cloud2" x="900" y="120" width="300" height="100">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-150 0" dur="150s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- 5. MIDGROUND CLOUDS -->
  <g filter="url(#b40)" opacity="0.8">
    <use href="#cloud3" x="400" y="20" width="500" height="180">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="200 0" dur="90s" repeatCount="indefinite"/>
    </use>
    <use href="#cloud1" x="1100" y="180" width="400" height="150">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-250 0" dur="100s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- 6. FOREGROUND CLOUDS -->
  <g opacity="1.0">
    <use href="#cloud2" x="200" y="250" width="300" height="100">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="400 0" dur="80s" repeatCount="indefinite"/>
    </use>
    <use href="#cloud1" x="1300" y="80" width="400" height="150">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-300 0" dur="70s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- 7. DISTANT MOUNTAINS (Atmospheric perspective) -->
  <g filter="url(#b120)" opacity="0.5">
    <path d="M 0 600 L 200 450 L 450 620 L 700 480 L 950 650 L 1200 500 L 1400 580 L 1600 520 L 1600 900 L 0 900 Z" fill="#6B8E5C"/>
  </g>
  <g filter="url(#b80)" opacity="0.7">
    <path d="M 0 650 L 300 550 L 600 680 L 900 580 L 1300 700 L 1600 620 L 1600 900 L 0 900 Z" fill="#7AA065"/>
  </g>

  <!-- 8. DISTANT HILLS -->
  <g filter="url(#b40)">
    <path d="M 0 700 Q 200 650 500 720 T 1100 680 T 1600 750 L 1600 900 L 0 900 Z" fill="#6B8E5C"/>
  </g>

  <!-- 9. MID HILLS -->
  <g filter="url(#b40)">
    <path d="M 0 750 Q 400 700 800 780 T 1600 720 L 1600 900 L 0 900 Z" fill="#5A7D4A"/>
  </g>

  <!-- 10. ROLLING PLAINS (Main Field) -->
  <path d="M 0 800 Q 300 760 600 820 T 1200 790 T 1600 830 L 1600 900 L 0 900 Z" fill="#4E703E"/>
  
  <!-- 11. FOREGROUND FIELD -->
  <path d="M 0 850 Q 400 820 800 860 T 1600 840 L 1600 900 L 0 900 Z" fill="#3A5E2B"/>

  <!-- 12. ANCIENT TREE (Background copy for depth) -->
  <use href="#tree" x="480" y="520" width="120" height="180" opacity="0.4" filter="url(#b80)"/>

  <!-- 13. ANCIENT TREE (Main) -->
  <use href="#tree" x="450" y="500" width="160" height="240" opacity="0.9"/>

  <!-- 14. DEEP GRASS BLADES (Foreground detail) -->
  <g stroke="#2C4620" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 100 880 Q 110 850 130 840">
      <animate attributeName="d" values="M 100 880 Q 110 850 130 840; M 100 880 Q 115 855 135 845; M 100 880 Q 110 850 130 840" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 400 860 Q 410 830 430 820">
      <animate attributeName="d" values="M 400 860 Q 410 830 430 820; M 400 860 Q 415 835 435 825; M 400 860 Q 410 830 430 820" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 900 870 Q 910 840 930 830">
      <animate attributeName="d" values="M 900 870 Q 910 840 930 830; M 900 870 Q 905 845 925 835; M 900 870 Q 910 840 930 830" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M 1400 890 Q 1410 860 1430 850">
      <animate attributeName="d" values="M 1400 890 Q 1410 860 1430 850; M 1400 890 Q 1415 865 1435 855; M 1400 890 Q 1410 860 1430 850" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 15. HERO SUBJECT: PARAGLIDER -->
  <g id="heroGroup" transform="translate(1100, 200)" filter="url(#glow)">
    <!-- Warm rim light halo behind -->
    <circle cx="0" cy="0" r="60" fill="#F5C97A" opacity="0.15">
      <animate attributeName="r" values="60;70;60" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- The Glider -->
    <g id="gliderInstance">
      <use href="#glider" transform="scale(2.5)"/>
      <!-- Rim light stroke -->
      <use href="#glider" transform="scale(2.5)" stroke="#F5C97A" stroke-width="1.5" fill="none" opacity="0.6"/>
    </g>

    <!-- Breath/Float Animation -->
    <animateTransform attributeName="transform" type="translate" values="1100 200; 1100 195; 1100 200" dur="6s" repeatCount="indefinite"/>
    <!-- Subtle Sway -->
    <animateTransform attributeName="transform" type="rotate" values="-3 1100 200; 3 1100 200; -3 1100 200" dur="12s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- 16. GLIDER SHADOW ON GROUND -->
  <ellipse cx="1050" cy="795" rx="40" ry="8" fill="#1A2E12" opacity="0.2" filter="url(#b40)">
    <animate attributeName="rx" values="40;45;40" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.15;0.2" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 17. ATMOSPHERIC PARTICLES (Pollen/Dust in light) -->
  <g fill="#FFF8E0" opacity="0.8">
    <!-- Particle 1 -->
    <circle r="2">
      <animateMotion path="M 200 300 Q 400 200 600 400 T 1000 300" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="20s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 2 -->
    <circle r="1.5">
      <animateMotion path="M 100 500 Q 300 400 500 600 T 900 500" dur="25s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="25s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 3 -->
    <circle r="2.5">
      <animateMotion path="M 800 100 Q 900 300 1000 200 T 1200 400" dur="18s" begin="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="18s" begin="5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 4 -->
    <circle r="1">
      <animateMotion path="M 400 700 Q 600 600 800 800 T 1200 700" dur="22s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="22s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 5 -->
    <circle r="3">
      <animateMotion path="M 1300 200 Q 1400 300 1500 250 T 1600 400" dur="15s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="15s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 6 -->
    <circle r="1.5">
      <animateMotion path="M 50 400 Q 200 300 350 500 T 600 400" dur="28s" begin="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="28s" begin="7s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 7 -->
    <circle r="2">
      <animateMotion path="M 700 600 Q 850 500 1000 700 T 1300 600" dur="24s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="24s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 8 -->
    <circle r="1">
      <animateMotion path="M 300 100 Q 450 200 600 100 T 800 300" dur="19s" begin="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="19s" begin="6s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 9 -->
    <circle r="2.5">
      <animateMotion path="M 1100 600 Q 1200 700 1300 600 T 1500 800" dur="21s" begin="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="21s" begin="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 10 -->
    <circle r="1.5">
      <animateMotion path="M 500 800 Q 650 700 800 900 T 1100 800" dur="26s" begin="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="26s" begin="9s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 11 -->
    <circle r="2">
      <animateMotion path="M 150 200 Q 300 100 450 300 T 750 200" dur="17s" begin="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="17s" begin="10s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 12 -->
    <circle r="1">
      <animateMotion path="M 900 400 Q 1000 300 1100 500 T 1400 400" dur="23s" begin="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="23s" begin="11s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 13 -->
    <circle r="2.5">
      <animateMotion path="M 1200 100 Q 1300 200 1400 100 T 1600 300" dur="16s" begin="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="16s" begin="12s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 14 -->
    <circle r="1.5">
      <animateMotion path="M 250 600 Q 400 500 550 700 T 850 600" dur="20s" begin="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="20s" begin="13s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 15 -->
    <circle r="2">
      <animateMotion path="M 600 200 Q 750 100 900 300 T 1200 200" dur="14s" begin="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="14s" begin="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 18. FOREGROUND MIST / FOG LAYER -->
  <rect x="0" y="750" width="1600" height="200" fill="#FFF8E0" opacity="0.15" filter="url(#b80)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="15s" repeatCount="indefinite"/>
  </rect>

</svg>