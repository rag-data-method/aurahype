<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="b30" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="b60" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="b90" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <filter id="b120" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
    </filter>
    <filter id="goldGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8893A" stop-opacity="0.85"/>
      <stop offset="22%" stop-color="#F5EFD8" stop-opacity="0.98"/>
      <stop offset="48%" stop-color="#B8893A" stop-opacity="1"/>
      <stop offset="72%" stop-color="#F5EFD8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#B8893A" stop-opacity="0.82"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="0%;100%;0%" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="100%;0%;100%" dur="14s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="ivoryGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5EFD8" stop-opacity="0.96"/>
      <stop offset="55%" stop-color="#F5EFD8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F5EFD8" stop-opacity="0"/>
      <animate attributeName="r" values="42%;58%;42%" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="45%;55%;45%" dur="6s" repeatCount="indefinite"/>
    </radialGradient>

    <radialGradient id="rubyFlash" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D4203F" stop-opacity="0.96"/>
      <stop offset="45%" stop-color="#8B0F23" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#8B0F23" stop-opacity="0"/>
      <animate attributeName="cx" values="30%;70%;30%" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="30%;70%;30%" dur="7.2s" repeatCount="indefinite"/>
    </radialGradient>

    <radialGradient id="velvetVignette" cx="50%" cy="50%" r="75%">
      <stop offset="40%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="85%" stop-color="#1A0D0D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0.85"/>
    </radialGradient>

    <linearGradient id="strandGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8893A" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#F5EFD8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#B8893A" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

