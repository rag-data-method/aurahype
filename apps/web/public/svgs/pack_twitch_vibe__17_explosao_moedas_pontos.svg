<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="50%" stop-color="#0f0518"/>
      <stop offset="100%" stop-color="#05010a"/>
    </radialGradient>

    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5a0"/>
      <stop offset="25%" stop-color="#ffcf00"/>
      <stop offset="50%" stop-color="#ff9100"/>
      <stop offset="75%" stop-color="#ffcf00"/>
      <stop offset="100%" stop-color="#fff5a0"/>
    </linearGradient>
    
    <linearGradient id="gRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb3b3"/>
      <stop offset="25%" stop-color="#ff4d4d"/>
      <stop offset="50%" stop-color="#e60000"/>
      <stop offset="75%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#ffb3b3"/>
    </linearGradient>
    
    <linearGradient id="gCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b3ffff"/>
      <stop offset="25%" stop-color="#00e6e6"/>
      <stop offset="50%" stop-color="#008080"/>
      <stop offset="75%" stop-color="#00e6e6"/>
      <stop offset="100%" stop-color="#b3ffff"/>
    </linearGradient>

    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0b3ff"/>
      <stop offset="25%" stop-color="#a020f0"/>
      <stop offset="50%" stop-color="#4b0082"/>
      <stop offset="75%" stop-color="#a020f0"/>
      <stop offset="100%" stop-color="#e0b3ff"/>
    </linearGradient>

    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b3ffb3"/>
      <stop offset="25%" stop-color="#00ff00"/>
      <stop offset="50%" stop-color="#008000"/>
      <stop offset="75%" stop-color="#00ff00"/>
      <stop offset="100%" stop-color="#b3ffb3"/>
    </linearGradient>

    <filter id="metalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feSpecularLighting in="blur1" surfaceScale="5" specularConstant="1.2" specularExponent="20" lighting-color="#ffffff" result="spec">
        <fePointLight x="-500" y="-500" z="200"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g id="hex">
      <path d="M 0,-25 L 21.65,-12.5 L 21.65,12.5 L 0,25 L -21.65,12.5 L -21.65,-12.5 Z" fill="url(#gGold)" filter="url(#metalGlow)" stroke="#ffffff" stroke-width="1"/>
      <path d="M 0,-15 L 13,-7.5 L 13,7.5 L 0,15 L -13,7.5 L -13,-7.5 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
    </g>

    <g id="hexRed">
      <path d="M 0,-25 L 21.65,-12.5 L 21.65,12.5 L 0,25 L -21.65,12.5 L -21.65,-12.5 Z" fill="url(#gRed)" filter="url(#metalGlow)" stroke="#ffffff" stroke-width="1"/>
      <path d="M 0,-15 L 13,-7.5 L 13,7.5 L 0,15 L -13,7.5 L -13,-7.5 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
    </g>

    <g id="hexCyan">
      <path d="M 0,-25 L 21.65,-12.5 L 21.65,12.5 L 0,25 L -21.65,12.5 L -21.65,-12.5 Z" fill="url(#gCyan)" filter="url(#metalGlow)" stroke="#ffffff" stroke-width="1"/>
      <path d="M 0,-15 L 13,-7.5 L 13,7.5 L 0,15 L -13,7.5 L -13,-7.5 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
    </g>

    <g id="hexPurple">
      <path d="M 0,-25 L 21.65,-12.5 L 21.65,12.5 L 0,25 L -21.65,12.5 L -21.65,-12.5 Z" fill="url(#gPurple)" filter="url(#metalGlow)" stroke="#ffffff" stroke-width="1"/>
      <path d="M 0,-15 L 13,-7.5 L 13,7.5 L 0,15 L -13,7.5 L -13,-7.5 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
    </g>

    <g id="hexGreen">
      <path d="M 0,-25 L 21.65,-12.5 L 21.65,12.5 L 0,25 L -21.65,12.5 L -21.65,-12.5 Z" fill="url(#gGreen)" filter="url(#metalGlow)" stroke="#ffffff" stroke-width="1"/>
      <path d="M 0,-15 L 13,-7.5 L 13,7.5 L 0,15 L -13,7.5 L -13,-7.5 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
    </g>

    <g id="sparkle">
      <polygon points="0,-15 2,0 15,0 3,3 0,15 -3,3 -15,0 -2,0" fill="#ffffff" filter="url(#metalGlow)">
        <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" begin="0s"/>
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="0.8s" repeatCount="indefinite" additive="sum"/>
      </polygon>
    </g>

    <g id="confetti">
      <rect x="-5" y="-2" width="10" height="4" rx="2" fill="#ff00ff">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg1)"/>

  <circle cx="400" cy="300" r="250" fill="url(#glowGrad)" filter="url(#bgGlow)">
    <animate attributeName="r" values="180;250;180" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="400" cy="300" r="150" fill="none" stroke="#ff00ff" stroke-width="2" stroke-dasharray="10 20" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="220" fill="none" stroke="#00ffff" stroke-width="3" stroke-dasharray="30 15" opacity="0.2">
    <animateTransform attributeName="transform" type="rotate" from="360 400 300" to="0 400 300" dur="30s" repeatCount="indefinite"/>
  </circle>

  <g id="centerPulse">
    <circle cx="400" cy="300" r="10" fill="#ffffff" filter="url(#metalGlow)">
      <animate attributeName="r" values="5;40;5" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="20" fill="none" stroke="#ffea00" stroke-width="2">
      <animate attributeName="r" values="0;60;0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <use href="#sparkle" x="200" y="150">
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite" begin="0.1s"/>
  </use>
  <use href="#sparkle" x="600" y="180">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
  </use>
  <use href="#sparkle" x="300" y="500">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="0.3s"/>
  </use>
  <use href="#sparkle" x="650" y="400">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
  </use>
  <use href="#sparkle" x="150" y="350">
    <animate attributeName="opacity" values="0;1;0" dur="1.3s" repeatCount="indefinite" begin="1.2s"/>
  </use>

  <g id="hexCoins">
    <use href="#hexCyan" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -200,-150" dur="2s" fill="freeze" begin="0.1s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="450" dur="2s" fill="freeze" begin="0.1s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.8s" fill="freeze" begin="0.3s"/>
    </use>

    <use href="#hex" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 250,-100" dur="2.2s" fill="freeze" begin="0.15s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="2.2s" fill="freeze" begin="0.15s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2s" fill="freeze" begin="0.4s"/>
    </use>

    <use href="#hexRed" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 180,200" dur="1.8s" fill="freeze" begin="0.05s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="720" dur="1.8s" fill="freeze" begin="0.05s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.6s" fill="freeze" begin="0.2s"/>
    </use>

    <use href="#hexPurple" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -150,220" dur="2.4s" fill="freeze" begin="0.2s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-540" dur="2.4s" fill="freeze" begin="0.2s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2.2s" fill="freeze" begin="0.5s"/>
    </use>

    <use href="#hexGreen" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 100,-250" dur="2.1s" fill="freeze" begin="0.1s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="1080" dur="2.1s" fill="freeze" begin="0.1s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.9s" fill="freeze" begin="0.3s"/>
    </use>

    <use href="#hex" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -300,50" dur="2.5s" fill="freeze" begin="0.25s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2.5s" fill="freeze" begin="0.25s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2.3s" fill="freeze" begin="0.55s"/>
    </use>

    <use href="#hexCyan" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 80,280" dur="1.9s" fill="freeze" begin="0.15s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-900" dur="1.9s" fill="freeze" begin="0.15s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.7s" fill="freeze" begin="0.35s"/>
    </use>

    <use href="#hexRed" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -250,-80" dur="2.3s" fill="freeze" begin="0.1s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="630" dur="2.3s" fill="freeze" begin="0.1s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2.1s" fill="freeze" begin="0.4s"/>
    </use>

    <use href="#hexPurple" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 320,120" dur="2.6s" fill="freeze" begin="0.2s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-450" dur="2.6s" fill="freeze" begin="0.2s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2.4s" fill="freeze" begin="0.5s"/>
    </use>

    <use href="#hexGreen" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -100,-300" dur="2s" fill="freeze" begin="0.05s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="810" dur="2s" fill="freeze" begin="0.05s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.8s" fill="freeze" begin="0.25s"/>
    </use>

    <use href="#hex" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 280,-180" dur="2.2s" fill="freeze" begin="0.3s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="540" dur="2.2s" fill="freeze" begin="0.3s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2s" fill="freeze" begin="0.6s"/>
    </use>

    <use href="#hexCyan" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -350,150" dur="2.1s" fill="freeze" begin="0.15s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-720" dur="2.1s" fill="freeze" begin="0.15s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.9s" fill="freeze" begin="0.35s"/>
    </use>

    <use href="#hexRed" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 50,350" dur="2.4s" fill="freeze" begin="0.2s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2.4s" fill="freeze" begin="0.2s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2.2s" fill="freeze" begin="0.5s"/>
    </use>

    <use href="#hexPurple" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -180,-220" dur="1.8s" fill="freeze" begin="0.1s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-630" dur="1.8s" fill="freeze" begin="0.1s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.6s" fill="freeze" begin="0.3s"/>
    </use>

    <use href="#hexGreen" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 220,250" dur="2.3s" fill="freeze" begin="0.25s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="900" dur="2.3s" fill="freeze" begin="0.25s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2.1s" fill="freeze" begin="0.55s"/>
    </use>

    <use href="#hex" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -80,300" dur="2s" fill="freeze" begin="0.1s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-810" dur="2s" fill="freeze" begin="0.1s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="1.8s" fill="freeze" begin="0.3s"/>
    </use>

    <use href="#hexCyan" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 350,-50" dur="2.5s" fill="freeze" begin="0.2s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="450" dur="2.5s" fill="freeze" begin="0.2s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2.3s" fill="freeze" begin="0.5s"/>
    </use>

    <use href="#hexRed" x="400" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; -320,-120" dur="2.2s" fill="freeze" begin="0.15s" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="720" dur="2.2s" fill="freeze" begin="0.15s" additive="sum"/>
      <animate attributeName="opacity" values="1;0" dur="2s" fill="freeze" begin="0.45s"/>
    </use>
  </g>

  <g id="confettiParticles">
    <use href="#confetti" x="400" y="300" fill="#ff00ff">
      <animateTransform attributeName="transform" type="translate" values="0,0; -400,-300" dur="2s" fill="freeze" begin="0s"/>
      <animate attributeName="opacity" values="1;0" dur="1.5s" fill="freeze" begin="0.5s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#00ffff">
      <animateTransform attributeName="transform" type="translate" values="0,0; 400,-300" dur="2.2s" fill="freeze" begin="0.1s"/>
      <animate attributeName="opacity" values="1;0" dur="1.7s" fill="freeze" begin="0.6s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#ffff00">
      <animateTransform attributeName="transform" type="translate" values="0,0; 400,300" dur="1.8s" fill="freeze" begin="0.2s"/>
      <animate attributeName="opacity" values="1;0" dur="1.3s" fill="freeze" begin="0.7s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#ff00ff">
      <animateTransform attributeName="transform" type="translate" values="0,0; -400,300" dur="2.4s" fill="freeze" begin="0.3s"/>
      <animate attributeName="opacity" values="1;0" dur="1.9s" fill="freeze" begin="0.8s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#00ff00">
      <animateTransform attributeName="transform" type="translate" values="0,0; -300,-400" dur="2.1s" fill="freeze" begin="0.15s"/>
      <animate attributeName="opacity" values="1;0" dur="1.6s" fill="freeze" begin="0.65s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#ff0000">
      <animateTransform attributeName="transform" type="translate" values="0,0; 300,400" dur="2.3s" fill="freeze" begin="0.25s"/>
      <animate attributeName="opacity" values="1;0" dur="1.8s" fill="freeze" begin="0.75s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#00ffff">
      <animateTransform attributeName="transform" type="translate" values="0,0; 500,-100" dur="1.9s" fill="freeze" begin="0.05s"/>
      <animate attributeName="opacity" values="1;0" dur="1.4s" fill="freeze" begin="0.55s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#ffff00">
      <animateTransform attributeName="transform" type="translate" values="0,0; -500,100" dur="2.5s" fill="freeze" begin="0.35s"/>
      <animate attributeName="opacity" values="1;0" dur="2s" fill="freeze" begin="0.85s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#ff00ff">
      <animateTransform attributeName="transform" type="translate" values="0,0; 100,-500" dur="2s" fill="freeze" begin="0.1s"/>
      <animate attributeName="opacity" values="1;0" dur="1.5s" fill="freeze" begin="0.6s"/>
    </use>
    <use href="#confetti" x="400" y="300" fill="#00ff00">
      <animateTransform attributeName="transform" type="translate" values="0,0; -100,500" dur="2.2s" fill="freeze" begin="0.2s"/>
      <animate attributeName="opacity" values="1;0" dur="1.7s" fill="freeze" begin="0.7s"/>
    </use>
  </g>

  <text x="400" y="320" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="80" fill="#ffffff" stroke="#ff00ff" stroke-width="4" filter="url(#metalGlow)">GG!</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#00ffff" font-weight="bold" letter-spacing="4" filter="url(#metalGlow)">HIGH REWARD</text>

</svg>