<use href="#ray1" transform="rotate(30 800 450)"/>
<use href="#ray1" transform="rotate(45 800 450)"/>
<use href="#ray1" transform="rotate(60 800 450)"/>
<use href="#ray1" transform="rotate(75 800 450)"/>
<use href="#ray1" transform="rotate(90 800 450)"/>
<use href="#ray1" transform="rotate(105 800 450)"/>
<use href="#ray1" transform="rotate(120 800 450)"/>
<use href="#ray1" transform="rotate(135 800 450)"/>
<use href="#ray1" transform="rotate(150 800 450)"/>
<use href="#ray1" transform="rotate(165 800 450)"/>
<use href="#ray1" transform="rotate(180 800 450)"/>
<use href="#ray1" transform="rotate(195 800 450)"/>
<use href="#ray1" transform="rotate(210 800 450)"/>
<use href="#ray1" transform="rotate(225 800 450)"/>
<use href="#ray1" transform="rotate(240 800 450)"/>
<use href="#ray1" transform="rotate(255 800 450)"/>
<use href="#ray1" transform="rotate(270 800 450)"/>
<use href="#ray1" transform="rotate(285 800 450)"/>
