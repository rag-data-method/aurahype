<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="80%">
<stop offset="0%" stop-color="#064e3b"/>
<stop offset="55%" stop-color="#022c22"/>
<stop offset="100%" stop-color="#011412"/>
</radialGradient>
<linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#7a5c12"/>
<stop offset="35%" stop-color="#d4af37"/>
<stop offset="65%" stop-color="#f2c94c"/>
<stop offset="100%" stop-color="#b8860b"/>
</linearGradient>
<radialGradient id="core" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fff8d6"/>
<stop offset="45%" stop-color="#ffd700"/>
<stop offset="100%" stop-color="#b8860b"/>
</radialGradient>
<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="18"/>
</filter>
<path id="ray1" d="M800,450 L797,-100 L803,-100 Z" fill="url(#gold)"/>
<path id="ray2" d="M800,450 L792,-60 L808,-60 Z" fill="url(#gold)"/>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/>
<g opacity="0.22">
