<circle cx="800" cy="450" r="140" fill="url(#gold)" filter="url(#glow)" opacity="0.25">
<animate attributeName="r" values="140;165;140" dur="10s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.25;0.4;0.25" dur="10s" repeatCount="indefinite"/>
</circle>
<circle cx="800" cy="450" r="60" fill="url(#core)">
