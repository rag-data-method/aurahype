</g>
<g opacity="0.32">
<use href="#ray2" transform="rotate(7.5 800 450)"/>
<use href="#ray2" transform="rotate(37.5 800 450)"/>
<use href="#ray2" transform="rotate(67.5 800 450)"/>
<use href="#ray2" transform="rotate(97.5 800 450)"/>
<use href="#ray2" transform="rotate(127.5 800 450)"/>
<use href="#ray2" transform="rotate(157.5 800 450)"/>
<use href="#ray2" transform="rotate(187.5 800 450)"/>
<use href="#ray2" transform="rotate(217.5 800 450)"/>
<use href="#ray2" transform="rotate(247.5 800 450)"/>
<use href="#ray2" transform="rotate(277.5 800 450)"/>
