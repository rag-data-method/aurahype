<path d="M0,900 V720 Q800,340 1600,720 V900 Z" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.28">
<animate attributeName="opacity" values="0.28;0.45;0.28" dur="9s" repeatCount="indefinite"/>
</path>
<path d="M0,900 V790 Q800,520 1600,790 V900 Z" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.2">
<animate attributeName="opacity" values="0.2;0.35;0.2" dur="9s" repeatCount="indefinite"/>
</path>
<g transform="translate(0,900)">
<path d="M0,0 V-120 H120 V-180 H240 V-240 H360 V-300 H520 L800,-360 L1080,-300 H1240 V-240 H1360 V-180 H1480 V-120 H1600 V0 Z" fill="url(#gold)" opacity="0.88">
<animate attributeName="opacity" values="0.88;0.98;0.88" dur="12s" repeatCount="indefinite"/>
</path>
</g>
