<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feOffset in="blur" dx="0" dy="12" result="offsetBlur"/>
      <feComponentTransfer in="offsetBlur" result="shadow">
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="brass" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#C9A85C"/>
      <stop offset="40%" stop-color="#F4E4BC"/>
      <stop offset="100%" stop-color="#5D4A24"/>
    </linearGradient>
  </defs>
  
  <rect fill="#FBF7EE" width="1600" height="900"/>
  
  <g id="shadows" opacity="0.35">
    <ellipse cx="520" cy="780" rx="260" ry="50" fill="#5D4A24" filter="url(#softShadow)">
      <animate attributeName="rx" values="260;275;260" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.45;0.35" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1050" cy="810" rx="180" ry="40" fill="#5D4A24" filter="url(#softShadow)">
      <animate attributeName="ry" values="40;48;40" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="780" cy="720" rx="80" ry="25" fill="#5D4A24" filter="url(#softShadow)">
      <animate attributeName="rx" values="80;90;80" dur="4s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g id="map" transform="translate(950, 650)">
    <animateTransform attributeName="transform" type="translate" values="950,650;950,640;950,650" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-2 200 100; 2 200 100; -2 200 100" dur="8s" repeatCount="indefinite" additive="sum"/>
    <path d="M20,80 Q150,60 280,90 T380,120 L360,280 Q220,300 80,270 L40,280 Z" fill="#FBF7EE" stroke="#C9A85C" stroke-width="3" filter="url(#shadowBlur)"/>
    <path d="M40,120 Q120,100 200,130 T320,140" fill="none" stroke="#2B5F7C" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <animate attributeName="d" values="M40,120 Q120,100 200,130 T320,140;M40,125 Q120,105 200,135 T320,145;M40,120 Q120,100 200,130 T320,140" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M60,200 Q160,180 260,210" fill="none" stroke="#5D4A24" stroke-width="2" opacity="0.6"/>
    <circle cx="280" cy="150" r="6" fill="#2B5F7C" opacity="0.7"/>
    <path d="M20,80 L380,120 L360,280 L40,280 Z" fill="none" stroke="#C9A85C" stroke-width="2" opacity="0.5"/>
    <g transform="translate(360, 280)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0; 8 0 0; 0 0 0" dur="3.5s" repeatCount="indefinite"/>
      <path d="M0,0 L40,20 L0,-20 Z" fill="#E8DCC4"/>
    </g>
  </g>
  
  <g id="briefcase" transform="translate(380, 480)">
    <animateTransform attributeName="transform" type="translate" values="380,480;380,475;380,480" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 200 200; 1.5 200 200; 0 200 200" dur="9s" repeatCount="indefinite" additive="sum"/>
    <path d="M60,140 L340,140 L340,320 L60,320 Z" fill="#4A3A1C"/>
    <path d="M70,150 L330,150 L330,310 L70,310 Z" fill="#C9A85C" opacity="0.9"/>
    <path d="M60,140 L200,220 L340,140 L340,320 L60,320 Z" fill="#5D4A24"/>
    <path d="M60,140 L340,140 L370,290 L30,290 Z" fill="#5D4A24" opacity="0.95"/>
    <path d="M200,220 L200,320" stroke="#3D2F18" stroke-width="2" opacity="0.4"/>
    <g transform="translate(200, 140)">
      <animateTransform attributeName="transform" type="rotate" values="-3 0 0; 3 0 0; -3 0 0" dur="4s" repeatCount="indefinite"/>
      <path d="M-60,0 Q-60,-50 0,-50 Q60,-50 60,0" fill="none" stroke="#5D4A24" stroke-width="14" stroke-linecap="round"/>
      <rect x="-8" y="-58" width="16" height="10" rx="3" fill="#C9A85C"/>
    </g>
    <rect x="280" y="160" width="40" height="60" fill="#FBF7EE" opacity="0.3" rx="2">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <g id="compass" transform="translate(780, 400)">
    <animateTransform attributeName="transform" type="translate" values="780,400;780,360;780,400" dur="4.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-8 0 0; 8 0 0; -8 0 0" dur="6s" repeatCount="indefinite" additive="sum"/>
    <circle r="75" fill="url(#brass)" stroke="#5D4A24" stroke-width="5" filter="url(#shadowBlur)"/>
    <circle r="65" fill="#FBF7EE" opacity="0.2"/>
    <circle r="58" fill="none" stroke="#5D4A24" stroke-width="1" opacity="0.4"/>
    <g>
      <polygon points="0,-55 6,0 0,55 -6,0" fill="#2B5F7C">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </polygon>
      <circle r="6" fill="#5D4A24"/>
      <line x1="0" y1="-55" x2="0" y2="-45" stroke="#FBF7EE" stroke-width="2" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </line>
    </g>
    <text y="-50" text-anchor="middle" fill="#5D4A24" font-size="14" font-family="Georgia, serif" font-weight="bold">N</text>
    <text y="55" text-anchor="middle" fill="#5D4A24" font-size="14" font-family="Georgia, serif">S</text>
    <path d="M-50,-45 Q0,-65 50,-45" fill="none" stroke="#FBF7EE" stroke-width="4" opacity="0.5" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g id="document" transform="translate(580, 380)" opacity="0">
    <animateTransform attributeName="transform" type="translate" values="580,380;750,320;580,380" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="15 30 40; -10 30 40; 15 30 40" dur="6s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite"/>
    <rect width="60" height="80" fill="#FBF7EE" stroke="#C9A85C" stroke-width="2" rx="3" filter="url(#shadowBlur)"/>
    <line x1="12" y1="25" x2="48" y2="25" stroke="#2B5F7C" stroke-width="3" opacity="0.8"/>
    <line x1="12" y1="40" x2="48" y2="40" stroke="#5D4A24" stroke-width="2" opacity="0.6"/>
    <line x1="12" y1="52" x2="40" y2="52" stroke="#5D4A24" stroke-width="2" opacity="0.4"/>
  </g>
  
  <g id="particles">
    <circle cx="700" cy="300" r="3" fill="#C9A85C" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="350;250" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="280" r="2" fill="#2B5F7C" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="380;280" dur="5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="220" r="2.5" fill="#C9A85C" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="6s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="400;200" dur="6s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>