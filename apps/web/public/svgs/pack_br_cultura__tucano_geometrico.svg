<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0d2b45"/>
      <stop offset="45%" stop-color="#071829"/>
      <stop offset="100%" stop-color="#030b14"/>
    </radialGradient>
    <linearGradient id="beakOrange" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="50%" stop-color="#f8d56b"/>
      <stop offset="100%" stop-color="#e8830c"/>
    </linearGradient>
    <linearGradient id="beakBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="60%" stop-color="#2e5c8a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="bodyBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="50%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="throat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Distant geometric jungle leaves -->
  <g opacity="0.18">
    <path d="M0,1080 L0,700 L180,1080 Z" fill="#0f3d2e"/>
    <path d="M0,700 L280,1080 L420,1080 Z" fill="#0a2e22"/>
    <path d="M1800,1080 L1920,850 L1920,1080 Z" fill="#0f3d2e"/>
    <path d="M1500,1080 L1920,600 L1920,850 Z" fill="#0a2e22"/>
    <path d="M1200,1080 L1500,750 L1650,1080 Z" fill="#082218"/>
    <path d="M600,1080 L900,800 L1150,1080 Z" fill="#082218"/>
  </g>

  <!-- Geometric light accents -->
  <g opacity="0.08">
    <polygon points="1400,200 1500,120 1600,250" fill="#4a90e2"/>
    <polygon points="200,300 320,180 380,350" fill="#f5a623"/>
    <polygon points="1700,600 1800,520 1850,650" fill="#7ed321"/>
  </g>

  <!-- TUCANO -->
  <g transform="translate(120, 40)">

    <!-- Tail feathers -->
    <polygon points="280,820 220,920 380,860" fill="#0f1724"/>
    <polygon points="320,780 280,820 420,800" fill="#162032"/>
    <polygon points="380,720 320,780 460,760" fill="#1e2a3a"/>

    <!-- Back / Wing area -->
    <polygon points="380,720 460,760 520,700" fill="#1a1a1a"/>
    <polygon points="460,760 520,850 620,820" fill="#111111"/>
    <polygon points="520,700 620,820 700,720" fill="#1f1f1f"/>
    <polygon points="460,760 620,820 520,850" fill="#0d0d0d"/>

    <!-- Lower body / belly -->
    <polygon points="520,850 700,880 620,820" fill="#141414"/>
    <polygon points="620,820 700,880 760,790" fill="#1c1c1c"/>
    <polygon points="700,720 760,790 820,700" fill="#222222"/>

    <!-- Neck front -->
    <polygon points="520,700 700,720 680,560" fill="#232323"/>
    <polygon points="700,720 760,790 820,700" fill="#181818"/>
    <polygon points="680,560 700,720 820,650" fill="#2a2a2a"/>

    <!-- Throat white patch -->
    <polygon points="680,560 740,520 820,650" fill="url(#throat)"/>
    <polygon points="740,520 820,600 820,650" fill="#e8e8e8"/>
    <polygon points="700,580 760,620 740,520" fill="#f0f0f0"/>

    <!-- Head top and back -->
    <polygon points="520,480 600,380 680,500" fill="#262626"/>
    <polygon points="600,380 720,420 680,500" fill="#1e1e1e"/>
    <polygon points="520,480 680,500 680,560" fill="#2d2d2d"/>
    <polygon points="680,500 720,420 740,520" fill="#333333"/>

    <!-- Beak base -->
    <polygon points="720,420 800,400 740,520" fill="#2a2a2a"/>
    <polygon points="800,400 860,480 740,520" fill="#d9790b"/>

    <!-- Upper beak -->
    <polygon points="800,400 980,360 860,480" fill="url(#beakOrange)"/>
    <polygon points="980,360 1080,420 860,480" fill="#f7c948"/>
    <polygon points="1080,420 1160,440 860,480" fill="#f5a623"/>

    <!-- Beak blue tip -->
    <polygon points="1080,420 1180,420 1160,440" fill="url(#beakBlue)"/>
    <polygon points="1160,440 1180,420 1160,500" fill="#1e3a5f"/>
    <polygon points="1080,420 1160,500 860,480" fill="#e8830c"/>

    <!-- Lower beak -->
    <polygon points="740,520 860,480 900,540" fill="#f8d56b"/>
    <polygon points="740,520 900,540 820,600" fill="#f5a623"/>
    <polygon points="820,600 900,540 1000,560" fill="#d9790b"/>
    <polygon points="900,540 1050,580 1000,560" fill="#c46a09"/>
    <polygon points="900,540 1160,500 1050,580" fill="#2e5c8a"/>

    <!-- Beak highlight accents -->
    <polygon points="860,420 980,390 920,460" fill="#fff5d6" opacity="0.45"/>
    <polygon points="760,460 820,440 790,500" fill="#ffffff" opacity="0.25"/>

    <!-- Eye -->
    <circle cx="660" cy="460" r="26" fill="#0a0a0a"/>
    <circle cx="664" cy="456" r="16" fill="#7ed321"/>
    <circle cx="668" cy="452" r="6" fill="#ffffff"/>
    <path d="M 636,460 Q 660,430 684,460" stroke="#111" stroke-width="4" fill="none" opacity="0.6"/>

    <!-- Eye mask detail -->
    <polygon points="600,440 660,430 660,470" fill="#1a1a1a"/>
    <polygon points="660,430 700,440 660,470" fill="#222222"/>

    <!-- Head feather accents -->
    <polygon points="600,380 560,340 640,360" fill="#0f0f0f"/>
    <polygon points="560,340 520,380 600,380" fill="#1a1a1a"/>

    <!-- Wing edge highlights -->
    <polygon points="520,700 560,760 620,720" fill="#2a2a2a" opacity="0.8"/>
    <polygon points="560,760 620,820 620,720" fill="#1f1f1f" opacity="0.8"/>
  </g>

  <!-- Foreground geometric leaves -->
  <g opacity="0.25">
    <polygon points="0,1080 0,900 140,1080" fill="#16402f"/>
    <polygon points="0,900 180,950 140,1080" fill="#0f2f22"/>
    <polygon points="1920,1080 1920,950 1750,1080" fill="#16402f"/>
    <polygon points="1920,950 1700,1000 1750,1080" fill="#0f2f22"/>
  </g>

  <!-- Subtle vignette -->
  <rect width="1920" height="1080" fill="url(#bg)" opacity="0.15" style="mix-blend-mode: multiply;"/>
</svg>