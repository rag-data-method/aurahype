<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
<defs>
  <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="7"/>
  </filter>
  <filter id="glowDeep" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="22"/>
  </filter>
  <filter id="glowTight" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
  <filter id="shadowSoft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>

  <radialGradient id="maskAura" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#C7CEEA">
      <animate attributeName="stop-opacity" values="0.7;0.25;0.7" dur="5s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#1E1A29" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="silkSheen" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FFB7B2">
      <animate attributeName="stop-color" values="#FFB7B2;#E2F0CB;#FFB7B2" dur="6s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#E2F0CB"/>
  </linearGradient>

  <radialGradient id="tableMist" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#E2F0CB" stop-opacity="0.35">
      <animate attributeName="stop-opacity" values="0.35;0.15;0.35" dur="8s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#1E1A29" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="liquidGlow" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#C7CEEA" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#FFB7B2" stop-opacity="0.3"/>
  </linearGradient>
</defs>

<rect width="1600" height="900" fill="#1E1A29"/>

<g filter="url(#glowDeep)">
  <circle cx="280" cy="250" r="90" fill="#C7CEEA" opacity="0.12">
    <animate attributeName="cy" values="250;270;250" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.22;0.12" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1300" cy="180" r="110" fill="#FFB7B2" opacity="0.1">
    <animate attributeName="cy" values="180;160;180" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="450" r="70" fill="#E2F0CB" opacity="0.08">
    <animate attributeName="cx" values="850;880;850" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="600" r="60" fill="#C7CEEA" opacity="0.1">
    <animate attributeName="cy" values="600;620;600" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.15;0.1" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="550" r="80" fill="#FFB7B2" opacity="0.09">
    <animate attributeName="cx" values="1100;1070;1100" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.09;0.17;0.09" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="750" r="100" fill="#E2F0CB" opacity="0.06">
    <animate attributeName="cy" values="750;730;750" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.06;0.12;0.06" dur="10s" repeatCount="indefinite"/>
  </circle>
</g>

<g transform="translate(0,740)">
  <animateTransform attributeName="transform" type="translate" values="0,740;0,743;0,740" dur="8s" repeatCount="indefinite"/>
  <ellipse cx="800" cy="0" rx="520" ry="100" fill="url(#tableMist)"/>
  <ellipse cx="800" cy="8" rx="540" ry="110" fill="#1E1A29" opacity="0.45" filter="url(#shadowSoft)"/>
  <path d="M280,0 A520,100 0 0,0 1320,0 L1320,18 A520,100 0 0,1 280,18 Z" fill="#E2F0CB" opacity="0.75"/>
  <ellipse cx="800" cy="0" rx="500" ry="95" fill="#E2F0CB" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="6s" repeatCount="indefinite"/>
  </ellipse>
</g>

<g transform="translate(800,310)">
  <animateTransform attributeName="transform" type="translate" values="800,310;800,300;800,310" dur="7s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="rotate" values="-2 800 310;2 800 310;-2 800 310" dur="10s" repeatCount="indefinite" additive="sum"/>
  <ellipse cx="0" cy="10" rx="190" ry="130" fill="url(#maskAura)"/>
  <path d="M-150,0 C-150,-55 -85,-75 0,-60 C85,-75 150,-55 150,0 C150,45 85,35 0,25 C-85,35 -150,45 -150,0 Z" fill="#C7CEEA" opacity="0.92"/>
  <g fill="none" stroke="#E2F0CB" stroke-width="1.2" opacity="0.75">
    <path d="M-130,0 Q-65,-45 0,-40 Q65,-45 130,0"/>
    <path d="M-110,12 Q-55,-22 0,-17 Q55,-22 110,12"/>
    <path d="M-90,22 Q-45,2 0,7 Q45,2 90,22"/>
    <circle cx="-65" cy="-22" r="3"/>
    <circle cx="65" cy="-22" r="3"/>
    <circle cx="-35" cy="-12" r="2"/>
    <circle cx="35" cy="-12" r="2"/>
    <circle cx="0" cy="-28" r="2.5"/>
    <circle cx="-80" cy="5" r="2"/>
    <circle cx="80" cy="5" r="2"/>
    <animate attributeName="opacity" values="0.75;0.4;0.75" dur="4s" repeatCount="indefinite"/>
  </g>
  <path d="M-150,0 C-150,-55 -85,-75 0,-60 C85,-75 150,-55 150,0 C150,45 85,35 0,25 C-85,35 -150,45 -150,0 Z" fill="none" stroke="#C7CEEA" stroke-width="3" filter="url(#glowTight)" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" repeatCount="indefinite"/>
  </path>
</g>

<path d="M800,370 Q740,480 775,640" fill="none" stroke="url(#silkSheen)" stroke-width="11" stroke-linecap="round" filter="url(#glowSoft)">
  <animate attributeName="d" values="M800,370 Q740,480 775,640;M800,370 Q860,480 825,640;M800,370 Q740,480 775,640" dur="9s" repeatCount="indefinite"/>
</path>
<path d="M800,370 Q740,480 775,640" fill="none" stroke="#FFB7B2" stroke-width="4" stroke-linecap="round" opacity="0.6">
  <animate attributeName="d" values="M800,370 Q740,480 775,640;M800,370 Q860,480 825,640;M800,370 Q740,480 775,640" dur="9s" repeatCount="indefinite"/>
</path>
<path d="M800,370 Q770,450 790,550" fill="none" stroke="#E2F0CB" stroke-width="2.5" stroke-linecap="round" opacity="0.4">
  <animate attributeName="d" values="M800,370 Q770,450 790,550;M800,370 Q830,450 810,550;M800,370 Q770,450 790,550" dur="7s" repeatCount="indefinite"/>
</path>

<g transform="translate(980,700)">
  <ellipse cx="0" cy="5" rx="18" ry="5" fill="#1E1A29" opacity="0.4" filter="url(#shadowSoft)"/>
  <animateTransform attributeName="transform" type="rotate" values="0 980 700;4 980 700;0 980 700" dur="4.5s" repeatCount="indefinite"/>
  <path d="M0,0 Q25,-50 12,-100 Q-15,-50 0,0" fill="#FFB7B2" opacity="0.85"/>
  <path d="M0,0 Q18,-38 10,-80" fill="none" stroke="#E2F0CB" stroke-width="1"/>
</g>

<g transform="translate(1080,690)">
  <ellipse cx="0" cy="5" rx="18" ry="5" fill="#1E1A29" opacity="0.4" filter="url(#shadowSoft)"/>
  <animateTransform attributeName="transform" type="rotate" values="0 1080 690;-3 1080 690;0 1080 690" dur="5.5s" repeatCount="indefinite"/>
  <path d="M0,0 Q22,-48 10,-95 Q-18,-48 0,0" fill="#FFB7B2" opacity="0.8"/>
  <path d="M0,0 Q16,-36 8,-78" fill="none" stroke="#E2F0CB" stroke-width="1"/>
</g>

<g transform="translate(650,670)">
  <ellipse cx="0" cy="12" rx="22" ry="6" fill="#1E1A29" opacity="0.45" filter="url(#shadowSoft)"/>
  <path d="M-12,-40 L-8,0 L-16,12 L16,12 L8,0 L12,-40 Z" fill="#E2F0CB" opacity="0.25"/>
  <ellipse cx="0" cy="-40" rx="12" ry="4" fill="#C7CEEA" opacity="0.4"/>
  <path d="M-10,-20 L-6,0 L-12,10 L12,10 L6,0 L10,-20 Z" fill="url(#liquidGlow)"/>
  <circle cx="-4" cy="-5" r="2" fill="#E2F0CB" opacity="0">
    <animate attributeName="cy" values="-5;-35;-5" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="3" cy="-2" r="1.5" fill="#E2F0CB" opacity="0">
    <animate attributeName="cy" values="-2;-38;-2" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="-10" r="1.2" fill="#E2F0CB" opacity="0">
    <animate attributeName="cy" values="-10;-32;-10" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</g>

<g transform="translate(1150,660)">
  <ellipse cx="0" cy="14" rx="20" ry="6" fill="#1E1A29" opacity="0.4" filter="url(#shadowSoft)"/>
  <rect x="-14" y="-30" width="28" height="40" rx="6" fill="#C7CEEA" opacity="0.3"/>
  <rect x="-10" y="-26" width="20" height="32" rx="4" fill="#C7CEEA" opacity="0.15"/>
  <rect x="-4" y="-38" width="8" height="12" fill="#E2F0CB" opacity="0.5"/>
  <circle cx="0" cy="-15" r="3" fill="#FFB7B2" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</g>

<g>
  <circle cx="720" cy="240" r="2.5" fill="#E2F0CB">
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3.5;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="880" cy="270" r="2" fill="#E2F0CB">
    <animate attributeName="opacity" values="0;1;0" dur="4.1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3;1" dur="4.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="210" r="1.5" fill="#E2F0CB">
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="0.5;2.5;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="670" cy="290" r="2" fill="#E2F0CB">
    <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;2.8;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="930" cy="330" r="2.2" fill="#E2F0CB">
    <animate attributeName="opacity" values="0;1;0" dur="3.7s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3.2;1" dur="3.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="400" r="2" fill="#FFB7B2" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="400;380;400" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="420" r="2.5" fill="#C7CEEA" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="420;400;420" dur="7s" repeatCount="indefinite"/>
  </circle>
</g>
</svg>