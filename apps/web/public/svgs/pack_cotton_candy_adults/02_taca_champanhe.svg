<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#2A2538">
                <animate attributeName="stop-color" values="#2A2538;#3A3448;#2A2538" dur="8s" repeatCount="indefinite" />
            </stop>
            <stop offset="100%" stop-color="#1E1A29">
                <animate attributeName="stop-color" values="#1E1A29;#151221;#1E1A29" dur="10s" repeatCount="indefinite" />
            </stop>
        </radialGradient>

        <linearGradient id="glassBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
            <stop offset="40%" stop-color="#C7CEEA" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.2"/>
        </linearGradient>

        <linearGradient id="champagneGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFB7B2" stop-opacity="0.95"/>
            <stop offset="50%" stop-color="#FF9AA2" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#FFB7B2" stop-opacity="0.95"/>
            <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
        </linearGradient>

        <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
            <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.4"/>
        </linearGradient>

        <linearGradient id="featherGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFB7B2" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#C7CEEA" stop-opacity="0.8"/>
        </linearGradient>

        <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#C7CEEA" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#FFB7B2" stop-opacity="0.95"/>
        </linearGradient>

        <linearGradient id="pearlGrad" x1="20%" y1="20%" x2="80%" y2="80%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#C7CEEA"/>
        </linearGradient>

        <radialGradient id="cherryGlow" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#E6E6FA"/>
            <stop offset="60%" stop-color="#D8BFD8"/>
            <stop offset="100%" stop-color="#9B59B6"/>
        </radialGradient>

        <!-- Filters -->
        <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="25" result="blur1"/>
            <feGaussianBlur stdDeviation="15" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur1"/>
                <feMergeNode in="blur2"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="neonFlicker" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="smokeBlur" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="12"/>
        </filter>

        <filter id="surfaceBlur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6"/>
        </filter>

        <!-- Reusable Paths & Shapes -->
        <path id="featherPath" d="M 0,0 C -20,-30 -40,-60 -30,-100 C -25,-120 -10,-140 0,-160 C 10,-140 25,-120 30,-100 C 40,-60 20,-30 0,0 Z"/>
    </defs>

    <!-- Background Layer -->
    <rect width="100%" height="100%" fill="#1E1A29"/>
    <rect width="100%" height="100%" fill="url(#bgGlow)"/>
    <circle cx="800" cy="450" r="400" fill="#C7CEEA" opacity="0.05" filter="url(#softGlow)">
        <animate attributeName="r" values="400;430;400" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.05;0.08;0.05" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Surface / Table -->
    <g id="surface">
        <ellipse cx="800" cy="850" rx="600" ry="120" fill="#161222" filter="url(#surfaceBlur)"/>
        <ellipse cx="800" cy="840" rx="550" ry="100" fill="url(#surfaceBlur)" stroke="#C7CEEA" stroke-width="2" opacity="0.3" filter="url(#neonFlicker)"/>
        <!-- Reflection of glass base -->
        <ellipse cx="800" cy="840" rx="80" ry="15" fill="#FFB7B2" opacity="0.2" filter="url(#softGlow)"/>
        <ellipse cx="800" cy="840" rx="80" ry="15" fill="#FFFFFF" opacity="0.4" filter="url(#softGlow)">
            <animate attributeName="rx" values="80;90;80" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.4;0.2;0.4" dur="4s" repeatCount="indefinite"/>
        </ellipse>
    </g>

    <!-- Decorative Pearls -->
    <g id="pearls" filter="url(#softGlow)">
        <circle cx="650" cy="830" r="15" fill="url(#pearlGrad)"/>
        <circle cx="680" cy="845" r="18" fill="url(#pearlGrad)"/>
        <circle cx="720" cy="835" r="14" fill="url(#pearlGrad)"/>
        <circle cx="900" cy="840" r="16" fill="url(#pearlGrad)">
            <animate attributeName="cy" values="840;830;840" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="940" cy="850" r="20" fill="url(#pearlGrad)">
            <animate attributeName="cy" values="850;840;850" dur="6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="980" cy="825" r="15" fill="url(#pearlGrad)"/>
        <path d="M 650,830 Q 680,780 680,845" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
        <path d="M 900,840 Q 940,780 940,850" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
    </g>

    <!-- Back Feathers -->
    <g id="backFeathers" filter="url(#softGlow)">
        <g transform="translate(500, 750) rotate(-45)">
            <use href="#featherPath" fill="url(#featherGrad)" opacity="0.6" transform="scale(2.5)"/>
            <animateTransform attributeName="transform" type="translate" values="500,750; 490,740; 500,750" dur="7s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="rotate" values="-45;-40;-45" dur="7s" repeatCount="indefinite" additive="sum"/>
        </g>
        <g transform="translate(1100, 780) rotate(45)">
            <use href="#featherPath" fill="url(#featherGrad)" opacity="0.6" transform="scale(2)"/>
            <animateTransform attributeName="transform" type="translate" values="1100,780; 1110,770; 1100,780" dur="8s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="rotate" values="45;50;45" dur="8s" repeatCount="indefinite" additive="sum"/>
        </g>
    </g>

    <!-- Back Satin Ribbon -->
    <g id="ribbonBack">
        <path d="M 400,900 C 500,700 600,850 800,820 C 1000,790 1200,650 1400,900 Z" fill="url(#ribbonGrad)" opacity="0.7" filter="url(#smokeBlur)"/>
        <path d="M 400,900 C 500,700 600,850 800,820 C 1000,790 1200,650 1400,900 Z" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
        <animate attributeName="opacity" values="0.7;0.5;0.7" dur="6s" repeatCount="indefinite"/>
    </g>

    <!-- Main Champagne Glass -->
    <g id="champagneGlass" transform="translate(800, 500)">
        
        <!-- Glass Base -->
        <path d="M -80,300 C -80,340 80,340 80,300 C 80,270 30,270 10,250 L 10,120 L -10,120 L -10,250 C -30,270 -80,270 -80,300 Z" fill="url(#stemGrad)"/>
        <ellipse cx="0" cy="300" rx="80" ry="15" fill="#FFFFFF" opacity="0.3"/>
        
        <!-- Glass Bowl Back -->
        <path d="M -140,-50 C -140,60 0,120 0,120 C 0,120 140,60 140,-50 Z" fill="url(#glassBodyGrad)"/>
        
        <!-- Champagne Liquid -->
        <g id="liquid">
            <!-- Liquid Body -->
            <path d="M -125,-10 C -125,70 0,115 0,115 C 0,115 125,70 125,-10 Z" fill="url(#champagneGrad)"/>
            
            <!-- Liquid Surface -->
            <ellipse cx="0" cy="-10" rx="125" ry="15" fill="#FFB7B2" opacity="0.8">
                <animate attributeName="ry" values="15;18;15" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="rx" values="125;128;125" dur="4s" repeatCount="indefinite"/>
            </ellipse>
            <ellipse cx="0" cy="-10" rx="100" ry="10" fill="#FFFFFF" opacity="0.4">
                <animate attributeName="rx" values="100;105;100" dur="5s" repeatCount="indefinite"/>
            </ellipse>
        </g>

        <!-- Cherry -->
        <g id="cherry" transform="translate(30, 80)">
            <circle cx="0" cy="0" r="22" fill="url(#cherryGlow)" filter="url(#softGlow)"/>
            <circle cx="-6" cy="-6" r="6" fill="#FFFFFF" opacity="0.8"/>
        </g>

        <!-- Bubbles -->
        <g id="bubbles" fill="#FFFFFF" opacity="0.7">
            <circle cx="-40" cy="80" r="3" filter="url(#softGlow)">
                <animate attributeName="cy" values="80;-20" dur="4s" repeatCount="indefinite" begin="0s"/>
                <animate attributeName="r" values="3;5;0" dur="4s" repeatCount="indefinite" begin="0s"/>
                <animate attributeName="opacity" values="0.7;0;0.7" dur="4s" repeatCount="indefinite" begin="0s"/>
            </circle>
            <circle cx="20" cy="90" r="4" filter="url(#softGlow)">
                <animate attributeName="cy" values="90;-10" dur="5s" repeatCount="indefinite" begin="1s"/>
                <animate attributeName="r" values="4;6;0" dur="5s" repeatCount="indefinite" begin="1s"/>
                <animate attributeName="opacity" values="0.7;0;0.7" dur="5s" repeatCount="indefinite" begin="1s"/>
            </circle>
            <circle cx="-10" cy="60" r="2.5" filter="url(#softGlow)">
                <animate attributeName="cy" values="60;-30" dur="3.5s" repeatCount="indefinite" begin="2s"/>
                <animate attributeName="r" values="2.5;4;0" dur="3.5s" repeatCount="indefinite" begin="2s"/>
                <animate attributeName="opacity" values="0.7;0;0.7" dur="3.5s" repeatCount="indefinite" begin="2s"/>
            </circle>
            <circle cx="50" cy="50" r="3.5" filter="url(#softGlow)">
                <animate attributeName="cy" values="50;-40" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
                <animate attributeName="r" values="3.5;5;0" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
                <animate attributeName="opacity" values="0.7;0;0.7" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
            </circle>
            <circle cx="-60" cy="40" r="2" filter="url(#softGlow)">
                <animate attributeName="cy" values="40;-50" dur="3s" repeatCount="indefinite" begin="1.5s"/>
                <animate attributeName="r" values="2;4;0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
                <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite" begin="1.5s"/>
            </circle>
            <circle cx="0" cy="100" r="4" filter="url(#softGlow)">
                <animate attributeName="cy" values="100;0" dur="5.5s" repeatCount="indefinite" begin="2.5s"/>
                <animate attributeName="r" values="4;6;0" dur="5.5s" repeatCount="indefinite" begin="2.5s"/>
                <animate attributeName="opacity" values="0.7;0;0.7" dur="5.5s" repeatCount="indefinite" begin="2.5s"/>
            </circle>
        </g>

        <!-- Glass Bowl Front Highlights & Reflections -->
        <path d="M -140,-50 C -140,60 0,120 0,120 C 0,120 140,60 140,-50" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4"/>
        <path d="M -110,-20 C -110,50 -20,90 -20,90" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.3" filter="url(#softGlow)"/>
        <path d="M 110,-20 C 110,50 20,90 20,90" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
        
        <!-- Glass Rim -->
        <ellipse cx="0" cy="-50" rx="140" ry="20" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.6"/>
        <ellipse cx="0" cy="-50" rx="140" ry="20" fill="none" stroke="#C7CEEA" stroke-width="2" opacity="0.8" filter="url(#neonFlicker)">
            <animate attributeName="stroke-opacity" values="0.8;0.4;0.8;0.9;0.5;0.8" dur="3s" repeatCount="indefinite"/>
        </ellipse>

        <!-- Condensation Drops -->
        <g id="condensation" fill="#FFFFFF" opacity="0.6" filter="url(#softGlow)">
            <path d="M -100,20 Q -105,30 -100,40 Q -95,30 -100,20 Z">
                <animate attributeName="d" values="M -100,20 Q -105,30 -100,40 Q -95,30 -100,20 Z; M -100,120 Q -105,130 -100,140 Q -95,130 -100,120 Z; M -100,20 Q -105,30 -100,40 Q -95,30 -100,20 Z" dur="8s" repeatCount="indefinite"/>
            </path>
            <path d="M 80,30 Q 75,40 80,50 Q 85,40 80,30 Z">
                <animate attributeName="d" values="M 80,30 Q 75,40 80,50 Q 85,40 80,30 Z; M 80,100 Q 75,110 80,120 Q 85,110 80,100 Z; M 80,30 Q 75,40 80,50 Q 85,40 80,30 Z" dur="10s" repeatCount="indefinite" begin="2s"/>
            </path>
            <circle cx="-60" cy="-10" r="4"/>
            <circle cx="90" cy="10" r="3"/>
            <circle cx="-30" cy="50" r="5"/>
            <circle cx="50" cy="60" r="4"/>
            <circle cx="0" cy="70" r="3"/>
        </g>
    </g>

    <!-- Front Satin Ribbon -->
    <g id="ribbonFront" transform="translate(800, 820)" filter="url(#heavyGlow)">
        <path d="M -200,80 C -100,0 0,40 0,40 C 0,40 100,0 200,80 L 150,200 C 50,150 0,150 0,150 C 0,150 -50,150 -150,200 Z" fill="url(#ribbonGrad)" opacity="0.9"/>
        <path d="M -200,80 C -100,0 0,40 0,40 C 0,40 100,0 200,80" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
        <path d="M -150,200 C -50,150 0,150 0,150 C 0,150 50,150 150,200" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
        <animateTransform attributeName="transform" type="translate" values="800,820; 800,830; 800,820" dur="5s" repeatCount="indefinite"/>
    </g>

    <!-- Front Feathers -->
    <g id="frontFeathers" filter="url(#heavyGlow)">
        <g transform="translate(650, 650) rotate(-15)">
            <use href="#featherPath" fill="url(#featherGrad)" transform="scale(3)"/>
            <path d="M -20,-50 Q 0,-100 20,-50" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
            <animateTransform attributeName="transform" type="translate" values="650,650; 640,640; 650,650" dur="6s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="rotate" values="-15;-10;-15" dur="6s" repeatCount="indefinite" additive="sum"/>
        </g>
        <g transform="translate(950, 680) rotate(20)">
            <use href="#featherPath" fill="url(#featherGrad)" transform="scale(2.8)"/>
            <path d="M -20,-50 Q 0,-100 20,-50" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
            <animateTransform attributeName="transform" type="translate" values="950,680; 960,670; 950,680" dur="7s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="rotate" values="20;25;20" dur="7s" repeatCount="indefinite" additive="sum"/>
        </g>
    </g>

    <!-- Pink Smoke / Steam -->
    <g id="smoke" filter="url(#smokeBlur)" opacity="0.6">
        <path d="M 760,450 C 700,300 900,200 800,100 C 700,0 850,-100 750,-200" fill="none" stroke="#FFB7B2" stroke-width="40" stroke-linecap="round">
            <animate attributeName="d" values="M 760,450 C 700,300 900,200 800,100 C 700,0 850,-100 750,-200; M 760,450 C 750,300 850,200 850,100 C 950,0 750,-100 850,-200; M 760,450 C 700,300 900,200 800,100 C 700,0 850,-100 750,-200" dur="8s" repeatCount="indefinite"/>
            <animate attributeName="stroke-opacity" values="0.6;0.3;0.6" dur="8s" repeatCount="indefinite"/>
        </path>
        <path d="M 840,450 C 900,350 700,250 850,150 C 1000,50 750,-50 850,-150" fill="none" stroke="#C7CEEA" stroke-width="30" stroke-linecap="round">
            <animate attributeName="d" values="M 840,450 C 900,350 700,250 850,150 C 1000,50 750,-50 850,-150; M 840,450 C 800,350 750,250 800,150 C 850,50 900,-50 800,-150; M 840,450 C 900,350 700,250 850,150 C 1000,50 750,-50 850,-150" dur="10s" repeatCount="indefinite"/>
            <animate attributeName="stroke-opacity" values="0.5;0.2;0.5" dur="10s" repeatCount="indefinite"/>
        </path>
    </g>

    <!-- Neon Text / Logo -->
    <g id="neonText" transform="translate(800, 150)" filter="url(#neonFlicker)">
        <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="48" fill="none" stroke="#C7CEEA" stroke-width="2" letter-spacing="8" opacity="0.9">COTTON CANDY
            <animate attributeName="stroke-opacity" values="0.9;0.4;0.9;0.2;0.9" dur="4s" repeatCount="indefinite"/>
        </text>
        <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="32" fill="none" stroke="#FFB7B2" stroke-width="1.5" letter-spacing="12" opacity="0.8">BOUDOIR
            <animate attributeName="stroke-opacity" values="0.8;0.3;0.8;0.5;0.8" dur="5s" repeatCount="indefinite" begin="1s"/>
        </text>
    </g>

    <!-- Foreground Bokeh / Depth of Field -->
    <g id="bokeh" filter="url(#softGlow)">
        <circle cx="200" cy="200" r="80" fill="#C7CEEA" opacity="0.1">
            <animate attributeName="r" values="80;90;80" dur="7s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.1;0.15;0.1" dur="7s" repeatCount="indefinite"/>
        </circle>
        <circle cx="1400" cy="300" r="120" fill="#FFB7B2" opacity="0.08">
            <animate attributeName="r" values="120;130;120" dur="9s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.08;0.12;0.08" dur="9s" repeatCount="indefinite"/>
        </circle>
        <circle cx="100" cy="700" r="60" fill="#FFB7B2" opacity="0.1">
            <animate attributeName="cy" values="700;720;700" dur="6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="1500" cy="750" r="100" fill="#C7CEEA" opacity="0.05">
            <animate attributeName="cy" values="750;730;750" dur="8s" repeatCount="indefinite"/>
        </circle>
    </g>
</svg>