<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="25" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="bokeh">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1A29"/>
      <stop offset="100%" stop-color="#2a2438"/>
      <animate attributeName="x1" values="0;0.1;0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="mirrorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2438"/>
      <stop offset="40%" stop-color="#1E1A29"/>
      <stop offset="100%" stop-color="#0f0d16"/>
      <animate attributeName="x2" values="1;0.9;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="mistGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#FFB7B2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFDAC1" stop-opacity="0"/>
      <animate attributeName="cx" values="50%;52%;48%;50%" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50%;48%;52%;50%" dur="9s" repeatCount="indefinite"/>
    </radialGradient>

    <linearGradient id="crystalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FFB7B2" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#FFDAC1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E1A29" stop-opacity="0.1"/>
      <animate attributeName="x1" values="0;0.1;0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="liquidGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFB7B2"/>
      <stop offset="100%" stop-color="#FFDAC1"/>
      <animate attributeName="y1" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Reusable Objects -->
    <g id="perfumeBottle">
      <!-- Glass Base -->
      <path d="M 250 480 L 350 480 L 380 650 L 220 650 Z" fill="url(#crystalGrad)" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.3"/>
      <path d="M 250 480 L 300 380 L 350 480" fill="#FFFFFF" fill-opacity="0.1"/>
      <path d="M 300 380 L 350 480 L 380 650 L 300 650 Z" fill="#FFFFFF" fill-opacity="0.05"/>
      <path d="M 300 380 L 250 480 L 220 650 L 300 650 Z" fill="#1E1A29" fill-opacity="0.15"/>
      
      <!-- Facets -->
      <path d="M 280 490 L 320 490 L 300 560 Z" fill="#FFFFFF" fill-opacity="0.2"/>
      <path d="M 320 490 L 360 490 L 340 560 Z" fill="#FFFFFF" fill-opacity="0.1"/>
      <path d="M 240 490 L 280 490 L 260 560 Z" fill="#1E1A29" fill-opacity="0.1"/>
      
      <!-- Liquid -->
      <path d="M 255 500 L 345 500 L 370 630 L 230 630 Z" fill="url(#liquidGrad)" opacity="0.6"/>
      <ellipse cx="300" cy="500" rx="45" ry="12" fill="#FFB7B2" opacity="0.5"/>
      
      <!-- Neck -->
      <rect x="285" y="340" width="30" height="40" fill="url(#crystalGrad)" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="290" y="340" width="5" height="40" fill="#FFFFFF" fill-opacity="0.3"/>
      
      <!-- Atomizer Nozzle -->
      <path d="M 285 340 L 315 340 L 320 330 L 280 330 Z" fill="#FFB7B2"/>
      <circle cx="300" cy="330" r="8" fill="#FFDAC1"/>
      
      <!-- Puffer / Squeeze Bulb -->
      <path d="M 270 330 C 240 310, 240 250, 280 240 C 320 230, 340 270, 320 330 Z" fill="#FFDAC1"/>
      <path d="M 280 240 C 300 235, 330 250, 320 330 L 310 330 C 320 260, 300 245, 280 250 Z" fill="#FFB7B2" opacity="0.6"/>
      <path d="M 270 330 C 260 300, 250 270, 280 240" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
      
      <!-- Puffer Ruffles -->
      <path d="M 270 330 Q 285 340 300 330 Q 315 340 320 330" fill="none" stroke="#FFB7B2" stroke-width="3" stroke-linecap="round"/>
      <path d="M 260 310 Q 280 320 300 310 Q 320 320 330 310" fill="none" stroke="#FFB7B2" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
      <path d="M 255 290 Q 275 300 300 290 Q 325 300 335 290" fill="none" stroke="#FFB7B2" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M 260 270 Q 280 280 300 270 Q 320 280 330 270" fill="none" stroke="#FFB7B2" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    </g>

    <g id="tassel">
      <path d="M 300 340 Q 300 380 290 420" fill="none" stroke="#FFB7B2" stroke-width="4" stroke-linecap="round"/>
      <path d="M 305 340 Q 310 380 320 410" fill="none" stroke="#FFDAC1" stroke-width="3" stroke-linecap="round"/>
      <path d="M 295 340 Q 290 370 280 400" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
      <path d="M 300 340 Q 305 375 315 405" fill="none" stroke="#FFB7B2" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Tassel Knots -->
      <circle cx="290" cy="420" r="4" fill="#FFDAC1"/>
      <circle cx="320" cy="410" r="3" fill="#FFB7B2"/>
      <circle cx="280" cy="400" r="3" fill="#FFFFFF"/>
      <circle cx="315" cy="405" r="3.5" fill="#FFB7B2"/>
    </g>

    <g id="feather">
      <path d="M 0 0 C 10 -20, 30 -40, 50 -30 C 30 -10, 15 10, 0 0 Z" fill="#FFB7B2"/>
      <path d="M 0 0 C 15 -15, 35 -35, 55 -25" fill="none" stroke="#FFDAC1" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 5 -5 L 15 -15 M 10 -10 L 20 -20 M 15 -15 L 25 -25" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round"/>
    </g>

    <g id="bokehCircle">
      <circle cx="0" cy="0" r="30" fill="#FFB7B2" opacity="0.3" filter="url(#bokeh)"/>
    </g>
  </defs>

  <!-- Background Room -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  
  <!-- Floor -->
  <path d="M 0 700 L 1600 700 L 1600 900 L 0 900 Z" fill="#171421"/>
  <path d="M 0 700 L 1600 700" stroke="#2a2438" stroke-width="2"/>

  <!-- Wall Molding -->
  <path d="M 100 200 L 1500 200 L 1500 220 L 100 220 Z" fill="#252033"/>
  <path d="M 200 400 L 1400 400 L 1400 410 L 200 410 Z" fill="#252033"/>

  <!-- Spotlight & Atmosphere -->
  <path d="M 800 0 L 200 900 L 1400 900 Z" fill="#FFFFFF" opacity="0.03" filter="url(#softBlur)">
    <animate attributeName="opacity" values="0.03;0.05;0.03" dur="8s" repeatCount="indefinite"/>
  </path>
  <ellipse cx="800" cy="850" rx="700" ry="60" fill="#FFB7B2" opacity="0.08" filter="url(#softBlur)"/>

  <!-- Vanity Table -->
  <g transform="translate(0, 50)">
    <!-- Back Legs -->
    <path d="M 500 650 L 500 850" stroke="#1E1A29" stroke-width="12" stroke-linecap="round"/>
    <path d="M 1100 650 L 1100 850" stroke="#1E1A29" stroke-width="12" stroke-linecap="round"/>
    <!-- Table Top (Back Edge) -->
    <path d="M 450 650 L 1150 650 L 1200 700 L 400 700 Z" fill="#1E1A29"/>
    <!-- Table Apron -->
    <path d="M 400 700 L 1200 700 L 1200 730 L 400 730 Z" fill="#2a2438"/>
    <!-- Front Legs -->
    <path d="M 450 730 L 450 900" stroke="#2a2438" stroke-width="16" stroke-linecap="round"/>
    <path d="M 1150 730 L 1150 900" stroke="#2a2438" stroke-width="16" stroke-linecap="round"/>
    <!-- Table Top (Front Edge) -->
    <path d="M 400 730 L 1200 730 L 1250 780 L 350 780 Z" fill="#3a3250"/>
    <path d="M 400 730 L 1200 730" stroke="#FFDAC1" stroke-width="2" stroke-opacity="0.2"/>
  </g>

  <!-- Mirror -->
  <g transform="translate(800, 250)">
    <!-- Frame -->
    <ellipse cx="0" cy="0" rx="160" ry="220" fill="none" stroke="#FFDAC1" stroke-width="15" stroke-opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="170" ry="230" fill="none" stroke="#FFB7B2" stroke-width="4" stroke-opacity="0.3"/>
    <!-- Glass -->
    <ellipse cx="0" cy="0" rx="152" ry="212" fill="url(#mirrorGrad)"/>
    <!-- Reflections -->
    <path d="M -80 -100 L -40 -160 L 0 -100 Z" fill="#FFFFFF" fill-opacity="0.05"/>
    <path d="M 40 80 L 80 140 L 120 80 Z" fill="#FFFFFF" fill-opacity="0.03"/>
    <!-- Animated Glow in Mirror -->
    <ellipse cx="0" cy="0" rx="100" ry="140" fill="#FFB7B2" opacity="0.1" filter="url(#glow)">
      <animate attributeName="opacity" values="0.1;0.15;0.1" dur="6s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Perfume Bottle -->
  <use href="#perfumeBottle" transform="translate(550, 180) scale(1.1)"/>

  <!-- Tassel (Attached to Perfume) -->
  <g transform="translate(550, 180)">
    <use href="#tassel">
      <animateTransform attributeName="transform" type="rotate" values="0 300 340; 3 300 340; -2 300 340; 0 300 340" dur="5s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Mist / Clouds -->
  <g transform="translate(900, 350)">
    <!-- Cloud 1 -->
    <path d="M 0 0 C 50 -40, 150 -30, 200 0 C 250 40, 150 80, 100 60 C 50 80, -50 40, 0 0 Z" fill="url(#mistGrad)" filter="url(#softBlur)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0 0; 10 -10; 0 0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="4s" repeatCount="indefinite"/>
    </path>
    <!-- Cloud 2 -->
    <path d="M 50 50 C 100 10, 200 20, 250 50 C 300 90, 200 130, 150 110 C 100 130, 0 90, 50 50 Z" fill="url(#mistGrad)" filter="url(#softBlur)" opacity="0.4">
      <animateTransform attributeName="transform" type="translate" values="0 0; -15 5; 0 0" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="6s" repeatCount="indefinite"/>
    </path>
    <!-- Cloud 3 -->
    <ellipse cx="120" cy="-30" rx="80" ry="40" fill="#FFFFFF" opacity="0.2" filter="url(#softBlur)">
      <animate attributeName="rx" values="80;90;80" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.3;0.2" dur="5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Jewelry / Pearls -->
  <g transform="translate(450, 680)">
    <path d="M 0 0 C 30 -20, 60 20, 90 0 C 120 -20, 150 20, 180 0" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="0 15" stroke-linejoin="round" opacity="0.8">
      <animate attributeName="stroke-dashoffset" values="0;15" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="0" r="5" fill="#FFFFFF"/>
    <circle cx="90" cy="0" r="5" fill="#FFFFFF"/>
    <circle cx="180" cy="0" r="5" fill="#FFFFFF"/>
    
    <!-- Pendant -->
    <path d="M 180 0 L 180 40 L 190 50 L 170 50 Z" fill="#FFDAC1" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" values="0 180 0; 5 180 0; -5 180 0; 0 180 0" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Compact Powder -->
  <g transform="translate(1000, 650)">
    <!-- Base -->
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="#FFDAC1" opacity="0.9"/>
    <ellipse cx="0" cy="-5" rx="55" ry="20" fill="#FFB7B2"/>
    <!-- Lid (Open) -->
    <ellipse cx="0" cy="-60" rx="60" ry="25" fill="#FFFFFF" opacity="0.8" transform="rotate(-30)">
      <animateTransform attributeName="transform" type="rotate" values="-30; -25; -30" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Mirror inside Lid -->
    <ellipse cx="0" cy="-60" rx="50" ry="18" fill="#1E1A29" opacity="0.3" transform="rotate(-30)"/>
    <!-- Puff -->
    <circle cx="20" cy="10" r="25" fill="#FFFFFF" opacity="0.9"/>
    <path d="M 20 10 Q 40 20 50 10" fill="none" stroke="#FFB7B2" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Lipstick -->
  <g transform="translate(1150, 620)">
    <!-- Case -->
    <rect x="-15" y="0" width="30" height="60" rx="5" fill="#FFB7B2" opacity="0.9"/>
    <!-- Cap off -->
    <rect x="-16" y="-50" width="32" height="50" rx="5" fill="#FFDAC1" opacity="0.8" transform="rotate(15)"/>
    <!-- Stick -->
    <path d="M -10 0 L -10 -40 L 10 -40 L 10 0 Z" fill="#1E1A29"/>
    <path d="M -8 0 L -8 -35 Q 0 -45 8 -35 L 8 0 Z" fill="#FFB7B2"/>
    <!-- Gloss -->
    <path d="M -5 -30 L 0 -40 L 5 -30 Z" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- Velvet Chair Back (Left Foreground) -->
  <g transform="translate(200, 500)">
    <!-- Main Shape -->
    <path d="M 0 0 C -50 -100, 150 -150, 200 -50 C 250 50, 100 150, 0 100 Z" fill="#2a2438"/>
    <!-- Tufting -->
    <circle cx="80" cy="0" r="5" fill="#1E1A29" opacity="0.5"/>
    <circle cx="120" cy="-20" r="5" fill="#1E1A29" opacity="0.5"/>
    <circle cx="60" cy="-40" r="5" fill="#1E1A29" opacity="0.5"/>
    <!-- Feathers on Chair -->
    <use href="#feather" transform="translate(180, -80) scale(2) rotate(45)">
      <animateTransform attributeName="transform" type="rotate" values="45 180 -80; 50 180 -80; 45 180 -80" dur="3s" repeatCount="indefinite"/>
    </use>
    <use href="#feather" transform="translate(160, -100) scale(1.5) rotate(30)">
      <animateTransform attributeName="transform" type="rotate" values="30 160 -100; 35 160 -100; 30 160 -100" dur="4s" repeatCount="indefinite"/>
    </use>
    <use href="#feather" transform="translate(190, -60) scale(1.8) rotate(60)">
      <animateTransform attributeName="transform" type="rotate" values="60 190 -60; 55 190 -60; 60 190 -60" dur="3.5s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Drapery / Curtain (Right Foreground) -->
  <g transform="translate(1300, 0)">
    <path d="M 0 0 C 100 100, -50 300, 50 500 C 150 700, 50 900, 100 900 L 300 900 L 300 0 Z" fill="#1E1A29"/>
    <path d="M 0 0 C 100 100, -50 300, 50 500 C 150 700, 50 900, 100 900" fill="none" stroke="#FFDAC1" stroke-width="2" stroke-opacity="0.2"/>
    <!-- Fold highlights -->
    <path d="M 20 100 C 80 200, 20 400, 80 600" fill="none" stroke="#FFB7B2" stroke-width="15" stroke-linecap="round" opacity="0.1" filter="url(#softBlur)"/>
    <path d="M 60 200 C 120 300, 60 500, 120 700" fill="none" stroke="#FFB7B2" stroke-width="20" stroke-linecap="round" opacity="0.08" filter="url(#softBlur)"/>
    <animateTransform attributeName="transform" type="translate" values="1300 0; 1295 0; 1300 0" dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Neon / String Lights -->
  <g>
    <!-- Light 1 -->
    <circle cx="300" cy="100" r="8" fill="#FFB7B2" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="1;0.3;1;0.8;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Light 2 -->
    <circle cx="500" cy="150" r="10" fill="#FFDAC1" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.8;1;0.4;1;0.8" dur="5s" repeatCount="indefinite"/>
    </circle>
    <!-- Light 3 -->
    <circle cx="700" cy="80" r="6" fill="#FFFFFF" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="1;0.5;1;0.2;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Light 4 -->
    <circle cx="900" cy="120" r="9" fill="#FFB7B2" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.5;1;0.5;1;0.5" dur="6s" repeatCount="indefinite"/>
    </circle>
    <!-- Light 5 -->
    <circle cx="1100" cy="90" r="7" fill="#FFDAC1" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="1;0.6;1;0.3;1" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connecting Wire -->
    <path d="M 300 100 Q 400 180 500 150 T 700 80 T 900 120 T 1100 90" fill="none" stroke="#FFB7B2" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="5 5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Floating Bokeh / Dust Motes -->
  <use href="#bokehCircle" x="200" y="300">
    <animateTransform attributeName="transform" type="translate" values="0 0; 20 -30; 0 0" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="8s" repeatCount="indefinite"/>
  </use>
  <use href="#bokehCircle" x="1200" y="400" fill="#FFDAC1">
    <animateTransform attributeName="transform" type="translate" values="0 0; -30 20; 0 0" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="10s" repeatCount="indefinite"/>
  </use>
  <use href="#bokehCircle" x="800" y="200" fill="#FFFFFF" r="20">
    <animateTransform attributeName="transform" type="translate" values="0 0; 10 10; 0 0" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="7s" repeatCount="indefinite"/>
  </use>
  <use href="#bokehCircle" x="400" y="600" fill="#FFB7B2" r="40">
    <animateTransform attributeName="transform" type="translate" values="0 0; -20 -10; 0 0" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="9s" repeatCount="indefinite"/>
  </use>

  <!-- Foreground Elements / Light Leaks -->
  <ellipse cx="1400" cy="800" rx="300" ry="200" fill="#FFB7B2" opacity="0.05" filter="url(#glow)">
    <animate attributeName="opacity" values="0.05;0.08;0.05" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="200" rx="200" ry="150" fill="#FFDAC1" opacity="0.04" filter="url(#glow)">
    <animate attributeName="opacity" values="0.04;0.07;0.04" dur="12s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Perfume Crystal Facet Animations (Glints) -->
  <g transform="translate(550, 180) scale(1.1)">
    <!-- Glint 1 -->
    <polygon points="300,380 320,420 280,420" fill="#FFFFFF" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6;0.3;0.6" dur="5s" repeatCount="indefinite"/>
    </polygon>
    <!-- Glint 2 -->
    <polygon points="250,480 270,520 230,520" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="opacity" values="0;0.4;0;0.4;0" dur="7s" repeatCount="indefinite"/>
    </polygon>
    <!-- Glint 3 -->
    <polygon points="350,480 370,520 330,520" fill="#FFFFFF" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0;0.5;0;0.3" dur="4s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Silk Ribbon (Draped over table) -->
  <g transform="translate(650, 780)">
    <path d="M 0 0 C 50 20, 100 -20, 150 0 C 200 20, 250 -10, 300 10" fill="none" stroke="#FFB7B2" stroke-width="8" stroke-linecap="round" opacity="0.8">
      <animate attributeName="d" values="M 0 0 C 50 20, 100 -20, 150 0 C 200 20, 250 -10, 300 10; M 0 0 C 50 -20, 100 20, 150 0 C 200 -20, 250 10, 300 -10; M 0 0 C 50 20, 100 -20, 150 0 C 200 20, 250 -10, 300 10" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 10 C 50 30, 100 -10, 150 10 C 200 30, 250 0, 300 20" fill="none" stroke="#FFDAC1" stroke-width="5" stroke-linecap="round" opacity="0.6">
      <animate attributeName="d" values="M 0 10 C 50 30, 100 -10, 150 10 C 200 30, 250 0, 300 20; M 0 10 C 50 -10, 100 30, 150 10 C 200 -10, 250 20, 300 0; M 0 10 C 50 30, 100 -10, 150 10 C 200 30, 250 0, 300 20" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Shadow under Perfume Bottle -->
  <ellipse cx="880" cy="710" rx="100" ry="20" fill="#1E1A29" opacity="0.6" filter="url(#softBlur)"/>

  <!-- Shadow under Compact -->
  <ellipse cx="1000" cy="730" rx="70" ry="15" fill="#1E1A29" opacity="0.5" filter="url(#softBlur)"/>

</svg>