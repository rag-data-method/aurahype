<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
<defs>
<filter id="blurStrong" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="70"/>
</filter>
<filter id="blurMed" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="35"/>
</filter>
<filter id="noise">
<feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="4" seed="5">
<animate attributeName="baseFrequency" values="0.008;0.012;0.008" dur="20s" repeatCount="indefinite"/>
</feTurbulence>
<feColorMatrix type="saturate" values="0"/>
<feComponentTransfer>
<feFuncA type="linear" slope="0.08"/>
</feComponentTransfer>
</filter>
</defs>
<rect width="1600" height="900" fill="#FFF5EB"/>
<path fill="#B85440" opacity="0.65" filter="url(#blurStrong)" d="M0,380 Q400,250 800,420 T1600,360 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="translate" values="0,0; 60,-40; 0,0" dur="9s" repeatCount="indefinite"/>
</path>
<path fill="#B85440" opacity="0.8" filter="url(#blurMed)" d="M0,320 Q300,180 600,380 T1200,300 T1600,380 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="translate" values="0,0; -50,30; 0,0" dur="7s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.8;0.9;0.8" dur="5s" repeatCount="indefinite"/>
</path>
<path fill="#FF7F00" opacity="0.85" filter="url(#blurStrong)" d="M0,260 Q500,140 1000,340 T1600,240 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="translate" values="0,0; 40,50; 0,0" dur="8s" repeatCount="indefinite"/>
</path>
<path fill="#FF7F00" opacity="0.95" filter="url(#blurMed)" d="M0,180 Q400,80 800,280 T1600,160 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="skewX" values="0;6;0" dur="6s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.95;1;0.95" dur="4s" repeatCount="indefinite"/>
</path>
<path fill="#FA8072" opacity="0.9" filter="url(#blurStrong)" d="M0,140 Q600,240 1200,90 T1600,190 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="translate" values="0,0; -30,40; 0,0" dur="10s" repeatCount="indefinite"/>
</path>
<path fill="#FA8072" opacity="0.95" filter="url(#blurMed)" d="M0,90 Q300,40 600,190 T1200,70 T1600,140 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="scale" values="1,1; 1.08,1; 1,1" dur="5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.95;0.85;0.95" dur="3s" repeatCount="indefinite"/>
</path>
<path fill="#FFB088" opacity="0.8" filter="url(#blurStrong)" d="M0,230 Q400,330 800,180 T1600,280 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="translate" values="0,0; 70,-30; 0,0" dur="7s" repeatCount="indefinite"/>
</path>
<path fill="#FFB088" opacity="0.85" filter="url(#blurMed)" d="M0,40 Q500,140 1000,40 T1600,110 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="translate" values="0,0; 0,50; 0,0" dur="6s" repeatCount="indefinite"/>
</path>
<path fill="#FF7F00" opacity="0.9" filter="url(#blurMed)" d="M-100,170 Q300,70 700,240 T1700,140 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="translate" values="0,0; 50,10; 0,0" dur="8s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.9;0.75;0.9" dur="4s" repeatCount="indefinite"/>
</path>
<path fill="#FA8072" opacity="1" filter="url(#blurMed)" d="M0,110 Q400,190 800,70 T1600,170 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="skewY" values="0;4;0" dur="5s" repeatCount="indefinite"/>
</path>
<path fill="#FFB088" opacity="0.9" filter="url(#blurStrong)" d="M0,300 Q300,380 600,260 T1200,340 T1600,270 L1600,900 L0,900 Z">
<animateTransform attributeName="transform" type="translate" values="0,0; -40,-30; 0,0" dur="6s" repeatCount="indefinite"/>
</path>
<rect width="1600" height="900" fill="#B85440" opacity="0" filter="url(#noise)">
<animate attributeName="opacity" values="0.05;0.1;0.05" dur="10s" repeatCount="indefinite"/>
</rect>
</svg>