<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="8" result="blur"/>
<feOffset dx="0" dy="12" result="offsetBlur"/>
<feFlood flood-color="#0a0806" flood-opacity="0.6"/>
<feComposite in2="offsetBlur" operator="in"/>
<feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
<feGaussianBlur stdDeviation="24" result="coloredBlur"/>
<feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="3"/>
</filter>
<radialGradient id="lightPool" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#F4A261" stop-opacity="0.35"/>
<stop offset="60%" stop-color="#D4A017" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#1A1614" stop-opacity="0"/>
</radialGradient>
<linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#F4A261"/>
<stop offset="50%" stop-color="#D4A017"/>
<stop offset="100%" stop-color="#5D4A24"/>
</linearGradient>
<linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#D4A017" stop-opacity="0.9"/>
<stop offset="100%" stop-color="#5D4A24" stop-opacity="0.3"/>
</linearGradient>
<radialGradient id="lampBeam" cx="50%" cy="0%" r="80%" fx="50%" fy="0%">
<stop offset="0%" stop-color="#F4A261" stop-opacity="0.25"/>
<stop offset="40%" stop-color="#D4A017" stop-opacity="0.1"/>
<stop offset="100%" stop-color="#1A1614" stop-opacity="0"/>
</radialGradient>
</defs>

<!-- Background vignette -->
<rect width="1600" height="900" fill="#1A1614"/>
<ellipse cx="800" cy="650" rx="600" ry="300" fill="url(#lightPool)">
<animate attributeName="opacity" values="0.8;1;0.8" dur="6s" repeatCount="indefinite"/>
<animate attributeName="rx" values="600;620;600" dur="8s" repeatCount="indefinite"/>
</ellipse>

<!-- Lamp light cone -->
<path d="M 1200,100 L 1400,900 L 500,900 Z" fill="url(#lampBeam)" filter="url(#soft)" opacity="0.6">
<animate attributeName="opacity" values="0.5;0.7;0.55;0.65;0.5" dur="4s" repeatCount="indefinite"/>
<animateTransform attributeName="transform" type="rotate" values="2 1200 100; -2 1200 100; 2 1200 100" dur="7s" repeatCount="indefinite"/>
</path>

<!-- Book Shadow -->
<ellipse cx="800" cy="720" rx="320" ry="80" fill="#0a0806" opacity="0.5" filter="url(#soft)">
<animate attributeName="rx" values="320;330;320" dur="5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.5;0.45;0.5" dur="5s" repeatCount="indefinite"/>
</ellipse>

<!-- Book Group -->
<g transform="translate(800,600)">
<animateTransform attributeName="transform" type="translate" values="800,600; 800,595; 800,600" dur="6s" repeatCount="indefinite" additive="replace"/>
<!-- Back cover -->
<path d="M -300,-20 C -300,-30 300,-30 300,-20 L 280,180 C 280,195 -280,195 -280,180 Z" fill="#3d2f18" stroke="#1A1614" stroke-width="2"/>
<!-- Pages block left -->
<path d="M -280,-10 L -20,-10 L -20,170 L -260,170 C -270,170 -275,165 -280,150 Z" fill="#5D4A24" opacity="0.9"/>
<!-- Pages block right -->
<path d="M 20,-10 L 280,-10 L 280,150 C 275,165 270,170 260,170 L 20,170 Z" fill="#5D4A24" opacity="0.9"/>
<!-- Left page spread -->
<path d="M -260,0 Q -130,10 0,15 Q -130,20 -260,30 Z" fill="url(#pageGrad)">
<animate attributeName="d" values="M -260,0 Q -130,10 0,15 Q -130,20 -260,30 Z; M -260,0 Q -130,5 0,15 Q -130,25 -260,30 Z; M -260,0 Q -130,10 0,15 Q -130,20 -260,30 Z" dur="5s" repeatCount="indefinite"/>
</path>
<!-- Right page spread -->
<path d="M 260,0 Q 130,10 0,15 Q 130,20 260,30 Z" fill="url(#pageGrad)">
<animate attributeName="d" values="M 260,0 Q 130,10 0,15 Q 130,20 260,30 Z; M 260,0 Q 130,15 0,15 Q 130,25 260,30 Z; M 260,0 Q 130,10 0,15 Q 130,20 260,30 Z" dur="5.5s" repeatCount="indefinite"/>
</path>
<!-- Page lines left -->
<g opacity="0.6">
<line x1="-240" y1="20" x2="-40" y2="25" stroke="#5D4A24" stroke-width="1.5" opacity="0.5"/>
<line x1="-240" y1="35" x2="-30" y2="40" stroke="#5D4A24" stroke-width="1.5" opacity="0.5"/>
<line x1="-240" y1="50" x2="-35" y2="55" stroke="#5D4A24" stroke-width="1.5" opacity="0.5"/>
<animate attributeName="opacity" values="0.5;0.6;0.5" dur="4s" repeatCount="indefinite"/>
</g>
<!-- Page lines right -->
<g opacity="0.6">
<line x1="40" y1="25" x2="240" y2="20" stroke="#5D4A24" stroke-width="1.5" opacity="0.5"/>
<line x1="30" y1="40" x2="240" y2="35" stroke="#5D4A24" stroke-width="1.5" opacity="0.5"/>
<line x1="35" y1="55" x2="240" y2="50" stroke="#5D4A24" stroke-width="1.5" opacity="0.5"/>
</g>
<!-- Spine -->
<path d="M -20,-15 Q 0,-10 20,-15 L 20,175 Q 0,180 -20,175 Z" fill="#2a2010"/>
</g>

<!-- Hourglass Shadow -->
<ellipse cx="980" cy="635" rx="45" ry="15" fill="#0a0806" opacity="0.4" filter="url(#soft)">
<animate attributeName="rx" values="45;48;45" dur="3s" repeatCount="indefinite"/>
<animate attributeName="cx" values="980;982;980" dur="6s" repeatCount="indefinite"/>
</ellipse>

<!-- Hourglass Group -->
<g transform="translate(980,580)">
<animateTransform attributeName="transform" type="translate" values="980,580; 980,575; 980,580" dur="6s" repeatCount="indefinite"/>
<animateTransform attributeName="transform" type="rotate" values="-1 0 50; 1 0 50; -1 0 50" dur="8s" repeatCount="indefinite" additive="sum"/>
<!-- Base -->
<rect x="-30" y="85" width="60" height="8" rx="2" fill="url(#brass)" opacity="0.95"/>
<rect x="-25" y="78" width="50" height="7" rx="1" fill="#D4A017"/>
<!-- Top bulb -->
<path d="M -25,0 L 25,0 L 20,35 L 0,40 L -20,35 Z" fill="#D4A017" opacity="0.3" stroke="#F4A261" stroke-width="1"/>
<ellipse cx="0" cy="0" rx="25" ry="5" fill="#F4A261" opacity="0.8"/>
<!-- Bottom bulb -->
<path d="M -20,45 L 0,50 L 20,45 L 25,80 L -25,80 Z" fill="#D4A017" opacity="0.3" stroke="#F4A261" stroke-width="1"/>
<!-- Sand in top (depleting) -->
<path d="M -22,2 L 22,2 L 18,30 L 0,35 L -18,30 Z" fill="#D4A017" opacity="0.9">
<animate attributeName="d" values="M -22,2 L 22,2 L 18,30 L 0,35 L -18,30 Z; M -22,2 L 22,2 L 18,25 L 0,30 L -18,25 Z; M -22,2 L 22,2 L 18,30 L 0,35 L -18,30 Z" dur="20s" repeatCount="indefinite"/>
</path>
<!-- Sand stream -->
<line x1="0" y1="35" x2="0" y2="50" stroke="#F4A261" stroke-width="2" opacity="0.8">
<animate attributeName="opacity" values="0.6;1;0.6" dur="0.5s" repeatCount="indefinite"/>
<animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="0.3s" repeatCount="indefinite"/>
</line>
<!-- Sand pile bottom -->
<path d="M -20,78 L 0,60 L 20,78 Z" fill="#D4A017" opacity="0.95">
<animate attributeName="d" values="M -20,78 L 0,70 L 20,78 Z; M -20,78 L 0,60 L 20,78 Z; M -20,78 L 0,55 L 20,78 Z" dur="25s" repeatCount="indefinite"/>
</path>
<!-- Falling sand particles -->
<circle cx="0" cy="40" r="1.5" fill="#F4A261" opacity="0.9">
<animate attributeName="cy" values="35;50" dur="1.5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="1;0" dur="1.5s" repeatCount="indefinite"/>
</circle>
<circle cx="1" cy="38" r="1" fill="#F4A261" opacity="0.8">
<animate attributeName="cy" values="35;50" dur="1.2s" begin="0.5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="1;0" dur="1.2s" begin="0.5s" repeatCount="indefinite"/>
</circle>
<circle cx="-1" cy="42" r="1.2" fill="#D4A017" opacity="0.9">
<animate attributeName="cy" values="35;50" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="1;0" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
</circle>
<!-- Top cap -->
<rect x="-28" y="-5" width="56" height="6" rx="1" fill="url(#brass)"/>
<animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite"/>
</g>

<!-- Dust motes in light -->
<g opacity="0.6" filter="url(#soft)">
<circle cx="900" cy="400" r="2" fill="#F4A261">
<animate attributeName="cy" values="400;450;400" dur="8s" repeatCount="indefinite"/>
<animate attributeName="cx" values="900;920;900" dur="10s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite"/>
</circle>
<circle cx="1000" cy="300" r="1.5" fill="#D4A017">
<animate attributeName="cy" values="300;380;300" dur="12s" repeatCount="indefinite"/>
<animate attributeName="cx" values="1000;980;1000" dur="9s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;0.6;0" dur="12s" repeatCount="indefinite"/>
</circle>
<circle cx="850" cy="500" r="1" fill="#F4A261">
<animate attributeName="cy" values="500;550;500" dur="15s" repeatCount="indefinite"/>
<animate attributeName="cx" values="850;870;850" dur="11s" repeatCount="indefinite"/>
</circle>
<circle cx="1100" cy="450" r="1.8" fill="#F4A261" opacity="0.7">
<animate attributeName="cy" values="450;500;450" dur="9s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
</circle>
</g>

<!-- Warm glow overlay -->
<rect x="600" y="400" width="600" height="400" fill="url(#lightPool)" filter="url(#glow)" opacity="0.3" style="mix-blend-mode: screen">
<animate attributeName="opacity" values="0.2;0.35;0.25;0.3;0.2" dur="5s" repeatCount="indefinite"/>
</rect>

<!-- Page corner flutter -->
<path d="M 1060,615 L 1080,610 L 1075,630 Z" fill="#D4A017" opacity="0.7">
<animate attributeName="d" values="M 1060,615 L 1080,610 L 1075,630 Z; M 1060,615 L 1085,608 L 1078,632 Z; M 1060,615 L 1080,610 L 1075,630 Z" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
</path>

</svg>