<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="highlightBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    
    <linearGradient id="shaftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6F2A"/>
      <stop offset="40%" stop-color="#D4A017"/>
      <stop offset="60%" stop-color="#FFFBEB"/>
      <stop offset="80%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6F2A"/>
      <animate attributeName="x1" values="0%;5%;0%;-5%;0%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    
    <radialGradient id="bowGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFBEB" opacity="0.9"/>
      <stop offset="50%" stop-color="#D4A017" opacity="0.95"/>
      <stop offset="100%" stop-color="#8B6F2A" opacity="0.9"/>
      <animate attributeName="cx" values="35%;40%;35%;30%;35%" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="35%;30%;35%;40%;35%" dur="7s" repeatCount="indefinite"/>
    </radialGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF7EE"/>
  
  <ellipse cx="800" cy="720" rx="140" ry="35" fill="#8B6F2A" opacity="0.15" filter="url(#shadowBlur)">
    <animate attributeName="rx" values="140;110;140" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="35;28;35" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.08;0.15" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <g transform="translate(800,450)">
    <animateTransform attributeName="transform" type="translate" values="800,450;800,400;800,450" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-6;6;-6" dur="8s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="scale" values="1,1;0.95,1;1,1" dur="6s" repeatCount="indefinite" additive="sum"/>
    
    <circle r="180" fill="#FFFBEB" opacity="0.2" filter="url(#glowBlur)">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="180;200;180" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <g>
      <rect x="-18" y="-100" width="36" height="220" rx="18" fill="url(#shaftGrad)"/>
      
      <rect x="-10" y="-90" width="6" height="200" fill="#FFFBEB" opacity="0.5" filter="url(#highlightBlur)">
        <animate attributeName="opacity" values="0.5;0.7;0.5" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-10;-6;-10" dur="6s" repeatCount="indefinite"/>
      </rect>
      
      <rect x="-25" y="-90" width="50" height="24" rx="12" fill="#D4A017"/>
      <rect x="-25" y="-90" width="50" height="24" rx="12" fill="url(#shaftGrad)" opacity="0.6"/>
      
      <g transform="translate(0,-130)">
        <circle r="55" fill="url(#bowGrad)"/>
        <circle r="55" fill="none" stroke="#8B6F2A" stroke-width="3" opacity="0.6"/>
        <circle r="40" fill="#FBF7EE"/>
        <circle r="40" fill="none" stroke="#D4A017" stroke-width="4"/>
        <circle r="30" fill="url(#bowGrad)" opacity="0.8"/>
        <circle r="15" fill="#8B6F2A">
          <animate attributeName="fill" values="#8B6F2A;#D4A017;#8B6F2A" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle r="15" fill="url(#bowGrad)" opacity="0.3"/>
        
        <ellipse cx="-20" cy="-20" rx="12" ry="8" fill="#FFFBEB" opacity="0.7" filter="url(#highlightBlur)">
          <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
        </ellipse>
      </g>
      
      <g transform="translate(0,90)">
        <path d="M-18,0 L-18,70 L-30,70 L-30,50 L-24,50 L-24,35 L-30,35 L-30,20 L-24,20 L-24,0 Z" fill="#D4A017"/>
        <path d="M-18,0 L-18,70 L-30,70 L-30,50 L-24,50 L-24,35 L-30,35 L-30,20 L-24,20 L-24,0 Z" fill="url(#shaftGrad)" opacity="0.5"/>
        
        <rect x="-28" y="20" width="8" height="10" fill="#8B6F2A"/>
        <rect x="-28" y="35" width="8" height="10" fill="#8B6F2A"/>
        <rect x="-28" y="50" width="6" height="12" fill="#8B6F2A"/>
        
        <rect x="-29" y="20" width="3" height="10" fill="#FFFBEB" opacity="0.9">
          <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
        </rect>
        <rect x="-29" y="35" width="3" height="10" fill="#FFFBEB" opacity="0.9">
          <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
        </rect>
      </g>
      
      <g transform="translate(0,150)">
        <ellipse cx="0" cy="0" rx="14" ry="10" fill="#8B6F2A"/>
        <ellipse cx="0" cy="0" rx="14" ry="10" fill="url(#shaftGrad)"/>
        <ellipse cx="-5" cy="-3" rx="5" ry="3" fill="#FFFBEB" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3.5s" repeatCount="indefinite"/>
        </ellipse>
      </g>
      
      <g fill="#FFFBEB">
        <polygon points="0,160 -10,170 0,180 10,170" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="0;1.2;0" dur="3s" begin="0s" repeatCount="indefinite" additive="sum"/>
          <animateTransform attributeName="transform" type="rotate" values="0;180;360" dur="3s" begin="0s" repeatCount="indefinite" additive="sum"/>
        </polygon>
        
        <polygon points="-50,-130 -58,-120 -50,-110 -42,-120" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite" additive="sum"/>
        </polygon>
        
        <polygon points="25,-40 20,-32 25,-24 30,-32" opacity="0">
          <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="rotate" values="0;90;180" dur="2.5s" begin="0.5s" repeatCount="indefinite" additive="sum"/>
        </polygon>
      </g>
    </g>
  </g>
</svg>