<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="goldSide" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#5D4A24"/>
<stop offset="30%" stop-color="#D4A017"/>
<stop offset="60%" stop-color="#D4A017"/>
<stop offset="100%" stop-color="#5D4A24"/>
</linearGradient>
<radialGradient id="goldTop" cx="30%" cy="30%" r="70%">
<stop offset="0%" stop-color="#FAFAFA" stop-opacity="0.9"/>
<stop offset="20%" stop-color="#D4A017"/>
