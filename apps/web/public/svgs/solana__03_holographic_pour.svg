    <animate attributeName="d" values="M 500,400 C 700,320 950,340 1150,420 C 1050,500 800,540 600,500 C 500,470 450,430 500,400 Z;M 520,380 C 720,300 970,320 1170,400 C 1070,480 820,520 620,480 C 520,450 470,410 520,380 Z;M 500,400 C 700,320 950,340 1150,420 C 1050,500 800,540 600,500 C 500,470 450,430 500,400 Z" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;0.92;0.75" dur="5s" repeatCount="indefinite"/>
