    <animate attributeName="cy" values="440;430;440" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1150" cy="520" r="5" fill="#FFFFFF" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="350" r="4" fill="#FFFFFF" opacity="0.6">
