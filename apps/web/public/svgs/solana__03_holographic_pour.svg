    <animate attributeName="d" values="M -100,600 C 200,550 500,750 800,780 C 1100,810 1000,950 700,1000 C 300,1050 -100,950 -100,800 Z;M -100,650 C 250,600 550,800 850,830 C 1150,860 1050,1000 750,1050 C 350,1100 -100,1000 -100,850 Z;M -100,600 C 200,550 500,750 800,780 C 1100,810 1000,950 700,1000 C 300,1050 -100,950 -100,800 Z" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.85;0.7" dur="8s" repeatCount="indefinite"/>
  </path>

  <path fill="url(#g6)" filter="url(#blur30)" opacity="0.85" d="M -100,850 C 250,780 600,900 900,820 C 1200,740 1500,850 1700,780 L 1700,950 C 1400,1000 1100,920 800,980 C 500,1040 200,950 -100,1000 Z">
    <animate attributeName="d" values="M -100,850 C 250,780 600,900 900,820 C 1200,740 1500,850 1700,780 L 1700,950 C 1400,1000 1100,920 800,980 C 500,1040 200,950 -100,1000 Z;M -100,820 C 300,760 650,880 950,800 C 1250,720 1550,830 1700,760 L 1700,930 C 1450,980 1150,900 850,960 C 550,1020 250,930 -100,980 Z;M -100,850 C 250,780 600,900 900,820 C 1200,740 1500,850 1700,780 L 1700,950 C 1400,1000 1100,920 800,980 C 500,1040 200,950 -100,1000 Z" dur="10s" repeatCount="indefinite"/>
    <animateTransform type="translate" values="0,0;0,-30;0,0" dur="9s" repeatCount="indefinite" additive="sum"/>
  </path>

  <path fill="#FF36F9" filter="url(#blur30)" opacity="0.75" d="M 1000,200 C 1200,150 1400,250 1500,450 C 1300,400 1100,350 1000,200 Z">
    <animate attributeName="d" values="M 1000,200 C 1200,150 1400,250 1500,450 C 1300,400 1100,350 1000,200 Z;M 1050,180 C 1250,130 1450,230 1550,430 C 1350,380 1150,330 1050,180 Z;M 1000,200 C 1200,150 1400,250 1500,450 C 1300,400 1100,350 1000,200 Z" dur="8s" repeatCount="indefinite"/>
