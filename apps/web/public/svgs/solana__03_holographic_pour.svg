    <animate attributeName="d" values="M -300,-100 C 100,-150 500,50 800,200 C 1100,350 900,600 500,650 C 100,700 -200,500 -300,300 C -400,100 -200,-50 -300,-100 Z;M -300,-50 C 50,-200 450,0 750,180 C 1050,360 850,620 450,700 C 50,780 -250,550 -350,350 C -450,150 -200,0 -300,-50 Z;M -300,-100 C 100,-150 500,50 800,200 C 1100,350 900,600 500,650 C 100,700 -200,500 -300,300 C -400,100 -200,-50 -300,-100 Z" dur="10s" repeatCount="indefinite"/>
