<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wingLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C7689A;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#2C3E5C;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#2C3E5C;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="wingRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C7689A;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#2C3E5C;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#2C3E5C;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wingEdge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF5F0"/>
  
  <g>
    <animateTransform attributeName="transform" type="translate" values="800,450; 840,430; 800,450" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="4s" repeatCount="indefinite" additive="sum" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="3s" repeatCount="indefinite" additive="sum"/>
    
    <g transform="translate(-8,0)">
      <animateTransform attributeName="transform" type="rotate" values="0 -8 0; 28 -8 0; 0 -8 0" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
      <g transform="scale(2)">
        <path d="M 0,0 C -90,-110 -200,-150 -240,-80 C -260,-40 -220,30 -180,50 C -160,60 -140,50 -120,30 C -100,90 -60,140 0,170 C 30,140 60,100 70,50 C 60,30 40,10 0,0 Z" fill="url(#wingLeft)" opacity="0.9"/>
        <path d="M -70,-50 Q -110,-70 -130,-30 Q -110,-10 -70,-50" fill="#2C3E5C" opacity="0.85"/>
        <path d="M -50,50 Q -90,70 -110,110 Q -70,90 -50,50" fill="#2C3E5C" opacity="0.8"/>
        <circle cx="-150" cy="-50" r="10" fill="#F4D03F" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-70" cy="30" r="6" fill="#F4D03F" opacity="0.75"/>
        <circle cx="-130" cy="50" r="7" fill="#F4D03F" opacity="0.7"/>
        <path d="M 0,0 C -90,-110 -200,-150 -240,-80 C -260,-40 -220,30 -180,50 C -160,60 -140,50 -120,30 C -100,90 -60,140 0,170" fill="none" stroke="#C7689A" stroke-width="4" opacity="0.5" filter="url(#wingEdge)"/>
      </g>
    </g>
    
    <g transform="translate(8,0)">
      <animateTransform attributeName="transform" type="rotate" values="0 8 0; -28 8 0; 0 8 0" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
      <g transform="scale(2)">
        <path d="M 0,0 C 90,-110 200,-150 240,-80 C 260,-40 220,30 180,50 C 160,60 140,50 120,30 C 100,90 60,140 0,170 C -30,140 -60,100 -70,50 C -60,30 -40,10 0,0 Z" fill="url(#wingRight)" opacity="0.9"/>
        <path d="M 70,-50 Q 110,-70 130,-30 Q 110,-10 70,-50" fill="#2C3E5C" opacity="0.85"/>
        <path d="M 50,50 Q 90,70 110,110 Q 70,90 50,50" fill="#2C3E5C" opacity="0.8"/>
        <circle cx="150" cy="-50" r="10" fill="#F4D03F" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="70" cy="30" r="6" fill="#F4D03F" opacity="0.75"/>
        <circle cx="130" cy="50" r="7" fill="#F4D03F" opacity="0.7"/>
        <path d="M 0,0 C 90,-110 200,-150 240,-80 C 260,-40 220,30 180,50 C 160,60 140,50 120,30 C 100,90 60,140 0,170" fill="none" stroke="#C7689A" stroke-width="4" opacity="0.5" filter="url(#wingEdge)"/>
      </g>
    </g>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0; 4; 0; -4; 0" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <ellipse cx="0" cy="25" rx="14" ry="85" fill="#1A1A2E" opacity="0.95" filter="url(#softShadow)"/>
      <ellipse cx="0" cy="25" rx="10" ry="75" fill="#2C3E5C" opacity="0.5"/>
      <circle cx="0" cy="-60" r="16" fill="#1A1A2E" opacity="0.95"/>
      <circle cx="-5" cy="-64" r="4" fill="#F4D03F" opacity="0.9"/>
      <circle cx="5" cy="-64" r="4" fill="#F4D03F" opacity="0.9"/>
      <path d="M -7,-70 Q -25,-100 -40,-115" fill="none" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round">
        <animate attributeName="d" values="M -7,-70 Q -25,-100 -40,-115; M -7,-70 Q -22,-105 -37,-120; M -7,-70 Q -25,-100 -40,-115" dur="0.4s" repeatCount="indefinite"/>
      </path>
      <path d="M 7,-70 Q 25,-100 40,-115" fill="none" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round">
        <animate attributeName="d" values="M 7,-70 Q 25,-100 40,-115; M 7,-70 Q 22,-105 37,-120; M 7,-70 Q 25,-100 40,-115" dur="0.4s" repeatCount="indefinite" begin="0.2s"/>
      </path>
      <circle cx="-40" cy="-115" r="4" fill="#F4D03F" opacity="0.8" filter="url(#glow)">
        <animate attributeName="cy" values="-115;-120;-115" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="-115" r="4" fill="#F4D03F" opacity="0.8" filter="url(#glow)">
        <animate attributeName="cy" values="-115;-120;-115" dur="0.4s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
    </g>
    
    <circle cx="-250" cy="-150" r="6" fill="#F4D03F" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-150;-180;-150" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="-120" r="5" fill="#F4D03F" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="cy" values="-120;-150;-120" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="0" cy="200" r="8" fill="#C7689A" opacity="0" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
</svg>