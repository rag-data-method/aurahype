<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="0.75" cy="0.25" r="0.85">
      <stop offset="0%" stop-color="#F5C97A">
        <animate attributeName="stop-color" values="#F5C97A;#C8DCC0;#F5C97A" dur="24s" repeatCount="indefinite"/>
      </stop>
      <stop offset="35%" stop-color="#C8DCC0">
        <animate attributeName="stop-color" values="#C8DCC0;#6B8E5C;#C8DCC0" dur="28s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" stop-color="#6B8E5C">
        <animate attributeName="stop-color" values="#6B8E5C;#2D5A3F;#6B8E5C" dur="32s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1a3328"/>
    </radialGradient>

    <linearGradient id="mistGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8DCC0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6B8E5C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2D5A3F" stop-opacity="0.8"/>
    </linearGradient>

    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F5C97A" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#C8DCC0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8DCC0" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur120" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="blur90" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <filter id="blur60" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur20" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <g id="treeA">
      <path d="M0,900 L20,600 L-10,620 L30,400 L0,420 L50,200 L30,220 L80,50 L70,70 L100,0 L130,70 L120,50 L170,220 L150,200 L200,420 L170,400 L210,620 L180,600 L200,900 Z"/>
    </g>
    <g id="treeB">
      <path d="M0,900 L15,650 L-15,670 L25,500 L-5,520 L45,350 L25,370 L65,200 L55,220 L85,100 L75,120 L105,20 L95,40 L125,120 L115,100 L145,220 L135,200 L175,370 L155,350 L205,520 L175,500 L215,670 L185,650 L200,900 Z"/>
    </g>
    <g id="treeC">
      <path d="M0,900 L25,750 L-5,770 L35,620 L5,640 L55,450 L35,470 L75,300 L65,320 L95,180 L85,200 L115,80 L105,100 L135,200 L125,180 L155,320 L145,300 L185,470 L165,450 L215,640 L185,620 L225,770 L195,750 L220,900 Z"/>
    </g>
  </defs>

  <!-- Sky Layer -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Sun / Light Source -->
  <g transform="translate(1450, 120)">
    <circle r="350" fill="url(#sun)">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle r="200" fill="#F5C97A" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Far Atmospheric Glow -->
  <rect x="0" y="0" width="1600" height="900" fill="#C8DCC0" opacity="0.15" filter="url(#blur120)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 1: Far Background Trees -->
  <g opacity="0.4" filter="url(#blur120)" fill="#2D5A3F">
    <use href="#treeA" transform="translate(100, 100) scale(1.6)"/>
    <use href="#treeB" transform="translate(400, 120) scale(1.4)"/>
    <use href="#treeC" transform="translate(700, 80) scale(1.7)"/>
    <use href="#treeA" transform="translate(1100, 110) scale(1.5)"/>
    <use href="#treeB" transform="translate(1400, 90) scale(1.3)"/>
    <use href="#treeC" transform="translate(1600, 100) scale(1.6)"/>
  </g>

  <!-- Mist Cloud Layer 1 -->
  <rect x="0" y="300" width="1600" height="400" fill="url(#mistGrad)" opacity="0.5" filter="url(#blur90)">
    <animate attributeName="opacity" values="0.5;0.7;0.5" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 2: Mid-Distant Trees -->
  <g opacity="0.6" filter="url(#blur90)" fill="#2D5A3F">
    <use href="#treeB" transform="translate(-50, 150) scale(1.8)"/>
    <use href="#treeC" transform="translate(250, 180) scale(1.6)"/>
    <use href="#treeA" transform="translate(550, 140) scale(1.9)"/>
    <use href="#treeB" transform="translate(950, 160) scale(1.7)"/>
    <use href="#treeC" transform="translate(1250, 130) scale(1.8)"/>
    <use href="#treeA" transform="translate(1550, 170) scale(1.5)"/>
  </g>

  <!-- Mist Cloud Layer 2 -->
  <rect x="0" y="450" width="1600" height="350" fill="url(#mistGrad)" opacity="0.6" filter="url(#blur60)">
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="14s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 3: Mid-Ground Trees -->
  <g opacity="0.75" filter="url(#blur60)" fill="#2D5A3F">
    <use href="#treeC" transform="translate(50, 250) scale(2.0)"/>
    <use href="#treeA" transform="translate(350, 280) scale(1.8)"/>
    <use href="#treeB" transform="translate(750, 240) scale(2.1)"/>
    <use href="#treeC" transform="translate(1150, 260) scale(1.9)"/>
    <use href="#treeA" transform="translate(1500, 270) scale(1.7)"/>
  </g>

  <!-- Mist Cloud Layer 3 -->
  <rect x="0" y="550" width="1600" height="300" fill="url(#mistGrad)" opacity="0.7" filter="url(#blur20)">
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- Layer 4: Near Ground Trees -->
  <g opacity="0.9" filter="url(#blur20)" fill="#1a3328">
    <use href="#treeA" transform="translate(-100, 350) scale(2.2)"/>
    <use href="#treeB" transform="translate(200, 380) scale(2.0)"/>
    <use href="#treeC" transform="translate(600, 340) scale(2.3)"/>
    <use href="#treeA" transform="translate(1000, 360) scale(2.1)"/>
    <use href="#treeB" transform="translate(1350, 370) scale(1.9)"/>
    <use href="#treeC" transform="translate(1650, 350) scale(2.2)"/>
  </g>

  <!-- Focal Figure (Silhouette, Left Third) -->
  <g transform="translate(420, 580)">
    <animateTransform attributeName="transform" type="translate" values="420,580; 420,575; 420,580" dur="10s" repeatCount="indefinite"/>
    
    <!-- Body -->
    <path d="M0,0 C-5,-15 -8,-35 -2,-50 C2,-60 8,-65 12,-60 C16,-55 14,-45 10,-35 C8,-25 12,-15 15,0 Z" fill="#1a3328"/>
    <!-- Head -->
    <circle cx="5" cy="-70" r="8" fill="#1a3328"/>
    <!-- Arm / Staff reaching up -->
    <path d="M8,-45 L25,-90 L28,-88 L12,-42 Z" fill="#1a3328"/>
    <!-- Cloak / Flow -->
    <path d="M-5,-20 C-15,-10 -20,10 -18,30 C-15,50 -5,60 5,55 C12,50 18,30 15,10 C12,0 5,-10 -5,-20 Z" fill="#1a3328"/>
    
    <!-- Rim Light (Golden from Upper Right) -->
    <path d="M0,0 C-5,-15 -8,-35 -2,-50 C2,-60 8,-65 12,-60 C16,-55 14,-45 10,-35 C8,-25 12,-15 15,0 Z" fill="none" stroke="#F5C97A" stroke-width="1.5" opacity="0.6"/>
    <path d="M8,-45 L25,-90 L28,-88 L12,-42 Z" fill="none" stroke="#F5C97A" stroke-width="1" opacity="0.5"/>
    <circle cx="5" cy="-70" r="8.5" fill="none" stroke="#F5C97A" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Ground / Foreground Fog -->
  <rect x="0" y="750" width="1600" height="150" fill="#1a3328" opacity="0.8" filter="url(#blur20)">
    <animate attributeName="opacity" values="0.8;0.95;0.8" dur="15s" repeatCount="indefinite"/>
  </rect>

  <!-- Foreground Tree Silhouettes (Framing Right Edge) -->
  <g fill="#0d1f14">
    <use href="#treeA" transform="translate(1300, 450) scale(2.8)"/>
    <use href="#treeB" transform="translate(1500, 500) scale(3.0)"/>
    <use href="#treeC" transform="translate(1100, 550) scale(2.5)"/>
  </g>

  <!-- Floating Mist Particles -->
  <g fill="#C8DCC0" opacity="0.4">
    <circle r="3" cx="200" cy="400">
      <animate attributeName="cx" values="200;250;200" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="400;380;400" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" cx="800" cy="300">
      <animate attributeName="cx" values="800;750;800" dur="25s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="300;320;300" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" cx="1200" cy="500">
      <animate attributeName="cx" values="1200;1250;1200" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;480;500" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" cx="500" cy="600">
      <animate attributeName="cx" values="500;550;500" dur="24s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="600;580;600" dur="19s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" cx="300" cy="200">
      <animate attributeName="cx" values="300;320;300" dur="28s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;210;200" dur="26s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle r="7" cx="1400" cy="350">
      <animate attributeName="cx" values="1400;1380;1400" dur="21s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="350;370;350" dur="17s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" cx="100" cy="700">
      <animate attributeName="cx" values="100;130;100" dur="23s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="700;680;700" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" cx="900" cy="450">
      <animate attributeName="cx" values="900;880;900" dur="19s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="450;470;450" dur="21s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" cx="600" cy="250">
      <animate attributeName="cx" values="600;630;600" dur="26s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="250;230;250" dur="24s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle r="8" cx="1100" cy="650">
      <animate attributeName="cx" values="1100;1140;1100" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="650;630;650" dur="19s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" cx="400" cy="500">
      <animate attributeName="cx" values="400;430;400" dur="25s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;520;500" dur="23s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="17s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" cx="700" cy="700">
      <animate attributeName="cx" values="700;670;700" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="700;720;700" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" cx="1500" cy="200">
      <animate attributeName="cx" values="1500;1520;1500" dur="27s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;190;200" dur="25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="13s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Light Shafts / God Rays -->
  <g opacity="0.08" fill="#F5C97A">
    <polygon points="1450,120 1200,900 1000,900">
      <animate attributeName="opacity" values="0.08;0.15;0.08" dur="14s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1450,120 900,900 700,900">
      <animate attributeName="opacity" values="0.05;0.12;0.05" dur="18s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1450,120 600,900 400,900">
      <animate attributeName="opacity" values="0.06;0.10;0.06" dur="16s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Foreground Dust / Pollen Layer -->
  <g fill="#F5C97A" opacity="0.3">
    <circle r="1.5" cx="450" cy="500">
      <animate attributeName="cx" values="450;480;450" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;480;500" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" cx="550" cy="450">
      <animate attributeName="cx" values="550;530;550" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="450;470;450" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle r="1" cx="420" cy="520">
      <animate attributeName="cx" values="420;440;420" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="520;500;520" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" cx="380" cy="480">
      <animate attributeName="cx" values="380;360;380" dur="17s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="480;500;480" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" cx="480" cy="550">
      <animate attributeName="cx" values="480;500;480" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="550;530;550" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Final Vignette / Darkening for cinematic focus -->
  <rect width="1600" height="900" fill="url(#sun)" opacity="0" style="mix-blend-mode: multiply;">
    <animate attributeName="opacity" values="0;0.15;0" dur="30s" repeatCount="indefinite"/>
  </rect>
</svg>