<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B6F2A"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6F2A"/>
    </linearGradient>
    
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBF7EE" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6F2A"/>
    </radialGradient>
    
    <filter id="haloBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    
    <filter id="deepBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#1A1815"/>
  
  <circle cx="800" cy="450" r="200" fill="#D4A017" opacity="0.15" filter="url(#haloBlur)">
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="200;220;200" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <ellipse cx="800" cy="620" rx="140" ry="25" fill="#000" opacity="0.5" filter="url(#deepBlur)">
    <animate attributeName="rx" values="140;10;140" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>
  
  <g transform="translate(800, 450)">
    <animateTransform attributeName="transform" type="scale" values="1 1; 0.08 1; 1 1" keyTimes="0; 0.5; 1" dur="3.5s" repeatCount="indefinite" additive="sum" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    
    <g opacity="0.9">
      <circle r="150" fill="none" stroke="#8B6F2A" stroke-width="6"/>
      <circle r="150" fill="none" stroke="#D4A017" stroke-width="2" stroke-dasharray="8 6">
        <animate attributeName="stroke-dashoffset" values="0; -14" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="stroke" values="#D4A017;#FBF7EE;#D4A017" dur="3.5s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <circle r="144" fill="url(#faceGrad)"/>
    <circle r="144" fill="url(#goldGrad)" opacity="0.3"/>
    
    <circle r="120" fill="none" stroke="#D4A017" stroke-width="1.5" opacity="0.6"/>
    <circle r="126" fill="none" stroke="#FBF7EE" stroke-width="1" opacity="0.4"/>
    
    <g>
      <line x1="0" y1="-144" x2="0" y2="-128" stroke="#FBF7EE" stroke-width="3" stroke-linecap="round" opacity="0">
        <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.2;0.4;1" dur="3.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="-144" x2="0" y2="-128" stroke="#FBF7EE" stroke-width="3" stroke-linecap="round" opacity="0" transform="rotate(45)">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.1;0.3;0.5;1" dur="3.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="-144" x2="0" y2="-128" stroke="#FBF7EE" stroke-width="3" stroke-linecap="round" opacity="0" transform="rotate(90)">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.2;0.4;0.6;1" dur="3.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="-144" x2="0" y2="-128" stroke="#FBF7EE" stroke-width="3" stroke-linecap="round" opacity="0" transform="rotate(135)">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.3;0.5;0.7;1" dur="3.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="-144" x2="0" y2="-128" stroke="#FBF7EE" stroke-width="3" stroke-linecap="round" opacity="0" transform="rotate(180)">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.4;0.6;0.8;1" dur="3.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="-144" x2="0" y2="-128" stroke="#FBF7EE" stroke-width="3" stroke-linecap="round" opacity="0" transform="rotate(225)">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.5;0.7;0.9;1" dur="3.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="-144" x2="0" y2="-128" stroke="#FBF7EE" stroke-width="3" stroke-linecap="round" opacity="0" transform="rotate(270)">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.6;0.8;1;1" dur="3.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="-144" x2="0" y2="-128" stroke="#FBF7EE" stroke-width="3" stroke-linecap="round" opacity="0" transform="rotate(315)">
        <animate attributeName="opacity" values="1;0;0;1" keyTimes="0;0.1;0.9;1" dur="3.5s" repeatCount="indefinite"/>
      </line>
    </g>
    
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="140" font-weight="bold" fill="#1A1815" opacity="0.3">$</text>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="140" font-weight="bold" fill="url(#goldGrad)">$</text>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="140" font-weight="bold" fill="#FBF7EE" opacity="0.6">$</text>
    
    <ellipse cx="0" cy="0" rx="100" ry="140" fill="url(#goldGrad)" opacity="0">
      <animate attributeName="opacity" values="0;0.2;0;0;0" keyTimes="0;0.25;0.5;0.75;1" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="-200 0; 200 0" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g transform="translate(800, 450)">
    <circle cx="200" cy="-120" r="5" fill="#FBF7EE" filter="url(#softBlur)">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;8;3" dur="2s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="-180" cy="150" r="4" fill="#D4A017" filter="url(#softBlur)">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;6;2" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="160" cy="170" r="6" fill="#FBF7EE" filter="url(#softBlur)">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;9;4" dur="3s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="-200" cy="-100" r="4" fill="#D4A017" filter="url(#deepBlur)">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="0" cy="-220" r="5" fill="#FBF7EE" filter="url(#deepBlur)">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;7;3" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>