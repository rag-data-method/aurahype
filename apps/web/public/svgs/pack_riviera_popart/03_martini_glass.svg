<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <!-- Halftone Dot Patterns -->
    <pattern id="ht-blue" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="scale(1)">
      <rect width="20" height="20" fill="#B500FF"/>
      <circle cx="10" cy="10" r="7" fill="url(#ht-dot-blue)"/>
    </pattern>
    
    <radialGradient id="ht-dot-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>

    <pattern id="ht-red" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#00E5FF"/>
      <circle cx="8" cy="8" r="6" fill="url(#ht-dot-red)"/>
    </pattern>

    <radialGradient id="ht-dot-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF0055"/>
      <stop offset="100%" stop-color="#FF0055" stop-opacity="0"/>
    </radialGradient>

    <pattern id="ht-yellow" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#00E5FF"/>
      <circle cx="12" cy="12" r="8" fill="url(#ht-dot-yellow)"/>
    </pattern>

    <radialGradient id="ht-dot-yellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE600"/>
      <stop offset="100%" stop-color="#FFE600" stop-opacity="0"/>
    </radialGradient>

    <!-- Liquid Gradients (Simulating Solid Color Shift without soft gradients) -->
    <linearGradient id="liquid-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF">
        <animate attributeName="stop-color" values="#00E5FF;#FFE600;#FF0055;#00E5FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0099CC">
        <animate attributeName="stop-color" values="#0099CC;#CCAA00;#CC0033;#0099CC" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Clipping Paths -->
    <clipPath id="bowl-clip">
      <path d="M 550,200 L 1050,200 L 850,600 L 750,600 Z"/>
    </clipPath>

    <!-- Main Glass Geometry -->
    <g id="glass-shape">
      <!-- Bowl -->
      <path d="M 550,200 L 1050,200 L 850,600 L 750,600 Z" />
      <!-- Stem -->
      <rect x="765" y="600" width="70" height="200" />
      <!-- Base -->
      <path d="M 650,800 L 950,800 L 900,830 L 700,830 Z" />
    </g>

    <g id="glass-bowl-only">
      <path d="M 550,200 L 1050,200 L 850,600 L 750,600 Z" />
    </g>

    <!-- Comic Action Lines -->
    <g id="action-lines">
      <path d="M 400,150 L 520,180" stroke="#000" stroke-width="6" stroke-linecap="round"/>
      <path d="M 380,250 L 500,280" stroke="#000" stroke-width="6" stroke-linecap="round"/>
      <path d="M 420,350 L 530,380" stroke="#000" stroke-width="6" stroke-linecap="round"/>
      <path d="M 1200,150 L 1080,180" stroke="#000" stroke-width="6" stroke-linecap="round"/>
      <path d="M 1220,250 L 1100,280" stroke="#000" stroke-width="6" stroke-linecap="round"/>
      <path d="M 1180,350 L 1070,380" stroke="#000" stroke-width="6" stroke-linecap="round"/>
    </g>

    <path id="dash-line-left" d="M 450,450 L 250,450" stroke="#000" stroke-width="10" stroke-dasharray="30, 20" stroke-linecap="round" fill="none"/>
    <path id="dash-line-right" d="M 1150,450 L 1350,450" stroke="#000" stroke-width="10" stroke-dasharray="30, 20" stroke-linecap="round" fill="none"/>

  </defs>

  <!-- Background Base -->
  <rect width="1600" height="900" fill="#FFE600"/>
  
  <!-- Background Halftone Burst -->
  <g transform="translate(800, 450)">
    <circle r="600" fill="url(#ht-blue)">
      <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ================= WARHOL REPEATED GLASSES (Left & Right) ================= -->
  
  <!-- Left Glass (Red/Cyan) -->
  <g transform="translate(-350, 50)">
    <g stroke="#000" stroke-width="10" stroke-linejoin="round">
      <use href="#glass-shape" fill="url(#ht-red)"/>
    </g>
    <!-- Liquid -->
    <g clip-path="url(#bowl-clip)">
      <rect x="500" y="400" width="600" height="300" fill="#FF0055">
        <animate attributeName="y" values="400;380;400" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g stroke="#000" stroke-width="10" stroke-linejoin="round">
      <use href="#glass-shape" fill="none"/>
    </g>
  </g>

  <!-- Right Glass (Yellow/Magenta) -->
  <g transform="translate(350, 50)">
    <g stroke="#000" stroke-width="10" stroke-linejoin="round">
      <use href="#glass-shape" fill="url(#ht-yellow)"/>
    </g>
    <!-- Liquid -->
    <g clip-path="url(#bowl-clip)">
      <rect x="500" y="400" width="600" height="300" fill="#00E5FF">
        <animate attributeName="y" values="400;380;400" dur="3.5s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g stroke="#000" stroke-width="10" stroke-linejoin="round">
      <use href="#glass-shape" fill="none"/>
    </g>
  </g>

  <!-- ================= MAIN CENTER GLASS (LIQUID ANIMATION) ================= -->
  
  <!-- Main Glass Fill (Halftone Blue) -->
  <g stroke="#000" stroke-width="16" stroke-linejoin="round">
    <use href="#glass-shape" fill="url(#ht-blue)"/>
  </g>

  <!-- Animated Liquid Level -->
  <g clip-path="url(#bowl-clip)">
    <path d="M 500,500 L 1100,500 L 1100,900 L 500,900 Z" fill="url(#liquid-grad)">
      <animate attributeName="d" 
        values="M 500,550 L 1100,550 L 1100,900 L 500,900 Z;
                M 500,480 L 1100,480 L 1100,900 L 500,900 Z;
                M 500,550 L 1100,550 L 1100,900 L 500,900 Z" 
        dur="4s" repeatCount="indefinite"/>
    </path>
    <!-- Liquid Surface Line -->
    <line x1="500" y1="500" x2="1100" y2="500" stroke="#000" stroke-width="12">
      <animate attributeName="y1" values="550;480;550" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="550;480;550" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Glass Outline (Aggressive Overdraw) -->
  <g stroke="#000" stroke-width="16" stroke-linejoin="round">
    <use href="#glass-shape" fill="none"/>
  </g>

  <!-- Glass Inner Rim Reflection -->
  <path d="M 570,210 L 1030,210 L 840,580 L 760,580 Z" fill="none" stroke="#000" stroke-width="6"/>

  <!-- ================= OLIVE & TOOTHPICK ================= -->

  <g id="olive-group">
    <!-- Floating Animation -->
    <animateTransform attributeName="transform" type="translate" 
      values="0,0; 0,-25; 0,0" dur="3s" repeatCount="indefinite"/>
    
    <!-- Toothpick -->
    <line x1="800" y1="550" x2="900" y2="150" stroke="#CC6600" stroke-width="14" stroke-linecap="round">
      <!-- Subtle tilt animation -->
      <animateTransform attributeName="transform" type="rotate"
        values="0 800 550; 2 800 550; -2 800 550; 0 800 550"
        dur="5s" repeatCount="indefinite" additive="sum"/>
    </line>
    <!-- Toothpick Outline -->
    <line x1="800" y1="550" x2="900" y2="150" stroke="#000" stroke-width="20" stroke-linecap="round" fill="none" transform="translate(0,0)"/>
    <line x1="800" y1="550" x2="900" y2="150" stroke="#CC6600" stroke-width="14" stroke-linecap="round"/>

    <!-- Olive Body -->
    <g transform="translate(850, 320) rotate(-15)">
      <ellipse cx="0" cy="0" rx="50" ry="65" fill="#00AA00" stroke="#000" stroke-width="10"/>
      <!-- Olive Highlight -->
      <ellipse cx="-15" cy="-20" rx="15" ry="25" fill="#80FF80" stroke="none"/>
      <!-- Pimento -->
      <circle cx="0" cy="0" r="18" fill="#FF3300" stroke="#000" stroke-width="6"/>
    </g>
  </g>

  <!-- ================= BUBBLES ================= -->
  <g id="bubbles" fill="#FFF" stroke="#000" stroke-width="4">
    <circle cx="750" cy="500" r="12">
      <animate attributeName="cy" values="500;300;500" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="550" r="18">
      <animate attributeName="cy" values="550;250;550" dur="5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="480" r="8">
      <animate attributeName="cy" values="480;200;480" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ================= ACTION LINES & GRAPHICS ================= -->
  
  <!-- Moving Dashed Lines -->
  <use href="#dash-line-left" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="0;100" dur="1s" repeatCount="indefinite"/>
  </use>
  <use href="#dash-line-right" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="0;-100" dur="1s" repeatCount="indefinite"/>
  </use>

  <!-- Comic Action Lines (Pulsing) -->
  <use href="#action-lines">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite"/>
  </use>

  <!-- Pop Art Starbursts -->
  <g id="starburst-1" transform="translate(250, 250)">
    <polygon points="0,-60 15,-15 60,0 15,15 0,60 -15,15 -60,0 -15,-15" fill="#FF0055" stroke="#000" stroke-width="6">
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="3s" repeatCount="indefinite" additive="sum"/>
    </polygon>
  </g>

  <g id="starburst-2" transform="translate(1350, 650)">
    <polygon points="0,-50 12,-12 50,0 12,12 0,50 -12,12 -50,0 -12,-12" fill="#FFE600" stroke="#000" stroke-width="6">
      <animateTransform attributeName="transform" type="rotate" values="0;-45;0" dur="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </polygon>
  </g>

  <!-- ================= TEXT & TYPOGRAPHY ================= -->

  <!-- Main MARTINI Text (3D Offset) -->
  <g transform="translate(800, 120)">
    <!-- Shadow Layer -->
    <text x="6" y="6" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="140" font-weight="900" fill="#000" stroke="none">MARTINI</text>
    <!-- Main Layer -->
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="140" font-weight="900" fill="#FF0055" stroke="#000" stroke-width="8">MARTINI
      <animate attributeName="fill" values="#FF0055;#FFE600;#00E5FF;#FF0055" dur="4s" repeatCount="indefinite"/>
    </text>
    <!-- Inner Halftone Layer -->
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="140" font-weight="900" fill="url(#ht-blue)" stroke="none" clip-path="url(#text-clip)">MARTINI</text>
  </g>

  <!-- Secondary Text -->
  <g transform="translate(800, 820)">
    <text x="0" y="0" text-anchor="middle" font-family="Courier New, monospace" font-size="50" font-weight="bold" fill="#00E5FF" stroke="#000" stroke-width="4">POP ART COLLECTION
      <animate attributeName="fill" values="#00E5FF;#FF0055;#00E5FF" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Burst Text "DRINK!" -->
  <g transform="translate(1300, 300)">
    <path d="M 0,-80 L 20,-20 L 80,0 L 20,20 L 0,80 L -20,20 L -80,0 L -20,-20 Z" fill="#FFE600" stroke="#000" stroke-width="6">
      <animateTransform attributeName="transform" type="scale" values="0;1.2;1;1.2;0" dur="3s" repeatCount="indefinite"/>
    </path>
    <text x="0" y="15" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="40" fill="#000" stroke="none">
      DRINK!
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ================= FOREGROUND ACCENTS ================= -->

  <!-- Bottom Banner -->
  <rect x="0" y="860" width="1600" height="40" fill="#FF0055" stroke="#000" stroke-width="6">
    <animate attributeName="fill" values="#FF0055;#00E5FF;#FF0055" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Border Frame Elements -->
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#000" stroke-width="12" rx="20"/>
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#FFE600" stroke-width="8" rx="15"/>

</svg>