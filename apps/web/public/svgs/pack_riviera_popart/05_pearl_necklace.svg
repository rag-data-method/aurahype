<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <!-- Vintage Pop Art Halftone Pattern -->
    <pattern id="halftone" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="6" fill="#ffff00" opacity="0.6"/>
    </pattern>
    
    <!-- Aggressive Halftone for background contrast -->
    <pattern id="halftoneRed" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="7.5" cy="7.5" r="4" fill="#ff0000" opacity="0.8"/>
    </pattern>

    <!-- Drop Shadow Filter for that massive Pop Art punch -->
    <filter id="popShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="12" dy="12" stdDeviation="0" flood-color="#000000" flood-opacity="1"/>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pearl Gradient (Subtle 3D illusion, but kept flat for style) -->
    <radialGradient id="pearlGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </radialGradient>

    <!-- Thick Outline Style -->
    <style>
      .outline { stroke: #000000; stroke-width: 6px; stroke-linecap: round; stroke-linejoin: round; }
      .thick-outline { stroke: #000000; stroke-width: 10px; stroke-linecap: round; stroke-linejoin: round; }
      .thin-outline { stroke: #000000; stroke-width: 4px; stroke-linecap: round; stroke-linejoin: round; }
      .comic-text { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Background: Solid Cyan with Halftone Overlay -->
  <rect width="1600" height="900" fill="#00ffff"/>
  <rect width="1600" height="900" fill="url(#halftone)"/>
  
  <!-- Background Comic Burst (Yellow) -->
  <g transform="translate(1300, 200)">
    <path d="M0,-150 L20,-50 L120,-80 L50,0 L150,80 L30,60 L0,180 L-30,60 L-150,80 L-50,0 L-120,-80 L-20,-50 Z" fill="#ffff00" stroke="#000" stroke-width="8" filter="url(#popShadow)">
      <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" additive="sum"/>
    </path>
    <text x="0" y="15" text-anchor="middle" font-size="40" fill="#ff0000" class="comic-text" filter="url(#popShadow)">POP!</text>
  </g>

  <!-- Background Swirling Action Lines -->
  <g stroke="#000" stroke-width="4" fill="none">
    <path d="M100,100 Q300,50 500,150">
      <animate attributeName="d" values="M100,100 Q300,50 500,150; M100,120 Q300,70 500,170; M100,100 Q300,50 500,150" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M1200,800 Q1300,750 1450,850">
      <animate attributeName="d" values="M1200,800 Q1300,750 1450,850; M1200,780 Q1300,730 1450,830; M1200,800 Q1300,750 1450,850" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M200,800 Q100,700 50,600" stroke="#ff0000" stroke-width="6">
      <animate attributeName="stroke-dasharray" values="0,1000; 1000,0; 0,1000" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Floating Halftone Dots (Background Elements) -->
  <g fill="#ff0000">
    <circle cx="200" cy="200" r="30" opacity="0.8">
      <animate attributeName="cy" values="200;220;200" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="30;40;30" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="700" r="50" opacity="0.8">
      <animate attributeName="cy" values="700;680;700" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="50;60;50" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="100" r="20" fill="#ffff00" opacity="0.9">
      <animate attributeName="cx" values="800;820;800" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main Subject: The Pearl Necklace -->
  <g transform="translate(0, 50)">
    
    <!-- Necklace String (Thick Black Line behind pearls) -->
    <path d="M300,150 Q800,650 1300,150" fill="none" stroke="#000" stroke-width="12" stroke-linecap="round"/>

    <!-- Pearl Group 1 (Left Side) -->
    <g transform="translate(320, 180)">
      <circle r="35" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-10" cy="-10" r="8" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="320,180; 320,170; 320,180" dur="2.5s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(370, 230)">
      <circle r="38" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-12" cy="-12" r="9" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="370,230; 370,220; 370,230" dur="2.6s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(430, 280)">
      <circle r="40" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-12" cy="-12" r="10" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="430,280; 430,270; 430,280" dur="2.7s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(500, 330)">
      <circle r="42" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-13" cy="-13" r="10" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="500,330; 500,320; 500,330" dur="2.8s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(580, 380)">
      <circle r="44" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-14" cy="-14" r="11" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="580,380; 580,370; 580,380" dur="2.9s" repeatCount="indefinite"/>
    </g>

    <!-- Pearl Group 2 (Center/Hanging) -->
    <g transform="translate(670, 430)">
      <circle r="46" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-15" cy="-15" r="12" fill="#fff" opacity="0.8"/>
      <!-- Center Pearl Special Animation: Sways heavily -->
      <animateTransform attributeName="transform" type="translate" values="670,430; 670,410; 670,430" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-5 670 430; 5 670 430; -5 670 430" dur="3s" repeatCount="indefinite" additive="sum"/>
    </g>

    <g transform="translate(760, 460)">
      <circle r="48" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-16" cy="-16" r="12" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="760,460; 760,440; 760,460" dur="3.1s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(850, 480)">
      <circle r="50" fill="url(#pearlGrad)" class="thick-outline" filter="url(#popShadow)"/>
      <circle cx="-17" cy="-17" r="13" fill="#fff" opacity="0.8"/>
      <!-- Absolute Center Pearl: Max Impact -->
      <animateTransform attributeName="transform" type="translate" values="850,480; 850,460; 850,480" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#popShadow); url(#glow); url(#popShadow)" dur="1.5s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(940, 460)">
      <circle r="48" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-16" cy="-16" r="12" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="940,460; 940,440; 940,460" dur="3.1s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(1030, 430)">
      <circle r="46" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-15" cy="-15" r="12" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="1030,430; 1030,410; 1030,430" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="5 1030 430; -5 1030 430; 5 1030 430" dur="3s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Pearl Group 3 (Right Side) -->
    <g transform="translate(1120, 380)">
      <circle r="44" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-14" cy="-14" r="11" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="1120,380; 1120,370; 1120,380" dur="2.9s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(1200, 330)">
      <circle r="42" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-13" cy="-13" r="10" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="1200,330; 1200,320; 1200,330" dur="2.8s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(1270, 280)">
      <circle r="40" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-12" cy="-12" r="10" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="1270,280; 1270,270; 1270,280" dur="2.7s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(1330, 230)">
      <circle r="38" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-12" cy="-12" r="9" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="1330,230; 1330,220; 1330,230" dur="2.6s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(1380, 180)">
      <circle r="35" fill="url(#pearlGrad)" class="outline" filter="url(#popShadow)"/>
      <circle cx="-10" cy="-10" r="8" fill="#fff" opacity="0.8"/>
      <animateTransform attributeName="transform" type="translate" values="1380,180; 1380,170; 1380,180" dur="2.5s" repeatCount="indefinite"/>
    </g>

  </g>

  <!-- Foreground Pop Art Text Elements -->
  <g transform="translate(200, 750)">
    <!-- Rotating Starburst Background -->
    <g>
      <polygon points="0,-80 20,-20 80,0 20,20 0,80 -20,20 -80,0 -20,-20" fill="#ff00ff" stroke="#000" stroke-width="5" filter="url(#popShadow)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <text x="0" y="15" text-anchor="middle" font-size="60" fill="#ffff00" stroke="#000" stroke-width="4" class="comic-text" filter="url(#popShadow)">WOW!</text>
    <!-- Pulsing animation for text -->
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1s" repeatCount="indefinite" additive="sum"/>
  </g>

  <g transform="translate(1400, 750)">
    <g>
      <polygon points="0,-60 15,-15 60,0 15,15 0,60 -15,15 -60,0 -15,-15" fill="#ff0000" stroke="#000" stroke-width="5" filter="url(#popShadow)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <text x="0" y="10" text-anchor="middle" font-size="40" fill="#ffffff" stroke="#000" stroke-width="3" class="comic-text" filter="url(#popShadow)">GLAM!</text>
    <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="1.2s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Additional Action Lines / Speed Lines around the necklace -->
  <g stroke="#000" stroke-width="3" fill="none">
    <path d="M250,450 L200,500" stroke-dasharray="10,10">
      <animate attributeName="stroke-dashoffset" values="0;20" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M1350,450 L1400,500" stroke-dasharray="10,10">
      <animate attributeName="stroke-dashoffset" values="0;20" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M800,650 L800,750" stroke="#ff00ff" stroke-width="5" stroke-dasharray="15,15">
       <animate attributeName="stroke-dashoffset" values="0;30" dur="0.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Floating Concentric Circles (Lichtenstein style) -->
  <g transform="translate(400, 600)" opacity="0.7">
    <circle r="10" fill="none" stroke="#000" stroke-width="4"/>
    <circle r="20" fill="none" stroke="#000" stroke-width="4"/>
    <circle r="30" fill="none" stroke="#000" stroke-width="4"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(1200, 600)" opacity="0.7">
    <circle r="10" fill="none" stroke="#000" stroke-width="4"/>
    <circle r="20" fill="none" stroke="#000" stroke-width="4"/>
    <circle r="30" fill="none" stroke="#000" stroke-width="4"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </g>

  <!-- Global Color Switching Animation (Simulated via overlay rects) -->
  <rect width="1600" height="900" fill="#ff0000" opacity="0" style="mix-blend-mode: multiply;">
    <animate attributeName="opacity" values="0;0;0.2;0;0" dur="8s" repeatCount="indefinite"/>
  </rect>
  <rect width="1600" height="900" fill="#00ffff" opacity="0" style="mix-blend-mode: multiply;">
    <animate attributeName="opacity" values="0;0.2;0;0;0" dur="8s" repeatCount="indefinite"/>
  </rect>

</svg>