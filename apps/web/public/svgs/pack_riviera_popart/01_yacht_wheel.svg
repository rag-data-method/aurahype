<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Pop Art Palette -->
    <solidColor id="c-cyan" solid-color="#00ffff"/>
    <solidColor id="c-magenta" solid-color="#ff00ff"/>
    <solidColor id="c-red" solid-color="#ff3b30"/>
    <solidColor id="c-yellow" solid-color="#ffea00"/>
    <solidColor id="c-black" solid-color="#1a1a1a"/>

    <!-- HERO Halftone Pattern (Radiating) -->
    <pattern id="ht-radial" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="14" height="14" fill="#ffea00"/>
      <circle cx="7" cy="7" r="4.5" fill="#ff3b30"/>
    </pattern>

    <!-- HERO Halftone Pattern (Cyan) -->
    <pattern id="ht-cyan" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#000000"/>
      <circle cx="6" cy="6" r="3.5" fill="#00ffff"/>
    </pattern>

    <!-- HERO Halftone Pattern (Magenta) -->
    <pattern id="ht-magenta" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#000000"/>
      <circle cx="6" cy="6" r="3.5" fill="#ff00ff"/>
    </pattern>

    <!-- HERO Halftone Pattern (Yellow) -->
    <pattern id="ht-yellow" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#000000"/>
      <circle cx="6" cy="6" r="3.5" fill="#ffea00"/>
    </pattern>

    <!-- SPIN HALFTONE -->
    <pattern id="ht-spin" width="16" height="16" patternTransform="rotate(0)" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#ff00ff"/>
      <circle cx="8" cy="8" r="5" fill="#00ffff"/>
      <animateTransform attributeName="patternTransform" type="rotate" from="0 8 8" to="360 8 8" dur="8s" repeatCount="indefinite"/>
    </pattern>

    <!-- Clip paths for bursts -->
    <clipPath id="burst-clip">
      <polygon points="800,450 950,50 1050,150 1200,50 1200,200 1350,250 1300,350 1450,450 1350,550 1450,650 1300,750 1200,850 1050,750 950,850 800,850 650,850 550,750 400,850 400,650 250,550 150,450 250,350 200,250 400,250 400,100 550,150 650,50"/>
    </clipPath>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="#ffea00"/>

  <!-- HERO BACKGROUND HALF TONE (Massive Sunburst) -->
  <g clip-path="url(#burst-clip)">
    <rect width="100%" height="100%" fill="#ff3b30"/>
    <!-- Alternating halftone rings -->
    <circle cx="800" cy="450" r="100" fill="url(#ht-radial)"/>
    <circle cx="800" cy="450" r="200" fill="#ffea00"/>
    <circle cx="800" cy="450" r="300" fill="url(#ht-radial)"/>
    <circle cx="800" cy="450" r="400" fill="#ffea00"/>
    <circle cx="800" cy="450" r="500" fill="url(#ht-radial)"/>
    <circle cx="800" cy="450" r="600" fill="#ffea00"/>
    <circle cx="800" cy="450" r="700" fill="url(#ht-radial)"/>
    <circle cx="800" cy="450" r="800" fill="#ffea00"/>
    <circle cx="800" cy="450" r="900" fill="url(#ht-radial)"/>
    <circle cx="800" cy="450" r="1000" fill="#ffea00"/>
    
    <!-- Radiating Action Lines -->
    <g stroke="#1a1a1a" stroke-width="8" stroke-linecap="round">
      <line x1="800" y1="450" x2="800" y2="-50">
        <animate attributeName="y2" values="-50;50;-50" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="800" y1="450" x2="1200" y2="50">
        <animate attributeName="x2" values="1200;1300;1200" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="50;150;50" dur="2.5s" repeatCount="indefinite"/>
      </line>
      <line x1="800" y1="450" x2="1650" y2="450">
        <animate attributeName="x2" values="1650;1750;1650" dur="1.8s" repeatCount="indefinite"/>
      </line>
      <line x1="800" y1="450" x2="1200" y2="850">
        <animate attributeName="x2" values="1200;1300;1200" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="850;950;850" dur="2.2s" repeatCount="indefinite"/>
      </line>
      <line x1="800" y1="450" x2="800" y2="950">
        <animate attributeName="y2" values="950;850;950" dur="2.7s" repeatCount="indefinite"/>
      </line>
      <line x1="800" y1="450" x2="400" y2="850">
        <animate attributeName="x2" values="400;300;400" dur="2.1s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="850;950;850" dur="2.1s" repeatCount="indefinite"/>
      </line>
      <line x1="800" y1="450" x2="-50" y2="450">
        <animate attributeName="x2" values="-50;50;-50" dur="1.9s" repeatCount="indefinite"/>
      </line>
      <line x1="800" y1="450" x2="400" y2="50">
        <animate attributeName="x2" values="400;300;400" dur="2.3s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="50;150;50" dur="2.3s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- BORDER FRAME -->
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#1a1a1a" stroke-width="40" rx="0"/>
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#00ffff" stroke-width="20" rx="0" stroke-dasharray="40 20">
    <animate attributeName="stroke-dashoffset" from="0" to="-60" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- COMPOSITION: WAVES & FLOATERS -->
  <g id="waves">
    <path d="M 0 750 Q 200 720 400 750 T 800 750 T 1200 750 T 1600 750" fill="none" stroke="#1a1a1a" stroke-width="15"/>
    <path d="M 0 750 Q 200 720 400 750 T 800 750 T 1200 750 T 1600 750" fill="none" stroke="#00ffff" stroke-width="5"/>
    
    <path d="M 0 800 Q 200 770 400 800 T 800 800 T 1200 800 T 1600 800" fill="none" stroke="#1a1a1a" stroke-width="15"/>
    <path d="M 0 800 Q 200 770 400 800 T 800 800 T 1200 800 T 1600 800" fill="none" stroke="#ff00ff" stroke-width="5">
      <animate attributeName="d" values="M 0 800 Q 200 770 400 800 T 800 800 T 1200 800 T 1600 800; M 0 800 Q 200 830 400 800 T 800 800 T 1200 800 T 1600 800; M 0 800 Q 200 770 400 800 T 800 800 T 1200 800 T 1600 800" dur="3s" repeatCount="indefinite"/>
    </path>

    <path d="M 0 850 Q 200 820 400 850 T 800 850 T 1200 850 T 1600 850" fill="none" stroke="#1a1a1a" stroke-width="15"/>
    <path d="M 0 850 Q 200 820 400 850 T 800 850 T 1200 850 T 1600 850" fill="none" stroke="#ffea00" stroke-width="5"/>

    <!-- Floating Diamonds -->
    <g fill="#ff00ff" stroke="#1a1a1a" stroke-width="6">
      <polygon points="200,650 220,620 240,650 220,680">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-20; 0,0" dur="2.1s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="1400,680 1420,650 1440,680 1420,710">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,20; 0,0" dur="2.7s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="300,700 320,670 340,700 320,730">
        <animateTransform attributeName="transform" type="translate" values="0,0; -20,0; 0,0" dur="1.8s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>

  <!-- MAIN SUBJECT: RIVIERA YACHT WHEEL -->
  <g id="yacht-wheel" transform="translate(800, 450)">
    
    <!-- Rotating Hub Assembly -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      
      <!-- Outer Rims (Massive thick strokes) -->
      <circle cx="0" cy="0" r="320" fill="none" stroke="#1a1a1a" stroke-width="45"/>
      <circle cx="0" cy="0" r="320" fill="none" stroke="#ff00ff" stroke-width="25"/>
      <circle cx="0" cy="0" r="295" fill="none" stroke="#1a1a1a" stroke-width="30"/>
      <circle cx="0" cy="0" r="295" fill="none" stroke="#00ffff" stroke-width="15"/>
      
      <circle cx="0" cy="0" r="170" fill="none" stroke="#1a1a1a" stroke-width="35"/>
      <circle cx="0" cy="0" r="170" fill="none" stroke="#ffea00" stroke-width="20"/>
      <circle cx="0" cy="0" r="150" fill="none" stroke="#1a1a1a" stroke-width="25"/>
      <circle cx="0" cy="0" r="150" fill="none" stroke="#ff00ff" stroke-width="12"/>

      <!-- Spokes (8 Spokes, Classic Yacht Style) -->
      <g stroke="#1a1a1a" stroke-width="24" stroke-linecap="round">
        <line x1="0" y1="-155" x2="0" y2="-295"/>
        <line x1="0" y1="155" x2="0" y2="295"/>
        <line x1="-155" y1="0" x2="-295" y2="0"/>
        <line x1="155" y1="0" x2="295" y2="0"/>
        <line x1="-110" y1="-110" x2="-210" y2="-210"/>
        <line x1="110" y1="-110" x2="210" y2="-210"/>
        <line x1="-110" y1="110" x2="-210" y2="210"/>
        <line x1="110" y1="110" x2="210" y2="210"/>
      </g>
      <!-- Spokes Inner Colors -->
      <g stroke="#00ffff" stroke-width="12" stroke-linecap="round">
        <line x1="0" y1="-155" x2="0" y2="-295"/>
        <line x1="0" y1="155" x2="0" y2="295"/>
        <line x1="-155" y1="0" x2="-295" y2="0"/>
        <line x1="155" y1="0" x2="295" y2="0"/>
        <line x1="-110" y1="-110" x2="-210" y2="-210"/>
        <line x1="110" y1="-110" x2="210" y2="-210"/>
        <line x1="-110" y1="110" x2="-210" y2="210"/>
        <line x1="110" y1="110" x2="210" y2="210"/>
      </g>

      <!-- Handles (Knobs at end of spokes) -->
      <g>
        <!-- Top -->
        <circle cx="0" cy="-320" r="18" fill="#ff3b30" stroke="#1a1a1a" stroke-width="8"/>
        <circle cx="0" cy="-320" r="6" fill="#ffea00"/>
        
        <!-- Bottom -->
        <circle cx="0" cy="320" r="18" fill="#ff3b30" stroke="#1a1a1a" stroke-width="8"/>
        <circle cx="0" cy="320" r="6" fill="#ffea00"/>

        <!-- Left -->
        <circle cx="-320" cy="0" r="18" fill="#ff3b30" stroke="#1a1a1a" stroke-width="8"/>
        <circle cx="-320" cy="0" r="6" fill="#ffea00"/>

        <!-- Right -->
        <circle cx="320" cy="0" r="18" fill="#ff3b30" stroke="#1a1a1a" stroke-width="8"/>
        <circle cx="320" cy="0" r="6" fill="#ffea00"/>

        <!-- Diagonals -->
        <circle cx="-226" cy="-226" r="18" fill="#ff3b30" stroke="#1a1a1a" stroke-width="8"/>
        <circle cx="-226" cy="-226" r="6" fill="#ffea00"/>

        <circle cx="226" cy="-226" r="18" fill="#ff3b30" stroke="#1a1a1a" stroke-width="8"/>
        <circle cx="226" cy="-226" r="6" fill="#ffea00"/>

        <circle cx="-226" cy="226" r="18" fill="#ff3b30" stroke="#1a1a1a" stroke-width="8"/>
        <circle cx="-226" cy="226" r="6" fill="#ffea00"/>

        <circle cx="226" cy="226" r="18" fill="#ff3b30" stroke="#1a1a1a" stroke-width="8"/>
        <circle cx="226" cy="226" r="6" fill="#ffea00"/>
      </g>

      <!-- Center Hub -->
      <circle cx="0" cy="0" r="60" fill="#1a1a1a"/>
      <circle cx="0" cy="0" r="45" fill="url(#ht-cyan)">
        <animate attributeName="fill" values="url(#ht-cyan);url(#ht-magenta);url(#ht-cyan)" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="20" fill="#ff3b30" stroke="#1a1a1a" stroke-width="6"/>
      <circle cx="0" cy="0" r="8" fill="#ffea00"/>
    </g>

    <!-- Static Overlay Elements (Anchors, Stars) -->
    <g id="overlays" transform="translate(-800, -450)">
      <!-- Flash Stars -->
      <g fill="#ffea00" stroke="#1a1a1a" stroke-width="6">
        <path d="M 800 80 L 820 140 L 880 140 L 835 180 L 850 240 L 800 200 L 750 240 L 765 180 L 720 140 L 780 140 Z">
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="1s" repeatCount="indefinite" additive="sum"/>
          <animateTransform attributeName="transform" type="rotate" from="0 800 160" to="360 800 160" dur="4s" repeatCount="indefinite" additive="sum"/>
        </path>
        <path d="M 200 450 L 210 480 L 240 480 L 215 500 L 225 530 L 200 510 L 175 530 L 185 500 L 160 480 L 190 480 Z" opacity="0.8">
          <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="1.5s" repeatCount="indefinite" additive="sum"/>
          <animateTransform attributeName="transform" type="rotate" from="0 200 500" to="-360 200 500" dur="6s" repeatCount="indefinite" additive="sum"/>
        </path>
        <path d="M 1400 450 L 1410 480 L 1440 480 L 1415 500 L 1425 530 L 1400 510 L 1375 530 L 1385 500 L 1360 480 L 1390 480 Z" opacity="0.8">
          <animateTransform attributeName="transform" type="scale" values="1;1.4;1" dur="1.2s" repeatCount="indefinite" additive="sum"/>
          <animateTransform attributeName="transform" type="rotate" from="0 1400 500" to="360 1400 500" dur="5s" repeatCount="indefinite" additive="sum"/>
        </path>
      </g>

      <!-- Floating Halftone Dots -->
      <circle cx="150" cy="200" r="30" fill="#ff00ff" stroke="#1a1a1a" stroke-width="6">
        <animate attributeName="r" values="30;40;30" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1450" cy="700" r="25" fill="#00ffff" stroke="#1a1a1a" stroke-width="6">
        <animate attributeName="r" values="25;15;25" dur="1.7s" repeatCount="indefinite"/>
      </circle>
      <rect x="100" y="700" width="40" height="40" fill="#ffea00" stroke="#1a1a1a" stroke-width="6" transform="rotate(45 120 720)">
        <animateTransform attributeName="transform" type="rotate" from="45 120 720" to="405 120 720" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Floating Action Lines (Comic Book Style near the wheel) -->
    <g id="action-lines" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round">
      <line x1="0" y1="-340" x2="0" y2="-380">
        <animate attributeName="y2" values="-380;-420;-380" dur="0.5s" repeatCount="indefinite"/>
      </line>
      <line x1="240" y1="-240" x2="270" y2="-270">
        <animate attributeName="x2" values="270;300;270" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="-270;-300;-270" dur="0.6s" repeatCount="indefinite"/>
      </line>
      <line x1="340" y1="0" x2="380" y2="0">
        <animate attributeName="x2" values="380;420;380" dur="0.4s" repeatCount="indefinite"/>
      </line>
      <line x1="240" y1="240" x2="270" y2="270">
        <animate attributeName="x2" values="270;300;270" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="270;300;270" dur="0.7s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="340" x2="0" y2="380">
        <animate attributeName="y2" values="380;420;380" dur="0.5s" repeatCount="indefinite"/>
      </line>
      <line x1="-240" y1="240" x2="-270" y2="270">
        <animate attributeName="x2" values="-270;-300;-270" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="270;300;270" dur="0.6s" repeatCount="indefinite"/>
      </line>
      <line x1="-340" y1="0" x2="-380" y2="0">
        <animate attributeName="x2" values="-380;-420;-380" dur="0.4s" repeatCount="indefinite"/>
      </line>
      <line x1="-240" y1="-240" x2="-270" y2="-270">
        <animate attributeName="x2" values="-270;-300;-270" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="-270;-300;-270" dur="0.7s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Comic Book Blinking Dots Overlay on Wheel -->
    <g opacity="0.7">
      <circle cx="-100" cy="-100" r="15" fill="#ffea00" stroke="#1a1a1a" stroke-width="4">
        <animate attributeName="opacity" values="0.7;0;0.7" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="120" cy="-80" r="20" fill="#ff3b30" stroke="#1a1a1a" stroke-width="4">
        <animate attributeName="opacity" values="0;0.8;0" dur="0.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-80" cy="120" r="12" fill="#00ffff" stroke="#1a1a1a" stroke-width="4">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="1.3s" repeatCount="indefinite"/>
      </circle>
    </g>

  </g>

  <!-- TOP BANNER TEXT (Optional Pop Art Typography feel) -->
  <g transform="translate(800, 100)">
    <rect x="-300" y="-40" width="600" height="80" fill="#ff00ff" stroke="#1a1a1a" stroke-width="10"/>
    <text x="0" y="15" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="50" fill="#ffea00" stroke="#1a1a1a" stroke-width="4" font-weight="900">RIVIERA</text>
  </g>
  
  <g transform="translate(800, 820)">
    <rect x="-250" y="-35" width="500" height="70" fill="#00ffff" stroke="#1a1a1a" stroke-width="10"/>
    <text x="0" y="15" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="40" fill="#ff3b30" stroke="#1a1a1a" stroke-width="4" font-weight="900">YACHT WHEEL</text>
  </g>

</svg>