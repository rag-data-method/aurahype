<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sunset Gradients for Lens Reflections -->
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="20%" stop-color="#FFFF00"/>
      <stop offset="50%" stop-color="#FF4500"/>
      <stop offset="80%" stop-color="#9400D3"/>
      <stop offset="100%" stop-color="#00008B"/>
    </linearGradient>
    <linearGradient id="sunsetGradAlt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="20%" stop-color="#FF0000"/>
      <stop offset="50%" stop-color="#FFFF00"/>
      <stop offset="80%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Halftone Dot Pattern (Small) -->
    <pattern id="halftone-small" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="0" fill="#000">
        <animate attributeName="r" values="0;5;0" dur="1.5s" repeatCount="indefinite" begin="0s"/>
      </circle>
    </pattern>

    <!-- Halftone Dot Pattern (Medium) -->
    <pattern id="halftone-medium" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0" fill="#000">
        <animate attributeName="r" values="0;8;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
    </pattern>

    <!-- Halftone Dot Pattern (Large) -->
    <pattern id="halftone-large" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0" fill="#000">
        <animate attributeName="r" values="0;14;0" dur="3s" repeatCount="indefinite" begin="1s"/>
      </circle>
    </pattern>

    <!-- Lens Clip Path -->
    <clipPath id="lens-clip">
      <path d="M 350 450 C 350 250, 500 150, 650 250 C 750 300, 850 300, 950 250 C 1100 150, 1250 250, 1250 450 C 1250 650, 1100 700, 950 650 C 850 600, 750 600, 650 650 C 500 700, 350 650, 350 450 Z"/>
    </clipPath>

    <!-- Filters for Pop Art Edge -->
    <filter id="pop-edge" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology operator="dilate" radius="4"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
      <feDropShadow dx="0" dy="0" stdDeviation="0" flood-color="#000"/>
    </filter>
  </defs>

  <!-- Vibrant Background -->
  <rect width="1600" height="900" fill="#00FFFF">
    <animate attributeName="fill" values="#00FFFF;#FF00FF;#FFFF00;#00FFFF" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- Background Halftone Dots -->
  <g id="bg-halftone">
    <rect width="1600" height="900" fill="url(#halftone-large)" opacity="0.15">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="60s" repeatCount="indefinite"/>
    </rect>
    <rect width="1600" height="900" fill="url(#halftone-medium)" opacity="0.25">
      <animateTransform attributeName="transform" type="rotate" from="360 800 450" to="0 800 450" dur="45s" repeatCount="indefinite"/>
    </rect>
    <rect width="1600" height="900" fill="url(#halftone-small)" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="30s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Floating Action Lines (Pop Art Style) -->
  <g stroke="#000" stroke-width="6" stroke-linecap="round">
    <path d="M 100 100 L 250 150" stroke-dasharray="20 40">
      <animate attributeName="stroke-dashoffset" from="0" to="60" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 150 250 L 300 300" stroke-dasharray="30 50">
      <animate attributeName="stroke-dashoffset" from="0" to="80" dur="0.9s" repeatCount="indefinite"/>
    </path>
    <path d="M 1300 100 L 1450 150" stroke-dasharray="20 40">
      <animate attributeName="stroke-dashoffset" from="0" to="60" dur="0.85s" repeatCount="indefinite"/>
    </path>
    <path d="M 1350 250 L 1480 300" stroke-dasharray="30 50">
      <animate attributeName="stroke-dashoffset" from="0" to="80" dur="0.95s" repeatCount="indefinite"/>
    </path>
    <path d="M 200 750 L 350 700" stroke-dasharray="25 45">
      <animate attributeName="stroke-dashoffset" from="0" to="70" dur="0.7s" repeatCount="indefinite"/>
    </path>
    <path d="M 1250 750 L 1400 700" stroke-dasharray="25 45">
      <animate attributeName="stroke-dashoffset" from="0" to="70" dur="0.75s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Floating Starbursts -->
  <g fill="#FFFF00" stroke="#000" stroke-width="4">
    <path d="M 150 150 L 160 180 L 130 170 L 160 160 L 170 190 L 150 170 L 120 180 Z">
      <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 1450 150 L 1460 180 L 1430 170 L 1460 160 L 1470 190 L 1450 170 L 1420 180 Z">
      <animateTransform attributeName="transform" type="rotate" from="360 1450 150" to="0 1450 150" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 150 750 L 160 780 L 130 770 L 160 760 L 170 790 L 150 770 L 120 780 Z">
      <animateTransform attributeName="transform" type="rotate" from="0 150 750" to="360 150 750" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 1450 750 L 1460 780 L 1430 770 L 1460 760 L 1470 790 L 1450 770 L 1420 780 Z">
      <animateTransform attributeName="transform" type="rotate" from="360 1450 750" to="0 1450 750" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Massive Central Subject: Cat-Eye Sunglasses -->
  <g id="sunglasses" transform="translate(0, 50)">
    
    <!-- Thick Black Drop Shadow for Pop Art Depth -->
    <path d="M 360 460 C 360 260, 510 160, 660 260 C 760 310, 840 310, 940 260 C 1090 160, 1260 260, 1260 460 C 1260 660, 1110 710, 960 660 C 860 610, 740 610, 640 660 C 490 710, 360 660, 360 460 Z" 
          fill="none" stroke="#000" stroke-width="40" stroke-opacity="0.3" transform="translate(15, 15)"/>

    <!-- Main Frame Outline (Thick Black) -->
    <path d="M 350 450 C 350 250, 500 150, 650 250 C 750 300, 850 300, 950 250 C 1100 150, 1250 250, 1250 450 C 1250 650, 1100 700, 950 650 C 850 600, 750 600, 650 650 C 500 700, 350 650, 350 450 Z" 
          fill="#FFF" stroke="#000" stroke-width="16"/>

    <!-- Bridge Detail -->
    <path d="M 650 250 Q 800 150 950 250" fill="none" stroke="#000" stroke-width="8"/>

    <!-- Left Lens (Sunset Reflection) -->
    <g clip-path="url(#lens-clip)">
      <rect x="0" y="0" width="800" height="900" fill="url(#sunsetGrad)">
        <animate attributeName="fill" values="url(#sunsetGrad);url(#sunsetGradAlt);url(#sunsetGrad)" dur="4s" repeatCount="indefinite"/>
      </rect>
      <!-- Halftone Overlay on Lens -->
      <rect x="0" y="0" width="1600" height="900" fill="url(#halftone-small)" opacity="0.6">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3s" repeatCount="indefinite"/>
      </rect>
      <!-- Lens Glare / Reflection -->
      <ellipse cx="500" cy="400" rx="150" ry="80" fill="#FFF" opacity="0.8" transform="rotate(-20 500 400)">
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="550" cy="350" rx="80" ry="40" fill="#FFF" opacity="0.6" transform="rotate(-20 550 350)"/>
    </g>

    <!-- Right Lens (Sunset Reflection - Mirrored) -->
    <g clip-path="url(#lens-clip)" transform="translate(1600, 0) scale(-1, 1)">
      <rect x="0" y="0" width="800" height="900" fill="url(#sunsetGrad)">
        <animate attributeName="fill" values="url(#sunsetGradAlt);url(#sunsetGrad);url(#sunsetGradAlt)" dur="4s" repeatCount="indefinite"/>
      </rect>
      <!-- Halftone Overlay on Lens -->
      <rect x="0" y="0" width="1600" height="900" fill="url(#halftone-small)" opacity="0.6">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 20; 0 0" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <!-- Lens Glare / Reflection -->
      <ellipse cx="500" cy="400" rx="150" ry="80" fill="#FFF" opacity="0.8" transform="rotate(-20 500 400)">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="550" cy="350" rx="80" ry="40" fill="#FFF" opacity="0.6" transform="rotate(-20 550 350)"/>
    </g>

    <!-- Frame Top Rim Details (Highlight) -->
    <path d="M 360 450 C 360 260, 500 160, 650 260 C 750 310, 850 310, 950 260 C 1100 160, 1240 260, 1240 450" 
          fill="none" stroke="#FFF" stroke-width="8" stroke-opacity="0.8"/>

    <!-- Temples / Arms of Glasses -->
    <path d="M 350 450 Q 250 400 200 500" fill="none" stroke="#000" stroke-width="16" stroke-linecap="round"/>
    <path d="M 1250 450 Q 1350 400 1400 500" fill="none" stroke="#000" stroke-width="16" stroke-linecap="round"/>
    <!-- Temple Highlights -->
    <path d="M 350 450 Q 250 400 200 500" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 20">
      <animate attributeName="stroke-dashoffset" from="0" to="30" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 1250 450 Q 1350 400 1400 500" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 20">
      <animate attributeName="stroke-dashoffset" from="30" to="0" dur="1.2s" repeatCount="indefinite"/>
    </path>

  </g>

  <!-- Foreground Halftone Overlay (Adds Depth) -->
  <g opacity="0.2" pointer-events="none">
    <rect width="1600" height="900" fill="url(#halftone-medium)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 20 20; 0 0" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Comic Book "POW!" Text Elements -->
  <g transform="translate(100, 100)">
    <polygon points="0,0 150,50 120,150 0,100" fill="#FF0000" stroke="#000" stroke-width="6"/>
    <text x="20" y="80" font-family="Impact, sans-serif" font-size="60" fill="#FFFF00" stroke="#000" stroke-width="2">POW!</text>
    <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="1s" repeatCount="indefinite" additive="sum"/>
  </g>
  
  <g transform="translate(1300, 650)">
    <polygon points="0,0 150,50 120,150 0,100" fill="#FFFF00" stroke="#000" stroke-width="6"/>
    <text x="20" y="80" font-family="Impact, sans-serif" font-size="60" fill="#FF0000" stroke="#000" stroke-width="2">WOW!</text>
    <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="1.2s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Animated Flashing Borders (Top and Bottom) -->
  <rect x="0" y="0" width="1600" height="40" fill="#FFFF00">
    <animate attributeName="fill" values="#FFFF00;#FF00FF;#00FFFF;#FFFF00" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="860" width="1600" height="40" fill="#00FFFF">
    <animate attributeName="fill" values="#00FFFF;#FFFF00;#FF0000;#00FFFF" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating Geometric Circles (Pop Art Motif) -->
  <circle cx="200" cy="750" r="60" fill="#FF00FF" stroke="#000" stroke-width="6" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -50; 0 0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1400" cy="200" r="40" fill="#00FFFF" stroke="#000" stroke-width="6" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 50; 0 0" dur="3s" repeatCount="indefinite"/>
  </circle>

</svg>