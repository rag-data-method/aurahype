<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBF7EE">
        <animate attributeName="stop-color" values="#FBF7EE;#FFF5A0;#FBF7EE" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#1A3A2A">
        <animate attributeName="stop-color" values="#1A3A2A;#0A2A1A;#1A3A2A" dur="15s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF5A0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FFF5A0" stop-opacity="0"/>
    </linearGradient>
    <filter id="b160"><feGaussianBlur stdDeviation="160"/></filter>
    <filter id="b120"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="b80"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="b40"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="15" result="a"/>
      <feMerge><feMergeNode in="a"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sh">
      <feDropShadow dx="15" dy="25" stdDeviation="20" flood-color="#1A3A2A" flood-opacity="0.4"/>
    </filter>
    <filter id="gn">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feComponentTransfer in="g" result="a">
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend mode="overlay" in="a" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#g)"/>

  <circle cx="1180" cy="450" r="500" fill="#1A3A2A" opacity="0.4" filter="url(#b160)">
    <animate attributeName="cx" values="1180;1100;1180" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="450;500;450" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="r" values="500;550;500" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.5;0.4" dur="14s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1000" cy="350" r="350" fill="#6B8E5C" opacity="0.3" filter="url(#b120)">
    <animate attributeName="cx" values="1000;1050;1000" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="350;300;350" dur="19s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.45;0.3" dur="13s" repeatCount="indefinite"/>
  </circle>

  <rect x="0" y="0" width="800" height="900" fill="#FFF5A0" opacity="0.15" filter="url(#b80)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="x" values="0;-50;0" dur="25s" repeatCount="indefinite"/>
  </rect>

  <rect x="800" y="0" width="800" height="900" fill="#C8FFD8" opacity="0.2" filter="url(#b40)">
    <animate attributeName="opacity" values="0.2;0.3;0.2" dur="11s" repeatCount="indefinite"/>
  </rect>

  <rect width="100%" height="100%" fill="#FBF7EE" filter="url(#gn)" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="8s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#sh)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="1180,450;1195,460;1180,450" dur="15s" repeatCount="indefinite"/>
      <g transform="rotate(-5)">
        <ellipse cx="0" cy="0" rx="300" ry="330" fill="#1A3A2A">
          <animate attributeName="rx" values="300;303;300" dur="10s" repeatCount="indefinite"/>
          <animate attributeName="ry" values="330;333;330" dur="10s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="0" cy="0" rx="270" ry="300" fill="#FBF7EE">
          <animate attributeName="opacity" values="0.95;1;0.95" dur="9s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="0" cy="0" rx="250" ry="280" fill="#C8FFD8">
          <animate attributeName="fill" values="#C8FFD8;#D0FFE0;#C8FFD8" dur="14s" repeatCount="indefinite"/>
        </ellipse>
        <path d="M45 0L250 0A250 280 0 0 1 125 242.5L22.5 39A45 45 0 0 0 45 0Z" fill="#C8FFD8">
          <animate attributeName="opacity" values="1;0.85;1" dur="8s" repeatCount="indefinite"/>
        </path>
        <path d="M22.5 39L125 242.5A250 280 0 0 1-125 242.5L-22.5 39A45 45 0 0 0 22.5 39Z" fill="#6B8E5C">
          <animate attributeName="opacity" values="0.9;0.75;0.9" dur="9s" repeatCount="indefinite"/>
        </path>
        <path d="M-22.5 39L-125 242.5A250 280 0 0 1-250 0L-45 0A45 45 0 0 0-22.5 39Z" fill="#C8FFD8">
          <animate attributeName="opacity" values="1;0.85;1" dur="10s" repeatCount="indefinite"/>
        </path>
        <path d="M-45 0L-250 0A250 280 0 0 1-125-242.5L-22.5-39A45 45 0 0 0-45 0Z" fill="#6B8E5C">
          <animate attributeName="opacity" values="0.9;0.75;0.9" dur="11s" repeatCount="indefinite"/>
        </path>
        <path d="M-22.5-39L-125-242.5A250 280 0 0 1 125-242.5L22.5-39A45 45 0 0 0-22.5-39Z" fill="#C8FFD8">
          <animate attributeName="opacity" values="1;0.85;1" dur="12s" repeatCount="indefinite"/>
        </path>
        <path d="M22.5-39L125-242.5A250 280 0 0 1 250 0L45 0A45 45 0 0 0 22.5-39Z" fill="#6B8E5C">
          <animate attributeName="opacity" values="0.9;0.75;0.9" dur="13s" repeatCount="indefinite"/>
        </path>
        <circle cx="0" cy="0" r="40" fill="#FBF7EE">
          <animate attributeName="r" values="40;43;40" dur="7s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.9;1;0.9" dur="7s" repeatCount="indefinite"/>
        </circle>
        <path d="M-259.8 165A300 330 0 0 1-259.8-165" fill="none" stroke="#FFF5A0" stroke-width="20" stroke-linecap="round" filter="url(#gl)" opacity="0.7">
          <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6s" repeatCount="indefinite"/>
          <animate attributeName="stroke-width" values="20;28;20" dur="6s" repeatCount="indefinite"/>
        </path>
        <g>
          <circle cx="-140" cy="-160" r="6" fill="#FBF7EE" opacity="0.9">
            <animate attributeName="cy" values="-160;-155;-160" dur="5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.9;0.5;0.9" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="r" values="6;7;6" dur="5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="-140" cy="-160" r="2" fill="#FFF5A0" opacity="0.8">
            <animate attributeName="cy" values="-162;-157;-162" dur="5s" repeatCount="indefinite"/>
          </circle>
        </g>
        <g>
          <circle cx="-80" cy="-210" r="4" fill="#FFF5A0" opacity="0.8">
            <animate attributeName="cy" values="-210;-208;-210" dur="7s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.8;0.4;0.8" dur="6s" repeatCount="indefinite"/>
          </circle>
          <circle cx="-80" cy="-210" r="1.5" fill="#FBF7EE" opacity="0.9">
            <animate attributeName="cy" values="-212;-210;-212" dur="7s" repeatCount="indefinite"/>
          </circle>
        </g>
        <g>
          <circle cx="120" cy="-140" r="5" fill="#FBF7EE" opacity="0.85">
            <animate attributeName="cy" values="-140;-138;-140" dur="9s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.85;0.6;0.85" dur="8s" repeatCount="indefinite"/>
          </circle>
          <circle cx="120" cy="-140" r="1.5" fill="#FFF5A0" opacity="0.9">
            <animate attributeName="cy" values="-142;-140;-142" dur="9s" repeatCount="indefinite"/>
          </circle>
        </g>
      </g>
    </g>
  </g>

  <g filter="url(#b40)" opacity="0.5">
    <circle cx="200" cy="150" r="40" fill="#C8FFD8">
      <animate attributeName="cx" values="200;220;200" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;130;150" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="r" values="40;50;40" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="120" r="25" fill="#FFF5A0">
      <animate attributeName="cx" values="260;250;260" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#b80)" opacity="0.4">
    <circle cx="100" cy="400" r="70" fill="#C8FFD8">
      <animate attributeName="cx" values="100;130;100" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="r" values="70;85;70" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#b120)" opacity="0.3">
    <circle cx="350" cy="750" r="90" fill="#FFF5A0">
      <animate attributeName="cy" values="750;720;750" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="r" values="90;110;90" dur="16s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M0 0L400 0L0 600Z" fill="url(#r)" opacity="0.1" filter="url(#b40)">
    <animate attributeName="opacity" values="0.05;0.15;0.05" dur="10s" repeatCount="indefinite"/>
  </path>
</svg>