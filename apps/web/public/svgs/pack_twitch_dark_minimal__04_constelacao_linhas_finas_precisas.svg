<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background-color: #050508;" width="100%" height="100%">
  <defs>
    <!-- Background atmosphere -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#120a25" />
      <stop offset="60%" stop-color="#08060f" />
      <stop offset="100%" stop-color="#050508" />
    </radialGradient>

    <!-- Soft glow for constellation lights -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9" />
      <stop offset="40%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Pulsing bloom filter -->
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur id="blurNode" stdDeviation="0" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />

  <!-- Global bloom pulsing -->
  <animate 
    xlink:href="#blurNode" 
    attributeName="stdDeviation" 
    values="0; 4; 0" 
    dur="12s" 
    repeatCount="indefinite" 
    calcMode="spline" 
    keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" 
  />

  <!-- Largest central glow -->
  <circle cx="400" cy="300" r="400" fill="url(#glowGrad)" opacity="0.6">
    <animate attributeName="opacity" values="0.6; 0.8; 0.6" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    <animate attributeName="r" values="380; 420; 380" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </circle>

  <!-- Main Constellation Layer (Colored) -->
  <g filter="url(#bloom)">
    <!-- Connectors (Finest lines, drawn from center) -->
    <line x1="400" y1="300" x2="400" y2="180" stroke="#7c3aed" stroke-width="0.5" opacity="0.8" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0, 300" to="300, 0" dur="8s" begin="0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>
    
    <line x1="400" y1="300" x2="520" y2="220" stroke="#7c3aed" stroke-width="0.5" opacity="0.8" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0, 300" to="300, 0" dur="8s" begin="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>

    <line x1="400" y1="300" x2="540" y2="400" stroke="#7c3aed" stroke-width="0.5" opacity="0.8" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0, 300" to="300, 0" dur="8s" begin="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>

    <line x1="400" y1="300" x2="320" y2="480" stroke="#7c3aed" stroke-width="0.5" opacity="0.8" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0, 300" to="300, 0" dur="8s" begin="7.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>

    <line x1="400" y1="300" x2="280" y2="320" stroke="#7c3aed" stroke-width="0.5" opacity="0.8" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" from="0, 300" to="300, 0" dur="8s" begin="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1" />
    </line>

    <!-- Secondary Branches (Colored) -->
    <line x1="320" y1="480" x2="220" y2="450" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    <line x1="540" y1="400" x2="620" y2="360" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    <line x1="540" y1="400" x2="560" y2="480" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    <line x1="520" y1="220" x2="580" y2="160" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    <line x1="520" y1="220" x2="480" y2="140" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    
    <!-- Connecting Branches -->
    <line x1="400" y1="180" x2="520" y2="220" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    <line x1="520" y1="220" x2="540" y2="400" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    <line x1="540" y1="400" x2="320" y2="480" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    <line x1="320" y1="480" x2="280" y2="320" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />
    <line x1="280" y1="320" x2="400" y2="180" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" stroke-linecap="round" />

    <!-- Main Nodes (Colored) -->
    <!-- Center Core -->
    <circle cx="400" cy="300" r="20" fill="url(#glowGrad)" opacity="0.9">
      <animate attributeName="r" values="15; 22; 15" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
      <animate attributeName="opacity" values="0.9; 1; 0.9" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="400" cy="300" r="3" fill="#ffffff" opacity="1" />

    <!-- Top Node -->
    <circle cx="400" cy="180" r="12" fill="url(#glowGrad)" opacity="0.8">
      <animate attributeName="r" values="10; 14; 10" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
      <animate attributeName="opacity" values="0.8; 1; 0.8" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="400" cy="180" r="2.5" fill="#ffffff" opacity="1"/>

    <!-- Right-Top Node -->
    <circle cx="520" cy="220" r="10" fill="url(#glowGrad)" opacity="0.8">
      <animate attributeName="r" values="8; 12; 8" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
      <animate attributeName="opacity" values="0.8; 1; 0.8" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="520" cy="220" r="2" fill="#ffffff" opacity="1"/>

    <!-- Right-Bottom Node -->
    <circle cx="540" cy="400" r="14" fill="url(#glowGrad)" opacity="0.8">
      <animate attributeName="r" values="12; 16; 12" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
      <animate attributeName="opacity" values="0.8; 1; 0.8" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="540" cy="400" r="2.5" fill="#ffffff" opacity="1"/>

    <!-- Bottom Node -->
    <circle cx="320" cy="480" r="10" fill="url(#glowGrad)" opacity="0.8">
      <animate attributeName="r" values="8; 12; 8" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
      <animate attributeName="opacity" values="0.8; 1; 0.8" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="320" cy="480" r="2" fill="#ffffff" opacity="1"/>

    <!-- Left-Mid Node -->
    <circle cx="280" cy="320" r="12" fill="url(#glowGrad)" opacity="0.8">
      <animate attributeName="r" values="10; 14; 10" dur="11s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
      <animate attributeName="opacity" values="0.8; 1; 0.8" dur="11s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="280" cy="320" r="2.5" fill="#ffffff" opacity="1"/>

    <!-- Terminals (Colored) -->
    <circle cx="220" cy="450" r="6" fill="url(#glowGrad)" opacity="0.7" />
    <circle cx="220" cy="450" r="1.5" fill="#ffffff" opacity="0.9" />
    
    <circle cx="620" cy="360" r="6" fill="url(#glowGrad)" opacity="0.7" />
    <circle cx="620" cy="360" r="1.5" fill="#ffffff" opacity="0.9" />
    
    <circle cx="560" cy="480" r="6" fill="url(#glowGrad)" opacity="0.7" />
    <circle cx="560" cy="480" r="1.5" fill="#ffffff" opacity="0.9" />
    
    <circle cx="580" cy="160" r="6" fill="url(#glowGrad)" opacity="0.7" />
    <circle cx="580" cy="160" r="1.5" fill="#ffffff" opacity="0.9" />
    
    <circle cx="480" cy="140" r="6" fill="url(#glowGrad)" opacity="0.7" />
    <circle cx="480" cy="140" r="1.5" fill="#ffffff" opacity="0.9" />
  </g>

  <!-- Background Distant Stars Layer (White) -->
  <g>
    <!-- Lines (Very thin, subtle) -->
    <line x1="200" y1="100" x2="280" y2="120" stroke="#ffffff" stroke-width="0.5" opacity="0.4" />
    <line x1="280" y1="120" x2="320" y2="80" stroke="#ffffff" stroke-width="0.5" opacity="0.4" />
    
    <line x1="650" y1="100" x2="700" y2="180" stroke="#ffffff" stroke-width="0.5" opacity="0.4" />
    <line x1="700" y1="180" x2="760" y2="250" stroke="#ffffff" stroke-width="0.5" opacity="0.4" />
    
    <line x1="150" y1="500" x2="100" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.4" />
    <line x1="100" y1="420" x2="40" y2="380" stroke="#ffffff" stroke-width="0.5" opacity="0.4" />
    
    <line x1="680" y1="480" x2="620" y2="520" stroke="#ffffff" stroke-width="0.5" opacity="0.4" />
    
    <line x1="500" y1="50" x2="450" y2="90" stroke="#ffffff" stroke-width="0.5" opacity="0.4" />

    <!-- Points (Pure white, subtle blink) -->
    <circle cx="200" cy="100" r="2.5" fill="#ffffff" opacity="0.9">
      <animate attributeName="opacity" values="0.9; 0.4; 0.9" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="280" cy="120" r="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8; 0.3; 0.8" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="320" cy="80" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7; 0.2; 0.7" dur="11s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>

    <circle cx="650" cy="100" r="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8; 0.3; 0.8" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="700" cy="180" r="2.5" fill="#ffffff" opacity="0.9">
      <animate attributeName="opacity" values="0.9; 0.4; 0.9" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="760" cy="250" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7; 0.2; 0.7" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>

    <circle cx="150" cy="500" r="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8; 0.3; 0.8" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="100" cy="420" r="2.5" fill="#ffffff" opacity="0.9">
      <animate attributeName="opacity" values="0.9; 0.4; 0.9" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="40" cy="380" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7; 0.2; 0.7" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>

    <circle cx="680" cy="480" r="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8; 0.3; 0.8" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="620" cy="520" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7; 0.2; 0.7" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>

    <circle cx="500" cy="50" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7; 0.2; 0.7" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
    <circle cx="450" cy="90" r="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8; 0.3; 0.8" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
  </g>

  <!-- Flares / Cross Stars -->
  <g>
    <!-- Center Core Flare -->
    <path d="M 400 272 L 400 328 M 372 300 L 428 300" stroke="#ffffff" stroke-width="0.5" opacity="0.6" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="60s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6; 0.2; 0.6" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>
    <path d="M 392 292 L 408 308 M 392 308 L 408 292" stroke="#7c3aed" stroke-width="0.5" opacity="0.6" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="45 400 300" to="405 400 300" dur="60s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6; 0.2; 0.6" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>

    <!-- Top Node Flare -->
    <path d="M 400 168 L 400 192 M 388 180 L 412 180" stroke="#ffffff" stroke-width="0.5" opacity="0.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.5; 0.1; 0.5" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>

    <!-- Right-Bottom Node Flare -->
    <path d="M 540 384 L 540 416 M 524 400 L 556 400" stroke="#ffffff" stroke-width="0.5" opacity="0.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.5; 0.1; 0.5" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>
  </g>
</svg>