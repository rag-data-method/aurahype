<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#120024" />
      <stop offset="100%" stop-color="#05000a" />
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff">
        <animate attributeName="stop-color" values="#00ffff;#ff00ff;#00ff00;#00ffff" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ff00ff">
        <animate attributeName="stop-color" values="#ff00ff;#00ff00;#00ffff;#ff00ff" dur="3.5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff00">
        <animate attributeName="stop-color" values="#00ff00;#00ffff;#ff00ff;#00ff00" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00ffff">
        <animate attributeName="stop-color" values="#00ffff;#ff00ff;#00ff00;#00ffff" dur="4.5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00ff">
        <animate attributeName="stop-color" values="#ff00ff;#00ff00;#00ffff;#ff00ff" dur="3.2s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00ffff">
        <animate attributeName="stop-color" values="#00ffff;#ff00ff;#00ff00;#00ffff" dur="3.8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="grad4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00ff00">
        <animate attributeName="stop-color" values="#00ff00;#00ffff;#ff00ff;#00ff00" dur="4.2s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ff00ff">
        <animate attributeName="stop-color" values="#ff00ff;#00ff00;#00ffff;#ff00ff" dur="4.8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <g id="d-pad">
      <path d="M -15 -45 L 15 -45 L 15 -15 L 45 -15 L 45 15 L 15 15 L 15 45 L -15 45 L -15 15 L -45 15 L -45 -15 L -15 -15 Z" stroke-width="3" fill="none">
        <animate attributeName="stroke" values="#00ffff;#ff00ff;#00ff00;#00ffff" dur="5s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="scale" values="0.8; 1.2; 0.8" dur="4s" repeatCount="indefinite" />
      </path>
      <circle cx="0" cy="0" r="12" stroke-width="2" fill="none">
        <animate attributeName="r" values="12; 5; 12" dur="3s" repeatCount="indefinite" />
        <animate attributeName="stroke" values="#ff00ff;#00ffff;#00ff00;#ff00ff" dur="6s" repeatCount="indefinite" />
      </circle>
      <path d="M 0 -25 L 0 25 M -25 0 L 25 0" stroke-width="1.5" stroke-dasharray="5 3">
        <animate attributeName="stroke-dashoffset" values="0; 16" dur="2s" repeatCount="indefinite" />
      </path>
    </g>

    <g id="d-pad-geom">
      <path d="M -15 -45 L 15 -45 L 15 -15 L 45 -15 L 45 15 L 15 15 L 15 45 L -15 45 L -15 15 L -45 15 L -45 -15 L -15 -15 Z" stroke="none">
        <animate attributeName="fill" values="#00ffff;#ff00ff;#00ff00;#00ffff" dur="5s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="scale" values="0.9; 1.1; 0.9" dur="4s" repeatCount="indefinite" />
      </path>
    </g>

    <g id="ring">
      <circle cx="0" cy="0" r="140" stroke-width="2" fill="none" stroke-dasharray="10 20">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
        <animate attributeName="stroke-dashoffset" values="0; 60; 0" dur="8s" repeatCount="indefinite" />
      </circle>
      <circle cx="0" cy="0" r="160" stroke-width="1" fill="none" stroke-dasharray="4 16">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite" />
      </circle>
    </g>
  </defs>

  <rect width="800" height="600" fill="url(#bg-grad)" />
  <g opacity="0.3">
    <rect width="800" height="600" fill="none" stroke="#ff00ff" stroke-width="10" />
    <rect x="10" y="10" width="780" height="580" fill="none" stroke="#00ffff" stroke-width="2" />
    <path d="M 10 10 L 790 590 M 790 10 L 10 590" stroke="#00ff00" stroke-width="1" />
  </g>

  <g transform="translate(400, 300)" filter="url(#glow)">
    <use href="#ring" stroke="#00ffff">
      <animate attributeName="stroke" values="#00ffff;#00ff00;#ff00ff;#00ffff" dur="6s" repeatCount="indefinite" />
    </use>

    <use href="#d-pad-geom" transform="rotate(0) translate(0, -130) scale(2.5)" fill="url(#grad1)">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0.6; 0.2; 0.6" dur="5s" repeatCount="indefinite" />
    </use>
    <use href="#d-pad-geom" transform="rotate(90) translate(0, -130) scale(2.5)" fill="url(#grad2)">
      <animateTransform attributeName="transform" type="rotate" values="90; 450" dur="20s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0.2; 0.6; 0.2" dur="5s" begin="1s" repeatCount="indefinite" />
    </use>
    <use href="#d-pad-geom" transform="rotate(180) translate(0, -130) scale(2.5)" fill="url(#grad3)">
      <animateTransform attributeName="transform" type="rotate" values="180; 540" dur="20s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0.6; 0.2; 0.6" dur="5s" begin="2s" repeatCount="indefinite" />
    </use>
    <use href="#d-pad-geom" transform="rotate(270) translate(0, -130) scale(2.5)" fill="url(#grad4)">
      <animateTransform attributeName="transform" type="rotate" values="270; 630" dur="20s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0.2; 0.6; 0.2" dur="5s" begin="3s" repeatCount="indefinite" />
    </use>

    <g transform="rotate(45)">
      <use href="#d-pad-geom" transform="translate(0, -180) scale(1.5)" fill="url(#grad1)" />
      <use href="#d-pad-geom" transform="rotate(90) translate(0, -180) scale(1.5)" fill="url(#grad2)" />
      <use href="#d-pad-geom" transform="rotate(180) translate(0, -180) scale(1.5)" fill="url(#grad3)" />
      <use href="#d-pad-geom" transform="rotate(270) translate(0, -180) scale(1.5)" fill="url(#grad4)" />
      <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="30s" repeatCount="indefinite" additive="sum" />
    </g>

    <g id="mosaic-ring-1">
      <use href="#d-pad" transform="translate(0, -220)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="15s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(45) translate(0, -220)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="16s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(90) translate(0, -220)" stroke="#00ff00">
        <animateTransform attributeName="transform" type="rotate" values="90; 450" dur="14s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(135) translate(0, -220)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="rotate" values="135; 495" dur="17s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(180) translate(0, -220)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="rotate" values="180; 540" dur="15s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(225) translate(0, -220)" stroke="#00ff00">
        <animateTransform attributeName="transform" type="rotate" values="225; 585" dur="16s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(270) translate(0, -220)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="rotate" values="270; 630" dur="14s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(315) translate(0, -220)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="rotate" values="315; 675" dur="17s" repeatCount="indefinite" />
      </use>
    </g>

    <g id="mosaic-ring-2">
      <use href="#d-pad" transform="translate(0, -300)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="scale" values="0.7; 1; 0.7" dur="3s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="0; -360" dur="10s" repeatCount="indefinite" additive="sum" />
      </use>
      <use href="#d-pad" transform="rotate(60) translate(0, -300)" stroke="#00ff00">
        <animateTransform attributeName="transform" type="scale" values="1; 0.7; 1" dur="3.5s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="60; -300" dur="11s" repeatCount="indefinite" additive="sum" />
      </use>
      <use href="#d-pad" transform="rotate(120) translate(0, -300)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="scale" values="0.7; 1; 0.7" dur="4s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="120; -240" dur="12s" repeatCount="indefinite" additive="sum" />
      </use>
      <use href="#d-pad" transform="rotate(180) translate(0, -300)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="scale" values="1; 0.7; 1" dur="3.2s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="180; -180" dur="10.5s" repeatCount="indefinite" additive="sum" />
      </use>
      <use href="#d-pad" transform="rotate(240) translate(0, -300)" stroke="#00ff00">
        <animateTransform attributeName="transform" type="scale" values="0.7; 1; 0.7" dur="3.8s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="240; -120" dur="11.5s" repeatCount="indefinite" additive="sum" />
      </use>
      <use href="#d-pad" transform="rotate(300) translate(0, -300)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="scale" values="1; 0.7; 1" dur="4.2s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="300; -60" dur="12.5s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>

    <g id="mosaic-ring-3" opacity="0.5">
      <use href="#d-pad" transform="translate(0, -380) scale(0.5)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="5s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(30) translate(0, -380) scale(0.5)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="rotate" values="30; 390" dur="6s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(60) translate(0, -380) scale(0.5)" stroke="#00ff00">
        <animateTransform attributeName="transform" type="rotate" values="60; 420" dur="5.5s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(90) translate(0, -380) scale(0.5)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="rotate" values="90; 450" dur="4.5s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(120) translate(0, -380) scale(0.5)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="rotate" values="120; 480" dur="6.5s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(150) translate(0, -380) scale(0.5)" stroke="#00ff00">
        <animateTransform attributeName="transform" type="rotate" values="150; 510" dur="5s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(180) translate(0, -380) scale(0.5)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="rotate" values="180; 540" dur="4s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(210) translate(0, -380) scale(0.5)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="rotate" values="210; 570" dur="6s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(240) translate(0, -380) scale(0.5)" stroke="#00ff00">
        <animateTransform attributeName="transform" type="rotate" values="240; 600" dur="5.5s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(270) translate(0, -380) scale(0.5)" stroke="#00ffff">
        <animateTransform attributeName="transform" type="rotate" values="270; 630" dur="4.5s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(300) translate(0, -380) scale(0.5)" stroke="#ff00ff">
        <animateTransform attributeName="transform" type="rotate" values="300; 660" dur="6.5s" repeatCount="indefinite" />
      </use>
      <use href="#d-pad" transform="rotate(330) translate(0, -380) scale(0.5)" stroke="#00ff00">
        <animateTransform attributeName="transform" type="rotate" values="330; 690" dur="5s" repeatCount="indefinite" />
      </use>
    </g>

    <g id="center-core" filter="url(#glow)">
      <use href="#d-pad" transform="scale(1.8)" />
      <use href="#d-pad" transform="rotate(45) scale(1.3)">
        <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="10s" repeatCount="indefinite" additive="sum" />
      </use>
    </g>
  </g>

  <g transform="translate(400, 300)" opacity="0.4" filter="url(#soft-glow)">
    <path d="M -400 -300 L -300 -200 M 400 -300 L 300 -200 M -400 300 L -300 200 M 400 300 L 300 200" stroke="#00ffff" stroke-width="1" stroke-dasharray="10 20">
      <animate attributeName="stroke-dashoffset" values="0; 30" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <g transform="translate(100, 100)" opacity="0.3" filter="url(#soft-glow)">
    <use href="#d-pad" transform="scale(0.8)" />
    <use href="#d-pad" transform="rotate(22.5) scale(0.6)" />
  </g>
  <g transform="translate(700, 100)" opacity="0.3" filter="url(#soft-glow)">
    <use href="#d-pad" transform="scale(0.8)" />
    <use href="#d-pad" transform="rotate(45) scale(0.6)" />
  </g>
  <g transform="translate(100, 500)" opacity="0.3" filter="url(#soft-glow)">
    <use href="#d-pad" transform="rotate(90) scale(0.8)" />
    <use href="#d-pad" transform="rotate(112.5) scale(0.6)" />
  </g>
  <g transform="translate(700, 500)" opacity="0.3" filter="url(#soft-glow)">
    <use href="#d-pad" transform="rotate(180) scale(0.8)" />
    <use href="#d-pad" transform="rotate(202.5) scale(0.6)" />
  </g>
</svg>