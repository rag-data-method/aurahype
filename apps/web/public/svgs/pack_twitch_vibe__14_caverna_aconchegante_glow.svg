  <path d="M 0,600 L 0,450 C 80,420 150,390 220,430 C 300,480 350,420 420,470 C 500,530 550,460 620,490 C 680,520 750,480 800,460 L 800,600 Z" fill="url(#caveGrad)"/>
  <path d="M 0,600 L 0,450 C 80,420 150,390 220,430 C 300,480 350,420 420,470 C 500,530 550,460 620,490 C 680,520 750,480 800,460 L 800,600 Z" fill="none" stroke="#FF00FF" stroke-width="3" opacity="0.4" filter="url(#glow)"/>

  <g opacity="0.8">
