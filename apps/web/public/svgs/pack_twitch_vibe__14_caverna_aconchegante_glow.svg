<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#4B0082"/>
      <stop offset="45%" stop-color="#1E0030"/>
      <stop offset="100%" stop-color="#0A0015"/>
    </radialGradient>
    
    <linearGradient id="caveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#05000A"/>
      <stop offset="100%" stop-color="#1A0B2E"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="intenseGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="moonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>

    <g id="sparkle">
      <path d="M 0 -12 Q 0 0 12 0 Q 0 0 0 12 Q 0 0 -12 0 Q 0 0 0 -12 Z" fill="#FFFFFF">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="180 0 0" dur="3s" begin="0s" repeatCount="indefinite"/>
      </path>
    </g>

    <g id="chatBubble">
      <circle cx="0" cy="0" r="4" fill="#00FFFF" opacity="0.8"/>
      <text x="0" y="1.5" text-anchor="middle" font-size="5" fill="#000000" font-family="monospace" font-weight="bold">
        <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0s" repeatCount="indefinite"/>
      </text>
    </g>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <g opacity="0.6">
    <circle cx="120" cy="80" r="1.5" fill="#FFFFFF">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="40" r="1" fill="#FFFFFF">
      <animate attributeName="opacity" values="0;1;0" dur="6s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="100" r="2" fill="#FFFFFF">
      <animate attributeName="opacity" values="0;1;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="60" r="1" fill="#FFFFFF">
