    </circle>
    <circle cx="50" cy="180" r="1.5" fill="#FFFFFF">
      <animate attributeName="opacity" values="0;1;0" dur="5.5s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="120" r="1" fill="#FFFFFF">
      <animate attributeName="opacity" values="0;1;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(400, 250)">
    <circle cx="0" cy="0" r="120" fill="#FFD700" opacity="0.1" filter="url(#moonGlow)">
      <animate attributeName="r" values="120;140;120" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="90" fill="#FFA500" opacity="0.05" filter="url(#moonGlow)"/>
  </g>

  <use href="#sparkle" x="150" y="150">
