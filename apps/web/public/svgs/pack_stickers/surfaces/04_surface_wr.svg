<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Color definitions -->
    <color id="c-red" value="#E60012"/>
    <color id="c-white" value="#FFFFFF"/>

    <!-- Base zigzag stripe pattern -->
    <pattern id="zigzag" width="100" height="200" patternUnits="userSpaceOnUse">
      <!-- Red background -->
      <rect width="100" height="200" fill="#E60012"/>
      
      <!-- White vertical stripe base -->
      <rect x="0" y="0" width="50" height="200" fill="#FFFFFF"/>
      
      <!-- Wavy zigzag path -->
      <path d="M 50,0 
               C 60,20 40,40 50,60 
               C 60,80 40,100 50,120 
               C 60,140 40,160 50,180 
               C 60,200 40,220 50,240 
               C 60,260 40,280 50,300 
               C 60,320 40,340 50,360 
               C 60,380 40,400 50,420 
               C 60,440 40,460 50,480 
               C 60,500 40,520 50,540 
               C 60,560 40,580 50,600 
               C 60,620 40,640 50,660 
               C 60,680 40,700 50,720 
               C 60,740 40,760 50,780 
               C 60,800 40,820 50,840 
               C 60,860 40,880 50,900 
               L 0,900 
               C -10,880 10,860 0,840 
               C -10,820 10,800 0,780 
               C -10,760 10,740 0,720 
               C -10,700 10,680 0,660 
               C -10,640 10,620 0,600 
               C -10,580 10,560 0,540 
               C -10,520 10,500 0,480 
               C -10,460 10,440 0,420 
               C -10,400 10,380 0,360 
               C -10,340 10,320 0,300 
               C -10,280 10,260 0,240 
               C -10,220 10,200 0,180 
               C -10,160 10,140 0,120 
               C -10,100 10,80 0,60 
               C -10,40 10,20 0,0 Z" 
            fill="#E60012"/>
    </pattern>

    <!-- Offset zigzag for moiré effect -->
    <pattern id="zigzag-offset" width="100" height="200" patternUnits="userSpaceOnUse" patternTransform="translate(25, 100)">
      <rect width="100" height="200" fill="none"/>
      <path d="M 50,0 
               C 60,20 40,40 50,60 
               C 60,80 40,100 50,120 
               C 60,140 40,160 50,180 
               C 60,200 40,220 50,240 
               C 60,260 40,280 50,300 
               C 60,320 40,340 50,360 
               C 60,380 40,400 50,420 
               C 60,440 40,460 50,480 
               C 60,500 40,520 50,540 
               C 60,560 40,580 50,600 
               C 60,620 40,640 50,660 
               C 60,680 40,700 50,720 
               C 60,740 40,760 50,780 
               C 60,800 40,820 50,840 
               C 60,860 40,880 50,900 
               L 0,900 
               C -10,880 10,860 0,840 
               C -10,820 10,800 0,780 
               C -10,760 10,740 0,720 
               C -10,700 10,680 0,660 
               C -10,640 10,620 0,600 
               C -10,580 10,560 0,540 
               C -10,520 10,500 0,480 
               C -10,460 10,440 0,420 
               C -10,400 10,380 0,360 
               C -10,340 10,320 0,300 
               C -10,280 10,260 0,240 
               C -10,220 10,200 0,180 
               C -10,160 10,140 0,120 
               C -10,100 10,80 0,60 
               C -10,40 10,20 0,0 Z" 
            fill="#FFFFFF" opacity="0.15"/>
    </pattern>

    <!-- Halftone dot pattern overlay -->
    <pattern id="halftone" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="4" fill="#E60012" opacity="0.08"/>
    </pattern>

    <!-- Large halftone for top-right corner -->
    <pattern id="halftone-large" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="8" fill="#FFFFFF" opacity="0.06"/>
    </pattern>

    <!-- Vintage print noise texture -->
    <pattern id="noise" width="200" height="200" patternUnits="userSpaceOnUse">
      <g fill="#E60012" opacity="0.04">
        <circle cx="10" cy="10" r="1.5"/>
        <circle cx="45" cy="25" r="1"/>
        <circle cx="80" cy="5" r="2"/>
        <circle cx="120" cy="40" r="1.5"/>
        <circle cx="160" cy="15" r="1"/>
        <circle cx="30" cy="70" r="2"/>
        <circle cx="75" cy="90" r="1.5"/>
        <circle cx="110" cy="65" r="1"/>
        <circle cx="150" cy="85" r="2"/>
        <circle cx="190" cy="60" r="1.5"/>
        <circle cx="15" cy="130" r="1"/>
        <circle cx="55" cy="145" r="2"/>
        <circle cx="95" cy="120" r="1.5"/>
        <circle cx="135" cy="155" r="1"/>
        <circle cx="175" cy="135" r="2"/>
        <circle cx="25" cy="180" r="1.5"/>
        <circle cx="65" cy="195" r="1"/>
        <circle cx="105" cy="175" r="2"/>
        <circle cx="145" cy="190" r="1.5"/>
        <circle cx="185" cy="170" r="1"/>
      </g>
      <g fill="#FFFFFF" opacity="0.04">
        <circle cx="25" cy="15" r="1"/>
        <circle cx="60" cy="35" r="1.5"/>
        <circle cx="100" cy="10" r="2"/>
        <circle cx="140" cy="50" r="1"/>
        <circle cx="180" cy="25" r="1.5"/>
        <circle cx="40" cy="80" r="1"/>
        <circle cx="85" cy="100" r="2"/>
        <circle cx="125" cy="75" r="1.5"/>
        <circle cx="165" cy="95" r="1"/>
        <circle cx="5" cy="110" r="1.5"/>
        <circle cx="50" cy="140" r="2"/>
        <circle cx="90" cy="125" r="1"/>
        <circle cx="130" cy="160" r="1.5"/>
        <circle cx="170" cy="145" r="2"/>
        <circle cx="35" cy="185" r="1"/>
        <circle cx="75" cy="200" r="1.5"/>
        <circle cx="115" cy="180" r="2"/>
        <circle cx="155" cy="195" r="1"/>
        <circle cx="195" cy="165" r="1.5"/>
      </g>
    </pattern>
  </defs>

  <!-- Background base -->
  <rect width="1600" height="900" fill="#FFFFFF"/>

  <!-- Main zigzag pattern -->
  <rect width="1600" height="900" fill="url(#zigzag)"/>

  <!-- Offset zigzag overlay for moiré/vintage print effect -->
  <rect width="1600" height="900" fill="url(#zigzag-offset)"/>

  <!-- Subtle halftone overlay -->
  <rect width="1600" height="900" fill="url(#halftone)"/>

  <!-- Diagonal halftone band for visual interest -->
  <rect x="800" y="0" width="400" height="900" fill="url(#halftone-large)" transform="rotate(15, 1000, 450)"/>

  <!-- Vintage print noise texture -->
  <rect width="1600" height="900" fill="url(#noise)"/>

  <!-- Bold diagonal stripe accent (bottom-right) -->
  <g opacity="0.9">
    <path d="M 1100,900 L 1600,900 L 1600,600 Z" fill="#E60012"/>
    <path d="M 1200,900 L 1600,900 L 1600,700 Z" fill="#FFFFFF"/>
    <path d="M 1300,900 L 1600,900 L 1600,800 Z" fill="#E60012"/>
  </g>

  <!-- Top-left corner accent -->
  <g opacity="0.9">
    <path d="M 0,0 L 500,0 L 0,300 Z" fill="#E60012"/>
    <path d="M 0,0 L 350,0 L 0,210 Z" fill="#FFFFFF"/>
    <path d="M 0,0 L 200,0 L 0,120 Z" fill="#E60012"/>
  </g>

  <!-- Subtle border frame -->
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#E60012" stroke-width="8" opacity="0.3"/>
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.5"/>
</svg>