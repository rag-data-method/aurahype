<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <pattern id="basket" width="400" height="400" patternUnits="userSpaceOnUse">
      <rect width="400" height="400" fill="#ffffff"/>
      <!-- Diagonal bands (slope +1) -->
      <polygon points="350,0 400,0 400,50" fill="#000000"/>
      <polygon points="0,0 50,0 400,350 400,400 350,400 0,50" fill="#000000"/>
      <polygon points="0,350 0,400 50,400" fill="#000000"/>
      <!-- Diagonal bands (slope -1) -->
      <polygon points="0,150 0,250 250,0 150,0" fill="#000000"/>
      <polygon points="400,150 400,250 250,400 150,400" fill="#000000"/>
      <!-- Weave underlap cuts (white diamonds) -->
      <polygon points="150,100 100,150 50,100 100,50" fill="#ffffff"/>
      <polygon points="350,300 300,350 250,300 300,250" fill="#ffffff"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#basket)"/>
</svg>