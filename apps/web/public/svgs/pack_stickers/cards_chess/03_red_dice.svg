<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="halftone" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.5" fill="#000000"/>
    </pattern>
  </defs>

  <!-- White Die-Cut Sticker Base -->
  <path d="M 180 200 C 100 300, 60 440, 100 600 C 140 760, 260 880, 440 900 C 620 920, 780 860, 880 740 C 980 620, 960 460, 900 340 C 840 220, 720 120, 560 100 C 400 80, 260 120, 180 200 Z" fill="#FFFFFF"/>

  <!-- Pop Art Sunburst Background -->
  <path d="M 840 500 L 725 630 L 670 794 L 500 760 L 330 794 L 275 630 L 160 500 L 275 370 L 330 206 L 500 240 L 670 206 L 725 370 Z" fill="#FFD700" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
  <path d="M 840 500 L 725 630 L 670 794 L 500 760 L 330 794 L 275 630 L 160 500 L 275 370 L 330 206 L 500 240 L 670 206 L 725 370 Z" fill="url(#halftone)" opacity="0.15"/>

  <!-- Die Drop Shadows -->
  <rect x="-100" y="-100" width="200" height="200" rx="10" transform="translate(395,435) rotate(-20)" fill="#000000"/>
  <rect x="-100" y="-100" width="200" height="200" rx="10" transform="translate(655,615) rotate(40)" fill="#000000"/>

  <!-- Trailing Motion Lines (Behind Dice) -->
  <path d="M 300 320 Q 200 280 160 380" stroke="#000000" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 320 360 Q 220 320 180 420" stroke="#000000" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M 340 400 Q 240 360 200 460" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
  <line x1="140" y1="300" x2="260" y2="330" stroke="#000000" stroke-width="10" stroke-linecap="round"/>
  <line x1="120" y1="360" x2="240" y2="390" stroke="#000000" stroke-width="7" stroke-linecap="round"/>
  <line x1="160" y1="240" x2="280" y2="270" stroke="#000000" stroke-width="9" stroke-linecap="round"/>

  <!-- Action Dots & Star (Behind Die 1) -->
  <circle cx="150" cy="350" r="8" fill="#000000"/>
  <circle cx="130" cy="370" r="6" fill="#000000"/>
  <circle cx="110" cy="390" r="4" fill="#000000"/>
  <path d="M 220 260 L 240 240 L 250 270 L 280 260 L 260 280 L 280 300 L 250 290 L 240 320 L 220 300 L 190 310 L 200 280 L 170 270 Z" fill="#FFFFFF" stroke="#000000" stroke-width="6" stroke-linejoin="round"/>

  <!-- Die 1 (Showing 5) -->
  <g transform="translate(380,420) rotate(-20)">
    <rect x="-100" y="-100" width="200" height="200" rx="10" fill="#FF2222" stroke="#000000" stroke-width="12"/>
    <rect x="-100" y="-100" width="200" height="200" rx="10" fill="url(#halftone)" opacity="0.2"/>
    <g fill="#000000" stroke="#000000" stroke-width="4">
      <circle cx="-55" cy="-55" r="20"/>
      <circle cx="55" cy="-55" r="20"/>
      <circle cx="0" cy="0" r="20"/>
      <circle cx="-55" cy="55" r="20"/>
      <circle cx="55" cy="55" r="20"/>
    </g>
    <g fill="#FFFFFF">
      <circle cx="-50" cy="-60" r="6"/>
      <circle cx="60" cy="-60" r="6"/>
      <circle cx="5" cy="-5" r="6"/>
      <circle cx="-50" cy="50" r="6"/>
      <circle cx="60" cy="50" r="6"/>
    </g>
  </g>

  <!-- Die 2 (Showing 6) -->
  <g transform="translate(640,600) rotate(40)">
    <rect x="-100" y="-100" width="200" height="200" rx="10" fill="#FF2222" stroke="#000000" stroke-width="12"/>
    <rect x="-100" y="-100" width="200" height="200" rx="10" fill="url(#halftone)" opacity="0.2"/>
    <g fill="#000000" stroke="#000000" stroke-width="4">
      <circle cx="-55" cy="-60" r="18"/>
      <circle cx="55" cy="-60" r="18"/>
      <circle cx="-55" cy="0" r="18"/>
      <circle cx="55" cy="0" r="18"/>
      <circle cx="-55" cy="60" r="18"/>
      <circle cx="55" cy="60" r="18"/>
    </g>
    <g fill="#FFFFFF">
      <circle cx="-50" cy="-65" r="5"/>
      <circle cx="60" cy="-65" r="5"/>
      <circle cx="-50" cy="-5" r="5"/>
      <circle cx="60" cy="-5" r="5"/>
      <circle cx="-50" cy="55" r="5"/>
      <circle cx="60" cy="55" r="5"/>
    </g>
  </g>

  <!-- Foreground Impact / Action Lines -->
  <g stroke="#000000" stroke-linecap="round">
    <line x1="720" y1="520" x2="820" y2="420" stroke-width="14"/>
    <line x1="720" y1="520" x2="860" y2="500" stroke-width="11"/>
    <line x1="720" y1="520" x2="820" y2="620" stroke-width="12"/>
    <line x1="720" y1="520" x2="680" y2="720" stroke-width="10"/>
    <line x1="720" y1="520" x2="560" y2="660" stroke-width="8"/>
    <line x1="720" y1="520" x2="580" y2="440" stroke-width="10"/>
  </g>

  <!-- Impact Starburst -->
  <path d="M 720 440 L 735 480 L 780 480 L 745 505 L 760 550 L 720 520 L 680 550 L 695 505 L 660 480 L 705 480 Z" fill="#FFFFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>

  <!-- Landing Action Dots -->
  <circle cx="620" cy="720" r="10" fill="#000000"/>
  <circle cx="590" cy="750" r="7" fill="#000000"/>
  <circle cx="560" cy="770" r="5" fill="#000000"/>

  <!-- Additional Speed Arcs & Lines -->
  <path d="M 480 800 Q 520 720 460 640" stroke="#000000" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 520 820 Q 560 740 500 660" stroke="#000000" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 600 750 Q 650 850 750 800" stroke="#000000" stroke-width="10" fill="none" stroke-linecap="round"/>
  <line x1="800" y1="200" x2="900" y2="180" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
  <line x1="820" y1="240" x2="920" y2="220" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="800" x2="300" y2="820" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
</svg>