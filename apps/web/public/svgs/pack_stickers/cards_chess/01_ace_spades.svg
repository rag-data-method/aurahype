<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Halftone Pattern for the Spade Interior -->
    <pattern id="halftone" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="5" fill="#FF004C"/>
    </pattern>

    <!-- Halftone Pattern for the Drop Shadow -->
    <pattern id="shadow-dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3.5" fill="#000000"/>
    </pattern>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="25" dy="30" stdDeviation="0" flood-color="#000000" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Outer Die-Cut Border (White with Black stroke) -->
  <path d="M 130,100 L 870,100 A 30,30 0 0 1 900,130 L 900,870 A 30,30 0 0 1 870,900 L 130,900 A 30,30 0 0 1 100,870 L 100,130 A 30,30 0 0 1 130,100 Z" 
        fill="#FFFFFF" stroke="#000000" stroke-width="24"/>

  <!-- Card Base with Pop Art Drop Shadow -->
  <g filter="url(#shadow)">
    <rect x="130" y="130" width="680" height="940" rx="25" ry="25" fill="#FFCC00" stroke="#000000" stroke-width="18"/>
  </g>

  <!-- Card Inner Border -->
  <rect x="170" y="170" width="600" height="860" rx="15" ry="15" fill="none" stroke="#000000" stroke-width="12"/>

  <!-- Top Left "A" and Spade -->
  <text x="215" y="270" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="100" fill="#000000" stroke="#000000" stroke-width="4">A</text>
  <path d="M 215 290 C 215 290, 190 320, 190 340 C 190 355, 200 365, 215 365 C 225 365, 230 360, 235 350 C 240 360, 245 365, 255 365 C 270 365, 280 355, 280 340 C 280 320, 255 290, 255 290 C 255 290, 245 275, 235 255 C 225 275, 215 290, 215 290 Z" 
        fill="#000000" stroke="#000000" stroke-width="6"/>

  <!-- Bottom Right "A" and Spade (Rotated) -->
  <g transform="translate(785, 930) rotate(180)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="100" fill="#000000" stroke="#000000" stroke-width="4">A</text>
    <path d="M 0 20 C 0 20, -25 50, -25 70 C -25 85, -15 95, 0 95 C 10 95, 15 90, 20 80 C 25 90, 30 95, 40 95 C 55 95, 65 85, 65 70 C 65 50, 40 20, 40 20 C 40 20, 30 5, 20 -15 C 10 5, 0 20, 0 20 Z" 
          fill="#000000" stroke="#000000" stroke-width="6"/>
  </g>

  <!-- Center Spade Base (White fill to act as a canvas for the halftone overlay) -->
  <path d="M 500 280 C 500 280, 280 480, 280 620 C 280 720, 350 780, 440 780 C 470 780, 490 770, 500 750 C 510 770, 530 780, 560 780 C 650 780, 720 720, 720 620 C 720 480, 500 280, 500 280 Z M 500 780 C 500 780, 450 850, 430 880 C 410 910, 450 930, 500 930 C 550 930, 590 910, 570 880 C 550 850, 500 780, 500 780 Z" 
        fill="#FFFFFF" stroke="#000000" stroke-width="18" stroke-linejoin="round"/>

  <!-- Center Spade Halftone Fill (Clipped to the spade shape) -->
  <clipPath id="spade-clip">
    <path d="M 500 280 C 500 280, 280 480, 280 620 C 280 720, 350 780, 440 780 C 470 780, 490 770, 500 750 C 510 770, 530 780, 560 780 C 650 780, 720 720, 720 620 C 720 480, 500 280, 500 280 Z M 500 780 C 500 780, 450 850, 430 880 C 410 910, 450 930, 500 930 C 550 930, 590 910, 570 880 C 550 850, 500 780, 500 780 Z"/>
  </clipPath>

  <rect x="0" y="0" width="1000" height="1000" fill="url(#halftone)" clip-path="url(#spade-clip)"/>

  <!-- Center Spade Thick Aggressive Black Outline (Redrawn on top) -->
  <path d="M 500 280 C 500 280, 280 480, 280 620 C 280 720, 350 780, 440 780 C 470 780, 490 770, 500 750 C 510 770, 530 780, 560 780 C 650 780, 720 720, 720 620 C 720 480, 500 280, 500 280 Z M 500 780 C 500 780, 450 850, 430 880 C 410 910, 450 930, 500 930 C 550 930, 590 910, 570 880 C 550 850, 500 780, 500 780 Z" 
        fill="none" stroke="#000000" stroke-width="18" stroke-linejoin="round"/>
</svg>