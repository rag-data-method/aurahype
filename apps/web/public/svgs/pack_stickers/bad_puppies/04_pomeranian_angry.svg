<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Sticker Physical Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feOffset in="blur" dx="10" dy="14" result="offsetBlur"/>
      <feComponentTransfer in="offsetBlur" result="shadowAlpha">
        <feFuncA type="linear" slope="0.45"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadowAlpha"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pop Art Background Mask (Inside Sticker) -->
    <clipPath id="sticker-clip">
      <path d="M 500, 80 C 620, 130 760, 150 830, 240 C 900, 330 900, 480 860, 600 C 820, 720 740, 830 650, 870 C 560, 910 440, 920 340, 880 C 240, 840 160, 740 120, 620 C 80, 500 100, 350 180, 250 C 260, 150 380, 30 500, 80 Z" />
    </clipPath>
  </defs>

  <!-- Shadow Layer -->
  <g filter="url(#shadow)">
    <!-- Thick Solid White Die-Cut Border -->
    <path d="M 500, 80 C 620, 130 760, 150 830, 240 C 900, 330 900, 480 860, 600 C 820, 720 740, 830 650, 870 C 560, 910 440, 920 340, 880 C 240, 840 160, 740 120, 620 C 80, 500 100, 350 180, 250 C 260, 150 380, 30 500, 80 Z" fill="#ffffff" stroke="#ffffff" stroke-width="32" stroke-linejoin="round"/>
  </g>

  <!-- Sticker Base Fill & Background Graphic -->
  <g clip-path="url(#sticker-clip)">
    <!-- Bright Cyan Background -->
    <rect x="0" y="0" width="1000" height="1000" fill="#00D2FF" />

    <!-- Halftone / Radial Pop Art Background -->
    <circle cx="500" cy="500" r="480" fill="none" stroke="#00AACC" stroke-width="8" stroke-dasharray="0 40" stroke-linecap="round"/>
    <circle cx="500" cy="500" r="440" fill="none" stroke="#00AACC" stroke-width="6" stroke-dasharray="0 30" stroke-linecap="round"/>
    <circle cx="500" cy="500" r="400" fill="none" stroke="#00AACC" stroke-width="4" stroke-dasharray="0 20" stroke-linecap="round"/>
    <circle cx="500" cy="500" r="360" fill="none" stroke="#00AACC" stroke-width="3" stroke-dasharray="0 15" stroke-linecap="round"/>

    <!-- Angry Diagonal Action Lines -->
    <line x1="200" y1="0" x2="600" y2="800" stroke="#FF0055" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
    <line x1="300" y1="0" x2="700" y2="800" stroke="#FF0055" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="700" y1="0" x2="300" y2="800" stroke="#FF0055" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    <line x1="800" y1="0" x2="400" y2="800" stroke="#FF0055" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

    <!-- Yellow Starbursts -->
    <path d="M 150 200 L 165 240 L 205 245 L 175 275 L 185 315 L 150 295 L 115 315 L 125 275 L 95 245 L 135 240 Z" fill="#FFF200" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
    <path d="M 820 300 L 830 325 L 855 330 L 838 350 L 845 375 L 820 365 L 795 375 L 802 350 L 785 330 L 810 325 Z" fill="#FFF200" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- POMERANIAN ILLUSTRATION -->
  <g transform="translate(10, 0)">
    
    <!-- Back Fluff (Darker Orange) -->
    <g fill="#FF7700" stroke="#000000" stroke-width="8" stroke-linejoin="round">
      <circle cx="330" cy="480" r="55" />
      <circle cx="670" cy="480" r="55" />
      <circle cx="300" cy="540" r="45" />
      <circle cx="700" cy="540" r="45" />
      <circle cx="320" cy="600" r="50" />
      <circle cx="680" cy="600" r="50" />
    </g>

    <!-- Main Head Fluff (Lighter Orange/Cream) -->
    <g fill="#FFCC00" stroke="#000000" stroke-width="8" stroke-linejoin="round">
      <circle cx="360" cy="420" r="60" />
      <circle cx="640" cy="420" r="60" />
      <circle cx="500" cy="350" r="70" />
      <circle cx="380" cy="360" r="55" />
      <circle cx="620" cy="360" r="55" />
      <circle cx="340" cy="500" r="65" />
      <circle cx="660" cy="500" r="65" />
      <circle cx="500" cy="280" r="60" />
      <circle cx="420" cy="300" r="55" />
      <circle cx="580" cy="300" r="55" />
      <!-- Bottom Cheeks -->
      <circle cx="390" cy="580" r="70" />
      <circle cx="610" cy="580" r="70" />
    </g>

    <!-- Inner Face Base -->
    <path d="M 420 400 C 420 380, 580 380, 580 400 C 600 450, 620 520, 610 580 C 580 650, 420 650, 390 580 C 380 520, 400 450, 420 400 Z" fill="#FFCC00" stroke="#000000" stroke-width="8" stroke-linejoin="round" />

    <!-- Pointy Angry Ears -->
    <g fill="#FF7700" stroke="#000000" stroke-width="8" stroke-linejoin="round">
      <!-- Left Ear -->
      <path d="M 350 400 L 290 220 L 430 340 Z" />
      <!-- Right Ear -->
      <path d="M 650 400 L 710 220 L 570 340 Z" />
    </g>

    <!-- Ears Inner Pink -->
    <path d="M 360 380 L 315 260 L 400 340 Z" fill="#FF88AA" />
    <path d="M 640 380 L 685 260 L 600 340 Z" fill="#FF88AA" />

    <!-- ANGRY EYEBROWS / FOREHEAD WRINKLES -->
    <path d="M 380 410 L 500 460 L 620 410" fill="none" stroke="#000000" stroke-width="12" stroke-linecap="round" />
    <path d="M 420 390 L 500 420 L 580 390" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round" />

    <!-- ANGRY EYES -->
    <g fill="#FFFFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round">
      <!-- Left Eye -->
      <path d="M 390 480 C 390 450, 470 450, 470 480 C 470 510, 390 510, 390 480 Z" />
      <!-- Right Eye -->
      <path d="M 530 480 C 530 450, 610 450, 610 480 C 610 510, 530 510, 530 480 Z" />
    </g>

    <!-- Pupils (Slanted for anger) -->
    <g fill="#000000">
      <ellipse cx="440" cy="485" rx="14" ry="25" transform="rotate(20 440 485)" />
      <ellipse cx="560" cy="485" rx="14" ry="25" transform="rotate(-20 560 485)" />
    </g>
    
    <!-- Eye Highlights -->
    <g fill="#FFFFFF">
      <circle cx="445" cy="478" r="5" />
      <circle cx="555" cy="478" r="5" />
    </g>

    <!-- ANGRY SNARL / MOUTH -->
    <g fill="#FF4444" stroke="#000000" stroke-width="8" stroke-linejoin="round">
      <!-- Main Open Mouth -->
      <path d="M 430 540 Q 500 510 570 540 Q 580 610 500 610 Q 420 610 430 540 Z" />
    </g>

    <!-- Tongue -->
    <path d="M 450 580 Q 500 620 550 580" fill="#FF88AA" stroke="#000000" stroke-width="6" stroke-linecap="round" />

    <!-- Sharp Teeth -->
    <g fill="#FFFFFF" stroke="#000000" stroke-width="5" stroke-linejoin="round">
      <!-- Top Teeth -->
      <path d="M 440 543 L 450 565 L 460 545 Z" />
      <path d="M 470 540 L 480 570 L 490 538 Z" />
      <path d="M 510 538 L 520 570 L 530 540 Z" />
      <path d="M 540 545 L 550 565 L 560 543 Z" />
      
      <!-- Bottom Teeth -->
      <path d="M 455 600 L 465 580 L 475 600 Z" />
      <path d="M 485 602 L 495 575 L 505 602 Z" />
      <path d="M 525 600 L 535 580 L 545 600 Z" />
    </g>

    <!-- Nose -->
    <path d="M 470 530 Q 500 515 530 530 Q 500 555 470 530 Z" fill="#000000" />

    <!-- RED BANDANA -->
    <!-- Neck base -->
    <path d="M 350 630 Q 500 680 650 630 Q 680 720 650 780 Q 500 840 350 780 Q 320 720 350 630 Z" fill="#FF0055" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Bandana Folds -->
    <path d="M 350 630 Q 420 660 450 720" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" />
    <path d="M 650 630 Q 580 660 550 720" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" />
    <path d="M 500 660 Q 500 720 500 780" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" />

    <!-- Bandana Knot -->
    <path d="M 460 710 L 500 740 L 540 710 L 500 780 Z" fill="#CC0044" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Bandana Tails -->
    <path d="M 500 740 L 430 820 L 460 750 Z" fill="#FF0055" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
    <path d="M 500 740 L 570 820 L 540 750 Z" fill="#FF0055" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>

    <!-- Front Fluff Overlapping Bandana -->
    <g fill="#FFCC00" stroke="#000000" stroke-width="8" stroke-linejoin="round">
      <circle cx="420" cy="640" r="45" />
      <circle cx="580" cy="640" r="45" />
      <circle cx="500" cy="660" r="50" />
      <circle cx="360" cy="610" r="40" />
      <circle cx="640" cy="610" r="40" />
    </g>

  </g>

  <!-- Pop Art Bold Highlights (Glossy Sticker Finish) -->
  <g fill="#FFFFFF" opacity="0.3">
    <ellipse cx="450" cy="300" rx="60" ry="30" transform="rotate(-20 450 300)" />
    <ellipse cx="380" cy="350" rx="40" ry="20" transform="rotate(-30 380 350)" />
    <path d="M 220 250 Q 250 200 300 220 Q 260 240 220 250 Z" />
  </g>

</svg>