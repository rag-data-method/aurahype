<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="18" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Halftone Pattern -->
    <pattern id="halftone" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="4" fill="#000000" opacity="0.85"/>
    </pattern>

    <!-- Halftone Clip Path for Ears and Body -->
    <clipPath id="ears-clip">
      <path d="M 210 380 C 140 180, 160 120, 280 140 C 340 155, 380 230, 390 350 Z"/>
      <path d="M 790 380 C 860 180, 840 120, 720 140 C 660 155, 620 230, 610 350 Z"/>
    </clipPath>

    <clipPath id="body-clip">
      <path d="M 380 600 C 380 600, 260 580, 250 690 C 240 820, 360 850, 420 840 C 460 835, 540 835, 580 840 C 640 850, 760 820, 750 690 C 740 580, 620 600, 620 600 Z"/>
    </clipPath>

    <!-- Crisp Stroke Filter for sharper inner line edges -->
    <filter id="crisp">
      <feComponentTransfer>
        <feFuncA type="linear" slope="1.0"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Drop Shadow Group -->
  <g filter="url(#shadow)">
    
    <!-- Thick White Die-Cut Border -->
    <g fill="#FFFFFF" stroke="#000000" stroke-width="28" stroke-linejoin="round" stroke-linecap="round">
      <!-- Ears -->
      <path d="M 210 380 C 140 180, 160 120, 280 140 C 340 155, 380 230, 390 350 Z"/>
      <path d="M 790 380 C 860 180, 840 120, 720 140 C 660 155, 620 230, 610 350 Z"/>
      
      <!-- Body -->
      <path d="M 380 600 C 380 600, 260 580, 250 690 C 240 820, 360 850, 420 840 C 460 835, 540 835, 580 840 C 640 850, 760 820, 750 690 C 740 580, 620 600, 620 600 Z"/>
      
      <!-- Head Base -->
      <rect x="250" y="150" width="500" height="500" rx="230" ry="230"/>
      
      <!-- Spiked Collar Base -->
      <path d="M 210 580 C 210 580, 250 670, 260 690 C 280 680, 310 660, 320 690 C 340 680, 370 660, 380 690 C 400 680, 430 660, 440 690 C 460 680, 490 660, 500 690 C 520 680, 550 660, 560 690 C 580 680, 610 660, 620 690 C 640 680, 670 660, 680 690 C 700 680, 730 660, 740 690 C 750 670, 790 580, 790 580 C 790 580, 730 630, 500 640 C 270 630, 210 580, 210 580 Z"/>
      
      <!-- Spikes -->
      <path d="M 260 690 L 230 770 L 290 760 Z"/>
      <path d="M 320 690 L 300 780 L 360 760 Z"/>
      <path d="M 380 690 L 380 790 L 430 760 Z"/>
      <path d="M 440 690 L 460 790 L 500 760 Z"/>
      <path d="M 500 690 L 540 790 L 560 760 Z"/>
      <path d="M 560 690 L 620 790 L 620 760 Z"/>
      <path d="M 620 690 L 700 780 L 680 760 Z"/>
      <path d="M 680 690 L 770 770 L 740 760 Z"/>
      
      <!-- Eye Angles -->
      <path d="M 280 420 L 450 410 L 440 480 L 290 470 Z"/>
      <path d="M 720 420 L 550 410 L 560 480 L 710 470 Z"/>
      
      <!-- Teeth -->
      <path d="M 410 650 L 430 720 L 450 650 Z"/>
      <path d="M 550 650 L 530 720 L 510 650 Z"/>
    </g>
  </g>

  <!-- Inner Illustration -->
  
  <!-- Ears (Red) -->
  <g fill="#FF2A2A">
    <path d="M 210 380 C 140 180, 160 120, 280 140 C 340 155, 380 230, 390 350 Z"/>
    <path d="M 790 380 C 860 180, 840 120, 720 140 C 660 155, 620 230, 610 350 Z"/>
    <g clip-path="url(#ears-clip)">
      <rect x="0" y="0" width="1000" height="1000" fill="url(#halftone)" opacity="0.8"/>
    </g>
  </g>

  <!-- Inner Ear Details (Black) -->
  <path d="M 250 350 C 200 220, 210 170, 290 180 C 330 190, 350 240, 360 340 Z" fill="#000000"/>
  <path d="M 750 350 C 800 220, 790 170, 710 180 C 670 190, 650 240, 640 340 Z" fill="#000000"/>

  <!-- Body (Cyan) -->
  <g fill="#00E5FF">
    <path d="M 380 600 C 380 600, 260 580, 250 690 C 240 820, 360 850, 420 840 C 460 835, 540 835, 580 840 C 640 850, 760 820, 750 690 C 740 580, 620 600, 620 600 Z"/>
    <g clip-path="url(#body-clip)">
      <rect x="0" y="0" width="1000" height="1000" fill="url(#halftone)" opacity="0.8"/>
    </g>
  </g>

  <!-- White Chest Patch -->
  <path d="M 500 650 C 450 650, 410 720, 420 800 C 430 850, 570 850, 580 800 C 590 720, 550 650, 500 650 Z" fill="#FFFFFF"/>

  <!-- Head Base (Yellow) -->
  <rect x="250" y="150" width="500" height="500" rx="230" ry="230" fill="#FFD600"/>

  <!-- Face Wrinkles (Black) -->
  <path d="M 500 400 Q 420 360 370 450" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round"/>
  <path d="M 500 400 Q 580 360 630 450" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round"/>
  <path d="M 500 420 Q 470 460 440 480" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round"/>
  <path d="M 500 420 Q 530 460 560 480" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round"/>

  <!-- White Eye Patch -->
  <path d="M 300 300 C 250 300, 220 400, 320 420 C 420 440, 450 350, 430 320 C 410 290, 350 300, 300 300 Z" fill="#FFFFFF"/>
  <path d="M 700 300 C 750 300, 780 400, 680 420 C 580 440, 550 350, 570 320 C 590 290, 650 300, 700 300 Z" fill="#FFFFFF"/>

  <!-- Eye Angles (Red) -->
  <path d="M 280 420 L 450 410 L 440 480 L 290 470 Z" fill="#FF2A2A"/>
  <path d="M 720 420 L 550 410 L 560 480 L 710 470 Z" fill="#FF2A2A"/>

  <!-- Eyes (White + Black Pupils + Angry Brows) -->
  <g id="eyes">
    <!-- Left Eye Outline & Fill -->
    <circle cx="360" cy="380" r="55" fill="#FFFFFF" stroke="#000000" stroke-width="18"/>
    <!-- Right Eye Outline & Fill -->
    <circle cx="640" cy="380" r="55" fill="#FFFFFF" stroke="#000000" stroke-width="18"/>

    <!-- Pupils -->
    <circle cx="360" cy="380" r="20" fill="#000000"/>
    <circle cx="640" cy="380" r="20" fill="#000000"/>

    <!-- Angry Eyebrows (Overlapping the eyes) -->
    <path d="M 280 340 L 410 360 L 400 400 L 300 380 Z" fill="#000000"/>
    <path d="M 720 340 L 590 360 L 600 400 L 700 380 Z" fill="#000000"/>
  </g>

  <!-- Snout (Black) -->
  <path d="M 500 420 C 400 420, 380 500, 400 600 C 420 660, 580 660, 600 600 C 620 500, 600 420, 500 420 Z" fill="#000000"/>

  <!-- Nose (Magenta) -->
  <path d="M 450 460 C 450 430, 550 430, 550 460 C 550 500, 450 500, 450 460 Z" fill="#FF0099"/>

  <!-- Muzzle Folds -->
  <path d="M 420 500 C 400 550, 450 590, 480 600" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round"/>
  <path d="M 580 500 C 600 550, 550 590, 520 600" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round"/>

  <!-- Mouth (Open Growl) -->
  <path d="M 460 590 Q 500 550 540 590 Q 500 640 460 590 Z" fill="#600000"/>

  <!-- Teeth (White) -->
  <path d="M 410 650 L 430 720 L 450 650 Z" fill="#FFFFFF"/>
  <path d="M 550 650 L 530 720 L 510 650 Z" fill="#FFFFFF"/>

  <!-- Spiked Collar (Black) -->
  <path d="M 210 580 C 210 580, 250 670, 260 690 C 280 680, 310 660, 320 690 C 340 680, 370 660, 380 690 C 400 680, 430 660, 440 690 C 460 680, 490 660, 500 690 C 520 680, 550 660, 560 690 C 580 680, 610 660, 620 690 C 640 680, 670 660, 680 690 C 700 680, 730 660, 740 690 C 750 670, 790 580, 790 580 C 790 580, 730 630, 500 640 C 270 630, 210 580, 210 580 Z" fill="#000000"/>

  <!-- Collar Accent (Cyan) -->
  <path d="M 230 590 C 230 590, 260 650, 270 665 C 280 660, 300 645, 310 665 C 320 660, 340 645, 350 665 C 360 660, 380 645, 390 665 C 400 660, 420 645, 430 665 C 440 660, 460 645, 470 665 C 480 660, 500 645, 510 665 C 520 660, 540 645, 550 665 C 560 660, 580 645, 590 665 C 600 660, 620 645, 630 665 C 640 660, 660 645, 670 665 C 680 660, 700 645, 710 665 C 720 650, 770 590, 770 590 C 770 590, 720 620, 500 625 C 280 620, 230 590, 230 590 Z" fill="#00E5FF"/>

  <!-- Spikes (Magenta) -->
  <path d="M 260 690 L 230 770 L 290 760 Z" fill="#FF0099"/>
  <path d="M 320 690 L 300 780 L 360 760 Z" fill="#FF0099"/>
  <path d="M 380 690 L 380 790 L 430 760 Z" fill="#FF0099"/>
  <path d="M 440 690 L 460 790 L 500 760 Z" fill="#FF0099"/>
  <path d="M 500 690 L 540 790 L 560 760 Z" fill="#FF0099"/>
  <path d="M 560 690 L 620 790 L 620 760 Z" fill="#FF0099"/>
  <path d="M 620 690 L 700 780 L 680 760 Z" fill="#FF0099"/>
  <path d="M 680 690 L 770 770 L 740 760 Z" fill="#FF0099"/>

  <!-- Aggressive Inner Black Outlines (Overlays to ensure crisp edges) -->
  <g fill="none" stroke="#000000" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
    <!-- Head Base Outline -->
    <rect x="250" y="150" width="500" height="500" rx="230" ry="230"/>
    
    <!-- Snout Outline -->
    <path d="M 500 420 C 400 420, 380 500, 400 600 C 420 660, 580 660, 600 600 C 620 500, 600 420, 500 420 Z"/>
    
    <!-- Nose Outline -->
    <path d="M 450 460 C 450 430, 550 430, 550 460 C 550 500, 450 500, 450 460 Z"/>
    
    <!-- Body Outline -->
    <path d="M 380 600 C 380 600, 260 580, 250 690 C 240 820, 360 850, 420 840 C 460 835, 540 835, 580 840 C 640 850, 760 820, 750 690 C 740 580, 620 600, 620 600 Z"/>
    
    <!-- Chest Patch Outline -->
    <path d="M 500 650 C 450 650, 410 720, 420 800 C 430 850, 570 850, 580 800 C 590 720, 550 650, 500 650 Z"/>
    
    <!-- Ears Outline -->
    <path d="M 210 380 C 140 180, 160 120, 280 140 C 340 155, 380 230, 390 350 Z"/>
    <path d="M 790 380 C 860 180, 840 120, 720 140 C 660 155, 620 230, 610 350 Z"/>
    
    <!-- Inner Ear Outline -->
    <path d="M 250 350 C 200 220, 210 170, 290 180 C 330 190, 350 240, 360 340 Z"/>
    <path d="M 750 350 C 800 220, 790 170, 710 180 C 670 190, 650 240, 640 340 Z"/>
    
    <!-- Collar Outline -->
    <path d="M 210 580 C 210 580, 250 670, 260 690 C 280 680, 310 660, 320 690 C 340 680, 370 660, 380 690 C 400 680, 430 660, 440 690 C 460 680, 490 660, 500 690 C 520 680, 550 660, 560 690 C 580 680, 610 660, 620 690 C 640 680, 670 660, 680 690 C 700 680, 730 660, 740 690 C 750 670, 790 580, 790 580 C 790 580, 730 630, 500 640 C 270 630, 210 580, 210 580 Z"/>
    
    <!-- Spikes Outline -->
    <path d="M 260 690 L 230 770 L 290 760 Z"/>
    <path d="M 320 690 L 300 780 L 360 760 Z"/>
    <path d="M 380 690 L 380 790 L 430 760 Z"/>
    <path d="M 440 690 L 460 790 L 500 760 Z"/>
    <path d="M 500 690 L 540 790 L 560 760 Z"/>
    <path d="M 560 690 L 620 790 L 620 760 Z"/>
    <path d="M 620 690 L 700 780 L 680 760 Z"/>
    <path d="M 680 690 L 770 770 L 740 760 Z"/>
  </g>

</svg>