<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Die-cut shadow filter -->
    <filter id="sticker-shadow" x="-15%" y="-15%" width="130%" height="130%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="12" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- White die-cut border path -->
    <path id="border-path" d="
      M 500,90 
      C 560,90 610,130 630,190 
      C 660,180 720,190 750,240 
      C 780,290 760,350 720,380 
      C 750,430 730,500 680,530 
      C 710,580 690,650 640,680 
      C 660,730 630,790 580,810 
      C 590,860 560,910 500,910 
      C 440,910 410,860 420,810 
      C 370,790 340,730 360,680 
      C 310,650 290,580 320,530 
      C 270,500 250,430 280,380 
      C 240,350 220,290 250,240 
      C 280,190 340,180 370,190 
      C 390,130 440,90 500,90 
      Z" />

    <!-- Comb half base clip (used by both halves) -->
    <clipPath id="comb-clip">
      <path d="M 370,300 L 630,300 L 630,700 L 370,700 Z" />
    </clipPath>
  </defs>

  <!-- ================= STICKER DROP SHADOW & DIE-CUT BORDER ================= -->
  <g filter="url(#sticker-shadow)">
    <!-- Thick white die-cut border -->
    <use href="#border-path" fill="none" stroke="#FFFFFF" stroke-width="45" stroke-linejoin="round" />
    <!-- Thin inner black edge for sticker realism -->
    <use href="#border-path" fill="none" stroke="#000000" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- ================= STICKER CONTENT (Masked by white border) ================= -->
  <g clip-path="url(#border-clip)">
    <clipPath id="border-clip">
      <use href="#border-path" />
    </clipPath>

    <!-- Background Burst -->
    <path d="M 500,500 L 500,120 L 540,420 L 650,200 L 580,460 L 800,300 L 620,520 L 880,500 L 620,580 L 800,700 L 580,540 L 650,800 L 540,580 L 500,880 L 460,580 L 350,800 L 420,540 L 200,700 L 380,580 L 120,500 L 380,420 L 200,300 L 420,460 L 350,200 L 460,420 Z" fill="#FBB03B" stroke="#000000" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Secondary Burst -->
    <path d="M 500,500 L 500,220 L 530,450 L 600,280 L 560,480 L 720,380 L 590,510 L 780,500 L 590,550 L 720,620 L 560,540 L 600,720 L 530,550 L 500,780 L 470,550 L 400,720 L 440,540 L 280,620 L 410,550 L 220,500 L 410,450 L 280,380 L 440,480 L 400,280 L 470,450 Z" fill="#FF3B77" stroke="#000000" stroke-width="5" stroke-linejoin="round" />

    <!-- Halftone Background Dots -->
    <g fill="#000000" opacity="0.15">
      <circle cx="300" cy="300" r="8" />
      <circle cx="340" cy="280" r="6" />
      <circle cx="280" cy="340" r="10" />
      <circle cx="700" cy="700" r="12" />
      <circle cx="660" cy="720" r="7" />
      <circle cx="720" cy="660" r="9" />
      <circle cx="250" cy="600" r="8" />
      <circle cx="750" cy="350" r="10" />
      <circle cx="400" cy="750" r="6" />
      <circle cx="600" cy="250" r="8" />
    </g>

    <!-- Speed Lines / Action Lines -->
    <g stroke="#000000" stroke-width="5" stroke-linecap="round">
      <line x1="150" y1="150" x2="350" y2="350" />
      <line x1="180" y1="120" x2="380" y2="320" />
      <line x1="850" y1="150" x2="650" y2="350" />
      <line x1="820" y1="120" x2="620" y2="320" />
      <line x1="150" y1="850" x2="350" y2="650" />
      <line x1="180" y1="880" x2="380" y2="680" />
      <line x1="850" y1="850" x2="650" y2="650" />
      <line x1="820" y1="880" x2="620" y2="680" />
    </g>

    <!-- ================= COMB ILLUSTRATION ================= -->
    <g transform="translate(0, 20)">
      
      <!-- LEFT COMB HALF -->
      <g transform="rotate(-15, 500, 500)">
        <!-- Main Body -->
        <path d="M 340,320 L 500,320 L 500,680 L 340,680 Z" fill="#FED100" stroke="#000000" stroke-width="12" stroke-linejoin="round" />
        
        <!-- Plastic Sheen / Highlight -->
        <path d="M 360,340 L 420,340 L 420,660 L 360,660 Z" fill="#FFFFFF" opacity="0.4" />
        
        <!-- Teeth (Clipped to stay inside the body) -->
        <g clip-path="url(#comb-clip)">
          <!-- Tooth 1 (Leftmost) -->
          <path d="M 370,320 L 390,320 L 390,680 L 370,680 Z" fill="#FED100" stroke="#000000" stroke-width="8" />
          <!-- Tooth 2 -->
          <path d="M 410,320 L 430,320 L 430,680 L 410,680 Z" fill="#FED100" stroke="#000000" stroke-width="8" />
          <!-- Tooth 3 -->
          <path d="M 450,320 L 470,320 L 470,680 L 450,680 Z" fill="#FED100" stroke="#000000" stroke-width="8" />
        </g>
        
        <!-- Jagged Break Edge -->
        <path d="M 500,320 L 480,360 L 510,400 L 490,440 L 520,480 L 500,520 L 530,560 L 500,600 L 520,640 L 500,680" fill="#FED100" stroke="#000000" stroke-width="10" stroke-linejoin="round" />
      </g>

      <!-- RIGHT COMB HALF -->
      <g transform="rotate(15, 500, 500)">
        <!-- Main Body -->
        <path d="M 500,320 L 660,320 L 660,680 L 500,680 Z" fill="#FED100" stroke="#000000" stroke-width="12" stroke-linejoin="round" />
        
        <!-- Plastic Sheen / Highlight -->
        <path d="M 580,340 L 640,340 L 640,660 L 580,660 Z" fill="#FFFFFF" opacity="0.4" />
        
        <!-- Teeth (Clipped to stay inside the body) -->
        <g clip-path="url(#comb-clip)">
          <!-- Tooth 4 -->
          <path d="M 530,320 L 550,320 L 550,680 L 530,680 Z" fill="#FED100" stroke="#000000" stroke-width="8" />
          <!-- Tooth 5 -->
          <path d="M 570,320 L 590,320 L 590,680 L 570,680 Z" fill="#FED100" stroke="#000000" stroke-width="8" />
          <!-- Tooth 6 (Rightmost) -->
          <path d="M 610,320 L 630,320 L 630,680 L 610,680 Z" fill="#FED100" stroke="#000000" stroke-width="8" />
        </g>

        <!-- Jagged Break Edge -->
        <path d="M 500,320 L 520,360 L 490,400 L 510,440 L 480,480 L 500,520 L 470,560 L 500,600 L 480,640 L 500,680" fill="#FED100" stroke="#000000" stroke-width="10" stroke-linejoin="round" />
      </g>

    </g>

    <!-- ================= 'SNAP!' EXPLOSION ================= -->
    <g transform="translate(500, 500)">
      
      <!-- Star Burst Background -->
      <path d="M 0,-180 L 45,-60 L 170,-90 L 80,0 L 170,90 L 45,60 L 0,180 L -45,60 L -170,90 L -80,0 L -170,-90 L -45,-60 Z" fill="#00E5FF" stroke="#000000" stroke-width="8" stroke-linejoin="round" transform="scale(1.3)" />
      
      <!-- Secondary Burst Outline -->
      <path d="M 0,-140 L 35,-50 L 130,-70 L 65,0 L 130,70 L 35,50 L 0,140 L -35,50 L -130,70 L -65,0 L -130,-70 L -35,-50 Z" fill="#FF0055" stroke="#000000" stroke-width="6" stroke-linejoin="round" transform="scale(1.2)" />

      <!-- 'SNAP!' Text -->
      <g stroke="#000000" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
        <!-- Drop Shadow Layer -->
        <text x="0" y="15" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="130" fill="#FFFFFF" stroke="none" transform="translate(6, 10)">SNAP!</text>
        
        <!-- Main Text Layer -->
        <text x="0" y="15" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="130" fill="#FFFFFF">SNAP!</text>
        
        <!-- Inner Highlight/Outline Layer -->
        <text x="0" y="15" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="130" fill="#FF0055" stroke="#000000" stroke-width="6">SNAP!</text>
      </g>

      <!-- Action Lines around Text -->
      <g stroke="#000000" stroke-width="6" stroke-linecap="round">
        <line x1="-200" y1="-120" x2="-260" y2="-160" />
        <line x1="200" y1="-120" x2="260" y2="-160" />
        <line x1="-200" y1="120" x2="-260" y2="160" />
        <line x1="200" y1="120" x2="260" y2="160" />
      </g>

    </g>

    <!-- ================= SPARKS / DEBRIS ================= -->
    <g stroke="#000000" stroke-width="5" stroke-linejoin="round">
      <!-- Left Side Sparks -->
      <path d="M 350,400 L 370,420 L 350,440" fill="#00E5FF" />
      <path d="M 300,500 L 320,500 L 310,520" fill="#FF0055" />
      <path d="M 380,600 L 360,620 L 380,640" fill="#FED100" />
      
      <!-- Right Side Sparks -->
      <path d="M 650,400 L 630,420 L 650,440" fill="#00E5FF" />
      <path d="M 700,500 L 680,500 L 690,520" fill="#FF0055" />
      <path d="M 620,600 L 640,620 L 620,640" fill="#FED100" />
    </g>

  </g>
</svg>