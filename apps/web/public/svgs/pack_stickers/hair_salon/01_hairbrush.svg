            <path d="M 350 220 C 300 150, 420 80, 480 130 C 520 80, 620 120, 580 200 C 640 180, 680 280, 620 320 C 680 360, 640 460, 560 450 C 600 520, 480 550, 420 500 C 380 560, 280 500, 320 420 C 260 400, 260 300, 320 280 C 280 240, 300 180, 350 220 Z"/>
            <!-- Top left wild curl -->
