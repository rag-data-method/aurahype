        <line x1="530" y1="270" x2="550" y2="290" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
        <line x1="550" y1="270" x2="530" y2="290" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
        <!-- Mouth -->
        <path d="M 510 300 Q 525 315, 540 300" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
        <!-- Sweat drop -->
        <path d="M 555 255 Q 565 235, 555 225 Q 545 235, 555 255" fill="#00e5ff" stroke="#000000" stroke-width="5"/>

        <!-- Comic Halftone Dots (Background accents) -->
        <g fill="#ffeb3b">
