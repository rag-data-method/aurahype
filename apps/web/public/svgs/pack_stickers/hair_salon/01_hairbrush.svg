<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs>
        <!-- Drop shadow for the die-cut sticker -->
        <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
            <feOffset in="blur" dx="16" dy="18" result="offsetBlur"/>
            <feComponentTransfer in="offsetBlur" result="shadowAlpha">
                <feFuncA type="linear" slope="0.4"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode in="shadowAlpha"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Die-cut sticker group -->
