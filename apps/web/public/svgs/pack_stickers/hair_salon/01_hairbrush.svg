        <ellipse cx="410" cy="270" rx="18" ry="12" fill="#000000" opacity="0.3"/>
        <ellipse cx="470" cy="260" rx="18" ry="12" fill="#000000" opacity="0.3"/>
        <ellipse cx="530" cy="260" rx="18" ry="12" fill="#000000" opacity="0.3"/>
        <ellipse cx="590" cy="270" rx="18" ry="12" fill="#000000" opacity="0.3"/>
        <ellipse cx="650" cy="290" rx="18" ry="12" fill="#000000" opacity="0.3"/>
        
        <ellipse cx="320" cy="340" rx="18" ry="12" fill="#000000" opacity="0.3"/>
        <ellipse cx="380" cy="320" rx="18" ry="12" fill="#000000" opacity="0.3"/>
        <ellipse cx="440" cy="310" rx="18" ry="12" fill="#000000" opacity="0.3"/>
