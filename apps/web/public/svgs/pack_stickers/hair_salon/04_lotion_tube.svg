<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Sticker Drop Shadow Filter -->
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feOffset in="blur" dx="10" dy="14" result="offsetBlur"/>
      <feComponentTransfer in="offsetBlur" result="shadowAlpha">
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadowAlpha"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- DROP SHADOW BASE -->
  <g filter="url(#ds)">
    
    <!-- DIE-CUT WHITE BORDER (The sticker backing) -->
    <!-- Thick, solid white path tracing the full sticker outline -->
    <path d="M
      460, -30
      C 530, -20 620, 80 630, 150
      C 650, 220 720, 240 760, 260
      C 820, 290 850, 340 840, 380
      C 830, 420 750, 460 680, 440
      C 580, 410 510, 420 460, 440
      L 480, 470
      C 490, 490 500, 520 510, 550
      L 600, 750
      C 610, 770 600, 800 580, 810
      L 450, 880
      C 430, 890 400, 880 390, 860
      L 250, 550
      C 240, 530 230, 500 240, 470
      L 260, 390
      C 230, 370 200, 350 180, 310
      C 160, 270 170, 220 210, 200
      C 250, 180 310, 170 360, 180
      C 400, 190 430, 160 400, 110
      C 370, 60 390, -40 460, -30 Z" 
      fill="#FFFFFF" stroke="#FFFFFF" stroke-width="40" stroke-linejoin="round"/>

    <!-- MAIN STICKER ILLUSTRATION GROUP -->
    <!-- Clipped perfectly to the inner edge of the white border -->
    <g clip-path="url(#sticker-clip)">
      <clipPath id="sticker-clip">
        <path d="M
          460, -30
          C 530, -20 620, 80 630, 150
          C 650, 220 720, 240 760, 260
          C 820, 290 850, 340 840, 380
          C 830, 420 750, 460 680, 440
          C 580, 410 510, 420 460, 440
          L 480, 470
          C 490, 490 500, 520 510, 550
          L 600, 750
          C 610, 770 600, 800 580, 810
          L 450, 880
          C 430, 890 400, 880 390, 860
          L 250, 550
          C 240, 530 230, 500 240, 470
          L 260, 390
          C 230, 370 200, 350 180, 310
          C 160, 270 170, 220 210, 200
          C 250, 180 310, 170 360, 180
          C 400, 190 430, 160 400, 110
          C 370, 60 390, -40 460, -30 Z"/>
      </clipPath>

      <!-- ================= BACKGROUND ================= -->
      <!-- Bright Yellow Burst -->
      <rect x="-100" y="-100" width="1200" height="1200" fill="#FFDD00" />
      <!-- Radiating Sunburst Lines -->
      <path d="M 500 500 L -100 -100 M 500 500 L 1100 -100 M 500 500 L -100 1100 M 500 500 L 1100 1100
               M 500 500 L 500 -100 M 500 500 L 500 1100 M 500 500 L -100 500 M 500 500 L 1100 500
               M 500 500 L 100 -100 M 500 500 L 900 -100 M 500 500 L -100 100 M 500 500 L 1100 900
               M 500 500 L 300 -100 M 500 500 L 700 -100 M 500 500 L -100 300 M 500 500 L 1100 700
               M 500 500 L -100 700 M 500 500 L 1100 300 M 500 500 L 100 1100 M 500 500 L 900 1100" 
            stroke="#FFEE33" stroke-width="40" stroke-linecap="round"/>

      <!-- ================= LASER BEAM ================= -->
      <!-- The bright pink cream shooting out -->
      <path d="M 460, 440 L 800, 300 L 750, 320 L 850, 340 L 700, 360 L 820, 380 L 680, 400 L 780, 420 L 500, 450 Z" 
            fill="#FF0080" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
      <path d="M 500, 450 L 900, 250 L 870, 270 L 950, 280 L 800, 300" 
            fill="#FF0080" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
      <!-- Laser Energy Dots -->
      <circle cx="700" cy="350" r="15" fill="#FFFFFF" stroke="#000000" stroke-width="4"/>
      <circle cx="780" cy="310" r="10" fill="#FFFFFF" stroke="#000000" stroke-width="4"/>
      <circle cx="850" cy="270" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="4"/>

      <!-- ================= TUBE BODY ================= -->
      <!-- Main Cyan Tube -->
      <path d="M 260, 390 L 480, 470 L 600, 750 L 390, 860 L 250, 550 Z" 
            fill="#00D2FF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
      
      <!-- Tube Highlight (White Gloss) -->
      <path d="M 280, 410 L 450, 480 L 560, 730 L 420, 830 L 280, 530 Z" 
            fill="#FFFFFF" opacity="0.6"/>

      <!-- Tube Folds / Accordion Bottom -->
      <path d="M 390, 860 L 370, 820 L 410, 800 L 390, 760 L 430, 740 L 410, 700 L 450, 680 L 430, 640 L 470, 620 L 450, 580" 
            fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="380" y1="840" x2="400" y2="840" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
      <line x1="400" y1="780" x2="420" y2="780" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
      <line x1="420" y1="720" x2="440" y2="720" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
      <line x1="440" y1="660" x2="460" y2="660" stroke="#000000" stroke-width="6" stroke-linecap="round"/>

      <!-- Tube Crimp Seal (Red) -->
      <path d="M 250, 550 L 390, 860" stroke="#FF2200" stroke-width="40" stroke-linecap="butt" clip-path="url(#crimp-clip)"/>
      <defs>
        <clipPath id="crimp-clip">
          <rect x="230" y="530" width="180" height="350" transform="rotate(25 320 720)"/>
        </clipPath>
      </defs>
      <path d="M 250, 550 L 390, 860" stroke="#000000" stroke-width="45" stroke-linecap="butt" fill="none" clip-path="url(#crimp-clip)"/>

      <!-- Tube Cap (Magenta) -->
      <path d="M 240, 470 L 260, 390 L 320, 410 L 300, 490 Z" 
            fill="#FF00AA" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
      <path d="M 250, 450 L 290, 460" stroke="#000000" stroke-width="6" stroke-linecap="round"/>

      <!-- ================= LABEL / GRAPHICS ================= -->
      <!-- Label Background -->
      <path d="M 290, 450 L 430, 500 L 520, 700 L 400, 770 L 290, 520 Z" 
            fill="#FFFF00" stroke="#000000" stroke-width="6" stroke-linejoin="round"/>
      
      <!-- Starburst Graphic on Label -->
      <path d="M 360, 550 L 380, 510 L 400, 550 L 440, 550 L 410, 580 L 420, 620 L 380, 600 L 340, 620 L 350, 580 L 320, 550 Z" 
            fill="#FF0080" stroke="#000000" stroke-width="5" stroke-linejoin="round"/>
      
      <!-- Text: "HAIR CREAM" -->
      <!-- HAIR -->
      <path d="M 340, 640 L 340, 680 M 340, 660 L 360, 640 L 360, 680 M 370, 640 L 370, 680 M 370, 660 L 385, 650 M 395, 640 L 395, 680 M 395, 640 L 415, 680 M 415, 640 L 415, 680" 
            stroke="#000000" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- CREAM -->
      <path d="M 345, 700 L 345, 740 M 345, 710 L 360, 700 L 360, 720 L 345, 720 M 370, 700 L 370, 740 M 370, 700 L 390, 700 L 390, 720 L 370, 720 M 400, 700 L 400, 740 M 400, 700 L 420, 700 L 420, 720 L 400, 720 M 430, 700 L 430, 740 M 430, 700 C 445, 700 445, 720 430, 720 M 440, 700 L 460, 700 L 450, 720 L 460, 740" 
            stroke="#000000" stroke-width="6" stroke-linecap="round" fill="none"/>

      <!-- Text: "SUPER HOLD" -->
      <text x="345" y="650" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="28" fill="#FF2200" stroke="#000000" stroke-width="2">SUPER</text>
      <text x="345" y="680" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="28" fill="#FF2200" stroke="#000000" stroke-width="2">HOLD</text>

      <!-- Drip Graphic -->
      <path d="M 470, 620 Q 490, 650 480, 670 Q 460, 690 450, 660 Q 440, 630 470, 620 Z" 
            fill="#FF0080" stroke="#000000" stroke-width="5" stroke-linejoin="round"/>

    </g>
  </g>
</svg>