<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop shadow for the sticker die-cut effect -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="14" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <!-- Glow for the burst halo -->
    <filter id="burstGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Background blur for the sticker center -->
    <filter id="blurFilter">
      <feGaussianBlur stdDeviation="2" />
    </filter>

    <!-- Halftone Dot Pattern for Pop Art Shading -->
    <pattern id="halftone" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3.5" fill="#FFD700"/>
    </pattern>

    <!-- Halftone Pattern for Bubbles -->
    <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.5" fill="#00FFFF"/>
    </pattern>

    <!-- Clipping path for the bottle body -->
    <clipPath id="bottleClip">
      <path d="M 360,860 L 640,860 C 660,860 670,840 670,820 L 670,400 C 670,330 630,280 580,260 L 580,180 L 420,180 L 420,260 C 370,280 330,330 330,400 L 330,820 C 330,840 340,860 360,860 Z" />
    </clipPath>
  </defs>

  <!-- Sticker Container Group -->
  <g filter="url(#dropShadow)">
    <!-- Physical Die-Cut White Border (Thick) -->
    <path id="sticker-border" fill="#FFFFFF" stroke="none"
      d="M 500,130
         C 380,130 280,210 270,330
         C 260,450 120,480 120,580
         C 120,680 250,680 280,780
         C 310,880 400,930 500,930
         C 600,930 690,880 720,780
         C 750,680 880,680 880,580
         C 880,480 740,450 730,330
         C 720,210 620,130 500,130 Z" />

    <!-- Inner Pop Art Content (Clipped by the border shape) -->
    <!-- Background Burst/Halo -->
    <path id="burst-bg" fill="#FFFF00" stroke="#000000" stroke-width="8" stroke-linejoin="round"
      d="M 500,140
         C 390,140 295,215 285,325
         C 275,435 135,465 135,565
         C 135,665 260,665 290,760
         C 320,855 410,905 500,905
         C 590,905 680,855 710,760
         C 740,665 865,665 865,565
         C 865,465 725,435 715,325
         C 705,215 610,140 500,140 Z" />

    <!-- Starburst Action Lines (Behind Bottle) -->
    <g id="starburst" stroke="#000000" stroke-width="8" stroke-linecap="round">
      <line x1="500" y1="140" x2="500" y2="90" />
      <line x1="500" y1="140" x2="500" y2="70" stroke="#FF0000" stroke-width="12" />
      <line x1="500" y1="140" x2="460" y2="110" />
      <line x1="500" y1="140" x2="540" y2="110" />
      <line x1="500" y1="140" x2="440" y2="140" />
      <line x1="500" y1="140" x2="560" y2="140" />
      <line x1="500" y1="140" x2="460" y2="170" />
      <line x1="500" y1="140" x2="540" y2="170" />
    </g>

    <!-- ========================================== -->
    <!-- THE GIANT COMIC BLOB OF SHAMPOO            -->
    <!-- ========================================== -->
    <g id="shampoo-blob">
      <!-- Main Blob Base -->
      <path d="M 430,180 
               C 350,180 250,200 200,280 
               C 150,360 130,480 180,560 
               C 230,640 340,680 420,620 
               C 460,590 540,590 580,620 
               C 660,680 770,640 820,560 
               C 870,480 850,360 800,280 
               C 750,200 650,180 570,180 
               Q 500,220 430,180 Z" 
            fill="#00FFFF" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
      
      <!-- Secondary Blob Overlays for Depth -->
      <path d="M 420,300 C 380,340 340,420 380,480 C 420,540 480,500 520,440 C 560,380 500,320 420,300 Z" 
            fill="#00FFFF" stroke="#000000" stroke-width="8"/>
      <path d="M 580,320 C 640,340 680,420 640,500 C 600,580 520,540 500,480 C 480,420 520,340 580,320 Z" 
            fill="#00FFFF" stroke="#000000" stroke-width="8"/>
      <path d="M 480,520 C 440,580 460,660 520,680 C 580,700 620,620 600,560 C 580,500 520,480 480,520 Z" 
            fill="#00FFFF" stroke="#000000" stroke-width="8"/>

      <!-- Halftone Shading on Blob -->
      <path d="M 430,180 C 350,180 250,200 200,280 C 150,360 130,480 180,560 C 230,640 340,680 420,620 C 460,590 540,590 580,620 C 660,680 770,640 820,560 C 870,480 850,360 800,280 C 750,200 650,180 570,180 Q 500,220 430,180 Z" 
            fill="url(#dots)" opacity="0.4" style="mix-blend-mode: multiply;"/>

      <!-- White Comic Highlights -->
      <path d="M 280,300 C 260,340 260,400 280,440 C 300,480 340,480 360,440 C 380,400 380,340 360,300 C 340,260 300,260 280,300 Z" 
            fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
      <path d="M 680,320 C 660,360 660,420 680,460 C 700,500 740,500 760,460 C 780,420 780,360 760,320 C 740,280 700,280 680,320 Z" 
            fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
      <path d="M 480,560 C 460,600 460,660 480,700 C 500,740 540,740 560,700 C 580,660 580,600 560,560 C 540,520 500,520 480,560 Z" 
            fill="#FFFFFF" stroke="#000000" stroke-width="6"/>

      <!-- Floating Bubbles -->
      <circle cx="220" cy="220" r="25" fill="#00FFFF" stroke="#000000" stroke-width="6"/>
      <circle cx="780" cy="240" r="35" fill="#00FFFF" stroke="#000000" stroke-width="6"/>
      <circle cx="300" cy="600" r="20" fill="#00FFFF" stroke="#000000" stroke-width="5"/>
      <circle cx="700" cy="580" r="30" fill="#00FFFF" stroke="#000000" stroke-width="6"/>
      <circle cx="500" cy="720" r="25" fill="#00FFFF" stroke="#000000" stroke-width="6"/>
      <circle cx="380" cy="680" r="15" fill="#00FFFF" stroke="#000000" stroke-width="5"/>
    </g>

    <!-- ========================================== -->
    <!-- THE RETRO SHAMPOO BOTTLE                   -->
    <!-- ========================================== -->
    <g id="bottle">
      <!-- Bottle Drop Shadow -->
      <path d="M 370,870 L 650,870 C 670,870 680,850 680,830 L 680,410 C 680,340 640,290 590,270 L 590,190 L 430,190 L 430,270 C 380,290 340,340 340,410 L 340,830 C 340,850 350,870 370,870 Z" 
            fill="#000000" opacity="0.3" transform="translate(10, 10)"/>

      <!-- Main Bottle Body -->
      <path d="M 360,860 L 640,860 C 660,860 670,840 670,820 L 670,400 C 670,330 630,280 580,260 L 580,180 L 420,180 L 420,260 C 370,280 330,330 330,400 L 330,820 C 330,840 340,860 360,860 Z" 
            fill="#FFFF00" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>

      <!-- Bottle Squeeze Dents (Black lines for depth) -->
      <path d="M 330,500 Q 380,520 430,500" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
      <path d="M 330,600 Q 380,620 430,600" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
      <path d="M 670,500 Q 620,520 570,500" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
      <path d="M 670,600 Q 620,620 570,600" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>

      <!-- Bottle Highlight/Reflection -->
      <path d="M 360,860 L 430,860 L 430,400 C 430,350 450,300 470,260 L 470,180 L 420,180 L 420,260 C 370,280 330,330 330,400 L 330,820 C 330,840 340,860 360,860 Z" 
            fill="#FFFFFF" opacity="0.3"/>

      <!-- Bottle Cap (Neck, Cap, Nozzle) -->
      <rect x="440" y="140" width="120" height="40" fill="#FF00FF" stroke="#000000" stroke-width="8"/>
      <rect x="460" y="100" width="80" height="40" fill="#FF00FF" stroke="#000000" stroke-width="8"/>
      <!-- Nozzle Tip -->
      <path d="M 480,100 L 490,60 L 510,60 L 520,100 Z" fill="#FF00FF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
      <!-- Spout Opening -->
      <ellipse cx="500" cy="60" rx="10" ry="5" fill="#000000"/>

      <!-- Bottle Label Base -->
      <ellipse cx="500" cy="550" rx="140" ry="210" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
      <ellipse cx="500" cy="550" rx="130" ry="200" fill="#FF0000" stroke="none"/>

      <!-- Label Top Ribbon -->
      <path d="M 370,450 L 630,450 L 610,500 L 390,500 Z" fill="#00FFFF" stroke="#000000" stroke-width="6" stroke-linejoin="round"/>
      <text x="500" y="488" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="48" text-anchor="middle" fill="#000000" letter-spacing="2">LATHER</text>

      <!-- Label Main Text -->
      <text x="500" y="620" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="90" text-anchor="middle" fill="#FFFF00" stroke="#000000" stroke-width="6" letter-spacing="4">POP</text>
      <text x="500" y="710" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="90" text-anchor="middle" fill="#FFFF00" stroke="#000000" stroke-width="6" letter-spacing="4">WASH</text>

      <!-- Label Bottom Starburst -->
      <g transform="translate(500, 740)">
        <path d="M 0,-25 L 7,-8 L 25,-8 L 11,3 L 16,20 L 0,10 L -16,20 L -11,3 L -25,-8 L -7,-8 Z" fill="#FFFF00" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
        <text x="0" y="5" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="14" text-anchor="middle" fill="#000000">NEW!</text>
      </g>
    </g>
  </g>
</svg>