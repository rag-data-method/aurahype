<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Halftone Dot Patterns -->
    <pattern id="dot-white" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.5" fill="#ffffff" />
    </pattern>
    <pattern id="dot-black" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="#000000" />
    </pattern>
    <pattern id="dot-cyan" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="3.5" fill="#00ffff" />
    </pattern>
    <pattern id="dot-magenta" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4" fill="#ff00ff" />
    </pattern>
    <pattern id="dot-red" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="5" fill="#ff0044" />
    </pattern>

    <!-- Halftone Fades (Dense to Sparse) -->
    <mask id="fade-up">
      <linearGradient id="grad-up" x1="0.5" y1="1" x2="0.5" y2="0">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="100%" stop-color="#000000" />
      </linearGradient>
      <rect width="1600" height="900" fill="url(#grad-up)" />
    </mask>
    <mask id="fade-down">
      <linearGradient id="grad-down" x1="0.5" y1="0" x2="0.5" y2="1">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="100%" stop-color="#000000" />
      </linearGradient>
      <rect width="1600" height="900" fill="url(#grad-down)" />
    </mask>
    <mask id="fade-left">
      <linearGradient id="grad-left" x1="1" y1="0.5" x2="0" y2="0.5">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="100%" stop-color="#000000" />
      </linearGradient>
      <rect width="1600" height="900" fill="url(#grad-left)" />
    </mask>

    <!-- Lightning Bolt Path -->
    <path id="bolt-path" d="M 820 0 L 550 320 L 740 320 L 480 900 L 1050 420 L 830 420 L 1020 0 Z" />
  </defs>

  <!-- 1. Background Layer -->
  <rect width="1600" height="900" fill="#ff0044" />
  
  <!-- Cyan Diagonal Stripes -->
  <g mask="url(#fade-up)">
    <rect width="1600" height="900" fill="#00ffff" />
    <path d="M -100 900 L 300 0 L 500 0 L 100 900 Z" fill="#000000" />
    <path d="M 400 900 L 800 0 L 1000 0 L 600 900 Z" fill="#000000" />
    <path d="M 900 900 L 1300 0 L 1500 0 L 1100 900 Z" fill="#000000" />
    <path d="M 1400 900 L 1800 0 L 2000 0 L 1600 900 Z" fill="#000000" />
  </g>

  <!-- Magenta Rectangular Blocks -->
  <rect x="0" y="0" width="400" height="300" fill="#ff00ff" mask="url(#fade-down)" />
  <rect x="1200" y="600" width="400" height="300" fill="#ff00ff" mask="url(#fade-up)" />

  <!-- Halftone Background Dots (Pop Art Texture) -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#dot-white)" opacity="0.2" />
  <rect x="0" y="0" width="1600" height="900" fill="url(#dot-black)" opacity="0.1" />

  <!-- Animated Halftone Overlay (Cyan) -->
  <g transform-origin="800 450">
    <rect x="-200" y="-200" width="2000" height="1300" fill="url(#dot-cyan)" opacity="0.3" mask="url(#fade-up)" />
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
  </g>

  <!-- 2. Energy Field (Behind Bolt) -->
  <g>
    <circle cx="800" cy="450" r="350" fill="none" stroke="#00ffff" stroke-width="15" stroke-dasharray="20 40" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="450" r="280" fill="none" stroke="#ff00ff" stroke-width="10" stroke-dasharray="30 20" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="360 800 450" to="0 800 450" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="450" r="200" fill="none" stroke="#ffffff" stroke-width="8" stroke-dasharray="15 25" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Pulsing Rings -->
    <circle cx="800" cy="450" r="100" fill="none" stroke="#ffffff" stroke-width="5" opacity="0">
      <animate attributeName="r" values="100; 500" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 0" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="450" r="100" fill="none" stroke="#ffffff" stroke-width="5" opacity="0">
      <animate attributeName="r" values="100; 500" dur="1.5s" begin="0.75s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 0" dur="1.5s" begin="0.75s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 3. Action Lines (Speed/Energy Lines) -->
  <g stroke="#000000" stroke-width="6" stroke-linecap="round">
    <!-- Lines pointing to top-left -->
    <line x1="100" y1="100" x2="400" y2="300">
      <animate attributeName="x2" values="400; 380; 400" dur="0.2s" repeatCount="indefinite" />
      <animate attributeName="y2" values="300; 280; 300" dur="0.2s" repeatCount="indefinite" />
    </line>
    <line x1="50" y1="250" x2="350" y2="400">
      <animate attributeName="x2" values="350; 330; 350" dur="0.3s" repeatCount="indefinite" />
      <animate attributeName="y2" values="400; 380; 400" dur="0.3s" repeatCount="indefinite" />
    </line>
    <line x1="200" y1="50" x2="450" y2="250">
      <animate attributeName="x2" values="450; 430; 450" dur="0.25s" repeatCount="indefinite" />
      <animate attributeName="y2" values="250; 230; 250" dur="0.25s" repeatCount="indefinite" />
    </line>

    <!-- Lines pointing to top-right -->
    <line x1="1500" y1="100" x2="1200" y2="300">
      <animate attributeName="x2" values="1200; 1220; 1200" dur="0.2s" repeatCount="indefinite" />
      <animate attributeName="y2" values="300; 280; 300" dur="0.2s" repeatCount="indefinite" />
    </line>
    <line x1="1550" y1="250" x2="1250" y2="400">
      <animate attributeName="x2" values="1250; 1270; 1250" dur="0.3s" repeatCount="indefinite" />
      <animate attributeName="y2" values="400; 380; 400" dur="0.3s" repeatCount="indefinite" />
    </line>
    <line x1="1400" y1="50" x2="1150" y2="250">
      <animate attributeName="x2" values="1150; 1170; 1150" dur="0.25s" repeatCount="indefinite" />
      <animate attributeName="y2" values="250; 230; 250" dur="0.25s" repeatCount="indefinite" />
    </line>

    <!-- Lines pointing down from bolt -->
    <line x1="600" y1="800" x2="600" y2="600">
      <animate attributeName="y2" values="600; 580; 600" dur="0.15s" repeatCount="indefinite" />
    </line>
    <line x1="1000" y1="850" x2="1000" y2="650">
      <animate attributeName="y2" values="650; 630; 650" dur="0.2s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- 4. Massive Lightning Bolt -->
  <g id="lightning-bolt-group">
    <!-- Thick Black Outline -->
    <use href="#bolt-path" fill="none" stroke="#000000" stroke-width="32" stroke-linejoin="round" />
    <!-- White Inner Glow / Secondary Outline -->
    <use href="#bolt-path" fill="none" stroke="#ffffff" stroke-width="16" stroke-linejoin="round" />
    
    <!-- Main Yellow Fill -->
    <use href="#bolt-path" fill="#ffff00" />

    <!-- Halftone Dots on Bolt for Lichtenstein Feel -->
    <use href="#bolt-path" fill="url(#dot-red)" opacity="0.4" mask="url(#fade-down)" />

    <!-- Jitter/Shake Animation for the Bolt -->
    <animateTransform attributeName="transform" type="translate" values="0 0; 2 -2; -2 2; 0 0" dur="0.1s" repeatCount="indefinite" />
  </g>

  <!-- 5. Floating Energy Sparks -->
  <g id="sparks-group">
    <!-- Spark 1 -->
    <g transform="translate(400, 200)">
      <circle r="12" fill="#00ffff" stroke="#000000" stroke-width="3" />
      <animateTransform attributeName="transform" type="translate" values="400 200; 380 180; 420 220; 400 200" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.5; 1" dur="1s" repeatCount="indefinite" />
    </g>

    <!-- Spark 2 -->
    <g transform="translate(1200, 300)">
      <circle r="15" fill="#ff00ff" stroke="#000000" stroke-width="3" />
      <animateTransform attributeName="transform" type="translate" values="1200 300; 1230 280; 1170 320; 1200 300" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.3; 1" dur="1.2s" repeatCount="indefinite" />
    </g>

    <!-- Spark 3 -->
    <g transform="translate(300, 700)">
      <circle r="10" fill="#ffffff" stroke="#000000" stroke-width="3" />
      <animateTransform attributeName="transform" type="translate" values="300 700; 280 730; 320 670; 300 700" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.6; 1" dur="0.8s" repeatCount="indefinite" />
    </g>

    <!-- Spark 4 -->
    <g transform="translate(1300, 750)">
      <circle r="18" fill="#ffff00" stroke="#000000" stroke-width="4" />
      <animateTransform attributeName="transform" type="translate" values="1300 750; 1270 770; 1330 730; 1300 750" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.4; 1" dur="1.5s" repeatCount="indefinite" />
    </g>

    <!-- Spark 5 (Top) -->
    <g transform="translate(900, 100)">
      <circle r="14" fill="#ff0044" stroke="#000000" stroke-width="3" />
      <animateTransform attributeName="transform" type="translate" values="900 100; 920 80; 880 120; 900 100" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.5; 1" dur="0.9s" repeatCount="indefinite" />
    </g>

    <!-- Spark 6 (Bottom) -->
    <g transform="translate(700, 850)">
      <circle r="20" fill="#00ffff" stroke="#000000" stroke-width="4" />
      <animateTransform attributeName="transform" type="translate" values="700 850; 730 870; 670 830; 700 850" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.2; 1" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Spark 7 (Left) -->
    <g transform="translate(150, 500)">
      <circle r="11" fill="#ff00ff" stroke="#000000" stroke-width="3" />
      <animateTransform attributeName="transform" type="translate" values="150 500; 130 520; 170 480; 150 500" dur="1.6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.7; 1" dur="0.7s" repeatCount="indefinite" />
    </g>

    <!-- Spark 8 (Right) -->
    <g transform="translate(1450, 500)">
      <circle r="16" fill="#ffffff" stroke="#000000" stroke-width="3" />
      <animateTransform attributeName="transform" type="translate" values="1450 500; 1470 480; 1430 520; 1450 500" dur="2.1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0.4; 1" dur="1.1s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- 6. Star Bursts (Classic Comic "Bang" elements) -->
  <g id="star-bursts">
    <!-- Star 1 -->
    <g transform="translate(250, 250) scale(1.5)">
      <path d="M 0 -40 L 10 -10 L 40 -10 L 15 10 L 25 40 L 0 20 L -25 40 L -15 10 L -40 -10 L -10 -10 Z" fill="#ff00ff" stroke="#000000" stroke-width="3" stroke-linejoin="round" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="4s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1; 0.5; 1" dur="1s" repeatCount="indefinite" />
    </g>

    <!-- Star 2 -->
    <g transform="translate(1350, 200) scale(1.2)">
      <path d="M 0 -50 L 12 -15 L 50 -15 L 20 10 L 30 50 L 0 25 L -30 50 L -20 10 L -50 -15 L -12 -15 Z" fill="#00ffff" stroke="#000000" stroke-width="3" stroke-linejoin="round" />
      <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="5s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1; 0.6; 1" dur="1.2s" repeatCount="indefinite" />
    </g>

    <!-- Star 3 -->
    <g transform="translate(200, 650) scale(1.0)">
      <path d="M 0 -30 L 8 -8 L 30 -8 L 12 8 L 18 30 L 0 15 L -18 30 L -12 8 L -30 -8 L -8 -8 Z" fill="#ffff00" stroke="#000000" stroke-width="3" stroke-linejoin="round" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="3s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1; 0.4; 1" dur="0.8s" repeatCount="indefinite" />
    </g>

    <!-- Star 4 -->
    <g transform="translate(1400, 700) scale(1.3)">
      <path d="M 0 -45 L 10 -12 L 45 -12 L 18 12 L 28 45 L 0 22 L -28 45 L -18 12 L -45 -12 L -10 -12 Z" fill="#ff0044" stroke="#000000" stroke-width="3" stroke-linejoin="round" />
      <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="6s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1; 0.5; 1" dur="1.5s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- 7. Small Spark Lines (Electricity arcs) -->
  <g stroke="#ffff00" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M 550 320 L 500 280">
      <animate attributeName="d" values="M 550 320 L 500 280; M 550 320 L 480 300; M 550 320 L 500 280" dur="0.2s" repeatCount="indefinite" />
    </path>
    <path d="M 1050 420 L 1100 380">
      <animate attributeName="d" values="M 1050 420 L 1100 380; M 1050 420 L 1120 400; M 1050 420 L 1100 380" dur="0.3s" repeatCount="indefinite" />
    </path>
    <path d="M 480 900 L 420 950">
      <animate attributeName="d" values="M 480 900 L 420 950; M 480 900 L 450 980; M 480 900 L 420 950" dur="0.25s" repeatCount="indefinite" />
    </path>
    <path d="M 820 0 L 780 -50">
      <animate attributeName="d" values="M 820 0 L 780 -50; M 820 0 L 850 -30; M 820 0 L 780 -50" dur="0.2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- 8. Comic Text Bubble (Top Right) -->
  <g transform="translate(1100, 100)">
    <!-- Bubble Outline -->
    <path d="M 20 0 Q 200 -20 380 0 Q 420 50 390 120 Q 300 150 220 130 L 180 180 L 150 120 Q 50 140 10 100 Q -20 50 20 0 Z" fill="#ffffff" stroke="#000000" stroke-width="6" stroke-linejoin="round" />
    <!-- Text -->
    <text x="200" y="85" font-family="Impact, sans-serif" font-size="70" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="4">ZAP!!</text>
    
    <!-- Jitter Animation for Bubble -->
    <animateTransform attributeName="transform" type="translate" values="1100 100; 1095 95; 1105 105; 1100 100" dur="0.15s" repeatCount="indefinite" />
  </g>

  <!-- 9. Halftone Foreground Overlay (Magenta) -->
  <g transform-origin="800 450">
    <rect x="-200" y="-200" width="2000" height="1300" fill="url(#dot-magenta)" opacity="0.2" mask="url(#fade-down)" />
    <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="25s" repeatCount="indefinite" />
  </g>

  <!-- 10. Static Halftone Border Strips (Top and Bottom) -->
  <rect x="0" y="0" width="1600" height="60" fill="url(#dot-black)" />
  <rect x="0" y="840" width="1600" height="60" fill="url(#dot-black)" />
  
  <!-- Animated Halftone Strip (Middle) -->
  <rect x="0" y="440" width="1600" height="20" fill="url(#dot-white)">
    <animate attributeName="opacity" values="0.3; 0.8; 0.3" dur="0.1s" repeatCount="indefinite" />
  </rect>

</svg>