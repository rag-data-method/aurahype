<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Halftone Dot Pattern -->
    <pattern id="halftone" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <circle cx="10" cy="10" r="5" fill="#ffffff" opacity="0.6" />
    </pattern>

    <!-- Sunburst Rays Pattern -->
    <pattern id="sunburst" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M100 100 L100 0 L120 0 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L100 0 L80 0 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L200 100 L200 120 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L200 100 L200 80 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L100 200 L120 200 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L100 200 L80 200 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L0 100 L0 120 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L0 100 L0 80 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L170.7 29.3 L185.3 44.9 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L29.3 29.3 L44.9 14.7 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L170.7 170.7 L185.3 155.1 Z" fill="#ffffff" opacity="0.4" />
      <path d="M100 100 L29.3 170.7 L14.7 155.1 Z" fill="#ffffff" opacity="0.4" />
    </pattern>

    <!-- Halftone Dot Mask for Text -->
    <mask id="text-mask">
      <rect x="0" y="0" width="1920" height="1080" fill="white" />
      <rect x="150" y="150" width="1620" height="780" rx="60" fill="black" />
    </mask>

    <!-- Filters for dramatic effects -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="15" dy="15" stdDeviation="8" flood-color="#000000" flood-opacity="0.7" />
    </filter>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;family=Bebas+Neue&amp;display=swap');

    .bg-rect { fill: #ff0055; }
    .burst-overlay { fill: url(#sunburst); }
    .halftone-overlay { fill: url(#halftone); }
    
    .main-text {
      font-family: 'Bangers', 'Bebas Neue', Impact, sans-serif;
      font-size: 180px;
      font-weight: 900;
      fill: #fff700;
      stroke: #000000;
      stroke-width: 8px;
      paint-order: stroke fill;
      text-anchor: middle;
      dominant-baseline: middle;
      filter: url(#drop-shadow);
    }

    .accent {
      font-family: 'Bangers', 'Bebas Neue', Impact, sans-serif;
      font-size: 180px;
      font-weight: 900;
      fill: #ffffff;
      stroke: #000000;
      stroke-width: 8px;
      paint-order: stroke fill;
      text-anchor: middle;
      dominant-baseline: middle;
      filter: url(#drop-shadow);
    }

    .star-burst {
      fill: #ffffff;
      stroke: #000000;
      stroke-width: 6px;
      filter: url(#drop-shadow);
    }

    .burst-group { transform-origin: 960px 540px; }
    .halftone-group { transform-origin: 960px 540px; }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes pulse-text {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    @keyframes slide-dots {
      from { transform: translate(0, 0); }
      to { transform: translate(20px, 20px); }
    }

    @keyframes jiggle {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(-2deg); }
      100% { transform: rotate(0deg); }
    }

    .animate-spin-slow { animation: spin-slow 40s linear infinite; }
    .animate-spin-reverse { animation: spin-reverse 30s linear infinite; }
    .animate-pulse { animation: pulse-text 2s ease-in-out infinite; }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-jiggle { animation: jiggle 0.5s ease-in-out infinite; }
    .animate-slide { animation: slide-dots 2s linear infinite; }
  </style>

  <!-- Base Background -->
  <rect width="1920" height="1080" class="bg-rect" />

  <!-- Rotating Sunburst Background -->
  <g class="burst-group animate-spin-slow">
    <rect x="-500" y="-500" width="2920" height="2080" class="burst-overlay" />
  </g>

  <!-- Shifting/Rotating Halftone Overlay -->
  <g class="halftone-group animate-spin-reverse">
    <rect x="-500" y="-500" width="2920" height="2080" class="halftone-overlay" />
  </g>

  <!-- Decorative Starbursts -->
  <g transform="translate(200, 200)" class="animate-jiggle">
    <path d="M0,-80 L20,-20 L80,0 L20,20 L0,80 L-20,20 L-80,0 L-20,-20 Z" class="star-burst" fill="#00d4ff" />
  </g>
  <g transform="translate(1720, 880)" class="animate-jiggle" style="animation-delay: 0.2s;">
    <path d="M0,-80 L20,-20 L80,0 L20,20 L0,80 L-20,20 L-80,0 L-20,-20 Z" class="star-burst" fill="#00d4ff" />
  </g>
  <g transform="translate(200, 880)" class="animate-jiggle" style="animation-delay: 0.4s;">
    <path d="M0,-60 L15,-15 L60,0 L15,15 L0,60 L-15,15 L-60,0 L-15,-15 Z" class="star-burst" fill="#ffffff" />
  </g>
  <g transform="translate(1720, 200)" class="animate-jiggle" style="animation-delay: 0.6s;">
    <path d="M0,-60 L15,-15 L60,0 L15,15 L0,60 L-15,15 L-60,0 L-15,-15 Z" class="star-burst" fill="#ffffff" />
  </g>

  <!-- Main Text Box Background (Masked Halftone) -->
  <g mask="url(#text-mask)">
    <rect x="100" y="100" width="1720" height="880" rx="80" fill="#000000" />
    <rect x="120" y="120" width="1680" height="840" rx="70" fill="#ffffff" />
    <g class="animate-slide">
      <rect x="120" y="120" width="1680" height="840" rx="70" fill="url(#halftone)" opacity="0.3" />
    </g>
  </g>

  <!-- Main Text Content -->
  <g class="animate-pulse">
    <text x="960" y="440" class="accent">MUITO ROSA,</text>
    <text x="960" y="640" class="main-text">POUCO DRAMA.</text>
  </g>

  <!-- Floating Action Stars around text -->
  <g transform="translate(400, 540)" class="animate-float">
    <path d="M0,-40 L10,-10 L40,0 L10,10 L0,40 L-10,10 L-40,0 L-10,-10 Z" fill="#00d4ff" stroke="#000000" stroke-width="4" />
  </g>
  <g transform="translate(1520, 540)" class="animate-float" style="animation-delay: 1s;">
    <path d="M0,-40 L10,-10 L40,0 L10,10 L0,40 L-10,10 L-40,0 L-10,-10 Z" fill="#00d4ff" stroke="#000000" stroke-width="4" />
  </g>
</svg>