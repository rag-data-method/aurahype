<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Halftone Pattern -->
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="3.5" fill="#e4002b" />
    </pattern>

    <!-- Sunburst Ray Clip Path -->
    <clipPath id="centerClip">
      <rect x="0" y="0" width="1920" height="1080" />
    </clipPath>
  </defs>

  <style>
    /* Base Styles */
    .bg-base { fill: #f4d03f; }
    .sunburst { fill: #f39c12; }
    .text-box-bg { fill: #111; stroke: #ffffff; stroke-width: 20px; }
    .text-main { 
      font-family: 'Impact', 'Arial Black', sans-serif; 
      font-weight: 900; 
      font-size: 180px; 
      fill: #ffffff; 
      letter-spacing: 12px;
    }
    .text-sub {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: 70px;
      fill: #111;
      letter-spacing: 15px;
    }
    .star { fill: #e4002b; }

    /* 
      KEYFRAMES 
      All animations use 's' (seconds) as the unit.
    */
    
    /* Halftone scaling pulse */
    @keyframes scaleHalftone {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* Sunburst rotation */
    @keyframes spinSunburst {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Text box breathing (scale) */
    @keyframes breatheBox {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    /* Main text subtle skew/shake */
    @keyframes shakeText {
      0% { transform: translate(0, 0) skewX(0deg); }
      25% { transform: translate(-4px, 2px) skewX(-1deg); }
      50% { transform: translate(4px, -2px) skewX(1deg); }
      75% { transform: translate(-2px, 4px) skewX(-0.5deg); }
      100% { transform: translate(0, 0) skewX(0deg); }
    }

    /* Subtitle floating */
    @keyframes floatSub {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Star spinning */
    @keyframes spinStar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Action lines sliding */
    @keyframes slideLines {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 100; }
    }

    /* Applying Animations */
    .halftone-layer {
      animation: scaleHalftone 4s ease-in-out infinite;
      transform-origin: center;
    }

    .sunburst-layer {
      animation: spinSunburst 20s linear infinite;
      transform-origin: 960px 540px;
    }

    .text-box-group {
      animation: breatheBox 3s ease-in-out infinite;
      transform-origin: center;
    }

    .main-text-group {
      animation: shakeText 0.4s steps(2, end) infinite;
      transform-origin: center;
    }

    .sub-text-group {
      animation: floatSub 2.5s ease-in-out infinite;
    }

    .star-anim {
      animation: spinStar 3s linear infinite;
      transform-origin: center;
    }

    .action-line {
      stroke: #111;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 40 20;
      animation: slideLines 1s linear infinite;
    }
  </style>

  <!-- Background Base (Yellow) -->
  <rect class="bg-base" width="1920" height="1080" />

  <!-- Halftone Dots Background -->
  <rect class="halftone-layer" x="-200" y="-200" width="2320" height="1480" fill="url(#dots)" opacity="0.6" />

  <!-- Sunburst Rays -->
  <g class="sunburst-layer">
    <rect x="-500" y="-500" width="2920" height="2080" fill="none" />
    <!-- Generating 36 rays (10 degrees each) -->
    <polygon points="960,540 1060,-100 980,-100" class="sunburst" />
    <polygon points="960,540 1130,0 1050,-50" class="sunburst" />
    <polygon points="960,540 1200,100 1130,50" class="sunburst" />
    <polygon points="960,540 1300,250 1230,180" class="sunburst" />
    <polygon points="960,540 1400,400 1340,320" class="sunburst" />
    <polygon points="960,540 1500,550 1440,470" class="sunburst" />
    <polygon points="960,540 1550,700 1500,620" class="sunburst" />
    <polygon points="960,540 1600,850 1550,770" class="sunburst" />
    <polygon points="960,540 1600,1000 1550,920" class="sunburst" />
    <polygon points="960,540 1550,1150 1500,1070" class="sunburst" />
    <polygon points="960,540 1450,1300 1400,1220" class="sunburst" />
    <polygon points="960,540 1300,1400 1250,1320" class="sunburst" />
    <polygon points="960,540 1150,1500 1100,1420" class="sunburst" />
    <polygon points="960,540 1000,1550 950,1470" class="sunburst" />
    <polygon points="960,540 850,1550 800,1470" class="sunburst" />
    <polygon points="960,540 700,1500 650,1420" class="sunburst" />
    <polygon points="960,540 550,1400 500,1320" class="sunburst" />
    <polygon points="960,540 400,1300 350,1220" class="sunburst" />
    <polygon points="960,540 250,1150 200,1070" class="sunburst" />
    <polygon points="960,540 150,1000 100,920" class="sunburst" />
    <polygon points="960,540 100,850 50,770" class="sunburst" />
    <polygon points="960,540 100,700 50,620" class="sunburst" />
    <polygon points="960,540 150,550 100,470" class="sunburst" />
    <polygon points="960,540 250,400 200,320" class="sunburst" />
    <polygon points="960,540 400,250 350,180" class="sunburst" />
    <polygon points="960,540 550,100 500,50" class="sunburst" />
    <polygon points="960,540 700,0 650,-50" class="sunburst" />
    <polygon points="960,540 850,-100 800,-100" class="sunburst" />
  </g>

  <!-- Action Lines (Diagonal Speed Lines) -->
  <g opacity="0.8">
    <!-- Top Left to Bottom Right -->
    <line x1="200" y1="150" x2="700" y2="650" class="action-line" />
    <line x1="1200" y1="150" x2="1700" y2="650" class="action-line" />
    <!-- Bottom Left to Top Right -->
    <line x1="200" y1="950" x2="700" y2="450" class="action-line" />
    <line x1="1200" y1="950" x2="1700" y2="450" class="action-line" />
    <!-- Center Burst Lines -->
    <line x1="960" y1="200" x2="1060" y2="400" class="action-line" stroke-width="12" />
    <line x1="960" y1="880" x2="1060" y2="680" class="action-line" stroke-width="12" />
    <line x1="500" y1="540" x2="700" y2="640" class="action-line" stroke-width="12" />
    <line x1="1420" y1="540" x2="1220" y2="640" class="action-line" stroke-width="12" />
  </g>

  <!-- Decorative Stars -->
  <g class="star-anim" style="transform-origin: 300px 200px;">
    <polygon points="300,150 320,200 370,200 330,230 345,280 300,250 255,280 270,230 230,200 280,200" class="star" />
  </g>
  <g class="star-anim" style="transform-origin: 1600px 850px; animation-duration: 4s;">
    <polygon points="1600,800 1620,850 1670,850 1630,880 1645,930 1600,900 1555,930 1570,880 1530,850 1580,850" class="star" />
  </g>
  <g class="star-anim" style="transform-origin: 150px 900px; animation-duration: 5s;">
    <polygon points="150,870 160,890 180,890 165,905 170,925 150,915 130,925 135,905 120,890 140,890" class="star" />
  </g>

  <!-- Main Text Box Container -->
  <g class="text-box-group">
    <!-- Massive Black Box -->
    <rect x="160" y="340" width="1600" height="400" class="text-box-bg" rx="20" />
    
    <!-- White Inner Border for extra pop -->
    <rect x="185" y="365" width="1550" height="350" fill="none" stroke="#e4002b" stroke-width="10" rx="10" />

    <!-- The Text -->
    <g class="main-text-group">
      <text x="960" y="640" text-anchor="middle" class="text-main">O TOQUE FINAL.</text>
    </g>
  </g>

  <!-- Subtitle / Secondary Text -->
  <g class="sub-text-group">
    <rect x="760" y="780" width="400" height="90" fill="#ffffff" stroke="#111" stroke-width="6" rx="10" />
    <text x="960" y="845" text-anchor="middle" class="text-sub">FINAL TOUCH!</text>
  </g>

</svg>