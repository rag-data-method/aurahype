<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pintando sua página… — Miss Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  :root{
    --amarelo:#FFE100;
    --rosa:#FF00AA;
    --ciano:#00BCD4;
    --tinta:#111;
  }
  body{
    font-family:'Bebas Neue',Impact,Arial,sans-serif;
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    /* fundo amarelinho + bolinhas pop art */
    background:var(--amarelo);
    background-image:radial-gradient(var(--rosa) 2px, transparent 2px);
    background-size:26px 26px;
    overflow:hidden;
    padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
  }

  /* marca fofa em cima */
  .brand{
    margin-top:18px;display:flex;align-items:center;gap:7px;
    font-family:'Bebas Neue',Impact,sans-serif;font-size:26px;letter-spacing:2px;
    color:var(--tinta);text-shadow:2px 2px 0 #fff;
  }
  .brand b{color:var(--rosa)}
  .brand .st{color:#FFC700;font-size:20px;animation:spin 6s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* legenda "distraia-se" */
  .pill{
    margin-top:8px;max-width:92vw;text-align:center;line-height:1.15;
    background:var(--tinta);color:#fff;border-radius:18px;
    padding:7px 16px;font-size:15px;letter-spacing:1px;
    box-shadow:3px 3px 0 var(--rosa);
  }
  .pill b{color:#FFC700}

  /* palco do quadrinho — preenche o meio, centraliza vertical */
  .stage{
    flex:1 1 auto;width:100%;display:flex;align-items:center;justify-content:center;
    padding:14px 0;min-height:0;
  }
  .panel{
    position:relative;width:100%;max-width:min(92vw, 116vh);
    aspect-ratio:16/9;
    border:5px solid var(--tinta);border-radius:18px;overflow:hidden;
    background:#fff;box-shadow:8px 8px 0 var(--tinta);
  }
  .panel iframe{
    position:absolute;inset:0;width:100%;height:100%;border:0;
    background:#fff;opacity:0;transition:opacity .6s ease;
    will-change:opacity;pointer-events:none;
  }
  .panel iframe.on{opacity:1}

  /* rodapé: status + barra + bolinhas de progresso */
  .foot{width:100%;max-width:560px;margin-bottom:16px;text-align:center}
  .status{
    font-size:22px;letter-spacing:1px;color:var(--tinta);
    text-shadow:1px 1px 0 #fff;margin-bottom:8px;
  }
  .status .dots::after{content:'';animation:dot 1.4s steps(4,end) infinite}
  @keyframes dot{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  .bar{
    height:14px;width:100%;background:#fff;border:3px solid var(--tinta);
    border-radius:999px;overflow:hidden;box-shadow:3px 3px 0 var(--ciano);
  }
  .bar i{
    display:block;height:100%;width:40%;border-radius:999px;
    background:repeating-linear-gradient(45deg,var(--rosa) 0 12px,#ff5cc8 12px 24px);
    animation:slide 1.1s linear infinite;
  }
  @keyframes slide{from{transform:translateX(-120%)}to{transform:translateX(320%)}}
  .count{margin-top:8px;font-size:14px;color:#7a5b00;letter-spacing:1px}

  /* telas curtas: encolhe o painel */
  @media (max-height:560px){
    .brand{margin-top:8px;font-size:22px}
    .pill{font-size:13px;padding:4px 12px}
    .panel{box-shadow:6px 6px 0 var(--tinta)}
    .status{font-size:18px}
  }
</style>
</head>
<body>
  <div class="brand"><span class="st">✦</span> MISS <b>CANVAS</b></div>
  <div class="pill">😏 <b>distraia-se</b> com a saga do Pug Rabugento</div>

  <div class="stage">
    <div class="panel" id="panel">
      <iframe id="imgA" title="" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>
      <iframe id="imgB" title="" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>
    </div>
  </div>

  <div class="foot">
    <div class="status">✨ Pintando sua página<span class="dots"></span></div>
    <div class="bar"><i></i></div>
    <div class="count" id="count"></div>
  </div>

<script>
(function(){
  // onde estão os SVGs: './' = mesma pasta (preview) | '/story/' = produção
  var BASE = './';
  // cada quadro aparece por 10s (muda esse número se quiser mais rápido/lento)
  var SLIDE_MS = 10000;

  // ordem da historinha: texto (A) -> arte (B), beat por beat
  var N = ['01','02','03','04','05','06','07','08','09','10','11','12','13','14','15'];
  var frames = [];
  N.forEach(function(n){
    frames.push(BASE+'frame_'+n+'A_text.svg');
    frames.push(BASE+'frame_'+n+'B_art.svg');
  });

  var a = document.getElementById('imgA');
  var b = document.getElementById('imgB');
  var count = document.getElementById('count');
  var cur = a, nxt = b, i = 0;

  function show(idx){
    nxt.src = frames[idx];
    // espera o iframe carregar (fonte + animações) pra trocar sem piscar
    nxt.onload = function(){
      nxt.classList.add('on');
      cur.classList.remove('on');
      var t = cur; cur = nxt; nxt = t;
      count.textContent = 'cena '+(Math.floor(idx/2)+1)+' de '+N.length;
      // pré-aquece o cache do próximo frame
      try{ fetch(frames[(idx+1)%frames.length]); }catch(e){}
    };
  }

  show(0);
  setInterval(function(){
    i = (i+1) % frames.length;
    show(i);
  }, SLIDE_MS);
})();
</script>
</body>
</html>
