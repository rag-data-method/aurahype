<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Halftone Pattern -->
    <pattern id="halftone" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="3" fill="#ffebd7"/>
    </pattern>
    
    <!-- Sunburst Rays Gradient -->
    <linearGradient id="rayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>

    <!-- Filters for High Contrast Shadowing -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="15" stdDeviation="5" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- BACKGROUND: Sunburst Rays -->
  <g transform="translate(960, 540)">
    <g id="rays">
      <polygon points="0,0 -200,-1080 200,-1080" fill="url(#rayGrad)"/>
      <polygon points="0,0 -200,-1080 200,-1080" fill="url(#rayGrad)" transform="rotate(45)"/>
      <polygon points="0,0 -200,-1080 200,-1080" fill="url(#rayGrad)" transform="rotate(90)"/>
      <polygon points="0,0 -200,-1080 200,-1080" fill="url(#rayGrad)" transform="rotate(135)"/>
      <polygon points="0,0 -200,-1080 200,-1080" fill="url(#rayGrad)" transform="rotate(180)"/>
      <polygon points="0,0 -200,-1080 200,-1080" fill="url(#rayGrad)" transform="rotate(225)"/>
      <polygon points="0,0 -200,-1080 200,-1080" fill="url(#rayGrad)" transform="rotate(270)"/>
      <polygon points="0,0 -200,-1080 200,-1080" fill="url(#rayGrad)" transform="rotate(315)"/>
    </g>
  </g>

  <!-- BACKGROUND: Vibrant Base Color -->
  <rect width="1920" height="1080" fill="#e60000" style="mix-blend-mode: multiply; opacity: 0.9;"/>

  <!-- BACKGROUND: Halftone Dots Overlay -->
  <rect width="1920" height="1080" fill="url(#halftone)" opacity="0.3"/>

  <!-- MAIN TEXT BOX CONTAINER -->
  <g transform="translate(960, 540)">
    
    <!-- White Ellipse Panel -->
    <ellipse cx="0" cy="0" rx="780" ry="300" fill="#ffffff" stroke="#000000" stroke-width="20" filter="url(#shadow)"/>
    
    <!-- Red Border Ring -->
    <ellipse cx="0" cy="0" rx="740" ry="260" fill="none" stroke="#e60000" stroke-width="15"/>

    <!-- MASSIVE BOLD TEXT -->
    <!-- Line 1: HORA DO -->
    <text x="0" y="-35" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="140" fill="#ffe600" stroke="#000000" stroke-width="8" paint-order="stroke fill" letter-spacing="4">
      HORA DO
    </text>

    <!-- Line 2: TRABALHO. -->
    <text x="0" y="125" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="150" fill="#ffe600" stroke="#000000" stroke-width="8" paint-order="stroke fill" letter-spacing="4">
      TRABALHO.
    </text>

    <!-- Inner Red Outline for Extra Pop -->
    <text x="0" y="-35" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="140" fill="none" stroke="#e60000" stroke-width="4" paint-order="stroke fill" letter-spacing="4">
      HORA DO
    </text>
    
    <text x="0" y="125" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="150" fill="none" stroke="#e60000" stroke-width="4" paint-order="stroke fill" letter-spacing="4">
      TRABALHO.
    </text>

    <!-- Glowing Outer Burst Effect -->
    <ellipse cx="0" cy="0" rx="730" ry="250" fill="none" stroke="#ffffff" stroke-width="5" filter="url(#glow)" opacity="0.8"/>
  </g>

  <!-- ANIMATION STYLES -->
  <style>
    /* Rotating Sunburst Rays */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    #rays {
      transform-origin: 0 0;
      animation: spin 20s linear infinite;
    }

    /* Pulsating Text Throb */
    @keyframes throb {
      0%, 100% { transform: translate(960px, 540px) scale(1); }
      50% { transform: translate(960px, 540px) scale(1.05); }
    }
    g[transform="translate(960, 540)"] {
      animation: throb 2.5s ease-in-out infinite;
    }

    /* Halftone Drift Effect */
    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: 24px 24px; }
    }
    rect[fill="url(#halftone)"] {
      animation: drift 3s linear infinite;
    }

    /* Comic Shake for Intensity */
    @keyframes shake {
      0% { transform: translate(0, 0); }
      10% { transform: translate(-5px, 5px); }
      20% { transform: translate(5px, -5px); }
      30% { transform: translate(-5px, -5px); }
      40% { transform: translate(5px, 5px); }
      50% { transform: translate(0, 0); }
      100% { transform: translate(0, 0); }
    }
    text {
      animation: shake 0.5s ease-in-out infinite;
      animation-delay: 0.2s;
    }
  </style>
</svg>