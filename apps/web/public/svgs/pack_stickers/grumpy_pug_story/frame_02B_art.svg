<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Halftone Dot Pattern -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="10" fill="#4A90E2"/>
    </pattern>
    
    <!-- Radial Halftone for the giant pop-art dot -->
    <radialGradient id="giantDotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A90E2" />
      <stop offset="100%" stop-color="#4A90E2" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="#F5F5DC" />

  <!-- Giant Pop-Art Dots in corners -->
  <circle cx="150" cy="150" r="300" fill="url(#giantDotGrad)" />
  <circle cx="1770" cy="930" r="300" fill="url(#giantDotGrad)" />
  <circle cx="1770" cy="150" r="200" fill="url(#giantDotGrad)" />
  <circle cx="150" cy="930" r="200" fill="url(#giantDotGrad)" />

  <!-- Halftone Background Pattern -->
  <rect width="100%" height="100%" fill="url(#dots)" opacity="0.2" />

  <!-- Comic Book Action Lines (Background Burst) -->
  <g stroke="#222222" stroke-width="4" stroke-linecap="round" opacity="0.4">
    <line x1="960" y1="540" x2="0" y2="0" />
    <line x1="960" y1="540" x2="1920" y2="0" />
    <line x1="960" y1="540" x2="0" y2="1080" />
    <line x1="960" y1="540" x2="1920" y2="1080" />
    <line x1="960" y1="540" x2="480" y2="0" />
    <line x1="960" y1="540" x2="1440" y2="0" />
    <line x1="960" y1="540" x2="480" y2="1080" />
    <line x1="960" y1="540" x2="1440" y2="1080" />
    <line x1="960" y1="540" x2="0" y2="270" />
    <line x1="960" y1="540" x2="1920" y2="270" />
    <line x1="960" y1="540" x2="0" y2="810" />
    <line x1="960" y1="540" x2="1920" y2="810" />
  </g>

  <!-- Angry Puff Clouds (Behind Pug) -->
  <g stroke="#222222" stroke-width="8" stroke-linejoin="round">
    <!-- Left Cloud -->
    <g transform="translate(100, 200)">
      <path d="M 50,50 C 20,20 80,-20 110,20 C 140,-10 180,30 150,60 C 180,90 130,130 90,100 C 60,130 10,90 50,50 Z" fill="#E74C3C" />
      <path d="M 0,40 L 30,60 M 10,90 L 40,100 M 160,10 L 140,30 M 180,50 L 160,60" stroke-width="6" stroke-linecap="round" />
    </g>
    <!-- Right Cloud -->
    <g transform="translate(1600, 150)">
      <path d="M 50,50 C 20,20 80,-20 110,20 C 140,-10 180,30 150,60 C 180,90 130,130 90,100 C 60,130 10,90 50,50 Z" fill="#E74C3C" />
      <path d="M 0,40 L 30,60 M 10,90 L 40,100 M 160,10 L 140,30 M 180,50 L 160,60" stroke-width="6" stroke-linecap="round" />
    </g>
  </g>

  <!-- THE GRUMPY PUG -->
  <g id="pug-group" transform-origin="960 540">
    <!-- Pug Body -->
    <path d="M 660,1080 L 660,750 C 660,550 1260,550 1260,750 L 1260,1080 Z" fill="#E8C39E" stroke="#222222" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Pug Chest / Belly -->
    <path d="M 810,1080 L 810,850 C 810,750 1110,750 1110,850 L 1110,1080 Z" fill="#D4A373" stroke="#222222" stroke-width="8" stroke-linejoin="round"/>

    <!-- Pug Head -->
    <ellipse cx="960" cy="500" rx="300" ry="280" fill="#E8C39E" stroke="#222222" stroke-width="12"/>

    <!-- Ears -->
    <!-- Left Ear -->
    <path d="M 680,400 C 600,300 550,450 650,550 Z" fill="#222222" stroke="#222222" stroke-width="8"/>
    <path d="M 670,410 C 610,330 570,440 650,520 Z" fill="#D4A373" />
    <!-- Right Ear -->
    <path d="M 1240,400 C 1320,300 1370,450 1270,550 Z" fill="#222222" stroke="#222222" stroke-width="8"/>
    <path d="M 1250,410 C 1310,330 1350,440 1270,520 Z" fill="#D4A373" />

    <!-- Face Mask -->
    <path d="M 960,480 C 800,480 750,600 750,700 C 750,800 850,850 960,850 C 1070,850 1170,800 1170,700 C 1170,600 1120,480 960,480 Z" fill="#222222" stroke="#222222" stroke-width="8"/>

    <!-- Forehead Wrinkles -->
    <path d="M 860,360 Q 960,390 1060,360" fill="none" stroke="#222222" stroke-width="8" stroke-linecap="round"/>
    <path d="M 880,330 Q 960,360 1040,330" fill="none" stroke="#222222" stroke-width="8" stroke-linecap="round"/>
    <path d="M 900,300 Q 960,330 1020,300" fill="none" stroke="#222222" stroke-width="8" stroke-linecap="round"/>

    <!-- Eyes Container -->
    <g id="eyes">
      <!-- Left Eye -->
      <circle cx="850" cy="520" r="55" fill="#FFFFFF" stroke="#222222" stroke-width="8"/>
      <circle cx="850" cy="520" r="20" fill="#222222" />
      <!-- Right Eye -->
      <circle cx="1070" cy="520" r="55" fill="#FFFFFF" stroke="#222222" stroke-width="8"/>
      <circle cx="1070" cy="520" r="20" fill="#222222" />
      
      <!-- Eyebrows (The Grumpy Part) -->
      <!-- Left Eyebrow (Angled down to the right) -->
      <path d="M 760,430 L 940,490 L 940,470 L 760,410 Z" fill="#222222" stroke="#222222" stroke-width="6" stroke-linejoin="round"/>
      <!-- Right Eyebrow (Angled down to the left) -->
      <path d="M 980,490 L 1160,430 L 1160,410 L 980,470 Z" fill="#222222" stroke="#222222" stroke-width="6" stroke-linejoin="round"/>
    </g>

    <!-- Nose -->
    <ellipse cx="960" cy="640" rx="60" ry="40" fill="#111111" stroke="#222222" stroke-width="6"/>
    <ellipse cx="940" cy="630" rx="10" ry="5" fill="#FFFFFF" opacity="0.6"/>

    <!-- Mouth -->
    <path d="M 920,720 Q 960,760 1000,720" fill="none" stroke="#222222" stroke-width="8" stroke-linecap="round"/>
    <!-- Jowls/Chin -->
    <path d="M 860,700 Q 960,820 1060,700" fill="none" stroke="#222222" stroke-width="8" stroke-linecap="round"/>

    <!-- Paws resting on the table -->
    <!-- Left Paw -->
    <ellipse cx="700" cy="900" rx="70" ry="50" fill="#E8C39E" stroke="#222222" stroke-width="8"/>
    <path d="M 670,880 L 670,920 M 700,870 L 700,930 M 730,880 L 730,920" stroke="#222222" stroke-width="6" stroke-linecap="round"/>
    <!-- Right Paw -->
    <ellipse cx="1220" cy="900" rx="70" ry="50" fill="#E8C39E" stroke="#222222" stroke-width="8"/>
    <path d="M 1190,880 L 1190,920 M 1220,870 L 1220,930 M 1250,880 L 1250,920" stroke="#222222" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Table -->
  <rect x="0" y="920" width="1920" height="160" fill="#D4A373" stroke="#222222" stroke-width="12" />
  <line x1="0" y1="940" x2="1920" y2="940" stroke="#222222" stroke-width="6" />

  <!-- THE COFFEE CUP -->
  <g id="coffee-cup" transform="translate(850, 780)">
    <!-- Shadow -->
    <ellipse cx="110" cy="150" rx="100" ry="20" fill="#000000" opacity="0.3"/>
    
    <!-- Cup Handle -->
    <path d="M 200,40 C 260,40 260,130 200,130" fill="none" stroke="#222222" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Cup Body -->
    <path d="M 20,20 L 40,150 C 40,170 180,170 180,150 L 200,20 Z" fill="#E74C3C" stroke="#222222" stroke-width="10" stroke-linejoin="round"/>
    
    <!-- Cup Rim -->
    <ellipse cx="110" cy="20" rx="90" ry="25" fill="#FFFFFF" stroke="#222222" stroke-width="10"/>
    
    <!-- Coffee Liquid -->
    <ellipse cx="110" cy="25" rx="75" ry="18" fill="#4A2C2A" stroke="#222222" stroke-width="6"/>
    
    <!-- Steam Lines -->
    <g stroke="#222222" stroke-width="8" stroke-linecap="round" fill="none">
      <path class="steam" d="M 80,-20 Q 100,-60 80,-100 T 80,-180" />
      <path class="steam delay-1" d="M 110,-30 Q 130,-70 110,-110 T 110,-190" />
      <path class="steam delay-2" d="M 140,-20 Q 120,-60 140,-100 T 140,-180" />
    </g>
  </g>

  <!-- Foreground Action Lines (Frame the Cup) -->
  <g stroke="#E74C3C" stroke-width="6" stroke-linecap="round">
    <!-- Top Left Burst -->
    <line x1="700" y1="600" x2="600" y2="500" />
    <line x1="730" y1="580" x2="650" y2="480" />
    <line x1="760" y1="570" x2="700" y2="460" />
    <!-- Top Right Burst -->
    <line x1="1220" y1="600" x2="1320" y2="500" />
    <line x1="1190" y1="580" x2="1270" y2="480" />
    <line x1="1160" y1="570" x2="1220" y2="460" />
    <!-- Bottom Left Burst -->
    <line x1="700" y1="900" x2="600" y2="1000" />
    <line x1="730" y1="920" x2="650" y2="1020" />
    <!-- Bottom Right Burst -->
    <line x1="1220" y1="900" x2="1320" y2="1000" />
    <line x1="1190" y1="920" x2="1270" y2="1020" />
  </g>

  <style>
    /* Animation: Steam Rising */
    .steam {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: steamRise 2.5s linear infinite;
      opacity: 0;
    }
    
    .delay-1 { animation-delay: 0.8s; }
    .delay-2 { animation-delay: 1.6s; }
    
    @keyframes steamRise {
      0% {
        stroke-dashoffset: 200;
        opacity: 0;
        transform: translateY(0px) scale(1);
      }
      20% {
        opacity: 1;
      }
      100% {
        stroke-dashoffset: 0;
        opacity: 0;
        transform: translateY(-40px) scale(1.4);
      }
    }

    /* Animation: Pug Shaking with Rage */
    #pug-group {
      animation: rageShake 0.15s cubic-bezier(.36,.07,.19,.97) infinite;
    }

    @keyframes rageShake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
  </style>
</svg>