      <path d="M960,540 L200,1280 L300,1280 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L600,1280 L700,1280 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L1000,1280 L1100,1280 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L1400,1280 L1500,1280 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L1800,1280 L1900,1280 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L2200,1280 L2300,1280 Z" fill="#000" opacity="0.05"/>
    </g>
  </g>

