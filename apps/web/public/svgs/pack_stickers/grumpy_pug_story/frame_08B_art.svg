    <path d="M 280 550 C 320 500, 380 520, 420 580" fill="none" stroke="#000" stroke-width="10" stroke-linecap="round"/>
    <path d="M 680 550 C 640 500, 580 520, 540 580" fill="none" stroke="#000" stroke-width="10" stroke-linecap="round"/>
    
    <path d="M 300 480 C 350 450, 420 480, 460 540" fill="none" stroke="#000" stroke-width="12" stroke-linecap="round"/>
    <path d="M 660 480 C 610 450, 540 480, 500 540" fill="none" stroke="#000" stroke-width="12" stroke-linecap="round"/>
    
    <path d="M 220 600 C 180 580, 160 620, 180 660 C 200 700, 240 680, 260 640" fill="#4A3025"/>
    <path d="M 220 600 C 180 580, 160 620, 180 660 C 200 700, 240 680, 260 640" fill="none" stroke="#000" stroke-width="8"/>
