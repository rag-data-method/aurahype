<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="halftone" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="6" fill="#000" opacity="0.15"/>
    </pattern>
    <clipPath id="screenClip">
      <rect width="1920" height="1080"/>
    </clipPath>
  </defs>

  <style>
    @keyframes bgShift {
      0% { fill: #FFD800; }
      33% { fill: #FF0055; }
      66% { fill: #00CCFF; }
      100% { fill: #FFD800; }
    }
    @keyframes sunburstSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pugFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }
    @keyframes armThrow {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-15deg); }
    }
    @keyframes splashExpand {
      0% { transform: scale(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
      100% { transform: scale(2.5) rotate(360deg); opacity: 0; }
    }
    @keyframes dripFall {
      0% { transform: translateY(-100px); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(1200px); opacity: 0; }
    }
    @keyframes colorFlash {
      0% { fill: #FF0055; }
      25% { fill: #00CCFF; }
      50% { fill: #FFD800; }
      75% { fill: #00FF66; }
      100% { fill: #FF0055; }
    }
    @keyframes colorFlashStroke {
      0% { stroke: #FF0055; }
      25% { stroke: #00CCFF; }
      50% { stroke: #FFD800; }
      75% { stroke: #00FF66; }
      100% { stroke: #FF0055; }
    }
    @keyframes bucketShake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-5px, -10px) rotate(-5deg); }
      50% { transform: translate(5px, -20px) rotate(5deg); }
      75% { transform: translate(-5px, -10px) rotate(-5deg); }
    }
    @keyframes starPop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }

    .bg-rect { animation: bgShift 4s infinite linear; }
    .sunburst-group { transform-origin: 960px 540px; animation: sunburstSpin 20s infinite linear; }
    .pug-group { animation: pugFloat 3s infinite ease-in-out; }
    .arm-group { transform-origin: 580px 680px; animation: armThrow 1.5s infinite ease-in-out; }
    .bucket-group { animation: bucketShake 0.8s infinite ease-in-out; }
    .splash-1 { transform-origin: 1150px 550px; animation: splashExpand 1.2s infinite ease-out; }
    .splash-2 { transform-origin: 1200px 500px; animation: splashExpand 1.4s infinite ease-out 0.2s; }
    .splash-3 { transform-origin: 1100px 600px; animation: splashExpand 1.0s infinite ease-out 0.4s; }
    .drip-1 { animation: dripFall 2s infinite linear; }
    .drip-2 { animation: dripFall 2.5s infinite linear 0.5s; }
    .drip-3 { animation: dripFall 1.8s infinite linear 1.0s; }
    .flash-fill { animation: colorFlash 0.5s infinite linear; }
    .flash-stroke { animation: colorFlashStroke 0.5s infinite linear; }
    .star-1 { transform-origin: 200px 200px; animation: starPop 2s infinite ease-in-out; }
    .star-2 { transform-origin: 1700px 300px; animation: starPop 2.5s infinite ease-in-out 0.5s; }
    .star-3 { transform-origin: 1500px 800px; animation: starPop 1.8s infinite ease-in-out 1.0s; }
    .star-4 { transform-origin: 300px 800px; animation: starPop 2.2s infinite ease-in-out 0.8s; }
  </style>

  <rect width="1920" height="1080" class="bg-rect"/>

  <g clip-path="url(#screenClip)">
    <g class="sunburst-group">
      <path d="M960,540 L-200,-200 L-100,-200 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L200,-200 L300,-200 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L600,-200 L700,-200 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L1000,-200 L1100,-200 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L1400,-200 L1500,-200 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L1800,-200 L1900,-200 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L2200,-200 L2300,-200 Z" fill="#000" opacity="0.05"/>
      
      <path d="M960,540 L-200,200 L-200,300 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L-200,600 L-200,700 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L-200,1000 L-200,1100 Z" fill="#000" opacity="0.05"/>
      
      <path d="M960,540 L2120,200 L2220,200 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L2120,600 L2220,600 Z" fill="#000" opacity="0.05"/>
      <path d="M960,540 L2120,1000 L2220,1000 Z" fill="#000" opacity="0.05"/>
      
