<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <style>
    .gear {
      transform-box: fill-box;
      transform-origin: center;
    }
    .gear-cw { animation: spin-cw 10s linear infinite; }
    .gear-ccw { animation: spin-ccw 16s linear infinite; }
    .gear-cw-slow { animation: spin-cw 22s linear infinite; }
    .gear-ccw-slow { animation: spin-ccw 28s linear infinite; }

    .load-bar {
      transform-box: fill-box;
      transform-origin: left center;
      animation: load 2.2s ease-in-out infinite alternate;
    }
    .load-bar-d1 { animation-delay: 0.7s; }
    .load-bar-d2 { animation-delay: 1.4s; }

    .burst {
      transform-box: fill-box;
      transform-origin: center;
      animation: burst-pulse 3.5s ease-in-out infinite alternate;
    }

    .pulse {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 2.8s ease-in-out infinite alternate;
    }

    .pug-breathe {
      transform-box: fill-box;
      transform-origin: center bottom;
      animation: breathe 3s ease-in-out infinite alternate;
    }

    @keyframes spin-cw { to { transform: rotate(360deg); } }
    @keyframes spin-ccw { to { transform: rotate(-360deg); } }
    @keyframes load { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes burst-pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.18); } }
    @keyframes breathe { from { transform: scale(1) translateY(0); } to { transform: scale(1.03) translateY(-12px); } }
  </style>

  <defs>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="9" fill="#000000" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#FFD700"/>
  
  <!-- Red explosion rays -->
  <path d="M 960 540 L 2346 -34 L 2346 1114 Z" fill="#FF0000"/>
  <path d="M 960 540 L 1534 1926 L 386 1926 Z" fill="#FF0000"/>
  <path d="M 960 540 L -426 1114 L -426 -34 Z" fill="#FF0000"/>
  <path d="M 960 540 L 386 -846 L 1534 -846 Z" fill="#FF0000"/>
  <path d="M 960 540 L 2346 1114 L 1534 1926 Z" fill="#FF0000"/>
  <path d="M 960 540 L 386 1926 L -426 1114 Z" fill="#FF0000"/>
  <path d="M 960 540 L -426 -34 L 386 -846 Z" fill="#FF0000"/>
  <path d="M 960 540 L 1534 -846 L 2346 -34 Z" fill="#FF0000"/>

  <!-- Halftone overlay -->
  <rect width="1920" height="1080" fill="url(#dots)" style="pointer-events: none;"/>

  <!-- Main starburst -->
  <path class="burst" d="M 960 120 L 1007 366 L 1170 176 L 1087 413 L 1324 330 L 1134 493 L 1380 540 L 1134 587 L 1324 750 L 1087 667 L 1170 904 L 1007 714 L 960 960 L 913 714 L 750 904 L 833 667 L 596 750 L 786 587 L 540 540 L 786 493 L 596 330 L 833 413 L 750 176 L 913 366 Z" fill="#FF0000" stroke="#000000" stroke-width="16" stroke-linejoin="round"/>

  <!-- Retro monitor frame for loading bars -->
  <rect x="70" y="370" width="460" height="280" fill="#DDDDDD" stroke="#000000" stroke-width="14" rx="24"/>
  <rect x="95" y="395" width="410" height="230" fill="#111111" stroke="#000000" stroke-width="10" rx="12"/>

  <!-- Loading bars -->
  <rect x="120" y="420" width="360" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" rx="6"/>
  <rect x="135" y="432" width="330" height="26" fill="#00FF00" stroke="#000000" stroke-width="6" class="load-bar"/>
  
  <rect x="120" y="490" width="360" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" rx="6"/>
  <rect x="135" y="502" width="330" height="26" fill="#00FFFF" stroke="#000000" stroke-width="6" class="load-bar load-bar-d1"/>
  
  <rect x="120" y="560" width="360" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" rx="6"/>
  <rect x="135" y="572" width="330" height="26" fill="#FF00FF" stroke="#000000" stroke-width="6" class="load-bar load-bar-d2"/>

  <!-- Pug Group -->
  <g class="pug-breathe">
    <!-- Ears -->
    <path d="M 840 470 L 870 390 L 900 480 Z" fill="#111111" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
    <path d="M 1080 470 L 1050 390 L 1020 480 Z" fill="#111111" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
    
    <!-- Head -->
    <rect x="850" y="450" width="220" height="280" rx="100" ry="100" fill="#F2D2A9" stroke="#000000" stroke-width="12"/>
    
    <!-- Wrinkles -->
    <path d="M 940 470 L 945 500" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
    <path d="M 960 465 L 960 495" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
    <path d="M 980 470 L 975 500" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Mask -->
    <path d="M 880 560 Q 960 530 1040 560 L 1040 670 Q 960 700 880 670 Z" fill="#111111" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
    
    <!-- Eyes -->
    <ellipse cx="920" cy="530" rx="28" ry="34" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
    <ellipse cx="1000" cy="530" rx="28" ry="34" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
    <circle cx="926" cy="536" r="13" fill="#000000"/>
    <circle cx="994" cy="536" r="13" fill="#000000"/>
    
    <!-- Eyebrows -->
    <path d="M 895 505 L 945 520 L 940 535 L 890 520 Z" fill="#000000"/>
    <path d="M 1025 505 L 975 520 L 980 535 L 1030 520 Z" fill="#000000"/>
    
    <!-- Nose -->
    <ellipse cx="960" cy="590" rx="18" ry="15" fill="#000000"/>
    
    <!-- Mouth -->
    <path d="M 940 635 Q 960 620 980 635" fill="none" stroke="#000000" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Body -->
    <path d="M 870 720 L 870 830 Q 960 860 1050 830 L 1050 720 Z" fill="#F2D2A9" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Collar -->
    <rect x="860" y="705" width="200" height="30" rx="10" fill="#FF0000" stroke="#000000" stroke-width="10"/>
    <circle cx="1030" cy="720" r="16" fill="#FFD700" stroke="#000000" stroke-width="6"/>
  </g>

  <!-- Gears -->
  <g class="gear gear-cw-slow" transform="translate(300, 280)">
    <circle cx="0" cy="0" r="75" fill="#0066CC" stroke="#000000" stroke-width="8"/>
    <rect x="-22" y="-125" width="44" height="55" fill="#0066CC" stroke="#000000" stroke-width="8" transform="rotate(0)"/>
    <rect x="-22" y="-125" width="44" height="55" fill="#0066CC" stroke="#000000" stroke-width="8" transform="rotate(45)"/>
    <rect x="-22" y="-125" width="44" height="55" fill="#0066CC" stroke="#000000" stroke-width="8" transform="rotate(90)"/>
    <rect x="-22" y="-125" width="44" height="55" fill="#0066CC" stroke="#000000" stroke-width="8" transform="rotate(135)"/>
    <rect x="-22" y="-125" width="44" height="55" fill="#0066CC" stroke="#000000" stroke-width="8" transform="rotate(180)"/>
    <rect x="-22" y="-125" width="44" height="55" fill="#0066CC" stroke="#000000" stroke-width="8" transform="rotate(225)"/>
    <rect x="-22" y="-125" width="44" height="55" fill="#0066CC" stroke="#000000" stroke-width="8" transform="rotate(270)"/>
    <rect x="-22" y="-125" width="44" height="55" fill="#0066CC" stroke="#000000" stroke-width="8" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="30" fill="#FFD700" stroke="#000000" stroke-width="8"/>
  </g>

  <g class="gear gear-ccw-slow" transform="translate(1620, 840)">
    <circle cx="0" cy="0" r="95" fill="#FFD700" stroke="#000000" stroke-width="8"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(0)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(36)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(72)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(108)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(144)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(180)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(216)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(252)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(288)"/>
    <rect x="-20" y="-145" width="40" height="55" fill="#FFD700" stroke="#000000" stroke-width="8" transform="rotate(324)"/>
    <circle cx="0" cy="0" r="35" fill="#FF0000" stroke="#000000" stroke-width="8"/>
  </g>

  <g class="gear gear-cw" transform="translate(1500, 260)">
    <circle cx="0" cy="0" r="55" fill="#FF0000" stroke="#000000" stroke-width="8"/>
    <rect x="-18" y="-95" width="36" height="45" fill="#FF0000" stroke="#000000" stroke-width="8" transform="rotate(0)"/>
    <rect x="-18" y="-95" width="36" height="45" fill="#FF0000" stroke="#000000" stroke-width="8" transform="rotate(60)"/>
    <rect x="-18" y="-95" width="36" height="45" fill="#FF0000" stroke="#000000" stroke-width="8" transform="rotate(120)"/>
    <rect x="-18" y="-95" width="36" height="45" fill="#FF0000" stroke="#000000" stroke-width="8" transform="rotate(180)"/>
    <rect x="-18" y="-95" width="36" height="45" fill="#FF0000" stroke="#000000" stroke-width="8" transform="rotate(240)"/>
    <rect x="-18" y="-95" width="36" height="45" fill="#FF0000" stroke="#000000" stroke-width="8" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  </g>

  <g class="gear gear-ccw" transform="translate(360, 900)">
    <circle cx="0" cy="0" r="65" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
    <rect x="-20" y="-110" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(0)"/>
    <rect x="-20" y="-110" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(45)"/>
    <rect x="-20" y="-110" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(90)"/>
    <rect x="-20" y="-110" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(135)"/>
    <rect x="-20" y="-110" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(180)"/>
    <rect x="-20" y="-110" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(225)"/>
    <rect x="-20" y="-110" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(270)"/>
    <rect x="-20" y="-110" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="8" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="25" fill="#00CCFF" stroke="#000000" stroke-width="8"/>
  </g>

  <!-- Floating pop-art shapes -->
  <circle cx="1720" cy="300" r="75" fill="#FFD700" stroke="#000000" stroke-width="12" class="pulse"/>
  <circle cx="220" cy="880" r="55" fill="#FF0000" stroke="#000000" stroke-width="12" class="pulse" style="animation-delay: 0.8s;"/>
  <g transform="rotate(20 1635 775)" class="pulse" style="animation-delay: 1.5s;">
    <rect x="1580" y="720" width="110" height="110" fill="#00CCFF" stroke="#000000" stroke-width="12"/>
  </g>

  <!-- Aggressive border -->
  <rect x="20" y="20" width="1880" height="1040" fill="none" stroke="#000000" stroke-width="40"/>
</svg>