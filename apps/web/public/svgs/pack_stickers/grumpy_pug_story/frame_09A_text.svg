<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <pattern id="ht" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="8" fill="#000000"/>
    </pattern>
  </defs>
  <style>
    text {
      font-family: Impact, "Arial Black", sans-serif;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .rays {
      transform-origin: 960px 540px;
      animation: spin 20s linear infinite;
    }
    .starburst {
      transform-origin: 960px 540px;
      animation: wobble 2.5s ease-in-out infinite;
    }
    .text-group {
      transform-origin: 960px 540px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .halftone {
      animation: drift 8s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-60px, -60px); }
    }
  </style>

  <!-- Vibrant Cyan Background -->
  <rect width="1920" height="1080" fill="#00CCFF"/>

  <!-- Rotating Sunburst Rays -->
  <g class="rays">
    <polygon points="960,540 2505,126 2505,954" fill="#FF00AA"/>
    <polygon points="960,540 2505,954 2091,1671" fill="#FFEE00"/>
    <polygon points="960,540 2091,1671 1374,2085" fill="#FF00AA"/>
    <polygon points="960,540 1374,2085 546,2085" fill="#FFEE00"/>
    <polygon points="960,540 546,2085 -171,1671" fill="#FF00AA"/>
    <polygon points="960,540 -171,1671 -585,954" fill="#FFEE00"/>
    <polygon points="960,540 -585,954 -585,126" fill="#FF00AA"/>
    <polygon points="960,540 -585,126 -171,-591" fill="#FFEE00"/>
    <polygon points="960,540 -171,-591 546,-1005" fill="#FF00AA"/>
    <polygon points="960,540 546,-1005 1374,-1005" fill="#FFEE00"/>
    <polygon points="960,540 1374,-1005 2091,-591" fill="#FF00AA"/>
    <polygon points="960,540 2091,-591 2505,126" fill="#FFEE00"/>
  </g>

  <!-- Shifting Halftone Dots -->
  <g class="halftone" opacity="0.2">
    <rect x="-200" y="-200" width="2320" height="1480" fill="url(#ht)"/>
  </g>

  <!-- Comic Starburst Text Box -->
  <g class="starburst">
    <polygon points="960,-260 1115,-40 1360,-153 1384,116 1653,140 1540,385 1760,540 1540,695 1653,940 1384,964 1360,1233 1115,1120 960,1340 805,1120 560,1233 536,964 267,940 381,695 160,540 381,385 267,140 536,116 560,-153 805,-40" fill="#FF2222" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
  </g>

  <!-- Massive High-Contrast Text -->
  <g class="text-group">
    <text x="968" y="548" font-size="150px" fill="#000000">A MAGIA DO CÓDIGO.</text>
    <text x="960" y="540" font-size="150px" fill="#FFF700" stroke="#000000" stroke-width="10" paint-order="stroke">A MAGIA DO CÓDIGO.</text>
  </g>
</svg>