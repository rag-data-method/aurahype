<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- POP ART SUNBURST -->
    <g id="sunburst">
      <polygon points="960,540 0,0 300,0" fill="#FFD700" />
      <polygon points="960,540 500,0 800,0" fill="#FF0055" />
      <polygon points="960,540 1000,0 1300,0" fill="#00D4FF" />
      <polygon points="960,540 1500,0 1800,0" fill="#FFD700" />
      <polygon points="960,540 1920,0 1920,300" fill="#FF0055" />
      <polygon points="960,540 1920,500 1920,800" fill="#00D4FF" />
      <polygon points="960,540 1920,1080 1600,1080" fill="#FFD700" />
      <polygon points="960,540 1300,1080 1000,1080" fill="#FF0055" />
      <polygon points="960,540 800,1080 500,1080" fill="#00D4FF" />
      <polygon points="960,540 300,1080 0,1080" fill="#FFD700" />
      <polygon points="960,540 0,800 0,500" fill="#FF0055" />
      <polygon points="960,540 0,300 0,0" fill="#00D4FF" />
    </g>

    <!-- HALFTONE PATTERN -->
    <pattern id="halftone" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="14" fill="#000000" opacity="0.85" />
    </pattern>

    <!-- BORDER HALFTONE PATTERN -->
    <pattern id="border-halftone" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="6" fill="#000000" opacity="0.7" />
    </pattern>

    <!-- CLIP PATH FOR SUNBURST -->
    <clipPath id="sunburst-clip">
      <rect width="1920" height="1080" />
    </clipPath>
  </defs>

  <style>
    @keyframes rotate-sunburst {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes shift-halftone {
      0% { transform: translate(0, 0); }
      50% { transform: translate(20px, -20px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes pulse-text {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes elastic-bounce {
      0% { transform: scale(0.1); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      80% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-4px, -4px); }
      20% { transform: translate(4px, 4px); }
      30% { transform: translate(-4px, 4px); }
      40% { transform: translate(4px, -4px); }
      50% { transform: translate(-2px, 2px); }
      60% { transform: translate(2px, -2px); }
      70% { transform: translate(-2px, -2px); }
      80% { transform: translate(2px, 2px); }
      90% { transform: translate(0, 0); }
    }
    @keyframes float-lines {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(10px, -10px); }
    }
    @keyframes border-dash {
      to { stroke-dashoffset: -100; }
    }
    
    .sunburst-group {
      transform-origin: 960px 540px;
      animation: rotate-sunburst 30s linear infinite;
    }
    .halftone-bg {
      animation: shift-halftone 20s ease-in-out infinite;
    }
    .text-box {
      transform-origin: 960px 540px;
      animation: pulse-text 4s ease-in-out infinite;
    }
    .main-text {
      transform-origin: 960px 540px;
      animation: elastic-bounce 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, shake 3s ease-in-out infinite 1.5s;
    }
    .action-lines {
      transform-origin: 960px 540px;
      animation: float-lines 6s ease-in-out infinite;
    }
    .border-dash-anim {
      stroke-dasharray: 30 20;
      animation: border-dash 1s linear infinite;
    }
  </style>

  <!-- BACKGROUND LAYERS -->
  <rect width="1920" height="1080" fill="#FFFFFF" />
  
  <!-- ROTATING SUNBURST -->
  <g clip-path="url(#sunburst-clip)">
    <g class="sunburst-group">
      <use href="#sunburst" />
    </g>
  </g>

  <!-- HALFTONE OVERLAY -->
  <rect width="1920" height="1080" fill="url(#halftone)" class="halftone-bg" />

  <!-- ACTION LINES (Behind Text Box) -->
  <g class="action-lines">
    <!-- Top Left -->
    <path d="M 100,200 L 350,380" stroke="#000000" stroke-width="12" stroke-linecap="round" />
    <path d="M 50,300 L 280,440" stroke="#000000" stroke-width="8" stroke-linecap="round" />
    <path d="M 150,100 L 320,280" stroke="#000000" stroke-width="16" stroke-linecap="round" />
    <!-- Top Right -->
    <path d="M 1820,200 L 1570,380" stroke="#000000" stroke-width="12" stroke-linecap="round" />
    <path d="M 1870,300 L 1640,440" stroke="#000000" stroke-width="8" stroke-linecap="round" />
    <path d="M 1770,100 L 1600,280" stroke="#000000" stroke-width="16" stroke-linecap="round" />
    <!-- Bottom Left -->
    <path d="M 100,880 L 350,700" stroke="#000000" stroke-width="12" stroke-linecap="round" />
    <path d="M 50,780 L 280,640" stroke="#000000" stroke-width="8" stroke-linecap="round" />
    <path d="M 150,980 L 320,800" stroke="#000000" stroke-width="16" stroke-linecap="round" />
    <!-- Bottom Right -->
    <path d="M 1820,880 L 1570,700" stroke="#000000" stroke-width="12" stroke-linecap="round" />
    <path d="M 1870,780 L 1640,640" stroke="#000000" stroke-width="8" stroke-linecap="round" />
    <path d="M 1770,980 L 1600,800" stroke="#000000" stroke-width="16" stroke-linecap="round" />
  </g>

  <!-- MAIN TEXT BOX -->
  <g class="text-box">
    <!-- Massive Drop Shadow -->
    <rect x="210" y="240" width="1540" height="640" rx="20" fill="#000000" />
    
    <!-- Yellow Background -->
    <rect x="180" y="210" width="1540" height="640" rx="20" fill="#FFD700" />
    
    <!-- Thick Black Border -->
    <rect x="180" y="210" width="1540" height="640" rx="20" fill="none" stroke="#000000" stroke-width="24" />
    
    <!-- Dashed Animated Inner Border -->
    <rect x="210" y="240" width="1480" height="580" rx="10" fill="none" stroke="#FF0055" stroke-width="12" class="border-dash-anim" />
    
    <!-- Halftone Pattern Inner Border -->
    <rect x="225" y="255" width="1450" height="550" rx="5" fill="none" stroke="url(#border-halftone)" stroke-width="24" />
  </g>

  <!-- MASSIVE BOLD TEXT -->
  <g class="main-text">
    <!-- Extreme Drop Shadow for Text -->
    <text x="980" y="440" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="#000000" stroke="#000000" stroke-width="30" stroke-linejoin="round">OBRA DE ARTE</text>
    <text x="980" y="720" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="#000000" stroke="#000000" stroke-width="30" stroke-linejoin="round">CONCLUÍDA.</text>
    
    <!-- Main Yellow Text -->
    <text x="960" y="420" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="#FFD700" stroke="#000000" stroke-width="14" stroke-linejoin="round">OBRA DE ARTE</text>
    
    <!-- Main Cyan Text -->
    <text x="960" y="700" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="#00D4FF" stroke="#000000" stroke-width="14" stroke-linejoin="round">CONCLUÍDA.</text>
    
    <!-- White Highlight Overlay -->
    <text x="960" y="420" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.3">OBRA DE ARTE</text>
    <text x="960" y="700" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.3">CONCLUÍDA.</text>
  </g>

  <!-- FOREGROUND HALFTONE OVERLAY FOR DEPTH -->
  <rect width="1920" height="1080" fill="url(#halftone)" opacity="0.2" pointer-events="none" />
</svg>