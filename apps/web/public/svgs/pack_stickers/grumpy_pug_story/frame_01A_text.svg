<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#FFEA00"/>
      <stop offset="50%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </radialGradient>

    <pattern id="halftone" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="6" fill="#000000" opacity="0.25"/>
    </pattern>

    <pattern id="sunburst" width="1920" height="1080" patternUnits="userSpaceOnUse">
      <g transform="translate(960, 540)">
        <rect x="-960" y="-540" width="1920" height="1080" fill="url(#bgGrad)"/>
        <g stroke="#FFEA00" stroke-width="80" opacity="0.4">
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(0)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(30)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(60)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(90)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(120)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(150)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(180)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(210)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(240)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(270)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(300)"/>
          <line x1="0" y1="0" x2="2000" y2="0" transform="rotate(330)"/>
        </g>
      </g>
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');

    .bg-sunburst { animation: rotateBurst 20s linear infinite; }
    .bg-halftone { animation: shiftHalftone 8s linear infinite; }

    .text-container {
      animation: pulseText 2.5s ease-in-out infinite;
    }

    .text-shadow-layer {
      animation: shadowPulse 1.2s ease-in-out infinite alternate;
    }

    .text-main-layer {
      animation: colorShift 3s ease-in-out infinite alternate;
    }

    @keyframes rotateBurst {
      from { transform: translate(960px, 540px) rotate(0deg) translate(-960px, -540px); }
      to { transform: translate(960px, 540px) rotate(360deg) translate(-960px, -540px); }
    }

    @keyframes shiftHalftone {
      0% { transform: translate(0, 0); }
      25% { transform: translate(20px, -20px); }
      50% { transform: translate(-20px, 20px); }
      75% { transform: translate(20px, 20px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes pulseText {
      0% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.05) translateY(-15px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes shadowPulse {
      0% { transform: translate(12px, 12px); opacity: 0.6; }
      100% { transform: translate(25px, 25px); opacity: 1; }
    }

    @keyframes colorShift {
      0% { fill: #FFFFFF; filter: drop-shadow(0 0 0px #FFFFFF); }
      100% { fill: #FFFFE0; filter: drop-shadow(0 0 30px #FF4500); }
    }
  </style>

  <!-- Background Sunburst -->
  <rect width="1920" height="1080" fill="url(#sunburst)" class="bg-sunburst"/>

  <!-- Background Halftone Overlay -->
  <rect width="1920" height="1080" fill="url(#halftone)" class="bg-halftone"/>

  <!-- Main Text Area -->
  <g transform="translate(960, 540)">
    <g class="text-container">
      
      <!-- Massive Black Drop Shadow Layer -->
      <text 
        x="0" y="0" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        font-family="'Bangers', cursive, sans-serif" 
        font-size="160" 
        font-weight="900" 
        letter-spacing="8"
        fill="#000000"
        class="text-shadow-layer">
        MAIS UMA MANHÃ
        <tspan x="0" dy="170">DIFÍCIL.</tspan>
      </text>

      <!-- White Stroke Layer for Extra Contrast -->
      <text 
        x="0" y="0" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        font-family="'Bangers', cursive, sans-serif" 
        font-size="160" 
        font-weight="900" 
        letter-spacing="8"
        fill="#000000"
        stroke="#FFFFFF"
        stroke-width="12"
        stroke-linejoin="round">
        MAIS UMA MANHÃ
        <tspan x="0" dy="170">DIFÍCIL.</tspan>
      </text>

      <!-- Main Text Layer -->
      <text 
        x="0" y="0" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        font-family="'Bangers', cursive, sans-serif" 
        font-size="160" 
        font-weight="900" 
        letter-spacing="8"
        class="text-main-layer">
        MAIS UMA MANHÃ
        <tspan x="0" dy="170">DIFÍCIL.</tspan>
      </text>

    </g>
  </g>
</svg>