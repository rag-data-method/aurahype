<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffeb3b" />
      <stop offset="60%" stop-color="#f57f17" />
      <stop offset="100%" stop-color="#bf360c" />
    </radialGradient>
    
    <!-- Halftone Pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="4" fill="#ff5722" opacity="0.3" />
    </pattern>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="15" dy="25" stdDeviation="8" flood-color="#3e2723" flood-opacity="0.8" />
    </filter>

    <!-- Paintbrush Bristle Gradient -->
    <linearGradient id="bristleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5252" />
      <stop offset="50%" stop-color="#ff1744" />
      <stop offset="100%" stop-color="#c62828" />
    </linearGradient>
  </defs>

  <!-- Background Layer -->
  <rect width="1920" height="1080" fill="url(#bgGrad)" />
  <rect width="1920" height="1080" fill="url(#dots)" />
  
  <!-- Decorative Pop Art Burst Rays -->
  <g id="burst-rays" fill="#ffea00" opacity="0.6">
    <path d="M 960,540 L 960,-200 L 1020,-200 Z" />
    <path d="M 960,540 L 1330,-200 L 1400,-200 Z" />
    <path d="M 960,540 L 1920,300 L 1920,370 Z" />
    <path d="M 960,540 L 1920,800 L 1920,870 Z" />
    <path d="M 960,540 L 1330,1280 L 1400,1280 Z" />
    <path d="M 960,540 L 960,1280 L 1020,1280 Z" />
    <path d="M 960,540 L 590,1280 L 520,1280 Z" />
    <path d="M 960,540 L 0,800 L 0,870 Z" />
    <path d="M 960,540 L 0,300 L 0,370 Z" />
    <path d="M 960,540 L 590,-200 L 520,-200 Z" />
  </g>

  <!-- PUG BODY -->
  <g id="pug-body-group" filter="url(#shadow)">
    <!-- Main Body -->
    <path d="M 710,1150 L 710,800 C 710,600 1210,600 1210,800 L 1210,1150 Z" fill="#795548" stroke="#000" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Chest Highlight -->
    <path d="M 850,1150 L 850,950 C 850,850 1070,850 1070,950 L 1070,1150 Z" fill="#a1887f" stroke="#000" stroke-width="8" stroke-linejoin="round" />
    
    <!-- Front Legs -->
    <path d="M 780,900 L 780,1150 A 30 30 0 0 0 840,1150 L 840,900 Z" fill="#5d4037" stroke="#000" stroke-width="10" stroke-linejoin="round" />
    <path d="M 1080,900 L 1080,1150 A 30 30 0 0 0 1140,1150 L 1140,900 Z" fill="#5d4037" stroke="#000" stroke-width="10" stroke-linejoin="round" />
    
    <!-- Back Paws -->
    <ellipse cx="780" cy="1145" rx="45" ry="25" fill="#4e342e" stroke="#000" stroke-width="8" />
    <ellipse cx="1110" cy="1145" rx="45" ry="25" fill="#4e342e" stroke="#000" stroke-width="8" />
  </g>

  <!-- PUG HEAD GROUP -->
  <g id="pug-head-group" filter="url(#shadow)">
    <!-- Head Base -->
    <ellipse cx="960" cy="520" rx="320" ry="290" fill="#795548" stroke="#000" stroke-width="12" />
    
    <!-- Left Ear -->
    <path d="M 690,380 Q 550,250 650,150 Q 750,100 800,250 Z" fill="#4e342e" stroke="#000" stroke-width="10" stroke-linejoin="round" />
    <!-- Right Ear -->
    <path d="M 1230,380 Q 1370,250 1270,150 Q 1170,100 1120,250 Z" fill="#4e342e" stroke="#000" stroke-width="10" stroke-linejoin="round" />
    
    <!-- Muzzle Base -->
    <ellipse cx="960" cy="620" rx="180" ry="140" fill="#d7ccc8" stroke="#000" stroke-width="10" />
    
    <!-- Dark Muzzle Patch -->
    <path d="M 860,620 Q 960,560 1060,620 L 1060,700 Q 960,760 860,700 Z" fill="#5d4037" stroke="#000" stroke-width="8" />
    
    <!-- Nose -->
    <ellipse cx="960" cy="585" rx="55" ry="40" fill="#212121" stroke="#000" stroke-width="6" />
    <ellipse cx="960" cy="575" rx="20" ry="10" fill="#ffffff" opacity="0.4" />
    
    <!-- Nose Wrinkle -->
    <path d="M 920,530 Q 960,550 1000,530" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round" />
    
    <!-- Mouth / Frown -->
    <path d="M 880,690 Q 960,660 1040,690" fill="none" stroke="#000" stroke-width="10" stroke-linecap="round" />
    <path d="M 880,690 Q 880,730 860,740" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round" />
    <path d="M 1040,690 Q 1040,730 1060,740" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round" />
    
    <!-- Angry Eyes -->
    <g id="eyes">
      <!-- Left Eye -->
      <ellipse cx="810" cy="480" rx="55" ry="70" fill="#ffffff" stroke="#000" stroke-width="8" />
      <!-- Right Eye -->
      <ellipse cx="1110" cy="480" rx="55" ry="70" fill="#ffffff" stroke="#000" stroke-width="8" />
      
      <!-- Pupils -->
      <circle cx="810" cy="480" r="18" fill="#000" />
      <circle cx="1110" cy="480" r="18" fill="#000" />
      
      <!-- Pupil Highlights -->
      <circle cx="816" cy="474" r="6" fill="#fff" />
      <circle cx="1116" cy="474" r="6" fill="#fff" />
    </g>
    
    <!-- Angry Eyebrows -->
    <path d="M 730,400 L 860,450" stroke="#000" stroke-width="18" stroke-linecap="round" />
    <path d="M 1190,400 L 1060,450" stroke="#000" stroke-width="18" stroke-linecap="round" />
    
    <!-- Forehead Wrinkles -->
    <path d="M 880,380 Q 960,410 1040,380" fill="none" stroke="#000" stroke-width="6" stroke-linecap="round" />
    <path d="M 900,340 Q 960,360 1020,340" fill="none" stroke="#000" stroke-width="5" stroke-linecap="round" />
  </g>

  <!-- PUG PAW (Holding Brush) -->
  <g id="pug-paw" filter="url(#shadow)">
    <path d="M 1130,850 L 1250,850 L 1250,980 A 60 60 0 0 1 1130,980 Z" fill="#795548" stroke="#000" stroke-width="10" stroke-linejoin="round" />
    <!-- Paw Pads -->
    <ellipse cx="1190" cy="930" rx="20" ry="30" fill="#4e342e" stroke="#000" stroke-width="6" />
    <ellipse cx="1160" cy="915" rx="12" ry="18" fill="#4e342e" stroke="#000" stroke-width="4" />
    <ellipse cx="1220" cy="915" rx="12" ry="18" fill="#4e342e" stroke="#000" stroke-width="4" />
  </g>

  <!-- GIANT PAINTBRUSH -->
  <g id="paintbrush" filter="url(#shadow)">
    <!-- Handle -->
    <path d="M 1250,850 L 1450,1050 L 1550,950 L 1350,750 Z" fill="#ffcc80" stroke="#000" stroke-width="10" stroke-linejoin="round" />
    <!-- Handle Highlight -->
    <path d="M 1300,800 L 1460,960" fill="none" stroke="#ffe0b2" stroke-width="6" stroke-linecap="round" />
    
    <!-- Ferrule (Metal Part) -->
    <path d="M 1350,750 L 1550,950 L 1620,880 L 1420,680 Z" fill="#b0bec5" stroke="#000" stroke-width="10" stroke-linejoin="round" />
    
    <!-- Bristles -->
    <path d="M 1420,680 L 1620,880 L 1720,780 L 1550,580 Z" fill="url(#bristleGrad)" stroke="#000" stroke-width="10" stroke-linejoin="round" />
    
    <!-- Bristle Highlight -->
    <path d="M 1470,630 L 1650,810" fill="none" stroke="#ff8a80" stroke-width="8" stroke-linecap="round" opacity="0.7" />
  </g>

  <!-- PAINT SPLATS -->
  <g id="paint-splats" filter="url(#shadow)">
    <!-- Red Splat -->
    <path d="M 1700,700 
             C 1750,650 1800,750 1850,700 
             C 1900,650 1850,550 1800,600 
             C 1750,550 1700,650 1700,700 Z" 
          fill="#ff1744" stroke="#000" stroke-width="8" stroke-linejoin="round" />
    <circle cx="1780" cy="650" r="10" fill="#000" />
    
    <!-- Blue Splat -->
    <path d="M 1600,850 
             C 1650,800 1700,900 1750,850 
             C 1800,800 1750,700 1700,750 
             C 1650,700 1600,800 1600,850 Z" 
          fill="#2979ff" stroke="#000" stroke-width="8" stroke-linejoin="round" />
    <circle cx="1680" cy="800" r="10" fill="#000" />

    <!-- Yellow Splat -->
    <path d="M 1500,950 
             C 1550,900 1600,1000 1650,950 
             C 1700,900 1650,800 1600,850 
             C 1550,800 1500,900 1500,950 Z" 
          fill="#ffea00" stroke="#000" stroke-width="8" stroke-linejoin="round" />
    <circle cx="1580" cy="900" r="10" fill="#000" />
  </g>

  <!-- ANIMATED DRIPPING PAINT -->
  <g id="dripping-paint">
    <!-- Drip 1 -->
    <path d="M 1720,750 Q 1740,850 1720,950 Q 1700,850 1720,750 Z" fill="#ff1744" stroke="#000" stroke-width="6" stroke-linejoin="round" />
    <!-- Drip 2 -->
    <path d="M 1680,880 Q 1700,980 1680,1080 Q 1660,980 1680,880 Z" fill="#2979ff" stroke="#000" stroke-width="6" stroke-linejoin="round" />
    <!-- Drip 3 -->
    <path d="M 1580,980 Q 1600,1080 1580,1180 Q 1560,1080 1580,980 Z" fill="#ffea00" stroke="#000" stroke-width="6" stroke-linejoin="round" />
  </g>

  <!-- ANIMATED BREATH PUFFS FROM NOSE -->
  <g id="breath-puffs">
    <!-- Left Puff -->
    <path d="M 850,600 Q 800,580 750,620 Q 700,650 650,610 Q 600,570 550,600" 
          fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-dasharray="40 20" opacity="0.8" />
    <!-- Right Puff -->
    <path d="M 1070,600 Q 1120,580 1170,620 Q 1220,650 1270,610 Q 1320,570 1370,600" 
          fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-dasharray="40 20" opacity="0.8" />
  </g>

  <!-- STYLE & ANIMATIONS -->
  <style>
    /* Global Pop Art Shake */
    #pug-head-group {
      transform-origin: 960px 800px;
      animation: shakeHead 0.1s infinite alternate;
    }
    
    @keyframes shakeHead {
      from { transform: rotate(-1.5deg) translateY(0px); }
      to { transform: rotate(1.5deg) translateY(-4px); }
    }

    /* Breathing Chest Animation */
    #pug-body-group {
      transform-origin: 960px 900px;
      animation: breathe 2s ease-in-out infinite;
    }
    
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    /* Angry Pulsing Eyes */
    #eyes ellipse {
      animation: eyePulse 1.5s infinite alternate;
    }
    
    @keyframes eyePulse {
      from { fill: #ffffff; }
      to { fill: #ffebee; }
    }

    /* Dripping Paint Animation */
    #dripping-paint path {
      transform-origin: center top;
      animation: dripFall 2s infinite linear;
    }
    
    @keyframes dripFall {
      0% { transform: translateY(-150px) scaleY(0); opacity: 0; }
      20% { transform: translateY(0px) scaleY(1); opacity: 1; }
      80% { transform: translateY(200px) scaleY(1.5); opacity: 1; }
      100% { transform: translateY(400px) scaleY(2); opacity: 0; }
    }

    /* Stagger Drip Delays */
    #dripping-paint path:nth-child(1) { animation-delay: 0s; }
    #dripping-paint path:nth-child(2) { animation-delay: 0.7s; }
    #dripping-paint path:nth-child(3) { animation-delay: 1.4s; }

    /* Breath Puffs Animation */
    #breath-puffs path {
      stroke-dashoffset: 0;
      animation: huffPuff 2s infinite ease-out;
    }
    
    @keyframes huffPuff {
      0% { stroke-dashoffset: 0; opacity: 0; transform: translateX(0px); }
      20% { opacity: 0.8; }
      100% { stroke-dashoffset: -120; opacity: 0; transform: translateX(-60px); }
    }

    /* Stagger Puff Delays */
    #breath-puffs path:nth-child(1) { animation-delay: 0s; }
    #breath-puffs path:nth-child(2) { animation-delay: 1s; }

    /* Floating Paint Splats */
    #paint-splats {
      animation: floatSplat 4s infinite ease-in-out;
    }
    
    @keyframes floatSplat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    /* Burst Rays Rotation */
    #burst-rays {
      transform-origin: 960px 540px;
      animation: spinBurst 60s linear infinite;
    }
    
    @keyframes spinBurst {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</svg>