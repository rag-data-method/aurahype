<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="halftone" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.4" fill="#ffffff" />
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="14" dy="14" stdDeviation="0" flood-color="#000000" />
    </filter>
  </defs>

  <style>
    @keyframes bgColorShift {
      0% { fill: #e60000; }
      50% { fill: #ff0000; }
      100% { fill: #e60000; }
    }
    @keyframes rotateSunburst {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes shiftHalftone {
      0% { transform: translate(0, 0); }
      25% { transform: translate(6px, 6px); }
      50% { transform: translate(12px, 0); }
      75% { transform: translate(6px, -6px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes pulseText {
      0% { transform: scale(1); text-shadow: 8px 8px 0px #000000; }
      50% { transform: scale(1.08); text-shadow: 14px 14px 0px #000000; }
      100% { transform: scale(1); text-shadow: 8px 8px 0px #000000; }
    }
    @keyframes twinkleStar {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.6; }
    }
    .bg-rect { animation: bgColorShift 4s infinite ease-in-out; }
    .sunburst-group { animation: rotateSunburst 60s linear infinite; transform-origin: 960px 540px; }
    .halftone-group { animation: shiftHalftone 8s infinite linear; }
    .main-text-group { animation: pulseText 2s infinite ease-in-out; transform-origin: 960px 540px; }
    .star-burst { animation: twinkleStar 1.5s infinite ease-in-out; transform-origin: center; }
  </style>

  <rect width="1920" height="1080" class="bg-rect" />

  <g class="sunburst-group">
    <path d="M960,540 L1920,540 L1920,1080 Z" fill="#ffcc00" />
    <path d="M960,540 L960,1080 L0,1080 Z" fill="#ffcc00" />
    <path d="M960,540 L0,1080 L0,540 Z" fill="#ffcc00" />
    <path d="M960,540 L0,540 L0,0 Z" fill="#ffcc00" />
    <path d="M960,540 L0,0 L960,0 Z" fill="#ffcc00" />
    <path d="M960,540 L960,0 L1920,0 Z" fill="#ffcc00" />
    <path d="M960,540 L1920,0 L1920,540 Z" fill="#ffcc00" />
    
    <path d="M960,540 L1440,0 L1920,270 Z" fill="#ffaa00" />
    <path d="M960,540 L1920,810 L1440,1080 Z" fill="#ffaa00" />
    <path d="M960,540 L480,1080 L0,810 Z" fill="#ffaa00" />
    <path d="M960,540 L0,270 L480,0 Z" fill="#ffaa00" />
  </g>

  <g class="halftone-group">
    <rect width="1920" height="1080" fill="url(#halftone)" opacity="0.15" />
  </g>

  <g class="main-text-group">
    <rect x="160" y="260" width="1600" height="560" fill="#ffeb3b" stroke="#000000" stroke-width="16" filter="url(#shadow)" />
    <rect x="180" y="280" width="1560" height="520" fill="none" stroke="#000000" stroke-width="8" stroke-dasharray="30, 15" />

    <text x="960" y="480" font-family="Arial Black, Impact, sans-serif" font-size="170" font-weight="900" fill="#ffffff" stroke="#000000" stroke-width="10" text-anchor="middle" letter-spacing="4">INVADINDO</text>
    
    <text x="960" y="620" font-family="Arial Black, Impact, sans-serif" font-size="120" font-weight="900" fill="#ffffff" stroke="#000000" stroke-width="8" text-anchor="middle" letter-spacing="4">O SISTEMA.</text>
  </g>

  <g class="star-burst" style="transform-origin: 420px 340px;">
    <path d="M420,220 L435,320 L535,340 L435,360 L420,460 L405,360 L305,340 L405,320 Z" fill="#ffffff" stroke="#000000" stroke-width="6" />
  </g>

  <g class="star-burst" style="transform-origin: 1500px 740px; animation-delay: 0.75s;">
    <path d="M1500,620 L1515,720 L1615,740 L1515,760 L1500,860 L1485,760 L1385,740 L1485,720 Z" fill="#ffffff" stroke="#000000" stroke-width="6" />
  </g>
</svg>