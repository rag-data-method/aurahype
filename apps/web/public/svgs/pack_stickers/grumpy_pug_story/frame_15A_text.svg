<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Halftone Dot Pattern -->
    <pattern id="halftone" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="14" fill="#FFD700" />
    </pattern>

    <!-- Sunburst Gradient -->
    <linearGradient id="sunburst-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0055" />
      <stop offset="100%" stop-color="#FF9900" />
    </linearGradient>

    <!-- Jagged Text Outline Filter -->
    <filter id="text-pop" x="-10%" y="-10%" width="120%" height="120%">
      <feMorphology operator="dilate" radius="12" in="SourceAlpha" result="thick-stroke"/>
      <feFlood flood-color="#000000" result="black-flood"/>
      <feComposite in="black-flood" in2="thick-stroke" operator="in" result="black-stroke"/>
      
      <feMorphology operator="dilate" radius="6" in="SourceAlpha" result="thin-stroke"/>
      <feFlood flood-color="#FFFFFF" result="white-flood"/>
      <feComposite in="white-flood" in2="thin-stroke" operator="in" result="white-stroke"/>

      <feMerge>
        <feMergeNode in="black-stroke"/>
        <feMergeNode in="white-stroke"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Comic Action Blur Filter -->
    <filter id="action-blur">
      <feGaussianBlur stdDeviation="5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');

    .bg-base {
      fill: #0033FF;
    }

    /* Halftone Animation */
    .halftone-layer {
      animation: halftoneShift 6s linear infinite;
    }
    @keyframes halftoneShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    /* Sunburst Animation */
    .sunburst-layer {
      transform-origin: 960px 540px;
      animation: sunburstSpin 30s linear infinite;
    }
    @keyframes sunburstSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Text Pulsing Animation */
    .main-text {
      font-family: 'Bangers', Impact, sans-serif;
      font-size: 200px;
      letter-spacing: 8px;
      fill: #FFD700;
      filter: url(#text-pop);
      animation: textPulse 2s ease-in-out infinite;
    }
    @keyframes textPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Subtitle Fade Animation */
    .sub-text {
      font-family: 'Bangers', Impact, sans-serif;
      font-size: 80px;
      letter-spacing: 15px;
      fill: #FFFFFF;
      stroke: #000000;
      stroke-width: 5px;
      paint-order: stroke fill;
      opacity: 0;
      animation: subFade 4s ease-in-out infinite;
    }
    @keyframes subFade {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Action Lines Animation */
    .action-lines {
      stroke: #FFFFFF;
      stroke-width: 8;
      stroke-dasharray: 200;
      stroke-dashoffset: 0;
      animation: lineDash 1.5s linear infinite;
    }
    @keyframes lineDash {
      to { stroke-dashoffset: -400; }
    }

    /* Star Sparkle Animation */
    .star {
      transform-origin: center;
      animation: starSpin 3s linear infinite;
    }
    @keyframes starSpin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.5); }
      100% { transform: rotate(360deg) scale(1); }
    }
  </style>

  <!-- Base Background -->
  <rect width="1920" height="1080" class="bg-base" />

  <!-- Sunburst Layer -->
  <g class="sunburst-layer">
    <circle cx="960" cy="540" r="900" fill="url(#sunburst-grad)" />
    <g stroke="#FF0055" stroke-width="40" stroke-linecap="round">
      <!-- 24 Rays -->
      <line x1="960" y1="540" x2="960" y2="-100" />
      <line x1="960" y1="540" x2="1310" y2="-100" />
      <line x1="960" y1="540" x2="1580" y2="130" />
      <line x1="960" y1="540" x2="1760" y2="440" />
      <line x1="960" y1="540" x2="1820" y2="800" />
      <line x1="960" y1="540" x2="1640" y2="1120" />
      <line x1="960" y1="540" x2="1240" y2="1340" />
      <line x1="960" y1="540" x2="780" y2="1340" />
      <line x1="960" y1="540" x2="380" y2="1120" />
      <line x1="960" y1="540" x2="180" y2="800" />
      <line x1="960" y1="540" x2="100" y2="440" />
      <line x1="960" y1="540" x2="280" y2="130" />
      <line x1="960" y1="540" x2="610" y2="-100" />
      <line x1="960" y1="540" x2="1460" y2="30" />
      <line x1="960" y1="540" x2="1730" y2="320" />
      <line x1="960" y1="540" x2="1900" y2="680" />
      <line x1="960" y1="540" x2="1880" y2="1080" />
      <line x1="960" y1="540" x2="1560" y2="1380" />
      <line x1="960" y1="540" x2="1060" y2="1480" />
      <line x1="960" y1="540" x2="560" y2="1380" />
      <line x1="960" y1="540" x2="240" y2="1080" />
      <line x1="960" y1="540" x2="20" y2="680" />
      <line x1="960" y1="540" x2="190" y2="320" />
      <line x1="960" y1="540" x2="460" y2="30" />
    </g>
  </g>

  <!-- Halftone Overlay -->
  <rect width="1920" height="1080" fill="url(#halftone)" class="halftone-layer" />

  <!-- Action Lines (Speed Lines) -->
  <g class="action-lines">
    <line x1="0" y1="100" x2="300" y2="100" />
    <line x1="1620" y1="100" x2="1920" y2="100" />
    <line x1="0" y1="980" x2="300" y2="980" />
    <line x1="1620" y1="980" x2="1920" y2="980" />
    
    <line x1="0" y1="300" x2="500" y2="300" />
    <line x1="1420" y1="300" x2="1920" y2="300" />
    <line x1="0" y1="780" x2="500" y2="780" />
    <line x1="1420" y1="780" x2="1920" y2="780" />
  </g>

  <!-- Sparkle Stars -->
  <g class="star" style="transform-origin: 150px 150px;">
    <path d="M150 80 L165 135 L220 150 L165 165 L150 220 L135 165 L80 150 L135 135 Z" fill="#FFFFFF" />
  </g>
  <g class="star" style="transform-origin: 1770px 150px; animation-delay: -1s;">
    <path d="M1770 80 L1785 135 L1840 150 L1785 165 L1770 220 L1755 165 L1700 150 L1755 135 Z" fill="#FFFFFF" />
  </g>
  <g class="star" style="transform-origin: 150px 930px; animation-delay: -2s;">
    <path d="M150 860 L165 915 L220 930 L165 945 L150 1000 L135 945 L80 930 L135 915 Z" fill="#FFFFFF" />
  </g>
  <g class="star" style="transform-origin: 1770px 930px; animation-delay: -0.5s;">
    <path d="M1770 860 L1785 915 L1840 930 L1785 945 L1770 1000 L1755 945 L1700 930 L1755 915 Z" fill="#FFFFFF" />
  </g>

  <!-- Explosion Burst Behind Text -->
  <path d="M960 200 L1020 400 L1220 400 L1060 520 L1120 720 L960 600 L800 720 L860 520 L700 400 L900 400 Z" fill="#FF0055" stroke="#000000" stroke-width="15" stroke-linejoin="round" filter="url(#action-blur)" />

  <!-- Main Text -->
  <text x="960" y="580" text-anchor="middle" dominant-baseline="central" class="main-text">REI DOS TEMPLATES.</text>

  <!-- Subtitle / Footer -->
  <text x="960" y="950" text-anchor="middle" dominant-baseline="central" class="sub-text">POW! WHAM! KABOOM!</text>
</svg>