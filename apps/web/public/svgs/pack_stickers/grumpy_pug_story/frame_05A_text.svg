<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sunburst wedge: long triangle with far-away base so it acts like a true ray -->
    <path id="ray" d="M960,540 L360,-2460 L1560,-2460 Z" />
    <!-- Halftone dot pattern -->
    <pattern id="halftone" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="12" fill="#000000" opacity="0.25"/>
    </pattern>
  </defs>

  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-opacity {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }
    @keyframes pop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes shake {
      0% { transform: translate(0,0); }
      20% { transform: translate(-5px, 5px); }
      40% { transform: translate(5px, -5px); }
      60% { transform: translate(-5px, -5px); }
      80% { transform: translate(5px, 5px); }
      100% { transform: translate(0,0); }
    }

    .rays {
      transform-origin: 960px 540px;
      animation: spin 20s linear infinite;
    }
    .halftone-overlay {
      animation: pulse-opacity 3s ease-in-out infinite;
    }
    .card {
      transform-origin: 960px 540px;
      animation: pop 2.5s ease-in-out infinite;
    }
    .text-main {
      transform-origin: 960px 540px;
      animation: shake 0.45s linear infinite;
    }
  </style>

  <!-- Rotating sunburst background -->
  <g class="rays">
    <use href="#ray" transform="rotate(0,960,540)" fill="#FF0033"/>
    <use href="#ray" transform="rotate(22.5,960,540)" fill="#FFEA00"/>
    <use href="#ray" transform="rotate(45,960,540)" fill="#FF0033"/>
    <use href="#ray" transform="rotate(67.5,960,540)" fill="#FFEA00"/>
    <use href="#ray" transform="rotate(90,960,540)" fill="#FF0033"/>
    <use href="#ray" transform="rotate(112.5,960,540)" fill="#FFEA00"/>
    <use href="#ray" transform="rotate(135,960,540)" fill="#FF0033"/>
    <use href="#ray" transform="rotate(157.5,960,540)" fill="#FFEA00"/>
    <use href="#ray" transform="rotate(180,960,540)" fill="#FF0033"/>
    <use href="#ray" transform="rotate(202.5,960,540)" fill="#FFEA00"/>
    <use href="#ray" transform="rotate(225,960,540)" fill="#FF0033"/>
    <use href="#ray" transform="rotate(247.5,960,540)" fill="#FFEA00"/>
    <use href="#ray" transform="rotate(270,960,540)" fill="#FF0033"/>
    <use href="#ray" transform="rotate(292.5,960,540)" fill="#FFEA00"/>
    <use href="#ray" transform="rotate(315,960,540)" fill="#FF0033"/>
    <use href="#ray" transform="rotate(337.5,960,540)" fill="#FFEA00"/>
  </g>

  <!-- Halftone overlay -->
  <rect class="halftone-overlay" width="1920" height="1080" fill="url(#halftone)" />

  <!-- Central comic panel + text -->
  <g class="card">
    <!-- Outer panel -->
    <rect x="100" y="240" width="1720" height="600" rx="40" fill="#FFFFFF" stroke="#000000" stroke-width="24"/>
    <!-- Inner accent border -->
    <rect x="128" y="268" width="1664" height="544" rx="28" fill="none" stroke="#00E5FF" stroke-width="12"/>

    <!-- Massive text with shadow and high-contrast outline -->
    <g class="text-main">
      <!-- Magenta shadow offset -->
      <text x="968" y="448" text-anchor="middle" dominant-baseline="middle"
            font-family="Impact, 'Arial Black', sans-serif" font-size="170" font-weight="900"
            letter-spacing="4" fill="#FF00CC">
        TELA EM BRANCO?
      </text>
      <text x="968" y="648" text-anchor="middle" dominant-baseline="middle"
            font-family="Impact, 'Arial Black', sans-serif" font-size="170" font-weight="900"
            letter-spacing="4" fill="#FF00CC">
        INACEITÁVEL.
      </text>

      <!-- Main black text with thick white outline -->
      <text x="960" y="440" text-anchor="middle" dominant-baseline="middle"
            font-family="Impact, 'Arial Black', sans-serif" font-size="170" font-weight="900"
            letter-spacing="4" fill="#000000" stroke="#FFFFFF" stroke-width="12"
            stroke-linejoin="round" paint-order="stroke fill">
        TELA EM BRANCO?
      </text>
      <text x="960" y="640" text-anchor="middle" dominant-baseline="middle"
            font-family="Impact, 'Arial Black', sans-serif" font-size="170" font-weight="900"
            letter-spacing="4" fill="#000000" stroke="#FFFFFF" stroke-width="12"
            stroke-linejoin="round" paint-order="stroke fill">
        INACEITÁVEL.
      </text>
    </g>
  </g>
</svg>