<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Glow Filters for vibrancy -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="strong-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Global Animation Definitions */
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes rotate-reverse { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
    @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    @keyframes sway-head { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
    @keyframes breathe { 0%, 100% { transform: scale(1.0); } 50% { transform: scale(1.02); } }
    @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }
    @keyframes jump { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
    @keyframes orbit-ring { 0% { stroke-dashoffset: 800; } 100% { stroke-dashoffset: 0; } }
    @keyframes sun-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    /* Element Application Classes */
    .spin-slow { transform-origin: 960px 540px; animation: rotate 120s linear infinite; }
    .spin-med { transform-origin: 960px 540px; animation: rotate 60s linear infinite; }
    .spin-fast { transform-origin: 960px 540px; animation: rotate-reverse 30s linear infinite; }
    
    .ring-spin { transform-origin: 960px 540px; animation: rotate 40s linear infinite; }
    .ring-spin-reverse { transform-origin: 960px 540px; animation: rotate-reverse 50s linear infinite; }
    
    .pug-head { transform-origin: 960px 650px; animation: sway-head 4s ease-in-out infinite; }
    .pug-tail { transform-origin: 850px 900px; animation: sway 2s ease-in-out infinite; }
    .pug-chest { transform-origin: 960px 750px; animation: breathe 3s ease-in-out infinite; }
    
    .star-twinkle-1 { animation: twinkle 2s ease-in-out infinite; animation-delay: 0s; transform-origin: center; }
    .star-twinkle-2 { animation: twinkle 3s ease-in-out infinite; animation-delay: 0.5s; transform-origin: center; }
    .star-twinkle-3 { animation: twinkle 2.5s ease-in-out infinite; animation-delay: 1s; transform-origin: center; }
    .star-jump { animation: jump 3s ease-in-out infinite; transform-origin: center; }
    
    .sun-core { transform-origin: 960px 540px; animation: sun-pulse 8s ease-in-out infinite; }
  </style>

  <!-- === BACKGROUND LAYER === -->
  <!-- Base dark background -->
  <rect width="1920" height="1080" fill="#1a1a1a"/>

  <!-- Sun Core -->
  <circle cx="960" cy="540" r="420" fill="#FFD700" class="sun-core" filter="url(#strong-glow)"/>
  <circle cx="960" cy="540" r="400" fill="#FFE135"/>

  <!-- Radiating Sun Rays -->
  <g class="spin-slow">
    <polygon points="960,-50 1040,540 960,1130 880,540" fill="#FF4500" opacity="0.8"/>
    <polygon points="-50,540 960,620 1930,540 960,460" fill="#FF4500" opacity="0.8"/>
    <polygon points="200,200 960,580 1720,880 960,500" fill="#FF4500" opacity="0.8"/>
    <polygon points="200,880 960,500 1720,200 960,580" fill="#FF4500" opacity="0.8"/>
  </g>

  <!-- Sunburst Halftone Pattern -->
  <g class="spin-med">
    <circle cx="960" cy="540" r="380" stroke="#000" stroke-width="20" fill="none" stroke-dasharray="60 40"/>
    <circle cx="960" cy="540" r="340" stroke="#000" stroke-width="15" fill="none" stroke-dasharray="40 25"/>
    <circle cx="960" cy="540" r="300" stroke="#000" stroke-width="10" fill="none" stroke-dasharray="30 20"/>
  </g>

  <!-- Background Rings -->
  <g class="ring-spin">
    <circle cx="960" cy="540" r="350" stroke="#00BFFF" stroke-width="25" fill="none" opacity="0.8"/>
    <circle cx="960" cy="540" r="280" stroke="#FF1493" stroke-width="40" fill="none" opacity="0.8"/>
  </g>
  <g class="ring-spin-reverse">
    <circle cx="960" cy="540" r="240" stroke="#00FF00" stroke-width="15" fill="none" opacity="0.8" stroke-dasharray="100 150"/>
    <circle cx="960" cy="540" r="190" stroke="#9400D3" stroke-width="12" fill="none" opacity="0.8" stroke-dasharray="50 100"/>
  </g>

  <!-- === THE PUG (CENTERPIECE) === -->
  <g id="the-pug" transform="translate(0, 50)">
    
    <!-- Tail (Wagging) -->
    <g class="pug-tail">
      <path d="M 850 900 C 780 880, 820 780, 880 820 C 900 830, 920 860, 880 890 Z" fill="#D2B48C" stroke="#000" stroke-width="6"/>
      <path d="M 890 840 C 900 850, 910 870, 880 890" fill="none" stroke="#000" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- Back Legs -->
    <path d="M 880 850 C 850 950, 890 1000, 920 1000 L 960 1000 L 960 850 Z" fill="#C19A6B" stroke="#000" stroke-width="6"/>
    <path d="M 1040 850 C 1070 950, 1030 1000, 1000 1000 L 960 1000 L 960 850 Z" fill="#C19A6B" stroke="#000" stroke-width="6"/>
    <!-- Paws -->
    <path d="M 880 990 C 880 1010, 920 1010, 920 990 Z" fill="#D2B48C" stroke="#000" stroke-width="6"/>
    <path d="M 1000 990 C 1000 1010, 1040 1010, 1040 990 Z" fill="#D2B48C" stroke="#000" stroke-width="6"/>

    <!-- Body (Breathing Chest) -->
    <g class="pug-chest">
      <path d="M 850 850 C 850 700, 1070 700, 1070 850 L 1070 950 C 1070 950, 960 970, 850 950 Z" fill="#D2B48C" stroke="#000" stroke-width="6"/>
      <!-- Chest highlight -->
      <path d="M 920 750 C 960 730, 1000 750, 980 850 C 960 880, 920 850, 920 750 Z" fill="#E8D5B5" opacity="0.7"/>
    </g>

    <!-- Front Legs -->
    <path d="M 900 850 L 900 950 C 900 980, 940 980, 940 950 L 940 850 Z" fill="#D2B48C" stroke="#000" stroke-width="6"/>
    <path d="M 980 850 L 980 950 C 980 980, 1020 980, 1020 950 L 1020 850 Z" fill="#D2B48C" stroke="#000" stroke-width="6"/>
    <!-- Front Paws -->
    <path d="M 900 950 C 900 970, 940 970, 940 950 Z" fill="#F5DEB3" stroke="#000" stroke-width="6"/>
    <path d="M 980 950 C 980 970, 1020 970, 1020 950 Z" fill="#F5DEB3" stroke="#000" stroke-width="6"/>

    <!-- Head (Swaying) -->
    <g class="pug-head">
      <!-- Ears -->
      <path d="M 850 580 C 800 550, 780 650, 840 680 Z" fill="#3E2723" stroke="#000" stroke-width="6"/>
      <path d="M 1070 580 C 1120 550, 1140 650, 1080 680 Z" fill="#3E2723" stroke="#000" stroke-width="6"/>
      
      <!-- Head Base -->
      <path d="M 850 650 C 850 500, 1070 500, 1070 650 C 1080 750, 1010 780, 960 780 C 910 780, 840 750, 850 650 Z" fill="#D2B48C" stroke="#000" stroke-width="6"/>
      
      <!-- Forehead Wrinkles -->
      <path d="M 900 550 Q 960 530 1020 550" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>
      <path d="M 920 570 Q 960 550 1000 570" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>

      <!-- Muzzle / Face Mask -->
      <path d="M 890 650 C 890 620, 1030 620, 1030 650 C 1040 720, 980 750, 960 750 C 940 750, 880 720, 890 650 Z" fill="#3E2723" stroke="#000" stroke-width="6"/>
      
      <!-- Nose -->
      <path d="M 940 670 C 940 650, 980 650, 980 670 C 980 690, 940 690, 940 670 Z" fill="#000"/>
      <!-- Nose Highlight -->
      <circle cx="955" cy="665" r="4" fill="#FFF" opacity="0.5"/>

      <!-- Mouth (Grumpy Frown) -->
      <path d="M 930 720 C 930 740, 950 735, 960 730 C 970 735, 990 740, 990 720" fill="none" stroke="#000" stroke-width="5" stroke-linecap="round"/>
      <line x1="960" y1="685" x2="960" y2="730" stroke="#000" stroke-width="5" stroke-linecap="round"/>

      <!-- Eyes (Heavy Lids / Angry) -->
      <!-- Left Eye -->
      <path d="M 890 620 C 910 600, 940 600, 950 620 C 940 640, 910 640, 890 620 Z" fill="#FFF" stroke="#000" stroke-width="4"/>
      <circle cx="920" cy="620" r="8" fill="#000"/>
      <path d="M 880 600 C 920 620, 940 620, 960 600" fill="none" stroke="#000" stroke-width="5" stroke-linecap="round"/>

      <!-- Right Eye -->
      <path d="M 970 620 C 980 600, 1010 600, 1030 620 C 1010 640, 980 640, 970 620 Z" fill="#FFF" stroke="#000" stroke-width="4"/>
      <circle cx="1000" cy="620" r="8" fill="#000"/>
      <path d="M 960 600 C 980 620, 1000 620, 1040 600" fill="none" stroke="#000" stroke-width="5" stroke-linecap="round"/>

      <!-- Cheeks -->
      <circle cx="880" cy="680" r="15" fill="#FFB6C1" opacity="0.6"/>
      <circle cx="1040" cy="680" r="15" fill="#FFB6C1" opacity="0.6"/>
    </g>
  </g>

  <!-- === SPARKLES & DESIGN ELEMENTS === -->

  <!-- Large Rotating Sparkle Ring -->
  <g class="spin-fast">
    <!-- Top Right -->
    <g class="star-twinkle-1" transform="translate(1350, 250) scale(1.5)">
      <path d="M 0,-40 Q 0,0 40,0 Q 0,0 0,40 Q 0,0 -40,0 Q 0,0 0,-40 Z" fill="#00FFFF" stroke="#000" stroke-width="4"/>
    </g>
    <!-- Bottom Left -->
    <g class="star-twinkle-2" transform="translate(550, 850) scale(1.2)">
      <path d="M 0,-40 Q 0,0 40,0 Q 0,0 0,40 Q 0,0 -40,0 Q 0,0 0,-40 Z" fill="#FF69B4" stroke="#000" stroke-width="4"/>
    </g>
    <!-- Top Left -->
    <g class="star-twinkle-3" transform="translate(400, 350) scale(0.8)">
      <path d="M 0,-40 Q 0,0 40,0 Q 0,0 0,40 Q 0,0 -40,0 Q 0,0 0,-40 Z" fill="#FFFF00" stroke="#000" stroke-width="4"/>
    </g>
    <!-- Bottom Right -->
    <g class="star-twinkle-1" transform="translate(1520, 780) scale(1.0)">
      <path d="M 0,-40 Q 0,0 40,0 Q 0,0 0,40 Q 0,0 -40,0 Q 0,0 0,-40 Z" fill="#7CFC00" stroke="#000" stroke-width="4"/>
    </g>
  </g>

  <!-- Jumping Sparkles -->
  <g class="star-jump" transform="translate(700, 300)">
    <path d="M 0,-30 Q 0,0 30,0 Q 0,0 0,30 Q 0,0 -30,0 Q 0,0 0,-30 Z" fill="#FFFFFF" stroke="#000" stroke-width="3"/>
  </g>
  <g class="star-jump" transform="translate(1200, 800)" style="animation-delay: 1.5s;">
    <path d="M 0,-30 Q 0,0 30,0 Q 0,0 0,30 Q 0,0 -30,0 Q 0,0 0,-30 Z" fill="#FFFFFF" stroke="#000" stroke-width="3"/>
  </g>

  <!-- Tiny Floating Sparkles -->
  <g class="star-twinkle-2" transform="translate(800, 150)">
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#FF4500" stroke="#000" stroke-width="2"/>
  </g>
  <g class="star-twinkle-1" transform="translate(1100, 200)">
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#9400D3" stroke="#000" stroke-width="2"/>
  </g>
  <g class="star-twinkle-3" transform="translate(1450, 500)">
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#00FFFF" stroke="#000" stroke-width="2"/>
  </g>
  <g class="star-twinkle-1" transform="translate(480, 600)">
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#FFFF00" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Pop Art Action Lines -->
  <g stroke="#000" stroke-width="4" fill="none" stroke-linecap="round">
    <g class="star-twinkle-2" transform="translate(820, 280)">
      <path d="M 0,0 L -30,-30"/>
      <path d="M 15,-5 L 0,-40"/>
      <path d="M -5,15 L -40,0"/>
    </g>
    <g class="star-twinkle-1" transform="translate(1100, 280)">
      <path d="M 0,0 L 30,-30"/>
      <path d="M -15,-5 L 0,-40"/>
      <path d="M 5,15 L 40,0"/>
    </g>
  </g>

  <!-- Foreground Abstract Shapes -->
  <g class="spin-med" opacity="0.9">
    <rect x="150" y="150" width="60" height="60" fill="#FF1493" stroke="#000" stroke-width="4" transform="rotate(15 180 180)"/>
    <circle cx="1750" cy="200" r="40" fill="#00FFFF" stroke="#000" stroke-width="4"/>
    <polygon points="1700,900 1730,830 1760,900" fill="#FFFF00" stroke="#000" stroke-width="4"/>
    <polygon points="200,850 250,870 200,890" fill="#7CFC00" stroke="#000" stroke-width="4"/>
  </g>

  <!-- Bottom Halftone Border -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000"/>
  <circle cx="0" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="100" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="200" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="300" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="400" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="500" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="600" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="700" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="800" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="900" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1000" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1100" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1200" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1300" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1400" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1500" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1600" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1700" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1800" cy="1040" r="20" fill="#FF4500"/>
  <circle cx="1900" cy="1040" r="20" fill="#FF4500"/>

</svg>