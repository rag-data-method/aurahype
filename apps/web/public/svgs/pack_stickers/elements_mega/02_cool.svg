<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <path id="bubble" d="M 500,180 C 660,180 820,280 820,470 C 820,600 750,690 650,680 L 690,880 L 530,720 C 400,730 180,620 180,470 C 180,280 340,180 500,180 Z"/>
    <clipPath id="bubbleClip">
      <use href="#bubble"/>
    </clipPath>
    <clipPath id="diag">
      <polygon points="0,1000 1000,1000 1000,0"/>
    </clipPath>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="10" dy="14" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Thick white die-cut sticker base -->
    <use href="#bubble" fill="#FFFFFF"/>
    
    <!-- Inset pop-art illustration -->
    <g transform="translate(500,500) scale(0.87) translate(-500,-500)">
      <!-- Neon magenta base -->
      <use href="#bubble" fill="#FF00AA"/>
      <!-- Neon cyan diagonal half -->
      <use href="#bubble" fill="#00F0FF" clip-path="url(#diag)"/>
      <!-- Aggressive black outline -->
      <use href="#bubble" fill="none" stroke="#000000" stroke-width="18" stroke-linejoin="round"/>
      
      <!-- Retro star accent -->
      <path d="M 330,300 L 342,332 L 376,336 L 350,358 L 358,392 L 330,372 L 302,392 L 310,358 L 284,336 L 318,332 Z" fill="#FFE600" stroke="#000000" stroke-width="8" stroke-linejoin="round" paint-order="stroke fill"/>
      
      <!-- Bold COOL text -->
      <text x="500" y="480" font-family="Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif" font-size="260" fill="#FFE600" stroke="#000000" stroke-width="16" stroke-linejoin="round" paint-order="stroke fill" text-anchor="middle" dominant-baseline="central">COOL</text>
    </g>
  </g>
</svg>