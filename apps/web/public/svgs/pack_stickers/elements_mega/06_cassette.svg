<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cassette-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2CBF"/>
      <stop offset="100%" stop-color="#240046"/>
    </linearGradient>
    <linearGradient id="yellow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE600"/>
      <stop offset="100%" stop-color="#E6A800"/>
    </linearGradient>
    <linearGradient id="label-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE600"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>

    <!-- Halftone Dot Pattern -->
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2.5" fill="#FF0055" opacity="0.4"/>
    </pattern>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="18" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Clip path for the sticker interior -->
    <clipPath id="sticker-clip">
      <use href="#cassette-body"/>
    </clipPath>
  </defs>

  <!-- Sticker Group (Centered in ViewBox) -->
  <g transform="translate(500, 500)">
    
    <!-- Drop Shadow & White Die-Cut Border -->
    <g filter="url(#shadow)">
      <!-- Thick White Outline -->
      <path id="cassette-body" 
            d="M -340 -240 
               L 340 -240 
               L 340 60 
               L 260 200 
               L 120 200 
               L 100 240 
               L -100 240 
               L -120 200 
               L -260 200 
               L -340 60 
               Z" 
            fill="#FFFFFF" stroke="#FFFFFF" stroke-width="32" stroke-linejoin="round"/>
    </g>

    <!-- Cassette Main Body -->
    <path d="M -340 -240 L 340 -240 L 340 60 L 260 200 L 120 200 L 100 240 L -100 240 L -120 200 L -260 200 L -340 60 Z" 
          fill="url(#cassette-grad)" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>

    <!-- Pop Art Halftone Background Pattern (Clipped to Body) -->
    <rect x="-400" y="-300" width="800" height="600" fill="url(#dots)" clip-path="url(#sticker-clip)"/>

    <!-- Center Label -->
    <path d="M -280 -160 L 280 -160 L 280 60 L -280 60 Z" 
          fill="url(#label-grad)" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>

    <!-- Plastic Window Background -->
    <path d="M -210 -90 L 210 -90 L 210 20 L -210 20 Z" 
          fill="#111111" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>

    <!-- Left Reel (Magenta) -->
    <g>
      <circle cx="-105" cy="-35" r="62" fill="none" stroke="#FF00CC" stroke-width="20"/>
      <circle cx="-105" cy="-35" r="62" fill="none" stroke="#000000" stroke-width="4"/>
      <circle cx="-105" cy="-35" r="12" fill="#FF00CC" stroke="#000000" stroke-width="4"/>
    </g>

    <!-- Right Reel (Cyan) -->
    <g>
      <circle cx="105" cy="-35" r="62" fill="none" stroke="#00E5FF" stroke-width="20"/>
      <circle cx="105" cy="-35" r="62" fill="none" stroke="#000000" stroke-width="4"/>
      <circle cx="105" cy="-35" r="12" fill="#00E5FF" stroke="#000000" stroke-width="4"/>
    </g>

    <!-- The Actual Magnetic Tape -->
    <path d="M 43 -35 Q 105 15 167 -35" 
          fill="none" stroke="#1A1A1A" stroke-width="10" stroke-linecap="round"/>
    <path d="M -167 -35 Q -105 15 -43 -35" 
          fill="none" stroke="#1A1A1A" stroke-width="10" stroke-linecap="round"/>

    <!-- Window Glare / Reflection -->
    <path d="M -200 -80 L -50 -80 L -200 10 Z" fill="#FFFFFF" opacity="0.15"/>

    <!-- Label Details: "A" Side Indicator -->
    <path d="M -230 -130 L -170 -130 L -200 -70 Z" 
          fill="#FF0055" stroke="#000000" stroke-width="5" stroke-linejoin="round"/>
    <text x="-200" y="-100" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">A</text>

    <!-- Label Details: Text Lines (Simulated with paths for fidelity) -->
    <path d="M -140 -130 L 230 -130" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
    <path d="M -140 -110 L 180 -110" stroke="#000000" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Label Details: "POP TAPE 90" -->
    <g transform="translate(0, -40)">
      <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="60" fill="#000000" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">POP TAPE</text>
      <text x="0" y="50" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="40" fill="#000000" text-anchor="middle" dominant-baseline="middle">90 MIN</text>
    </g>

    <!-- Screws -->
    <circle cx="-310" cy="-200" r="9" fill="#C0C0C0" stroke="#000000" stroke-width="4"/>
    <path d="M -316 -200 L -304 -200 M -310 -206 L -310 -194" stroke="#000000" stroke-width="3"/>
    
    <circle cx="310" cy="-200" r="9" fill="#C0C0C0" stroke="#000000" stroke-width="4"/>
    <path d="M 304 -200 L 316 -200 M 310 -206 L 310 -194" stroke="#000000" stroke-width="3"/>
    
    <circle cx="-310" cy="30" r="9" fill="#C0C0C0" stroke="#000000" stroke-width="4"/>
    <path d="M -316 30 L -304 30 M -310 24 L -310 36" stroke="#000000" stroke-width="3"/>
    
    <circle cx="310" cy="30" r="9" fill="#C0C0C0" stroke="#000000" stroke-width="4"/>
    <path d="M 304 30 L 316 30 M 310 24 L 310 36" stroke="#000000" stroke-width="3"/>

    <!-- Write-Protect Tabs -->
    <rect x="-280" y="200" width="140" height="30" fill="#00E5FF" stroke="#000000" stroke-width="5"/>
    <rect x="140" y="200" width="140" height="30" fill="#111111" stroke="#000000" stroke-width="5"/>

    <!-- Bottom Tape Spool Holes -->
    <circle cx="-180" cy="160" r="22" fill="#111111" stroke="#000000" stroke-width="6"/>
    <circle cx="180" cy="160" r="22" fill="#111111" stroke="#000000" stroke-width="6"/>

    <!-- Top Tape Spool Holes -->
    <circle cx="-180" cy="-190" r="22" fill="#111111" stroke="#000000" stroke-width="6"/>
    <circle cx="180" cy="-190" r="22" fill="#111111" stroke="#000000" stroke-width="6"/>

    <!-- Center Spindle Hole -->
    <circle cx="0" cy="160" r="35" fill="#111111" stroke="#000000" stroke-width="6"/>

    <!-- Center Spindle Inner Teeth -->
    <g stroke="#000000" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="130" x2="0" y2="145"/>
      <line x1="0" y1="175" x2="0" y2="190"/>
      <line x1="-30" y1="160" x2="-15" y2="160"/>
      <line x1="15" y1="160" x2="30" y2="160"/>
      <line x1="-21" y1="139" x2="-11" y2="149"/>
      <line x1="11" y1="171" x2="21" y2="181"/>
      <line x1="-21" y1="181" x2="-11" y2="171"/>
      <line x1="11" y1="149" x2="21" y2="139"/>
    </g>

    <!-- Pop Art Edge Highlights (Simulating a shiny vinyl surface) -->
    <path d="M -335 -235 L 335 -235" stroke="#FFFFFF" stroke-width="6" opacity="0.4" stroke-linecap="round" fill="none"/>
    <path d="M -335 -235 L -335 55" stroke="#FFFFFF" stroke-width="6" opacity="0.4" stroke-linecap="round" fill="none"/>
    
    <!-- Aggressive Inner Black Outline (to separate elements clearly) -->
    <path d="M -340 -240 L 340 -240 L 340 60 L 260 200 L 120 200 L 100 240 L -100 240 L -120 200 L -260 200 L -340 60 Z" 
          fill="none" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>

  </g>
</svg>