<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Lightning Glow -->
    <radialGradient id="boltGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="60%" stop-color="#FFE600"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </radialGradient>

    <!-- Cup Base Gradient -->
    <linearGradient id="cupGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF3366"/>
      <stop offset="100%" stop-color="#CC0044"/>
    </linearGradient>

    <!-- Halftone Pattern for Background Burst -->
    <pattern id="halftone" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="3" fill="#00D4FF"/>
    </pattern>
  </defs>

  <!-- STICKER DROP SHADOW GROUP (Applied via Filter) -->
  <g filter="url(#shadow)">
    
    <!-- THICK DIE-CUT WHITE BORDER -->
    <!-- This path mirrors the outermost contour of the illustration -->
    <path d="M 505 140 
             C 475 140, 450 160, 445 190 
             L 425 190 
             A 25 25 0 0 0 400 215 
             L 400 230 
             C 370 245, 350 285, 360 325 
             L 395 490 
             C 390 510, 395 535, 415 550 
             C 420 625, 435 735, 445 780 
             C 455 825, 495 860, 545 860 
             L 715 860 
             C 765 860, 805 825, 815 780 
             C 825 735, 840 625, 845 550 
             C 865 535, 870 510, 865 490 
             L 900 325 
             C 910 285, 890 245, 860 230 
             L 860 215 
             A 25 25 0 0 0 835 190 
             L 815 190 
             C 810 160, 785 140, 755 140 
             Z" 
          fill="#FFFFFF" stroke="none"/>

    <!-- STICKER ARTWORK -->
    <g id="sticker-art">
      
      <!-- BACKGROUND BURST -->
      <path d="M 630 140 L 660 260 L 790 180 L 710 290 L 860 320 L 720 360 L 870 470 L 710 450 L 780 590 L 660 490 L 630 630 L 600 490 L 480 590 L 550 450 L 390 470 L 540 360 L 400 320 L 550 290 L 470 180 L 600 260 Z" 
            fill="#00D4FF"/>
      <circle cx="630" cy="380" r="180" fill="#FFD700"/>
      <circle cx="630" cy="380" r="180" fill="url(#halftone)"/>

      <!-- COFFEE CUP LID -->
      <rect x="350" y="210" width="560" height="60" rx="12" fill="#EEEEEE" stroke="#111111" stroke-width="12"/>
      <rect x="370" y="270" width="520" height="30" rx="8" fill="#DDDDDD" stroke="#111111" stroke-width="12"/>
      
      <!-- LID DETAIL LINES -->
      <line x1="410" y1="215" x2="410" y2="265" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
      <line x1="490" y1="215" x2="490" y2="265" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
      <line x1="570" y1="215" x2="570" y2="265" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
      <line x1="650" y1="215" x2="650" y2="265" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
      <line x1="730" y1="215" x2="730" y2="265" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
      <line x1="810" y1="215" x2="810" y2="265" stroke="#111111" stroke-width="8" stroke-linecap="round"/>

      <!-- CUP BODY -->
      <path d="M 380 300 L 435 780 C 445 825, 485 850, 535 850 L 725 850 C 775 850, 815 825, 825 780 L 880 300 Z" 
            fill="url(#cupGrad)" stroke="#111111" stroke-width="14" stroke-linejoin="round"/>

      <!-- CUP SLEEVE -->
      <path d="M 395 500 L 408 620 L 852 620 L 865 500 Z" fill="#FFEE00" stroke="#111111" stroke-width="12" stroke-linejoin="round"/>
      <!-- Sleeve Creases -->
      <line x1="465" y1="500" x2="475" y2="620" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
      <line x1="545" y1="500" x2="550" y2="620" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
      <line x1="630" y1="500" x2="630" y2="620" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
      <line x1="715" y1="500" x2="710" y2="620" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
      <line x1="795" y1="500" x2="785" y2="620" stroke="#111111" stroke-width="10" stroke-linecap="round"/>

      <!-- LIGHTNING BOLT ON CUP -->
      <path d="M 650 320 L 490 540 L 600 540 L 570 730 L 770 480 L 650 480 Z" 
            fill="url(#boltGlow)" stroke="#111111" stroke-width="14" stroke-linejoin="round"/>
      
      <!-- Lightning Inner Detail (Pop Art Highlight) -->
      <path d="M 620 360 L 530 500 L 580 500 Z" fill="#FFFFFF" opacity="0.9"/>

      <!-- ONOMATOPOEIA "ZAP!" -->
      <!-- Main Text -->
      <text x="630" y="180" font-family="Arial Black, Impact, sans-serif" font-size="110" font-weight="900" fill="#FF0055" stroke="#111111" stroke-width="14" text-anchor="middle" letter-spacing="-4">ZAP!</text>
      <!-- Text Highlight -->
      <text x="630" y="180" font-family="Arial Black, Impact, sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" stroke="none" text-anchor="middle" letter-spacing="-4">ZAP!</text>

      <!-- SPEED LINES & BURSTS -->
      <!-- Top Right Burst -->
      <path d="M 850 240 L 920 180 M 860 280 L 950 250 M 840 320 L 930 340" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
      <path d="M 900 200 L 880 220 L 890 240 Z" fill="#FFEE00" stroke="#111111" stroke-width="8" stroke-linejoin="round"/>
      
      <!-- Left Side Burst -->
      <path d="M 350 350 L 280 300 M 340 420 L 250 400" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
      <path d="M 300 320 L 320 340 L 300 360 Z" fill="#00D4FF" stroke="#111111" stroke-width="8" stroke-linejoin="round"/>

      <!-- Bottom Burst -->
      <path d="M 450 800 L 400 880 M 520 830 L 480 900" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
      <circle cx="420" cy="870" r="15" fill="#FF0055" stroke="#111111" stroke-width="8"/>

    </g>
  </g>
</svg>