  <!-- Eye Details -->
  <circle cx="520" cy="530" r="18" fill="#000000"/>
  <circle cx="530" cy="520" r="5" fill="#FFFFFF"/>

  <!-- Brow / Wrinkle -->
  <path d="M 420 450 C 450 430, 480 430, 500 440" fill="none" stroke="#000000" stroke-width="10" stroke-linecap="round"/>

  <!-- Nose Action Base -->
