    <line x1="900" y1="800" x2="1000" y2="900"/>
    <line x1="950" y1="800" x2="1000" y2="850"/>
  </g>

  <!-- Background Speed Lines -->
  <g stroke="#000000" stroke-width="10" stroke-linecap="round">
    <line x1="100" y1="100" x2="250" y2="220"/>
    <line x1="150" y1="50" x2="300" y2="170"/>
    <line x1="850" y1="150" x2="700" y2="270"/>
    <line x1="900" y1="100" x2="750" y2="220"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="100" x2="250" y2="220"/>
    <line x1="150" y1="50" x2="300" y2="170"/>
    <line x1="850" y1="150" x2="700" y2="270"/>
    <line x1="900" y1="100" x2="750" y2="220"/>
  </g>

  <!-- Halftone Shadow on Jaw and Back of Head -->
  <g clip-path="url(#clip-shadow)">
    <rect x="0" y="0" width="1000" height="1000" fill="url(#halftone)"/>
  </g>

  <!-- Body Base -->
  <path d="M 330 800 L 330 550 C 330 450, 350 420, 400 420 L 450 420 L 450 700 C 450 780, 470 800, 500 800 Z" fill="#E62E2D" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>

  <!-- Body Halftone Shadow -->
  <g clip-path="url(#clip-body)">
    <rect x="0" y="0" width="1000" height="1000" fill="url(#halftone)"/>
  </g>

  <!-- Breathing Lines on Body -->
  <g stroke="#000000" stroke-width="8" stroke-linecap="round">
    <path d="M 360 600 L 410 600"/>
    <path d="M 370 630 L 420 630"/>
    <path d="M 380 660 L 430 660"/>
  </g>

  <!-- Bite Action Base -->
  <path d="M 450 420 L 600 420 C 750 420, 780 500, 760 550 C 740 600, 650 650, 550 650 L 450 650 Z" fill="#E62E2D" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>

  <!-- Bite Halftone Shadow -->
  <g clip-path="url(#clip-bite)">
    <rect x="0" y="0" width="1000" height="1000" fill="url(#halftone)"/>
  </g>

  <!-- Lower Teeth -->
  <path d="M 460 640 L 480 580 L 500 640 L 520 580 L 540 640 L 560 580 L 580 640 L 600 580 L 620 640 L 640 580 L 660 640 L 680 580 L 700 640" fill="#FFFFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <path d="M 470 650 L 490 650 M 510 650 L 530 650 M 550 650 L 570 650 M 590 650 L 610 650 M 630 650 L 650 650 M 670 650 L 690 650" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"/>

  <!-- Tongue -->
