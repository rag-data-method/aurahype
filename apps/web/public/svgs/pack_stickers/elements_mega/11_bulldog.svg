  <!-- Nose Shadow Halftone -->
  <g clip-path="url(#clip-shadow)">
    <rect x="0" y="0" width="1000" height="1000" fill="url(#halftone)"/>
  </g>

  <!-- Nose Details -->
  <path d="M 300 450 C 320 520, 380 550, 450 550 C 520 550, 580 520, 620 450" fill="none" stroke="#000000" stroke-width="10" stroke-linecap="round"/>
  <circle cx="380" cy="400" r="10" fill="#000000"/>
  <circle cx="620" cy="400" r="10" fill="#000000"/>

  <!-- Collar -->
