<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset in="blur" dx="8" dy="12" result="offsetBlur"/>
      <feComponentTransfer in="offsetBlur" result="shadow">
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Halftone Dot Pattern -->
    <pattern id="halftone" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="3.5" fill="#FFD700"/>
    </pattern>

    <!-- Background Halftone Pattern (Larger dots) -->
    <pattern id="halftoneLarge" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="6" fill="#FFD700"/>
    </pattern>

    <!-- Clipping Paths for Halftone Application -->
    <clipPath id="clip-bg">
      <ellipse cx="500" cy="520" rx="420" ry="420"/>
    </clipPath>

    <clipPath id="clip-shadow">
      <path d="M 250 400 C 250 350, 300 300, 350 320 C 380 200, 450 200, 480 300 C 520 250, 600 250, 620 320 C 670 300, 730 350, 700 400 C 750 420, 780 500, 720 550 C 750 600, 700 650, 650 620 C 620 700, 550 750, 500 750 C 450 750, 380 700, 350 620 C 300 650, 250 600, 280 550 C 220 500, 250 420, 250 400 Z"/>
    </clipPath>

    <clipPath id="clip-body">
      <path d="M 330 800 L 330 550 C 330 450, 350 420, 400 420 L 450 420 L 450 700 C 450 780, 470 800, 500 800 Z"/>
    </clipPath>

    <clipPath id="clip-bite">
      <path d="M 450 420 L 600 420 C 750 420, 780 500, 760 550 C 740 600, 650 650, 550 650 L 450 650 Z"/>
    </clipPath>

    <clipPath id="clip-tongue">
      <path d="M 520 550 C 520 550, 500 600, 560 620 C 620 640, 650 600, 620 550 Z"/>
    </clipPath>
  </defs>

  <!-- Sticker Drop Shadow & White Die-Cut Border -->
  <g filter="url(#dropShadow)">
    <!-- Thick White Die-Cut Border -->
    <ellipse cx="500" cy="520" rx="430" ry="430" fill="#FFFFFF" stroke="none"/>
    
    <!-- Inner Sticker Base -->
    <ellipse cx="500" cy="520" rx="420" ry="420" fill="#FFD700"/>
  </g>

  <!-- Halftone Background Layer -->
  <ellipse cx="500" cy="520" rx="420" ry="420" fill="url(#halftoneLarge)" opacity="0.3"/>

  <!-- Background Starburst -->
  <g transform="translate(500, 520) rotate(15)">
    <circle cx="0" cy="0" r="400" fill="#FFD700" opacity="0.6"/>
    <g stroke="#FFFFFF" stroke-width="40" stroke-linecap="butt">
      <line x1="0" y1="-400" x2="0" y2="-150" />
      <line x1="141" y1="-382" x2="53" y2="-143" />
      <line x1="282" y1="-282" x2="106" y2="-106" />
      <line x1="382" y1="-141" x2="143" y2="-53" />
      <line x1="400" y1="0" x2="150" y2="0" />
      <line x1="382" y1="141" x2="143" y2="53" />
      <line x1="282" y1="282" x2="106" y2="106" />
      <line x1="141" y1="382" x2="53" y2="143" />
      <line x1="0" y1="400" x2="0" y2="150" />
      <line x1="-141" y1="382" x2="-53" y2="143" />
      <line x1="-282" y1="282" x2="-106" y2="106" />
      <line x1="-382" y1="141" x2="-143" y2="53" />
      <line x1="-400" y1="0" x2="-150" y2="0" />
      <line x1="-382" y1="-141" x2="-143" y2="-53" />
      <line x1="-282" y1="-282" x2="-106" y2="-106" />
      <line x1="-141" y1="-382" x2="-53" y2="-143" />
    </g>
  </g>

  <!-- Main Sticker Base (Covers center of starburst) -->
