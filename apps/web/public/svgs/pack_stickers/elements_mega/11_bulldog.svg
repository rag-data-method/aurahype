  <path d="M 470 730 L 530 730 M 465 760 L 535 760" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"/>

  <!-- Spiked Collar Spikes -->
  <path d="M 445 710 L 415 730 L 445 750" fill="#00BFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <path d="M 460 770 L 435 800 L 475 800" fill="#00BFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <path d="M 500 780 L 500 830" fill="#00BFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <path d="M 540 770 L 525 800 L 565 800" fill="#00BFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <path d="M 555 710 L 585 730 L 555 750" fill="#00BFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>

  <!-- Left Ear -->
  <path d="M 300 450 C 250 380, 200 420, 180 520 C 160 620, 220 650, 280 600 Z" fill="#E62E2D" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
  <path d="M 260 480 C 240 520, 230 560, 250 580" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>

  <!-- Right Ear -->
  <path d="M 700 450 C 750 380, 800 420, 820 520 C 840 620, 780 650, 720 600 Z" fill="#E62E2D" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
  <path d="M 740 480 C 760 520, 770 560, 750 580" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>

  <!-- Hat Brim -->
  <path d="M 200 350 C 200 300, 800 300, 800 350 C 800 400, 200 400, 200 350 Z" fill="#1A1A1A" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
  <path d="M 220 330 C 350 310, 650 310, 780 330" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>

  <!-- Hat Dome -->
  <path d="M 350 330 C 350 100, 650 100, 650 330 Z" fill="#1A1A1A" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>

  <!-- Hat Band -->
  <path d="M 350 330 C 450 310, 550 310, 650 330" fill="none" stroke="#00BFFF" stroke-width="12" stroke-linecap="round"/>

  <!-- Hat Highlights -->
  <path d="M 420 180 C 450 140, 550 140, 580 180" fill="none" stroke="#444444" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="570" cy="240" rx="20" ry="10" transform="rotate(-30 570 240)" fill="#444444"/>

  <!-- Text Action Burst -->
  <path d="M 800 550 C 850 520, 900 550, 950 520 C 980 500, 1000 550, 970 600 C 980 650, 920 700, 850 680 C 800 720, 750 680, 780 630 C 750 600, 780 550, 800 550 Z" fill="#FFFFFF" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
  <text x="850" y="640" font-family="'Arial Black', Impact, sans-serif" font-size="110" font-weight="900" fill="#00BFFF" stroke="#000000" stroke-width="6" text-anchor="middle" dominant-baseline="middle" transform="rotate(-15 850 620)">RUFF!</text>

  <!-- Hatching Pattern on Action Burst -->
  <g clip-path="url(#clip-bite)" stroke="#000000" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <line x1="450" y1="420" x2="600" y2="650"/>
    <line x1="500" y1="420" x2="650" y2="650"/>
    <line x1="550" y1="420" x2="700" y2="650"/>
