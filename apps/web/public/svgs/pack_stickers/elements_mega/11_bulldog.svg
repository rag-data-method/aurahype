    <line x1="950" y1="200" x2="1000" y2="250"/>

    <line x1="0" y1="400" x2="200" y2="600"/>
    <line x1="0" y1="450" x2="150" y2="600"/>
    <line x1="0" y1="500" x2="100" y2="600"/>
    <line x1="0" y1="550" x2="50" y2="600"/>
    <line x1="50" y1="400" x2="250" y2="600"/>
    <line x1="100" y1="400" x2="300" y2="600"/>
