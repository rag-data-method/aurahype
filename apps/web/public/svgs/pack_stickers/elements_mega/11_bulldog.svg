  <path d="M 540 560 C 560 570, 580 580, 600 570" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"/>

  <!-- Upper Teeth -->
  <path d="M 480 430 L 500 490 L 520 430 L 540 490 L 560 430 L 580 490 L 600 430 L 620 490 L 640 430" fill="#FFFFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <path d="M 490 430 L 510 430 M 530 430 L 550 430 M 570 430 L 590 430 M 610 430 L 630 430" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"/>

  <!-- Jaw Spike (Left) -->
