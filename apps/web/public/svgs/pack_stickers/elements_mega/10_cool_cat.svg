<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Sticker Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="12" dy="18" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Halftone Dot Pattern -->
    <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.5" fill="#000000"/>
    </pattern>

    <!-- Halftone Dot Pattern (White on Magenta) -->
    <pattern id="whiteDots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.5" fill="#ffffff"/>
    </pattern>

    <!-- Starburst Clip Path -->
    <clipPath id="starburstClip">
      <path d="M 500 500 L 500 100 L 540 160 L 600 60 L 640 180 L 720 120 L 680 240 L 760 240 L 680 320 L 800 360 L 680 420 L 780 480 L 660 520 L 740 600 L 620 600 L 640 700 L 540 640 L 520 740 L 460 640 L 400 720 L 380 600 L 280 640 L 320 540 L 200 560 L 280 480 L 180 420 L 300 380 L 220 280 L 340 300 L 320 180 L 420 240 L 460 120 Z" />
    </clipPath>
  </defs>

  <!-- Sticker Master Group with Drop Shadow -->
  <g filter="url(#shadow)">
    <!-- Thick White Die-Cut Border -->
    <path id="sticker-border" fill="#ffffff" stroke="none"
      d="M 500 70 
         C 620 70, 740 100, 820 180 
         C 880 240, 920 340, 920 450 
         C 920 560, 880 660, 840 720 
         C 780 800, 660 850, 560 880 
         C 500 900, 420 920, 340 880 
         C 260 840, 180 760, 140 680 
         C 100 600, 80 500, 100 400 
         C 120 300, 180 200, 280 140 
         C 380 80, 450 70, 500 70 Z" />

    <!-- Sticker Illustration (Inner Content) -->
    <g id="illustration">
      
      <!-- Starburst Background -->
      <path d="M 500 500 L 500 100 L 540 160 L 600 60 L 640 180 L 720 120 L 680 240 L 760 240 L 680 320 L 800 360 L 680 420 L 780 480 L 660 520 L 740 600 L 620 600 L 640 700 L 540 640 L 520 740 L 460 640 L 400 720 L 380 600 L 280 640 L 320 540 L 200 560 L 280 480 L 180 420 L 300 380 L 220 280 L 340 300 L 320 180 L 420 240 L 460 120 Z" 
            fill="#FFDD00" stroke="#000000" stroke-width="14" stroke-linejoin="round"/>
      
      <!-- Halftone Overlay on Starburst -->
      <rect x="100" y="60" width="800" height="800" fill="url(#dots)" clip-path="url(#starburstClip)" opacity="0.85"/>

      <!-- Red Background Circle -->
      <circle cx="500" cy="480" r="310" fill="#FF0055" stroke="#000000" stroke-width="14"/>

      <!-- Halftone Overlay on Magenta Circle -->
      <circle cx="500" cy="480" r="303" fill="url(#whiteDots)" opacity="0.75"/>

      <!-- Cat Head Base -->
      <path d="M 340 480 C 340 380, 410 300, 500 300 C 590 300, 660 380, 660 480 C 660 580, 590 660, 500 660 C 410 660, 340 580, 340 480 Z" 
            fill="#00D2FF" stroke="#000000" stroke-width="14"/>

      <!-- Halftone Overlay on Cat Head -->
      <path d="M 347 480 C 347 383, 414 307, 500 307 C 586 307, 653 383, 653 480 C 653 577, 586 653, 500 653 C 414 653, 347 577, 347 480 Z" 
            fill="url(#dots)" opacity="0.85"/>

      <!-- Ears -->
      <!-- Left Ear -->
      <path d="M 360 370 L 280 190 L 430 280 Z" fill="#00D2FF" stroke="#000000" stroke-width="14" stroke-linejoin="round"/>
      <path d="M 370 360 L 310 230 L 400 290 Z" fill="#FF0055" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
      <!-- Right Ear -->
      <path d="M 640 370 L 720 190 L 570 280 Z" fill="#00D2FF" stroke="#000000" stroke-width="14" stroke-linejoin="round"/>
      <path d="M 630 360 L 690 230 L 600 290 Z" fill="#FF0055" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>

      <!-- Muzzle / Cheeks -->
      <path d="M 410 560 C 410 520, 450 500, 500 500 C 550 500, 590 520, 590 560 C 590 600, 550 630, 500 630 C 450 630, 410 600, 410 560 Z" 
            fill="#FF99CC" stroke="#000000" stroke-width="12"/>

      <!-- Inner Mouth -->
      <path d="M 450 570 C 450 570, 500 610, 550 570 Z" fill="#000000"/>

      <!-- Tongue -->
      <path d="M 475 590 C 475 590, 500 630, 525 590 Z" fill="#FF0055" stroke="#000000" stroke-width="8"/>

      <!-- Nose -->
      <polygon points="470,540 530,540 500,580" fill="#FF0055" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>

      <!-- Whiskers Left -->
      <g stroke="#000000" stroke-width="10" stroke-linecap="round">
        <line x1="390" y1="520" x2="220" y2="500" />
        <line x1="390" y1="550" x2="200" y2="560" />
        <line x1="390" y1="580" x2="220" y2="620" />
      </g>

      <!-- Whiskers Right -->
      <g stroke="#000000" stroke-width="10" stroke-linecap="round">
        <line x1="610" y1="520" x2="780" y2="500" />
        <line x1="610" y1="550" x2="800" y2="560" />
        <line x1="610" y1="580" x2="780" y2="620" />
      </g>

      <!-- Shades Background (Arms) -->
      <path d="M 280 380 L 720 380 L 700 500 L 300 500 Z" fill="#000000" stroke="#000000" stroke-width="14" stroke-linejoin="round"/>

      <!-- Neon Sunglasses Lenses Base -->
      <path d="M 320 420 C 320 360, 370 320, 420 320 C 470 320, 490 360, 500 390 C 510 360, 530 320, 580 320 C 630 320, 680 360, 680 420 C 680 480, 630 520, 580 520 C 530 520, 510 480, 500 450 C 490 480, 470 520, 420 520 C 370 520, 320 480, 320 420 Z" 
            fill="#00FF66" stroke="#000000" stroke-width="14" stroke-linejoin="round"/>

      <!-- Shades Highlights (Pop Art Reflections) -->
      <path d="M 360 360 L 440 360 L 380 480 L 300 480 Z" fill="#FFFFFF" opacity="0.9"/>
      <path d="M 560 360 L 640 360 L 580 480 L 500 480 Z" fill="#FFFFFF" opacity="0.9"/>
      <path d="M 340 390 L 370 390 L 350 450 L 320 450 Z" fill="#FFFFFF" opacity="0.9"/>
      <path d="M 540 390 L 570 390 L 550 450 L 520 450 Z" fill="#FFFFFF" opacity="0.9"/>

      <!-- Forehead Lightning Bolt -->
      <path d="M 460 260 L 490 260 L 470 300 L 510 300 L 460 370 L 480 320 L 440 320 Z" 
            fill="#FFDD00" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>

      <!-- Retro "COOL" Text on Red Background -->
      <text x="500" y="780" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="110" fill="#FFFFFF" stroke="#000000" stroke-width="12" letter-spacing="10" paint-order="stroke fill">COOL!</text>
      
      <!-- Small Halftone Dots Floating around Text for comic effect -->
      <g fill="#000000">
        <circle cx="360" cy="740" r="6"/>
        <circle cx="380" cy="720" r="8"/>
        <circle cx="630" cy="760" r="7"/>
        <circle cx="650" cy="730" r="5"/>
      </g>

    </g>
  </g>
</svg>