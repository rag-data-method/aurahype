  <!-- Sticker Inner Content -->
  <g clip-path="url(#stickerClip)">
    <!-- Background Base -->
    <rect x="-100" y="-100" width="1200" height="1200" fill="#ffcc00"/>
    
    <!-- Secondary Explosion Layer (Red) -->
    <path d="M 500 500 L 100 100 L 200 500 L 50 300 L 300 600 L 100 800 L 400 700 L 300 950 L 600 750 L 800 950 L 700 700 L 950 600 L 750 400 L 900 200 L 600 300 Z" fill="#ff3333" stroke="#000000" stroke-width="12"/>

    <!-- Primary Explosion Shape (Yellow) -->
    <path d="M 500 500 L 150 150 L 250 500 L 80 350 L 350 650 L 150 850 L 450 750 L 350 900 L 650 800 L 850 900 L 750 650 L 900 550 L 700 400 L 850 250 L 550 350 Z" fill="#ffdd00" stroke="#000000" stroke-width="16"/>

    <!-- Halftone Shading Overlay -->
    <g opacity="0.15">
      <rect x="-100" y="-100" width="1200" height="1200" fill="url(#halftone)"/>
    </g>
    <g opacity="0.1">
      <rect x="-100" y="-100" width="1200" height="1200" fill="url(#halftoneSparse)"/>
    </g>

    <!-- Action Lines -->
    <g stroke="#000000" stroke-width="8" stroke-linecap="round">
      <line x1="200" y1="200" x2="350" y2="350"/>
      <line x1="800" y1="200" x2="650" y2="350"/>
      <line x1="200" y1="800" x2="350" y2="650"/>
      <line x1="800" y1="800" x2="650" y2="650"/>
      <line x1="500" y1="100" x2="500" y2="300"/>
      <line x1="100" y1="500" x2="300" y2="500"/>
      <line x1="900" y1="500" x2="700" y2="500"/>
      <line x1="500" y1="900" x2="500" y2="700"/>
    </g>

    <!-- Dynamic Curved Speed Lines -->
    <g stroke="#000000" stroke-width="6" stroke-linecap="round" fill="none">
      <path d="M 120 120 Q 250 250 400 200"/>
      <path d="M 880 120 Q 750 250 600 200"/>
      <path d="M 120 880 Q 250 750 400 800"/>
      <path d="M 880 880 Q 750 750 600 800"/>
      <path d="M 500 50 Q 550 200 500 350"/>
      <path d="M 50 500 Q 200 550 350 500"/>
      <path d="M 950 500 Q 800 550 650 500"/>
      <path d="M 500 950 Q 550 800 500 650"/>
    </g>

    <!-- Starbursts -->
    <g fill="#ffffff" stroke="#000000" stroke-width="4">
      <path d="M 280 220 L 290 250 L 320 260 L 290 270 L 280 300 L 270 270 L 240 260 L 270 250 Z"/>
      <path d="M 720 220 L 730 250 L 760 260 L 730 270 L 720 300 L 710 270 L 680 260 L 710 250 Z"/>
      <path d="M 150 500 L 160 530 L 190 540 L 160 550 L 150 580 L 140 550 L 110 540 L 140 530 Z"/>
      <path d="M 850 500 L 860 530 L 890 540 L 860 550 L 850 580 L 840 550 L 810 540 L 840 530 Z"/>
      <path d="M 280 780 L 290 810 L 320 820 L 290 830 L 280 860 L 270 830 L 240 820 L 270 810 Z"/>
      <path d="M 720 780 L 730 810 L 760 820 L 730 830 L 720 860 L 710 830 L 680 820 L 710 810 Z"/>
    </g>

    <!-- Shadow Layer for 3D Text Effect -->
    <text font-family="Impact, Arial Black, sans-serif" font-weight="900" font-size="160" fill="#000000" stroke="none" text-anchor="middle">
      <textPath href="#boomText" startOffset="50%" dy="12">BOOM!</textPath>
    </text>

    <!-- Main Text -->
    <text font-family="Impact, Arial Black, sans-serif" font-weight="900" font-size="160" fill="#ffffff" stroke="#000000" stroke-width="10" text-anchor="middle">
      <textPath href="#boomText" startOffset="50%">BOOM!</textPath>
    </text>

    <!-- Exclamation Point (Separate for perfect placement and 3D effect) -->
    <!-- Shadow -->
    <g transform="translate(12, 12)">
      <text x="780" y="580" font-family="Impact, Arial Black, sans-serif" font-weight="900" font-size="220" fill="#000000" stroke="none" text-anchor="middle">!</text>
    </g>
    <!-- Main -->
    <text x="780" y="580" font-family="Impact, Arial Black, sans-serif" font-weight="900" font-size="220" fill="#ff3333" stroke="#000000" stroke-width="12" text-anchor="middle">!</text>

    <!-- Additional Pop Art Details / Accent Shapes -->
    <g fill="#00ccff" stroke="#000000" stroke-width="6">
      <circle cx="220" cy="450" r="25"/>
      <circle cx="780" cy="450" r="25"/>
      <circle cx="220" cy="550" r="15"/>
      <circle cx="780" cy="550" r="15"/>
    </g>

    <!-- Swoosh elements inside the explosion -->
    <path d="M 400 400 Q 450 420 480 380 Q 440 390 420 370 Z" fill="#ffffff" stroke="#000000" stroke-width="6"/>
    <path d="M 600 400 Q 550 420 520 380 Q 560 390 580 370 Z" fill="#ffffff" stroke="#000000" stroke-width="6"/>
  </g>
</svg>