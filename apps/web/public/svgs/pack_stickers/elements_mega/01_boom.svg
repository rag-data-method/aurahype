<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Halftone Dots Pattern -->
    <pattern id="halftone" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <circle cx="6" cy="6" r="4" fill="#000000"/>
    </pattern>

    <pattern id="halftoneSparse" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <circle cx="10" cy="10" r="5" fill="#000000"/>
    </pattern>

    <!-- Filters -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="14" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <filter id="innerShadow">
      <feOffset dx="0" dy="0"/>
      <feGaussianBlur stdDeviation="4" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000000" flood-opacity="0.25" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <!-- Clip Paths -->
