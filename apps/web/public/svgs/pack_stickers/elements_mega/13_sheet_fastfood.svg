<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="12" dy="18" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Halftone Pattern for Background -->
    <pattern id="halfTone" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="5" fill="#fff200"/>
    </pattern>

    <!-- Red Stripe Pattern for Soda Cup -->
    <pattern id="stripes" x="0" y="0" width="140" height="140" patternUnits="userSpaceOnUse" patternTransform="rotate(-15)">
      <rect x="0" y="0" width="140" height="140" fill="#00FFFF"/>
      <rect x="0" y="0" width="35" height="140" fill="#FF0000"/>
      <rect x="70" y="0" width="35" height="140" fill="#FF0000"/>
    </pattern>

    <!-- Sesame Seed Pattern for Burger Bun -->
    <pattern id="seeds" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <ellipse cx="10" cy="10" rx="3" ry="1.5" fill="#ffffff" opacity="0.9" transform="rotate(-30 10 10)"/>
      <ellipse cx="30" cy="30" rx="3" ry="1.5" fill="#ffffff" opacity="0.9" transform="rotate(45 30 30)"/>
    </pattern>
  </defs>

  <!-- Stickers Group (Centered and scaled to ~80% of viewBox) -->
  <g transform="translate(100, 100) scale(0.8)" filter="url(#shadow)">

    <!-- BACKGROUND HALFTONE BURST -->
    <g id="background-burst">
      <!-- Thick White Die-Cut Border -->
      <path d="M 500,-70 L 560,350 L 940,220 L 640,510 L 1060,640 L 620,690 L 880,1040 L 500,780 L 120,1040 L 380,690 L -60,640 L 360,510 L 60,220 L 440,350 Z" 
            fill="#ffffff" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
      <!-- Inner Yellow Burst -->
      <path d="M 500,-70 L 560,350 L 940,220 L 640,510 L 1060,640 L 620,690 L 880,1040 L 500,780 L 120,1040 L 380,690 L -60,640 L 360,510 L 60,220 L 440,350 Z" 
            fill="#fff200"/>
      <!-- Halftone Overlay -->
      <path d="M 500,-70 L 560,350 L 940,220 L 640,510 L 1060,640 L 620,690 L 880,1040 L 500,780 L 120,1040 L 380,690 L -60,640 L 360,510 L 60,220 L 440,350 Z" 
            fill="url(#halfTone)" opacity="0.6"/>
      <!-- Inner Thick Black Outline -->
      <path d="M 500,-10 L 550,340 L 890,240 L 620,500 L 990,620 L 600,660 L 830,970 L 500,740 L 170,970 L 400,660 L 10,620 L 380,500 L 110,240 L 450,340 Z" 
            fill="none" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
    </g>

    <!-- STICKER 1: MEGA DOG (Bottom Left) -->
    <g id="mega-dog" transform="translate(-80, 420) rotate(-12)">
      <!-- Die-Cut Border Wrapper -->
      <path d="M 50,30 Q 200,-10 350,30 L 410,250 L 390,400 Q 200,450 10,400 L -10,250 Z" 
            fill="#ffffff" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
      
      <g clip-path="url(#dog-clip)">
        <!-- Back Bun -->
        <path d="M 40,40 Q 200,5 360,40 L 390,230 L 10,230 Z" fill="#FF9900"/>
        <!-- Sausage -->
        <path d="M -10,150 Q 200,90 410,150 L 390,350 Q 200,410 10,350 Z" fill="#CC0000"/>
        <path d="M -10,150 Q 200,90 410,150 L 380,220 Q 200,170 20,220 Z" fill="#FF0000"/>
        <!-- Front Bun -->
        <path d="M -20,250 L 440,250 L 410,380 Q 200,430 -10,380 Z" fill="#FFCC00"/>
        <!-- Mustard -->
        <path d="M 30,180 Q 60,210 90,180 T 150,180 T 210,180 T 270,180 T 330,180 T 390,180" 
              fill="none" stroke="#FFF200" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Ketchup -->
        <path d="M 50,230 Q 90,260 130,230 T 210,230 T 290,230 T 370,230" 
              fill="none" stroke="#FF0000" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- Thick Inner Outlines -->
      <path d="M 40,40 Q 200,5 360,40 L 390,230 L 10,230 Z" fill="none" stroke="#000000" stroke-width="12"/>
      <path d="M -10,150 Q 200,90 410,150 L 390,350 Q 200,410 10,350 Z" fill="none" stroke="#000000" stroke-width="12"/>
      <path d="M -20,250 L 440,250 L 410,380 Q 200,430 -10,380 Z" fill="none" stroke="#000000" stroke-width="12"/>
      <path d="M 30,180 Q 60,210 90,180 T 150,180 T 210,180 T 270,180 T 330,180 T 390,180" 
            fill="none" stroke="#000000" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 50,230 Q 90,260 130,230 T 210,230 T 290,230 T 370,230" 
            fill="none" stroke="#000000" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- STICKER 2: FIZZ SODA (Right Side) -->
    <g id="fizz-soda" transform="translate(680, 70) rotate(8)">
      <!-- Die-Cut Border Wrapper -->
      <path d="M 140,120 L 290,120 L 340,500 Q 215,550 90,500 Z" 
            fill="#ffffff" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
      
      <!-- Cup Body -->
      <path d="M 150,130 L 280,130 L 325,490 Q 215,530 105,490 Z" fill="url(#stripes)"/>
      <!-- Cup Rim -->
      <ellipse cx="215" cy="130" rx="75" ry="18" fill="#fff200" stroke="#000000" stroke-width="10"/>
      <ellipse cx="215" cy="130" rx="75" ry="18" fill="none" stroke="#000000" stroke-width="12"/>
      <!-- Liquid -->
      <ellipse cx="215" cy="190" rx="65" ry="14" fill="#6600CC"/>
      <!-- Ice Cubes -->
      <rect x="180" y="170" width="30" height="30" rx="4" fill="#00FFFF" stroke="#000000" stroke-width="6" transform="rotate(15 195 185)"/>
      <rect x="220" y="180" width="25" height="25" rx="4" fill="#00FFFF" stroke="#000000" stroke-width="6" transform="rotate(-10 232 192)"/>
      <!-- Straw -->
      <path d="M 230,190 L 260,-60 L 290,-60 L 250,200 Z" fill="#FF00CC" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
      <path d="M 260,-60 L 320,-80 L 330,-60 L 290,-40 Z" fill="#FF00CC" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
      
      <!-- Bubbles -->
      <circle cx="180" cy="240" r="12" fill="#ffffff" stroke="#000000" stroke-width="6"/>
      <circle cx="250" cy="280" r="16" fill="#ffffff" stroke="#000000" stroke-width="6"/>
      <circle cx="200" cy="340" r="10" fill="#ffffff" stroke="#000000" stroke-width="6"/>
      <circle cx="270" cy="390" r="14" fill="#ffffff" stroke="#000000" stroke-width="6"/>
      <circle cx="150" cy="420" r="8" fill="#ffffff" stroke="#000000" stroke-width="6"/>
      
      <!-- Cup Outline -->
      <path d="M 150,130 L 280,130 L 325,490 Q 215,530 105,490 Z" fill="none" stroke="#000000" stroke-width="12"/>
    </g>

    <!-- STICKER 3: FRY BOX (Center) -->
    <g id="fry-box" transform="translate(320, 280)">
      <!-- Die-Cut Border Wrapper -->
      <path d="M 40,150 L 310,150 L 280,480 L 70,480 Z" 
            fill="#ffffff" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
      
      <!-- Fries (Back) -->
      <rect x="140" y="20" width="28" height="180" rx="4" fill="#FFD700" stroke="#000000" stroke-width="10"/>
      <rect x="180" y="10" width="28" height="190" rx="4" fill="#FFD700" stroke="#000000" stroke-width="10"/>
      <rect x="100" y="30" width="28" height="170" rx="4" fill="#FFD700" stroke="#000000" stroke-width="10"/>
      <rect x="220" y="40" width="28" height="160" rx="4" fill="#FFD700" stroke="#000000" stroke-width="10"/>
      <rect x="60" y="50" width="28" height="150" rx="4" fill="#FFD700" stroke="#000000" stroke-width="10"/>
      <rect x="260" y="55" width="28" height="145" rx="4" fill="#FFD700" stroke="#000000" stroke-width="10"/>
      
      <!-- Fries (Front - peeking out) -->
      <rect x="120" y="80" width="28" height="120" rx="4" fill="#FFCC00" stroke="#000000" stroke-width="10"/>
      <rect x="200" y="90" width="28" height="110" rx="4" fill="#FFCC00" stroke="#000000" stroke-width="10"/>
      <rect x="80" y="100" width="28" height="100" rx="4" fill="#FFCC00" stroke="#000000" stroke-width="10"/>
      <rect x="240" y="110" width="28" height="90" rx="4" fill="#FFCC00" stroke="#000000" stroke-width="10"/>
      
      <!-- Fry Box (Back part) -->
      <path d="M 40,150 L 310,150 L 280,420 L 70,420 Z" fill="#FF0000"/>
      <path d="M 40,150 L 310,150 L 280,420 L 70,420 Z" fill="none" stroke="#000000" stroke-width="12"/>
      
      <!-- Fry Box (Front Flap) -->
      <path d="M 40,150 L 310,150 L 260,480 L 90,480 Z" fill="#CC0000"/>
      <path d="M 40,150 L 310,150 L 260,480 L 90,480 Z" fill="none" stroke="#000000" stroke-width="12"/>
      
      <!-- Box "M" Logo -->
      <path d="M 130,220 L 175,330 L 175,220 L 205,220 L 205,330 L 250,220 L 220,220 L 190,280 L 160,220 Z" fill="#FFF200" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
    </g>

    <!-- STICKER 4: SLIDER BURGER (Top Right) -->
    <g id="slider-burger" transform="translate(720, 520) rotate(22)">
      <!-- Die-Cut Border Wrapper -->
      <path d="M 0,50 Q 85,-10 170,50 L 160,180 Q 85,220 10,180 Z" 
            fill="#ffffff" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
      
      <!-- Top Bun -->
      <path d="M 10,80 Q 85,10 160,80 Q 85,50 10,80 Z" fill="#FF9900"/>
      <path d="M 10,80 Q 85,10 160,80 Q 85,50 10,80 Z" fill="url(#seeds)"/>
      <!-- Lettuce -->
      <path d="M 5,90 Q 35,70 65,90 T 125,90 T 165,90" fill="none" stroke="#00CC00" stroke-width="16" stroke-linecap="round"/>
      <!-- Tomato -->
      <path d="M 15,100 L 155,100 L 150,115 L 20,115 Z" fill="#FF0000"/>
      <!-- Cheese -->
      <path d="M 10,115 L 160,115 L 145,135 L 110,115 L 75,145 L 40,115 L 15,140 Z" fill="#FFF200"/>
      <!-- Burger Patty -->
      <path d="M 5,135 L 165,135 L 155,165 L 15,165 Z" fill="#663300"/>
      <!-- Bottom Bun -->
      <path d="M 15,165 L 155,165 L 145,195 Q 85,215 25,195 Z" fill="#FF9900"/>
      
      <!-- Outlines -->
      <path d="M 10,80 Q 85,10 160,80 Q 85,50 10,80 Z" fill="none" stroke="#000000" stroke-width="10"/>
      <path d="M 5,90 Q 35,70 65,90 T 125,90 T 165,90" fill="none" stroke="#000000" stroke-width="10" stroke-linecap="round"/>
      <path d="M 15,100 L 155,100 L 150,115 L 20,115 Z" fill="none" stroke="#000000" stroke-width="10"/>
      <path d="M 10,115 L 160,115 L 145,135 L 110,115 L 75,145 L 40,115 L 15,140 Z" fill="none" stroke="#000000" stroke-width="10"/>
      <path d="M 5,135 L 165,135 L 155,165 L 15,165 Z" fill="none" stroke="#000000" stroke-width="10"/>
      <path d="M 15,165 L 155,165 L 145,195 Q 85,215 25,195 Z" fill="none" stroke="#000000" stroke-width="10"/>
    </g>

    <!-- STICKER 5: SAUCE SPLASH (Top Left) -->
    <g id="sauce-splash" transform="translate(40, 80) rotate(-35)">
      <!-- Die-Cut Border Wrapper -->
      <path d="M 50,20 Q 80,5 110,20 L 120,70 L 150,40 L 180,80 L 130,110 L 160,140 L 110,150 L 100,200 L 60,170 L 20,190 L 30,140 L -10,120 L 30,90 L 10,50 L 50,60 Z" 
            fill="#ffffff" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
      
      <!-- Main Ketchup Shape -->
      <path d="M 50,20 Q 80,5 110,20 L 120,70 L 150,40 L 180,80 L 130,110 L 160,140 L 110,150 L 100,200 L 60,170 L 20,190 L 30,140 L -10,120 L 30,90 L 10,50 L 50,60 Z" 
            fill="#FF0000"/>
      <path d="M 50,20 Q 80,5 110,20 L 120,70 L 150,40 L 180,80 L 130,110 L 160,140 L 110,150 L 100,200 L 60,170 L 20,190 L 30,140 L -10,120 L 30,90 L 10,50 L 50,60 Z" 
            fill="none" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
      
      <!-- Highlights -->
      <path d="M 60,40 Q 75,30 90,40 L 95,80 L 70,70 Z" fill="#FF6666" opacity="0.8"/>
      <ellipse cx="140" cy="120" rx="10" ry="6" fill="#FF6666" opacity="0.8" transform="rotate(30 140 120)"/>
      <ellipse cx="50" cy="150" rx="8" ry="4" fill="#FF6666" opacity="0.8" transform="rotate(-20 50 150)"/>
    </g>

    <!-- STICKER 6: "WOW!" BURST (Bottom Right) -->
    <g id="wow-burst" transform="translate(580, 560) rotate(10)">
      <!-- Die-Cut Border Wrapper -->
      <path d="M 120,-20 L 160,80 L 260,60 L 200,140 L 280,200 L 180,220 L 200,320 L 120,260 L 40,320 L 60,220 L -40,200 L 40,140 L -20,60 L 80,80 Z" 
            fill="#ffffff" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
      
      <!-- Yellow Burst -->
      <path d="M 120,-20 L 160,80 L 260,60 L 200,140 L 280,200 L 180,220 L 200,320 L 120,260 L 40,320 L 60,220 L -40,200 L 40,140 L -20,60 L 80,80 Z" 
            fill="#fff200"/>
      <!-- Halftone Overlay -->
      <path d="M 120,-20 L 160,80 L 260,60 L 200,140 L 280,200 L 180,220 L 200,320 L 120,260 L 40,320 L 60,220 L -40,200 L 40,140 L -20,60 L 80,80 Z" 
            fill="url(#halfTone)" opacity="0.5"/>
      <path d="M 120,-20 L 160,80 L 260,60 L 200,140 L 280,200 L 180,220 L 200,320 L 120,260 L 40,320 L 60,220 L -40,200 L 40,140 L -20,60 L 80,80 Z" 
            fill="none" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
      
      <!-- "WOW!" Text -->
      <text x="120" y="195" font-family="Impact, Arial Black, sans-serif" font-size="95" font-weight="900" text-anchor="middle" fill="#FF00CC" stroke="#000000" stroke-width="10" stroke-linejoin="round">WOW!</text>
    </g>

    <!-- STICKER 7: KETCHUP BOTTLE (Above Slider) -->
    <g id="ketchup-bottle" transform="translate(850, 380) rotate(-15)">
      <!-- Die-Cut Border Wrapper -->
      <path d="M 10,50 L 90,50 L 80,200 L 20,200 Z" 
            fill="#ffffff" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>
      
      <!-- Bottle Body -->
      <path d="M 15,55 L 85,55 L 75,195 L 25,195 Z" fill="#FF0000"/>
      <!-- Label -->
      <path d="M 20,100 L 80,100 L 75,160 L 25,160 Z" fill="#FFF200"/>
      <text x="50" y="135" font-family="Impact, Arial Black, sans-serif" font-size="20" font-weight="900" text-anchor="middle" fill="#000000" transform="rotate(90 50 135)">HOT</text>
      <!-- Cap -->
      <path d="M 25,55 L 75,55 L 70,25 L 30,25 Z" fill="#FFF200" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
      <!-- Nozzle -->
      <path d="M 40,25 L 60,25 L 55,5 L 45,5 Z" fill="#FF0000" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
      
      <!-- Outlines -->
      <path d="M 15,55 L 85,55 L 75,195 L 25,195 Z" fill="none" stroke="#000000" stroke-width="12"/>
      <path d="M 20,100 L 80,100 L 75,160 L 25,160 Z" fill="none" stroke="#000000" stroke-width="8"/>
    </g>

  </g>
</svg>