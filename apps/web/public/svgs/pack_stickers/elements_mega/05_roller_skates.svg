<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Heavy drop shadow for the die-cut border -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Simple linear gradients for subtle depth within flat color blocks -->
    <linearGradient id="boot-pink-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF66B2"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </linearGradient>

    <linearGradient id="boot-blue-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#33CCFF"/>
      <stop offset="100%" stop-color="#00AAFF"/>
    </linearGradient>

    <linearGradient id="wheel-yellow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFF66"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>

    <linearGradient id="wheel-cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66FFFF"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
  </defs>

  <!-- Die-Cut Sticker Assembly: Shadow, White Border, then Illustration -->
  <g id="sticker-assembly">
    
    <!-- 1. Drop Shadow (Underneath the white border) -->
    <!-- Using the exact same path as the sticker outline to simulate a real physical cast shadow -->
    <path d="M 500 90 
             C 640 90, 710 160, 760 260 
             C 810 360, 860 440, 860 500 
             C 860 580, 800 660, 710 720 
             C 620 780, 550 810, 500 850 
             C 420 910, 320 920, 240 880 
             C 160 840, 120 760, 120 660 
             C 120 560, 160 440, 220 340 
             C 280 240, 360 90, 500 90 Z" 
          fill="#000000" 
          opacity="0.4" 
          filter="url(#drop-shadow)" 
          transform="translate(0, 15)"/>

    <!-- 2. Thick White Die-Cut Border -->
    <path d="M 500 90 
             C 640 90, 710 160, 760 260 
             C 810 360, 860 440, 860 500 
             C 860 580, 800 660, 710 720 
             C 620 780, 550 810, 500 850 
             C 420 910, 320 920, 240 880 
             C 160 840, 120 760, 120 660 
             C 120 560, 160 440, 220 340 
             C 280 240, 360 90, 500 90 Z" 
          fill="#FFFFFF" 
          stroke="#FFFFFF" 
          stroke-width="24" 
          stroke-linejoin="round"/>

    <!-- 3. Main Illustration (Clipped inside the white border) -->
    <g id="illustration" clip-path="url(#sticker-clip)">
      <clipPath id="sticker-clip">
        <path d="M 500 90 
                 C 640 90, 710 160, 760 260 
                 C 810 360, 860 440, 860 500 
                 C 860 580, 800 660, 710 720 
                 C 620 780, 550 810, 500 850 
                 C 420 910, 320 920, 240 880 
                 C 160 840, 120 760, 120 660 
                 C 120 560, 160 440, 220 340 
                 C 280 240, 360 90, 500 90 Z"/>
      </clipPath>

      <!-- Background Elements inside the sticker shape -->
      <!-- Large Cyan Circle -->
      <circle cx="280" cy="300" r="180" fill="#00FFFF" opacity="0.8" />
      <!-- Large Yellow Circle -->
      <circle cx="720" cy="650" r="160" fill="#FFFF00" opacity="0.8" />
      <!-- Magenta Circle -->
      <circle cx="750" cy="250" r="120" fill="#FF1493" opacity="0.8" />
      
      <!-- Pop Art Stars/Accents -->
      <g fill="#FFFFFF" stroke="#000000" stroke-width="4" stroke-linejoin="round">
        <path d="M 200 200 L 220 240 L 260 240 L 230 270 L 240 310 L 200 290 L 160 310 L 170 270 L 140 240 L 180 240 Z" />
        <path d="M 780 450 L 795 480 L 825 480 L 800 500 L 810 530 L 780 510 L 750 530 L 760 500 L 735 480 L 765 480 Z" transform="scale(0.8) translate(200, 100)" />
        <path d="M 250 750 L 270 790 L 310 790 L 280 820 L 290 860 L 250 840 L 210 860 L 220 820 L 190 790 L 230 790 Z" transform="scale(0.6) translate(300, 400)" />
      </g>

      <!-- Action Lines (Background) -->
      <g stroke="#000000" stroke-width="6" stroke-linecap="round">
        <path d="M 150 450 L 120 480" />
        <path d="M 160 460 L 130 490" />
        <path d="M 850 520 L 880 550" />
        <path d="M 840 530 L 870 560" />
      </g>

      <!-- ========================================== -->
      <!-- LEFT SKATE (Background/Behind) - Blue Tint -->
      <!-- ========================================== -->
      <g transform="translate(-40, -60) rotate(-15 500 500)">
        <!-- Boot Base -->
        <path d="M 380 480 C 380 380, 400 280, 420 220 C 440 160, 480 140, 520 140 C 560 140, 580 180, 580 240 C 580 300, 560 380, 560 480 L 560 520 L 380 520 Z" 
              fill="url(#boot-blue-grad)" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
        
        <!-- Tongue -->
        <path d="M 460 150 C 480 100, 520 100, 540 150 L 560 480 L 440 480 Z" 
              fill="#00FFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
        <path d="M 460 150 C 480 100, 520 100, 540 150" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>

        <!-- Laces -->
        <g stroke="#000000" stroke-width="8" stroke-linecap="round" fill="none">
          <path d="M 440 300 L 560 300" />
          <path d="M 445 340 L 555 340" />
          <path d="M 450 380 L 550 380" />
          <path d="M 450 420 L 550 420" />
          <path d="M 450 460 L 550 460" />
        </g>
        <!-- Lace Crosses -->
        <g fill="#FFFFFF" stroke="#000000" stroke-width="4">
          <circle cx="440" cy="300" r="6"/>
          <circle cx="560" cy="300" r="6"/>
          <circle cx="445" cy="340" r="6"/>
          <circle cx="555" cy="340" r="6"/>
          <circle cx="450" cy="380" r="6"/>
          <circle cx="550" cy="380" r="6"/>
          <circle cx="450" cy="420" r="6"/>
          <circle cx="550" cy="420" r="6"/>
        </g>

        <!-- Wheels -->
        <!-- Front Wheel -->
        <g transform="translate(400, 560)">
          <circle cx="0" cy="0" r="45" fill="url(#wheel-cyan-grad)" stroke="#000000" stroke-width="8"/>
          <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
          <circle cx="0" cy="0" r="8" fill="#000000"/>
        </g>
        <!-- Middle Wheel -->
        <g transform="translate(500, 560)">
          <circle cx="0" cy="0" r="45" fill="url(#wheel-yellow-grad)" stroke="#000000" stroke-width="8"/>
          <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
          <circle cx="0" cy="0" r="8" fill="#000000"/>
        </g>
        <!-- Back Wheel -->
        <g transform="translate(600, 560)">
          <circle cx="0" cy="0" r="45" fill="url(#wheel-cyan-grad)" stroke="#000000" stroke-width="8"/>
          <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
          <circle cx="0" cy="0" r="8" fill="#000000"/>
        </g>

        <!-- Plate (Chassis) -->
        <path d="M 370 520 L 630 520 L 610 560 L 390 560 Z" 
              fill="#C0C0C0" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
        
        <!-- Toe Stop -->
        <path d="M 370 560 L 350 600 L 390 600 L 390 560 Z" 
              fill="#FF1493" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
      </g>


      <!-- ========================================== -->
      <!-- RIGHT SKATE (Foreground) - Pink Tint -->
      <!-- ========================================== -->
      <g transform="translate(40, 60) rotate(15 500 500)">
        <!-- Boot Base -->
        <path d="M 380 480 C 380 380, 400 280, 420 220 C 440 160, 480 140, 520 140 C 560 140, 580 180, 580 240 C 580 300, 560 380, 560 480 L 560 520 L 380 520 Z" 
              fill="url(#boot-pink-grad)" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>

        <!-- Boot Highlight -->
        <path d="M 415 220 C 435 160, 475 140, 515 140 C 520 140, 525 145, 525 150 C 485 150, 450 170, 430 220 C 410 280, 395 380, 395 480 L 415 480 C 415 380, 430 280, 450 220 Z" 
              fill="#FFFFFF" opacity="0.4"/>

        <!-- Tongue -->
        <path d="M 460 150 C 480 100, 520 100, 540 150 L 560 480 L 440 480 Z" 
              fill="#FF66B2" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
        <path d="M 460 150 C 480 100, 520 100, 540 150" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round"/>

        <!-- Laces -->
        <g stroke="#000000" stroke-width="8" stroke-linecap="round" fill="none">
          <path d="M 440 300 L 560 300" />
          <path d="M 445 340 L 555 340" />
          <path d="M 450 380 L 550 380" />
          <path d="M 450 420 L 550 420" />
          <path d="M 450 460 L 550 460" />
        </g>
        <!-- Lace Crosses / Eyelets -->
        <g fill="#FFFF00" stroke="#000000" stroke-width="4">
          <circle cx="440" cy="300" r="6"/>
          <circle cx="560" cy="300" r="6"/>
          <circle cx="445" cy="340" r="6"/>
          <circle cx="555" cy="340" r="6"/>
          <circle cx="450" cy="380" r="6"/>
          <circle cx="550" cy="380" r="6"/>
          <circle cx="450" cy="420" r="6"/>
          <circle cx="550" cy="420" r="6"/>
        </g>

        <!-- Wheels -->
        <!-- Front Wheel -->
        <g transform="translate(400, 560)">
          <circle cx="0" cy="0" r="45" fill="url(#wheel-yellow-grad)" stroke="#000000" stroke-width="8"/>
          <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
          <circle cx="0" cy="0" r="8" fill="#000000"/>
        </g>
        <!-- Middle Wheel -->
        <g transform="translate(500, 560)">
          <circle cx="0" cy="0" r="45" fill="url(#wheel-cyan-grad)" stroke="#000000" stroke-width="8"/>
          <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
          <circle cx="0" cy="0" r="8" fill="#000000"/>
        </g>
        <!-- Back Wheel -->
        <g transform="translate(600, 560)">
          <circle cx="0" cy="0" r="45" fill="url(#wheel-yellow-grad)" stroke="#000000" stroke-width="8"/>
          <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>
          <circle cx="0" cy="0" r="8" fill="#000000"/>
        </g>

        <!-- Plate (Chassis) -->
        <path d="M 370 520 L 630 520 L 610 560 L 390 560 Z" 
              fill="#E0E0E0" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
        <!-- Plate Highlights -->
        <path d="M 380 525 L 620 525 L 605 535 L 395 535 Z" fill="#FFFFFF" opacity="0.6"/>

        <!-- Toe Stop -->
        <path d="M 370 560 L 350 600 L 390 600 L 390 560 Z" 
              fill="#00FFFF" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
      </g>
      
    </g>
  </g>
</svg>