<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Halftone Dot Pattern -->
    <pattern id="halftone" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="3" fill="#000000"/>
    </pattern>
    <pattern id="ht-mag" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="3" fill="#ff00aa"/>
    </pattern>

    <!-- Halftone Screen Masks -->
    <mask id="ht-screen">
      <rect width="1600" height="900" fill="white"/>
      <rect width="1600" height="900" fill="url(#halftone)"/>
    </mask>
    <mask id="ht-screen-mag">
      <rect width="1600" height="900" fill="white"/>
      <rect width="1600" height="900" fill="url(#ht-mag)"/>
    </mask>

    <!-- Filters -->
    <filter id="shadow">
      <feDropShadow dx="12" dy="12" stdDeviation="0" flood-color="#000000"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sun Gradient for Pop Art Effect (flat stops) -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe600"/>
      <stop offset="80%" stop-color="#ff0000"/>
      <stop offset="100%" stop-color="#ff00aa"/>
    </radialGradient>
  </defs>

  <!-- Base Background -->
  <rect width="1600" height="900" fill="#00e5ff"/>

  <!-- Dynamic Background Halftone Layer -->
  <g id="bg-halftone-layer">
    <rect width="1600" height="900" fill="#ff00aa" mask="url(#ht-screen)"/>
    <animateTransform attributeName="transform" type="scale" values="1,1; 1.04,1.04; 1,1" dur="4s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Dynamic Background Stars -->
  <g stroke="#000000" stroke-width="4" stroke-linecap="round">
    <g transform="translate(200, 200)">
      <path d="M-15,0 L15,0 M0,-15 L0,15"/>
      <animateTransform attributeName="transform" type="rotate" values="0; 45; 0" dur="2s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(1400, 150)">
      <path d="M-20,0 L20,0 M0,-20 L0,20"/>
      <animateTransform attributeName="transform" type="rotate" values="0; -45; 0" dur="2.5s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(300, 500)">
      <path d="M-12,0 L12,0 M0,-12 L0,12"/>
      <animateTransform attributeName="transform" type="rotate" values="0; 90; 0" dur="3s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(1300, 400)">
      <path d="M-18,0 L18,0 M0,-18 L0,18"/>
      <animateTransform attributeName="transform" type="rotate" values="0; -90; 0" dur="2.2s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Sun -->
  <circle cx="800" cy="450" r="300" fill="url(#sunGrad)"/>
  <ellipse cx="800" cy="450" rx="320" ry="30" fill="#ffffff" opacity="0.8" mask="url(#ht-screen)"/>

  <!-- Sky Halftone Dots (Cyan) -->
  <ellipse cx="800" cy="450" rx="360" ry="340" fill="#00e5ff" mask="url(#ht-screen)"/>

  <!-- Giga-ZAP Comic Burst Background -->
  <g id="giga-zap" transform="translate(800, 450)">
    <polygon points="0,-400 40,-120 350,-350 80,-80 400,0 80,80 350,350 40,120 0,400 -40,120 -350,350 -80,80 -400,0 -80,-80 -350,-350 -40,-120" fill="#ffffff" stroke="#000000" stroke-width="6"/>
    <animateTransform attributeName="transform" type="rotate" values="0 800 450; 30 800 450; 0 800 450" dur="8s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="scale" values="1; 1.1; 1" dur="4s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Sea -->
  <g id="sea-layer">
    <!-- Base Water -->
    <path d="M0 900 L0 600 Q 400 520 800 600 Q 1200 680 1600 600 L 1600 900 Z" fill="#0000f0" stroke="#000000" stroke-width="8"/>
    
    <!-- Water Halftone Overlay -->
    <path d="M0 900 L0 600 Q 400 520 800 600 Q 1200 680 1600 600 L 1600 900 Z" fill="#00e5ff" mask="url(#ht-screen)"/>
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>

    <!-- Waves -->
    <path d="M0 650 Q 200 600 400 650 T 800 650 T 1200 650 T 1600 650" fill="none" stroke="#ffffff" stroke-width="10"/>
    <path d="M0 750 Q 200 700 400 750 T 800 750 T 1200 750 T 1600 750" fill="none" stroke="#ff00aa" stroke-width="8"/>
    <path d="M0 850 Q 200 800 400 850 T 800 850 T 1200 850 T 1600 850" fill="none" stroke="#ffff00" stroke-width="12"/>

    <!-- Wave Halftone -->
    <path d="M0 650 Q 200 600 400 650 T 800 650 T 1200 650 T 1600 650" fill="none" stroke="#000000" stroke-width="10" mask="url(#ht-screen)" opacity="0.5"/>
  </g>

  <!-- Lighthouse Base (Rock Island) -->
  <g transform="translate(680, 480)">
    <path d="M20 420 L60 280 L180 280 L220 420 Z" fill="#808080" stroke="#000000" stroke-width="8"/>
    <path d="M20 420 L60 280 L180 280 L220 420 Z" fill="#ffffff" mask="url(#ht-screen)" opacity="0.5"/>
  </g>

  <!-- Lighthouse Body -->
  <g id="lighthouse-body" transform="translate(680, 480)">
    <!-- Base Slab -->
    <rect x="60" y="270" width="120" height="20" fill="#000000" stroke="#000000" stroke-width="6"/>
    <!-- Tower -->
    <polygon points="80,270 120,20 160,270" fill="#ff0000" stroke="#000000" stroke-width="8"/>
    <!-- Stripes -->
    <polygon points="84,220 156,220 158,240 82,240" fill="#ffffff" stroke="#000000" stroke-width="6"/>
    <polygon points="92,160 148,160 150,180 90,180" fill="#ffffff" stroke="#000000" stroke-width="6"/>
    <polygon points="100,100 140,100 142,120 98,120" fill="#ffffff" stroke="#000000" stroke-width="6"/>
    <polygon points="108,40 132,40 134,60 106,60" fill="#ffffff" stroke="#000000" stroke-width="6"/>
    
    <!-- Lantern Room -->
    <rect x="110" y="0" width="20" height="20" fill="#ffffff" stroke="#000000" stroke-width="6"/>
    <rect x="105" y="-10" width="30" height="10" fill="#000000"/>
    <polygon points="115,-20 125,-20 130,-10 110,-10" fill="#ff0000" stroke="#000000" stroke-width="6"/>
    
    <!-- Glass Panes -->
    <rect x="112" y="2" width="6" height="16" fill="#ffff00" stroke="#000000" stroke-width="3"/>
    <rect x="122" y="2" width="6" height="16" fill="#ffff00" stroke="#000000" stroke-width="3"/>
    
    <!-- Glow -->
    <circle cx="120" cy="10" r="40" fill="#ffff00" filter="url(#glow)" opacity="0.6">
      <animate attributeName="r" values="40;55;40" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Comic Action Lines (ZAP Beams) -->
  <g id="zap-beams" transform="translate(800, 490)">
    <!-- Main Beams -->
    <path d="M0 0 L 800 -400 L 800 -200 Z" fill="#ffff00" stroke="#000000" stroke-width="6" opacity="0.8">
      <animate attributeName="fill" values="#ffff00;#ff0000;#00e5ff;#ffff00" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0; 15; 0" dur="3s" repeatCount="indefinite" additive="sum"/>
    </path>
    
    <path d="M0 0 L -800 -400 L -800 -200 Z" fill="#ff0000" stroke="#000000" stroke-width="6" opacity="0.8">
      <animate attributeName="fill" values="#ff0000;#00e5ff;#ffff00;#ff0000" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="0.5s" repeatCount="indefinite" begin="0.25s"/>
      <animateTransform attributeName="transform" type="rotate" values="0; -15; 0" dur="3s" repeatCount="indefinite" additive="sum"/>
    </path>

    <!-- Secondary Beams -->
    <path d="M0 0 L 600 -600 L 400 -600 Z" fill="#00e5ff" stroke="#000000" stroke-width="6" opacity="0.6">
      <animate attributeName="fill" values="#00e5ff;#ffff00;#ff0000;#00e5ff" dur="1.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0; 25; 0" dur="4s" repeatCount="indefinite" additive="sum"/>
    </path>
    
    <path d="M0 0 L -600 -600 L -400 -600 Z" fill="#ff00aa" stroke="#000000" stroke-width="6" opacity="0.6">
      <animate attributeName="fill" values="#ff00aa;#00e5ff;#ffff00;#ff00aa" dur="1.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0; -25; 0" dur="4s" repeatCount="indefinite" additive="sum"/>
    </path>

    <!-- Beam Halftone Overlays -->
    <path d="M0 0 L 800 -400 L 800 -200 Z" fill="#000000" mask="url(#ht-screen)" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" values="0; 15; 0" dur="3s" repeatCount="indefinite" additive="sum"/>
    </path>
    <path d="M0 0 L -800 -400 L -800 -200 Z" fill="#000000" mask="url(#ht-screen)" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" values="0; -15; 0" dur="3s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <!-- Floating Action Elements -->
  <g id="floating-elements">
    <!-- ZAP! Bubbles -->
    <g>
      <circle cx="1100" cy="300" r="40" fill="#ff00aa" stroke="#000000" stroke-width="6"/>
      <text x="1100" y="310" font-family="Impact, Arial Black, sans-serif" font-size="36" text-anchor="middle" fill="#ffffff" stroke="#000000" stroke-width="2">ZAP!</text>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30; 0,0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="500" cy="350" r="40" fill="#ffff00" stroke="#000000" stroke-width="6"/>
      <text x="500" y="360" font-family="Impact, Arial Black, sans-serif" font-size="36" text-anchor="middle" fill="#ff0000" stroke="#000000" stroke-width="2">POW!</text>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,30; 0,0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="1250" cy="200" r="40" fill="#00e5ff" stroke="#000000" stroke-width="6"/>
      <text x="1250" y="210" font-family="Impact, Arial Black, sans-serif" font-size="36" text-anchor="middle" fill="#000000" stroke="#ffffff" stroke-width="1">BLAM!</text>
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,0; 0,0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </g>

    <!-- Birds -->
    <g stroke="#000000" stroke-width="6" stroke-linecap="round" fill="none">
      <path d="M200 200 Q 220 220 240 200 Q 260 220 280 200">
        <animateTransform attributeName="transform" type="translate" values="0,0; 100,-50; 0,0" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M180 230 Q 190 240 200 230 Q 210 240 220 230">
        <animateTransform attributeName="transform" type="translate" values="0,0; 80,-30; 0,0" dur="5s" repeatCount="indefinite"/>
      </path>
      <path d="M1400 250 Q 1420 270 1440 250 Q 1460 270 1480 250">
        <animateTransform attributeName="transform" type="translate" values="0,0; -120,-60; 0,0" dur="6s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Foreground Comic Speed Lines -->
  <g id="speed-lines" stroke="#000000" stroke-width="6" stroke-linecap="round">
    <path d="M100 100 L 200 150">
      <animate attributeName="d" values="M100 100 L 200 150; M120 120 L 220 170; M100 100 L 200 150" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M1500 100 L 1400 150">
      <animate attributeName="d" values="M1500 100 L 1400 150; M1480 120 L 1380 170; M1500 100 L 1400 150" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M50 800 L 150 750">
      <animate attributeName="d" values="M50 800 L 150 750; M70 820 L 170 770; M50 800 L 150 750" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M1550 800 L 1450 750">
      <animate attributeName="d" values="M1550 800 L 1450 750; M1530 820 L 1430 770; M1550 800 L 1450 750" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <path d="M800 50 L 800 150">
      <animate attributeName="d" values="M800 50 L 800 150; M820 70 L 820 170; M800 50 L 800 150" dur="0.9s" repeatCount="indefinite"/>
    </path>
    <path d="M800 850 L 800 750">
      <animate attributeName="d" values="M800 850 L 800 750; M780 830 L 780 730; M800 850 L 800 750" dur="1.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Global Scene Vibration (Subtle Screen Shake) -->
  <animateTransform 
    attributeName="transform" 
    type="translate" 
    values="0,0; 2,0; 0,2; -2,0; 0,-2; 0,0"
    dur="0.2s"
    repeatCount="indefinite"
    additive="sum"
  />
</svg>