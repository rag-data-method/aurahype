<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="db" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <circle cx="5" cy="5" r="3" fill="#000"/>
      <animateTransform attributeName="patternTransform" type="translate" values="0,0; 20,0; 0,0" dur="4s" repeatCount="indefinite"/>
    </pattern>
    <pattern id="dr" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <circle cx="5" cy="5" r="3" fill="#FF0000"/>
      <animateTransform attributeName="patternTransform" type="translate" values="0,0; -20,0; 0,0" dur="5s" repeatCount="indefinite"/>
    </pattern>
    <pattern id="dw" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4" fill="#FFF"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="#00FFFF"/>

  <!-- Halftone Sky Discs -->
  <circle cx="300" cy="300" r="140" fill="url(#db)" opacity="0.3">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1200" cy="600" r="180" fill="url(#dr)" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.9;0.25" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="150" r="90" fill="url(#db)" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1400" cy="500" r="110" fill="url(#dr)" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Sun -->
  <g transform="translate(1350,180)">
    <g>
      <circle r="100" fill="#FFE100" stroke="#000" stroke-width="8"/>
      <g stroke="#000" stroke-width="8" stroke-linecap="round">
        <line x1="0" y1="-130" x2="0" y2="-190"/>
        <line x1="92" y1="-92" x2="134" y2="-134"/>
        <line x1="130" y1="0" x2="190" y2="0"/>
        <line x1="92" y1="92" x2="134" y2="134"/>
        <line x1="0" y1="130" x2="0" y2="190"/>
        <line x1="-92" y1="92" x2="-134" y2="134"/>
        <line x1="-130" y1="0" x2="-190" y2="0"/>
        <line x1="-92" y1="-92" x2="-134" y2="-134"/>
      </g>
      <circle r="80" fill="url(#dr)"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.12;1" dur="3s" repeatCount="indefinite"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/>
  </g>

  <!-- Action Speed Lines (Left) -->
  <g transform="translate(120,500)" stroke="#000" stroke-width="10" stroke-linecap="round">
    <line x1="0" y1="-80" x2="200" y2="-140"/>
    <line x1="0" y1="-20" x2="240" y2="-60"/>
    <line x1="0" y1="40" x2="220" y2="40"/>
    <line x1="0" y1="100" x2="180" y2="160"/>
    <animateTransform attributeName="transform" type="translate" values="120,500; 200,500; 120,500" dur="0.8s" repeatCount="indefinite"/>
  </g>

  <!-- Comic Star Bursts -->
  <g transform="translate(250,250)">
    <polygon points="0,-45 14,-14 45,0 14,14 0,45 -14,14 -45,0 -14,-14" fill="#FF0000" stroke="#000" stroke-width="5">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="12s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(1400,780)">
    <polygon points="0,-35 10,-10 35,0 10,10 0,35 -10,10 -35,0 -10,-10" fill="#FFE100" stroke="#000" stroke-width="4">
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="9s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Water Bands -->
  <path d="M -200,520 Q 200,450 600,520 Q 1000,590 1400,520 Q 1800,450 2200,520 V 640 H -200 Z" fill="#FFE100" stroke="#000" stroke-width="10">
    <animateTransform attributeName="transform" type="translate" values="0,0; -60,0; 0,0" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <path d="M -200,640 Q 200,570 600,640 Q 1000,710 1400,640 Q 1800,570 2200,640 V 760 H -200 Z" fill="#FF00FF" stroke="#000" stroke-width="10">
    <animateTransform attributeName="transform" type="translate" values="0,0; 60,0; 0,0" dur="4.5s" repeatCount="indefinite"/>
  </path>
  <path d="M -200,760 Q 200,690 600,760 Q 1000,830 1400,760 Q 1800,690 2200,760 V 900 H -200 Z" fill="#FF0000" stroke="#000" stroke-width="10">
    <animateTransform attributeName="transform" type="translate" values="0,0; -40,0; 0,0" dur="5.5s" repeatCount="indefinite"/>
  </path>

  <!-- Water Speed Lines -->
  <g transform="translate(400,600)" stroke="#000" stroke-width="6" stroke-linecap="round">
    <line x1="0" y1="0" x2="40" y2="-10"/>
    <line x1="10" y1="15" x2="50" y2="5"/>
    <line x1="60" y1="-5" x2="100" y2="-15"/>
    <animateTransform attributeName="transform" type="translate" values="400,600; 480,600; 400,600" dur="0.9s" repeatCount="indefinite"/>
  </g>

  <!-- Sailboat -->
  <g transform="translate(800,520)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-2 0 0; 2 0 0; -2 0 0" dur="2.5s" repeatCount="indefinite" additive="sum"/>

      <!-- Hull -->
      <path d="M -180,0 Q 0,150 180,0 Q 0,50 -180,0 Z" fill="#FFF" stroke="#000" stroke-width="10"/>
      <path d="M -140,40 Q 0,110 140,40" fill="none" stroke="#FF0000" stroke-width="14" stroke-linecap="round">
        <animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="3s" repeatCount="indefinite"/>
      </path>

      <!-- Mast & Boom -->
      <line x1="0" y1="0" x2="0" y2="-400" stroke="#000" stroke-width="10"/>
      <line x1="0" y1="-100" x2="170" y2="-100" stroke="#000" stroke-width="8"/>

      <!-- Main Sail -->
      <path d="M 0,-390 L 0,-100 L 170,-100 Z" fill="#FF00FF" stroke="#000" stroke-width="8"/>
      <path d="M 20,-370 L 20,-120 L 130,-120 Z" fill="url(#db)"/>

      <!-- Jib Sail -->
      <path d="M 0,-390 L -140,-80 L 0,-80 Z" fill="#FFE100" stroke="#000" stroke-width="8"/>
      <path d="M -15,-360 L -120,-95 L -15,-95 Z" fill="url(#dr)"/>

      <!-- Flag -->
      <path d="M 0,-400 L 60,-385 L 0,-370 Z" fill="#FF0000" stroke="#000" stroke-width="4">
        <animateTransform attributeName="transform" type="rotate" values="0 0 -400; 12 0 -400; 0 0 -400" dur="0.5s" repeatCount="indefinite"/>
      </path>

      <!-- Mast Light -->
      <circle cx="0" cy="-405" r="12" fill="#FF0000" stroke="#000" stroke-width="4">
        <animate attributeName="r" values="12;22;12" dur="1.2s" repeatCount="indefinite"/>
      </circle>

      <!-- Splashes -->
      <g transform="translate(170,20)">
        <line x1="0" y1="0" x2="50" y2="-30" stroke="#000" stroke-width="8" stroke-linecap="round">
          <animateTransform attributeName="transform" type="scale" values="1;1.5;1" dur="0.7s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="10" x2="40" y2="25" stroke="#000" stroke-width="8" stroke-linecap="round">
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="0.6s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>
  </g>

  <!-- Reflection -->
  <g transform="translate(800,660) scale(1,-1)" opacity="0.25">
    <path d="M -180,0 Q 0,150 180,0 Q 0,50 -180,0 Z" fill="#000"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Floating Dots -->
  <circle cx="500" cy="700" r="50" fill="url(#db)">
    <animate attributeName="r" values="50;70;50" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="350" r="40" fill="url(#dr)">
    <animate attributeName="cy" values="350;320;350" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>