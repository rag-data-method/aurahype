<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Halftone Patterns -->
    <pattern id="ben-day-small" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2" fill="#000"/>
    </pattern>
    <pattern id="ben-day-medium" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="4" fill="#000"/>
    </pattern>
    <pattern id="ben-day-large" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="7" fill="#000"/>
    </pattern>
    
    <!-- Halftone Masks -->
    <mask id="mask-small">
      <rect width="100%" height="100%" fill="url(#ben-day-small)"/>
    </mask>
    <mask id="mask-medium">
      <rect width="100%" height="100%" fill="url(#ben-day-medium)"/>
    </mask>
    <mask id="mask-large">
      <rect width="100%" height="100%" fill="url(#ben-day-large)"/>
    </mask>

    <!-- Pop Art Gradients -->
    <radialGradient id="candy-grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="40%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#D50000"/>
    </radialGradient>
    
    <linearGradient id="lip-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Lip Paths -->
    <path id="upper-lip-base" d="M 250 450 Q 450 580 650 485 Q 750 430 850 450 Q 1050 380 1200 450 Q 1100 350 850 320 Q 650 300 450 350 Q 200 380 250 450 Z" />
    <path id="upper-lip-inner" d="M 350 420 Q 500 460 650 430 Q 800 380 950 390 Q 850 350 700 360 Q 500 380 350 420 Z" />
    <path id="lower-lip-base" d="M 300 500 Q 450 680 650 650 Q 850 620 1100 680 Q 1250 550 1150 500 Q 1000 460 850 480 Q 600 510 300 500 Z" />
    <path id="lower-lip-inner" d="M 350 540 Q 550 600 750 570 Q 950 540 1050 560 Q 900 520 650 530 Q 450 540 350 540 Z" />
  
    <!-- Candy Shape -->
    <g id="candy-shape">
      <path d="M 0 0 C -60 -60, -140 -60, -180 0 C -140 60, -60 60, 0 0 Z" fill="url(#candy-grad)" stroke="#000" stroke-width="8"/>
      <path d="M 0 0 C 60 -60, 140 -60, 180 0 C 140 60, 60 60, 0 0 Z" fill="url(#candy-grad)" stroke="#000" stroke-width="8"/>
      <ellipse cx="0" cy="0" rx="70" ry="70" fill="#FF1744" stroke="#000" stroke-width="8"/>
      <path d="M -65 -30 L -120 -80 M -40 -50 L -70 -110 M 65 -30 L 120 -80 M 40 -50 L 70 -110 M -65 30 L -120 80 M -40 50 L -70 110 M 65 30 L 120 80 M 40 50 L 70 110" stroke="#FFF" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- Comic Action Lines -->
    <g id="action-lines">
      <path d="M 800 100 L 800 250 M 400 200 L 500 300 M 1200 200 L 1100 300 M 200 450 L 350 450 M 1400 450 L 1250 450 M 400 700 L 500 600 M 1200 700 L 1100 600 M 800 800 L 800 650" stroke="#000" stroke-width="12" stroke-linecap="round"/>
      <circle cx="200" cy="200" r="25" fill="#000"/>
      <circle cx="1400" cy="200" r="35" fill="#000"/>
      <circle cx="200" cy="700" r="30" fill="#000"/>
      <circle cx="1400" cy="700" r="20" fill="#000"/>
    </g>
  </defs>

  <!-- Audio/Visual Default: Base Background -->
  <rect width="100%" height="100%" fill="#00E5FF"/>

  <!-- Animated Background Shapes (Warhol Color Switching) -->
  <g id="bg-shapes">
    <rect x="0" y="0" width="800" height="450" fill="#FF1744">
      <animateColor attributeName="fill" values="#FF1744;#FFFF00;#FF1744" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="800" y="0" width="800" height="450" fill="#FFFF00">
      <animateColor attributeName="fill" values="#FFFF00;#00E5FF;#FFFF00" dur="4s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="0" y="450" width="800" height="450" fill="#00E5FF">
      <animateColor attributeName="fill" values="#00E5FF;#FF1744;#00E5FF" dur="4s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <rect x="800" y="450" width="800" height="450" fill="#FF1744">
      <animateColor attributeName="fill" values="#FF1744;#FFFF00;#FF1744" dur="4s" repeatCount="indefinite" begin="3s"/>
    </rect>
  </g>

  <!-- Halftone Background Overlay -->
  <rect width="100%" height="100%" fill="#000" mask="url(#mask-small)" opacity="0.1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 12,12; 0,0" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Action Lines Layer -->
  <g transform="translate(800, 450) scale(1)">
    <g>
      <use href="#action-lines" stroke="#FFF" stroke-width="20"/>
      <use href="#action-lines" stroke="#000" stroke-width="12"/>
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite"/>
    </g>
    <g opacity="0.5">
      <use href="#action-lines" stroke="#FFF" stroke-width="30"/>
      <use href="#action-lines" stroke="#000" stroke-width="18"/>
      <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="25s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Main Subject: Lips & Candy -->
  <g id="main-subject">
    
    <!-- Floating Candy Pieces (Bitten Off) -->
    <g id="floating-candy-1" transform="translate(300, 200) rotate(-30) scale(0.4)">
      <use href="#candy-shape"/>
      <animateTransform attributeName="transform" type="translate" values="300 200; 100 50; 300 200" dur="6s" repeatCount="indefinite"/>
    </g>
    <g id="floating-candy-2" transform="translate(1300, 150) rotate(45) scale(0.3)">
      <use href="#candy-shape"/>
      <animateTransform attributeName="transform" type="translate" values="1300 150; 1450 100; 1300 150" dur="5s" repeatCount="indefinite"/>
    </g>
    <g id="floating-candy-3" transform="translate(400, 750) rotate(15) scale(0.5)">
      <use href="#candy-shape"/>
      <animateTransform attributeName="transform" type="translate" values="400 750; 200 800; 400 750" dur="7s" repeatCount="indefinite"/>
    </g>

    <!-- Candy Inside Mouth (Bitten) -->
    <g id="center-candy" transform="translate(800, 450) scale(1.1)">
      <g>
        <use href="#candy-shape"/>
        <!-- Candy Bite Animation -->
        <circle cx="-40" cy="-40" r="0" fill="#FFF" stroke="#000" stroke-width="6">
          <animate attributeName="r" values="0; 45; 0" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="50" cy="-30" r="0" fill="#FFF" stroke="#000" stroke-width="6">
          <animate attributeName="r" values="0; 35; 0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
        <circle cx="0" cy="50" r="0" fill="#FFF" stroke="#000" stroke-width="6">
          <animate attributeName="r" values="0; 40; 0" dur="2s" repeatCount="indefinite" begin="1s"/>
        </circle>
        
        <!-- Giant Bite on Right Side -->
        <circle cx="80" cy="0" r="0" fill="#00E5FF" stroke="#000" stroke-width="6">
          <animate attributeName="r" values="0; 70; 0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
        </circle>
      </g>
      
      <!-- Candy Rotation & Pulse -->
      <animateTransform attributeName="transform" type="rotate" values="0; 10; 0; -10; 0" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1.1; 1.15; 1.1" dur="1s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Lower Lip Shadow -->
    <use href="#lower-lip-base" transform="translate(15, 25)" fill="#000" opacity="0.8"/>

    <!-- Lower Lip Base -->
    <g id="lower-lip">
      <use href="#lower-lip-base" fill="#FF1744">
        <animateColor attributeName="fill" values="#FF1744;#D50000;#FF1744" dur="2s" repeatCount="indefinite"/>
      </use>
      <!-- Lower Lip Halftone -->
      <use href="#lower-lip-base" fill="#000" mask="url(#mask-medium)" opacity="0.4"/>
      <!-- Lower Lip Inner Dark Area -->
      <use href="#lower-lip-inner" fill="#8B0000"/>
      <!-- Lower Lip Highlight -->
      <path d="M 450 580 Q 650 620 850 590" stroke="#FFF" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.8"/>
    </g>

    <!-- Upper Lip Shadow -->
    <use href="#upper-lip-base" transform="translate(15, 20)" fill="#000" opacity="0.8"/>

    <!-- Upper Lip Base -->
    <g id="upper-lip">
      <use href="#upper-lip-base" fill="#D50000">
        <animateColor attributeName="fill" values="#D50000;#FF1744;#D50000" dur="2s" repeatCount="indefinite"/>
      </use>
      <!-- Upper Lip Halftone -->
      <use href="#upper-lip-base" fill="#000" mask="url(#mask-medium)" opacity="0.3"/>
      <!-- Upper Lip Inner Dark Area -->
      <use href="#upper-lip-inner" fill="#8B0000"/>
      <!-- Upper Lip Highlight -->
      <path d="M 500 380 Q 650 340 800 360" stroke="#FFF" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.8"/>
    </g>

    <!-- Lip Chewing Animation -->
    <animateTransform href="#upper-lip" attributeName="transform" type="translate" values="0,0; 0,15; 0,0" dur="1s" repeatCount="indefinite"/>
    <animateTransform href="#lower-lip" attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="1s" repeatCount="indefinite"/>

  </g>

  <!-- Comic Text / Sound Effects (POW, YUM) -->
  <g id="comic-text" transform="translate(800, 450)">
    <g transform="translate(-500, -250) rotate(-15)">
      <text x="0" y="0" font-family="Impact, Arial Black, sans-serif" font-size="120" fill="#FFFF00" stroke="#000" stroke-width="8" text-anchor="middle">YUM!</text>
      <animateTransform attributeName="transform" type="scale" values="1; 1.3; 1" dur="0.5s" repeatCount="indefinite"/>
    </g>
    
    <g transform="translate(500, -300) rotate(15)">
      <text x="0" y="0" font-family="Impact, Arial Black, sans-serif" font-size="140" fill="#FF1744" stroke="#000" stroke-width="8" text-anchor="middle">POP!</text>
      <animateTransform attributeName="transform" type="scale" values="1; 1.2; 1" dur="0.6s" repeatCount="indefinite" begin="0.2s"/>
    </g>

    <g transform="translate(-550, 300) rotate(10)">
      <text x="0" y="0" font-family="Impact, Arial Black, sans-serif" font-size="100" fill="#00E5FF" stroke="#000" stroke-width="6" text-anchor="middle">CRUNCH!</text>
      <animateTransform attributeName="transform" type="scale" values="1; 1.4; 1" dur="0.4s" repeatCount="indefinite" begin="0.4s"/>
    </g>

    <g transform="translate(550, 350) rotate(-10)">
      <text x="0" y="0" font-family="Impact, Arial Black, sans-serif" font-size="110" fill="#FFFF00" stroke="#000" stroke-width="6" text-anchor="middle">SWEET!</text>
      <animateTransform attributeName="transform" type="scale" values="1; 1.25; 1" dur="0.7s" repeatCount="indefinite" begin="0.1s"/>
    </g>
  </g>

  <!-- Floating Ben-Day Dots (Sparkles) -->
  <g id="sparkles">
    <circle cx="100" cy="100" r="15" fill="#FFFF00" stroke="#000" stroke-width="4">
      <animate attributeName="r" values="15; 0; 15" dur="2s" repeatCount="indefinite"/>
      <animateColor attributeName="fill" values="#FFFF00;#FF1744;#00E5FF;#FFFF00" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="100" r="20" fill="#00E5FF" stroke="#000" stroke-width="4">
      <animate attributeName="r" values="20; 0; 20" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      <animateColor attributeName="fill" values="#00E5FF;#FFFF00;#FF1744;#00E5FF" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="800" r="25" fill="#FF1744" stroke="#000" stroke-width="4">
      <animate attributeName="r" values="25; 0; 25" dur="3s" repeatCount="indefinite" begin="1s"/>
      <animateColor attributeName="fill" values="#FF1744;#00E5FF;#FFFF00;#FF1744" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="750" r="18" fill="#FFFF00" stroke="#000" stroke-width="4">
      <animate attributeName="r" values="18; 0; 18" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
      <animateColor attributeName="fill" values="#FFFF00;#FF1744;#00E5FF;#FFFF00" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="50" r="30" fill="#FF1744" stroke="#000" stroke-width="4">
      <animate attributeName="r" values="30; 0; 30" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
      <animateColor attributeName="fill" values="#FF1744;#FFFF00;#00E5FF;#FF1744" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="850" r="22" fill="#00E5FF" stroke="#000" stroke-width="4">
      <animate attributeName="r" values="22; 0; 22" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
      <animateColor attributeName="fill" values="#00E5FF;#FF1744;#FFFF00;#00E5FF" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Border Frame (Comic Book Style) -->
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#000" stroke-width="20"/>
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#FFFF00" stroke-width="10">
    <animateColor attributeName="stroke" values="#FFFF00;#FF1744;#00E5FF;#FFFF00" dur="4s" repeatCount="indefinite"/>
  </rect>

</svg>