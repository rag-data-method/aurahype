<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Pop Colors -->
    <solidColor id="c-black" solid-color="#0a0a0a"/>
    <solidColor id="c-yellow" solid-color="#FFEA00"/>
    <solidColor id="c-cyan" solid-color="#00E5FF"/>
    <solidColor id="c-magenta" solid-color="#D500F9"/>
    <solidColor id="c-red" solid-color="#FF1744"/>
    <solidColor id="c-blue" solid-color="#2979FF"/>
    <solidColor id="c-white" solid-color="#FFFFFF"/>

    <!-- HALFTONE PATTERNS -->
    <pattern id="dots-black" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.5" fill="#0a0a0a"/>
    </pattern>
    <pattern id="dots-red" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="3.5" fill="#FF1744"/>
    </pattern>
    <pattern id="dots-yellow" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2" fill="#FFEA00"/>
    </pattern>
    <pattern id="dots-cyan" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="3" fill="#00E5FF"/>
    </pattern>

    <!-- Halftone Shadow Mask (using black dots over a lighter base to create a printed shadow look) -->
    <mask id="halftone-shadow-mask">
      <rect width="100%" height="100%" fill="white"/>
      <circle cx="0" cy="0" r="200" fill="url(#dots-black)">
        <animateTransform attributeName="transform" type="scale" values="1;1.5;1" dur="4.2s" repeatCount="indefinite"/>
      </circle>
    </mask>

    <!-- FILTERS for flat cartoon feel and thick borders -->
    <filter id="shadow-offset" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="15" dy="25" in="SourceAlpha" result="off"/>
      <feFlood flood-color="#0a0a0a" result="color"/>
      <feComposite in="color" in2="off" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- GUMMY BEAR GEOMETRY -->
    <!-- Centered roughly around 0,0 for easy reuse -->
    <g id="bear-geo">
      <!-- Ears -->
      <circle cx="-130" cy="-220" r="55"/>
      <circle cx="130" cy="-220" r="55"/>
      <!-- Head -->
      <ellipse cx="0" cy="-100" rx="160" ry="140"/>
      <!-- Body -->
      <ellipse cx="0" cy="130" rx="140" ry="180"/>
      <!-- Snout -->
      <ellipse cx="0" cy="-80" rx="75" ry="55"/>
      <!-- Arms -->
      <ellipse cx="-150" cy="50" rx="45" ry="90" transform="rotate(25 -150 50)"/>
      <ellipse cx="150" cy="50" rx="45" ry="90" transform="rotate(-25 150 50)"/>
      <!-- Legs -->
      <ellipse cx="-90" cy="280" rx="55" ry="70" transform="rotate(15 -90 280)"/>
      <ellipse cx="90" cy="280" rx="55" ry="70" transform="rotate(-15 90 280)"/>
      
      <!-- Facial Features -->
      <!-- Eyes -->
      <circle cx="-60" cy="-130" r="18" fill="#0a0a0a"/>
      <circle cx="60" cy="-130" r="18" fill="#0a0a0a"/>
      <!-- Nose -->
      <ellipse cx="0" cy="-105" rx="25" ry="18" fill="#0a0a0a"/>
      <!-- Mouth (Smile) -->
      <path d="M -40,-60 Q 0,-20 40,-60" fill="none" stroke="#0a0a0a" stroke-width="12" stroke-linecap="round"/>
      <!-- Belly Patch -->
      <ellipse cx="0" cy="160" rx="80" ry="100" fill="#FFFFFF" opacity="0.6"/>
      <!-- Shiny Highlights (The 'Gummy' Look) -->
      <path d="M -100,-180 Q -60,-220 0,-220" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
      <ellipse cx="-80" cy="100" rx="20" ry="40" fill="#FFFFFF" opacity="0.5" transform="rotate(-20)"/>
    </g>

    <!-- Comic Action Lines -->
    <g id="action-lines">
      <line x1="-400" y1="-400" x2="-250" y2="-250" stroke="#0a0a0a" stroke-width="8"/>
      <line x1="-350" y1="-450" x2="-200" y2="-300" stroke="#0a0a0a" stroke-width="8"/>
      <line x1="400" y1="-400" x2="250" y2="-250" stroke="#0a0a0a" stroke-width="8"/>
      <line x1="350" y1="-450" x2="200" y2="-300" stroke="#0a0a0a" stroke-width="8"/>
      <circle cx="-280" cy="-280" r="15" fill="#0a0a0a"/>
      <circle cx="280" cy="-280" r="15" fill="#0a0a0a"/>
    </g>

    <!-- Comic Burst Star -->
    <path id="star-burst" d="M 0,-100 L 20,-30 L 90,-20 L 40,20 L 60,90 L 0,50 L -60,90 L -40,20 L -90,-20 L -20,-30 Z" fill="#FFEA00" stroke="#0a0a0a" stroke-width="6"/>
  </defs>

  <!-- BACKGROUND SPLIT (Triptych) -->
  <!-- Left: Magenta Background -->
  <rect x="0" y="0" width="533" height="900" fill="#D500F9"/>
  <rect x="0" y="0" width="533" height="900" fill="url(#dots-black)" opacity="0.15">
    <animateTransform attributeName="transform" type="rotate" from="0 266 450" to="360 266 450" dur="60s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Center: Cyan Background -->
  <rect x="533" y="0" width="534" height="900" fill="#00E5FF"/>
  <rect x="533" y="0" width="534" height="900" fill="url(#dots-red)" opacity="0.2">
    <animateTransform attributeName="transform" type="rotate" from="360 800 450" to="0 800 450" dur="45s" repeatCount="indefinite"/>
  </rect>

  <!-- Right: Bright Yellow Background -->
  <rect x="1067" y="0" width="533" height="900" fill="#FFEA00"/>
  <rect x="1067" y="0" width="533" height="900" fill="url(#dots-cyan)" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 1333 450" to="360 1333 450" dur="55s" repeatCount="indefinite"/>
  </rect>

  <!-- Thick Vertical Dividers -->
  <rect x="528" y="0" width="10" height="900" fill="#0a0a0a"/>
  <rect x="1062" y="0" width="10" height="900" fill="#0a0a0a"/>

  <!-- ========================================== -->
  <!-- LEFT BEAR (YELLOW) -->
  <!-- ========================================== -->
  <g transform="translate(266, 480)">
    <use href="#action-lines" transform="scale(1.2)">
      <animateTransform attributeName="transform" type="scale" values="1.1;1.3;1.1" dur="2.5s" repeatCount="indefinite"/>
    </use>
    
    <g filter="url(#shadow-offset)">
      <!-- Main Body Color -->
      <use href="#bear-geo" fill="#FFEA00" stroke="#0a0a0a" stroke-width="12"/>
      <!-- Halftone Shadow Overlay -->
      <use href="#bear-geo" fill="url(#dots-black)" opacity="0.4" transform="translate(20, 30)"/>
    </g>

    <!-- Floating Animation -->
    <animateTransform attributeName="transform" type="translate" values="266,480; 266,430; 266,480" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>

    <!-- Star Burst -->
    <use href="#star-burst" x="-180" y="-350" transform="scale(0)">
      <animateTransform attributeName="transform" type="scale" values="0;1.2;0" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0 -180 -350" to="360 -180 -350" dur="3s" repeatCount="indefinite" additive="sum"/>
    </use>
  </g>

  <!-- ========================================== -->
  <!-- CENTER BEAR (MAGENTA) -->
  <!-- ========================================== -->
  <g transform="translate(800, 480)">
    <use href="#action-lines" transform="scale(1.2)">
      <animateTransform attributeName="transform" type="scale" values="1.2;1.4;1.2" dur="2.2s" repeatCount="indefinite"/>
    </use>
    
    <g filter="url(#shadow-offset)">
      <use href="#bear-geo" fill="#D500F9" stroke="#0a0a0a" stroke-width="12"/>
      <use href="#bear-geo" fill="url(#dots-black)" opacity="0.4" transform="translate(20, 30)"/>
    </g>

    <!-- Floating Animation (Offset) -->
    <animateTransform attributeName="transform" type="translate" values="800,480; 800,420; 800,480" dur="4.5s" begin="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>

    <!-- Star Burst -->
    <use href="#star-burst" x="200" y="-300" fill="#FF1744" transform="scale(0)">
      <animateTransform attributeName="transform" type="scale" values="0;1.5;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- ========================================== -->
  <!-- RIGHT BEAR (CYAN) -->
  <!-- ========================================== -->
  <g transform="translate(1334, 480)">
    <use href="#action-lines" transform="scale(1.2)">
      <animateTransform attributeName="transform" type="scale" values="1.15;1.35;1.15" dur="2.8s" repeatCount="indefinite"/>
    </use>
    
    <g filter="url(#shadow-offset)">
      <use href="#bear-geo" fill="#00E5FF" stroke="#0a0a0a" stroke-width="12"/>
      <use href="#bear-geo" fill="url(#dots-black)" opacity="0.4" transform="translate(20, 30)"/>
    </g>

    <!-- Floating Animation (Offset) -->
    <animateTransform attributeName="transform" type="translate" values="1334,480; 1334,440; 1334,480" dur="3.8s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>

    <!-- Star Burst -->
    <use href="#star-burst" x="-220" y="-280" fill="#FFEA00" transform="scale(0)">
      <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.5s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0 -220 -280" to="-360 -220 -280" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </use>
  </g>

  <!-- ========================================== -->
  <!-- FOREGROUND ELEMENTS -->
  <!-- ========================================== -->
  
  <!-- Comic Book Text Bubbles -->
  <g transform="translate(100, 150)">
    <path d="M 0,0 Q 150,-50 300,0 Q 350,100 300,200 Q 150,250 0,200 Q -50,100 0,0 Z" fill="#FFFFFF" stroke="#0a0a0a" stroke-width="8"/>
    <!-- Animated Text -->
    <text x="150" y="110" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="60" text-anchor="middle" fill="#0a0a0a">POP!</text>
    <animateTransform attributeName="transform" type="rotate" values="-5 100 150; 5 100 150; -5 100 150" dur="3s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(1300, 700)">
    <path d="M 0,0 Q 120,-40 240,0 Q 280,80 240,160 Q 120,200 0,160 Q -40,80 0,0 Z" fill="#FF1744" stroke="#0a0a0a" stroke-width="8"/>
    <text x="120" y="90" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="40" text-anchor="middle" fill="#FFFFFF">SUGAR</text>
    <text x="120" y="130" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="40" text-anchor="middle" fill="#FFFFFF">RUSH</text>
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(800, 50)">
    <path d="M 0,0 L 60,120 L 30,120 L 50,200 L -20,100 L 10,100 Z" fill="#FFEA00" stroke="#0a0a0a" stroke-width="6"/>
    <animateTransform attributeName="transform" type="translate" values="800,50; 800,30; 800,50" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Floating Dots / Sprinkles -->
  <g fill="#0a0a0a">
    <circle cx="200" cy="800" r="15">
      <animate attributeName="cy" values="800;750;800" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="200;220;200" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="100" r="12" fill="#FF1744">
      <animate attributeName="cy" values="100;150;100" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="800" r="18" fill="#00E5FF">
      <animate attributeName="cy" values="800;820;800" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="850" r="10" fill="#D500F9">
      <animate attributeName="cx" values="1100;1120;1100" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

</svg>