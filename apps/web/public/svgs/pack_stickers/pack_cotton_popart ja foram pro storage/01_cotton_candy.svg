<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Diagonal Split Mask -->
    <clipPath id="bg-split">
      <polygon points="0,0 1600,0 1600,900 0,900"/>
    </clipPath>
    
    <!-- Halftone Dot Patterns -->
    <pattern id="dot-small" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.5" fill="#000000"/>
    </pattern>
    <pattern id="dot-large" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="6" fill="#000000"/>
    </pattern>
    <pattern id="dot-mega" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="12" fill="#000000"/>
    </pattern>
    <pattern id="dot-white" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="3" fill="#ffffff"/>
    </pattern>
    
    <!-- Ben-Day Dot Clip Paths for Cotton Candy -->
    <clipPath id="candy-clip">
      <ellipse cx="800" cy="420" rx="280" ry="320"/>
    </clipPath>
    
    <!-- Stick Gradient (Flat, but technically a gradient for comic shading style) -->
    <linearGradient id="stick-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE600"/>
      <stop offset="100%" stop-color="#FFAE00"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND: Diagonal Split with Halftones -->
  <g clip-path="url(#bg-split)">
    <!-- Cyan Half -->
    <rect x="0" y="0" width="1600" height="900" fill="#00E5FF"/>
    <!-- Magenta Half -->
    <polygon points="0,900 1600,0 1600,900" fill="#FF00CC"/>
    
    <!-- Cyan Side Halftones -->
    <circle cx="200" cy="200" r="150" fill="url(#dot-small)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="700" r="200" fill="url(#dot-large)" opacity="0.2"/>
    
    <!-- Magenta Side Halftones -->
    <circle cx="1300" cy="200" r="180" fill="url(#dot-white)" opacity="0.4">
      <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="3s" repeatCount="indefinite" additive="sum"/>
    </circle>
    <circle cx="300" cy="750" r="120" fill="url(#dot-white)" opacity="0.3"/>
  </g>

  <!-- FLOATING GEOMETRIC SHAPES (Background) -->
  <g>
    <rect x="150" y="150" width="80" height="80" fill="#FFE600" stroke="#000" stroke-width="6" transform="rotate(15 190 190)">
      <animateTransform attributeName="transform" type="rotate" from="15 190 190" to="375 190 190" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <polygon points="1400,150 1450,250 1350,250" fill="#FF0044" stroke="#000" stroke-width="6">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,20; 0,0" dur="3s" repeatCount="indefinite"/>
    </polygon>
    
    <circle cx="200" cy="750" r="40" fill="none" stroke="#000" stroke-width="6" stroke-dasharray="10,5">
      <animateTransform attributeName="transform" type="rotate" from="0 200 750" to="360 200 750" dur="8s" repeatCount="indefinite"/>
    </circle>

    <rect x="1350" y="650" width="120" height="40" fill="#00E5FF" stroke="#000" stroke-width="6" transform="rotate(-10 1410 670)">
      <animateTransform attributeName="transform" type="rotate" from="-10 1410 670" to="-370 1410 670" dur="15s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- COMIC ACTION LINES -->
  <g stroke="#000" stroke-width="6" stroke-linecap="round">
    <!-- Top Left Burst -->
    <path d="M 600,200 L 500,100" />
    <path d="M 650,180 L 580,80" />
    <path d="M 700,170 L 660,70" />
    <!-- Bottom Right Burst -->
    <path d="M 1000,700 L 1100,800" />
    <path d="M 950,720 L 1020,820" />
    <path d="M 900,730 L 940,830" />
    
    <!-- Animated Action Lines -->
    <g>
      <line x1="400" y1="300" x2="300" y2="200" stroke-width="8">
        <animate attributeName="x2" values="300;280;300" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="200;180;200" dur="1s" repeatCount="indefinite"/>
      </line>
      <line x1="1200" y1="600" x2="1300" y2="700" stroke-width="8">
        <animate attributeName="x2" values="1300;1320;1300" dur="1.2s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="700;720;700" dur="1.2s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- SHADOW -->
  <ellipse cx="800" cy="780" rx="100" ry="20" fill="#000000" opacity="0.3">
    <animate attributeName="rx" values="100;120;100" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- COTTON CANDY STICK -->
  <g id="stick">
    <!-- Stick Shape -->
    <path d="M 790,750 L 810,750 L 820,380 L 780,380 Z" fill="url(#stick-grad)" stroke="#000" stroke-width="8" stroke-linejoin="round"/>
    <!-- Stick Shadow/Highlight -->
    <path d="M 790,750 L 800,750 L 805,380 L 780,380 Z" fill="none" stroke="#FF0044" stroke-width="4" opacity="0.5"/>
    <!-- Stick Base -->
    <ellipse cx="800" cy="750" rx="15" ry="8" fill="#FFAE00" stroke="#000" stroke-width="6"/>
  </g>

  <!-- COTTON CANDY MAIN BODY -->
  <g id="candy-body">
    <!-- Base Mass (Cyan) -->
    <ellipse cx="800" cy="420" rx="280" ry="320" fill="#00E5FF" stroke="#000" stroke-width="10"/>
    
    <!-- Halftone Pattern Overlay (Cyan) -->
    <ellipse cx="800" cy="420" rx="280" ry="320" fill="url(#dot-white)" opacity="0.4"/>
    
    <!-- Puff Layers (Neon Pink) -->
    <!-- Layer 1 -->
    <ellipse cx="800" cy="420" rx="240" ry="280" fill="#FF00CC" stroke="#000" stroke-width="8">
      <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="4s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    
    <!-- Layer 2 -->
    <ellipse cx="780" cy="400" rx="200" ry="240" fill="#FF33DD" stroke="#000" stroke-width="8">
      <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="3.5s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    
    <!-- Layer 3 -->
    <ellipse cx="820" cy="440" rx="160" ry="200" fill="#FF00CC" stroke="#000" stroke-width="8">
      <animateTransform attributeName="transform" type="scale" values="1;1.04;1" dur="5s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    
    <!-- Layer 4 -->
    <ellipse cx="800" cy="420" rx="130" ry="160" fill="#FF66EE" stroke="#000" stroke-width="8">
      <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="4.5s" repeatCount="indefinite" additive="sum"/>
    </ellipse>

    <!-- Highlight Puffs (White with Ben-Day Dots) -->
    <g clip-path="url(#candy-clip)">
      <ellipse cx="750" cy="350" rx="80" ry="100" fill="#FFFFFF" opacity="0.9"/>
      <ellipse cx="750" cy="350" rx="80" ry="100" fill="url(#dot-small)" opacity="0.2"/>
      
      <ellipse cx="850" cy="500" rx="60" ry="80" fill="#FFFFFF" opacity="0.8"/>
      <ellipse cx="850" cy="500" rx="60" ry="80" fill="url(#dot-small)" opacity="0.2"/>
      
      <ellipse cx="700" cy="480" rx="50" ry="70" fill="#FFFFFF" opacity="0.7"/>
      
      <!-- Floating Dots on Candy -->
      <circle cx="720" cy="320" r="15" fill="#FFE600" stroke="#000" stroke-width="4">
        <animate attributeName="cy" values="320;310;320" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="880" cy="550" r="12" fill="#00E5FF" stroke="#000" stroke-width="4">
        <animate attributeName="cy" values="550;560;550" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="780" cy="280" r="18" fill="#FF0044" stroke="#000" stroke-width="4">
        <animate attributeName="cy" values="280;270;280" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- POP ART TEXT ELEMENTS -->
  <g font-family="Impact, Arial Black, sans-serif" font-weight="900" stroke="#000" stroke-width="4" paint-order="stroke">
    <!-- "SWEET" Text -->
    <text x="200" y="150" font-size="80" fill="#FF0044" transform="rotate(-10 200 150)">
      SWEET!
      <animate attributeName="x" values="200;220;200" dur="1s" repeatCount="indefinite"/>
    </text>
    
    <!-- "POP" Text -->
    <text x="1250" y="200" font-size="100" fill="#FFE600" transform="rotate(10 1250 200)">
      POP
      <animate attributeName="y" values="200;180;200" dur="1.5s" repeatCount="indefinite"/>
    </text>
    
    <!-- "SUGAR" Text -->
    <text x="150" y="800" font-size="90" fill="#00E5FF" transform="rotate(-5 150 800)">
      SUGAR
      <animate attributeName="x" values="150;170;150" dur="2s" repeatCount="indefinite"/>
    </text>
    
    <!-- "RUSH" Text -->
    <text x="1300" y="750" font-size="110" fill="#FF00CC" transform="rotate(5 1300 750)">
      RUSH
      <animate attributeName="y" values="750;730;750" dur="1.2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- FOREGROUND HALFTONE ACCENTS -->
  <g>
    <circle cx="100" cy="450" r="60" fill="url(#dot-mega)" opacity="0.8">
      <animate attributeName="r" values="60;70;60" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="1500" cy="450" r="80" fill="url(#dot-mega)" opacity="0.8">
      <animate attributeName="r" values="80;90;80" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ANIMATED COLOR FLASH OVERLAY (Warhol Style) -->
  <rect x="0" y="0" width="1600" height="900" fill="#FF0044" opacity="0" pointer-events="none" style="mix-blend-mode: multiply;">
    <animate attributeName="opacity" values="0;0;0.1;0;0" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="1600" height="900" fill="#00E5FF" opacity="0" pointer-events="none" style="mix-blend-mode: multiply;">
    <animate attributeName="opacity" values="0;0;0;0.1;0" dur="8s" repeatCount="indefinite"/>
  </rect>

</svg>