<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="6" dy="12" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Halftone Pattern for Retro Background -->
    <pattern id="halftone" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="4" fill="#FFD700" opacity="0.6"/>
    </pattern>

    <!-- Wheel Gradient -->
    <radialGradient id="wheelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#ff0066"/>
    </radialGradient>

    <!-- Chrome Gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b3b3b3"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b3b3b3"/>
    </linearGradient>

    <!-- Main Sticker Outline (Shared Path for Images) -->
    <path id="sticker-shape" d="
      M 380,150 
      C 450,150 480,200 470,280 
      C 460,340 450,400 470,450 
      C 500,520 520,550 550,590
      L 860,590 
      C 910,590 940,620 940,660 
      C 940,700 910,730 860,730 
      L 710,730
      C 710,770 680,800 640,800 
      C 600,800 570,770 570,730
      L 490,730
      C 490,770 460,800 420,800
      C 380,800 350,770 350,730
      L 270,730
      C 270,770 240,800 200,800
      C 160,800 130,770 130,730
      L 110,730
      C 70,730 50,690 60,630
      C 70,570 110,550 140,530
      L 280,450
      C 300,430 310,350 300,300
      C 290,200 320,150 380,150
      Z
    " />

    <clipPath id="sticker-clip">
      <use href="#sticker-shape" />
    </clipPath>

    <!-- Lightning Bolt -->
    <path id="bolt" d="M 0,-40 L 20,-10 L -10,-5 L 25,40 L -5,5 L 30,0 Z" />

    <!-- Sunburst Ray -->
    <path id="ray" d="M 500,500 L 480,-100 L 520,-100 Z" />
  </defs>

  <!-- Drop Shadow Layer -->
  <use href="#sticker-shape" fill="#000000" opacity="0.45" transform="translate(15, 25)" />

  <!-- Base White Border -->
  <use href="#sticker-shape" fill="#ffffff" stroke="none" />

  <!-- Main Illustration Content (Clipped to Sticker Shape) -->
  <g clip-path="url(#sticker-clip)">
    
    <!-- Background Starburst -->
    <g fill="#FFD700">
      <use href="#ray" transform="rotate(0, 500, 500)"/>
      <use href="#ray" transform="rotate(15, 500, 500)"/>
      <use href="#ray" transform="rotate(30, 500, 500)"/>
      <use href="#ray" transform="rotate(45, 500, 500)"/>
      <use href="#ray" transform="rotate(60, 500, 500)"/>
      <use href="#ray" transform="rotate(75, 500, 500)"/>
      <use href="#ray" transform="rotate(90, 500, 500)"/>
      <use href="#ray" transform="rotate(105, 500, 500)"/>
      <use href="#ray" transform="rotate(120, 500, 500)"/>
      <use href="#ray" transform="rotate(135, 500, 500)"/>
      <use href="#ray" transform="rotate(150, 500, 500)"/>
      <use href="#ray" transform="rotate(165, 500, 500)"/>
      <use href="#ray" transform="rotate(180, 500, 500)"/>
      <use href="#ray" transform="rotate(195, 500, 500)"/>
      <use href="#ray" transform="rotate(210, 500, 500)"/>
      <use href="#ray" transform="rotate(225, 500, 500)"/>
      <use href="#ray" transform="rotate(240, 500, 500)"/>
      <use href="#ray" transform="rotate(255, 500, 500)"/>
      <use href="#ray" transform="rotate(270, 500, 500)"/>
      <use href="#ray" transform="rotate(285, 500, 500)"/>
      <use href="#ray" transform="rotate(300, 500, 500)"/>
      <use href="#ray" transform="rotate(315, 500, 500)"/>
      <use href="#ray" transform="rotate(330, 500, 500)"/>
      <use href="#ray" transform="rotate(345, 500, 500)"/>
    </g>

    <!-- Halftone Overlay -->
    <rect x="0" y="0" width="1000" height="1000" fill="url(#halftone)"/>

    <!-- Bright Red Background Burst Circles -->
    <circle cx="500" cy="500" r="420" fill="#FF0055" />
    <circle cx="500" cy="500" r="360" fill="none" stroke="#00FFFF" stroke-width="15" stroke-dasharray="30 20" />
    <circle cx="500" cy="500" r="300" fill="none" stroke="#000000" stroke-width="6" />

    <!-- Skate Base Cyan Layer (The main boot body) -->
    <path d="
      M 380,150 
      C 450,150 480,200 470,280 
      C 460,340 450,400 470,450 
      C 500,520 520,550 550,590
      L 860,590 
      C 910,590 940,620 940,660 
      C 940,700 910,730 860,730 
      L 710,730
      C 710,770 680,800 640,800 
      C 600,800 570,770 570,730
      L 490,730
      C 490,770 460,800 420,800
      C 380,800 350,770 350,730
      L 270,730
      C 270,770 240,800 200,800
      C 160,800 130,770 130,730
      L 110,730
      C 70,730 50,690 60,630
      C 70,570 110,550 140,530
      L 280,450
      C 300,430 310,350 300,300
      C 290,200 320,150 380,150
      Z
    " fill="#00FFFF" stroke="#000000" stroke-width="14" stroke-linejoin="round" />

    <!-- Skate Pink Overlay Layer (Toe and Accent) -->
    <path d="
      M 470,450
      C 500,520 520,550 550,590
      L 860,590 
      C 910,590 940,620 940,660 
      C 940,700 910,730 860,730 
      L 710,730
      C 710,770 680,800 640,800 
      C 600,800 570,770 570,730
      L 490,730
      C 490,770 460,800 420,800
      C 380,800 350,770 350,730
      L 270,730
      C 270,770 240,800 200,800
      C 160,800 130,770 130,730
      L 110,730
      C 70,730 50,690 60,630
      C 70,570 110,550 140,530
      L 280,450
      C 350,480 400,460 470,450
      Z
    " fill="#FF00FF" stroke="#000000" stroke-width="12" stroke-linejoin="round" opacity="0.95"/>

    <!-- Cyan Toe Cap -->
    <path d="M 860,590 C 910,590 940,620 940,660 C 940,700 910,730 860,730 L 710,730 L 650,590 Z" fill="#00FFFF" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>

    <!-- Heel Cup Accent -->
    <path d="M 110,730 C 70,730 50,690 60,630 C 70,570 110,550 140,530 L 180,530 C 160,560 120,620 120,730 Z" fill="#FFFF00" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>

    <!-- Tongue -->
    <path d="M 320,150 C 340,80 430,60 460,120 C 470,140 460,200 450,280 L 380,280 C 390,220 400,160 320,150 Z" fill="#FFFF00" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>

    <!-- Laces (Zig Zag) -->
    <g stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none">
      <path d="M 330,160 L 410,170" />
      <path d="M 330,180 L 415,190" />
      <path d="M 325,200 L 420,210" />
      <path d="M 320,220 L 425,230" />
      <path d="M 315,240 L 430,250" />
      <path d="M 310,260 L 435,270" />
    </g>
    <!-- Lace Outlines -->
    <g stroke="#000000" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M 330,160 L 410,170" />
      <path d="M 330,180 L 415,190" />
      <path d="M 325,200 L 420,210" />
      <path d="M 320,220 L 425,230" />
      <path d="M 315,240 L 430,250" />
      <path d="M 310,260 L 435,270" />
    </g>
    
    <!-- Lace Holes -->
    <g fill="#000000">
      <circle cx="330" cy="160" r="8" />
      <circle cx="410" cy="170" r="8" />
      <circle cx="330" cy="180" r="8" />
      <circle cx="415" cy="190" r="8" />
      <circle cx="325" cy="200" r="8" />
      <circle cx="420" cy="210" r="8" />
      <circle cx="320" cy="220" r="8" />
      <circle cx="425" cy="230" r="8" />
      <circle cx="315" cy="240" r="8" />
      <circle cx="430" cy="250" r="8" />
      <circle cx="310" cy="260" r="8" />
      <circle cx="435" cy="270" r="8" />
    </g>

    <!-- Retro Side Stripes -->
    <path d="M 280,450 C 320,460 400,450 480,460 L 460,500 C 380,490 300,500 260,490 Z" fill="#FFFF00" stroke="#000000" stroke-width="6" stroke-linejoin="round"/>
    <path d="M 260,490 C 300,500 380,490 460,500 L 440,540 C 360,530 280,540 240,530 Z" fill="#FFFF00" stroke="#000000" stroke-width="6" stroke-linejoin="round"/>

    <!-- Lightning Bolt Graphic on Toe -->
    <use href="#bolt" transform="translate(830, 560) scale(1.8) rotate(15)" fill="#FFFF00" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
    <use href="#bolt" transform="translate(830, 560) scale(1.8) rotate(15)" fill="none" stroke="#FF0055" stroke-width="2" />

    <!-- Brand Badge -->
    <rect x="340" y="330" width="100" height="40" rx="10" fill="#FFFF00" stroke="#000000" stroke-width="6"/>
    <text x="390" y="360" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="22" text-anchor="middle" fill="#000000" letter-spacing="2">RAD</text>

    <!-- Trucks (Plate) -->
    <path d="M 220,730 L 720,730 L 700,680 L 240,680 Z" fill="url(#chrome)" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
    
    <!-- Kingpins -->
    <circle cx="400" cy="705" r="10" fill="#888888" stroke="#000000" stroke-width="4"/>
    <circle cx="550" cy="705" r="10" fill="#888888" stroke="#000000" stroke-width="4"/>

    <!-- Wheels -->
    <!-- Back Wheel -->
    <circle cx="200" cy="730" r="65" fill="url(#wheelGrad)" stroke="#000000" stroke-width="10"/>
    <circle cx="200" cy="730" r="40" fill="#FFFF00" stroke="#000000" stroke-width="6"/>
    <circle cx="200" cy="730" r="15" fill="#000000"/>

    <!-- Middle Wheel -->
    <circle cx="420" cy="730" r="65" fill="url(#wheelGrad)" stroke="#000000" stroke-width="10"/>
    <circle cx="420" cy="730" r="40" fill="#FFFF00" stroke="#000000" stroke-width="6"/>
    <circle cx="420" cy="730" r="15" fill="#000000"/>

    <!-- Front Wheel -->
    <circle cx="640" cy="730" r="65" fill="url(#wheelGrad)" stroke="#000000" stroke-width="10"/>
    <circle cx="640" cy="730" r="40" fill="#FFFF00" stroke="#000000" stroke-width="6"/>
    <circle cx="640" cy="730" r="15" fill="#000000"/>
    
    <!-- Wheel Highlights -->
    <circle cx="180" cy="710" r="12" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="400" cy="710" r="12" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="620" cy="710" r="12" fill="#FFFFFF" opacity="0.9"/>

    <!-- Brake (Stopper) -->
    <path d="M 130,730 L 90,760 C 80,770 90,790 110,790 L 140,790 C 160,790 170,770 160,760 L 130,730 Z" fill="#FF0055" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>

    <!-- Decorative Halftone Dots on Tongue -->
    <circle cx="360" cy="100" r="8" fill="#000000"/>
    <circle cx="390" cy="90" r="6" fill="#000000"/>
    <circle cx="420" cy="100" r="8" fill="#000000"/>

    <!-- High-Contrast Pop Art Stroke on Outer Edge (Ensures crispness) -->
    <use href="#sticker-shape" fill="none" stroke="#000000" stroke-width="18" stroke-linejoin="round"/>
  </g>

  <!-- Sticker Glossy Highlight (Plastic overlay effect) -->
  <path d="M 380,150 C 450,150 480,200 470,280 C 460,340 450,400 470,450 C 500,520 520,550 550,590 L 650,590 C 600,520 560,450 550,380 C 540,280 500,150 380,150 Z" fill="#FFFFFF" opacity="0.25" clip-path="url(#sticker-clip)"/>

</svg>