    <defs>
        <filter id="sticker-shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
            <feOffset in="blur" dx="10" dy="14" result="offsetBlur"/>
            <feComponentTransfer in="offsetBlur" result="shadowAlpha">
                <feFuncA type="linear" slope="0.35"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode in="shadowAlpha"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <radialGradient id="halftone-dot" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="currentColor"/>
            <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
