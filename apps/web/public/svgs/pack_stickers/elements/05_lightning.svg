<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Sticker Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="16" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    
    <!-- Bolt Gradient (Yellow to Orange) -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDD00"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>

    <!-- Clip Path to constrain shading inside the sticker -->
    <clipPath id="sticker-clip">
      <path id="sticker-shape" d="M 480 60 L 670 60 L 610 300 L 860 300 L 460 880 L 500 520 L 230 520 Z"/>
    </clipPath>
  </defs>

  <!-- Die-Cut Sticker Group -->
  <g filter="url(#shadow)">
    <!-- Thick White Die-Cut Border -->
    <path d="M 480 60 L 670 60 L 610 300 L 860 300 L 460 880 L 500 520 L 230 520 Z" 
          fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Main Sticker Body -->
    <path d="M 480 60 L 670 60 L 610 300 L 860 300 L 460 880 L 500 520 L 230 520 Z" 
          fill="url(#boltGrad)" stroke="#000000" stroke-width="16" stroke-linejoin="round"/>

    <!-- Internal Shading (Clipped to Bolt Shape) -->
    <g clip-path="url(#sticker-clip)">
      <!-- Deep Black Zig-Zag Side Detail -->
      <polygon points="520,60 670,60 610,300 860,300 500,820 540,520 230,520" fill="#000000" opacity="0.85"/>
      
      <!-- Halftone Pop Art Dots -->
      <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle cx="10" cy="10" r="5" fill="#000000" opacity="0.15"/>
      </pattern>
      <rect x="0" y="0" width="1000" height="1000" fill="url(#dots)"/>

      <!-- High-Contrast Highlight -->
      <polygon points="480,60 520,60 470,190 520,300 440,300 460,880 410,880 480,60" fill="#FFFFFF" opacity="0.25"/>
    </g>

    <!-- Aggressive Inner Black Outlines -->
    <path d="M 500 100 L 630 100 L 580 320 L 800 320 L 480 780 L 510 500 L 260 500 Z" 
          fill="none" stroke="#000000" stroke-width="12" stroke-linejoin="round"/>
    <path d="M 530 130 L 610 130 L 560 350 L 740 350 L 490 720 L 520 480 L 290 480 Z" 
          fill="none" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  </g>
</svg>