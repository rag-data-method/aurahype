<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Pop Art Halftone Pattern -->
    <pattern id="halftone" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.5" fill="#1a1a1a" opacity="0.8"/>
    </pattern>
    
    <pattern id="halftone-red" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#E63946"/>
    </pattern>

    <pattern id="halftone-blue" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#00A8E8"/>
    </pattern>

    <!-- TV Screen Glitch Gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="50%" stop-color="#FFC300"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>

    <!-- Diamond Sparkle Gradient -->
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#E0E0E0"/>
      <stop offset="60%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0B0B0"/>
    </linearGradient>

    <!-- Retro Shadow Filter -->
    <filter id="popShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="12" stdDeviation="0" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 1. BACKGROUND -->
  <rect width="1600" height="900" fill="#FFC300"/>
  
  <!-- Decorative Halftone Background Blobs -->
  <g opacity="0.6">
    <circle cx="150" cy="120" r="100" fill="url(#halftone-blue)"/>
    <circle cx="1450" cy="200" r="80" fill="url(#halftone-red)"/>
    <circle cx="200" cy="750" r="120" fill="url(#halftone-red)"/>
    <circle cx="1400" cy="800" r="90" fill="url(#halftone-blue)"/>
    <circle cx="850" cy="80" r="60" fill="url(#halftone-blue)"/>
  </g>

  <!-- 2. RETRO TV SET -->
  <g id="tv-set" filter="url(#popShadow)">
    <!-- TV Legs -->
    <path d="M 550 720 L 480 850 M 1050 720 L 1120 850" stroke="#1a1a1a" stroke-width="16" stroke-linecap="round"/>
    <path d="M 550 720 L 480 850 M 1050 720 L 1120 850" stroke="#E63946" stroke-width="8" stroke-linecap="round" stroke-dasharray="20 15"/>

    <!-- Antenna (Animated) -->
    <g stroke="#1a1a1a" stroke-width="10" stroke-linecap="round">
      <path d="M 800 250 L 700 100">
        <animateTransform attributeName="transform" type="rotate" values="0 800 250; -5 800 250; 0 800 250" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 800 250 L 900 100">
        <animateTransform attributeName="transform" type="rotate" values="0 800 250; 5 800 250; 0 800 250" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <!-- Antenna Bulbs -->
      <circle cx="700" cy="100" r="12" fill="#E63946"/>
      <circle cx="900" cy="100" r="12" fill="#00A8E8"/>
    </g>

    <!-- TV Body Outer Frame -->
    <rect x="450" y="250" width="700" height="470" rx="40" fill="#1a1a1a"/>
    <rect x="470" y="270" width="660" height="430" rx="30" fill="#E63946"/>
    
    <!-- TV Bezel / Inner Frame -->
    <rect x="490" y="290" width="620" height="360" rx="15" fill="#1a1a1a"/>
    
    <!-- TV Screen -->
    <rect x="510" y="310" width="580" height="320" rx="5" fill="url(#screenGrad)"/>

    <!-- TV Control Panel (Right side) -->
    <rect x="1110" y="290" width="20" height="360" rx="5" fill="#1a1a1a"/>
    <circle cx="1120" cy="340" r="8" fill="#FFFFFF"/>
    <circle cx="1120" cy="380" r="8" fill="#FFFFFF"/>
    <circle cx="1120" cy="420" r="8" fill="#FFFFFF"/>
    <rect x="1112" y="460" width="16" height="60" rx="3" fill="#333"/>

    <!-- TV Brand Logo -->
    <rect x="730" y="680" width="140" height="30" rx="5" fill="#1a1a1a"/>
    <text x="800" y="702" font-family="sans-serif" font-weight="900" font-size="16" fill="#FFC300" text-anchor="middle" letter-spacing="3">MISSCANVAS</text>
  </g>

  <!-- 3. TV SCREEN CONTENT (The Pop Art Ad) -->
  <g clip-path="url(#screenClip)">
    <clipPath id="screenClip">
      <rect x="510" y="310" width="580" height="320" rx="5"/>
    </clipPath>

    <!-- Screen Static/Noise (Animated opacity) -->
    <rect x="510" y="310" width="580" height="320" fill="#FFFFFF" opacity="0">
      <animate attributeName="opacity" values="0; 0.2; 0; 0.1; 0" dur="0.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Screen Halftone Overlay -->
    <rect x="510" y="310" width="580" height="320" fill="url(#halftone)" opacity="0.3">
      <animateTransform attributeName="transform" type="scale" values="1; 1.05; 1" dur="3s" repeatCount="indefinite" additive="sum"/>
    </rect>

    <!-- Screen Text: misscanvas.com -->
    <text x="800" y="400" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#1a1a1a" text-anchor="middle" letter-spacing="-2">
      misscanvas.com
      <!-- Glitch Effect -->
      <animate attributeName="x" values="800; 804; 796; 800" dur="0.15s" repeatCount="indefinite"/>
    </text>
    <text x="800" y="400" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#00A8E8" text-anchor="middle" letter-spacing="-2" opacity="0.7">
      misscanvas.com
      <animate attributeName="x" values="800; 796; 804; 800" dur="0.2s" repeatCount="indefinite"/>
    </text>

    <!-- Screen Button: GET YOURS NOW -->
    <g transform="translate(800, 580)">
      <rect x="-130" y="-25" width="260" height="50" rx="25" fill="#E63946" stroke="#1a1a1a" stroke-width="4"/>
      <text y="8" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">GET YOURS NOW</text>
      <!-- Button Pop Animation -->
      <animateTransform attributeName="transform" type="scale" values="1; 1.05; 1" dur="1.5s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Screen Scanlines -->
    <g opacity="0.15">
      <line x1="510" y1="330" x2="1090" y2="330" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="350" x2="1090" y2="350" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="370" x2="1090" y2="370" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="390" x2="1090" y2="390" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="410" x2="1090" y2="410" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="430" x2="1090" y2="430" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="450" x2="1090" y2="450" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="470" x2="1090" y2="470" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="490" x2="1090" y2="490" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="510" x2="1090" y2="510" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="530" x2="1090" y2="530" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="550" x2="1090" y2="550" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="570" x2="1090" y2="570" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="590" x2="1090" y2="590" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="610" x2="1090" y2="610" stroke="#000" stroke-width="2"/>
      <line x1="510" y1="630" x2="1090" y2="630" stroke="#000" stroke-width="2"/>
    </g>
  </g>

  <!-- TV Screen Glass Reflection -->
  <path d="M 510 310 L 850 310 L 650 630 L 510 630 Z" fill="#FFFFFF" opacity="0.1"/>

  <!-- 4. FOREGROUND HAND (Breaking the 4th wall) -->
  <g id="hand-group" transform="translate(0, 50)">
    <!-- Hand Shadow -->
    <path d="M 250 850 C 350 750, 600 700, 750 650 C 800 630, 850 620, 900 630 L 920 680 C 880 700, 850 720, 800 750 C 700 800, 550 850, 450 900 Z" fill="#1a1a1a" opacity="0.3" transform="translate(20, 20)"/>
    
    <!-- Main Hand Shape -->
    <path d="M 100 900 Q 150 750, 280 700 Q 450 650, 620 560 Q 680 530, 720 550 Q 750 570, 730 600 Q 700 630, 640 650 Q 700 640, 760 620 Q 820 600, 850 620 Q 870 640, 840 660 Q 800 690, 720 710 Q 780 700, 840 690 Q 900 680, 910 710 Q 920 740, 860 760 Q 800 780, 700 790 Q 750 800, 800 820 Q 840 840, 810 870 Q 780 890, 700 880 Q 600 870, 500 900 Z" 
          fill="#00A8E8" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
          
    <!-- Hand Halftone Shading -->
    <path d="M 130 880 Q 180 760, 300 720 Q 450 670, 620 570 Q 650 550, 680 570 Q 600 650, 450 750 Q 300 820, 180 880 Z" fill="url(#halftone)"/>

    <!-- Ring on Middle Finger -->
    <g transform="translate(650, 580) rotate(-15)">
      <!-- Ring Shadow -->
      <rect x="-15" y="0" width="30" height="45" rx="5" fill="#1a1a1a" opacity="0.4" transform="translate(5, 5)"/>
      <!-- Ring Band -->
      <rect x="-15" y="0" width="30" height="45" rx="5" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
      <!-- Ring Gem (Red) -->
      <path d="M -12 0 L 12 0 L 8 -15 L -8 -15 Z" fill="#E63946" stroke="#1a1a1a" stroke-width="2"/>
      <path d="M -8 -15 L 0 -20 L 8 -15" fill="#FF6B6B" stroke="#1a1a1a" stroke-width="1"/>
    </g>
  </g>

  <!-- 5. FLOATING DIAMOND (The Product) -->
  <g id="diamond-group" transform="translate(1100, 350)">
    <!-- Animated Glow -->
    <circle cx="0" cy="0" r="120" fill="#FFD60A" opacity="0">
      <animate attributeName="r" values="100; 140; 100" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4; 0; 0.4" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Diamond Drop Shadow -->
    <ellipse cx="10" cy="80" rx="60" ry="15" fill="#1a1a1a" opacity="0.3"/>

    <!-- Diamond Body -->
    <path d="M -60 0 L 60 0 L 0 -50 Z" fill="url(#diamondGrad)" stroke="#1a1a1a" stroke-width="4"/>
    <path d="M -60 0 L 0 70 L 60 0 Z" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
    <!-- Diamond Facets -->
    <path d="M -60 0 L 0 70 L 0 0 Z" fill="#E0E0E0" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 60 0 L 0 70 L 0 0 Z" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M -60 0 L 0 -50 L 0 0 Z" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 60 0 L 0 -50 L 0 0 Z" fill="#D0D0D0" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Diamond Animation (Float & Rotate) -->
    <animateTransform attributeName="transform" type="translate" values="1100 350; 1100 330; 1100 350" dur="4s" repeatCount="indefinite" additive="replace"/>
  </g>

  <!-- 6. COMIC ACTION LINES & SPARKLES -->
  <g id="action-lines" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round">
    <!-- Speed lines behind diamond -->
    <path d="M 950 350 L 850 350" stroke="#FFC300" stroke-width="8"/>
    <path d="M 1250 350 L 1350 350" stroke="#E63946" stroke-width="8"/>
    <path d="M 1100 200 L 1100 100" stroke="#00A8E8" stroke-width="8"/>
    <path d="M 1100 500 L 1100 600" stroke="#FFC300" stroke-width="8"/>
    
    <!-- Diagonal lines -->
    <path d="M 1020 230 L 950 160" stroke="#E63946" stroke-width="6"/>
    <path d="M 1180 230 L 1250 160" stroke="#00A8E8" stroke-width="6"/>
    <path d="M 1020 470 L 950 540" stroke="#00A8E8" stroke-width="6"/>
    <path d="M 1180 470 L 1250 540" stroke="#E63946" stroke-width="6"/>
  </g>

  <!-- Sparkle Stars -->
  <g id="sparkles" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2">
    <path d="M 1100 200 L 1110 230 L 1140 240 L 1110 250 L 1100 280 L 1090 250 L 1060 240 L 1090 230 Z">
      <animateTransform attributeName="transform" type="scale" values="0; 1; 0" dur="2s" repeatCount="indefinite" additive="sum"/>
    </path>
    <path d="M 950 280 L 955 295 L 970 300 L 955 305 L 950 320 L 945 305 L 930 300 L 945 295 Z">
      <animateTransform attributeName="transform" type="scale" values="0; 1.2; 0" dur="1.5s" repeatCount="indefinite" additive="sum"/>
      <animateTransform attributeName="transform" type="rotate" values="0 950 300; 180 950 300; 360 950 300" dur="3s" repeatCount="indefinite" additive="sum"/>
    </path>
    <path d="M 1250 420 L 1255 435 L 1270 440 L 1255 445 L 1250 460 L 1245 445 L 1230 440 L 1245 435 Z">
      <animateTransform attributeName="transform" type="scale" values="0; 1; 0" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <!-- 7. FOREGROUND RETRO ADVERTISING ELEMENTS -->
  <!-- Burst Badge -->
  <g transform="translate(1350, 150)">
    <circle cx="0" cy="0" r="70" fill="#E63946" stroke="#1a1a1a" stroke-width="4"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="5 5"/>
    <text y="-10" font-family="Arial Black, sans-serif" font-weight="900" font-size="18" fill="#FFFFFF" text-anchor="middle">NEW</text>
    <text y="20" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#FFD60A" text-anchor="middle">1960s</text>
    <animateTransform attributeName="transform" type="rotate" values="0 1350 150; 10 1350 150; 0 1350 150; -10 1350 150; 0 1350 150" dur="5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Speech Bubble -->
  <g transform="translate(350, 180)">
    <path d="M 0 0 L 200 0 L 200 100 L 80 100 L 50 140 L 60 100 L 0 100 Z" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round" filter="url(#popShadow)"/>
    <text x="100" y="45" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#E63946" text-anchor="middle">WOW!</text>
    <text x="100" y="75" font-family="Arial Black, sans-serif" font-weight="900" font-size="16" fill="#1a1a1a" text-anchor="middle">SO RETRO!</text>
    <!-- Wiggle Animation -->
    <animateTransform attributeName="transform" type="translate" values="350 180; 350 170; 350 180" dur="0.5s" repeatCount="indefinite"/>
  </g>

  <!-- Zig Zag Border at Bottom -->
  <path d="M 0 850 L 50 880 L 100 850 L 150 880 L 200 850 L 250 880 L 300 850 L 350 880 L 400 850 L 450 880 L 500 850 L 550 880 L 600 850 L 650 880 L 700 850 L 750 880 L 800 850 L 850 880 L 900 850 L 950 880 L 1000 850 L 1050 880 L 1100 850 L 1150 880 L 1200 850 L 1250 880 L 1300 850 L 1350 880 L 1400 850 L 1450 880 L 1500 850 L 1550 880 L 1600 850 L 1600 900 L 0 900 Z" fill="#E63946" stroke="#1a1a1a" stroke-width="4"/>

  <!-- 8. SIGNAL INTERFERENCE OVERLAY (Global) -->
  <g opacity="0.15">
    <rect x="0" y="0" width="1600" height="900" fill="#FFFFFF">
      <animate attributeName="opacity" values="0; 0.5; 0; 0.2; 0" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <!-- Horizontal Glitch Bars -->
    <rect x="0" y="100" width="1600" height="20" fill="#00A8E8">
      <animate attributeName="y" values="100; 500; 800; 200" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="400" width="1600" height="10" fill="#E63946">
      <animate attributeName="y" values="400; 100; 600" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0; 0.6; 0" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>