<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="silverGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8D99AE"/>
      <stop offset="50%" stop-color="#EDF2F4"/>
      <stop offset="100%" stop-color="#8D99AE"/>
    </linearGradient>

    <pattern id="dotsRed" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" fill="#E71D36">
        <animate attributeName="r" values="1.5;4.5;1.5" dur="4s" repeatCount="indefinite"/>
      </circle>
    </pattern>
    <pattern id="dotsBlue" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" fill="#00A8E8">
        <animate attributeName="r" values="1.5;4.5;1.5" dur="4s" begin="2s" repeatCount="indefinite"/>
      </circle>
    </pattern>

    <radialGradient id="fadeGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.7" stop-color="#fff"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
    <mask id="dotMask" maskContentUnits="objectBoundingBox">
      <rect width="1" height="1" fill="url(#fadeGrad)"/>
    </mask>

    <clipPath id="canClip">
      <rect x="-130" y="-200" width="260" height="400"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#F2B705"/>

  <!-- Sliding diagonal color panels -->
  <g opacity="0.25">
    <rect x="-200" y="250" width="700" height="90" fill="#E71D36" transform="rotate(-15)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 150,0; 0,0" dur="6s" repeatCount="indefinite" additive="sum"/>
    </rect>
    <rect x="1100" y="500" width="700" height="90" fill="#00A8E8" transform="rotate(-15)">
      <animateTransform attributeName="transform" type="translate" values="0,0; -150,0; 0,0" dur="7s" repeatCount="indefinite" additive="sum"/>
    </rect>
  </g>

  <!-- Halftone clusters -->
  <g>
    <g transform="translate(140,140)"><circle r="100" fill="url(#dotsRed)" mask="url(#dotMask)"><animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="5s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(1460,140)"><circle r="80" fill="url(#dotsRed)" mask="url(#dotMask)"><animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="6s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(800,100)"><circle r="70" fill="url(#dotsBlue)" mask="url(#dotMask)"><animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="4s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(180,500)"><circle r="110" fill="url(#dotsBlue)" mask="url(#dotMask)"><animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="5.5s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(1420,520)"><circle r="120" fill="url(#dotsRed)" mask="url(#dotMask)"><animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="4.5s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(1500,800)"><circle r="90" fill="url(#dotsBlue)" mask="url(#dotMask)"><animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="7s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(120,820)"><circle r="60" fill="url(#dotsBlue)" mask="url(#dotMask)"><animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="5s" repeatCount="indefinite"/></circle></g>
  </g>

  <!-- Starburst behind can -->
  <g transform="translate(800,520)">
    <g>
      <path d="M0,-240 L35,-80 L190,-120 L55,0 L190,120 L35,80 L0,240 L-35,80 L-190,120 L-55,0 L-190,-120 L-35,-80 Z" fill="#FFD60A" stroke="#0B0B0B" stroke-width="5"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </g>
    <animateTransform attributeName="transform" type="scale" values="0.9;1.05;0.9" dur="4s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Can shadow (separate so it stays on the ground) -->
  <ellipse cx="800" cy="740" rx="130" ry="20" fill="#0B0B0B" opacity="0.25">
    <animate attributeName="rx" values="130;145;130" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.15;0.25" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Soup Can -->
  <g transform="translate(800,520)">
    <!-- Body -->
    <rect x="-130" y="-200" width="260" height="400" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="6"/>

    <!-- Rims -->
    <ellipse cx="0" cy="-200" rx="130" ry="25" fill="url(#silverGrad)" stroke="#0B0B0B" stroke-width="6"/>
    <ellipse cx="0" cy="200" rx="130" ry="25" fill="url(#silverGrad)" stroke="#0B0B0B" stroke-width="6"/>

    <!-- Top red band -->
    <rect x="-130" y="-170" width="260" height="70" fill="#E71D36" stroke="#0B0B0B" stroke-width="4"/>
    <text x="0" y="-142" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="38" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="3" paint-order="stroke">MISS</text>
    <text x="0" y="-102" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="38" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="3" paint-order="stroke">CANVAS</text>

    <!-- Center white panel -->
    <rect x="-130" y="-100" width="260" height="205" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="4"/>

    <!-- Big SVG type -->
    <g transform="translate(0, 10)">
      <text x="0" y="50" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="130" fill="#E71D36" stroke="#0B0B0B" stroke-width="8" paint-order="stroke">SVG</text>
      <animateTransform attributeName="transform" type="scale" values="1;1.04;1" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Bottom red band -->
    <rect x="-130" y="105" width="260" height="95" fill="#E71D36" stroke="#0B0B0B" stroke-width="4"/>
    <text x="0" y="165" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="44" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="3" paint-order="stroke">PREMIUM</text>
    <text x="0" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B0B0B" font-weight="bold">NET WT 15 KB</text>

    <!-- Subtle cylinder edge lines -->
    <line x1="-90" y1="-200" x2="-90" y2="200" stroke="#0B0B0B" stroke-width="3" opacity="0.12"/>
    <line x1="90" y1="-200" x2="90" y2="200" stroke="#0B0B0B" stroke-width="3" opacity="0.12"/>

    <!-- Glossy shine slide -->
    <g clip-path="url(#canClip)">
      <polygon points="-120,-250 20,-250 220,450 80,450" fill="#FFFFFF" opacity="0.35">
        <animateTransform attributeName="transform" type="translate" values="-250,0; 250,0" dur="3s" repeatCount="indefinite"/>
      </polygon>
    </g>

    <!-- Float animation -->
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="4s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Header branding -->
  <g transform="translate(800,160)">
    <text x="0" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="130" fill="#0B0B0B" stroke="#F2B705" stroke-width="8" paint-order="stroke">MISS CANVAS</text>
    <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="3s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- CTA Button -->
  <g transform="translate(800,820)">
    <rect x="-190" y="-38" width="380" height="76" rx="38" fill="#E71D36" stroke="#0B0B0B" stroke-width="6"/>
    <text x="0" y="12" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="36" fill="#FFFFFF" letter-spacing="2">GET YOURS NOW</text>
    <animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="2.5s" repeatCount="indefinite"/>
  </g>
</svg>