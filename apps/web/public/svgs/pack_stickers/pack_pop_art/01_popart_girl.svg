<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="dr" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3.5" fill="#E3242B"/>
    </pattern>
    <pattern id="dt" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3.5" fill="#2EC4B6"/>
    </pattern>
    <pattern id="dk" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.5" fill="#000"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#F2B705"/>

  <!-- Halftone Background Spots -->
  <circle cx="200" cy="180" r="160" fill="url(#dr)">
    <animateTransform attributeName="transform" type="scale" values="1;1.12;1" dur="4s" repeatCount="indefinite" additive="sum"/>
  </circle>
  <circle cx="1400" cy="750" r="190" fill="url(#dt)">
    <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="5s" repeatCount="indefinite" additive="sum"/>
  </circle>
  <circle cx="1350" cy="250" r="110" fill="url(#dr)">
    <animateTransform attributeName="transform" type="scale" values="1.1;1;1.1" dur="3.5s" repeatCount="indefinite" additive="sum"/>
  </circle>
  <circle cx="180" cy="780" r="90" fill="url(#dt)">
    <animateTransform attributeName="transform" type="scale" values="1;1.18;1" dur="6s" repeatCount="indefinite" additive="sum"/>
  </circle>

  <!-- Girl Group -->
  <g id="girl">
    <!-- Dress / Shoulders -->
    <path d="M380,680 Q510,760 640,680 L670,820 Q510,880 350,820 Z" fill="#2EC4B6" stroke="#000" stroke-width="7" stroke-linejoin="round"/>
    <!-- Neck -->
    <path d="M470,620 L470,690 Q510,710 550,690 L550,620" fill="#4FB2E0" stroke="#000" stroke-width="6"/>
    
    <!-- Hair Back -->
    <path d="M410,360 C390,140 630,140 610,360 L580,360 C600,220 420,220 440,360 Z" fill="#E3242B" stroke="#000" stroke-width="6" stroke-linejoin="round"/>
    <!-- Hair Side Locks -->
    <path d="M410,360 C400,480 420,560 450,610 L480,590 C450,540 430,470 440,360 Z" fill="#E3242B" stroke="#000" stroke-width="6"/>
    <path d="M610,360 C620,480 600,560 570,610 L540,590 C570,540 590,470 580,360 Z" fill="#E3242B" stroke="#000" stroke-width="6"/>

    <!-- Face -->
    <path d="M470,330 C450,420 460,580 490,630 C500,645 520,645 530,630 C560,580 570,420 550,330 C540,270 480,270 470,330 Z" fill="#4FB2E0" stroke="#000" stroke-width="6"/>

    <!-- Cheek Halftone Shading -->
    <ellipse cx="460" cy="510" rx="35" ry="22" fill="url(#dk)"/>
    <ellipse cx="560" cy="510" rx="35" ry="22" fill="url(#dk)"/>

    <!-- Eyes Sclera -->
    <ellipse cx="465" cy="410" rx="28" ry="38" fill="#FFF" stroke="#000" stroke-width="5"/>
    <ellipse cx="555" cy="410" rx="28" ry="38" fill="#FFF" stroke="#000" stroke-width="5"/>
    
    <!-- Pupils -->
    <circle cx="465" cy="410" r="11" fill="#000">
      <animate attributeName="r" values="11;7;11" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="555" cy="410" r="11" fill="#000">
      <animate attributeName="r" values="11;7;11" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Eyelids (Blink) -->
    <ellipse cx="465" cy="410" rx="30" ry="0" fill="#4FB2E0" stroke="#000" stroke-width="2">
      <animate attributeName="ry" values="0;40;0" keyTimes="0;0.05;0.1" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="555" cy="410" rx="30" ry="0" fill="#4FB2E0" stroke="#000" stroke-width="2">
      <animate attributeName="ry" values="0;40;0" keyTimes="0;0.05;0.1" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Eyebrows -->
    <path d="M430,350 Q465,310 495,355" stroke="#000" stroke-width="7" fill="none" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M525,355 Q555,310 590,350" stroke="#000" stroke-width="7" fill="none" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="2.2s" repeatCount="indefinite"/>
    </path>

    <!-- Nose -->
    <path d="M510,460 Q505,480 515,485" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Mouth -->
    <ellipse cx="510" cy="540" rx="18" ry="32" fill="#FF0080" stroke="#000" stroke-width="4">
      <animate attributeName="ry" values="32;40;32" dur="1.8s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="498" y="520" width="24" height="14" fill="#FFF" stroke="#000" stroke-width="2"/>
    <ellipse cx="510" cy="555" rx="8" ry="10" fill="#990033"/>

    <!-- Hair Bangs -->
    <path d="M450,300 Q510,260 570,300 L560,360 Q510,320 460,360 Z" fill="#E3242B" stroke="#000" stroke-width="6"/>

    <!-- Shock Lines near head -->
    <g stroke="#000" stroke-width="5" stroke-linecap="round">
      <path d="M440,280 L420,250"/>
      <path d="M580,280 L600,250"/>
      <path d="M510,240 L510,200"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Blue Hand with Ring (Reference nod) -->
  <g id="hand">
    <path d="M240,920 C280,840 340,760 400,700 C420,680 440,670 450,680 C460,690 450,710 430,720 L400,740 C420,735 440,740 450,750 C460,760 450,775 430,780 L400,790 C420,795 435,805 430,820 C425,835 410,840 395,835 L380,845 C395,855 400,870 390,880 C380,890 365,885 355,875 L340,890 C330,900 320,910 310,920 Z" fill="#4FB2E0" stroke="#000" stroke-width="5" stroke-linejoin="round"/>
    <!-- Ring -->
    <rect x="385" y="735" width="14" height="30" fill="#E3242B" stroke="#000" stroke-width="3" transform="rotate(-30 392 750)"/>
    <!-- Sparkle -->
    <path d="M392,725 v-10 M392,775 v10 M377,750 h-10 M407,750 h10" stroke="#FFF" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <!-- Hand tremble -->
    <animateTransform attributeName="transform" type="rotate" values="-2 400 800; 2 400 800; -2 400 800" dur="0.2s" repeatCount="indefinite"/>
  </g>

  <!-- Speech Bubble Group -->
  <g transform="translate(1050,380)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="0;1.08;1;1;0" keyTimes="0;0.15;0.25;0.9;1" dur="5s" repeatCount="indefinite"/>
      
      <!-- Starburst behind -->
      <polygon points="0,-180 30,-30 180,-80 50,0 180,150 30,100 0,250 -30,100 -180,150 -50,0 -180,-80 -30,-30" fill="#FFE66D" stroke="#000" stroke-width="5">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="24s" repeatCount="indefinite"/>
      </polygon>

      <!-- Bubble -->
      <path d="M-250,-130 h500 q40,0 40,40 v180 q0,40 -40,40 h-260 l-70,60 20,-60 h-150 q-40,0 -40,-40 v-180 q0,-40 40,-40 z" fill="#FFF" stroke="#000" stroke-width="7" stroke-linejoin="round"/>
      
      <!-- Text -->
      <text x="0" y="-35" font-family="Impact, Arial Black, sans-serif" font-size="85" text-anchor="middle" fill="#E3242B">Wow!</text>
      <text x="0" y="55" font-family="Impact, Arial Black, sans-serif" font-size="46" text-anchor="middle" fill="#000">misscanvas.com</text>
    </g>
  </g>

  <!-- Action flash lines on bubble -->
  <g stroke="#000" stroke-width="5" stroke-linecap="round">
    <path d="M760,200 L730,170"/>
    <path d="M1340,200 L1370,170"/>
    <path d="M1340,560 L1370,590"/>
    <path d="M760,560 L730,590"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </g>
</svg>