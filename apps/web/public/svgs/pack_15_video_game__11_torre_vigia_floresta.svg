    <rect x="0" y="14" width="1600" height="1" fill="#1A1A2E"/>
    <rect x="0" y="896" width="1600" height="4" fill="#1A1A2E"/>
    <rect x="0" y="890" width="1600" height="2" fill="#1A1A2E"/>
