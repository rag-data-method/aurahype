  <path d="M 0 900 L 0 0 L 300 0 L 300 900 Z" fill="url(#sky1)" opacity="0.05"/>
  <path d="M 1300 0 L 1600 0 L 1600 900 L 1300 900 Z" fill="#1A1A2E" opacity="0.15"/>

  <g opacity="0.15">
