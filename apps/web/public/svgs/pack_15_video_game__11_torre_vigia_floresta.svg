    <use href="#ember" x="1345" y="660"><animateMotion path="M 0 0 Q 25 -55 50 -110 Q 75 -165 45 -205" dur="12s" repeatCount="indefinite"/></use>
    <use href="#ember" x="1320" y="685"><animateMotion path="M 0 0 Q -20 -50 -40 -100 Q -60 -150 -30 -190" dur="7s" repeatCount="indefinite"/></use>
    <use href="#ember" x="1300" y="690"><animateMotion path="M 0 0 Q 15 -65 30 -130 Q 45 -195 20 -235" dur="13s" repeatCount="indefinite"/></use>
    <use href="#ember" x="1295" y="655"><animateMotion path="M 0 0 Q -25 -40 -50 -80 Q -75 -120 -40 -160" dur="9s" repeatCount="indefinite"/></use>
    <use href="#ember" x="1315" y="680"><animateMotion path="M 0 0 Q 5 -55 10 -110 Q 15 -165 5 -205" dur="11s" repeatCount="indefinite"/></use>
    <use href="#ember" x="1335" y="665"><animateMotion path="M 0 0 Q -30 -60 -60 -120 Q -90 -180 -50 -220" dur="8s" repeatCount="indefinite"/></use>
