      <animateMotion path="M 0 0 C 100 -30, 200 20, 400 -10 C 600 -40, 800 10, 1000 -20" dur="18s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </use>
    <use href="#bird1" x="350" y="280">
      <animateMotion path="M 0 0 C 80 -20, 180 30, 350 0 C 520 -30, 700 20, 900 -10" dur="16s" repeatCount="indefinite"/>
