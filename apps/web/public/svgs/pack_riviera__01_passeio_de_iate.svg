<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="sunGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24"/>
    </filter>
    <filter id="glassSheen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <clipPath id="bowlClip">
      <path d="M530,495 Q620,445 710,495 Q725,555 620,600 Q515,555 530,495 Z"/>
    </clipPath>
    <pattern id="tortoise" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#0A2463"/>
      <circle cx="12" cy="12" r="9" fill="#E2C044" opacity="0.85"/>
      <circle cx="32" cy="32" r="7" fill="#E2C044" opacity="0.75"/>
      <circle cx="34" cy="8" r="5" fill="#E2C044" opacity="0.7"/>
    </pattern>
    <path id="glint" d="M0,-14 L2.5,-2.5 L14,0 L2.5,2.5 L0,14 L-2.5,2.5 L-14,0 L-2.5,-2.5 Z" fill="#E2C044"/>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#F9F7F1"/>

  <!-- Sun -->
  <circle cx="1320" cy="140" r="150" fill="#E2C044" opacity="0.7" filter="url(#sunGlow)">
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Teak deck -->
  <g transform="translate(0,560)">
    <animateTransform attributeName="transform" type="translate" values="0 0;4 0;0 0;-3 0;0 0" dur="8s" repeatCount="indefinite"/>
    <rect x="-100" y="0" width="1800" height="360" fill="#E2C044" opacity="0.9"/>
    <path d="M-100,45 H1700 M-100,90 H1700 M-100,135 H1700 M-100,180 H1700 M-100,225 H1700 M-100,270 H1700 M-100,315 H1700" stroke="#0A2463" stroke-width="3" opacity="0.85"/>
    <rect x="-300" y="0" width="400" height="360" fill="#F9F7F1" opacity="0.15">
      <animate attributeName="x" values="-300;1700" dur="7s" repeatCount="indefinite"/>
    </rect>
    <line x1="-100" y1="0" x2="1700" y2="0" stroke="#F9F7F1" stroke-width="4" opacity="0.6"/>
  </g>

  <!-- Glass shadow -->
  <g transform="translate(620,720)">
    <ellipse rx="110" ry="18" fill="#0A2463" opacity="0.85" filter="url(#shadowBlur)">
      <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="4s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Cocktail glass -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0 620 720;1.2 620 720;0 620 720;-0.8 620 720;0 620 720" dur="6s" repeatCount="indefinite"/>
    <!-- Bowl -->
    <path d="M520,490 Q620,430 720,490 Q740,560 620,610 Q500,560 520,490 Z" fill="#F9F7F1" opacity="0.35" stroke="#0A2463" stroke-width="3"/>
    <!-- Liquid -->
    <path clip-path="url(#bowlClip)" d="M530,500 Q620,520 710,500 L690,585 Q620,605 550,585 Z" fill="#48A9A6" opacity="0.9">
      <animate attributeName="d" values="M530,500 Q620,520 710,500 L690,585 Q620,605 550,585 Z;M530,500 Q620,480 710,500 L690,585 Q620,605 550,585 Z;M530,500 Q620,520 710,500 L690,585 Q620,605 550,585 Z" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Stem & base -->
    <rect x="610" y="600" width="20" height="90" rx="5" fill="#F9F7F1" opacity="0.4" stroke="#0A2463" stroke-width="2"/>
    <ellipse cx="620" cy="700" rx="70" ry="14" fill="#E2C044" opacity="0.9" stroke="#0A2463" stroke-width="2"/>
    <!-- Highlight -->
    <path d="M545,500 Q555,560 600,590" fill="none" stroke="#F9F7F1" stroke-width="5" opacity="0.5" stroke-linecap="round" filter="url(#glassSheen)"/>
    <!-- Droplets -->
    <circle cx="560" cy="520" r="4" fill="#48A9A6" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 55;0 0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="560" r="3" fill="#48A9A6" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 40;0 0" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Lemon slice -->
  <g transform="translate(710,485)">
    <animateTransform attributeName="transform" type="rotate" values="-6 0 0;6 0 0;-6 0 0" dur="4s" repeatCount="indefinite"/>
    <circle r="34" fill="#E2C044" opacity="0.9" stroke="#0A2463" stroke-width="2"/>
    <path d="M0,0 L0,-34 M0,0 L24,-24 M0,0 L34,0 M0,0 L24,24 M0,0 L0,34 M0,0 L-24,24 M0,0 L-34,0 M0,0 L-24,-24" stroke="#0A2463" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Sunglasses shadow -->
  <g transform="translate(940,630)">
    <ellipse rx="150" ry="20" fill="#0A2463" opacity="0.85" filter="url(#shadowBlur)">
      <animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Sunglasses -->
  <g transform="translate(940,580)">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -7;0 0" dur="5s" repeatCount="indefinite"/>
    <!-- Temples -->
    <path d="M-150,-15 L-195,-25 M150,-15 L195,-25" stroke="#0A2463" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <!-- Frames -->
    <path d="M-150,-15 C-150,-50 -20,-50 -20,-15 C-20,15 -150,15 -150,-15 Z M20,-15 C20,-50 150,-50 150,-15 C150,15 20,15 20,-15 Z M-20,-20 Q0,-30 20,-20 L20,-12 Q0,-18 -20,-12 Z" fill="url(#tortoise)" stroke="#0A2463" stroke-width="2"/>
    <!-- Lenses -->
    <ellipse cx="-85" cy="0" rx="58" ry="30" fill="#0A2463" opacity="0.85"/>
    <ellipse cx="85" cy="0" rx="58" ry="30" fill="#0A2463" opacity="0.85"/>
    <!-- Reflections -->
    <g clip-path="url(#lensLeft)">
      <path d="M-130,-12 L-95,18 L-85,18 L-120,-12 Z" fill="#F9F7F1" opacity="0.35">
        <animateTransform attributeName="transform" type="translate" values="0 0;25 0;0 0" dur="3.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <g clip-path="url(#lensRight)">
      <path d="M40,-12 L75,18 L85,18 L50,-12 Z" fill="#F9F7F1" opacity="0.35">
        <animateTransform attributeName="transform" type="translate" values="0 0;25 0;0 0" dur="3.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <defs>
      <clipPath id="lensLeft">
        <ellipse cx="-85" cy="0" rx="58" ry="30"/>
      </clipPath>
      <clipPath id="lensRight">
        <ellipse cx="85" cy="0" rx="58" ry="30"/>
      </clipPath>
    </defs>
  </g>

  <!-- Sun glints -->
  <g transform="translate(520,320)">
    <g>
      <use href="#glint" opacity="0.9"/>
      <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(860,260)">
    <g>
      <use href="#glint" opacity="0.9"/>
      <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(1180,380)">
    <g>
      <use href="#glint" opacity="0.9"/>
      <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="3.5s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" begin="2s" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(720,640)">
    <g>
      <use href="#glint" opacity="0.9"/>
      <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>