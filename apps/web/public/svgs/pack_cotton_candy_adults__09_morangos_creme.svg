<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A40">
        <animate attributeName="stop-color" values="#2A2A40;#1A1A2E;#2A2A40" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1A1A2E">
        <animate attributeName="stop-color" values="#1A1A2E;#151525;#1A1A2E" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Silver Platter Gradient -->
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#E0E0E0"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="75%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>

    <!-- Glossy Strawberry Body -->
    <radialGradient id="berryGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFB7B2"/>
      <stop offset="50%" stop-color="#FF6F61"/>
      <stop offset="100%" stop-color="#D94A3D"/>
    </radialGradient>

    <!-- Glossy Cream Gradient -->
    <radialGradient id="creamGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#FFB7B2"/>
      <stop offset="100%" stop-color="#FF6F61"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feGaussianBlur stdDeviation="20" in="SourceGraphic" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- Reusable Strawberry Shape -->
    <g id="strawberry">
      <path d="M -70 0 C -70 -55, -40 -85, 0 -85 C 40 -85, 70 -55, 70 0 C 70 60, 40 90, 0 100 C -40 90, -70 60, -70 0 Z" fill="url(#berryGrad)"/>
      <!-- Highlight -->
      <path d="M -30 -50 Q -10 -60 10 -50 Q 0 -30 -20 -30 Z" fill="#FFFFFF" opacity="0.4"/>
      <!-- Seeds -->
      <g fill="#1A1A2E" opacity="0.5">
        <circle cx="-20" cy="-40" r="2.5"/><circle cx="10" cy="-50" r="2.5"/><circle cx="-40" cy="-10" r="2.5"/>
        <circle cx="30" cy="-20" r="2.5"/><circle cx="0" cy="0" r="2.5"/><circle cx="-50" cy="20" r="2.5"/>
        <circle cx="50" cy="10" r="2.5"/><circle cx="-20" cy="40" r="2.5"/><circle cx="20" cy="50" r="2.5"/>
        <circle cx="-5" cy="70" r="2.5"/><circle cx="35" cy="-5" r="2.5"/><circle cx="-35" cy="30" r="2.5"/>
      </g>
      <!-- Calyx (Leaves) -->
      <path d="M -15 -85 L -25 -110 L -5 -95 L 0 -120 L 5 -95 L 25 -110 L 15 -85 Z" fill="#2A5A2A"/>
      <!-- Stem -->
      <path d="M 0 -95 Q 5 -115 15 -125" fill="none" stroke="#2A5A2A" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Reusable Cream Dollop -->
    <path id="creamShape" d="M -60 0 C -60 -40, -30 -70, 0 -70 C 30 -70, 60 -40, 60 0 C 60 30, 30 50, 0 50 C -30 50, -60 30, -60 0 Z" fill="url(#creamGrad)"/>

    <!-- Reusable Drip Shape -->
    <path id="dripBase" d="M 0 0 Q 10 20 0 40 Q -10 20 0 0" fill="url(#creamGrad)"/>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- Ambient Bokeh / Neon Atmosphere -->
  <circle cx="400" cy="250" r="300" fill="#FF6F61" opacity="0.05" filter="url(#glow)">
    <animate attributeName="r" values="300;350;300" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.05;0.08;0.05" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1200" cy="600" r="400" fill="#FFB7B2" opacity="0.04" filter="url(#glow)">
    <animate attributeName="r" values="400;450;400" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.07;0.04" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Global Spotlight -->
  <rect width="1600" height="900" fill="url(#bgGrad)" opacity="0.4"/>
  <radialGradient id="spotlight" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#spotlight)"/>

  <!-- Background Velvet Drapes -->
  <path d="M -100 -100 Q 200 300 100 1000 L -100 1000 Z" fill="#1A1A2E" opacity="0.9">
    <animate attributeName="d" values="M -100 -100 Q 200 300 100 1000 L -100 1000 Z; M -100 -100 Q 250 350 150 1000 L -100 1000 Z; M -100 -100 Q 200 300 100 1000 L -100 1000 Z" dur="12s" repeatCount="indefinite"/>
  </path>
  <path d="M 1700 -100 Q 1400 300 1500 1000 L 1700 1000 Z" fill="#1A1A2E" opacity="0.9">
    <animate attributeName="d" values="M 1700 -100 Q 1400 300 1500 1000 L 1700 1000 Z; M 1700 -100 Q 1350 350 1450 1000 L 1700 1000 Z; M 1700 -100 Q 1400 300 1500 1000 L 1700 1000 Z" dur="14s" repeatCount="indefinite"/>
  </path>

  <!-- Platter Shadow -->
  <ellipse cx="800" cy="710" rx="430" ry="90" fill="#000000" opacity="0.6" filter="url(#softShadow)"/>

  <!-- Silver Serving Platter (Back Rim) -->
  <g id="platterBack">
    <ellipse cx="800" cy="660" rx="400" ry="80" fill="url(#silver)" opacity="0.8"/>
    <ellipse cx="800" cy="660" rx="380" ry="70" fill="#1A1A2E"/>
    <!-- Inner Reflection -->
    <ellipse cx="800" cy="660" rx="360" ry="60" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- ================= DECORATIVE OBJECTS ================= -->

  <!-- Swaying Pink Silk Ribbons (Left) -->
  <g transform="translate(200, 200)">
    <path d="M 0 0 Q 50 100 0 300" fill="none" stroke="#FFB7B2" stroke-width="12" stroke-linecap="round" opacity="0.6">
      <animate attributeName="d" values="M 0 0 Q 50 100 0 300; M 0 0 Q 80 100 20 300; M 0 0 Q 50 100 0 300" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 30 -50 Q 80 50 30 250" fill="none" stroke="#FF6F61" stroke-width="8" stroke-linecap="round" opacity="0.5">
      <animate attributeName="d" values="M 30 -50 Q 80 50 30 250; M 30 -50 Q 110 50 50 250; M 30 -50 Q 80 50 30 250" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Swaying Pink Silk Ribbons (Right) -->
  <g transform="translate(1400, 250)">
    <path d="M 0 0 Q -50 100 0 300" fill="none" stroke="#FFB7B2" stroke-width="10" stroke-linecap="round" opacity="0.6">
      <animate attributeName="d" values="M 0 0 Q -50 100 0 300; M 0 0 Q -90 100 -30 300; M 0 0 Q -50 100 0 300" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M -20 -40 Q -70 40 -20 220" fill="none" stroke="#FF6F61" stroke-width="6" stroke-linecap="round" opacity="0.5">
      <animate attributeName="d" values="M -20 -40 Q -70 40 -20 220; M -20 -40 Q -100 40 -40 220; M -20 -40 Q -70 40 -20 220" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Breathing Feather (Left) -->
  <g transform="translate(100, 650) rotate(-20)">
    <path d="M 0 0 C -20 -100, -60 -200, -20 -300 C 0 -200, 20 -100, 0 0 Z" fill="#FFB7B2" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" values="-5 0 0; 5 0 0; -5 0 0" dur="5s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="d" values="M 0 0 C -20 -100, -60 -200, -20 -300 C 0 -200, 20 -100, 0 0 Z; M 0 0 C -25 -100, -65 -200, -25 -300 C 5 -200, 25 -100, 0 0 Z; M 0 0 C -20 -100, -60 -200, -20 -300 C 0 -200, 20 -100, 0 0 Z" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 0 C -10 -100, -30 -200, -10 -300" fill="none" stroke="#E0E0E0" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Breathing Feather (Right) -->
  <g transform="translate(1500, 600) rotate(20)">
    <path d="M 0 0 C 20 -100, 60 -200, 20 -300 C 0 -200, -20 -100, 0 0 Z" fill="#FFB7B2" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" values="5 0 0; -5 0 0; 5 0 0" dur="6s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="d" values="M 0 0 C 20 -100, 60 -200, 20 -300 C 0 -200, -20 -100, 0 0 Z; M 0 0 C 25 -100, 65 -200, 25 -300 C -5 -200, -25 -100, 0 0 Z; M 0 0 C 20 -100, 60 -200, 20 -300 C 0 -200, -20 -100, 0 0 Z" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 0 C 10 -100, 30 -200, 10 -300" fill="none" stroke="#E0E0E0" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- ================= STRAWBERRY GROUPS ================= -->

  <!-- Strawberry 1: Back Left -->
  <g transform="translate(580, 580) rotate(-25) scale(0.9)">
    <use href="#strawberry"/>
    <g transform="translate(0, -65)">
      <use href="#creamShape"/>
      <g transform="translate(-20, 30)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="-20 30; -20 45; -20 30" dur="4s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(25, 35) scale(0.8)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="25 35; 25 50; 25 35" dur="5s" repeatCount="indefinite" begin="0.5s"/>
      </g>
    </g>
  </g>

  <!-- Strawberry 2: Back Right -->
  <g transform="translate(1020, 590) rotate(20) scale(0.85)">
    <use href="#strawberry"/>
    <g transform="translate(0, -60)">
      <use href="#creamShape"/>
      <g transform="translate(15, 25) scale(0.9)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="15 25; 15 40; 15 25" dur="6s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(-30, 40) scale(0.7)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="-30 40; -30 55; -30 40" dur="4.5s" repeatCount="indefinite" begin="1s"/>
      </g>
    </g>
  </g>

  <!-- Strawberry 3: Center (Hero) -->
  <g transform="translate(800, 560) rotate(0) scale(1.1)">
    <use href="#strawberry"/>
    <g transform="translate(0, -70)">
      <use href="#creamShape"/>
      <!-- Highlight shine on cream -->
      <ellipse cx="-15" cy="-30" rx="25" ry="15" fill="#FFFFFF" opacity="0.5" transform="rotate(-15)"/>
      <!-- Drips -->
      <g transform="translate(-40, 20)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="-40 20; -40 40; -40 20" dur="5s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(10, 40) scale(1.2)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="10 40; 10 65; 10 40" dur="7s" repeatCount="indefinite" begin="0.2s"/>
      </g>
      <g transform="translate(45, 15) scale(0.6)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="45 15; 45 35; 45 15" dur="4s" repeatCount="indefinite" begin="0.8s"/>
      </g>
    </g>
  </g>

  <!-- Strawberry 4: Front Left -->
  <g transform="translate(680, 650) rotate(-10) scale(0.95)">
    <use href="#strawberry"/>
    <g transform="translate(0, -60)">
      <use href="#creamShape"/>
      <g transform="translate(-25, 35)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="-25 35; -25 50; -25 35" dur="5.5s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(30, 20) scale(0.8)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="30 20; 30 35; 30 20" dur="4s" repeatCount="indefinite" begin="1.5s"/>
      </g>
    </g>
  </g>

  <!-- Strawberry 5: Front Right -->
  <g transform="translate(920, 640) rotate(15) scale(0.9)">
    <use href="#strawberry"/>
    <g transform="translate(0, -55)">
      <use href="#creamShape"/>
      <g transform="translate(20, 30)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="20 30; 20 45; 20 30" dur="6s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(-20, 40) scale(0.9)">
        <use href="#dripBase"/>
        <animateTransform attributeName="transform" type="translate" values="-20 40; -20 55; -20 40" dur="4.5s" repeatCount="indefinite" begin="0.7s"/>
      </g>
    </g>
  </g>

  <!-- Silver Platter (Front Rim) to cover stems -->
  <path d="M 400 660 A 400 80 0 0 0 1200 660 A 400 80 0 0 0 400 660" fill="none" stroke="url(#silver)" stroke-width="20" opacity="0.9"/>
  <path d="M 410 660 A 390 70 0 0 0 1190 660" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4"/>

  <!-- Platter Base Depth/Volume -->
  <ellipse cx="800" cy="665" rx="390" ry="68" fill="url(#silver)"/>

  <!-- Liquid Cream Pool on Platter -->
  <path d="M 550 660 Q 800 720 1050 660 Q 800 690 550 660 Z" fill="url(#creamGrad)" opacity="0.9"/>
  <path d="M 550 660 Q 800 720 1050 660" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>

  <!-- Bubbling/Champagne Sparkles -->
  <g fill="#FFFFFF">
    <circle cx="600" cy="670" r="2" opacity="0">
      <animate attributeName="cy" values="670;650;670" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="680" r="3" opacity="0">
      <animate attributeName="cy" values="680;660;680" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="850" cy="675" r="2" opacity="0">
      <animate attributeName="cy" values="675;655;675" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="980" cy="665" r="2.5" opacity="0">
      <animate attributeName="cy" values="665;645;665" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>

  <!-- Platter Side Reflections -->
  <path d="M 500 720 L 520 780" stroke="#FFFFFF" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  <path d="M 1100 720 L 1080 780" stroke="#FFFFFF" stroke-width="2" opacity="0.2" stroke-linecap="round"/>

  <!-- ================= FOREGROUND ATMOSPHERE ================= -->

  <!-- Floating Dust Motes -->
  <g fill="#FFB7B2" opacity="0.6">
    <circle cx="300" cy="400" r="2">
      <animate attributeName="cy" values="400;380;400" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="300;320;300" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1300" cy="500" r="3">
      <animate attributeName="cy" values="500;520;500" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="1300;1280;1300" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="300" r="1.5">
      <animate attributeName="cy" values="300;280;300" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="700" r="2.5">
      <animate attributeName="cy" values="700;720;700" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="500;520;500" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="200" r="2">
      <animate attributeName="cy" values="200;180;200" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Neon Sign: "SWEET" -->
  <g transform="translate(800, 150)" filter="url(#neonGlow)">
    <!-- Background Box -->
    <rect x="-180" y="-50" width="360" height="100" rx="15" fill="#1A1A2E" stroke="#FF6F61" stroke-width="4" opacity="0.8"/>
    <!-- Text Path (Stroke only for neon look) -->
    <text x="0" y="25" font-family="monospace" font-size="60" font-weight="bold" fill="none" stroke="#FF6F61" stroke-width="3" text-anchor="middle">SWEET</text>
    <text x="0" y="25" font-family="monospace" font-size="60" font-weight="bold" fill="#FFB7B2" text-anchor="middle" opacity="0.9">SWEET</text>
    
    <!-- Flicker Animation -->
    <animate attributeName="opacity" values="0.9;0.4;0.9;1;0.6;0.9" dur="0.2s" repeatCount="indefinite"/>
  </g>

  <!-- Neon Sign: "LUXE" -->
  <g transform="translate(1300, 450) rotate(15)" filter="url(#neonGlow)">
    <rect x="-100" y="-40" width="200" height="80" rx="10" fill="#1A1A2E" stroke="#FFB7B2" stroke-width="3" opacity="0.8"/>
    <text x="0" y="20" font-family="monospace" font-size="50" font-weight="bold" fill="none" stroke="#FFB7B2" stroke-width="2.5" text-anchor="middle">LUXE</text>
    <text x="0" y="20" font-family="monospace" font-size="50" font-weight="bold" fill="#E0E0E0" text-anchor="middle" opacity="0.8">LUXE</text>
    <animate attributeName="opacity" values="0.8;0.5;0.8;1;0.7;0.8" dur="0.15s" repeatCount="indefinite" begin="0.1s"/>
  </g>

  <!-- Neon Sign: "CREME" -->
  <g transform="translate(300, 450) rotate(-15)" filter="url(#neonGlow)">
    <rect x="-120" y="-40" width="240" height="80" rx="10" fill="#1A1A2E" stroke="#FF6F61" stroke-width="3" opacity="0.8"/>
    <text x="0" y="20" font-family="monospace" font-size="50" font-weight="bold" fill="none" stroke="#FF6F61" stroke-width="2.5" text-anchor="middle">CREME</text>
    <text x="0" y="20" font-family="monospace" font-size="50" font-weight="bold" fill="#FFB7B2" text-anchor="middle" opacity="0.8">CREME</text>
    <animate attributeName="opacity" values="0.8;0.3;0.8;1;0.6;0.8" dur="0.25s" repeatCount="indefinite" begin="0.05s"/>
  </g>

  <!-- Foreground Velvet Drape (Bottom) -->
  <path d="M -100 950 Q 400 850 800 900 Q 1200 850 1700 950 L 1700 1000 L -100 1000 Z" fill="#1A1A2E" opacity="0.95">
    <animate attributeName="d" values="M -100 950 Q 400 850 800 900 Q 1200 850 1700 950 L 1700 1000 L -100 1000 Z; M -100 950 Q 380 860 800 910 Q 1220 860 1700 950 L 1700 1000 L -100 1000 Z; M -100 950 Q 400 850 800 900 Q 1200 850 1700 950 L 1700 1000 L -100 1000 Z" dur="10s" repeatCount="indefinite"/>
  </path>

  <!-- Final Vignette Overlay for Intimacy -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>

</svg>