<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="blurMid" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="blurStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="textileNoise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <radialGradient id="gradChampagne" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#E6CCAB" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E6CCAB" stop-opacity="0.7"/>
    </radialGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#FAF5EC"/>
  
  <g opacity="0.85">
    <ellipse cx="400" cy="650" rx="300" ry="200" fill="#B85440" filter="url(#blurStrong)">
      <animateTransform attributeName="transform" type="rotate" from="0 400 650" to="360 400 650" dur="10s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g opacity="0.8">
    <ellipse cx="1200" cy="200" rx="250" ry="180" fill="#8A9A5B" filter="url(#blurStrong)">
      <animateTransform attributeName="transform" type="rotate" from="360 1200 200" to="0 1200 200" dur="10s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g opacity="0.9" filter="url(#blurMid)">
    <path d="M800,450 Q600,300 400,450 T800,450 T1200,450 T800,450" fill="none" stroke="#E6CCAB" stroke-width="80" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g opacity="0.8">
    <path d="M800,450 Q1000,600 1200,450 T800,450 T400,450 T800,450" fill="none" stroke="#4A2C1F" stroke-width="60" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="360 800 450" to="0 800 450" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g opacity="0.9" filter="url(#blurMid)">
    <path d="M600,450 Q800,200 1000,450 Q800,700 600,450" fill="#B85440">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M600,450 Q800,200 1000,450 Q800,700 600,450;M650,450 Q800,250 1050,450 Q800,650 650,450;M600,450 Q800,200 1000,450 Q800,700 600,450" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g opacity="0.85">
    <path d="M800,450 C700,350 600,550 800,650 C1000,750 1100,550 1000,450 C900,350 750,400 800,500" fill="none" stroke="#8A9A5B" stroke-width="40" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="-360 800 450" dur="10s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g opacity="0.9" filter="url(#blurStrong)">
    <ellipse cx="800" cy="450" rx="400" ry="300" fill="url(#gradChampagne)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 50,-30; 0,0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.95;0.9" dur="5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g opacity="0.75">
    <g>
      <path d="M500,200 Q700,450 500,700" fill="none" stroke="#4A2C1F" stroke-width="20" stroke-linecap="round"/>
      <path d="M1100,200 Q900,450 1100,700" fill="none" stroke="#4A2C1F" stroke-width="20" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="9s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <g opacity="0.9">
    <g>
      <circle cx="800" cy="150" r="40" fill="#B85440" filter="url(#blurMid)"/>
      <circle cx="800" cy="750" r="40" fill="#B85440" filter="url(#blurMid)"/>
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <g opacity="0.85">
    <path d="M200,450 Q400,300 600,450 Q800,600 1000,450 Q1200,300 1400,450" fill="none" stroke="#8A9A5B" stroke-width="50" stroke-linecap="round">
      <animate attributeName="opacity" values="0.8;0.9;0.8" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -100,50; 0,0" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <rect x="0" y="0" width="1600" height="900" fill="url(#gradChampagne)" opacity="0.3" style="mix-blend-mode: overlay;">
    <animate attributeName="opacity" values="0.3;0.4;0.3" dur="6s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="0" y="0" width="1600" height="900" fill="transparent" filter="url(#textileNoise)" opacity="0.07"/>
  
  <g opacity="0.85">
    <path d="M800,450 m-150,0 a150,150 0 1,0 300,0 a150,150 0 1,0 -300,0" fill="none" stroke="#4A2C1F" stroke-width="8" stroke-dasharray="100 200">
      <animateTransform attributeName="transform" type="rotate" from="360 800 450" to="0 800 450" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" from="0" to="300" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g opacity="0.9">
    <circle cx="300" cy="450" r="30" fill="#B85440">
      <animate attributeName="r" values="30;40;30" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1300" cy="450" r="30" fill="#B85440">
      <animate attributeName="r" values="30;40;30" dur="4s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </g>
  
  <g opacity="0.95">
    <path d="M800,100 Q1000,450 800,800 Q600,450 800,100" fill="none" stroke="#E6CCAB" stroke-width="15" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>