<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="steamBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.9"/>
      </feComponentTransfer>
    </filter>
    
    <filter id="softShadow" x="-100%" y="-50%" width="300%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feOffset dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#5C3318" flood-opacity="0.15"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="warmGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="cupBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FAFAF6"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0EDE8"/>
    </linearGradient>
    
    <linearGradient id="coffeeSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5C3318" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5C3318" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#F5EDE0"/>
  
  <ellipse cx="800" cy="640" rx="180" ry="30" fill="#5C3318" opacity="0.1" filter="url(#softShadow)">
    <animate attributeName="rx" values="180;190;180" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.1;0.14;0.1" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  
  <ellipse cx="800" cy="610" rx="200" ry="35" fill="#FAFAF6" filter="url(#softShadow)"/>
  
  <path d="M 900 480 C 980 480 980 560 900 560" fill="none" stroke="#FAFAF6" stroke-width="24" stroke-linecap="round" filter="url(#softShadow)"/>
  <path d="M 900 480 C 980 480 980 560 900 560" fill="none" stroke="#E8E4DC" stroke-width="18" stroke-linecap="round"/>
  
  <path d="M 680 400 Q 680 400 670 520 Q 670 550 800 550 Q 930 550 930 520 Q 920 400 920 400 Q 800 370 680 400 Z" fill="url(#cupBody)" filter="url(#softShadow)"/>
  
  <ellipse cx="800" cy="405" rx="120" ry="25" fill="#E0DCD4"/>
  <ellipse cx="800" cy="400" rx="115" ry="22" fill="url(#coffeeSurface)">
    <animate attributeName="rx" values="115;118;115" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <animate attributeName="opacity" values="0.9;0.85;0.9" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </ellipse>
  
  <path d="M 760 380 Q 770 360 800 365 Q 830 360 840 380" fill="none" stroke="#C9A85C" stroke-width="3" opacity="0.8" filter="url(#warmGlow)">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <g filter="url(#steamBlur)" stroke="#FAFAF6" fill="none" stroke-linecap="round" opacity="0.85">
    <path stroke-width="14" d="M 760 380 C 740 340 780 300 760 260 S 740 180 760 140">
      <animate attributeName="d" values="M 760 380 C 740 340 780 300 760 260 S 740 180 760 140;M 760 380 C 780 340 740 300 760 260 S 780 180 760 140;M 760 380 C 740 340 780 300 760 260 S 740 180 760 140" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.2 0 0.8 1;0.2 0 0.8 1"/>
      <animate attributeName="stroke-width" values="14;6;14" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>
    
    <path stroke-width="12" d="M 800 380 C 800 340 800 300 800 260 S 800 180 800 140">
      <animate attributeName="d" values="M 800 380 C 820 340 780 300 800 260 S 820 180 800 140;M 800 380 C 780 340 820 300 800 260 S 780 180 800 140;M 800 380 C 820 340 780 300 800 260 S 820 180 800 140" dur="5s" repeatCount="indefinite" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="5s" repeatCount="indefinite" begin="0.5s" calcMode="spline" keySplines="0.2 0 0.8 1;0.2 0 0.8 1"/>
      <animate attributeName="stroke-width" values="12;4;12" dur="5s" repeatCount="indefinite" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>
    
    <path stroke-width="10" d="M 840 380 C 860 340 820 300 840 260 S 860 180 840 140">
      <animate attributeName="d" values="M 840 380 C 820 340 860 300 840 260 S 820 180 840 140;M 840 380 C 860 340 820 300 840 260 S 860 180 840 140;M 840 380 C 820 340 860 300 840 260 S 820 180 840 140" dur="6s" repeatCount="indefinite" begin="1s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite" begin="1s" calcMode="spline" keySplines="0.2 0 0.8 1;0.2 0 0.8 1"/>
      <animate attributeName="stroke-width" values="10;3;10" dur="6s" repeatCount="indefinite" begin="1s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>
  </g>
  
  <circle cx="820" cy="360" r="4" fill="#C9A85C" opacity="0" filter="url(#warmGlow)">
    <animate attributeName="cy" values="360;200" dur="5s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="5s" repeatCount="indefinite" begin="0.2s" calcMode="spline" keySplines="0.2 0 0.8 1;0.2 0 0.8 1"/>
  </circle>
  
  <circle cx="780" cy="360" r="3" fill="#C9A85C" opacity="0" filter="url(#warmGlow)">
    <animate attributeName="cy" values="360;220" dur="7s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cx" values="780;760;780" dur="7s" repeatCount="indefinite" begin="1.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="7s" repeatCount="indefinite" begin="1.5s" calcMode="spline" keySplines="0.2 0 0.8 1;0.2 0 0.8 1"/>
  </circle>
  
  <ellipse cx="800" cy="400" rx="100" ry="18" fill="none" stroke="#FAFAF6" stroke-width="2" opacity="0.4">
    <animate attributeName="rx" values="100;110;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
  </ellipse>
</svg>