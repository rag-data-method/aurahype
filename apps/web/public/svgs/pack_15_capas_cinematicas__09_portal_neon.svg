<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A3F">
        <animate attributeName="stop-color" values="#1A1A3F;#0d0d2b;#1A1A3F" dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="70%" stop-color="#5A8FA8">
        <animate attributeName="stop-color" values="#5A8FA8;#3d6e7a;#5A8FA8" dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#1A1A3F">
        <animate attributeName="stop-color" values="#1A1A3F;#5A8FA8;#1A1A3F" dur="20s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E54B9C" stop-opacity="0.9">
        <animate attributeName="stop-opacity" values="0.9;0.6;0.9" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="40%" stop-color="#5E6AD2" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1A1A3F" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E54B9C" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#E54B9C" stop-opacity="0.9">
        <animate attributeName="stop-opacity" values="0.9;0.5;0.9" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#5E6AD2" stop-opacity="0.4" />
    </linearGradient>

    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A8FA8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#1A1A3F" stop-opacity="0.8" />
    </linearGradient>

    <!-- Filters -->
    <filter id="b120" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="120" />
    </filter>
    <filter id="b90" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="90" />
    </filter>
    <filter id="b60" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="b20" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Figure Silhouette -->
    <path id="fig" d="M0,0 L4,0 L5,-2 L6,0 L10,0 L10,8 L9,14 L10,24 L8,24 L7,15 L6,24 L4,24 L5,15 L4,14 L3,24 L1,24 L2,14 L1,8 L0,8 Z M4,-4 A3,3 0 1,1 4,-10 A3,3 0 0,1 4,-4 Z" />
  </defs>

  <!-- Base Background -->
  <rect width="1600" height="900" fill="url(#skyGrad)" />

  <!-- 1. Deep Sky Stars / Top Left Void -->
  <circle cx="200" cy="150" r="1.5" fill="#5A8FA8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="150" cy="280" r="1" fill="#E54B9C" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="350" cy="120" r="1.2" fill="#5A8FA8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="9s" repeatCount="indefinite" />
  </circle>
  <circle cx="80" cy="400" r="0.8" fill="#5E6AD2" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="6s" repeatCount="indefinite" />
  </circle>

  <!-- 2. Far Atmospheric Violet Haze Layer -->
  <ellipse cx="900" cy="550" rx="900" ry="400" fill="#5E6AD2" opacity="0.15" filter="url(#b120)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="15s" repeatCount="indefinite" />
  </ellipse>

  <!-- 3. Mid-Distance Fog Banks -->
  <path d="M-100,700 Q400,650 900,750 T1700,680 V900 H-100 Z" fill="#5A8FA8" opacity="0.2" filter="url(#b90)">
    <animate attributeName="d" values="M-100,700 Q400,650 900,750 T1700,680 V900 H-100 Z;M-100,720 Q400,670 900,730 T1700,700 V900 H-100 Z;M-100,700 Q400,650 900,750 T1700,680 V900 H-100 Z" dur="20s" repeatCount="indefinite" />
  </path>

  <!-- 4. Ground Plane -->
  <rect x="0" y="650" width="1600" height="250" fill="url(#groundGrad)" />
  
  <!-- 5. Ground Reflection / Glow Pool -->
  <ellipse cx="1050" cy="820" rx="350" ry="60" fill="#E54B9C" opacity="0.15" filter="url(#b90)">
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="10s" repeatCount="indefinite" />
  </ellipse>

  <!-- 6. Portal Core Back Glow -->
  <circle cx="1050" cy="550" r="300" fill="url(#portalGlow)" />

  <!-- 7. Large Ambient Bloom (Portal) -->
  <ellipse cx="1050" cy="550" rx="150" ry="250" fill="#E54B9C" opacity="0.3" filter="url(#b120)">
    <animate attributeName="opacity" values="0.3;0.45;0.3" dur="8s" repeatCount="indefinite" />
  </ellipse>

  <!-- 8. Mid Bloom (Portal) -->
  <ellipse cx="1050" cy="550" rx="100" ry="180" fill="#5E6AD2" opacity="0.4" filter="url(#b60)">
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="6s" repeatCount="indefinite" />
  </ellipse>

  <!-- 9. Sharp Fog Veils near Portal Base -->
  <path d="M700,900 Q950,850 1200,900 T1400,900 Z" fill="#5A8FA8" opacity="0.3" filter="url(#b60)" />

  <!-- 10. The Arch Structure -->
  <g transform="translate(1050, 550)">
    <!-- Arch Body -->
    <path d="M-60,250 L-60,0 A60,60 0 0,1 60,0 L60,250" fill="none" stroke="url(#archGrad)" stroke-width="12" filter="url(#b20)" />
    <path d="M-60,250 L-60,0 A60,60 0 0,1 60,0 L60,250" fill="none" stroke="#E54B9C" stroke-width="4" opacity="0.8" />
    <path d="M-60,250 L-60,0 A60,60 0 0,1 60,0 L60,250" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6" />
    
    <!-- Inner steps/floor detail -->
    <line x1="-50" y1="250" x2="50" y2="250" stroke="#E54B9C" stroke-width="2" opacity="0.5" />
    <line x1="-40" y1="240" x2="40" y2="240" stroke="#E54B9C" stroke-width="1.5" opacity="0.4" />
    <line x1="-30" y1="230" x2="30" y2="230" stroke="#E54B9C" stroke-width="1" opacity="0.3" />

    <!-- Arch rim lights pulsing -->
    <circle cx="0" cy="-60" r="4" fill="#fff" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="-60" cy="0" r="3" fill="#E54B9C" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="60" cy="0" r="3" fill="#E54B9C" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="5.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 11. Subject Silhouette (Small Figure) -->
  <g id="wanderer" transform="translate(350, 780) scale(2.5)">
    <!-- Sway animation -->
    <animateTransform attributeName="transform" type="translate" values="350,780; 352,780; 350,780" dur="10s" repeatCount="indefinite" />
    
    <!-- Figure Body -->
    <use href="#fig" fill="#1A1A3F" />
    
    <!-- Rim Light (Right side facing portal) -->
    <use href="#fig" fill="none" stroke="#E54B9C" stroke-width="0.5" opacity="0.7" transform="translate(0.5,0)" />
    <use href="#fig" fill="none" stroke="#5E6AD2" stroke-width="0.5" opacity="0.5" transform="translate(1,0)" />

    <!-- Ground Shadow -->
    <ellipse cx="5" cy="24" rx="6" ry="1.5" fill="#1A1A3F" opacity="0.6" filter="url(#b20)" />
  </g>

  <!-- 12. Floating Upward Particles (Generated via JS-like structure but hardcoded for pure SVG) -->
  <g id="particles" fill="#E54B9C" opacity="0.6">
    <!-- P1 -->
    <circle cx="980" cy="600" r="2" filter="url(#glow)">
      <animate attributeName="cy" values="600;300;600" dur="12s" repeatCount="indefinite" />
      <animate attributeName="cx" values="980;1000;980" dur="12s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="12s" repeatCount="indefinite" />
    </circle>
    <!-- P2 -->
    <circle cx="1100" cy="650" r="1.5" filter="url(#glow)">
      <animate attributeName="cy" values="650;350;650" dur="15s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1100;1080;1100" dur="15s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="15s" repeatCount="indefinite" />
    </circle>
    <!-- P3 -->
    <circle cx="1020" cy="700" r="3" filter="url(#glow)" fill="#5E6AD2">
      <animate attributeName="cy" values="700;400;700" dur="18s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1020;1050;1020" dur="18s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0;0.4" dur="18s" repeatCount="indefinite" />
    </circle>
    <!-- P4 -->
    <circle cx="1120" cy="500" r="2" filter="url(#glow)">
      <animate attributeName="cy" values="500;200;500" dur="10s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1120;1140;1120" dur="10s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0;0.7" dur="10s" repeatCount="indefinite" />
    </circle>
    <!-- P5 -->
    <circle cx="1050" cy="800" r="1" fill="#fff">
      <animate attributeName="cy" values="800;450;800" dur="14s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1050;1040;1050" dur="14s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0;0.8" dur="14s" repeatCount="indefinite" />
    </circle>
    <!-- P6 -->
    <circle cx="990" cy="550" r="1.5" fill="#5A8FA8">
      <animate attributeName="cy" values="550;250;550" dur="16s" repeatCount="indefinite" />
      <animate attributeName="cx" values="990;1010;990" dur="16s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="16s" repeatCount="indefinite" />
    </circle>
    <!-- P7 -->
    <circle cx="1080" cy="750" r="2.5" fill="#E54B9C" filter="url(#glow)">
      <animate attributeName="cy" values="750;400;750" dur="20s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1080;1070;1080" dur="20s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="20s" repeatCount="indefinite" />
    </circle>
    <!-- P8 -->
    <circle cx="1150" cy="600" r="1" fill="#fff">
      <animate attributeName="cy" values="600;300;600" dur="11s" repeatCount="indefinite" />
      <animate attributeName="cx" values="1150;1130;1150" dur="11s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.9;0;0.9" dur="11s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 13. Foreground Atmospheric Haze (Teal) -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#skyGrad)" opacity="0.1" filter="url(#b90)" style="mix-blend-mode: overlay;" pointer-events="none" />

  <!-- 14. Cinematic Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#1A1A3F" stop-opacity="0" />
    <stop offset="100%" stop-color="#1A1A3F" stop-opacity="0.6" />
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)" pointer-events="none" />

  <!-- 15. Foreground Dust Motes drifting horizontally -->
  <g fill="#E54B9C" opacity="0.3">
    <circle cx="400" cy="300" r="1.5">
      <animate attributeName="cx" values="400;450;400" dur="25s" repeatCount="indefinite" />
      <animate attributeName="cy" values="300;280;300" dur="25s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="500" r="1">
      <animate attributeName="cx" values="200;240;200" dur="30s" repeatCount="indefinite" />
      <animate attributeName="cy" values="500;520;500" dur="30s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="200" r="2" fill="#5A8FA8" opacity="0.2">
      <animate attributeName="cx" values="600;580;600" dur="22s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200;220;200" dur="22s" repeatCount="indefinite" />
    </circle>
    <circle cx="1300" cy="400" r="1.2">
      <animate attributeName="cx" values="1300;1260;1300" dur="18s" repeatCount="indefinite" />
      <animate attributeName="cy" values="400;380;400" dur="18s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="700" r="1.5" fill="#5E6AD2" opacity="0.4">
      <animate attributeName="cx" values="800;850;800" dur="28s" repeatCount="indefinite" />
      <animate attributeName="cy" values="700;720;700" dur="28s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- 16. Bottom Edge Heavy Fog Occlusion -->
  <rect x="0" y="850" width="1600" height="50" fill="#1A1A3F" opacity="0.7" filter="url(#b60)" />
</svg>