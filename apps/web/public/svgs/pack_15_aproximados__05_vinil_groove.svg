<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1A1510"/>
      <stop offset="60%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#050303"/>
    </radialGradient>

    <!-- Label Gradient -->
    <radialGradient id="label-base" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E0">
        <animate attributeName="stop-color" values="#FFF8E0;#F5E6C4;#E8D8B8;#F5E6C4;#FFF8E0" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="85%" stop-color="#E8D8B8">
        <animate attributeName="stop-color" values="#E8D8B8;#D4C4A4;#C9B99A;#D4C4A4;#E8D8B8" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#B0A080"/>
    </radialGradient>

    <!-- Groove Shimmer Gradient -->
    <radialGradient id="groove-shimmer" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E0" stop-opacity="0.04">
        <animate attributeName="stop-opacity" values="0.04;0.12;0.06;0.14;0.04" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FFF8E0" stop-opacity="0.0">
        <animate attributeName="stop-opacity" values="0.0;0.08;0.0;0.06;0.0" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFF8E0" stop-opacity="0.02">
        <animate attributeName="stop-opacity" values="0.02;0.1;0.02;0.08;0.02" dur="10s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>

    <!-- Filter: Atmospheric Blur -->
    <filter id="blur-atm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <!-- Filter: Medium Blur -->
    <filter id="blur-med" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <!-- Filter: Soft Blur -->
    <filter id="blur-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <!-- Filter: Organic Texture for vinyl grooves -->
    <filter id="vinyl-texture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <!-- Filter: Dust Blur -->
    <filter id="dust-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Reusable Dust Particle -->
    <g id="dust">
      <circle r="1.5" fill="#FFF8E0">
        <animate attributeName="opacity" values="0;0.6;0.2;0.7;0" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="r" values="1.5;2.5;1.5;2;1.5" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </defs>

  <!-- 1. Cinematic Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="#0A0A0A" opacity="0.3" filter="url(#blur-atm)"/>

  <!-- Light leak overlay -->
  <rect width="100%" height="100%" fill="none">
    <animate attributeName="fill" values="#0A0A0A;#0A0A0A;#0A0A0A" dur="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="1600" height="900" fill="#FFF8E0" opacity="0.015" filter="url(#blur-atm)">
    <animate attributeName="opacity" values="0.015;0.035;0.015" dur="14s" repeatCount="indefinite"/>
  </rect>
  <rect x="200" y="-200" width="1200" height="800" fill="#E8D8B8" opacity="0.02" filter="url(#blur-med)">
    <animate attributeName="opacity" values="0.02;0.05;0.02" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="x" values="200;180;220;200" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- 2. Rotating Record Group -->
  <g id="record" transform="translate(800, 450)">
    <!-- Slow Rotation -->
    <animateTransform attributeName="transform" type="rotate" from="0 800 450" to="360 800 450" dur="40s" repeatCount="indefinite" additive="sum"/>

    <!-- 2a. Core Black Vinyl Base -->
    <circle cx="0" cy="0" r="420" fill="#0A0A0A"/>
    
    <!-- Base Vinyl Edge Glow -->
    <circle cx="0" cy="0" r="420" fill="none" stroke="#E8D8B8" stroke-width="3" opacity="0.06" filter="url(#blur-soft)"/>

    <!-- 2b. Outer Grooves Ring (Textured) -->
    <circle cx="0" cy="0" r="405" fill="none" stroke="#2A2A2A" stroke-width="28" opacity="0.9" filter="url(#vinyl-texture)"/>
    <circle cx="0" cy="0" r="405" fill="none" stroke="#2A2A2A" stroke-width="28" opacity="0.4" filter="url(#blur-soft)"/>

    <!-- 2c. Inner Grooves Ring -->
    <circle cx="0" cy="0" r="360" fill="none" stroke="#2A2A2A" stroke-width="84" opacity="0.85" filter="url(#vinyl-texture)"/>
    <circle cx="0" cy="0" r="360" fill="none" stroke="#2A2A2A" stroke-width="84" opacity="0.3" filter="url(#blur-med)"/>

    <!-- 2d. Center Grooves Ring -->
    <circle cx="0" cy="0" r="240" fill="none" stroke="#2A2A2A" stroke-width="150" opacity="0.8" filter="url(#vinyl-texture)"/>
    <circle cx="0" cy="0" r="240" fill="none" stroke="#2A2A2A" stroke-width="150" opacity="0.2" filter="url(#blur-atm)"/>

    <!-- 2e. Deep Groove Grooves (Ultra-fine detail) -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="#1A1A1A" stroke-width="60" opacity="0.7" filter="url(#vinyl-texture)"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#0F0F0F" stroke-width="60" opacity="0.5" filter="url(#blur-soft)"/>

    <!-- 2f. Label Base -->
    <circle cx="0" cy="0" r="140" fill="url(#label-base)"/>
    
    <!-- Label Subtle Pulsing Shadow -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#8B4513" stroke-width="4" opacity="0.15" filter="url(#blur-soft)">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- 2g. Label Inner Rings (Concentric Faded Ink) -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#8B4513" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="118" fill="none" stroke="#8B4513" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#8B4513" stroke-width="2" opacity="0.25"/>
    <circle cx="0" cy="0" r="78" fill="none" stroke="#8B4513" stroke-width="1" opacity="0.2"/>

    <!-- 2h. Faded Typography Lines -->
    <path d="M -90 0 Q -60 25 -30 0 T 30 0 T 90 0" fill="none" stroke="#8B4513" stroke-width="2" opacity="0.15" filter="url(#blur-soft)"/>
    <path d="M -80 20 Q -40 45 0 20 T 80 20" fill="none" stroke="#8B4513" stroke-width="1.5" opacity="0.1" filter="url(#blur-soft)"/>
    <path d="M -70 -20 Q -30 -45 10 -20 T 70 -20" fill="none" stroke="#8B4513" stroke-width="1.5" opacity="0.12" filter="url(#blur-soft)"/>

    <!-- 2i. Text details (Stylized, blurred) -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="#8B4513" stroke-width="0.8" opacity="0.2"/>
    <ellipse cx="0" cy="-50" rx="60" ry="8" fill="#8B4513" opacity="0.08" filter="url(#blur-soft)"/>
    <ellipse cx="0" cy="50" rx="60" ry="8" fill="#8B4513" opacity="0.08" filter="url(#blur-soft)"/>
    <ellipse cx="-50" cy="0" rx="8" ry="60" fill="#8B4513" opacity="0.08" filter="url(#blur-soft)"/>
    <ellipse cx="50" cy="0" rx="8" ry="60" fill="#8B4513" opacity="0.08" filter="url(#blur-soft)"/>

    <!-- 2j. Spindle Hole -->
    <circle cx="0" cy="0" r="9" fill="#0A0A0A"/>
    <circle cx="0" cy="0" r="9" fill="none" stroke="#2A2A2A" stroke-width="2"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="#E8D8B8" stroke-width="1" opacity="0.3"/>

    <!-- 2k. Label Center Dot (Highlight) -->
    <circle cx="0" cy="0" r="3" fill="#FFF8E0" opacity="0.8"/>

    <!-- 2l. Groove Light Reflection (Shimmering) -->
    <circle cx="0" cy="0" r="380" fill="none" stroke="url(#groove-shimmer)" stroke-width="120" opacity="0.6" filter="url(#blur-soft)"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="url(#groove-shimmer)" stroke-width="80" opacity="0.5" filter="url(#blur-soft)"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#groove-shimmer)" stroke-width="60" opacity="0.4" filter="url(#blur-soft)"/>

    <!-- 2m. Arc Highlights (The "Catch Light") -->
    <path d="M -300 -200 A 360 360 0 0 1 300 -200" fill="none" stroke="#FFF8E0" stroke-width="6" opacity="0.1" filter="url(#blur-med)">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="6;10;6" dur="12s" repeatCount="indefinite"/>
    </path>
    <path d="M -280 -180 A 340 340 0 0 1 280 -180" fill="none" stroke="#FFF8E0" stroke-width="3" opacity="0.15" filter="url(#blur-soft)">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M -320 -220 A 380 380 0 0 1 320 -220" fill="none" stroke="#FFF8E0" stroke-width="2" opacity="0.08" filter="url(#blur-med)">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="14s" repeatCount="indefinite"/>
    </path>

    <!-- 2n. Radial Highlights (Sunburst from grooves) -->
    <g opacity="0.5">
      <path d="M 0 0 L -400 -400 L 400 -400 Z" fill="#FFF8E0" opacity="0.02"/>
      <path d="M 0 0 L -400 400 L 400 400 Z" fill="#FFF8E0" opacity="0.02"/>
      <path d="M 0 0 L -400 -400 L -400 400 Z" fill="#FFF8E0" opacity="0.02"/>
      <path d="M 0 0 L 400 -400 L 400 400 Z" fill="#FFF8E0" opacity="0.02"/>
    </g>

    <!-- 2o. Subtle Warm Edge Glow on Vinyl -->
    <circle cx="0" cy="0" r="415" fill="none" stroke="#E8D8B8" stroke-width="6" opacity="0.04" filter="url(#blur-soft)">
      <animate attributeName="opacity" values="0.04;0.08;0.04" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="r" values="415;416;415" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 3. Floating Dust Particles (Foreground & Midground) -->
  <g filter="url(#dust-blur)">
    <!-- Particle 1 -->
    <use href="#dust" x="200" y="200">
      <animateTransform attributeName="transform" type="translate" values="0,0; 50,-30; 20,40; -10,-20; 0,0" dur="18s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 2 -->
    <use href="#dust" x="500" y="100">
      <animateTransform attributeName="transform" type="translate" values="0,0; -30,20; 40,-10; -20,30; 0,0" dur="22s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 3 -->
    <use href="#dust" x="1200" y="300">
      <animateTransform attributeName="transform" type="translate" values="0,0; 20,40; -40,-20; 10,10; 0,0" dur="15s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 4 -->
    <use href="#dust" x="900" y="600">
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,-30; 30,10; -10,40; 0,0" dur="20s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 5 -->
    <use href="#dust" x="300" y="700">
      <animateTransform attributeName="transform" type="translate" values="0,0; 40,-10; -20,30; 30,-20; 0,0" dur="24s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 6 -->
    <use href="#dust" x="1300" y="700">
      <animateTransform attributeName="transform" type="translate" values="0,0; -10,20; 20,-40; -30,10; 0,0" dur="17s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 7 -->
    <use href="#dust" x="700" y="150">
      <animateTransform attributeName="transform" type="translate" values="0,0; 30,30; -20,-10; 10,-30; 0,0" dur="19s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 8 -->
    <use href="#dust" x="1100" y="800">
      <animateTransform attributeName="transform" type="translate" values="0,0; -40,-20; 10,30; -20,-10; 0,0" dur="21s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 9 -->
    <use href="#dust" x="150" y="450">
      <animateTransform attributeName="transform" type="translate" values="0,0; 20,-40; -30,20; 10,-10; 0,0" dur="16s" repeatCount="indefinite"/>
    </use>
    <!-- Particle 10 -->
    <use href="#dust" x="1450" y="450">
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,30; 40,-20; -10,10; 0,0" dur="23s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- 4. Foreground Vignette -->
  <!-- Top Left Dark Corner -->
  <rect x="0" y="0" width="600" height="500" fill="#0A0A0A" opacity="0.4" filter="url(#blur-atm)">
    <animate attributeName="opacity" values="0.4;0.5;0.4" dur="14s" repeatCount="indefinite"/>
  </rect>
  <!-- Bottom Right Dark Corner -->
  <rect x="1000" y="400" width="600" height="500" fill="#0A0A0A" opacity="0.4" filter="url(#blur-atm)">
    <animate attributeName="opacity" values="0.4;0.5;0.4" dur="16s" repeatCount="indefinite"/>
  </rect>

  <!-- 5. Cinematic Top/Bottom Bars (Subtle, not harsh) -->
  <rect x="0" y="0" width="1600" height="40" fill="#050303" opacity="0.6" filter="url(#blur-soft)">
    <animate attributeName="opacity" values="0.6;0.7;0.6" dur="20s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="860" width="1600" height="40" fill="#050303" opacity="0.6" filter="url(#blur-soft)">
    <animate attributeName="opacity" values="0.6;0.7;0.6" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- 6. Soft Lens Flares -->
  <circle cx="250" cy="250" r="150" fill="#FFF8E0" opacity="0.03" filter="url(#blur-med)">
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="250;230;270;250" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="250;270;230;250" dur="22s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1350" cy="650" r="200" fill="#E8D8B8" opacity="0.03" filter="url(#blur-atm)">
    <animate attributeName="opacity" values="0.03;0.05;0.03" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="1350;1370;1330;1350" dur="28s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="650;630;670;650" dur="24s" repeatCount="indefinite"/>
  </circle>

  <!-- 7. Overall Warm Tint Overlay -->
  <rect width="100%" height="100%" fill="#E8D8B8" opacity="0.03" style="mix-blend-mode: overlay;"/>
</svg>