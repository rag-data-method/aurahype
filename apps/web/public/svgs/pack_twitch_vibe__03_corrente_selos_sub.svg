<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#0f0e17"/>
    </linearGradient>

    <filter id="neon-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="blur1">
        <animate attributeName="stdDeviation" values="0;12;0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" begin="0.5s"/>
      </feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="blur2">
        <animate attributeName="stdDeviation" values="0;24;0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" begin="0.5s"/>
      </feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="blur3">
        <animate attributeName="stdDeviation" values="0;48;0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" begin="0.5s"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="beam-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g id="hex-shape">
      <polygon points="0,-70,60.6,-35,60.6,35,0,70,-60.6,35,-60.6,-35" stroke-width="6" stroke-linejoin="round"/>
    </g>

    <g id="antenna">
      <line x1="0" y1="-70" x2="0" y2="-100" stroke-width="6" stroke-linecap="round"/>
      <ellipse cx="0" cy="-100" rx="12" ry="7" stroke-width="4" fill="none"/>
    </g>

    <g id="star" fill="#ffffff">
      <polygon points="0,-15,4.5,-4.5,15,0,4.5,4.5,0,15,-4.5,4.5,-15,0,-4.5,-4.5"/>
    </g>
  </defs>

  <rect width="800" height="600" fill="url(#bg-grad)"/>

  <g opacity="0.15" stroke="#7c3aed" stroke-width="2">
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
  </g>

  <g id="links-layer" fill="none" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#beam-glow)">
    <path d="M 160 420 Q 260 480, 340 300" stroke="#00e5ff">
      <animate attributeName="stroke-dasharray" values="0 300; 300 0" dur="1.5s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>
    
    <path d="M 340 300 Q 420 120, 460 300" stroke="#00ff77">
      <animate attributeName="stroke-dasharray" values="0 250; 250 0" dur="1.2s" begin="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>
    
    <path d="M 460 300 Q 500 480, 580 300" stroke="#ffcc00">
      <animate attributeName="stroke-dasharray" values="0 250; 250 0" dur="1.2s" begin="3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>
    
    <path d="M 580 300 Q 620 120, 660 300" stroke="#a855f7">
      <animate attributeName="stroke-dasharray" values="0 250; 250 0" dur="1.2s" begin="4.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>
  </g>

  <g id="badges-layer">
    <g id="badge-1" transform="translate(160, 420)">
      <g filter="url(#neon-glow)">
        <use href="#hex-shape" fill="#2d1b4e" stroke="#ff0055"/>
      </g>
      <use href="#hex-shape" fill="#4a1c40" stroke="#ff0055" opacity="0.6"/>
      
      <use href="#antenna" stroke="#ff0055"/>
      <ellipse cx="0" cy="-100" rx="5" ry="3" fill="#ff0055">
        <animate attributeName="opacity" values="1;0.2;1" dur="0.8s" repeatCount="indefinite"/>
      </ellipse>

      <rect x="-25" y="-20" width="50" height="40" rx="8" fill="#ff0055" transform="rotate(15)"/>
      <rect x="-15" y="-10" width="30" height="20" rx="4" fill="#ffffff" transform="rotate(15)"/>
      <polygon points="-25,20 -5,20 -15,35" fill="#ff0055" transform="rotate(15)"/>

      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1"/>
        <circle cx="0" cy="0" r="85" stroke="#ff0055" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="10 20"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
      </g>

      <use href="#star" x="-35" y="-40" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
      </use>
      <use href="#star" x="40" y="30" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      </use>
      <use href="#star" x="-30" y="45" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
      </use>
    </g>

    <g id="badge-2" transform="translate(340, 300)">
      <g filter="url(#neon-glow)">
        <use href="#hex-shape" fill="#1c3b4a" stroke="#00e5ff"/>
      </g>
      <use href="#hex-shape" fill="#1c4a5e" stroke="#00e5ff" opacity="0.6"/>

      <use href="#antenna" stroke="#00e5ff"/>
      <ellipse cx="0" cy="-100" rx="5" ry="3" fill="#00e5ff">
        <animate attributeName="opacity" values="1;0.2;1" dur="0.9s" repeatCount="indefinite"/>
      </ellipse>

      <path d="M -20,-10 L 20,-10 L 0,30 Z" fill="#00e5ff" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" transform="translate(0, 5)"/>
      <circle cx="0" cy="-25" r="10" fill="#ffffff"/>

      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" begin="1.5s"/>
        <circle cx="0" cy="0" r="85" stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="15 15"/>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite"/>
      </g>

      <use href="#star" x="35" y="-35" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
      </use>
      <use href="#star" x="-45" y="20" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="1.9s" repeatCount="indefinite" begin="1.8s"/>
      </use>
      <use href="#star" x="40" y="40" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
      </use>
    </g>

    <g id="badge-3" transform="translate(460, 300)">
      <g filter="url(#neon-glow)">
        <use href="#hex-shape" fill="#1a3b2a" stroke="#00ff77"/>
      </g>
      <use href="#hex-shape" fill="#1e4d36" stroke="#00ff77" opacity="0.6"/>

      <use href="#antenna" stroke="#00ff77"/>
      <ellipse cx="0" cy="-100" rx="5" ry="3" fill="#00ff77">
        <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
      </ellipse>

      <g transform="translate(0, -5)">
        <path d="M -15,-10 C -25,-25, -5,-35, 0,-20 C 5,-35, 25,-25, 15,-10 C 30,0, 15,20, 0,10 C -15,20, -30,0, -15,-10 Z" fill="#00ff77" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
      </g>
      <path d="M -15,15 L 0,25 L 15,15" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" begin="3s"/>
        <circle cx="0" cy="0" r="85" stroke="#00ff77" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="8 12"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
      </g>

      <use href="#star" x="-40" y="-30" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.4s" repeatCount="indefinite" begin="1.5s"/>
      </use>
      <use href="#star" x="45" y="-10" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="1.7s" repeatCount="indefinite" begin="0.6s"/>
      </use>
      <use href="#star" x="-20" y="50" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.1s" repeatCount="indefinite" begin="2.2s"/>
      </use>
    </g>

    <g id="badge-4" transform="translate(580, 300)">
      <g filter="url(#neon-glow)">
        <use href="#hex-shape" fill="#4a3b00" stroke="#ffcc00"/>
      </g>
      <use href="#hex-shape" fill="#5c4d00" stroke="#ffcc00" opacity="0.6"/>

      <use href="#antenna" stroke="#ffcc00"/>
      <ellipse cx="0" cy="-100" rx="5" ry="3" fill="#ffcc00">
        <animate attributeName="opacity" values="1;0.2;1" dur="0.7s" repeatCount="indefinite"/>
      </ellipse>

      <circle cx="0" cy="-5" r="22" fill="none" stroke="#ffcc00" stroke-width="6"/>
      <path d="M -10,-15 L 0,-5 L 10,-15 M -10,5 L 0,15 L 10,5" fill="none" stroke="#ffcc00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <polygon points="0,-5 -6,10 6,10" fill="#ffcc00"/>

      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" begin="4.5s"/>
        <circle cx="0" cy="0" r="85" stroke="#ffcc00" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="20 10"/>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite"/>
      </g>

      <use href="#star" x="30" y="-45" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="1.6s" repeatCount="indefinite" begin="0.2s"/>
      </use>
      <use href="#star" x="-35" y="35" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.6s" repeatCount="indefinite" begin="1.4s"/>
      </use>
    </g>

    <g id="badge-5" transform="translate(660, 300)">
      <g filter="url(#neon-glow)">
        <use href="#hex-shape" fill="#2e1065" stroke="#a855f7"/>
      </g>
      <use href="#hex-shape" fill="#3b1d78" stroke="#a855f7" opacity="0.6"/>

      <use href="#antenna" stroke="#a855f7"/>
      <ellipse cx="0" cy="-100" rx="5" ry="3" fill="#a855f7">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.1s" repeatCount="indefinite"/>
      </ellipse>

      <path d="M -20,15 L -10,-5 L 0,20 L 10,-15 L 20,15" fill="none" stroke="#a855f7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="-20" cy="15" r="5" fill="#ffffff"/>
      <circle cx="20" cy="15" r="5" fill="#ffffff"/>
      <circle cx="0" cy="20" r="5" fill="#ffffff"/>
      <circle cx="-10" cy="-5" r="5" fill="#ffffff"/>
      <circle cx="10" cy="-15" r="5" fill="#ffffff"/>

      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="3.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" begin="6s"/>
        <circle cx="0" cy="0" r="85" stroke="#a855f7" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="5 15"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      </g>

      <use href="#star" x="0" y="-50" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.3s" repeatCount="indefinite" begin="0.9s"/>
      </use>
      <use href="#star" x="-50" y="0" fill="#ffea00">
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="2.5s"/>
      </use>
    </g>
  </g>

  <g id="confetti-layer">
    <g id="confetti-1" transform="translate(200, 150)">
      <path d="M -10,-5 Q 0,-15 10,-5 Q 0,5 -10,-5 Z" fill="#ff0055">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </path>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="0.2s"/>
      <animateTransform attributeName="transform" type="translate" values="200,150; 220,180; 180,220; 200,150" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.33;0.66;1"/>
    </g>

    <g id="confetti-2" transform="translate(450, 100)">
      <rect x="-6" y="-6" width="12" height="12" fill="#00e5ff">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="5s" repeatCount="indefinite"/>
      </rect>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
      <animateTransform attributeName="transform" type="translate" values="450,100; 480,130; 420,160; 450,100" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.33;0.66;1"/>
    </g>

    <g id="confetti-3" transform="translate(600, 200)">
      <circle cx="0" cy="0" r="8" fill="#ffcc00">
        <animateTransform attributeName="transform" type="scale" values="1;1.5;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      <animateTransform attributeName="transform" type="translate" values="600,200; 570,230; 630,250; 600,200" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.33;0.66;1"/>
    </g>

    <g id="confetti-4" transform="translate(350, 550)">
      <path d="M -8,0 L 0,-10 L 8,0 L 0,10 Z" fill="#00ff77">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
      </path>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
      <animateTransform attributeName="transform" type="translate" values="350,550; 380,520; 320,500; 350,550" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.33;0.66;1"/>
    </g>

    <g id="confetti-5" transform="translate(100, 300)">
      <rect x="-5" y="-8" width="10" height="16" rx="5" fill="#a855f7">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="6s" repeatCount="indefinite"/>
      </rect>
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" begin="2s"/>
      <animateTransform attributeName="transform" type="translate" values="100,300; 130,270; 70,250; 100,300" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.33;0.66;1"/>
    </g>

    <g id="confetti-6" transform="translate(700, 500)">
      <polygon points="0,-10,8,5,-8,5" fill="#ffea00">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4.5s" repeatCount="indefinite"/>
      </polygon>
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
      <animateTransform attributeName="transform" type="translate" values="700,500; 670,470; 730,450; 700,500" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.33;0.66;1"/>
    </g>
  </g>
</svg>