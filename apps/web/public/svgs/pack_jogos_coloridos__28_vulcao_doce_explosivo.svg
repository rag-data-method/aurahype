      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="1.5s" additive="sum" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g transform="translate(950,360)">
    <circle r="8" fill="#00F5FF">
