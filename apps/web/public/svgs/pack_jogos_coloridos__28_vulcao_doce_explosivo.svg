  </path>
  <path d="M1120,860 L1142,850 L1137,880 Z" fill="#FFD93D">
    <animateTransform attributeName="transform" type="translate" values="0,0; 70,-220" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="2.5s" additive="sum" repeatCount="indefinite"/>
  </path>
</g>

<g>
