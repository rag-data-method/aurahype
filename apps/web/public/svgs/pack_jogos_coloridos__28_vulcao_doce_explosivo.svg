      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="2s" additive="sum" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
