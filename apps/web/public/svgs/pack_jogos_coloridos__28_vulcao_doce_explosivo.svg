    <animateTransform attributeName="transform" type="translate" values="1650,120; -100,720" dur="4.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;720" additive="sum" dur="4.5s" repeatCount="indefinite"/>
  </rect>
  <circle r="9" fill="#00F5FF" transform="translate(1650,350)">
    <animateTransform attributeName="transform" type="translate" values="1650,350; -100,650" dur="5.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;-360" additive="sum" dur="5.5s" repeatCount="indefinite"/>
