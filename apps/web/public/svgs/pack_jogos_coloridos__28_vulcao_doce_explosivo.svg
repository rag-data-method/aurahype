    <animate attributeName="opacity" values="1;0" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse rx="190" ry="55" fill="none" stroke="#FFD93D" stroke-width="5">
    <animateTransform attributeName="transform" type="scale" values="0.3;1.9" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
  </ellipse>
</g>

<g>
