  <g transform="translate(980,370)">
    <circle r="7" fill="#FF006E">
      <animateTransform attributeName="transform" type="translate" values="0,0; 120,-270; 240,-170" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="1.6s" additive="sum" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(950,370)">
    <path d="M0,-6 L6,3 L-6,3 Z" fill="#00F5FF">
      <animateTransform attributeName="transform" type="translate" values="0,0; 60,-320; -60,-420" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;720" dur="3s" additive="sum" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
</g>

<g fill="#FFF">
  <path d="M1280,180 L1285,196 L1301,201 L1285,206 L1280,222 L1275,206 L1259,201 L1275,196 Z" opacity="0.9">
    <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M1080,280 L1083,289 L1092,292 L1083,295 L1080,304 L1077,295 L1068,292 L1077,289 Z" opacity="0.8">
    <animateTransform attributeName="transform" type="scale" values="0;1.2;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </path>
</g>

<g>
  <path d="M720,820 L742,810 L737,838 Z" fill="#FF6B6B">
