<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
<defs>
  <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FFD93D"><animate attributeName="stop-color" values="#FFD93D;#FF9F1C;#FFD93D" dur="6s" repeatCount="indefinite"/></stop>
    <stop offset="50%" stop-color="#FF6B6B"><animate attributeName="stop-color" values="#FF6B6B;#FF006E;#FF6B6B" dur="6s" repeatCount="indefinite"/></stop>
    <stop offset="100%" stop-color="#00F5FF"><animate attributeName="stop-color" values="#00F5FF;#FFD93D;#00F5FF" dur="6s" repeatCount="indefinite"/></stop>
  </linearGradient>
  <linearGradient id="lava" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FF006E"/>
    <stop offset="50%" stop-color="#FF6B6B"/>
    <stop offset="100%" stop-color="#FFD93D"/>
  </linearGradient>
  <radialGradient id="burst" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFD93D"/>
    <stop offset="40%" stop-color="#FF9F1C"/>
    <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF006E" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#FF006E" stop-opacity="0"/>
  </radialGradient>
  <filter id="b1" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="14"/></filter>
  <filter id="b2" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="b3" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2"/></filter>
  <pattern id="chev" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
    <path d="M0,30 L30,0 L60,30" fill="none" stroke="#00F5FF" stroke-width="6" opacity="0.2"/>
  </pattern>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="2.5" fill="#2B2D42" opacity="0.12"/>
  </pattern>
</defs>

<rect width="1600" height="900" fill="url(#sky)"/>

<circle cx="450" cy="320" r="360" fill="url(#burst)" opacity="0.35">
  <animate attributeName="r" values="360;390;360" dur="5s" repeatCount="indefinite"/>
</circle>

<g transform="translate(1250,220)" opacity="0.35">
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
    <path d="M0,0L-28,-800L28,-800Z" fill="#FFD93D"/>
    <path d="M0,0L-28,-800L28,-800Z" fill="#FF9F1C" transform="rotate(45)"/>
    <path d="M0,0L-28,-800L28,-800Z" fill="#FF6B6B" transform="rotate(90)"/>
    <path d="M0,0L-28,-800L28,-800Z" fill="#FF006E" transform="rotate(135)"/>
    <path d="M0,0L-28,-800L28,-800Z" fill="#00F5FF" transform="rotate(180)"/>
    <path d="M0,0L-28,-800L28,-800Z" fill="#FFD93D" transform="rotate(225)"/>
    <path d="M0,0L-28,-800L28,-800Z" fill="#FF9F1C" transform="rotate(270)"/>
    <path d="M0,0L-28,-800L28,-800Z" fill="#FF6B6B" transform="rotate(315)"/>
  </g>
</g>

<rect width="1600" height="900" fill="url(#chev)">
  <animateTransform attributeName="transform" type="translate" from="0,0" to="60,0" dur="3s" repeatCount="indefinite"/>
</rect>

<rect width="1600" height="900" fill="url(#dots)" opacity="0.5">
  <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
</rect>

<g fill="#FFF" opacity="0.65">
  <path d="M120,220 Q170,170 220,220 T320,220 T420,220 V270 H120 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; 40,0; 0,0" dur="11s" repeatCount="indefinite"/>
  </path>
  <path d="M1050,160 Q1100,110 1150,160 T1250,160 T1350,160 V210 H1050 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; -30,0; 0,0" dur="9s" repeatCount="indefinite"/>
  </path>
</g>

<circle cx="950" cy="360" r="260" fill="url(#glow)" filter="url(#b1)" opacity="0.6">
