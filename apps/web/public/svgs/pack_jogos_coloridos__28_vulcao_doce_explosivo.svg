</circle>

<path d="M680,900 C780,640 840,500 910,360 H990 C1060,500 1120,640 1260,900 Z" fill="#2B2D42"/>

<ellipse cx="950" cy="360" rx="85" ry="28" fill="#FF006E"/>

<g fill="none" stroke-linecap="round" filter="url(#b2)">
  <path d="M920,360 Q860,540 790,900" stroke="url(#lava)" stroke-width="32" stroke-dasharray="50 25">
    <animate attributeName="stroke-dashoffset" values="0;-75" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M980,360 Q1040,540 1110,900" stroke="url(#lava)" stroke-width="32" stroke-dasharray="50 25">
    <animate attributeName="stroke-dashoffset" values="0;75" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M950,360 Q930,600 910,900" stroke="#FFD93D" stroke-width="22" stroke-dasharray="35 18" opacity="0.9">
    <animate attributeName="stroke-dashoffset" values="0;-53" dur="0.8s" repeatCount="indefinite"/>
  </path>
</g>

<g transform="translate(950,310)">
  <circle r="95" fill="#FFD93D">
    <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-55" cy="25" r="65" fill="#FF9F1C">
    <animateTransform attributeName="transform" type="translate" values="0,0; -12,-10; 0,0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="25" r="65" fill="#FF6B6B">
    <animateTransform attributeName="transform" type="translate" values="0,0; 12,-6; 0,0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="-55" r="75" fill="#FF006E">
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-35" cy="-25" r="45" fill="#00F5FF" opacity="0.8"/>
</g>

<g transform="translate(950,350)" opacity="0">
