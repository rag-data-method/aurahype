      <animateTransform attributeName="transform" type="rotate" values="0;720" dur="3s" additive="sum" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(950,360)">
    <rect x="-4" y="-10" width="8" height="20" fill="#FF6B6B" rx="2">
      <animateTransform attributeName="transform" type="translate" values="0,0; 260,-220" dur="2.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;180" dur="1s" additive="sum" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</g>

<path d="M0,860 Q400,830 800,870 T1600,850 V900 H0 Z" fill="#FF9F1C"/>
<path d="M0,890 Q400,870 800,900 T1600,880 V900 H0 Z" fill="#FF006E"/>

<g transform="translate(260,840)">
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-14; 0,0" dur="0.5s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="scale" values="1,1; 1.06,0.94; 1,1" dur="0.5s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="4" rx="32" ry="7" fill="#2B2D42" opacity="0.25"/>
      <circle cx="0" cy="-62" r="17" fill="#2B2D42"/>
      <path d="M-11,-48 L11,-48 L7,-16 L-7,-16 Z" fill="#2B2D42"/>
      <path d="M6,-16 L28,-6 L38,-22" stroke="#2B2D42" stroke-width="10" stroke-linecap="round" fill="none"/>
      <path d="M-6,-16 L-28,0 L-42,-6" stroke="#2B2D42" stroke-width="10" stroke-linecap="round" fill="none"/>
      <path d="M9,-42 L28,-58 L22,-74" stroke="#2B2D42" stroke-width="8" stroke-linecap="round" fill="none"/>
      <path d="M-9,-42 L-28,-28 L-38,-38" stroke="#2B2D42" stroke-width="8" stroke-linecap="round" fill="none"/>
    </g>
  </g>
</g>

<g stroke="#00F5FF" stroke-width="5" stroke-linecap="round" opacity="0.6" fill="none" filter="url(#b3)">
  <line x1="300" y1="820" x2="430" y2="820">
    <animate attributeName="x2" values="430;310;430" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <line x1="310" y1="840" x2="410" y2="840">
    <animate attributeName="x2" values="410;300;410" dur="0.6s" repeatCount="indefinite"/>
  </line>
</g>

<g>
  <g transform="translate(920,370)">
    <rect x="-5" y="-5" width="10" height="10" fill="#FFD93D" rx="2">
      <animateTransform attributeName="transform" type="translate" values="0,0; -160,-220; -320,-120" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="2s" additive="sum" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite"/>
