<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="60%" stop-color="#0f0518"/>
      <stop offset="100%" stop-color="#05020a"/>
    </radialGradient>
    
    <!-- Pandeiro wood gradient -->
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#a67c52"/>
      <stop offset="100%" stop-color="#7a5537"/>
    </linearGradient>
    
    <!-- Head gradient -->
    <radialGradient id="headGrad" cx="45%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fff9e6"/>
      <stop offset="60%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#d4c4a0"/>
    </radialGradient>
    
    <!-- Metal jingle gradient -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="50%" stop-color="#b8b8b8"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    
    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong glow -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Abstract ambient background shapes -->
  <g opacity="0.15">
    <circle cx="960" cy="540" r="400" fill="none" stroke="#9d4edd" stroke-width="2">
      <animate attributeName="r" values="380;420;380" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="540" r="500" fill="none" stroke="#00d9ff" stroke-width="1">
      <animate attributeName="r" values="480;520;480" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Sound waves emanating from pandeiro -->
  <g transform="translate(960, 650)" filter="url(#neonGlow)">
    <!-- Wave 1 - Cyan -->
    <path d="M-350,-50 Q-175,-200 0,-50 T350,-50" fill="none" stroke="#00d9ff" stroke-width="6" stroke-linecap="round" opacity="0">
      <animate attributeName="d" values="M-350,-50 Q-175,-200 0,-50 T350,-50;M-420,-120 Q-210,-320 0,-120 T420,-120;M-500,-200 Q-250,-450 0,-200 T500,-200" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.4;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="6;3;1" dur="3s" repeatCount="indefinite"/>
    </path>
    
    <!-- Wave 2 - Purple -->
    <path d="M-320,20 Q-160,-100 0,20 T320,20" fill="none" stroke="#c77dff" stroke-width="5" stroke-linecap="round" opacity="0">
      <animate attributeName="d" values="M-320,20 Q-160,-100 0,20 T320,20;M-400,-40 Q-200,-220 0,-40 T400,-40;M-480,-120 Q-240,-340 0,-120 T480,-120" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.4;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Wave 3 - Yellow -->
    <path d="M-280,80 Q-140,-20 0,80 T280,80" fill="none" stroke="#ffea00" stroke-width="5" stroke-linecap="round" opacity="0">
      <animate attributeName="d" values="M-280,80 Q-140,-20 0,80 T280,80;M-360,0 Q-180,-160 0,0 T360,0;M-440,-80 Q-220,-260 0,-80 T440,-80" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.4;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </path>
    
    <!-- Wave 4 - Coral -->
    <path d="M-240,130 Q-120,50 0,130 T240,130" fill="none" stroke="#ff6b6b" stroke-width="5" stroke-linecap="round" opacity="0">
      <animate attributeName="d" values="M-240,130 Q-120,50 0,130 T240,130;M-320,40 Q-160,-100 0,40 T320,40;M-400,-40 Q-200,-240 0,-40 T400,-40" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.4;0" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Spiral accent -->
    <path d="M0,0 C50,-80 150,-80 180,0 C210,80 120,140 0,140 C-120,140 -200,60 -160,-40 C-120,-140 40,-160 140,-80" fill="none" stroke="#00d9ff" stroke-width="3" stroke-linecap="round" opacity="0.3" filter="url(#strongGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Musical notes -->
  <g filter="url(#neonGlow)">
    <!-- Note 1 -->
    <g transform="translate(700, 300)">
      <circle cx="0" cy="0" r="14" fill="#ffea00"/>
      <rect x="12" y="-55" width="6" height="60" fill="#ffea00"/>
      <path d="M18,-55 Q50,-45 70,-25" fill="none" stroke="#ffea00" stroke-width="6" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="700,300;700,260;700,300" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </g>
    
    <!-- Note 2 -->
    <g transform="translate(1250, 250)">
      <circle cx="0" cy="0" r="12" fill="#00d9ff"/>
      <rect x="10" y="-50" width="5" height="55" fill="#00d9ff"/>
      <path d="M15,-50 Q45,-35 60,-15" fill="none" stroke="#00d9ff" stroke-width="5" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="1250,250;1250,210;1250,250" dur="3.5s" begin="0.7s" repeatCount="indefinite"/>
    </g>
    
    <!-- Note 3 -->
    <g transform="translate(550, 450)">
      <circle cx="0" cy="0" r="11" fill="#c77dff"/>
      <rect x="9" y="-45" width="5" height="50" fill="#c77dff"/>
      <circle cx="22" cy="-45" r="11" fill="#c77dff"/>
      <rect x="31" y="-45" width="5" height="50" fill="#c77dff"/>
      <animateTransform attributeName="transform" type="translate" values="550,450;550,410;550,450" dur="5s" begin="1.2s" repeatCount="indefinite"/>
    </g>
    
    <!-- Note 4 -->
    <g transform="translate(1400, 400)">
      <circle cx="0" cy="0" r="13" fill="#ff6b6b"/>
      <rect x="11" y="-52" width="5" height="58" fill="#ff6b6b"/>
      <path d="M16,-52 Q50,-70 75,-45" fill="none" stroke="#ff6b6b" stroke-width="5" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="1400,400;1400,360;1400,400" dur="4.2s" begin="0.3s" repeatCount="indefinite"/>
    </g>
    
    <!-- Note 5 -->
    <g transform="translate(850, 180)">
      <circle cx="0" cy="0" r="10" fill="#00ff88"/>
      <rect x="8" y="-42" width="4" height="46" fill="#00ff88"/>
      <animateTransform attributeName="transform" type="translate" values="850,180;850,150;850,180" dur="3.8s" begin="1.8s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Pandeiro -->
  <g transform="translate(960, 650)">
    <!-- Drop shadow -->
    <ellipse cx="0" cy="210" rx="220" ry="35" fill="#000" opacity="0.4" filter="url(#neonGlow)">
      <animate attributeName="rx" values="210;230;210" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Outer wooden frame -->
    <circle cx="0" cy="0" r="210" fill="url(#woodGrad)" stroke="#5a3d25" stroke-width="4"/>
    <circle cx="0" cy="0" r="195" fill="none" stroke="#3d2818" stroke-width="3"/>
    
    <!-- Inner rim shadow -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#2a1a0f" stroke-width="8" opacity="0.3"/>
    
    <!-- Drum head -->
    <circle cx="0" cy="0" r="175" fill="url(#headGrad)"/>
    
    <!-- Head texture/play marks -->
    <g opacity="0.15" stroke="#8b7355" stroke-width="2" fill="none">
      <circle cx="0" cy="0" r="120"/>
      <circle cx="0" cy="0" r="80"/>
      <line x1="-175" y1="0" x2="175" y2="0"/>
      <line x1="0" y1="-175" x2="0" y2="175"/>
    </g>
    
    <!-- Center hit mark -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#d4c4a0" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="35;40;35" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Tuning hardware -->
    <g fill="#4a3728">
      <rect x="-12" y="-205" width="24" height="20" rx="3"/>
      <rect x="-12" y="185" width="24" height="20" rx="3"/>
      <rect x="185" y="-12" width="20" height="24" rx="3"/>
      <rect x="-205" y="-12" width="20" height="24" rx="3"/>
    </g>
    
    <!-- Metal jingles - arranged around frame -->
    <g fill="url(#metalGrad)" stroke="#666" stroke-width="1">
      <!-- Jingle set 1 -->
      <g transform="rotate(0) translate(0, -190)">
        <circle cx="-8" cy="0" r="14"/>
        <circle cx="8" cy="0" r="14"/>
        <animateTransform attributeName="transform" type="rotate" values="0;5;0;-5;0" dur="1.5s" repeatCount="indefinite"/>
      </g>
      <!-- Jingle set 2 -->
      <g transform="rotate(45) translate(0, -190)">
        <circle cx="-8" cy="0" r="14"/>
        <circle cx="8" cy="0" r="14"/>
        <animateTransform attributeName="transform" type="rotate" values="45;50;45;40;45" dur="1.7s" repeatCount="indefinite"/>
      </g>
      <!-- Jingle set 3 -->
      <g transform="rotate(90) translate(0, -190)">
        <circle cx="-8" cy="0" r="14"/>
        <circle cx="8" cy="0" r="14"/>
        <animateTransform attributeName="transform" type="rotate" values="90;95;90;85;90" dur="1.4s" repeatCount="indefinite"/>
      </g>
      <!-- Jingle set 4 -->
      <g transform="rotate(135) translate(0, -190)">
        <circle cx="-8" cy="0" r="14"/>
        <circle cx="8" cy="0" r="14"/>
        <animateTransform attributeName="transform" type="rotate" values="135;140;135;130;135" dur="1.6s" repeatCount="indefinite"/>
      </g>
      <!-- Jingle set 5 -->
      <g transform="rotate(180) translate(0, -190)">
        <circle cx="-8" cy="0" r="14"/>
        <circle cx="8" cy="0" r="14"/>
        <animateTransform attributeName="transform" type="rotate" values="180;185;180;175;180" dur="1.5s" repeatCount="indefinite"/>
      </g>
      <!-- Jingle set 6 -->
      <g transform="rotate(225) translate(0, -190)">
        <circle cx="-8" cy="0" r="14"/>
        <circle cx="8" cy="0" r="14"/>
        <animateTransform attributeName="transform" type="rotate" values="225;230;225;220;225" dur="1.8s" repeatCount="indefinite"/>
      </g>
      <!-- Jingle set 7 -->
      <g transform="rotate(270) translate(0, -190)">
        <circle cx="-8" cy="0" r="14"/>
        <circle cx="8" cy="0" r="14"/>
        <animateTransform attributeName="transform" type="rotate" values="270;275;270;265;270" dur="1.4s" repeatCount="indefinite"/>
      </g>
      <!-- Jingle set 8 -->
      <g transform="rotate(315) translate(0, -190)">
        <circle cx="-8" cy="0" r="14"/>
        <circle cx="8" cy="0" r="14"/>
        <animateTransform attributeName="transform" type="rotate" values="315;320;315;310;315" dur="1.7s" repeatCount="indefinite"/>
      </g>
    </g>
    
    <!-- Highlight on frame -->
    <path d="M-150,-120 Q0,-200 150,-120" fill="none" stroke="#e8c9a8" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Decorative neon particles -->
  <g filter="url(#neonGlow)">
    <circle cx="400" cy="700" r="5" fill="#ffea00">
      <animate attributeName="cy" values="700;680;700" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1520" cy="650" r="4" fill="#00d9ff">
      <animate attributeName="cy" values="650;630;650" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="800" r="6" fill="#ff6b6b">
      <animate attributeName="cy" values="800;780;800" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1320" cy="780" r="5" fill="#c77dff">
      <animate attributeName="cy" values="780;760;780" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>