<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="4" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
<filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="8" result="blur"/>
<feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.08 0 0 0 0.4 0"/>
</filter>
<filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
<feGaussianBlur stdDeviation="12" result="blur"/>
<feComposite in="SourceGraphic" in2="blur" operator="over"/>
</filter>
<radialGradient id="chipGlow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#4CC9FE" stop-opacity="1"/>
<stop offset="50%" stop-color="#5E6AD2" stop-opacity="0.8"/>
<stop offset="100%" stop-color="#1A1A1A" stop-opacity="0"/>
</radialGradient>
<linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#4CC9FE" stop-opacity="0.8"/>
<stop offset="100%" stop-color="#5E6AD2" stop-opacity="0.4"/>
</linearGradient>
</defs>
