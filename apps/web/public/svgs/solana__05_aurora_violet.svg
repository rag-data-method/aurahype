<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B21B6" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#9945FF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#14F195" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF36F9" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF36F9" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#9945FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#14F195" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="grad3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#9945FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5B21B6" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="hot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="35%" stop-color="#FF36F9" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#9945FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="45%" stop-color="#000000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur80" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="blur50" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="blur30" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#000000"/>

  <path fill="#5B21B6" filter="url(#blur80)" opacity="0.75"
    d="M -200,80 C 300,20 700,180 1100,90 S 1900,160 2000,120 L 2000,380 C 1600,420 1000,320 600,400 S -200,340 -200,280 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; 80,30; 0,0" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.75;0.6;0.75" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <path fill="url(#grad1)" filter="url(#blur50)" opacity="0.9"
    d="M -200,140 C 250,40 650,240 1050,120 S 1850,220 2000,160 L 2000,500 C 1600,540 1000,440 600,560 S -200,480 -200,380 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; -60,20; 0,0" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.9;0.75;0.9" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <path fill="url(#grad3)" filter="url(#blur30)" opacity="0.85"
    d="M -100,220 C 200,180 500,260 800,210 S 1400,260 1700,220 L 1700,320 C 1400,360 900,300 600,350 S -100,300 -100,260 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; 100,-20; 0,0" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <path fill="url(#grad2)" filter="url(#blur50)" opacity="0.8"
    d="M -150,260 C 300,200 700,320 1100,240 S 1750,320 1950,260 L 1950,420 C 1600,460 1000,380 600,460 S -150,400 -150,340 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; 50,40; 0,0" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.8;0.65;0.8" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <path fill="#5B21B6" filter="url(#blur80)" opacity="0.65"
    d="M -200,360 C 300,300 700,440 1100,340 S 1900,440 2000,380 L 2000,620 C 1600,660 1000,560 600,680 S -200,600 -200,500 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; -70,10; 0,0" dur="11s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.65;0.5;0.65" dur="11s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <path fill="#9945FF" filter="url(#blur50)" opacity="0.85"
    d="M -100,180 C 300,120 700,240 1100,160 S 1700,240 1900,180 L 1900,340 C 1500,380 1000,300 600,380 S -100,320 -100,260 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; 40,-30; 0,0" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.85;0.7;0.85" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <path fill="#14F195" filter="url(#blur30)" opacity="0.8"
    d="M -100,300 C 300,260 700,360 1100,300 S 1700,360 1900,300 L 1900,420 C 1500,460 1000,380 600,460 S -100,400 -100,340 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; -40,30; 0,0" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <path fill="url(#grad1)" filter="url(#blur50)" opacity="0.8"
    d="M -100,100 C 300,60 700,160 1100,100 S 1700,160 1900,100 L 1900,220 C 1500,260 1000,180 600,260 S -100,200 -100,160 Z">
    <animateTransform attributeName="transform" type="translate" values="0,0; 60,20; 0,0" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.8;0.65;0.8" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <ellipse cx="900" cy="210" rx="360" ry="90" fill="url(#hot)" filter="url(#blur30)" opacity="0.55">
    <animateTransform attributeName="transform" type="scale" values="1;1.18;1" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" additive="sum"/>
    <animate attributeName="opacity" values="0.55;0.7;0.55" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <ellipse cx="1250" cy="180" rx="220" ry="55" fill="#FF36F9" filter="url(#blur30)" opacity="0.75">
    <animateTransform attributeName="transform" type="scale" values="1;1.22;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" additive="sum"/>
    <animate attributeName="opacity" values="0.75;0.55;0.75" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <circle cx="520" cy="175" r="28" fill="#FFFFFF" filter="url(#blur30)" opacity="0.6">
    <animateTransform attributeName="transform" type="scale" values="1;1.35;1" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" additive="sum"/>
    <animate attributeName="opacity" values="0.6;0.35;0.6" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <rect y="500" width="1600" height="400" fill="url(#vignette)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.75;0.9" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>
</svg>