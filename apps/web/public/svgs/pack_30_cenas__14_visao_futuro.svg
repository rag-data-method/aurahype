<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="moonAura" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12">
        <animate attributeName="stdDeviation" values="12;18;12" dur="4s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>
    <filter id="objectShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
    </filter>
    <filter id="starHalo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  
  <rect fill="#0F1828" width="1600" height="900"/>
  
  <g fill="#DCE2E8" opacity="0.9">
    <circle cx="150" cy="120" r="2">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="80" r="1.5">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="150" r="2">
      <animate attributeName="opacity" values="0.95;0.4;0.95" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="100" r="1.8">
      <animate attributeName="opacity" values="0.85;0.25;0.85" dur="3.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="300" r="1.2">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="50" r="1.5">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="600" r="1">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1550" cy="500" r="2">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g transform="translate(1250, 220)">
    <circle r="100" fill="#C9A85C" opacity="0.25" filter="url(#moonAura)">
      <animate attributeName="opacity" values="0.25;0.35;0.25" dur="4s" repeatCount="indefinite"/>
    </circle>
    <path d="M0,-70 A70,70 0 1,1 0,70 A55,55 0 1,0 0,-70Z" fill="#DCE2E8" opacity="0.95">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="6s" repeatCount="indefinite"/>
    </path>
    <g transform="translate(40,-20)" fill="#C9A85C" opacity="0.6">
      <circle cx="0" cy="0" r="3" filter="url(#starHalo)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="15" cy="25" r="2" filter="url(#starHalo)">
        <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <g>
    <line x1="0" y1="0" x2="60" y2="30" stroke="#DCE2E8" stroke-width="1.5" opacity="0">
      <animateMotion path="M-100,200 L1800,350" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="10s" keyTimes="0;0.05;0.1" repeatCount="indefinite"/>
    </line>
  </g>
  
  <ellipse cx="720" cy="820" rx="140" ry="25" fill="#0F1828" filter="url(#objectShadow)" opacity="0.6">
    <animate attributeName="rx" values="140;145;140" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  
  <g transform="translate(600, 680)">
    <g transform="rotate(-35)">
      <rect x="0" y="0" width="280" height="55" rx="8" fill="#3D4147" opacity="0.95"/>
      <rect x="260" y="-5" width="25" height="65" rx="3" fill="#C9A85C" opacity="0.9"/>
      <rect x="275" y="-5" width="8" height="65" rx="1" fill="#3D4147" opacity="0.8"/>
      <ellipse cx="283" cy="27.5" rx="4" ry="27" fill="#DCE2E8" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
      </ellipse>
      
      <path d="M40,55 L20,140" stroke="#3D4147" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
      <path d="M40,55 L20,140" stroke="#C9A85C" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      
      <path d="M140,55 L140,140" stroke="#3D4147" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
      <path d="M140,55 L140,140" stroke="#C9A85C" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      
      <path d="M240,55 L260,140" stroke="#3D4147" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
      <path d="M240,55 L260,140" stroke="#C9A85C" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      
      <animateTransform attributeName="transform" type="rotate" values="-35,-50,0; -33,-50,0; -35,-50,0" dur="8s" repeatCount="indefinite" additive="sum"/>
    </g>
    <animateTransform attributeName="transform" type="translate" values="600,680; 600,675; 600,680" dur="7s" repeatCount="indefinite"/>
  </g>
  
  <path d="M0,800 L1600,800 L1600,900 L0,900Z" fill="#3D4147" opacity="0.9"/>
  <path d="M0,800 L1600,800 L1600,808 L0,808Z" fill="#C9A85C" opacity="0.4"/>
  
  <ellipse cx="460" cy="850" rx="70" ry="15" fill="#0F1828" opacity="0.5" filter="url(#objectShadow)">
    <animate attributeName="opacity" values="0.5;0.6;0.5" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  
  <g transform="translate(400, 810)">
    <rect x="0" y="0" width="130" height="170" rx="4" fill="#3D4147" transform="skewX(-3)" opacity="0.95"/>
    <rect x="8" y="-8" width="120" height="170" fill="#DCE2E8" transform="skewX(-3)" opacity="0.9"/>
    
    <g transform="skewX(-3)" opacity="0.25" stroke="#3D4147" stroke-width="2">
      <line x1="25" y1="40" x2="110" y2="40" stroke-linecap="round">
        <animate attributeName="x2" values="110;90;110" dur="4s" repeatCount="indefinite"/>
      </line>
      <line x1="25" y1="70" x2="110" y2="70" stroke-linecap="round"/>
      <line x1="25" y1="100" x2="110" y2="100" stroke-linecap="round"/>
      <line x1="25" y1="130" x2="110" y2="130" stroke-linecap="round"/>
    </g>
    
    <animateTransform attributeName="transform" type="translate" values="400,810; 400,808; 400,810" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <g transform="translate(520, 840) rotate(12)">
    <rect x="0" y="0" width="150" height="14" rx="2" fill="#C9A85C" opacity="0.9"/>
    <path d="M150,0 L165,7 L150,14Z" fill="#3D4147" opacity="0.9"/>
    <path d="M162,4 L165,7 L162,10Z" fill="#DCE2E8"/>
    <rect x="-5" y="0" width="10" height="14" rx="1" fill="#3D4147" opacity="0.6"/>
    
    <animateTransform attributeName="transform" type="rotate" values="12,520,840; 15,520,840; 12,520,840" dur="5s" repeatCount="indefinite"/>
  </g>
  
  <circle cx="1250" cy="220" r="180" fill="#C9A85C" opacity="0.08">
    <animate attributeName="r" values="180;200;180" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>