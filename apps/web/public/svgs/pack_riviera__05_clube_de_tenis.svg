<rect width="1600" height="900" fill="#FAFAFA"/>
<circle cx="1300" cy="200" r="160" fill="#F2E8CF" opacity="0.85" filter="url(#atm)"><animate attributeName="opacity" values="0.8;0.95;0.8" dur="7s" repeatCount="indefinite"/></circle>
<rect x="150" y="680" width="1300" height="180" rx="40" fill="#F2E8CF" opacity="0.85"/>

<g transform="translate(800,460)">
