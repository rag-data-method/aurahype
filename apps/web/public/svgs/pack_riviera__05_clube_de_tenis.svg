        <path d="M-30,-20 Q0,-6 30,-20 Q30,20 0,6 Q-30,20 -30,-20 Z" fill="none" stroke="#F2E8CF" stroke-width="4" opacity="0.9"/>
        <circle cx="-17" cy="-17" r="8" fill="#FAFAFA" opacity="0" filter="url(#gl)">
          <animate attributeName="opacity" values="0;0.8;0" keyTimes="0;0.5;1" dur="2.5s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" values="0.5;1.2;0.5" dur="2.5s" repeatCount="indefinite"/>
