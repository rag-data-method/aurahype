    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1.015;1" dur="5s" repeatCount="indefinite"/>
      <g clip-path="url(#tp)">
        <rect x="0" y="0" width="280" height="40" fill="#F2E8CF"/>
        <g>
          <animateTransform attributeName="transform" type="translate" values="0,0;8,0;0,0" dur="6s" repeatCount="indefinite"/>
          <rect x="0" y="0" width="40" height="40" fill="#2563EB" opacity="0.9"/><rect x="60" y="0" width="40" height="40" fill="#2563EB" opacity="0.9"/><rect x="120" y="0" width="40" height="40" fill="#2563EB" opacity="0.9"/><rect x="180" y="0" width="40" height="40" fill="#2563EB" opacity="0.9"/>
        </g>
      </g>
      <g clip-path="url(#fp)">
        <rect x="40" y="40" width="240" height="70" fill="#F2E8CF"/>
        <g>
          <animateTransform attributeName="transform" type="translate" values="0,0;8,0;0,0" dur="6s" repeatCount="indefinite"/>
          <rect x="40" y="40" width="40" height="70" fill="#2563EB" opacity="0.9"/><rect x="100" y="40" width="40" height="70" fill="#2563EB" opacity="0.9"/><rect x="160" y="40" width="40" height="70" fill="#2563EB" opacity="0.9"/><rect x="220" y="40" width="40" height="70" fill="#2563EB" opacity="0.9"/>
        </g>
      </g>
      <path d="M40,40 L280,40 L280,110 L40,110 Z" fill="none" stroke="#D9381E" stroke-width="2" opacity="0.25"/>
      <path d="M220,25 L225,35 L235,40 L225,45 L220,55 L215,45 L205,40 L215,35 Z" fill="#FAFAFA" opacity="0">
        <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" begin="1s"/>
        <animateTransform attributeName="transform" type="scale" values="0.6;1.1;0.6" dur="3s" repeatCount="indefinite" begin="1s"/>
      </path>
    </g>
