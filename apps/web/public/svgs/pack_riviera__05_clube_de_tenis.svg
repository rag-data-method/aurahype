            <line x1="-120" y1="-320" x2="-120" y2="80"/><line x1="-96" y1="-320" x2="-96" y2="80"/><line x1="-72" y1="-320" x2="-72" y2="80"/><line x1="-48" y1="-320" x2="-48" y2="80"/><line x1="-24" y1="-320" x2="-24" y2="80"/><line x1="0" y1="-320" x2="0" y2="80"/><line x1="24" y1="-320" x2="24" y2="80"/><line x1="48" y1="-320" x2="48" y2="80"/><line x1="72" y1="-320" x2="72" y2="80"/><line x1="96" y1="-320" x2="96" y2="80"/><line x1="120" y1="-320" x2="120" y2="80"/>
            <line x1="-170" y1="-260" x2="170" y2="-260"/><line x1="-170" y1="-232" x2="170" y2="-232"/><line x1="-170" y1="-204" x2="170" y2="-204"/><line x1="-170" y1="-176" x2="170" y2="-176"/><line x1="-170" y1="-148" x2="170" y2="-148"/><line x1="-170" y1="-120" x2="170" y2="-120"/><line x1="-170" y1="-92" x2="170" y2="-92"/><line x1="-170" y1="-64" x2="170" y2="-64"/><line x1="-170" y1="-36" x2="170" y2="-36"/><line x1="-170" y1="-8" x2="170" y2="-8"/><line x1="-170" y1="20" x2="170" y2="20"/><line x1="-170" y1="48" x2="170" y2="48"/>
