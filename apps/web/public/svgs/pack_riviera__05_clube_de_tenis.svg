        <path d="M-34,260 L34,260 L30,200 L-30,200 Z" fill="#D9381E" opacity="0.9"/>
        <path d="M-34,70 Q-70,65 -120,40 L-130,60 Q-80,85 -40,95 L40,95 Q80,85 130,60 L120,40 Q70,65 34,70 Z" fill="url(#wg)"/>
        <ellipse cx="0" cy="-120" rx="165" ry="205" fill="url(#wg)" stroke="#D9381E" stroke-width="6" opacity="0.95"/>
