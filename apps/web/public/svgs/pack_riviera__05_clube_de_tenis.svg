    <animateTransform attributeName="transform" type="translate" values="0,0;140,0;220,0;140,0;0,0" keyTimes="0;0.25;0.5;0.75;1" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <ellipse cx="0" cy="78" rx="40" ry="12" fill="#D9381E" opacity="0.18" filter="url(#sh)">
      <animate attributeName="opacity" values="0.18;0.08;0.18;0.1;0.18" keyTimes="0;0.25;0.5;0.75;1" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1,1;0.7,1;1,1;0.75,1;1,1" keyTimes="0;0.25;0.5;0.75;1" dur="5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;140,-130;220,0;140,90;0,0" keyTimes="0;0.25;0.5;0.75;1" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <g>
      <animateTransform attributeName="transform" type="scale" values="1,1;1.05,0.95;0.95,1.05;1.05,0.95;1,1" keyTimes="0;0.25;0.5;0.75;1" dur="5s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
