  <filter id="atm" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="48"/></filter>
  <filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3"/></filter>
  <linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F2E8CF" stop-opacity="0.9"/><stop offset="1" stop-color="#D9381E" stop-opacity="0.9"/></linearGradient>
  <radialGradient id="bg" cx="30%" cy="30%"><stop offset="0" stop-color="#2563EB" stop-opacity="0.9"/><stop offset="1" stop-color="#2563EB" stop-opacity="1"/></radialGradient>
  <clipPath id="hc"><ellipse cx="0" cy="-120" rx="158" ry="188"/></clipPath>
  <clipPath id="tp"><path d="M0,0 L240,0 L280,40 L40,40 Z"/></clipPath>
  <clipPath id="fp"><path d="M40,40 L280,40 L280,110 L40,110 Z"/></clipPath>
