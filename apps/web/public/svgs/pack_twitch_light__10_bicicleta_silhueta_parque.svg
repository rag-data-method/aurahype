    <line x1="520" y1="520" x2="520" y2="580" stroke="#5D4E6D" stroke-width="1" opacity="0.5" />
    <line x1="520" y1="520" x2="575" y2="545" stroke="#5D4E6D" stroke-width="1" opacity="0.5" />
    <line x1="520" y1="520" x2="465" y2="545" stroke="#5D4E6D" stroke-width="1" opacity="0.5" />
    <line x1="520" y1="520" x2="520" y2="465" stroke="#5D4E6D" stroke-width="1" opacity="0.5" />

    <line x1="320" y1="520" x2="450" y2="520" stroke="#5D4E6D" stroke-width="1.5" />
    <line x1="415" y1="520" x2="450" y2="420" stroke="#5D4E6D" stroke-width="1.5" />
    <line x1="415" y1="520" x2="520" y2="520" stroke="#5D4E6D" stroke-width="1.5" />
    <line x1="450" y1="420" x2="540" y2="420" stroke="#5D4E6D" stroke-width="1.5" />
    <line x1="450" y1="420" x2="450" y2="395" stroke="#5D4E6D" stroke-width="1.5" />
    <line x1="450" y1="395" x2="520" y2="395" stroke="#5D4E6D" stroke-width="1.5" />
    
