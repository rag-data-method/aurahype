      <animate attributeName="cy" values="250;230;250" dur="7s" repeatCount="indefinite" />
      <animate attributeName="cx" values="200;210;200" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="300" r="2" fill="#FFDAB9" opacity="0.5">
      <animate attributeName="cy" values="300;280;300" dur="9s" repeatCount="indefinite" />
      <animate attributeName="cx" values="500;490;500" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="9s" repeatCount="indefinite" />
