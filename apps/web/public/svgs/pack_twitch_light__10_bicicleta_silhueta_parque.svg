      <animate attributeName="d" values="
        M -100 520 C 100 500, 200 470, 300 445 C 400 420, 550 410, 650 430 C 750 450, 800 480, 900 460 L 900 600 L -100 600 Z;
        M -100 525 C 100 505, 200 475, 300 450 C 400 425, 550 415, 650 435 C 750 455, 800 485, 900 465 L 900 600 L -100 600 Z;
        M -100 520 C 100 500, 200 470, 300 445 C 400 420, 550 410, 650 430 C 750 450, 800 480, 900 460 L 900 600 L -100 600 Z
      " dur="22s" repeatCount="indefinite" />
