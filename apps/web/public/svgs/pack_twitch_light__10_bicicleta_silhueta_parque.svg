    <path d="M 120 260 Q 95 220 70 205" />
    <path d="M 120 220 Q 145 180 170 165" />
    <path d="M 120 160 Q 95 130 75 100" />
    <path d="M 120 130 Q 150 100 180 85" />
    <path d="M 120 335 Q 95 355 70 355" />
    <path d="M 120 350 Q 95 370 70 370" />
