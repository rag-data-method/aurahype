  <circle cx="380" cy="520" r="2" fill="#FFC0CB" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="460" cy="515" r="2" fill="#B0C4DE" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="7s" repeatCount="indefinite" />
  </circle>

  <path d="M 650 200 Q 680 180 710 190 T 750 180" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.15" filter="url(#softGlow)">
     <animate attributeName="d" values="M 650 200 Q 680 180 710 190 T 750 180; M 640 205 Q 670 185 700 195 T 740 185; M 650 200 Q 680 180 710 190 T 750 180" dur="30s" repeatCount="indefinite" />
  </path>
  <path d="M 680 230 Q 720 210 750 230 T 800 220" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" opacity="0.1" filter="url(#softGlow)">
    <animate attributeName="d" values="M 680 230 Q 720 210 750 230 T 800 220; M 670 235 Q 710 215 740 235 T 790 225; M 680 230 Q 720 210 750 230 T 800 220" dur="40s" repeatCount="indefinite" />
  </path>
  <path d="M 50 150 Q 80 130 110 140 T 150 130" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.12" filter="url(#softGlow)">
