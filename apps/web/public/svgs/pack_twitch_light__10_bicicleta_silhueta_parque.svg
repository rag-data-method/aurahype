    <circle cx="320" cy="520" r="4" fill="none" stroke="#5D4E6D" stroke-width="1.5" />

    <path d="M 540 515 L 545 525 M 540 515 L 535 525 M 540 515 L 540 525" stroke="#5D4E6D" stroke-width="1.5" />
