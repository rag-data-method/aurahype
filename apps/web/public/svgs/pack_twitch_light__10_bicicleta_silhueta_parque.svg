<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6E6FA" />
      <stop offset="35%" stop-color="#FFD1DC" />
      <stop offset="70%" stop-color="#FFDAB9" />
      <stop offset="100%" stop-color="#FFE4E1" />
    </linearGradient>

    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8A9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFC0CB" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="particleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
    
    <clipPath id="park-clip">
      <rect width="800" height="600" />
    </clipPath>
  </defs>

  <rect width="800" height="600" fill="url(#skyGrad)" />

  <path fill="url(#sunGrad)" d="M 250 220 A 130 130 0 0 1 510 220 A 130 130 0 0 1 250 220 Z">
    <animate attributeName="d" values="
      M 250 220 A 130 130 0 0 1 510 220 A 130 130 0 0 1 250 220 Z;
      M 235 215 A 145 145 0 0 1 525 215 A 145 145 0 0 1 235 215 Z;
      M 250 220 A 130 130 0 0 1 510 220 A 130 130 0 0 1 250 220 Z
    " dur="12s" repeatCount="indefinite" />
  </path>

  <g clip-path="url(#park-clip)">
    <path d="M -100 480 C 50 460, 150 420, 220 400 C 280 385, 350 365, 420 350 C 500 335, 600 340, 750 350 L 900 350 L 900 600 L -100 600 Z" fill="#D8BFD8" opacity="0.6">
