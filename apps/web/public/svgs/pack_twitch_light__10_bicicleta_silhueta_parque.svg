    <path d="M 450 395 Q 460 380 470 395 T 520 395" fill="none" stroke="#5D4E6D" stroke-width="1.5" opacity="0.9" />

    <line x1="540" y1="420" x2="540" y2="515" stroke="#5D4E6D" stroke-width="1.5" />
