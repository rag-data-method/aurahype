<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="steamBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0.9"/>
    </linearGradient>
    
    <radialGradient id="flameGrad" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="30%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#F4A261" stop-opacity="0.2"/>
    </radialGradient>
    
    <linearGradient id="glassGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#A8D8EA" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#F5F0E6"/>
  
  <circle cx="300" cy="300" r="250" fill="#A8D8EA" opacity="0.15" filter="url(#softGlow)">
    <animate attributeName="r" values="250;270;250" dur="8s" repeatCount="indefinite"/>
  </circle>
  
  <ellipse cx="620" cy="740" rx="110" ry="25" fill="#A8D8EA" opacity="0.25" filter="url(#shadowBlur)">
    <animate attributeName="rx" values="110;115;110" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.2;0.25" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <ellipse cx="1050" cy="750" rx="90" ry="20" fill="#F4A261" opacity="0.2" filter="url(#shadowBlur)">
    <animate attributeName="rx" values="90;95;90" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  
  <g transform="translate(620, 580)">
    <path d="M-70,-150 Q-70,110 0,110 Q70,110 70,-150" fill="url(#waterGrad)"/>
    
    <path d="M-65,-80 Q-65,100 0,100 Q65,100 65,-80 Q0,-70 -65,-80" fill="#A8D8EA" opacity="0.85">
      <animate attributeName="d" 
        values="M-65,-80 Q-65,100 0,100 Q65,100 65,-80 Q0,-70 -65,-80;
                M-65,-78 Q-65,100 0,100 Q65,100 65,-78 Q0,-72 -65,-78;
                M-65,-80 Q-65,100 0,100 Q65,100 65,-80 Q0,-70 -65,-80" 
        dur="3s" repeatCount="indefinite"/>
    </path>
    
    <ellipse cx="0" cy="-75" rx="45" ry="6" fill="none" stroke="#FAFAFA" stroke-width="2" opacity="0.5" filter="url(#steamBlur)">
      <animate attributeName="rx" values="45;65;45" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <ellipse cx="0" cy="-75" rx="35" ry="5" fill="none" stroke="#FAFAFA" stroke-width="1.5" opacity="0.3" filter="url(#steamBlur)">
      <animate attributeName="rx" values="35;55;35" dur="4s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
    </ellipse>
    
    <g>
      <animateTransform attributeName="transform" type="translate" 
        values="0,-40; 0,-45; 0,-40" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" 
        values="0; 3; 0; -3; 0" dur="6s" repeatCount="indefinite" additive="sum"/>
      
      <circle r="30" fill="#F4A261"/>
      <circle r="25" fill="#F5F0E6"/>
      <path d="M0,0 L0,-23 M0,0 L20,-12 M0,0 L20,12 M0,0 L0,23 M0,0 L-20,12 M0,0 L-20,-12" 
        stroke="#F4A261" stroke-width="2.5" opacity="0.8"/>
    </g>
    
    <path d="M-70,-150 Q-70,110 0,110 Q70,110 70,-150" fill="url(#glassGrad)" stroke="#A8D8EA" stroke-width="1"/>
    <path d="M-70,-150 Q0,-130 70,-150" fill="none" stroke="#FAFAFA" stroke-width="3" opacity="0.7"/>
    <path d="M-55,-50 Q-50,20 -55,80" fill="none" stroke="#FAFAFA" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
    <path d="M50,-120 Q45,-60 50,0" fill="none" stroke="#A8D8EA" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(1050, 630)">
    <path d="M-55,110 L-55,-60 Q0,-75 55,-60 L55,110 Q0,125 -55,110 Z" fill="#FAFAFA"/>
    <ellipse cx="0" cy="-60" rx="55" ry="12" fill="#F5F0E6"/>
    
    <ellipse cx="0" cy="-60" rx="50" ry="10" fill="#F4A261" opacity="0.25">
      <animate attributeName="opacity" values="0.25;0.35;0.25" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <line x1="0" y1="-60" x2="0" y2="-85" stroke="#5A4A42" stroke-width="3"/>
    
    <g>
      <animateTransform attributeName="transform" type="translate" 
        values="0,-105; 2,-103; -1,-106; 0,-105" dur="0.15s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" 
        values="1;1.08;0.95;1" dur="0.2s" repeatCount="indefinite" additive="sum"/>
      <animateTransform attributeName="transform" type="rotate" 
        values="0; 4; -3; 0" dur="0.25s" repeatCount="indefinite" additive="sum"/>
      
      <path d="M0,25 Q-18,0 0,-35 Q18,0 0,25" fill="url(#flameGrad)">
        <animate attributeName="opacity" values="0.85;1;0.8;0.85" dur="0.1s" repeatCount="indefinite"/>
      </path>
      <ellipse cx="0" cy="5" rx="4" ry="8" fill="#FAFAFA" opacity="0.95">
        <animate attributeName="ry" values="8;10;7;8" dur="0.1s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    
    <circle cx="0" cy="-80" r="70" fill="#F4A261" opacity="0.1" filter="url(#softGlow)">
      <animate attributeName="r" values="70;75;70" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.15;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g transform="translate(1050, 525)" opacity="0.5" filter="url(#steamBlur)">
    <path fill="none" stroke="#FAFAFA" stroke-width="6" stroke-linecap="round" d="M-8,0 Q5,-25 -5,-50 T5,-100">
      <animate attributeName="d" 
        values="M-8,0 Q5,-25 -5,-50 T5,-100;
                M-3,-10 Q10,-35 0,-60 T10,-110;
                M-8,0 Q5,-25 -5,-50 T5,-100" 
        dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="6s" repeatCount="indefinite"/>
    </path>
    
    <path fill="none" stroke="#FAFAFA" stroke-width="4" stroke-linecap="round" d="M8,15 Q-5,-10 5,-40 T-5,-90">
      <animate attributeName="d" 
        values="M8,15 Q-5,-10 5,-40 T-5,-90;
                M13,5 Q0,-20 10,-50 T0,-100;
                M8,15 Q-5,-10 5,-40 T-5,-90" 
        dur="7s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="7s" begin="2s" repeatCount="indefinite"/>
    </path>
    
    <path fill="none" stroke="#FAFAFA" stroke-width="5" stroke-linecap="round" d="M0,25 Q10,0 -5,-30 T5,-80">
      <animate attributeName="d" 
        values="M0,25 Q10,0 -5,-30 T5,-80;
                M5,15 Q15,-10 0,-40 T10,-90;
                M0,25 Q10,0 -5,-30 T5,-80" 
        dur="5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.45;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>