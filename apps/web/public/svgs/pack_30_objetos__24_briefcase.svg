<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="leatherBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A3B1D"/>
      <stop offset="25%" stop-color="#5D4A24"/>
      <stop offset="50%" stop-color="#6B552B"/>
      <stop offset="75%" stop-color="#5D4A24"/>
      <stop offset="100%" stop-color="#3d3018"/>
    </linearGradient>
    
    <linearGradient id="brassShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A85C"/>
      <stop offset="40%" stop-color="#E8D5A3"/>
      <stop offset="60%" stop-color="#C9A85C"/>
      <stop offset="100%" stop-color="#A68A4A"/>
    </linearGradient>
    
    <radialGradient id="cavityDark" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#2A2A2A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="0.9"/>
    </radialGradient>
    
    <filter id="softShadow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
    
    <filter id="brassBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="interiorBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.6" fill="#1A1A1A" opacity="0.08"/>
    </pattern>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF7EE"/>
  
  <g transform="translate(800, 480)">
    <!-- Shadow -->
    <ellipse cx="0" cy="160" rx="180" ry="30" fill="#1A1A1A" opacity="0.15" filter="url(#softShadow)">
      <animate attributeName="rx" values="180;160;180" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.1;0.15" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Main floating group -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
      
      <!-- Interior Cavity (Hidden behind front layers) -->
      <g>
        <!-- Back wall -->
        <rect x="-150" y="-90" width="300" height="90" fill="url(#cavityDark)" rx="4"/>
        
        <!-- Documents stack -->
        <g opacity="0" transform="translate(0,0)">
          <rect x="-80" y="-60" width="120" height="80" fill="#EBE1CD" rx="1" transform="rotate(-3)"/>
          <rect x="-70" y="-70" width="120" height="80" fill="#F5F0E6" rx="1" transform="rotate(2)"/>
          <animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite" begin="0.8s"/>
          <animateTransform attributeName="transform" type="translate" values="0,15; 0,-5; 0,-5; 0,15" dur="5s" repeatCount="indefinite" begin="0.8s"/>
        </g>
        
        <!-- Calculator -->
        <g transform="translate(90, -20)" opacity="0">
          <rect x="-35" y="-25" width="70" height="90" fill="#1A1A1A" rx="5" opacity="0.9"/>
          <rect x="-25" y="-15" width="50" height="12" fill="#C9A85C" opacity="0.4"/>
          <rect x="-25" y="10" width="20" height="15" fill="#333" rx="2"/>
          <rect x="5" y="10" width="20" height="15" fill="#333" rx="2"/>
          <rect x="-25" y="30" width="20" height="15" fill="#333" rx="2"/>
          <rect x="5" y="30" width="20" height="15" fill="#333" rx="2"/>
          <animate attributeName="opacity" values="0;0.95;0.95;0" dur="5s" repeatCount="indefinite" begin="1s"/>
          <animateTransform attributeName="transform" type="translate" values="90,-10; 90,-20; 90,-20; 90,-10" dur="5s" repeatCount="indefinite" begin="1s"/>
        </g>
        
        <!-- Executive Pen -->
        <g transform="translate(-100, -30)" opacity="0">
          <rect x="-6" y="-50" width="12" height="110" fill="#1A1A1A" rx="3" opacity="0.9"/>
          <rect x="-6" y="-50" width="12" height="25" fill="#C9A85C" rx="2"/>
          <circle cx="0" cy="35" r="3" fill="#C9A85C" opacity="0.6"/>
          <animate attributeName="opacity" values="0;0.95;0.95;0" dur="5s" repeatCount="indefinite" begin="1.2s"/>
          <animateTransform attributeName="transform" type="translate" values="-100,-20; -100,-30; -100,-30; -100,-20" dur="5s" repeatCount="indefinite" begin="1.2s"/>
        </g>
      </g>
      
      <!-- Handle (Back) -->
      <path d="M-50,-90 C-50,-130 50,-130 50,-90" fill="none" stroke="url(#leatherBody)" stroke-width="10" stroke-linecap="round"/>
      <circle cx="-50" cy="-90" r="6" fill="url(#brassShine)"/>
      <circle cx="50" cy="-90" r="6" fill="url(#brassShine)"/>
      
      <!-- Lower Body Front -->
      <path d="M-170,0 L170,0 L160,140 L-160,140 Z" fill="url(#leatherBody)" stroke="#3d3018" stroke-width="1"/>
      <path d="M-170,0 L170,0 L160,140 L-160,140 Z" fill="url(#grain)" opacity="0.4"/>
      <path d="M-160,10 L160,10 L150,130 L-150,130 Z" fill="none" stroke="#C9A85C" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
      
      <!-- Lid Group (Animated Open) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 0 0; -35 0 0; -35 0 0; 0 0 0" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1" keyTimes="0;0.25;0.75;1"/>
        
        <!-- Lid Shape -->
        <g>
          <path d="M-170,0 L170,0 L160,-110 L-160,-110 Z" fill="url(#leatherBody)" stroke="#3d3018" stroke-width="1"/>
          <path d="M-170,0 L170,0 L160,-110 L-160,-110 Z" fill="url(#grain)" opacity="0.4"/>
          <path d="M-160,-10 L160,-10 L150,-100 L-150,-100 Z" fill="none" stroke="#C9A85C" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
          
          <!-- Clasp Left -->
          <g transform="translate(-80, -55)">
            <rect x="-12" y="-18" width="24" height="36" rx="3" fill="url(#brassShine)" filter="url(#brassBloom)" opacity="0.9"/>
            <rect x="-12" y="-18" width="24" height="36" rx="3" fill="none" stroke="#A68A4A" stroke-width="1"/>
            <!-- Shine sweep -->
            <path d="M-8,-14 L8,-6 L8,-2 L-8,-10 Z" fill="white" opacity="0.3">
              <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2s" repeatCount="indefinite"/>
              <animateTransform attributeName="transform" type="translate" values="-10,0; 15,0; -10,0" dur="3s" repeatCount="indefinite"/>
            </path>
            <!-- Sparkle -->
            <path d="M0,-25 L3,-17 L11,-14 L3,-11 L0,-3 L-3,-11 L-11,-14 L-3,-17 Z" fill="white">
              <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.2s" repeatCount="indefinite" additive="sum"/>
              <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
            </path>
          </g>
          
          <!-- Clasp Right -->
          <g transform="translate(80, -55)">
            <rect x="-12" y="-18" width="24" height="36" rx="3" fill="url(#brassShine)" filter="url(#brassBloom)" opacity="0.9"/>
            <rect x="-12" y="-18" width="24" height="36" rx="3" fill="none" stroke="#A68A4A" stroke-width="1"/>
            <path d="M-8,-14 L8,-6 L8,-2 L-8,-10 Z" fill="white" opacity="0.3">
              <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
              <animateTransform attributeName="transform" type="translate" values="-10,0; 15,0; -10,0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
            </path>
            <path d="M0,-25 L3,-17 L11,-14 L3,-11 L0,-3 L-3,-11 L-11,-14 L-3,-17 Z" fill="white">
              <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.8s" repeatCount="indefinite" additive="sum" begin="1s"/>
              <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="1s"/>
            </path>
          </g>
        </g>
      </g>
      
      <!-- Top edge highlight (rim) -->
      <rect x="-170" y="-5" width="340" height="10" fill="#5D4A24" rx="2" opacity="0.3" filter="url(#interiorBlur)"/>
    </g>
  </g>
</svg>