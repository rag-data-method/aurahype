<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5D4A24"/>
      <stop offset="50%" stop-color="#7A6232"/>
      <stop offset="100%" stop-color="#5D4A24"/>
    </linearGradient>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E5B52A"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <radialGradient id="glassGlow" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#FAFAFA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FAFAFA" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#FBF7EE"/>
  
  <!-- Ground Shadow -->
  <ellipse cx="800" cy="780" rx="140" ry="35" fill="#5D4A24" opacity="0.12" filter="url(#softShadow)">
    <animate attributeName="rx" values="140;160;140" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.08;0.12" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Main Hourglass Group -->
  <g transform="translate(800,450)">
    <!-- Float Animation -->
    <animateTransform attributeName="transform" type="translate" values="800,450;800,435;800,450" dur="6s" repeatCount="indefinite" additive="replace"/>
    
    <!-- Rotation: 3-4s and 7-8s -->
    <animateTransform attributeName="transform" type="rotate" values="0;0;180;180;360" keyTimes="0;0.375;0.5;0.875;1" dur="8s" repeatCount="indefinite" additive="sum"/>
    
    <!-- Wood Base Top -->
    <rect x="-120" y="-280" width="240" height="50" rx="10" fill="url(#wood)"/>
    <rect x="-110" y="-270" width="220" height="30" rx="6" fill="#D4A017" opacity="0.25"/>
    
    <!-- Wood Base Bottom -->
    <rect x="-120" y="230" width="240" height="50" rx="10" fill="url(#wood)"/>
    
    <!-- Glass Bulbs Background -->
    <path d="M-90,-230 Q-90,-100 0,-40 Q90,-100 90,-230 Z" fill="#E8E4D9" opacity="0.25"/>
    <path d="M-90,260 Q-90,130 0,70 Q90,130 90,260 Z" fill="#E8E4D9" opacity="0.25"/>
    
    <!-- Top Sand (Emptying/Refilling) -->
    <path fill="url(#sandGrad)">
      <animate attributeName="d" 
        values="M-75,-230 Q-75,-140 0,-100 Q75,-140 75,-230 Z;
                M-75,-230 Q-75,-210 0,-205 Q75,-210 75,-230 Z;
                M-75,-230 Q-75,-210 0,-205 Q75,-210 75,-230 Z;
                M-75,-230 Q-75,-140 0,-100 Q75,-140 75,-230 Z;
                M-75,-230 Q-75,-210 0,-205 Q75,-210 75,-230 Z"
        keyTimes="0;0.375;0.5;0.875;1"
        dur="8s" repeatCount="indefinite"/>
    </path>
    
    <!-- Bottom Sand (Filling/Emptying) -->
    <path fill="url(#sandGrad)">
      <animate attributeName="d" 
        values="M-75,260 Q-75,260 0,260 Q75,260 75,260 Z;
                M-75,260 Q-75,170 0,140 Q75,170 75,260 Z;
                M-75,260 Q-75,170 0,140 Q75,170 75,260 Z;
                M-75,260 Q-75,260 0,260 Q75,260 75,260 Z;
                M-75,260 Q-75,260 0,260 Q75,260 75,260 Z"
        keyTimes="0;0.375;0.5;0.875;1"
        dur="8s" repeatCount="indefinite"/>
    </path>
    
    <!-- Falling Sand Particles -->
    <g fill="#D4A017">
      <circle cx="0" cy="-100" r="3" opacity="0">
        <animate attributeName="cy" values="-100;220" dur="0.6s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="0.6s" repeatCount="indefinite" begin="0s"/>
      </circle>
      <circle cx="2" cy="-100" r="2.5" opacity="0">
        <animate attributeName="cy" values="-100;220" dur="0.7s" repeatCount="indefinite" begin="0.15s"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="0.7s" repeatCount="indefinite" begin="0.15s"/>
      </circle>
      <circle cx="-2" cy="-100" r="2" opacity="0">
        <animate attributeName="cy" values="-100;220" dur="0.8s" repeatCount="indefinite" begin="0.3s"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="0.8s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
      <circle cx="1" cy="-100" r="2.5" opacity="0">
        <animate attributeName="cy" values="-100;220" dur="0.9s" repeatCount="indefinite" begin="0.45s"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="0.9s" repeatCount="indefinite" begin="0.45s"/>
      </circle>
      <circle cx="-1" cy="-100" r="2" opacity="0">
        <animate attributeName="cy" values="-100;220" dur="1.0s" repeatCount="indefinite" begin="0.6s"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="1.0s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
    </g>
    
    <!-- Glass Highlights -->
    <ellipse cx="-50" cy="-180" rx="20" ry="50" fill="url(#glassGlow)" opacity="0.7" transform="rotate(-15)">
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="50" cy="200" rx="18" ry="45" fill="url(#glassGlow)" opacity="0.5" transform="rotate(10)">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Central Neck -->
    <rect x="-12" y="-50" width="24" height="100" rx="3" fill="#E8E4D9" opacity="0.4"/>
    
    <!-- Sparkles on Sand -->
    <g fill="#FAFAFA" filter="url(#innerGlow)">
      <circle cx="-30" cy="-150" r="5" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
      <circle cx="40" cy="180" r="4" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2.3s" repeatCount="indefinite" begin="1.1s"/>
      </circle>
      <circle cx="0" cy="150" r="6" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2.7s" repeatCount="indefinite" begin="2.5s"/>
      </circle>
      <circle cx="-20" cy="200" r="3" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.7s"/>
      </circle>
    </g>
    
    <!-- Rim Light -->
    <path d="M-80,-230 Q-70,-120 0,-60" stroke="#FAFAFA" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M80,260 Q70,150 0,90" stroke="#FAFAFA" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>