<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <radialGradient id="lensGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#FAFAFA" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#4CC9FE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
