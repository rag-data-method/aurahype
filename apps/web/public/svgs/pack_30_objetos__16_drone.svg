    <path d="M 840 440 L 970 560 L 950 570 L 820 450 Z" fill="#1A1A1A" opacity="0.95"/>
    
    <line x1="760" y1="400" x2="640" y2="315" stroke="#4CC9FE" stroke-width="3" opacity="0.85"/>
    <line x1="840" y1="400" x2="960" y2="315" stroke="#4CC9FE" stroke-width="3" opacity="0.85"/>
    <line x1="760" y1="440" x2="640" y2="565" stroke="#4CC9FE" stroke-width="3" opacity="0.85"/>
    <line x1="840" y1="440" x2="960" y2="565" stroke="#4CC9FE" stroke-width="3" opacity="0.85"/>
    
    <g transform="translate(640, 315)">
