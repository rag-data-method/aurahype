    <animate attributeName="ry" values="35;30;35" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.08;0.12" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  
  <g>
