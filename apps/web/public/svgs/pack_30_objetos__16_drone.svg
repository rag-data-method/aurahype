    </filter>
    <filter id="propBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
    <filter id="ledGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#DCE2E8"/>
  
  <ellipse cx="800" cy="660" rx="170" ry="35" fill="#1A1A1A" opacity="0.12" filter="url(#shadowBlur)">
