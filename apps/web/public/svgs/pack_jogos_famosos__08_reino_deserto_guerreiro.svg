<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;background:#2C1810;">
  <defs>
    <filter id="b40" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="b80" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="b120" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="b160" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="160"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="n" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.9 0 0 0 0 0.7 0 0 0 0 0.4 0 0 0 0.06 0" />
    </filter>

    <radialGradient id="sunGlow" cx="30%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#FF8C42" stop-opacity="1">
        <animate attributeName="stop-opacity" values="1;0.85;1" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="35%" stop-color="#E8C9A0" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.6;0.45;0.6" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#2C1810" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C1810">
        <animate attributeName="stop-color" values="#2C1810;#1A0E08;#2C1810" dur="25s" repeatCount="indefinite" />
      </stop>
      <stop offset="35%" stop-color="#FF8C42">
        <animate attributeName="stop-color" values="#FF8C42;#E87E35;#FF8C42" dur="18s" repeatCount="indefinite" />
      </stop>
      <stop offset="65%" stop-color="#E8C9A0">
        <animate attributeName="stop-color" values="#E8C9A0;#D4A87C;#E8C9A0" dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#8B5A3C">
        <animate attributeName="stop-color" values="#8B5A3C;#70452D;#8B5A3C" dur="22s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="duneFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C3825" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#2C1810" stop-opacity="0.2" />
    </linearGradient>

    <linearGradient id="heroRim" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#FF8C42" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#E8C9A0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>

    <g id="spire">
      <path d="M -10 0 L 0 -120 L 10 0 Z" fill="#2C1810" />
      <path d="M -4 -40 L 0 -90 L 4 -40 Z" fill="#4A2815" />
      <rect x="-12" y="-8" width="24" height="8" fill="#3D2010" />
      <circle cx="0" cy="-55" r="2.5" fill="#FF8C42" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="4s" repeatCount="indefinite" />
      </circle>
      <circle cx="0" cy="-25" r="2" fill="#FF8C42" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="6s" repeatCount="indefinite" />
      </circle>
    </g>

    <g id="cityComplex">
      <g transform="translate(200, 0) scale(0.9)"><use href="#spire" /></g>
      <g transform="translate(230, 10) scale(0.7)"><use href="#spire" /></g>
      <g transform="translate(170, 5) scale(0.8)"><use href="#spire" /></g>
      <g transform="translate(260, 15) scale(0.6)"><use href="#spire" /></g>
      <g transform="translate(140, 20) scale(0.5)"><use href="#spire" /></g>
      <g transform="translate(290, 5) scale(0.85)"><use href="#spire" /></g>
      <g transform="translate(110, 10) scale(0.75)"><use href="#spire" /></g>
      <path d="M 100 0 L 320 0 L 300 25 L 120 25 Z" fill="#2C1810" opacity="0.8" />
      <rect x="140" y="-40" width="30" height="45" fill="#2C1810" />
      <rect x="200" y="-30" width="20" height="35" fill="#2C1810" />
      <rect x="250" y="-20" width="25" height="25" fill="#2C1810" />
      <circle cx="155" cy="-25" r="2" fill="#E8C9A0" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite" />
      </circle>
      <circle cx="210" cy="-15" r="2" fill="#E8C9A0" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="7s" repeatCount="indefinite" />
      </circle>
      <circle cx="262" cy="-10" r="2" fill="#E8C9A0" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite" />
      </circle>
    </g>

    <path id="heroPath" d="
      M 1130 545
      C 1130 545, 1145 535, 1160 540
      C 1175 545, 1180 555, 1195 560
      C 1210 565, 1225 560, 1240 550
      C 1255 540, 1260 525, 1270 515
      C 1280 505, 1290 495, 1300 490
      C 1315 485, 1320 490, 1305 505
      C 1290 520, 1280 540, 1275 555
      C 1270 570, 1280 580, 1295 585
      C 1310 590, 1325 585, 1340 580
      C 1355 575, 1365 565, 1375 555
      C 1385 545, 1395 540, 1400 550
      C 1405 560, 1400 575, 1390 585
      C 1380 595, 1370 600, 1355 605
      L 1350 640
      C 1370 650, 1390 660, 1410 670
      L 1415 690
      L 1425 695
      L 1430 710
      C 1440 715, 1450 720, 1460 730
      C 1470 740, 1480 750, 1490 760
      L 1495 770
      C 1465 760, 1435 740, 1405 725
      L 1400 740
      C 1375 720, 1350 700, 1325 685
      L 1310 740
      L 1295 730
      C 1280 745, 1260 755, 1240 760
      C 1220 765, 1200 760, 1180 750
      C 1160 780, 1145 810, 1135 840
      L 1125 840
      C 1140 790, 1160 750, 1155 720
      C 1150 690, 1120 660, 1100 640
      C 1080 650, 1050 660, 1020 665
      C 990 670, 960 660, 930 640
      C 900 660, 870 680, 840 700
      L 830 690
      C 860 665, 890 635, 920 615
      C 950 625, 980 625, 1000 615
      C 1020 605, 1040 590, 1060 580
      C 1080 570, 1105 560, 1130 545
      Z" />

    <g id="sandDot">
      <circle r="1.5" fill="#FF8C42" opacity="0.8" />
    </g>

    <path id="p1" d="M -100 950 Q 400 700 900 650 T 1700 400" />
    <path id="p2" d="M -50 800 Q 500 650 1000 550 T 1700 300" />
    <path id="p3" d="M 0 900 Q 600 600 1100 500 T 1700 250" />
    <path id="p4" d="M -100 850 Q 400 550 900 450 T 1650 200" />
    <path id="p5" d="M 50 950 Q 700 600 1200 450 T 1700 100" />
  </defs>

  <rect width="1600" height="900" fill="url(#sky)" />
  <rect width="1600" height="900" fill="url(#sunGlow)" filter="url(#b160)" opacity="0.7" />

  <g opacity="0.6" filter="url(#b120)">
    <path d="M 1200 350 Q 1350 300 1600 380 L 1600 500 Q 1350 450 1200 480 Z" fill="#FF8C42" opacity="0.4" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 20,-10; 0,0" dur="20s" repeatCount="indefinite" />
  </g>

  <g filter="url(#b80)" opacity="0.8">
    <path d="M 0 480 Q 300 420 600 450 T 1200 420 T 1600 460 L 1600 900 L 0 900 Z" fill="#3D2010" />
  </g>

  <g filter="url(#b40)">
    <path d="M 0 530 Q 400 480 800 520 T 1600 480 L 1600 900 L 0 900 Z" fill="url(#duneFar)" />
  </g>

  <g filter="url(#b80)">
    <use href="#cityComplex" transform="translate(950, 430) scale(0.9)" />
  </g>

  <path d="M 950 540 A 15 15 0 0 1 975 550 A 25 25 0 0 0 1000 565 A 10 10 0 0 1 1025 570 A 40 40 0 0 0 1080 555" stroke="#A8D8FF" stroke-width="3" fill="none" opacity="0.4" filter="url(#b40)">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite" />
  </path>

  <g filter="url(#b40)">
    <path d="M 0 650 Q 600 520 1000 580 T 1600 550 L 1600 900 L 0 900 Z" fill="#5C3825" />
  </g>

  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" />
    <g filter="url(#b40)">
      <path d="M 850 600 Q 950 620 1050 600 Q 1150 580 1250 610 Q 1350 640 1450 620 Q 1550 600 1600 630 L 1600 900 L 0 900 Z" fill="#2C1810" />
    </g>

    <use href="#heroPath" fill="#1A0E08" />
    <use href="#heroPath" fill="none" stroke="url(#heroRim)" stroke-width="5" filter="url(#b40)" opacity="0.7" />
    <path d="M 1070 580 C 1020 520, 980 480, 940 440 C 935 435, 930 440, 940 445 C 960 465, 1000 520, 1060 590 Z" fill="#FF8C42" opacity="0.5" filter="url(#b40)" />
    <path d="M 1150 560 C 1120 500, 1100 450, 1080 400 C 1078 395, 1075 400, 1082 405 C 1100 430, 1120 490, 1145 565 Z" fill="#FF8C42" opacity="0.4" filter="url(#b40)" />
    <path d="M 1280 510 C 1300 460, 1310 420, 1320 380 C 1322 375, 1325 380, 1320 385 C 1310 410, 1300 460, 1285 515 Z" fill="#E8C9A0" opacity="0.6" filter="url(#b40)" />
    <path d="M 1380 560 C 1400 500, 1410 450, 1425 400 C 1428 395, 1430 400, 1425 405 C 1410 430, 1395 490, 1385 565 Z" fill="#FF8C42" opacity="0.5" filter="url(#b40)" />
  </g>

  <g opacity="0.5">
    <path d="M 0 750 Q 700 680 1100 700 T 1600 680 L 1600 900 L 0 900 Z" fill="#2C1810" />
  </g>

  <ellipse cx="1250" cy="680" rx="250" ry="30" fill="#E8C9A0" opacity="0.15" filter="url(#b80)" />

  <g filter="url(#b40)">
    <path d="M 0 850 Q 500 750 900 780 T 1600 760 L 1600 900 L 0 900 Z" fill="#1A0E08" />
  </g>

  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,3; 0,0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" />
    <path d="M 950 740 C 980 730, 1010 730, 1040 745 C 1070 760, 1090 780, 1120 785 C 1150 790, 1180 780, 1210 770 C 1240 760, 1270 750, 1300 755 C 1330 760, 1360 775, 1390 770 C 1420 765, 1450 745, 1480 750 C 1510 755, 1540 780, 1570 790 L 1600 800 L 1600 900 L 0 900 Z" fill="#0D0704" />
  </g>

  <g opacity="0.15" filter="url(#b40)">
    <ellipse cx="1040" cy="745" rx="40" ry="10" fill="#FF8C42" />
  </g>

  <g id="par1">
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="10s" repeatCount="indefinite" rotate="auto">
        <mpath href="#p1" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0" dur="10s" repeatCount="indefinite" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto" begin="1s">
        <mpath href="#p1" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.6;0" dur="12s" repeatCount="indefinite" begin="1s" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="9s" repeatCount="indefinite" rotate="auto" begin="3s">
        <mpath href="#p1" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0" dur="9s" repeatCount="indefinite" begin="3s" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="14s" repeatCount="indefinite" rotate="auto" begin="5s">
        <mpath href="#p1" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.7;0" dur="14s" repeatCount="indefinite" begin="5s" />
    </use>
  </g>

  <g id="par2">
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="11s" repeatCount="indefinite" rotate="auto">
        <mpath href="#p2" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0" dur="11s" repeatCount="indefinite" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="15s" repeatCount="indefinite" rotate="auto" begin="2s">
        <mpath href="#p2" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.5;0" dur="15s" repeatCount="indefinite" begin="2s" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto" begin="4s">
        <mpath href="#p2" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0" dur="8s" repeatCount="indefinite" begin="4s" />
    </use>
  </g>

  <g id="par3">
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
        <mpath href="#p3" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.7;0" dur="9s" repeatCount="indefinite" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="13s" repeatCount="indefinite" rotate="auto" begin="1.5s">
        <mpath href="#p3" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.6;0" dur="13s" repeatCount="indefinite" begin="1.5s" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="10s" repeatCount="indefinite" rotate="auto" begin="3.5s">
        <mpath href="#p3" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0" dur="10s" repeatCount="indefinite" begin="3.5s" />
    </use>
  </g>

  <g id="par4">
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto">
        <mpath href="#p4" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="14s" repeatCount="indefinite" rotate="auto" begin="2.5s">
        <mpath href="#p4" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.5;0" dur="14s" repeatCount="indefinite" begin="2.5s" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="7s" repeatCount="indefinite" rotate="auto" begin="4.5s">
        <mpath href="#p4" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0" dur="7s" repeatCount="indefinite" begin="4.5s" />
    </use>
  </g>

  <g id="par5">
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="10s" repeatCount="indefinite" rotate="auto">
        <mpath href="#p5" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.7;0" dur="10s" repeatCount="indefinite" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="11s" repeatCount="indefinite" rotate="auto" begin="1.2s">
        <mpath href="#p5" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.6;0" dur="11s" repeatCount="indefinite" begin="1.2s" />
    </use>
    <use href="#sandDot" x="0" y="0">
      <animateMotion dur="9s" repeatCount="indefinite" rotate="auto" begin="3.8s">
        <mpath href="#p5" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0" dur="9s" repeatCount="indefinite" begin="3.8s" />
    </use>
  </g>

  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.4" pointer-events="none" />
</svg>