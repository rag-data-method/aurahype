<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2E004F" />
      <stop offset="40%" stop-color="#0A0014" />
      <stop offset="100%" stop-color="#04000A" />
    </radialGradient>
    
    <filter id="blur-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <filter id="blur-md" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" />
    </filter>
    
    <path id="confetti-curve" d="M 0 -6 Q 4 0 0 6 Q -4 0 0 -6 Z" />
    <path id="confetti-curve-alt" d="M -5 -5 L 5 -5 L 5 5 L -5 5 Z" />
    <g id="star">
      <path d="M 0 -12 L 3 -4 L 11 -3 L 5 2 L 7 10 L 0 6 L -7 10 L -5 2 L -11 -3 L -3 -4 Z" />
    </g>
    <g id="circle-pop">
      <circle r="5" />
    </g>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg-glow)" />
  
  <g id="portal-spiral">
    <g transform="translate(400, 300)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="5s" repeatCount="indefinite" additive="sum" />
      
      <g>
        <path d="M 0 0 L 160 -300 A 340 340 0 0 0 -160 -300 Z" fill="#FF004D" />
        <path d="M 0 0 L -160 -300 A 340 340 0 0 0 -260 150 Z" fill="#00FFFF" />
        <path d="M 0 0 L -260 150 A 340 340 0 0 0 100 330 Z" fill="#7A00FF" />
        <path d="M 0 0 L 100 330 A 340 340 0 0 0 300 -60 Z" fill="#FFB300" />
        <path d="M 0 0 L 300 -60 A 340 340 0 0 0 160 -300 Z" fill="#00FF66" />
        <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="2.5s" repeatCount="indefinite" additive="sum" />
      </g>
      
      <g opacity="0.9">
        <path d="M 0 0 L 120 -250 A 290 290 0 0 0 -220 0 Z" fill="#FFB300" />
        <path d="M 0 0 L -220 0 A 290 290 0 0 0 120 250 Z" fill="#00FF66" />
        <path d="M 0 0 L 120 250 A 290 290 0 0 0 260 -80 Z" fill="#FF004D" />
        <path d="M 0 0 L 260 -80 A 290 290 0 0 0 120 -250 Z" fill="#00FFFF" />
        <animateTransform attributeName="transform" type="rotate" from="0" to="-180" dur="3s" repeatCount="indefinite" additive="sum" />
        <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="2s" repeatCount="indefinite" additive="sum" />
      </g>
      
      <g opacity="1">
        <path d="M 0 0 L 80 -200 A 220 220 0 0 0 -180 -100 Z" fill="#FF66E6" />
        <path d="M 0 0 L -180 -100 A 220 220 0 0 0 -80 200 Z" fill="#66FFCC" />
        <path d="M 0 0 L -80 200 A 220 220 0 0 0 180 100 Z" fill="#E6FF4D" />
        <path d="M 0 0 L 180 100 A 220 220 0 0 0 80 -200 Z" fill="#4D99FF" />
        <animateTransform attributeName="transform" type="rotate" from="0" to="270" dur="4s" repeatCount="indefinite" additive="sum" />
      </g>
    </g>
  </g>
  
  <g id="spiral-bloom">
    <g transform="translate(400, 300)">
      <circle r="250" fill="none" stroke="#FF004D" stroke-width="2" opacity="0.4">
        <animate attributeName="r" values="150;280;150" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle r="220" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.5">
        <animate attributeName="r" values="120;260;120" dur="2.5s" repeatCount="indefinite" begin="0.3s" />
        <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite" begin="0.3s" />
      </circle>
      <circle r="180" fill="none" stroke="#FFFF00" stroke-width="2" opacity="0.6">
        <animate attributeName="r" values="100;220;100" dur="4s" repeatCount="indefinite" begin="0.6s" />
        <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite" begin="0.6s" />
      </circle>
      <circle r="100" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.8" filter="url(#blur-md)">
        <animate attributeName="r" values="50;150;50" dur="2s" repeatCount="indefinite" begin="0.1s" />
        <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" begin="0.1s" />
      </circle>
    </g>
  </g>
  
  <g id="center-vortex">
    <g transform="translate(400, 300)">
      <circle r="60" fill="#FFFFFF" filter="url(#blur-lg)" opacity="0.6">
        <animate attributeName="r" values="30;90;30" dur="1.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite" />
      </circle>
      <circle r="45" fill="#FF004D" />
      <circle r="35" fill="#FFB300" />
      <circle r="25" fill="#00FFFF" />
      <circle r="15" fill="#FFFFFF" />
      <circle r="8" fill="#000000" />
    </g>
  </g>
  
  <g id="confetti-blast">
    <use href="#circle-pop" fill="#FFFF00" filter="url(#blur-md)">
      <animateMotion path="M 400 300 Q 100 100 50 50" dur="3s" repeatCount="indefinite" begin="0s" />
      <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="3s" repeatCount="indefinite" />
    </use>
    
    <use href="#confetti-curve" fill="#FF004D" transform="scale(1.5)">
      <animateMotion path="M 400 300 C 200 0 0 0 0 0" dur="3.5s" repeatCount="indefinite" begin="0.2s" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1;0" dur="3.5s" repeatCount="indefinite" begin="0.2s" />
    </use>
    
    <use href="#confetti-curve-alt" fill="#00FFFF" transform="scale(1.2)">
      <animateMotion path="M 400 300 C 600 50 800 0 750 -50" dur="3s" repeatCount="indefinite" begin="0.4s" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="-720" dur="2s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite" begin="0.4s" />
    </use>
    
    <use href="#star" fill="#FFB300" transform="scale(1.5)">
      <animateMotion path="M 400 300 C 700 200 800 300 800 300" dur="4s" repeatCount="indefinite" begin="0.1s" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="1080" dur="3s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1;0" dur="4s" repeatCount="indefinite" begin="0.1s" />
    </use>
    
    <use href="#confetti-curve" fill="#00FF66" transform="scale(2)">
      <animateMotion path="M 400 300 C 500 500 300 600 200 600" dur="3.2s" repeatCount="indefinite" begin="0.3s" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="540" dur="2s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1;0" dur="3.2s" repeatCount="indefinite" begin="0.3s" />
    </use>
    
    <use href="#circle-pop" fill="#FF66E6">
      <animateMotion path="M 400 300 C 100 500 0 600 50 600" dur="3.8s" repeatCount="indefinite" begin="0.5s" />
      <animateTransform attributeName="transform" type="scale" values="0;1.5;0" dur="3.8s" repeatCount="indefinite" />
    </use>
    
    <use href="#star" fill="#FFFFFF" transform="scale(1)">
      <animateMotion path="M 400 300 C 300 100 100 150 50 100" dur="4.5s" repeatCount="indefinite" begin="0.6s" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="720" dur="2.5s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1;0" dur="4.5s" repeatCount="indefinite" begin="0.6s" />
    </use>
    
    <use href="#confetti-curve-alt" fill="#FFFF00" transform="scale(1.8)">
      <animateMotion path="M 400 300 C 700 400 800 500 780 580" dur="3s" repeatCount="indefinite" begin="0.7s" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="1.5s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite" begin="0.7s" />
    </use>
    
    <use href="#confetti-curve" fill="#7A00FF" transform="scale(1.5)">
      <animateMotion path="M 400 300 C 600 550 700 600 700 600" dur="4s" repeatCount="indefinite" begin="0.8s" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="1;0" dur="4s" repeatCount="indefinite" begin="0.8s" />
    </use>
  </g>
  
  <g id="energy-bands">
    <path d="M -100 300 Q 400 150 900 300" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0" filter="url(#blur-md)">
      <animate attributeName="d" values="M -100 300 Q 400 150 900 300; M -100 300 Q 400 450 900 300; M -100 300 Q 400 150 900 300" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.7;0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M -100 300 Q 400 450 900 300" fill="none" stroke="#FF004D" stroke-width="3" opacity="0" filter="url(#blur-md)">
      <animate attributeName="d" values="M -100 300 Q 400 450 900 300; M -100 300 Q 400 150 900 300; M -100 300 Q 400 450 900 300" dur="4s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="4s" repeatCount="indefinite" begin="1s" />
    </path>
    <path d="M -100 300 Q 400 300 900 300" fill="none" stroke="#FFFFFF" stroke-width="5" opacity="0" filter="url(#blur-md)">
      <animate attributeName="d" values="M -100 300 Q 400 300 900 300; M -100 300 Q 400 300 900 300" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite" />
    </path>
  </g>
  
  <g id="screen-wipe" transform="translate(400, 300)">
    <ellipse rx="0" ry="400" fill="#00FFFF" opacity="0.3">
      <animate attributeName="rx" values="0;500;0" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.3;0" dur="6s" repeatCount="indefinite" />
    </ellipse>
    <ellipse rx="0" ry="400" fill="#FF004D" opacity="0.2">
      <animate attributeName="rx" values="0;500;0" dur="5s" repeatCount="indefinite" begin="2s" />
      <animate attributeName="opacity" values="0;0.2;0" dur="5s" repeatCount="indefinite" begin="2s" />
    </ellipse>
  </g>
  
  <g id="speed-lines">
    <line x1="400" y1="300" x2="0" y2="0" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-linecap="round">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite" />
      <animate attributeName="x2" values="600;0" dur="0.8s" repeatCount="indefinite" />
      <animate attributeName="y2" values="450;0" dur="0.8s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="300" x2="800" y2="0" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-linecap="round">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite" begin="0.5s" />
      <animate attributeName="x2" values="200;800" dur="1s" repeatCount="indefinite" begin="0.5s" />
      <animate attributeName="y2" values="150;0" dur="1s" repeatCount="indefinite" begin="0.5s" />
    </line>
    <line x1="400" y1="300" x2="0" y2="600" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-linecap="round">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="x2" values="600;0" dur="1.2s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="y2" values="150;600" dur="1.2s" repeatCount="indefinite" begin="1s" />
    </line>
    <line x1="400" y1="300" x2="800" y2="600" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-linecap="round">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="x2" values="200;800" dur="0.9s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="y2" values="450;600" dur="0.9s" repeatCount="indefinite" begin="1.5s" />
    </line>
  </g>
  
  <g id="energy-ring">
    <rect width="100%" height="100%" fill="none" stroke="#FFFFFF" stroke-width="15" opacity="0">
      <animate attributeName="opacity" values="0;0.1;0" dur="5s" repeatCount="indefinite" />
      <animate attributeName="stroke-width" values="15;0" dur="5s" repeatCount="indefinite" />
    </rect>
  </g>
  
  <g id="vignette" pointer-events="none">
    <rect width="100%" height="100%" fill="none" stroke="#000000" stroke-width="60" opacity="0.7" />
  </g>
</svg>