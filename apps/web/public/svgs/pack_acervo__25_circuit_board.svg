<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#000000"/>
  <rect width="1600" height="900" fill="url(#vignette)"/>

  <g stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.5">
    <line x1="80" y1="120" x2="1520" y2="120"/>
    <line x1="80" y1="300" x2="1400" y2="300"/>
    <line x1="80" y1="480" x2="1520" y2="480"/>
    <line x1="80" y1="660" x2="1350" y2="660"/>
    <line x1="80" y1="840" x2="1520" y2="840"/>
  </g>

  <g stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.4">
    <line x1="220" y1="80" x2="220" y2="820"/>
    <line x1="420" y1="80" x2="420" y2="820"/>
    <line x1="620" y1="80" x2="620" y2="820"/>
    <line x1="820" y1="80" x2="820" y2="820"/>
    <line x1="1020" y1="80" x2="1020" y2="820"/>
    <line x1="1220" y1="80" x2="1220" y2="820"/>
    <line x1="1420" y1="80" x2="1420" y2="820"/>
  </g>

  <g stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.7">
    <polyline points="420,300 520,300 520,480 620,480"/>
    <polyline points="820,480 820,660 1020,660 1020,840"/>
    <polyline points="1220,120 1220,300 1320,300 1320,480"/>
    <polyline points="220,660 320,660 320,840 420,840"/>
    <polyline points="620,120 620,220 720,220 720,320"/>
    <polyline points="1020,300 1120,300 1120,480 1220,480"/>
    <polyline points="1420,660 1520,660 1520,840"/>
    <polyline points="420,840 420,900"/>
  </g>

  <g fill="#FFD700">
    <circle cx="420" cy="300" r="6"/>
    <circle cx="620" cy="480" r="6"/>
    <circle cx="820" cy="660" r="6"/>
    <circle cx="1020" cy="840" r="6"/>
    <circle cx="1220" cy="300" r="6"/>
    <circle cx="1320" cy="480" r="6"/>
    <circle cx="320" cy="840" r="6"/>
    <circle cx="720" cy="220" r="6"/>
    <circle cx="1120" cy="480" r="8"/>
    <circle cx="1520" cy="840" r="8"/>
  </g>

  <g fill="url(#glow)" opacity="0.5">
    <circle cx="420" cy="300" r="22">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="660" r="28">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1220" cy="300" r="22">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1120" cy="480" r="32">
      <animate attributeName="opacity" values="0.3;0.85;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <circle r="5" fill="#FFD700" filter="url(#blur)">
    <animateMotion path="M80,120 L1520,120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle r="5" fill="#FFD700" filter="url(#blur)">
    <animateMotion path="M80,840 L1520,840" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle r="4" fill="#FFD700" filter="url(#blur)">
    <animateMotion path="M420,300 L520,300 L520,480 L620,480" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle r="4" fill="#FFD700" filter="url(#blur)">
    <animateMotion path="M820,480 L820,660 L1020,660 L1020,840" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <circle r="4" fill="#FFD700" filter="url(#blur)">
    <animateMotion path="M1220,120 L1220,300 L1320,300 L1320,480" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <line x1="80" y1="480" x2="1520" y2="480" stroke="#FFD700" stroke-width="3" opacity="0.25">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/>
  </line>

  <line x1="820" y1="80" x2="820" y2="820" stroke="#FFD700" stroke-width="3" opacity="0.25">
    <animate attributeName="opacity" values="0.15;0.8;0.15" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>