<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2b064a"/>
      <stop offset="60%" stop-color="#11021f"/>
      <stop offset="100%" stop-color="#05010a"/>
    </radialGradient>

    <!-- RBG Gradients for Enhancements -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff003c"/>
      <stop offset="100%" stop-color="#a30026"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00a358"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#009ca3"/>
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Confetti Symbol -->
    <g id="confetti">
      <polygon points="-10,-10 10,-5 -5,10" fill="#ff0055">
        <animate attributeName="fill" values="#ff0055;#00ff88;#00f0ff;#ff0055" dur="4s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="5,-5 15,5 0,10" fill="#00f0ff">
        <animate attributeName="fill" values="#00f0ff;#ff0055;#00ff88;#00f0ff" dur="4s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <g id="confetti2">
      <circle cx="0" cy="0" r="6" fill="#ffcc00">
        <animate attributeName="fill" values="#ffcc00;#ff00ff;#00ffff;#ffcc00" dur="3s" repeatCount="indefinite"/>
      </circle>
      <rect x="-3" y="-3" width="6" height="6" fill="#ffffff" opacity="0.8"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Background Grid (Vaporwave Style) -->
  <g stroke="#ff00cc" stroke-width="1.5" opacity="0.25">
    <line x1="0" y1="450" x2="800" y2="450">
      <animate attributeName="stroke-dasharray" values="0 800; 800 0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.6;0.25" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="480" x2="800" y2="480">
      <animate attributeName="stroke-dasharray" values="0 800; 800 0" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.6;0.25" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="510" x2="800" y2="510">
      <animate attributeName="stroke-dasharray" values="0 800; 800 0" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.6;0.25" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="540" x2="800" y2="540">
      <animate attributeName="stroke-dasharray" values="0 800; 800 0" dur="3s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.6;0.25" dur="3s" begin="0.9s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="570" x2="800" y2="570">
      <animate attributeName="stroke-dasharray" values="0 800; 800 0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.6;0.25" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Floating Energy Orbs -->
  <g>
    <circle cx="150" cy="200" r="15" fill="url(#redGrad)" filter="url(#glow-red)" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" values="0,0; 30,-40; 0,0" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.4;1" dur="5s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="150" r="10" fill="url(#greenGrad)" filter="url(#glow-green)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0,0; -40,20; 0,0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="400" r="20" fill="url(#blueGrad)" filter="url(#glow-blue)" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,-60; 0,0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating Chat Mockup (Abstract) -->
  <g id="chat-bubble" transform="translate(50, 50)">
    <path d="M0,0 h120 a20,20 0 0 1 20,20 v60 a20,20 0 0 1 -20,20 h-80 l-20,20 v-20 h-20 a20,20 0 0 1 -20,-20 v-60 a20,20 0 0 1 20,-20 z" fill="#1a0b2e" stroke="#ff00ff" stroke-width="2.5"/>
    <rect x="15" y="20" width="90" height="8" rx="4" fill="#ff00ff" opacity="0.8"/>
    <rect x="15" y="38" width="60" height="8" rx="4" fill="#00f0ff" opacity="0.8"/>
    <rect x="15" y="56" width="80" height="8" rx="4" fill="#00ff88" opacity="0.8"/>
    <animateTransform attributeName="transform" type="translate" values="50,50; 60,40; 50,50" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Main Keyboard Group -->
  <g id="keyboard-base">
    <!-- Keyboard Chassis Shadow/Outline -->
    <rect x="190" y="290" width="420" height="140" rx="15" fill="#050109" stroke="#ff00ff" stroke-width="3"/>
    
    <!-- Keyboard Base Glow -->
    <rect x="200" y="300" width="400" height="120" rx="10" fill="#1a0b2e" stroke="#ff00ff" stroke-width="2">
      <animate attributeName="stroke" values="#ff00ff;#00f0ff;#00ff88;#ff00ff" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Keys Row 1: R -> G -> B -->
    <!-- Row 1 has 8 keys, cycling Red/Green/Blue -->
    <!-- Red Keys (1, 4, 7) -->
    <rect x="215" y="315" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#ff003c;#ffffff;#ffffff;#ff003c" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-red);none;none;url(#glow-red)" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="350" y="315" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#ff003c;#ffffff;#ffffff;#ff003c" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-red);none;none;url(#glow-red)" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="485" y="315" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#ff003c;#ffffff;#ffffff;#ff003c" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-red);none;none;url(#glow-red)" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Green Keys (2, 5, 8) -->
    <rect x="260" y="315" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00ff88;#ffffff;#ffffff;#00ff88" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-green);none;none;url(#glow-green)" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="395" y="315" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00ff88;#ffffff;#ffffff;#00ff88" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-green);none;none;url(#glow-green)" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="530" y="315" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00ff88;#ffffff;#ffffff;#00ff88" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-green);none;none;url(#glow-green)" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
    </rect>

    <!-- Blue Keys (3, 6) -->
    <rect x="305" y="315" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00f0ff;#ffffff;#ffffff;#00f0ff" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-blue);none;none;url(#glow-blue)" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="440" y="315" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00f0ff;#ffffff;#ffffff;#00f0ff" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-blue);none;none;url(#glow-blue)" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
    </rect>

    <!-- The SPACE BAR -->
    <rect x="575" y="315" width="15" height="35" rx="5" fill="#ffffff">
       <animate attributeName="fill" values="#00f0ff;#ffffff;#ffffff;#00f0ff" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
       <animate attributeName="filter" values="url(#glow-blue);none;none;url(#glow-blue)" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
    </rect>

    <!-- Keys Row 2: G -> B -> R -->
    <!-- Green Keys (1, 4, 7) -->
    <rect x="215" y="365" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00ff88;#ffffff;#ffffff;#00ff88" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-green);none;none;url(#glow-green)" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="350" y="365" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00ff88;#ffffff;#ffffff;#00ff88" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-green);none;none;url(#glow-green)" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="485" y="365" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00ff88;#ffffff;#ffffff;#00ff88" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-green);none;none;url(#glow-green)" keyTimes="0;0.05;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Blue Keys (2, 5, 8) -->
    <rect x="260" y="365" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00f0ff;#ffffff;#ffffff;#00f0ff" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-blue);none;none;url(#glow-blue)" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="395" y="365" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00f0ff;#ffffff;#ffffff;#00f0ff" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-blue);none;none;url(#glow-blue)" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="530" y="365" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#00f0ff;#ffffff;#ffffff;#00f0ff" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-blue);none;none;url(#glow-blue)" keyTimes="0;0.05;0.9;1" dur="6s" begin="0.7s" repeatCount="indefinite"/>
    </rect>

    <!-- Red Keys (3, 6) -->
    <rect x="305" y="365" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#ff003c;#ffffff;#ffffff;#ff003c" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-red);none;none;url(#glow-red)" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="440" y="365" width="35" height="35" rx="5" fill="#ffffff">
      <animate attributeName="fill" values="#ff003c;#ffffff;#ffffff;#ff003c" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="filter" values="url(#glow-red);none;none;url(#glow-red)" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
    
    <!-- The SPACE BAR -->
    <rect x="575" y="365" width="15" height="35" rx="5" fill="#ffffff">
       <animate attributeName="fill" values="#ff003c;#ffffff;#ffffff;#ff003c" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
       <animate attributeName="filter" values="url(#glow-red);none;none;url(#glow-red)" keyTimes="0;0.05;0.9;1" dur="6s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Floating Sparkles / Cursors -->
  <g>
    <!-- Mouse Cursor 1 -->
    <polygon points="600,100 615,140 625,120 645,120 600,100" fill="#00f0ff" filter="url(#glow-blue)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 20,20; 0,0" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <!-- Mouse Cursor 2 -->
    <polygon points="250,80 265,120 275,100 295,100 250,80" fill="#ff003c" filter="url(#glow-red)">
      <animateTransform attributeName="transform" type="translate" values="0,0; -10,30; 0,0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </polygon>
    <!-- Play Button Icon -->
    <path d="M 720 250 L 760 270 L 720 290 Z" fill="#00ff88" filter="url(#glow-green)">
      <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="1.5s" repeatCount="indefinite" additive="sum"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -5,0; 0,0" dur="1.5s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <!-- Scattered Confetti Instances -->
  <use href="#confetti" x="100" y="500" transform="rotate(15, 100, 500)">
    <animateTransform attributeName="transform" type="rotate" values="15;375" dur="10s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 20,-150" dur="4s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti2" x="250" y="550" transform="rotate(-20, 250, 550)">
    <animateTransform attributeName="transform" type="rotate" values="-20;340" dur="12s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -30,-200" dur="5s" begin="1s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="700" y="520" transform="rotate(45, 700, 520)">
    <animateTransform attributeName="transform" type="rotate" values="45;405" dur="8s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -10,-180" dur="3.5s" begin="0.5s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti2" x="50" y="300" transform="rotate(60, 50, 300)">
    <animateTransform attributeName="transform" type="rotate" values="60;420" dur="15s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 40,-100" dur="6s" begin="2s" repeatCount="indefinite" additive="sum"/>
  </use>
  <use href="#confetti" x="750" y="200" transform="rotate(-10, 750, 200)">
    <animateTransform attributeName="transform" type="rotate" values="-10;350" dur="9s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -20,-120" dur="4s" begin="1.5s" repeatCount="indefinite" additive="sum"/>
  </use>

  <!-- Final Overlay Scanlines for retro feel -->
  <g opacity="0.15">
    <rect x="0" y="0" width="800" height="2" fill="#ffffff"/>
    <rect x="0" y="10" width="800" height="2" fill="#ffffff"/>
    <rect x="0" y="20" width="800" height="2" fill="#ffffff"/>
    <rect x="0" y="30" width="800" height="2" fill="#ffffff"/>
    <rect x="0" y="40" width="800" height="2" fill="#ffffff"/>
    <rect x="0" y="50" width="800" height="2" fill="#ffffff"/>
    <rect x="0" y="60" width="800" height="2" fill="#ffffff"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,60" dur="1s" repeatCount="indefinite"/>
  </g>
</svg>