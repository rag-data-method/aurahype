<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gFace" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFBEB" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#D4A017" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8B6F2A" stop-opacity="0.9"/>
    </radialGradient>
    <linearGradient id="gEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6F2A"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6F2A"/>
    </linearGradient>
    <radialGradient id="gHalo" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </radialGradient>
    <filter id="fBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="fSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  
  <rect width="1600" height="900" fill="#0F0E15"/>
  
  <ellipse cx="800" cy="680" rx="100" ry="25" fill="#000" opacity="0.3" filter="url(#fBlur)">
    <animate attributeName="rx" values="100;85;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.15;0.3" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="680;690;680" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <circle cx="800" cy="450" r="250" fill="url(#gHalo)" filter="url(#fBlur)" opacity="0.5">
    <animate attributeName="r" values="250;270;250" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.7;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <g transform="translate(800,450)">
    <animateTransform attributeName="transform" type="translate" values="800,450; 800,420; 800,450" dur="4s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite"/>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 0 0; 10 0 0; 0 0 0; -10 0 0; 0 0 0" dur="7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1,1; 0.95,1.05; 1,1; 1.05,0.95; 1,1" dur="5s" additive="sum" repeatCount="indefinite"/>
      
      <path d="M-130,0 v40 a130,50 0 0,0 260,0 v-40 a130,50 0 0,1 -260,0" fill="#8B6F2A" opacity="0.9"/>
      <ellipse cx="0" cy="40" rx="130" ry="50" fill="url(#gEdge)" opacity="0.8"/>
      <ellipse cx="0" cy="0" rx="130" ry="50" fill="url(#gFace)"/>
      <ellipse cx="0" cy="0" rx="110" ry="42" fill="none" stroke="#8B6F2A" stroke-width="2" opacity="0.5"/>
      
      <g fill="#8B6F2A" opacity="0.7">
        <rect x="-25" y="-30" width="50" height="60" rx="5" fill="none" stroke="#8B6F2A" stroke-width="4"/>
        <rect x="-25" y="-5" width="50" height="10"/>
        <circle cx="0" cy="-15" r="8"/>
        <circle cx="0" cy="15" r="8"/>
      </g>
      
      <ellipse cx="-50" cy="-20" rx="40" ry="20" fill="#FFFBEB" opacity="0.4" filter="url(#fSoft)">
        <animate attributeName="cx" values="-50;-30;-50" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.6;0.4" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      
      <circle cx="60" cy="15" r="15" fill="#FFFBEB" opacity="0.3" filter="url(#fSoft)">
        <animate attributeName="r" values="15;20;15" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <g>
    <circle cx="760" cy="600" r="3" fill="#D4A017" opacity="0">
      <animate attributeName="cy" values="600;750" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="760;780" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="840" cy="620" r="2.5" fill="#FFFBEB" opacity="0">
      <animate attributeName="cy" values="620;780" dur="4.1s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="840;810" dur="4.1s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="4.1s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="790" cy="580" r="4" fill="#D4A017" opacity="0">
      <animate attributeName="cy" values="580;720" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="750" cy="650" r="2" fill="#FFFBEB" opacity="0">
      <animate attributeName="cy" values="650;800" dur="5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="750;770" dur="5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="820" cy="550" r="3" fill="#D4A017" opacity="0">
      <animate attributeName="cy" values="550;700" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="820;800" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="870" cy="640" r="2.5" fill="#D4A017" opacity="0">
      <animate attributeName="cy" values="640;790" dur="3.8s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0" dur="3.8s" begin="2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="730" cy="630" r="3.5" fill="#FFFBEB" opacity="0">
      <animate attributeName="cy" values="630;780" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="730;750" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="800" cy="660" r="2" fill="#D4A017" opacity="0">
      <animate attributeName="cy" values="660;820" dur="3s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="800;820" dur="3s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="3s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g transform="translate(800,450)">
    <g transform="translate(-70,-25)">
      <path d="M0,-12 L3,0 L0,12 L-3,0 Z" fill="#FFFBEB" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="180" dur="2s" repeatCount="indefinite" additive="sum"/>
      </path>
    </g>
    
    <g transform="translate(60,30)">
      <path d="M0,-10 L2,0 L0,10 L-2,0 Z" fill="#FFFBEB" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0;1.2;0" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <g transform="translate(40,-35)">
      <circle r="5" fill="#FFFBEB" opacity="0">
        <animate attributeName="opacity" values="0;0.9;0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
        <animate attributeName="r" values="0;5;0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g transform="translate(-50,35)">
      <path d="M0,-8 L0,8 M-6,0 L6,0" stroke="#FFFBEB" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="2.2s" begin="0.4s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.2s" begin="0.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <ellipse cx="800" cy="450" rx="350" ry="200" fill="url(#gHalo)" opacity="0.15" filter="url(#fBlur)">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="8s" repeatCount="indefinite"/>
  </ellipse>
</svg>