<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#fdf8f3" />
  
  <!-- Table Shadow -->
  <ellipse cx="400" cy="540" rx="140" ry="10" fill="#d99a88" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.25;0.2" dur="5s" repeatCount="indefinite" />
  </ellipse>
  
  <!-- Geometric Pot Group -->
  <g id="pot" stroke-linejoin="round" stroke-linecap="round">
    <!-- Inner Back Rim -->
    <path d="M 340 420 L 460 420 L 440 390 L 360 390 Z" fill="#f6e5d8" stroke="#d99a88" stroke-width="1.5" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="6s" repeatCount="indefinite" />
    </path>
    
    <!-- Pot Body: Faceted Geometric Shape -->
    <!-- Left Face -->
    <path d="M 360 390 L 340 420 L 355 530 L 400 540 Z" fill="#ffdcc8" stroke="#d99a88" stroke-width="1.5" />
    <!-- Right Face -->
    <path d="M 440 390 L 460 420 L 445 530 L 400 540 Z" fill="#e6cbb9" stroke="#d99a88" stroke-width="1.5" />
    <!-- Front Center Face -->
    <path d="M 340 420 L 460 420 L 445 530 L 355 530 Z" fill="#f2ceb9" stroke="#d99a88" stroke-width="1.5" />
    <!-- Outer Front Rim -->
    <path d="M 360 390 L 440 390 L 460 420 L 340 420 Z" fill="#ffebde" stroke="#d99a88" stroke-width="1.5" />
    
    <!-- Inner Soil -->
    <path d="M 365 400 L 435 400 L 415 410 L 385 410 Z" fill="#e3b49c" stroke="#d99a88" stroke-width="1" />
    
    <!-- Geometric Accent Lines -->
    <line x1="400" y1="420" x2="400" y2="540" stroke="#d99a88" stroke-width="1" opacity="0.5" />
    <line x1="380" y1="395" x2="370" y2="530" stroke="#d99a88" stroke-width="1" opacity="0.5" />
    <line x1="420" y1="395" x2="430" y2="530" stroke="#d99a88" stroke-width="1" opacity="0.5" />
    <line x1="340" y1="420" x2="460" y2="420" stroke="#d99a88" stroke-width="1" opacity="0.7" />
  </g>
  
  <!-- Succulent Plant Group -->
  <g id="succulent" stroke-linejoin="round" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" values="-1 400 400; 1 400 400; -1 400 400" dur="8s" repeatCount="indefinite" additive="sum" />
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2; 0 0" dur="6s" repeatCount="indefinite" additive="sum" />
    
    <!-- Thick Stem -->
    <path d="M 395 405 Q 400 380 405 405" fill="none" stroke="#a8c4a2" stroke-width="2" />
    
    <!-- Layer 4: Outermost Large Leaves -->
    <g filter="url(#blur-glow)">
      <!-- South -->
      <path d="M 400 400 Q 360 430 395 405" fill="#c8dbc5" stroke="#7da37b" stroke-width="1.5">
        <animate attributeName="d" values="M 400 400 Q 360 430 395 405; M 400 400 Q 362 432 397 403; M 400 400 Q 360 430 395 405" dur="7s" repeatCount="indefinite" />
      </path>
      <path d="M 400 400 Q 440 430 405 405" fill="#c8dbc5" stroke="#7da37b" stroke-width="1.5">
        <animate attributeName="d" values="M 400 400 Q 440 430 405 405; M 400 400 Q 438 432 403 403; M 400 400 Q 440 430 405 405" dur="7s" repeatCount="indefinite" />
      </path>
      <!-- East/West -->
      <path d="M 400 400 Q 440 380 410 395" fill="#d4e7d1" stroke="#7da37b" stroke-width="1.5">
        <animate attributeName="d" values="M 400 400 Q 440 380 410 395; M 400 400 Q 442 382 412 393; M 400 400 Q 440 380 410 395" dur="8s" repeatCount="indefinite" />
      </path>
      <path d="M 400 400 Q 360 380 390 395" fill="#d4e7d1" stroke="#7da37b" stroke-width="1.5">
        <animate attributeName="d" values="M 400 400 Q 360 380 390 395; M 400 400 Q 358 382 388 393; M 400 400 Q 360 380 390 395" dur="8s" repeatCount="indefinite" />
      </path>
      <!-- North -->
      <path d="M 400 400 Q 370 340 395 360" fill="#e1f0de" stroke="#7da37b" stroke-width="1.5">
        <animate attributeName="d" values="M 400 400 Q 370 340 395 360; M 400 400 Q 368 338 393 358; M 400 400 Q 370 340 395 360" dur="9s" repeatCount="indefinite" />
      </path>
      <path d="M 400 400 Q 430 340 405 360" fill="#e1f0de" stroke="#7da37b" stroke-width="1.5">
        <animate attributeName="d" values="M 400 400 Q 430 340 405 360; M 400 400 Q 432 338 407 358; M 400 400 Q 430 340 405 360" dur="9s" repeatCount="indefinite" />
      </path>
      
      <!-- Layer 3: Mid Leaves -->
      <!-- South -->
      <path d="M 400 390 Q 370 410 395 405" fill="#dcf2d8" stroke="#8ab588" stroke-width="1.5" />
      <path d="M 400 390 Q 430 410 405 405" fill="#dcf2d8" stroke="#8ab588" stroke-width="1.5" />
      <!-- East/West -->
      <path d="M 400 390 Q 425 375 410 395" fill="#e8f7e5" stroke="#8ab588" stroke-width="1.5" />
      <path d="M 400 390 Q 375 375 390 395" fill="#e8f7e5" stroke="#8ab588" stroke-width="1.5" />
      <!-- North -->
      <path d="M 400 390 Q 380 350 395 365" fill="#effcec" stroke="#8ab588" stroke-width="1.5" />
      <path d="M 400 390 Q 420 350 405 365" fill="#effcec" stroke="#8ab588" stroke-width="1.5" />
      
      <!-- Layer 2: Inner Leaves -->
      <path d="M 400 380 Q 385 395 395 400" fill="#f6fff4" stroke="#9cc598" stroke-width="1.5" />
      <path d="M 400 380 Q 415 395 405 400" fill="#f6fff4" stroke="#9cc598" stroke-width="1.5" />
      <path d="M 400 380 Q 395 350 400 370" fill="#ffffff" stroke="#9cc598" stroke-width="1.5" />
      <path d="M 400 380 Q 405 350 400 370" fill="#ffffff" stroke="#9cc598" stroke-width="1.5" />
      
      <!-- Layer 1: Core Center Bud -->
      <path d="M 400 375 Q 392 385 398 390" fill="#f2f9f1" stroke="#a8c4a2" stroke-width="1.5" />
      <path d="M 400 375 Q 408 385 402 390" fill="#f2f9f1" stroke="#a8c4a2" stroke-width="1.5" />
      <path d="M 400 375 Q 395 365 400 370" fill="#ffffff" stroke="#a8c4a2" stroke-width="1.5" />
      <path d="M 400 375 Q 405 365 400 370" fill="#ffffff" stroke="#a8c4a2" stroke-width="1.5" />
    </g>
  </g>
  
  <!-- Floating Soft Particles / Petals -->
  <g fill="#e1f0de" opacity="0.6">
    <circle cx="330" cy="300" r="2" filter="url(#blur-glow)">
      <animate attributeName="cy" values="300;280;300" dur="6s" repeatCount="indefinite" />
      <animate attributeName="cx" values="330;320;330" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="480" cy="320" r="1.5" filter="url(#blur-glow)">
      <animate attributeName="cy" values="320;340;320" dur="7s" repeatCount="indefinite" />
      <animate attributeName="cx" values="480;490;480" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="450" cy="250" r="2.5" filter="url(#blur-glow)">
      <animate attributeName="cy" values="250;230;250" dur="8s" repeatCount="indefinite" />
      <animate attributeName="cx" values="450;440;450" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0;0.4" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="360" cy="350" r="1" filter="url(#blur-glow)">
      <animate attributeName="cy" values="350;360;350" dur="9s" repeatCount="indefinite" />
      <animate attributeName="cx" values="360;370;360" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0;0.5" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>